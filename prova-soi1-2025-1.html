<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

{n:1,
disc:false,
tema:"Vasos Sanguíneos — Pressão e Resistência",
context:"(AFYA PARAÍBA) Durante uma aula prática de fisiologia cardiovascular, os alunos foram divididos em grupos para estudar as características dos diferentes tipos de vasos sanguíneos. O professor utilizou modelos anatômicos e gráficos para demonstrar como a pressão, o fluxo, o volume e a resistência variam entre artérias, arteríolas, capilares, vênulas e veias.\n\nNesse contexto, foram feitas as seguintes afirmações:",
assertions:"I. As artérias possuem alta pressão e, de maneira geral, baixa resistência ao fluxo sanguíneo;\nII. As arteríolas são os principais vasos responsáveis pela resistência vascular periférica;\nIII. Os capilares, em sua totalidade, possuem alta pressão e grande resistência ao fluxo de sangue;\nIV. As veias possuem alta pressão e podem armazenar grandes volumes de sangue.",
text:"Está correto apenas o que se afirma em:",
opts:["II e III.", "I e III.", "I e II.", "II e IV."],
g:2,
exp:'Resposta correta: I e II.\nAfirmativa I está correta, as artérias possuem alta pressão e, de maneira geral, baixa resistência ao fluxo sanguíneo;\nAfirmativa II está correta, as arteríolas são os principais vasos responsáveis pela resistência vascular periférica;\nA afirmativa III está incorreta porque apesar de individualmente os capilares apresentarem alta resistência ao fluxo, quando tomada em totalidade, a resistência da rede capilar é menor devido à sua grande área de secção transversal. Além disso, a pressão nos capilares é baixa.\nA afirmativa IV está incorreta porque apesar das veias terem a capacidade de armazenar grandes quantidades de sangue, devido à sua alta complacência, a pressão dentro desses vasos é baixa.',
deep:'🩸 VASOS SANGUÍNEOS — PRESSÃO vs RESISTÊNCIA\n\nArtérias:\n→ Alta pressão (≈100 mmHg na aorta)\n→ Baixa resistência (grande calibre, parede elástica)\n→ Função: condução rápida do sangue\n\nArteríolas:\n→ Principal sítio de RESISTÊNCIA VASCULAR PERIFÉRICA\n→ Músculo liso abundante → vasoconstricção/vasodilatação\n→ Regulam PA e fluxo para tecidos\n\nCapilares:\n→ Individualmente: alta resistência (calibre mínimo)\n→ Em TOTALIDADE: baixa resistência (enorme área de secção transversal)\n→ Pressão BAIXA (~25 mmHg na extremidade arterial)\n→ Local de trocas gasosas e metabólicas\n\nVeias:\n→ BAIXA pressão (≈5-10 mmHg)\n→ Alta complacência → RESERVATÓRIO de sangue (~60-70% do volume total)\n→ Válvulas + bomba muscular → retorno venoso\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ III: Confunde resistência individual vs total; pressão capilar é baixa\n❌ IV: Veias armazenam sangue, mas a pressão é BAIXA, não alta\n\n💡 MACETE\nArteríolas = torneira do sistema → controlam RVP\nVeias = reservatório → guardam sangue, mas pressão baixa'},

{n:2,
disc:false,
tema:"Leucócitos — Neutrófilos",
context:"(UNISL JI-PARANÁ) Durante uma aula prática de histologia, você analisa uma amostra de sangue periférico ao microscópio óptico, onde observa uma célula com núcleo segmentado em múltiplos lóbulos conectados por finas pontes de cromatina e citoplasma contendo pequenos grânulos de coloração levemente lilás. Durante o fechamento do laboratório, a professora comenta que essa célula desempenha um papel essencial na resposta imune inata, sendo a primeira linha de defesa contra infecções bacterianas por meio da fagocitose.",
assertions:null,
text:"Com base nas características microscópicas observadas e na função descrita, qual célula sanguínea está sendo analisada?",
opts:["Eosinófilos.", "Neutrófilos.", "Basófilos.", "Linfócitos."],
g:1,
exp:'Resposta correta: Neutrófilos.\nOs neutrófilos são os leucócitos mais abundantes no sangue periférico e possuem um núcleo multilobulado (tipicamente entre 3 e 5 lóbulos) com pontes de cromatina finas. Seu citoplasma apresenta grânulos pequenos e de coloração lilás, devido à afinidade com corantes neutros.\nEssas células desempenham um papel fundamental na fagocitose de patógenos, especialmente bactérias, sendo a primeira linha de defesa do sistema imune inato.\nAnálise das alternativas incorretas:\nEosinófilos:\nAlternativa incorreta, pois os eosinófilos possuem grânulos grandes e uniformes, corados intensamente de vermelho alaranjado, e um núcleo bilobado. Além disso, sua principal função está na defesa contra infecções parasitárias e na mediação de reações alérgicas, e não na fagocitose de bactérias.\nBasófilos:\nAlternativa incorreta, pois os basófilos apresentam grânulos grandes e escuros (azul-arroxeados), que frequentemente obscurecem o núcleo. São os leucócitos menos abundantes no sangue e participam de reações alérgicas por meio da liberação de histamina.\nLinfócitos:\nAlternativa incorreta, pois os linfócitos são agranulócitos, não possuindo grânulos evidentes ao microscópio óptico. Além disso, seu núcleo é redondo e ocupa quase todo o citoplasma. Os linfócitos fazem parte da resposta imune adaptativa, sendo responsáveis pela produção de anticorpos (linfócitos B) ou pela resposta celular mediada por células T.',
deep:'🔬 LEUCÓCITOS — COMPARATIVO RÁPIDO\n\nNeutrófilos (resposta correta):\n→ Mais abundantes (60-70%)\n→ Núcleo multilobulado (3-5 lóbulos)\n→ Grânulos pequenos, lilás (neutrofílicos)\n→ Função: fagocitose de BACTÉRIAS\n→ 1ª linha de defesa imune inata\n\nEosinófilos:\n→ Núcleo bilobado\n→ Grânulos GRANDES, vermelho-alaranjado\n→ Defesa contra PARASITAS + alergias\n\nBasófilos:\n→ Mais raros dos leucócitos\n→ Grânulos grandes, azul-arroxeados (obscurecem o núcleo)\n→ Liberação de HISTAMINA → reações alérgicas\n\nLinfócitos:\n→ AGRANULÓCITOS (sem grânulos evidentes)\n→ Núcleo redondo, ocupa quase todo o citoplasma\n→ Imunidade ADAPTATIVA (B → anticorpos; T → celular)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Eosinófilos → grânulos grandes, vermelho-alaranjado, bilobado\n❌ C: Basófilos → grânulos escuros, histamina\n❌ D: Linfócitos → agranulócitos, núcleo redondo\n\n💡 MACETE\nNeutro = neutrofílico (lilás) + fagocita bactéria\nEosino = eosinofílico (rosa/vermelho) + parasitas\nBaso = basofílico (azul/roxo) + histamina'},

{n:3,
disc:false,
tema:"Artéria Coronária Esquerda — Obstrução",
context:"(AFYA ITACOATIARA) Durante uma aula prática de aspectos gerais do sistema cardiovascular, os alunos foram apresentados a um caso simulado de cateterismo e observou-se a obstrução na artéria coronária esquerda. O paciente apresentado no roteiro de prática manifestava sintomas de angina de peito devido à obstrução parcial nessa artéria.",
assertions:null,
text:"Com base nas informações, assinale a alternativa que explica as consequências da obstrução da artéria coronária e seus efeitos na funcionalidade cardíaca.",
opts:["A obstrução na artéria coronária esquerda pode causar hipóxia na região afetada, pois esta artéria de ramifica no ramo circunflexo que distribui sangue oxigenado às paredes do ventrículo direito e átrio direito.", "A obstrução na artéria coronária esquerda pode resultar em diminuição do suprimento sanguíneo para o coração, pois o ramo interventricular anterior irriga as paredes dos dois ventrículos com sangue oxigenado.", "A obstrução na artéria coronária esquerda pode levar a um aumento na pressão arterial sistêmica. Porém a alteração da pressão nestas condições não afeta o equilíbrio hemodinâmico.", "A obstrução na artéria coronária esquerda não afeta significativamente a função cardíaca, pois os ramos circunflexo e interventricular posterior drenam o sangue do miocárdio para o seio coronário."],
g:1,
exp:'A alternativa correta é a seguinte alternativa: "A obstrução na artéria coronária esquerda pode resultar em diminuição do suprimento sanguíneo para o coração, pois o ramo interventricular anterior irriga as paredes dos dois ventrículos com sangue oxigenado", porque descreve que a obstrução na artéria coronária esquerda pode resultar em diminuição do suprimento sanguíneo para o coração, pois o ramo interventricular anterior irriga as paredes dos dois ventrículos com sangue oxigenado.\nDe acordo com Tortora (2016), duas artérias coronárias, as artérias coronárias esquerda e direita, ramificam-se da parte ascendente da aorta e fornecem sangue oxigenado para o miocárdio. A artéria coronária esquerda passa inferiormente à aurícula esquerda e se divide nos ramos interventricular anterior e circunflexo. O ramo interventricular anterior encontra-se anteriormente ao sulco interventricular anterior e fornece sangue oxigenado às paredes de ambos os ventrículos. O ramo circunflexo encontra-se no sulco coronário e distribui sangue oxigenado às paredes do ventrículo esquerdo e átrio esquerdo.\nA artéria coronária direita emite pequenos ramos (ramos atriais) para o átrio direito. Ela continua inferiormente à aurícula direita e, por fim, se divide em ramos interventricular posterior e marginal direito. O ramo interventricular posterior segue o sulco interventricular posterior e irriga as paredes dos dois ventrículos com sangue oxigenado. O ramo marginal posterior além do sulco coronário corre ao longo da margem direita do coração e transporta sangue oxigenado à parede do ventrículo direito.',
deep:'❤️ ARTÉRIAS CORONÁRIAS — MAPA COMPLETO\n\nAorta ascendente\n├── A. Coronária ESQUERDA\n│   ├── Ramo Interventricular Anterior (RIVA/DA)\n│   │   → Irriga paredes de AMBOS os ventrículos (anterior)\n│   │   → Obstrução = IAM de parede anterior\n│   └── Ramo Circunflexo\n│       → VE + AE (parede lateral/posterior)\n└── A. Coronária DIREITA\n    ├── Ramos atriais → AD\n    ├── Ramo Interventricular Posterior\n    │   → Ambos os ventrículos (posterior)\n    └── Ramo Marginal Direito → VD\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Circunflexo irriga VE + AE, NÃO VD + AD\n❌ C: Obstrução coronária não aumenta PA sistêmica diretamente; afeta perfusão miocárdica\n❌ D: Circunflexo e IV posterior são ARTÉRIAS (irrigam), não drenam sangue\n   Drenagem venosa → seio coronário (veias cardíacas)\n\n💡 MACETE\nRIVA = "artéria da viúva" → irriga grande parte do miocárdio\nCircunflexo = abraça o coração pelo sulco coronário → VE + AE'},

{n:4,
disc:false,
tema:"Órgãos Linfoides — Histologia e Anatomia",
context:"(UNIREDENTOR) Durante uma aula prática de anatomia e histologia, um grupo de estudantes de medicina analisou lâminas histológicas e peças anatômicas de diferentes órgãos linfoides. A partir das observações realizadas, foram elaboradas as seguintes afirmativas:",
assertions:"I - Ao analisar um linfonodo, os estudantes identificaram a presença de nódulos linfáticos primários e secundários na região cortical, sendo que nos secundários é possível observar o centro germinativo rico em linfócitos B.\nII - Na análise histológica do timo, os estudantes observaram a presença de corpúsculos de Hassall na medula, que são estruturas tímicas características, formadas por células reticulares epiteliais.\nIII - Ao examinarem o baço, os estudantes identificaram a polpa branca, rica em macrófagos e eritrócitos, e a polpa vermelha, constituída principalmente por tecido linfoide.\nIV - Analisando uma peça anatômica, os estudantes observaram que a drenagem do Baço, via veia esplênica, juntamente com as veias Mesentérica Superior e Mesentérica Inferior compõe a Veia Porta.",
text:"Assinale a alternativa abaixo, que contém apenas as afirmativas corretas sobre a histologia e a anatomia dos órgãos linfoides.",
opts:["Apenas I e III estão corretas.", "Apenas II e IV estão corretas.", "Apenas I, III e IV estão corretas.", "Apenas I, II e IV estão corretas."],
g:3,
exp:'Análise das assertivas:\nI - Correta: Os nódulos linfáticos primários e secundários são característicos da região cortical dos linfonodos. O centro germinativo dos nódulos linfáticos secundários é rico em linfócitos B em processo de proliferação e diferenciação.\nII - Correta: Os corpúsculos de Hassall são estruturas tímicas características, localizadas na medula do timo, e são formados por células reticulares epiteliais que se degeneram e sofrem queratinização.\nIII - Incorreta: A polpa branca do baço é rica em tecido linfoide, principalmente linfócitos, e é onde ocorrem as respostas imunes. A polpa vermelha, por sua vez, é rica em sinusoides esplênicos e macrófagos, sendo responsável pela filtração do sangue.\nIV - Correta: A Veia Porta é composta a partir da tributação da Veia Esplênica com a Veia Mesentérica Inferior, e que depois recebe a drenagem venosa da Veia Mesentérica Superior.',
deep:'🫁 ÓRGÃOS LINFOIDES — REVISÃO INTEGRADA\n\nLINFONODO (I ✅):\n→ Córtex: nódulos linfáticos primários e secundários\n→ Nódulo secundário = centro germinativo (linfócitos B ativados)\n→ Paracórtex: linfócitos T\n→ Medula: cordões medulares + seios medulares\n\nTIMO (II ✅):\n→ Córtex: linfócitos T imaturos (timócitos)\n→ Medula: linfócitos T maduros + corpúsculos de Hassall\n→ Hassall = células reticulares epiteliais queratinizadas\n→ Órgão linfoide PRIMÁRIO (maturação de T)\n\nBAÇO (III ❌ — INVERTEU):\n→ Polpa BRANCA = tecido linfoide (linfócitos, PALS, zona marginal)\n→ Polpa VERMELHA = sinusoides + macrófagos + eritrócitos\n   Filtração do sangue, hemocaterese\n→ A assertiva INVERTEU as polpas!\n\nVEIA PORTA (IV ✅):\n→ V. Esplênica + V. Mesentérica Inferior → tronco\n→ + V. Mesentérica Superior → VEIA PORTA\n→ Leva sangue venoso do TGI + baço → fígado\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A e C incluem III (invertida)\n❌ B exclui I (que é correta)\n\n💡 MACETE\nPolpa Branca = Branco = linfócitos (imunidade)\nPolpa Vermelha = Vermelho = sangue (filtração, hemácias)'},

{n:5,
disc:true,
tema:"Camadas da Parede Cardíaca",
context:"(AFYA IPATINGA) Os acadêmicos estavam analisando um corte histológico do coração sob o microscópio, durante uma aula prática de histologia. Com base nas características das diferentes camadas que compõem a parede cardíaca, responda às seguintes afirmações:\n\nA) Qual o nome dado a camada mais externa do coração? Descreva sua composição histológica e explique sua função principal.\n\nB) Qual o nome dado a camada média do coração? Explique suas características histológicas e como essas estruturas contribuem para a função do coração.\n\nc) Qual o nome dado a camada interna do coração? Descreva sua constituição histológica e explique sua importância na função cardíaca.",
assertions:null,
text:"Responda às questões A, B e C acima.",
opts:[],
g:null,
exp:'1. Qual o nome dado a camada mais externa do coração? Descreva sua composição histológica e explique sua função principal.\nO epicárdio é formado por duas principais camadas:\n1. Mesotélio – Camada externa composta por células pavimentosas simples, que fazem parte do pericárdio visceral.\n2. Tecido conjuntivo subjacente – Rico em fibras colágenas e elásticas, além de conter vasos sanguíneos, nervos e, frequentemente, depósitos de tecido adiposo.\nFunção Principal:\nO epicárdio atua na proteção e lubrificação do coração, reduzindo o atrito entre o coração e as estruturas adjacentes durante os batimentos cardíacos. Isso ocorre devido à produção de líquido seroso pelo mesotélio, essencial para o deslizamento suave das superfícies pericárdicas.\n\n1. Qual o nome dado a camada média do coração? Explique suas características histológicas e como essas estruturas contribuem para a função do coração.\nA camada média do coração é denominada miocárdio. Características Histológicas: O miocárdio é a camada mais espessa da parede cardíaca e é composto predominantemente por tecido muscular estriado cardíaco. Suas principais características incluem:\n1. Células musculares cardíacas (miócitos cardíacos) – São células alongadas e ramificadas, unidas por discos intercalares, que garantem a comunicação eficiente entre os miócitos e a transmissão sincronizada dos impulsos elétricos.\n2. Discos intercalares – Estruturas especializadas que contêm junções comunicantes (gap junctions), permitindo a rápida propagação dos sinais elétricos e a contração coordenada do coração.\nPrincipal Contribuição para a Função Cardíaca:\nO miocárdio é responsável pela contração e bombeamento do sangue para o sistema circulatório. A disposição das fibras musculares em diferentes direções permite uma contração eficiente, garantindo a ejeção do sangue para os pulmões e para a circulação sistêmica. Além disso, a presença dos discos intercalares assegura a sincronia contrátil (sincicial) entre as células cardíacas, essencial para o funcionamento rítmico e coordenado do coração.\n\n1. c) Qual o nome dado a camada interna do coração? Descreva sua constituição histológica e explique sua importância na função cardíaca.\nA camada interna do coração é denominada endocárdio. Constituição Histológica: o endocárdio é composto por três camadas principais:\n1. Camada mais interna (endotélio) – Formada por epitélio pavimentoso simples, que reveste toda a superfície interna do coração, incluindo as válvulas cardíacas.\n2. Camada subendotelial – Constituída por tecido conjuntivo frouxo, rico em fibras colágenas e elásticas, que fornece suporte estrutural ao endotélio.\nNo endocárdio é possível encontrar pequenos vasos sanguíneos, nervos e, nas regiões ventriculares, fibras do sistema de condução cardíaco (fibras de Purkinje), responsáveis pela propagação dos impulsos elétricos.\nImportância na Função Cardíaca: o endocárdio desempenha funções essenciais para o funcionamento do coração:\n1. Papel no sistema de condução cardíaco – A camada subendocárdica abriga as fibras de Purkinje, fundamentais para a propagação rápida dos impulsos elétricos, garantindo uma contração eficiente e sincronizada do miocárdio.\n2. Suporte estrutural e adaptação funcional – A composição conjuntiva do endocárdio permite que ele se adapte às variações do volume e da pressão sanguínea dentro das câmaras cardíacas. Assim, o endocárdio é fundamental para a manutenção da fluidez do sangue no interior do coração e para a condução eficiente dos impulsos elétricos que controlam o ritmo cardíaco.',
deep:'🫀 CAMADAS DA PAREDE CARDÍACA\n\nEPICÁRDIO (camada EXTERNA):\n→ = Pericárdio visceral\n→ Mesotélio (epitélio pavimentoso simples)\n→ TC subjacente: fibras colágenas + elásticas\n→ Vasos, nervos, tecido adiposo\n→ Função: proteção + lubrificação (líquido seroso → ↓ atrito)\n\nMIOCÁRDIO (camada MÉDIA — mais espessa):\n→ Tecido muscular estriado cardíaco\n→ Miócitos: células alongadas, ramificadas\n→ Discos intercalares:\n   Junções comunicantes (gap junctions) → sincronia elétrica\n   Desmossomos → adesão mecânica\n→ Função: CONTRAÇÃO → bombeamento de sangue\n→ Funciona como sincício funcional\n\nENDOCÁRDIO (camada INTERNA):\n→ Endotélio (epitélio pavimentoso simples)\n→ Camada subendotelial (TC frouxo)\n→ Abriga fibras de Purkinje (sistema de condução)\n→ Reveste câmaras + válvulas\n→ Função: superfície lisa → fluidez + condução elétrica\n\n💡 MACETE\nDe fora para dentro: EPI-MIO-ENDO\nEpi = sobre (capa externa)\nMio = músculo (contração)\nEndo = dentro (revestimento)'},

{n:6,
disc:false,
tema:"Hipertrofia Cardíaca Fisiológica — Atletas",
context:"(AFYA MANACAPURU) Um grupo de atletas amadores, visando participar de uma maratona em três meses, intensificou seus treinos. Durante uma consulta com um fisiologista do esporte, eles foram informados sobre as notáveis adaptações fisiológicas que seus corpos experienciariam em resposta ao aumento da intensidade e frequência dos exercícios. Essas adaptações contrastam fortemente com a resposta fisiológica de indivíduos sedentários durante atividades físicas vigorosas.\n\nConsiderando o contexto apresentado, analise as asserções a seguir e a relação proposta entre elas, identificando as alterações morfofisiológicas esperadas nos atletas em resposta ao treinamento físico intenso:",
assertions:"I. Um atleta bem-treinado apresenta um débito cardíaco significativamente maior durante o exercício vigoroso, em comparação a um indivíduo sedentário, devido à hipertrofia cardíaca fisiológica.\nPORQUE\nII. O treinamento físico regular induz hipertrofia do ventrículo esquerdo, resultando em um aumento do volume sistólico e uma diminuição da frequência cardíaca em repouso, o que potencializa o débito cardíaco durante o esforço físico.",
text:"Marque a alternativa correta:",
opts:["As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.", "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.", "As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.", "As asserções I e II são proposições falsas."],
g:2,
exp:'Resposta correta: As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.\nPara entender completamente, precisamos desmembrar os conceitos. O débito cardíaco (DC) é o volume de sangue bombeado pelo coração por minuto (DC = volume sistólico x frequência cardíaca). Atletas treinados adaptam seu sistema cardiovascular para otimizar o transporte de oxigênio durante o exercício. A hipertrofia cardíaca fisiológica, especificamente do ventrículo esquerdo, é uma adaptação chave. Isso resulta em um aumento do volume sistólico (mais sangue bombeado por batimento) e, paradoxalmente, uma diminuição da frequência cardíaca em repouso (o coração trabalha mais eficientemente). Durante o exercício intenso, o volume sistólico elevado permite um aumento significativo do débito cardíaco em comparação a um sedentário. Assim, a asserção II explica diretamente o mecanismo pelo qual a asserção I é verdadeira.',
deep:'🏃 CORAÇÃO DE ATLETA — ADAPTAÇÕES FISIOLÓGICAS\n\nDébito Cardíaco (DC) = VS × FC\n\nHipertrofia fisiológica do VE:\n→ Exercício aeróbico → hipertrofia EXCÊNTRICA\n→ ↑ Volume da câmara → ↑ Volume Sistólico\n→ Mais sangue por batimento → coração mais eficiente\n\nConsequências:\n→ ↑ VS em repouso e exercício\n→ ↓ FC em repouso (bradicardia fisiológica, ~40-60 bpm)\n→ DC de repouso = IGUAL (VS↑ × FC↓)\n→ DC no exercício = MUITO MAIOR (VS↑↑ × FC↑)\n\nAtleta vs Sedentário no exercício máximo:\n→ Atleta: DC ≈ 30-40 L/min\n→ Sedentário: DC ≈ 20-25 L/min\n\nI ✅ → DC maior no exercício por hipertrofia fisiológica\nII ✅ → Mecanismo: hipertrofia VE → ↑VS + ↓FC repouso\nII JUSTIFICA I → II explica o mecanismo de I\n\nObs: alternativas A e B do PDF são idênticas (erro da banca)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A/B: II justifica sim a I (mecanismo direto)\n❌ D: Ambas as asserções são verdadeiras\n\n💡 MACETE\nDC = VS × FC → atleta compensa FC baixa com VS alto'},

{n:7,
disc:false,
tema:"Hematopoiese — G-CSF vs EPO",
context:"(UNIPTAN) Um pesquisador está investigando um novo tratamento para otimizar a recuperação das células sanguíneas e linfócitos após quimioterapia mieloablativa, que causa redução severa da produção de células da linhagem mielóide. O estudo propõe a administração de fatores de crescimento hematopoéticos para acelerar a recuperação das linhagens celulares afetadas. A hematopoiese ocorre na medula óssea, onde células-tronco hematopoéticas são reguladas por fatores de crescimento específicos, como por exemplo, a eritropoetina (EPO) e o fator estimulador de colônias de granulócitos (G-CSF). Sobre esse assunto, analise as assertivas abaixo e sua relação:",
assertions:"I. A administração de G-CSF acelera a recuperação dos neutrófilos após quimioterapia mieloablativa.\nPORQUE\nII. O G-CSF promove a proliferação e diferenciação das células-tronco hematopoéticas em células da linhagem eritroide.",
text:"A respeito dessas asserções e sua relação, assinale a opção correta.",
opts:["As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.", "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.", "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."],
g:3,
exp:'Resposta correta:\nA asserção I é uma proposição verdadeira, e a II é uma proposição falsa.\nExplicação:\nA primeira asserção está correta, pois o G-CSF é um fator de crescimento que estimula a recuperação dos neutrófilos após quimioterapia mieloablativa. Como apresentado no enunciado, a G-CSF estimula a proliferação da colônia de granulócitos, portanto, da linhagem mielóide. No entanto, a segunda asserção é incorreta, pois o G-CSF não promove a diferenciação de células-tronco hematopoéticas na linhagem eritroide, mas sim na linhagem mieloide, especificamente na produção de neutrófilos. A eritropoetina (EPO) é o fator responsável pela diferenciação da linhagem eritroide.',
deep:'🧬 FATORES DE CRESCIMENTO HEMATOPOÉTICOS\n\nG-CSF (Fator Estimulador de Colônias de Granulócitos):\n→ Estimula linhagem MIELÓIDE → GRANULÓCITOS\n→ Especificamente: produção de NEUTRÓFILOS\n→ Uso clínico: pós-quimioterapia (neutropenia)\n→ Exemplo: filgrastim, pegfilgrastim\n\nEPO (Eritropoetina):\n→ Estimula linhagem ERITRÓIDE → HEMÁCIAS\n→ Produzida principalmente nos RINS\n→ Uso clínico: anemia da DRC, pós-quimioterapia\n\nOutros fatores:\n→ TPO (trombopoetina) → plaquetas\n→ M-CSF → monócitos/macrófagos\n→ IL-3 → multipotente (várias linhagens)\n→ IL-5 → eosinófilos\n\nI ✅ → G-CSF recupera neutrófilos pós-QT\nII ❌ → G-CSF NÃO diferencia em eritróide; isso é EPO\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: II é falsa, então não pode justificar I\n❌ B: II é falsa, não verdadeira\n❌ C: I é verdadeira, não falsa\n\n💡 MACETE\nG-CSF → G de Granulócito (neutrófilos)\nEPO → E de Eritrócito (hemácias)\nTPO → T de Trombócito (plaquetas)'},

{n:8,
disc:false,
tema:"Retorno Venoso — Bomba Muscular",
context:"(AFYA MANACAPURU) Um paciente de 65 anos relata cansaço nas pernas ao caminhar e inchaço nos tornozelos ao final do dia. Durante o exame, o médico percebe que os pulsos nos pés estão fracos e que há veias dilatadas em uma das pernas. Além disso, a pressão arterial medida foi de 145/90 mmHg.",
assertions:null,
text:"Com base nesse caso, identifique a alternativa correta:",
opts:["O inchaço nos tornozelos é um sinal de que o sangue arterial está se acumulando nas veias, indicando uma sobrecarga de pressão nas artérias.", "O retorno venoso é facilitado pela contração dos músculos das pernas e pela presença de válvulas nas veias, que evitam o refluxo do sangue, especialmente contra a gravidade.", "As artérias são responsáveis por transportar sangue desoxigenado dos membros inferiores de volta ao coração, enquanto as veias transportam sangue oxigenado para os músculos e tecidos.", "A pressão arterial elevada não tem relação com a circulação venosa, pois a pressão arterial se refere apenas ao fluxo sanguíneo nas artérias."],
g:1,
exp:'Resposta correta: O retorno venoso é facilitado pela contração dos músculos das pernas e pela presença de válvulas nas veias, que evitam o refluxo do sangue, especialmente contra a gravidade.\nAs artérias são responsáveis por transportar sangue desoxigenado dos membros inferiores de volta ao coração, enquanto as veias transportam sangue oxigenado para os músculos e tecidos.\nJustificativa: Esta afirmação é incorreta porque inverte as funções das artérias e veias. As artérias transportam sangue oxigenado do coração para os tecidos, enquanto as veias transportam sangue desoxigenado dos tecidos de volta ao coração.\nA pressão arterial elevada não tem relação com a circulação venosa, pois a pressão arterial se refere apenas ao fluxo sanguíneo nas artérias.\nJustificativa: Esta afirmação é falsa, pois a pressão arterial elevada pode afetar a circulação venosa. A pressão nas artérias pode influenciar a pressão nas veias, e a insuficiência venosa pode ser exacerbada por uma pressão arterial alta, dificultando o retorno do sangue ao coração.\nO inchaço nos tornozelos é um sinal de que o sangue arterial está se acumulando nas veias, indicando uma sobrecarga de pressão nas artérias.\nJustificativa: Esta afirmação é incorreta porque o inchaço nos tornozelos geralmente é um sinal de insuficiência venosa, onde o sangue venoso não está retornando adequadamente ao coração, resultando em acúmulo de líquido nos tecidos. Não se trata de um acúmulo de sangue arterial, mas sim de um problema na circulação venosa.',
deep:'🦵 RETORNO VENOSO — MECANISMOS\n\nBomba muscular (principal nos MMII):\n→ Contração dos músculos da panturrilha\n→ Comprime veias → empurra sangue para cima\n→ Válvulas venosas → impedem refluxo\n→ Relaxamento → veias reenchem\n\nOutros mecanismos:\n→ Pressão respiratória negativa intratorácica\n→ Válvulas venosas (unidirecionais)\n→ Vis a tergo (pressão residual dos capilares)\n\nInsuficiência venosa crônica:\n→ Válvulas incompetentes → refluxo\n→ Estase venosa → edema, varizes\n→ Inchaço pior ao FINAL DO DIA (gravidade acumulada)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Edema = insuficiência VENOSA, não acúmulo arterial\n❌ C: INVERTE artérias e veias\n   Artérias → sangue oxigenado → tecidos\n   Veias → sangue desoxigenado → coração\n❌ D: HAS pode piorar insuficiência venosa\n   PA alta → ↑ pressão hidrostática capilar → ↑ edema\n\n💡 MACETE\nVálvulas + músculos = "segundo coração" dos MMII'},

{n:9,
disc:false,
tema:"Hemoglobina — Tipos e Ferro",
context:"(UNIDOMPEDRO) Durante um estudo sobre a função respiratória, um grupo de estudantes observa que a deficiência de ferro afeta a capacidade do sangue de transportar oxigênio. O ferro é essencial para a formação da hemoglobina, e, sem a quantidade adequada, o transporte de oxigênio pelos glóbulos vermelhos torna-se menos eficiente, resultando em fadiga e dificuldade para respirar. Os pesquisadores discutem como a falta de ferro pode prejudicar a função respiratória e comprometer o desempenho físico.",
assertions:null,
text:"Com base no cenário descrito, correlacione os tipos de hemoglobina com suas respectivas estruturas e funções, explicando como a deficiência de ferro compromete o transporte de oxigênio:",
opts:["A hemoglobina glicada (HbA1c), responsável pelo transporte de oxigênio, depende do ferro para sua formação, e sua deficiência reduz a captação de oxigênio pelos pulmões.", "A hemoglobina F (HbF), predominante na vida adulta, tem baixa afinidade pelo oxigênio e sua deficiência de ferro impede a ligação ao oxigênio nos pulmões.", "A hemoglobina S (HbS), presente em indivíduos sem anemia falciforme, perde sua capacidade de captar ferro, levando à formação de eritrócitos incapazes de transportar oxigênio.", "A hemoglobina A (HbA), predominante em adultos, depende do ferro para formar o grupo heme, e sua deficiência reduz a eficiência do transporte de oxigênio."],
g:3,
exp:'Justificativa das alternativas:\nCorreta. A HbA é a principal hemoglobina em adultos, composta por duas cadeias alfa e duas cadeias beta. O ferro é essencial para a formação do grupo heme, que se liga ao oxigênio nos pulmões e o transporta para os tecidos. A deficiência de ferro reduz a síntese de hemoglobina, comprometendo a capacidade de transporte de oxigênio, resultando em sintomas como fadiga e dispneia. (Hall & Hall, 2021; Harvey & Ferrier, 2012)\nIncorreta. A hemoglobina F (HbF) é predominante na vida fetal, não na vida adulta. Além disso, a HbF tem maior afinidade pelo oxigênio em comparação com a HbA, facilitando a transferência de oxigênio da mãe para o feto. A deficiência de ferro afeta sua produção, mas a afirmação da alternativa é errônea ao descrever que ela tem baixa afinidade. (Moore, 2021; Junqueira & Carneiro, 2013)\nIncorreta. A hemoglobina S (HbS) está associada à anemia falciforme, sendo uma mutação da HbA que leva à polimerização da hemoglobina em condições de baixa oxigenação. No entanto, indivíduos sem anemia falciforme não possuem HbS. Além disso, a HbS não perde a capacidade de captar ferro, mas sim altera sua conformação, levando à formação de hemácias falciformes. (Bogliolo, 2021; Guyton & Hall, 2021)\nIncorreta. A hemoglobina glicada (HbA1c) não é responsável pelo transporte de oxigênio, mas sim um marcador do controle glicêmico a longo prazo. A HbA1c resulta da ligação não enzimática da glicose à HbA, refletindo os níveis médios de glicose no sangue nos últimos 2 a 3 meses. O ferro não participa diretamente da formação da HbA1c, tornando a afirmação incorreta. (Harvey & Ferrier, 2012; Nelson & Cox, 2014)',
deep:'🩸 TIPOS DE HEMOGLOBINA\n\nHbA (resposta correta):\n→ Principal em ADULTOS (~97%)\n→ 2 cadeias α + 2 cadeias β\n→ Cada cadeia tem 1 grupo HEME (contém Fe²⁺)\n→ Fe²⁺ + O₂ → oxiemoglobina\n→ Deficiência de ferro → ↓ síntese de Hb → anemia ferropriva\n\nHbF (fetal):\n→ Predominante no FETO, não no adulto\n→ 2α + 2γ (gama, não beta)\n→ MAIOR afinidade por O₂ que HbA\n→ Facilita transferência O₂ mãe → feto\n\nHbS (falciforme):\n→ Mutação pontual: glutamato → valina na cadeia β\n→ Polimeriza em BAIXA oxigenação → hemácia falciforme\n→ Presente em anemia falciforme (HbSS)\n→ NÃO está em indivíduos sem a doença\n\nHbA1c (glicada):\n→ NÃO é tipo funcional de transporte\n→ = HbA + glicose (ligação não enzimática)\n→ Marcador de controle glicêmico (últimos 2-3 meses)\n→ Ferro NÃO participa da glicação\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: HbA1c = marcador glicêmico, não transportador\n❌ B: HbF é fetal (não adulta) e tem ALTA afinidade\n❌ C: HbS = anemia falciforme; ausente em sadios\n\n💡 MACETE\nHbA = Adulto | HbF = Fetal | HbS = Sickle (falciforme) | HbA1c = Açúcar'},

{n:10,
disc:false,
tema:"Septação Atrial — CIA",
context:"(UNIPTAN) Comunicação interatrial (CIA) é uma condição médica onde persiste um orifício entre as câmaras superiores do coração, os átrios, permitindo a passagem anormal de sangue entre eles após o nascimento. Durante a septação do átrio primitivo, no embrião, ocorre a formação e subsequente fusão de dois septos, o septum primum e o septum secundum. Falhas na estruturação desses septos e seus foramens são os responsáveis pela CIA.\n\nNesse contexto, avalie as asserções a seguir e a relação proposta entre elas.",
assertions:"I. O septum primum é uma espessa membrana que cresce do átrio primitivo em direção aos ventrículos e divide parcialmente o ventrículo primitivo em direito e esquerdo.\nPORQUE\nII. O septum secundum é uma membrana muscular, crescendo após o septum primum, na parte superior do átrio.",
text:"Marque a alternativa correta:",
opts:["A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.", "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.", "As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.", "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I."],
g:1,
exp:'O septum primum é uma estrutura membranosa que cresce do teto do átrio primitivo em direção ao centro do coração, não em direção aos ventrículos. Ele não divide os ventrículos, mas sim contribui para a formação da separação entre os átrios. O septum secundum é uma membrana que cresce também do teto do átrio primitivo, mas ele cresce posteriormente e à direita do septo primum. Ele é uma parte importante do desenvolvimento normal do coração e, em conjunto com o forame ovale (uma abertura temporária), permite que o sangue flua do átrio direito para o átrio esquerdo durante a gestação.\nPortanto, a II é verdadeira porque descreve corretamente o crescimento do septo secundum após o septum primum. No entanto, a I é falsa porque o septum primum não cresce em direção aos ventrículos e não os separa.',
deep:'🫀 SEPTAÇÃO ATRIAL — EMBRIOLOGIA\n\nSeptum Primum (I ❌):\n→ Membrana FINA (não espessa)\n→ Cresce do TETO do átrio primitivo → em direção ao CENTRO\n→ NÃO cresce em direção aos ventrículos\n→ Divide os ÁTRIOS, não os ventrículos\n→ Forma o ostium primum (abertura inferior transitória)\n→ Depois perfura-se → ostium secundum\n\nSeptum Secundum (II ✅):\n→ Membrana muscular, mais rígida\n→ Cresce APÓS o septum primum\n→ Do teto do átrio, à DIREITA do septum primum\n→ Forma o forame ovale (abertura funcional)\n\nForame Ovale:\n→ Permite shunt AD → AE na vida fetal\n→ Ao nascer: ↑ pressão no AE → fecha funcionalmente\n→ Fusão definitiva → fossa oval\n→ Falha no fechamento → CIA tipo ostium secundum\n\nTipos de CIA:\n→ Ostium secundum (mais comum, ~70%)\n→ Ostium primum\n→ Sinus venosus\n→ Forame ovale patente (FOP)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: I é falsa, não verdadeira\n❌ C e D: I é falsa, então não podem ser ambas verdadeiras\n\n💡 MACETE\nPrimum = primeiro, fino, membranoso\nSecundum = segundo, muscular, mais forte'},

{n:11,
disc:false,
tema:"Potencial de Ação Lento — NSA",
context:"(AFYA IPATINGA) O potencial de ação lento é crucial para o ritmo cardíaco, pois está diretamente envolvido na geração e condução dos impulsos elétricos responsáveis pela contração do coração. Tais eventos estão relacionados ao fluxo de íons e seus canais proteicos. Esse fenômeno é fundamental para a manutenção da frequência cardíaca normal e para a coordenação eficiente dos batimentos cardíacos.",
assertions:null,
text:"Sobre o potencial cardíaco em destaque, assinale a alternativa correta.",
opts:["O influxo de íons Ca²⁺ após o potencial marcapasso é responsável pela despolarização das células do Nó sinoatrial.", "Nesse potencial de ação, ocorrem as fases de despolarização, repolarização e hiperpolarização do nó sinusal e nó atrioventricular.", "Esse potencial de ação é caracterizado por uma despolarização inicial rápida devido ao influxo de íons potássio.", "Tal potencial de ação tem inicialmente uma despolarização gradual devido à entrada, de íons sódio seguido de efluxo de íons K⁺."],
g:0,
exp:'A despolarização nas células do nódulo sinoatrial (onde se origina o potencial marcapasso) é principalmente devido ao influxo de cálcio (Ca²⁺), após o início da despolarização gradual.\nNo potencial de ação do tipo lento, a despolarização não é rápida devido ao fluxo de potássio (K⁺). O potássio está mais envolvido na fase de repolarização do que na despolarização.\nA despolarização gradual no potencial cardíaco lento ocorre principalmente devido à entrada de sódio (Na⁺), mas o potássio (K⁺) não tem um papel ativo nesse processo de despolarização inicial. Apesar de importante, o efluxo de potássio ocorre durante a repolarização.\nAs fases de despolarização e repolarização ocorrem, o conceito de hiperpolarização não é tão evidente no potencial de ação do nódulo sinoatrial e nódulo atrioventricular como é em outros tipos de células. O que ocorre principalmente é uma repolarização, seguida de um novo ciclo de despolarização.\n1ª alternativa (528766): Incorreta.\nA despolarização inicial no potencial lento não é devida ao influxo de potássio; o potássio sai da célula durante a repolarização. O influxo inicial é de sódio e cálcio, não potássio.\n2ª alternativa (528767): Correta.\nApós a fase de marcapasso, a despolarização ocorre pela entrada de cálcio (Ca²⁺) via canais tipo L, característica marcante das células do NSA.\n3ª alternativa (528768): Incorreta.\nO início é de despolarização lenta sim, mas não ocorre efluxo de K⁺ imediatamente depois da entrada de Na⁺. A sequência correta envolve o aumento da permeabilidade ao Ca²⁺, seguido apenas depois pela saída de K⁺ na repolarização.\n4ª alternativa (528769): Incorreta.\nEmbora haja despolarização e repolarização, a fase de hiperpolarização típica do potencial de ação rápido não é proeminente no NSA e NAV. O potencial de ação lento não apresenta uma fase de hiperpolarização acentuada.',
deep:'⚡ POTENCIAL DE AÇÃO LENTO — NSA / NAV\n\nFase 4 — Potencial marcapasso (despolarização espontânea):\n→ Corrente funny (If) → entrada lenta de Na⁺\n→ Canais HCN → ativados por hiperpolarização\n→ Despolarização GRADUAL até o limiar\n\nFase 0 — Despolarização:\n→ Abertura de canais de Ca²⁺ tipo L (lentos)\n→ INFLUXO de Ca²⁺ → despolarização\n→ NÃO há canais rápidos de Na⁺ (diferença do PA rápido)\n→ Subida LENTA (não é spike rápido)\n\nFase 3 — Repolarização:\n→ Fechamento dos canais de Ca²⁺\n→ Abertura de canais de K⁺ → EFLUXO de K⁺\n→ Retorno ao potencial de repouso\n\nNÃO HÁ:\n→ Fase 1 (repolarização rápida inicial)\n→ Fase 2 (platô)\n→ Hiperpolarização proeminente\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: Não há hiperpolarização evidente no NSA/NAV\n❌ C: K⁺ não causa despolarização; sai na repolarização\n❌ D: Sequência errada; efluxo de K⁺ ocorre na fase 3, não logo após Na⁺\n\n💡 MACETE\nPA lento: "Ca²⁺ manda" (despolarização por cálcio)\nPA rápido: "Na⁺ manda" (despolarização por sódio)'},

{n:12,
disc:false,
tema:"Ciclo Cardíaco — Sons S1 e S2",
context:"(AFYA ITABUNA) Um paciente de 52 anos procura seu médico para a realização de um check-up. Durante a consulta, o médico realiza a ausculta cardíaca e explica que os sons do coração refletem os eventos mecânicos do ciclo cardíaco. Para auxiliar a compreensão do paciente, ele utiliza o Diagrama de Wiggers, que correlaciona as pressões nas câmaras cardíacas, os volumes ventriculares, os sons cardíacos e o eletrocardiograma (ECG) ao longo do ciclo.",
assertions:null,
text:"Com base nos conhecimentos sobre o ciclo cardíaco e o Diagrama de Wiggers, assinale a alternativa correta:",
opts:["O segundo som cardíaco (S2) ocorre durante a fase de contração isovolumétrica, antes da ejeção ventricular, refletindo a abertura das valvas semilunares.", "O primeiro som cardíaco (S1) é gerado pelo fechamento das valvas atrioventriculares (mitral e tricúspide) no início da sístole ventricular e coincide com o pico da onda R no ECG.", "O primeiro som cardíaco (S1) ocorre devido ao fechamento das valvas semilunares (aórtica e pulmonar) no início da diástole ventricular.", "O segundo som cardíaco (S2) é produzido pelo fechamento das valvas atrioventriculares (mitral e tricúspide) no início da sístole ventricular."],
g:1,
exp:'Justificativa:\nO som S1 ocorre no início da sístole ventricular e é causado pelo fechamento das valvas atrioventriculares (mitral e tricúspide), marcando a fase de contração isovolumétrica. Esse evento coincide com o pico da onda R no ECG, que representa a despolarização ventricular.\nO som S2 ocorre no final da sístole ventricular, quando há o fechamento das valvas semilunares (aórtica e pulmonar), marcando o início da diástole ventricular.\nAnálise das alternativas incorretas:\nA (Incorreta): O som S1 ocorre pelo fechamento das valvas atrioventriculares, não das semilunares.\nB (Incorreta): O som S2 está relacionado ao fechamento das valvas semilunares, não das atrioventriculares.\nD (Incorreta): O som S2 ocorre após a ejeção ventricular, não durante a contração isovolumétrica.',
deep:'🫀 SONS CARDÍACOS + DIAGRAMA DE WIGGERS\n\nS1 ("TUM") — Início da SÍSTOLE:\n→ Fechamento das valvas ATRIOVENTRICULARES\n→ Mitral (M1) + Tricúspide (T1)\n→ Coincide com onda R no ECG (despolarização ventricular)\n→ Marca início da contração isovolumétrica\n→ Som mais grave e prolongado\n\nS2 ("TÁ") — Início da DIÁSTOLE:\n→ Fechamento das valvas SEMILUNARES\n→ Aórtica (A2) + Pulmonar (P2)\n→ Coincide com final da onda T no ECG\n→ Marca início do relaxamento isovolumétrico\n→ Som mais agudo e breve\n\nSequência do ciclo:\n→ S1 → contração isovolumétrica → ejeção → S2 → relaxamento isovolumétrico → enchimento\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: S2 ocorre APÓS ejeção (não antes); fecha semilunares (não abre)\n❌ C: S1 = AV (não semilunares); início da sístole (não diástole)\n❌ D: S2 = semilunares (não AV); início da diástole (não sístole)\n\n💡 MACETE\nS1 = fecha o que está em cima do ventrículo (AV)\nS2 = fecha o que está na saída do ventrículo (SL)\nTUM-TÁ = sístole-diástole'},

{n:13,
disc:true,
tema:"Sistema Linfático — Linfa, Válvulas e Linfonodos",
context:"(FMIT) Durante uma consulta médica, um paciente relata inchaço persistente em uma das pernas, sem sinais aparentes de dor ou varizes. O médico suspeita de linfedema, uma condição associada ao comprometimento do sistema linfático. Ele explica que a linfa é um fluido derivado do líquido intersticial, formado quando parte do plasma extravasa dos capilares sanguíneos para os tecidos. Os vasos linfáticos, revestidos por endotélio especializado e dotados de válvulas drenam a linfa dos tecidos e a devolvem à circulação venosa. Além disso, os linfonodos, localizados ao longo desses vasos, tem papel crucial na depuração da circulação. atuam filtrando a linfa, removendo patógenos e células estranhas.\n\nCom base nas informações do texto, responda aos itens a seguir:\na) Explique o processo de formação da linfa a partir do líquido intersticial, mencionando os mecanismos fisiológicos envolvidos na sua produção e composição.\nb) Analise o papel das válvulas dos vasos linfáticos na fisiologia da circulação da linfa e justifique sua importância clínica\nc) De acordo com o texto, qual a função dos linfonodos e dos linfócitos na defesa imunológica durante a passagem da linfa pelo sistema linfático?",
assertions:null,
text:"Responda às questões a, b e c acima.",
opts:[],
g:null,
exp:'Comentários:\nA) A linfa é formada quando parte do plasma extravasa dos capilares para o espaço intersticial, carregando proteínas, lipídios, resíduos celulares e linfócitos. Portanto esse fluido contém proteínas, lipídios, resíduos celulares e células imunológicas, como linfócitos.\nB) As válvulas dos vasos linfáticos garantem a circulação unidirecional da linfa, impedindo o refluxo garantindo seu deslocamento em direção ao sistema venoso, mesmo na ausência de uma bomba propulsora como o coração. . A circulação ocorre de forma lenta e é impulsionada pela contração dos músculos esqueléticos.\nC) Correto: Os linfonodos filtram a linfa, removendo patógenos e partículas estranhas, enquanto os linfócitos presentes atuam na defesa imunológica.',
deep:'🩵 SISTEMA LINFÁTICO — REVISÃO COMPLETA\n\na) FORMAÇÃO DA LINFA:\n→ Plasma extravasa dos capilares → espaço intersticial\n→ Força motriz: pressão hidrostática capilar > pressão coloidosmótica\n→ ~3 L/dia são drenados pelo sistema linfático\n→ Composição: proteínas, lipídios, resíduos celulares, linfócitos\n→ No intestino: linfa = QUILO (rica em quilomícrons)\n\nb) VÁLVULAS LINFÁTICAS:\n→ Garantem fluxo UNIDIRECIONAL (tecidos → sangue venoso)\n→ Sem bomba central → dependem de:\n   Contração muscular esquelética\n   Pulsação arterial adjacente\n   Movimentos respiratórios\n→ Clínica: disfunção das válvulas → linfedema\n\nc) LINFONODOS + LINFÓCITOS:\n→ Linfonodos = filtros ao longo dos vasos linfáticos\n→ Removem patógenos, células estranhas, debris\n→ Linfócitos B → anticorpos\n→ Linfócitos T → resposta celular\n→ Macrófagos → fagocitose\n→ Linfonodos sentinela: primeiro a drenar região tumoral\n\n💡 MACETE\nLinfa = plasma filtrado + células imunes\nVálvulas = sentido único (sem coração linfático)\nLinfonodos = postos de fiscalização do corpo'},

{n:14,
disc:false,
tema:"Organelas Celulares — Assertivas",
context:"(UNIDOMPEDRO) Durante uma aula prática de biologia celular, os alunos analisam ao microscópio óptico diferentes tipos de células eucarióticas animais. Enquanto discutem suas observações, levantam algumas afirmações sobre a estrutura e função das organelas celulares.\n\nAnalise as afirmações feitas pelos alunos:",
assertions:"I. As mitocôndrias possuem DNA próprio e ribossomos, permitindo a síntese de algumas de suas proteínas. No entanto, sua replicação e funcionamento dependem parcialmente de proteínas codificadas pelo genoma nuclear.\nII. O transporte vesicular dentro da célula é mediado por proteínas motoras associadas ao citoesqueleto, como a dineína e a cinesina, que se movem ao longo de microtúbulos utilizando ATP como fonte de energia.\nIII. O nucléolo, uma estrutura densa presente no interior do núcleo, é o local onde ocorre a transcrição do DNA para formar RNA mensageiro (mRNA), que será posteriormente traduzido em proteínas no citoplasma.\nIV. O complexo de Golgi desempenha papel essencial na modificação pós-traducional de proteínas, incluindo a glicosilação, sulfatação e fosforilação, preparando-as para sua função final ou direcionamento para compartimentos celulares específicos.",
text:"Marque a alternativa que contém todas as assertivas corretas:",
opts:["Apenas I e IV.", "Apenas I, II e IV.", "Apenas I, II e III.", "Apenas II, III e IV."],
g:1,
exp:'I. Correta. As mitocôndrias possuem DNA próprio e ribossomos, permitindo a síntese de algumas de suas proteínas. No entanto, muitas proteínas mitocondriais são codificadas pelo DNA nuclear e importadas do citoplasma. A presença de um sistema de transcrição e tradução independente reforça a teoria da endossimbiose, mas a mitocôndria não é totalmente autônoma.\n(Referência: ALBERTS et al., 2011; JUNQUEIRA & CARNEIRO, 2013)\nII. Correta. O transporte vesicular depende do citoesqueleto e de proteínas motoras. Os microtúbulos servem de trilhos para vesículas, enquanto a dineína e a cinesina movem essas estruturas em direções opostas utilizando ATP. Esse mecanismo é fundamental para a distribuição intracelular de organelas e vesículas secretoras.\n(Referência: ALBERTS et al., 2011; JUNQUEIRA & CARNEIRO, 2013)\nIII. Incorreta. O nucléolo é especializado na síntese de RNA ribossomal (rRNA) e na montagem inicial dos ribossomos, mas não é o local da transcrição do mRNA. A transcrição do mRNA ocorre no núcleo, mas fora do nucléolo, pela RNA polimerase II.\n(Referência: ALBERTS et al., 2011; JUNQUEIRA & CARNEIRO, 2013)\nIV. Correta. O complexo de Golgi modifica proteínas por processos como glicosilação, sulfatação e fosforilação, garantindo sua destinação correta. Essa organela é essencial para o processamento e endereçamento de proteínas dentro da célula.\n(Referência: JUNQUEIRA & CARNEIRO, 2013; ALBERTS et al., 2011)',
deep:'🔬 ORGANELAS CELULARES — ANÁLISE DAS ASSERTIVAS\n\nI ✅ Mitocôndrias:\n→ DNA circular próprio (mtDNA) + ribossomos 70S\n→ Sintetizam ~13 proteínas (cadeia respiratória)\n→ Maioria das proteínas mitocondriais → codificadas no NÚCLEO\n→ Teoria da endossimbiose: ancestral procariótico\n→ Semi-autônomas (dependem do genoma nuclear)\n\nII ✅ Transporte Vesicular:\n→ Trilhos = MICROTÚBULOS\n→ Cinesina → movimento ANTERÓGRADO (centro → periferia, extremidade +)\n→ Dineína → movimento RETRÓGRADO (periferia → centro, extremidade −)\n→ Energia: ATP (hidrólise)\n→ Transportam vesículas, organelas, neurotransmissores\n\nIII ❌ Nucléolo:\n→ Produz rRNA (ribossomal), NÃO mRNA\n→ Montagem inicial dos ribossomos\n→ RNA pol I transcreve rRNA (no nucléolo)\n→ RNA pol II transcreve mRNA (FORA do nucléolo, no nucleoplasma)\n→ Erro da assertiva: confundiu rRNA com mRNA\n\nIV ✅ Complexo de Golgi:\n→ Modificações pós-traducionais: glicosilação, sulfatação, fosforilação\n→ Empacotamento e endereçamento de proteínas\n→ Face CIS (recebe do RER) → face TRANS (libera vesículas)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Exclui II (que é correta)\n❌ C e D: Incluem III (que é incorreta)\n\n💡 MACETE\nNucléolo = fábrica de RIBOSSOMOS (rRNA), não de mRNA\nCinesina = Caminha para fora (+) | Dineína = Desce para dentro (−)'},

{n:15,
disc:false,
tema:"Hemostasia — Primária e Secundária",
context:"(UNIDOMPEDRO) Um paciente comparece à Unidade Básica de Saúde (UBS) após sofrer um corte superficial na mão enquanto manuseava uma faca de cozinha. No atendimento, observa-se que o sangramento cessou espontaneamente em poucos minutos, sem necessidade de intervenção externa. O médico aproveita a oportunidade para explicar ao paciente os mecanismos envolvidos na hemostasia, destacando a atuação coordenada dos processos primário, secundário e terciário na contenção da hemorragia.",
assertions:"Asserção: A hemostasia primária envolve a adesão e agregação plaquetária no local da lesão, formando um tampão hemostático inicial.\nRazão: Esse tampão plaquetário é estabilizado pela conversão de fibrinogênio em fibrina, processo dependente da cascata de coagulação na hemostasia secundária.",
text:"Com base nessas afirmações, assinale a alternativa correta:",
opts:["As duas asserções são verdadeiras, mas a razão não justifica a asserção.", "As duas asserções são verdadeiras, e a razão justifica a asserção.", "A asserção é falsa, mas a razão é verdadeira.", "A asserção é verdadeira, mas a razão é falsa."],
g:1,
exp:'Resposta CORRETA:\nAs duas asserções são verdadeiras, e a razão justifica a asserção.\nJUSTIFICATIVAS\nAs duas asserções são verdadeiras, e a razão justifica a asserção.\nA asserção é verdadeira porque a hemostasia primária consiste na adesão e agregação das plaquetas ao endotélio vascular lesionado, formando um tampão plaquetário inicial.\nA razão justifica a asserção porque o tampão plaquetário formado na hemostasia primária é posteriormente estabilizado pela conversão de fibrinogênio em fibrina, um processo mediado pela cascata de coagulação na hemostasia secundária. Assim, a afirmação e a justificativa estão corretas e coerentes.\nAs duas asserções são verdadeiras, mas a razão não justifica a asserção.\nA asserção é verdadeira, pois descreve corretamente o processo de hemostasia primária.\nA razão também é verdadeira, pois descreve o papel da fibrina na estabilização do tampão plaquetário.\nNo entanto, essa alternativa está incorreta, pois a razão justifica a asserção: a formação de fibrina, mencionada na razão, ocorre como parte da hemostasia secundária, cuja função é fortalecer o tampão plaquetário da hemostasia primária.\nA asserção é verdadeira, mas a razão é falsa.\nA asserção é verdadeira porque descreve corretamente a hemostasia primária.\nA razão, no entanto, não é falsa, pois descreve corretamente a conversão do fibrinogênio em fibrina na hemostasia secundária.\nAssim, essa alternativa está incorreta, pois ambas as afirmações estão corretas.\nA asserção é falsa, mas a razão é verdadeira.\nA asserção não é falsa, pois a agregação plaquetária de fato ocorre na hemostasia primária.\nA razão é verdadeira porque descreve corretamente o papel da fibrina na estabilização do tampão hemostático.\nComo a asserção está correta, essa alternativa é inválida.',
deep:'🩹 HEMOSTASIA — ETAPAS COMPLETAS\n\nHemostasia PRIMÁRIA:\n→ Lesão endotelial → exposição do colágeno subendotelial\n→ Adesão plaquetária via fator de von Willebrand (FvW)\n→ Ativação → mudança de forma + liberação de grânulos\n→ Agregação → tampão plaquetário INICIAL (instável)\n→ Mediadores: TXA2, ADP, serotonina\n\nHemostasia SECUNDÁRIA (cascata de coagulação):\n→ Via intrínseca (contato) + via extrínseca (fator tecidual)\n→ Via comum → trombina\n→ Trombina converte fibrinogênio → FIBRINA\n→ Fibrina estabiliza o tampão plaquetário\n→ Fator XIII → ligações cruzadas na fibrina (coágulo firme)\n\nHemostasia TERCIÁRIA (fibrinólise):\n→ Plasmina degrada a fibrina → dissolve o coágulo\n→ Ocorre após reparação tecidual\n\nAsserção ✅ → hemostasia primária = tampão plaquetário\nRazão ✅ → hemostasia secundária estabiliza com fibrina\nRazão JUSTIFICA → a fibrina completa/fortalece o tampão primário\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: A razão SIM justifica (mecanismo de estabilização)\n❌ C: A asserção é verdadeira (hemostasia primária correta)\n❌ D: A razão é verdadeira (fibrina = hemostasia secundária)\n\n💡 MACETE\nPrimária = plaquetas (tampão frouxo)\nSecundária = fibrina (tampão firme)\nTerciária = fibrinólise (limpeza)'}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
