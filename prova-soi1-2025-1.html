<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

{n:1,disc:false,tema:"Hemostasia — Mecanismos Fisiológicos",
context:"(UNISL JI-PARANÁ) Uma criança de 5 anos faz um pequeno corte em sua mão com a tesoura e o sangramento é imediato. A mãe, assustada, logo leva a criança ao pronto-socorro. Ao chegar ao pronto-socorro, ela percebe que o sangramento começa a diminuir significativamente. Então, o médico explica que a interrupção progressiva do sangramento ocorre devido a um conjunto de mecanismos fisiológicos que garantem a hemostasia.\n\nCom base nesse contexto, analise as afirmações a seguir:",
assertions:"I - No caso descrito acima, a hemostasia é um processo fisiológico suficiente para controlar o sangramento. Esse mecanismo ocorre por meio de três etapas principais: espasmo vascular, formação do tampão plaquetário e coagulação sanguínea.\nPorque\nII - O espasmo vascular reduz temporariamente o fluxo sanguíneo no local da lesão, a formação do tampão plaquetário sela a ruptura vascular e a coagulação sanguínea reforça esse tampão com uma rede de fibrina estabilizadora.",
text:"Acerca dessas afirmações, assinale a opção correta.",
opts:["A asserção I é verdadeira e a asserção II é falsa.","As asserções I e II são verdadeiras, mas a asserção II não justifica corretamente a asserção I.","As asserções I e II são verdadeiras, e a asserção II justifica corretamente a asserção I.","A asserção I é falsa e a asserção II é verdadeira."],
g:2,
exp:'Alternativa correta: As asserções I e II são verdadeiras, e a asserção II justifica corretamente a asserção I.\n\nA primeira afirmação está correta, pois a hemostasia é o conjunto de processos fisiológicos que evitam a perda excessiva de sangue após uma lesão vascular, sendo capaz de prevenir a hemorragia de vasos sanguíneos menores. Ela ocorre por meio de três mecanismos principais:\n1. Espasmo vascular — Contração do músculo liso da parede do vaso lesionado, reduzindo temporariamente o fluxo sanguíneo.\n2. Formação do tampão plaquetário — As plaquetas se aderem à superfície exposta do vaso e agregam-se para formar um tampão que sela a lesão.\n3. Coagulação sanguínea — Formação de uma rede de fibrina que estabiliza o tampão plaquetário, impedindo a perda sanguínea contínua.\nA segunda afirmação também é verdadeira, pois descreve corretamente o papel de cada um desses mecanismos na redução da perda sanguínea. Além disso, ela justifica corretamente a primeira afirmação, explicando como cada mecanismo contribui para o processo hemostático.\n\nAlternativa incorreta: "As asserções I e II são verdadeiras, mas a asserção II não justifica corretamente a asserção I." — A segunda afirmação não apenas é verdadeira, mas também explica como os mecanismos atuam para reduzir a perda sanguínea, justificando corretamente a primeira afirmação.\nAlternativa incorreta: "A asserção I é verdadeira e a asserção II é falsa." — A segunda afirmação está correta, pois descreve corretamente os três mecanismos da hemostasia.\nAlternativa incorreta: "A asserção I é falsa e a asserção II é verdadeira." — A primeira afirmação está correta, pois a hemostasia realmente ocorre pelos três mecanismos mencionados.\n\nReferência: TORTORA, Gerard J.; DERRICKSON, Bryan. Princípios de anatomia e fisiologia. 14. ed. Rio de Janeiro: Guanabara Koogan, 2019.',
deep:'🩹 HEMOSTASIA — TRÊS ETAPAS\n\n1. ESPASMO VASCULAR:\n→ Contração imediata do músculo liso vascular\n→ Reduz temporariamente o fluxo sanguíneo\n→ Mecanismo mais rápido (segundos)\n\n2. TAMPÃO PLAQUETÁRIO (Hemostasia Primária):\n→ Exposição do colágeno → adesão via FvW\n→ Ativação → liberação de ADP, TXA2, serotonina\n→ Agregação → tampão FROUXO (instável)\n\n3. COAGULAÇÃO (Hemostasia Secundária):\n→ Cascata de coagulação → trombina → fibrina\n→ Rede de fibrina estabiliza o tampão plaquetário\n→ Tampão FIRME e definitivo\n\nI ✅ — três etapas corretas\nII ✅ — descreve corretamente cada mecanismo\nII JUSTIFICA I ✅ — explica como cada etapa atua\n\n💡 MACETE\nEspasmo → Plaqueta → Fibrina\n(Rápido → Primário → Secundário)'},

{n:2,disc:true,tema:"Histologia Cardíaca — Camadas da Parede",
context:"(AFYA ITABUNA) Durante uma aula prática de histologia, os estudantes do curso de medicina estão analisando um corte histológico do coração. O professor orienta os alunos a observarem as diferentes camadas que compõem a parede cardíaca, destacando suas características histológicas.\n\nSabendo que o coração é um órgão muscular que se contrai ritmicamente para bombear o sangue pelo sistema circulatório. Com base na análise microscópica e nos conhecimentos adquiridos, responda às questões a seguir.\n\na) Descreva a constituição histológica das três camadas do coração (endocárdio, miocárdio e epicárdio), destacando os tipos celulares predominantes e suas funções.\n\nb) Explique como a presença de discos intercalares e a alta densidade de mitocôndrias no miocárdio contribuem para a eficiência e a continuidade da atividade contrátil do coração.",
assertions:null,
text:"Responda às questões a) e b) acima.",
opts:[],g:null,
exp:'Resposta da questão a:\nNa parede do coração, a organização e a composição tecidual destas túnicas — o endocárdio, o miocárdio e o epicárdio — são modificadas de modo a refletir a função principal do coração como uma bomba muscular de quatro câmaras.\nA primeira camada, a mais interna, é o endocárdio, formado por um endotélio do tipo epitélio simples pavimentoso e pelo tecido conjuntivo subendotelial, que tem como função revestir o lúmen do coração. O endocárdio é contínuo com a túnica íntima dos vasos sanguíneos. Sua função principal é reduzir o atrito entre o sangue e a parede do coração, garantindo um fluxo eficiente. O endocárdio também contém pequenas fibras de Purkinje na região subendocárdica, que fazem parte do sistema de condução cardíaco.\nA camada intermediária é o miocárdio, muito importante do ponto de vista fisiológico no que concerne à transmissão do impulso nervoso. O miocárdio é a mais espessa das três camadas do coração, formada por células musculares estriadas cardíacas. Tais células musculares estriadas cardíacas são importantes no que concerne à fixação do miocárdio ao esqueleto fibroso do coração. Os miócitos cardíacos possuem discos intercalares que facilitam a transmissão do impulso elétrico e sincronizam a contração do coração. O miocárdio é responsável pela geração da força necessária para bombear o sangue para a circulação sistêmica e pulmonar.\nO epicárdio é a camada mais externa do coração, também é denominado camada visceral do pericárdio, constituído por um epitélio simples pavimentoso, denominado mesotélio. Além disso, essa é a região em que a gordura é armazenada na superfície do coração. O epicárdio permite a lubrificação do coração, reduzindo o atrito durante os batimentos cardíacos. Há também as raízes dos vasos que entram e saem do coração, onde há a formação do pericárdio, que é dividido em fibroso e seroso.\n\nResposta da questão b:\nO miocárdio é fundamental para a contração do coração, garantindo que o sangue seja impulsionado para os pulmões e para o resto do corpo. A sua estrutura muscular é altamente especializada, com miócitos interconectados por discos intercalares, que contêm junções comunicantes (gap junctions). Essas junções permitem a propagação rápida do potencial de ação, sincronizando as contrações dos cardiomiócitos.\nAlém disso, a presença de mitocôndrias abundantes nos miócitos cardíacos garante um suprimento energético contínuo, essencial para a contração rítmica do coração ao longo da vida. Essa adaptação é necessária para manter a resistência do tecido e evitar a fadiga muscular, já que o coração trabalha ininterruptamente.\n\nReferências: JUNQUEIRA, L. C.; CARNEIRO, J. Histologia Básica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2023. OVALLE, W. Netter Bases da Histologia. 2. ed. Rio de Janeiro: GEN Guanabara Koogan, 2014. PAWLINA, W. Ross Histologia. 8. ed. Rio de Janeiro: Guanabara Koogan, 2021.',
deep:'🫀 CAMADAS DA PAREDE CARDÍACA\n\nENDOCÁRDIO (camada INTERNA):\n→ Endotélio (epitélio pavimentoso simples)\n→ TC subendotelial (colágeno + elástico)\n→ Fibras de Purkinje (subendocárdica)\n→ Função: revestimento + condução elétrica + fluxo sem atrito\n\nMIOCÁRDIO (camada MÉDIA — mais espessa):\n→ Músculo estriado cardíaco (miócitos)\n→ Discos intercalares:\n   Gap junctions → propagação rápida do PA\n   Desmossomos → adesão mecânica\n→ Mitocôndrias abundantes → ATP contínuo\n→ Função: CONTRAÇÃO = bombeamento\n\nEPICÁRDIO (camada EXTERNA):\n→ Mesotélio (epitélio pavimentoso simples)\n→ TC + vasos + nervos + tecido adiposo\n→ = Pericárdio VISCERAL\n→ Função: proteção + lubrificação\n\n💡 MACETE\nEndo-Mio-Epi: de dentro para fora\nDisco intercalar = sincício funcional (coração age como um só)'},

{n:3,disc:false,tema:"Sistema Complemento — Via Alternativa",
context:"(UNIGRANRIO BARRA) Um trabalhador rural, de 45 anos, foi admitido na emergência com uma infecção grave no braço após sofrer um corte profundo ao manusear ferramentas agrícolas há dois dias. No exame físico, apresentava edema, calor, eritema e febre alta. Exames laboratoriais revelaram leucocitose com predomínio de neutrófilos e elevação de proteínas de fase aguda.\n\nSabendo que a resposta imune inata e o sistema complemento desempenham um papel essencial no controle da infecção, qual das alternativas melhor explica sua atuação no caso deste paciente?",
assertions:null,
text:"Qual das alternativas melhor explica a atuação do sistema complemento neste caso?",
opts:["A ativação da via clássica do complemento foi fundamental neste caso, pois os anticorpos pré-existentes contra o patógeno facilitaram a sua opsonização pelo C3b, recrutamento de neutrófilos pelo C5a e a destruição bacteriana pelo complexo de ataque à membrana.","A resposta imune inata envolveu a ativação da via lectina do complemento, que reconhece padrões moleculares específicos do patógeno, levando à produção de anticorpos para opsonização da bactéria e sua posterior eliminação, promovida pelo complexo de ataque à membrana.","A via alternativa do complemento foi ativada pela presença de componentes da parede bacteriana no local da lesão, podendo resultar no recrutamento de neutrófilos pelo C5a e na lise do patógeno pelo complexo de ataque à membrana.","A ativação da via clássica do complemento, através da presença de componentes da parede bacteriana no local da lesão, foi responsável por aumentar a permeabilidade vascular e recrutar neutrófilos pelo C5a para o local da infecção."],
g:2,
exp:'Alternativa correta: A via alternativa do complemento foi ativada pela presença de componentes da parede bacteriana no local da lesão, podendo resultar no recrutamento de neutrófilos pelo C5a e na lise do patógeno pelo complexo de ataque à membrana.\n\nA via alternativa é ativada diretamente pela presença de componentes da parede bacteriana, como peptidoglicanos e lipopolissacarídeos. No cenário apresentado, essa via seria a principal ativada, já que a resposta imune inata é mais rápida e não depende de anticorpos. A ativação da via alternativa leva à formação do complexo de ataque à membrana (MAC), que pode causar lise do patógeno, além de C3b e C5a que promovem opsonização e recrutamento de neutrófilos.\n\nAlternativa A incorreta: A via clássica depende de anticorpos pré-existentes contra o patógeno. No caso descrito, o paciente apresenta uma infecção aguda e provavelmente não possui anticorpos pré-existentes.\nAlternativa B incorreta: A via lectina não está envolvida diretamente na produção de anticorpos. A produção de anticorpos é uma função da resposta imune adaptativa.\nAlternativa D incorreta: A via clássica não é ativada diretamente por componentes da parede bacteriana, mas por anticorpos IgG ou IgM.\n\nReferência: ABBAS, Abul K. Imunologia celular e molecular. 9. ed. Rio de Janeiro: Guanabara Koogan, 2022.',
deep:'🛡️ SISTEMA COMPLEMENTO — TRÊS VIAS\n\nVia CLÁSSICA:\n→ Ativada por: anticorpos (IgG, IgM) ligados ao antígeno\n→ Depende da resposta ADAPTATIVA (anticorpos)\n→ C1 → C4 → C2 → C3 → C5 → MAC\n\nVia LECTINA (MBL):\n→ Ativada por: MBL ligada a manose bacteriana\n→ Independe de anticorpos\n→ Mesma via que a clássica a partir do C4\n\nVia ALTERNATIVA ✅ (caso desta questão):\n→ Ativada por: componentes da parede bacteriana\n   (LPS, peptidoglicano, ácido teicoico)\n→ NÃO depende de anticorpos\n→ Primeira linha de defesa inata\n→ C3 → C3b (opsonização) + C5a (quimiotaxia neutrófilos) + MAC (lise)\n\nEFEITOS DO COMPLEMENTO:\n→ C3b: opsonização (fagocitose)\n→ C5a: quimiotaxia + anafilaxia\n→ MAC (C5b-9): lise bacteriana\n→ C3a/C5a: anafilatoxinas (↑ permeabilidade vascular)\n\n💡 MACETE\nInfecção aguda sem anticorpos prévios = Via ALTERNATIVA\nAlternativa = ativada diretamente pela bactéria'},

{n:4,disc:true,tema:"Órgãos Linfoides — Timo, Baço e Tonsilas",
context:"(FESAR) Durante uma aula de anatomia e histologia, um professor explica que os órgãos linfoides desempenham papéis essenciais na defesa do organismo. Considerando esse contexto e a morfofisiologia do sistema linfático, responda aos seguintes subitens.",
assertions:null,
text:"a) Sobre o timo, identifique sua localização anatômica e cite uma função essencial desse órgão.\n\nb) Explique o papel do baço na filtragem do sangue e sua participação na resposta imune, correlacionando esse papel com sua organização histológica.\n\nc) Relacione a função das tonsilas no combate a microrganismos com suas principais características anatômicas e histológicas.",
opts:[],g:null,
exp:'a) O timo é um órgão linfoide primário situado no mediastino anterior, entre o esterno e a aorta, e tem função relacionada à maturação dos linfócitos T.\n\nb) O baço é um órgão linfoide secundário responsável por filtrar o sangue, removendo eritrócitos envelhecidos e patógenos. Histologicamente, apresenta duas regiões: a polpa branca, rica em linfócitos, envolvida na resposta imune adaptativa, e a polpa vermelha, onde ocorre a fagocitose de células sanguíneas velhas e a reciclagem de ferro. A organização dessas polpas permite que o baço atue tanto como um filtro sanguíneo quanto como um gerador de resposta imune.\n\nc) As tonsilas (palatinas, linguais e faríngeas) formam um anel de tecido linfoide ao redor da faringe, atuando como uma primeira linha de defesa contra microrganismos inalados ou ingeridos. Histologicamente, possuem criptas que aumentam a superfície de contato com antígenos.\n\nReferência: TORTORA, Gerard J.; DERRICKSON, Bryan. Princípios de Anatomia e Fisiologia. 16. ed. Rio de Janeiro: Guanabara Koogan, 2023.',
deep:'🫁 ÓRGÃOS LINFOIDES — REVISÃO RÁPIDA\n\nTIMO (Primário):\n→ Localização: mediastino anterior (esterno + aorta)\n→ Córtex: timócitos imaturos + células reticulares epiteliais\n→ Medula: linfócitos T maduros + corpúsculos de Hassall\n→ Função: MATURAÇÃO dos linfócitos T\n→ Involui com a idade\n\nBAÇO (Secundário):\n→ Polpa BRANCA: linfócitos T e B → resposta imune\n→ Polpa VERMELHA: sinusoides + macrófagos → filtra sangue\n→ Hemocaterese: destruição de hemácias velhas\n→ Reciclagem de ferro da hemoglobina\n\nTONSILAS (Secundário):\n→ Anel de Waldeyer: palatinas + faríngea + linguais\n→ Criptas: aumentam superfície de contato com antígenos\n→ Epitélio pavimentoso estratificado (palatinas)\n→ 1ª linha de defesa das vias aéreas/digestivas\n\n💡 MACETE\nTimo = T de T-linfócito (maturação)\nBaço = filtra SANGUE\nLinfonodo = filtra LINFA\nTonsila = guarda a ENTRADA (boca/faringe)'},

{n:5,disc:false,tema:"Ciclo Cardíaco — Sons Cardíacos",
context:"(AFYA ITACOATIARA) Uma paciente, de 45 anos, procura seu médico para um check-up de rotina. Durante a consulta, o médico realiza a ausculta cardíaca e explica à paciente que os sons que ele ouve correspondem a eventos mecânicos específicos do ciclo cardíaco. Para ilustrar melhor, ele utiliza o Diagrama de Wiggers.\n\nQual dos seguintes eventos mecânicos está associado ao primeiro som cardíaco (S1), também conhecido como \"lub\"?",
assertions:null,
text:"Qual dos seguintes eventos mecânicos está associado ao primeiro som cardíaco (S1), também conhecido como \"lub\"?",
opts:["Abertura das válvulas semilunares.","Abertura das válvulas atrioventriculares.","Fechamento das válvulas semilunares.","Fechamento das válvulas atrioventriculares."],
g:3,
exp:'Alternativa correta: Fechamento das válvulas atrioventriculares.\n\nO primeiro som cardíaco (S1 ou "lub") ocorre durante o início da sístole ventricular e é causado pelo fechamento das válvulas atrioventriculares (mitral e tricúspide). Esse fechamento impede o refluxo de sangue dos ventrículos para os átrios.\n\nAlternativas incorretas:\n— Abertura das válvulas atrioventriculares: ocorre durante a diástole ventricular e não está associada ao S1.\n— Abertura das válvulas semilunares: ocorre durante a sístole ventricular, mas não é o evento que causa o S1.\n— Fechamento das válvulas semilunares: ocorre durante o início da diástole ventricular e é responsável pelo segundo som cardíaco (S2 ou "dub").\n\nReferência: TORTORA, Gerard J.; DERRICKSON, Bryan. Princípios de anatomia e fisiologia. 14. ed. Rio de Janeiro: Guanabara Koogan, 2016.',
deep:'🫀 SONS CARDÍACOS — DIAGRAMA DE WIGGERS\n\nS1 — "LUB" (1º som):\n→ FECHAMENTO das válvulas ATRIOVENTRICULARES\n→ Mitral (bicúspide) + Tricúspide\n→ Marca o INÍCIO da sístole ventricular\n→ Mais grave e prolongado\n\nS2 — "DUB" (2º som):\n→ FECHAMENTO das válvulas SEMILUNARES\n→ Aórtica + Pulmonar\n→ Marca o INÍCIO da diástole ventricular\n→ Mais agudo e curto\n\nS3 (patológico em adultos):\n→ Enchimento rápido ventricular na diástole\n→ "Galope" → IC\n\nS4 (patológico):\n→ Contração atrial forçada\n→ Ventrículo não complacente (HVE)\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Abertura semilunares = sístole (sem som audível normal)\n❌ B: Abertura AV = diástole (sem som audível normal)\n❌ C: Fechamento semilunares = S2, não S1\n\n💡 MACETE\nS1 = fecha AV (lub) = começa sístole\nS2 = fecha semilunar (dub) = começa diástole'},

{n:6,disc:false,tema:"Adaptações Cardiovasculares ao Exercício",
context:"(AFYA PARAÍBA) Uma equipe de atletas amadores decidiu intensificar o treino para participar de uma maratona que ocorrerá dentro de três meses. Durante uma consulta com um fisiologista do esporte, foram discutidas as adaptações morfofisiológicas decorrentes do treino intenso e regular, e o fisiologista deu explicações. Considerando as explicações do fisiologista, avalie as seguintes asserções e a relação proposta entre elas.",
assertions:"I - O treino aeróbico intenso e contínuo promove aumento do volume sistólico e redução da frequência cardíaca de repouso.\nPorque\nII - O coração se adapta ao treino aeróbico, aumentando a sua capacidade de ejeção de sangue por batimento e melhorando a eficiência da circulação sanguínea.",
text:"A respeito dessas asserções, assinale a opção correta.",
opts:["As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa da I.","As asserções I e II são proposições verdadeiras e a II é uma justificativa da I.","A asserção I é uma proposição verdadeira e a II é uma proposição falsa.","A asserção I é uma proposição falsa e a II é uma proposição verdadeira."],
g:1,
exp:'Resposta correta: As asserções I e II são proposições verdadeiras e a II é uma justificativa da I.\n\nO treino aeróbico regular leva a adaptações cardiovasculares, como o aumento do volume sistólico devido à hipertrofia do ventrículo esquerdo e ao aumento da capacidade de enchimento cardíaco. Como resultado, a frequência cardíaca de repouso diminui, pois o coração se torna mais eficiente, necessitando de menos batimentos para bombear a mesma quantidade de sangue.\n\nReferência: COSTANZO, L.S. Fisiologia. 7. ed. Rio de Janeiro: Guanabara Koogan, 2024.',
deep:'🏃 CORAÇÃO DO ATLETA — ADAPTAÇÕES\n\nDébito Cardíaco (DC) = VS × FC\n\nHipertrofia fisiológica EXCÊNTRICA do VE:\n→ ↑ volume da câmara → ↑ Volume Sistólico\n→ Mecanismo de Frank-Starling ampliado\n\nConsequências:\n→ ↑ VS em repouso E exercício\n→ ↓ FC em repouso (bradicardia fisiológica, 40-60 bpm)\n→ DC de repouso = IGUAL ao sedentário\n→ DC no exercício máximo = MUITO MAIOR (até 40 L/min)\n\nI ✅ — ↑ VS + ↓ FC repouso (verdadeiro)\nII ✅ — coração ejeta mais por batimento (verdadeiro)\nII JUSTIFICA I — mecanismo que explica a asserção I\n\n💡 MACETE\nAtleta: coração grande e lento em repouso\nSedentário: coração pequeno e rápido em repouso\nAmbos têm DC de repouso semelhante'},

{n:7,disc:false,tema:"Leucócitos — Associação Célula-Função",
context:"(UNIREDENTOR) Em uma aula prática de Fisiologia, o professor explica que o sangue é um tecido complexo, composto por diferentes tipos de células, cada qual com um papel crucial na homeostase do organismo. Os eritrócitos, ou glóbulos vermelhos, são especializados no transporte de gases respiratórios, enquanto os leucócitos, ou glóbulos brancos, atuam na defesa imunológica, reconhecendo e combatendo agentes patogênicos.\n\nCom relação aos leucócitos, o professor montou uma tabela e pediu para os alunos fazerem a associação correta entre a célula e sua respectiva função:\n\n1. Neutrófilo — A. Célula fagocitária, que migra para o tecido e se diferencia em macrófago\n2. Basófilo — B. É o leucócito mais abundante no sangue periférico e atua na fagocitose de bactérias\n3. Monócito — C. Envolvido na resposta imune adaptativa, pode ser principalmente de dois tipos\n4. Eosinófilo — D. Célula especializada na resposta imune contra agentes parasitários\n5. Linfócito — E. Possui em seu citoplasma grânulos basofílicos ricos em mediadores das reações alérgicas",
assertions:null,
text:"Qual alternativa abaixo possui a associação correta, esperada pelo professor?",
opts:["1-C; 2-E; 3-B; 4-A; 5-D.","1-D; 2-B; 3-C; 4-E; 5-A.","1-B; 2-E; 3-A; 4-D; 5-C.","1-E; 2-A; 3-D; 4-C; 5-B."],
g:2,
exp:'Resposta correta: 1-B; 2-E; 3-A; 4-D; 5-C.\n\nO neutrófilo (1-B) é o leucócito mais abundante no sangue (47 a 67%) e atua na fagocitose e destruição principalmente de bactérias.\nO basófilo (2-E) possui em seu citoplasma grânulos basofílicos grosseiros, ricos em mediadores das reações alérgicas, como a histamina.\nO monócito (3-A) é um fagócito que, após migrar do sistema circulatório, transforma-se em macrófago. Atua também como célula apresentadora de antígenos.\nO eosinófilo (4-D) apresenta núcleo bilobulado e grânulos específicos eosinofílicos, contendo proteínas citotóxicas para protozoários e helmintos.\nOs linfócitos (5-C) são as principais células funcionais do sistema imune adaptativo. Existem dois tipos principais: linfócitos T (imunidade celular) e linfócitos B (produção de anticorpos).\n\nAlternativa A incorreta: Neutrófilo não produz anticorpos; monócito não é o mais abundante.\nAlternativa B incorreta: Neutrófilo não combate vermes; basófilo não é fagócito de bactérias.\nAlternativa D incorreta: Neutrófilo não tem grânulos de histamina; basófilo não vira macrófago.\n\nReferências: PAWLINA, W. Ross Histologia. 8. ed. Rio de Janeiro: Guanabara Koogan, 2021. ABBAS, A. K. Imunologia Celular e Molecular. 10. ed. Rio de Janeiro: GEN Guanabara Koogan, 2023.',
deep:'🔬 LEUCÓCITOS — COMPARATIVO COMPLETO\n\nNEUTRÓFILO (1-B):\n→ Mais abundante: 50-70% dos leucócitos\n→ Núcleo multilobulado (3-5 lóbulos)\n→ Grânulos pequenos, lilás (neutrofílicos)\n→ Função: fagocitose de BACTÉRIAS\n→ 1ª linha de defesa imune inata\n\nBASÓFILO (2-E):\n→ Menos abundante (<0,5%)\n→ Grânulos grandes, azul-arroxeados (obscurecem núcleo)\n→ Histamina + heparina\n→ Reações ALÉRGICAS e inflamatórias\n\nMONÓCITO (3-A):\n→ 3-9% dos leucócitos\n→ Migra → tecido → MACRÓFAGO\n→ Fagocitose + apresentação de antígenos\n→ Sistema mononuclear fagocítico\n\nEOSINÓFILO (4-D):\n→ Núcleo bilobado\n→ Grânulos grandes, vermelho-alaranjado (eosinofílicos)\n→ MBP + ECP → citotóxico para PARASITAS (helmintos)\n→ Reações alérgicas\n\nLINFÓCITO (5-C):\n→ Agranulócitos\n→ Núcleo redondo, grande\n→ Linfócito B → anticorpos (humoral)\n→ Linfócito T → celular (CD4+/CD8+)\n→ Imunidade ADAPTATIVA'},

{n:8,disc:false,tema:"Anemia Ferropriva — Transporte de Oxigênio",
context:"(UNIDOMPEDRO) Durante um exame de rotina, uma estudante universitária de 22 anos relata fadiga constante e dificuldade para respirar durante atividades físicas leves, como subir escadas. Seu médico solicita exames laboratoriais, que revelam baixos níveis de ferro sérico e hemoglobina, levando ao diagnóstico de anemia ferropriva. O médico explica que a deficiência de ferro compromete a capacidade de transporte de oxigênio pelo sangue, resultando nos sintomas relatados.\n\nCom base no caso da estudante, de que maneira a deficiência de ferro afeta a função respiratória?",
assertions:null,
text:"Com base no caso da estudante, de que maneira a deficiência de ferro afeta a função respiratória?",
opts:["A redução dos níveis de ferro prejudica a captação de oxigênio pelos alvéolos pulmonares, levando a uma diminuição da ventilação pulmonar e consequente dificuldade respiratória.","A falta de ferro impede a formação de glóbulos vermelhos, levando à ausência de transporte de oxigênio pelo sangue e resultando em hipoxemia severa.","A deficiência de ferro reduz a produção de hemoglobina, diminuindo a capacidade dos glóbulos vermelhos de transportar oxigênio, o que pode causar fadiga e dispneia.","A deficiência de ferro causa aumento na viscosidade do sangue, dificultando sua circulação e reduzindo a oferta de oxigênio aos tecidos."],
g:2,
exp:'Alternativa correta: A deficiência de ferro reduz a produção de hemoglobina, diminuindo a capacidade dos glóbulos vermelhos de transportar oxigênio, o que pode causar fadiga e dispneia.\n\nO ferro é um componente essencial da hemoglobina, proteína presente nos glóbulos vermelhos responsável pelo transporte de oxigênio no sangue. A deficiência de ferro reduz a produção de hemoglobina, comprometendo a oxigenação dos tecidos e levando a sintomas como fadiga e dispneia.\n\nAlternativa A incorreta: A absorção de oxigênio pelos alvéolos pulmonares ocorre independentemente da disponibilidade de ferro no organismo. A deficiência de ferro afeta o transporte sistêmico de oxigênio, mas não interfere diretamente na ventilação pulmonar.\nAlternativa B incorreta: A deficiência de ferro reduz a síntese de hemoglobina e pode levar à anemia microcítica e hipocrômica, mas a produção de glóbulos vermelhos continua ocorrendo, ainda que de forma ineficaz. Não resulta em hipoxemia severa de imediato.\nAlternativa D incorreta: A anemia ferropriva não aumenta a viscosidade sanguínea. A viscosidade pode até diminuir pela redução no número de hemácias.\n\nReferências: AIRES, M. de M. Fisiologia. 4. ed. Rio de Janeiro: Guanabara Koogan, 2011. FILHO, G. B. Bogliolo - Patologia. Rio de Janeiro: Grupo GEN, 2021. HALL, J. E.; HALL, M. E. Guyton & Hall. 14. ed. Rio de Janeiro: Guanabara Koogan, 2021.',
deep:'🩸 ANEMIA FERROPRIVA\n\nFerro → grupo HEME → hemoglobina\n\nPathway:\nDeficiência de ferro\n→ ↓ síntese do grupo HEME\n→ ↓ hemoglobina por eritrócito\n→ Eritrócitos MICROCÍTICOS e HIPOCRÔMICOS\n→ ↓ capacidade de transporte de O₂\n→ Fadiga + Dispneia\n\nO QUE NÃO MUDA:\n→ Ventilação pulmonar (alvéolos funcionam normalmente)\n→ Produção de hemácias (continua, só piora qualidade)\n→ Viscosidade (pode até diminuir)\n\nHEMOGRAMA TÍPICO:\n→ ↓ Hemoglobina\n→ ↓ VCM (microcítico)\n→ ↓ HCM (hipocrômico)\n→ ↑ RDW (anisocitose)\n→ ↓ Ferritina, ↓ ferro sérico, ↑ TIBC\n\n💡 MACETE\nFerro → Heme → Hemoglobina → O₂\nSem ferro = sem Hb = sem O₂ = fadiga + dispneia'},

{n:9,disc:false,tema:"Vasos Sanguíneos — Pressão, Fluxo e Resistência",
context:"(FASA VIC) Durante uma aula prática de fisiologia cardiovascular, os alunos são divididos em grupos para estudar os diferentes tipos de vasos sanguíneos e suas características específicas. O professor explicou como a pressão, o fluxo, o volume e a resistência variam entre artérias, arteríolas, capilares, vênulas e veias.\n\nApós a explicação, o professor apresentou as seguintes afirmações para discussão:\n\nI - As artérias apresentam maior pressão e menor complacência quando comparadas às veias, sendo responsáveis pela condução do sangue sob alta pressão para os tecidos.\nII - As arteríolas são os principais locais de regulação da resistência vascular periférica, controlando o fluxo sanguíneo para os capilares através da vasoconstrição e vasodilatação.\nIII - Os capilares, apesar de apresentarem baixa pressão e alta resistência, são os principais responsáveis pela condução rápida do fluxo sanguíneo devido à sua grande área de seção transversal.\nIV - As veias possuem alta pressão e baixo volume sanguíneo, atuando como reservatório de sangue e auxiliando no retorno venoso ao coração.",
assertions:null,
text:"Com base na análise das afirmativas acima, assinale a alternativa correta.",
opts:["Apenas as afirmativas II e III estão corretas.","Apenas as afirmativas III e IV estão corretas.","Apenas as afirmativas I e II estão corretas.","Apenas as afirmativas I e IV estão corretas."],
g:2,
exp:'Alternativa correta: Apenas as afirmativas I e II estão corretas.\n\nAfirmativa I: verdadeira. Artérias têm alta pressão e baixa complacência, sendo responsáveis por conduzir o sangue sob alta pressão.\nAfirmativa II: verdadeira. Arteríolas são os principais sítios de resistência vascular, regulando o fluxo sanguíneo.\nAfirmativa III: falsa. Capilares têm baixa pressão e sua função principal é a troca de nutrientes, não a condução rápida do sangue. Embora tenham grande área de seção transversal (que resulta em baixa velocidade de fluxo), não são os responsáveis pela condução rápida.\nAfirmativa IV: falsa. Veias têm BAIXA pressão e ALTO volume sanguíneo (cerca de 60-70% do volume total), atuando como reservatório de sangue.\n\nReferências: COSTANZO, L. S. Fisiologia. 5. ed. Rio de Janeiro: Guanabara Koogan, 2013. TORTORA, Gerard J.; DERRICKSON, Bryan. Princípios de anatomia e fisiologia. 14. ed. Rio de Janeiro: Guanabara Koogan, 2019.',
deep:'🩸 VASOS SANGUÍNEOS — CARACTERÍSTICAS\n\nARTÉRIAS (vasos de condução/pressão):\n→ Alta pressão (60-100 mmHg)\n→ Baixa complacência (parede espessa, elástica)\n→ Funçao Windkessel (amortecimento pulsação)\n→ Volume: ~15% do total\n\nARTERÍOLAS (vasos de resistência) ✅:\n→ Principal sítio de RESISTÊNCIA vascular periférica\n→ Parede muscular espessa\n→ Vasoconstrição/vasodilatação regulam fluxo capilar\n→ R ∝ 1/r⁴ (Lei de Poiseuille)\n\nCAPILARES (troca):\n→ Baixa pressão (~25 mmHg)\n→ MAIOR área de seção transversal total\n→ MENOR velocidade de fluxo (ideal para troca)\n→ Função: difusão de O₂, CO₂, nutrientes\n→ NÃO são responsáveis por condução rápida ❌\n\nVEIAS (reservatório):\n→ BAIXA pressão (<10 mmHg)\n→ ALTO volume (~65% do total)\n→ Alta complacência\n→ Vasos de capacitância\n→ NÃO têm alta pressão ❌\n\n💡 MACETE\nArtéria = pressão\nArterÍola = resistência (I de "inicia" resistência)\nCapilar = troca\nVeia = volume (reservatório)'},

{n:10,disc:false,tema:"Potencial de Ação Cardíaco — Resposta Rápida e Lenta",
context:"(FMIT) Homem de 28 anos, com histórico de atividade física regular, apresenta dor torácica e sensação de falta de ar durante exercícios intensos. Ele é atendido em um ambulatório com suspeita de alteração na função cardíaca. O eletrocardiograma (ECG) sugere irregularidade nos potenciais de ação de algumas células cardíacas. Ao ser questionado sobre sua saúde, ele relata episódios ocasionais de tontura e batimentos cardíacos irregulares. O médico suspeita de um distúrbio no comportamento do potencial de ação cardíaco, afetando a resposta tanto em células do nodo sinoatrial quanto nas células contráteis.\n\nRelacione os potenciais de ação cardíacos de resposta rápida e resposta lenta em relação às suas características e funções no coração, identificando as diferenças principais entre eles.",
assertions:null,
text:"Relacione os potenciais de ação cardíacos de resposta rápida e resposta lenta em relação às suas características e funções no coração, identificando as diferenças principais entre eles.",
opts:["A resposta rápida ocorre principalmente nas células do nodo sinoatrial, sendo mais lenta e dependente de cálcio para despolarização, enquanto a resposta lenta predomina no miocárdio ventricular, sendo mais rápida e dependente de sódio.","A resposta rápida ocorre no nodo sinoatrial e no sistema His-Purkinje, com rápida despolarização devido à entrada de sódio, enquanto a resposta lenta ocorre principalmente no miocárdio ventricular, com despolarização mais lenta devido à entrada de cálcio.","O potencial de ação de resposta rápida é observado no nodo atrioventricular e miocárdio ventricular, com rápida despolarização e rápida repolarização, enquanto o de resposta lenta ocorre no nodo sinoatrial e é caracterizado por despolarização gradual e repolarização mais lenta.","O potencial de ação de resposta lenta ocorre no nodo atrioventricular e no miocárdio atrial, com rápida despolarização e dependência de potássio, enquanto o de resposta rápida ocorre no sistema His-Purkinje, com despolarização mais lenta e dependência de sódio."],
g:2,
exp:'Alternativa correta: O potencial de ação de resposta rápida é observado no nodo atrioventricular e miocárdio ventricular, com rápida despolarização e rápida repolarização, enquanto o de resposta lenta ocorre no nodo sinoatrial e é caracterizado por despolarização gradual e repolarização mais lenta.\n\nO potencial de ação de resposta rápida é caracterizado por rápida despolarização e repolarização e ocorre no nodo atrioventricular e no miocárdio ventricular. O potencial de ação de resposta lenta é caracterizado por uma despolarização mais gradual e repolarização mais lenta, ocorrendo predominantemente no nodo sinoatrial e atrial.\n\nAlternativa A incorreta: Descreve inversamente — o nodo sinoatrial apresenta resposta LENTA, e o miocárdio ventricular apresenta resposta RÁPIDA.\nAlternativa B incorreta: O nodo sinoatrial tem potencial de ação de resposta LENTA, não rápida.\nAlternativa D incorreta: O potencial lento ocorre no nodo SA/AV, não no miocárdio atrial. O potencial rápido não depende de K+ para despolarização.\n\nReferência: HALL, John E.; HALL, Michael E. Guyton & Hall. 14. ed. Rio de Janeiro: GEN Guanabara Koogan, 2023.',
deep:'⚡ POTENCIAIS DE AÇÃO CARDÍACOS\n\nRESPOSTA RÁPIDA (células contráteis):\n→ Locais: miocárdio ATRIAL e VENTRICULAR + fibras de Purkinje\n→ Despolarização RÁPIDA e abrupta\n→ Íon principal: Na⁺ (canais rápidos de sódio)\n→ Fases:\n   0 (despolarização): abertura canais Na⁺ rápidos\n   1 (repolarização inicial): fechamento Na⁺, abertura K⁺ transitório\n   2 (platô): entrada Ca²⁺ (tipo L) = longa contração\n   3 (repolarização): abertura K⁺ tardio\n   4 (repouso): -90mV estável\n\nRESPOSTA LENTA (células marcapasso):\n→ Locais: nodo SINOATRIAL (SA) + nodo ATRIOVENTRICULAR (AV)\n→ Despolarização LENTA e gradual\n→ Íon principal: Ca²⁺ (canais lentos de cálcio tipo L)\n→ "Funny current" (If): corrente mista Na⁺/K⁺ → automatismo\n→ Fases:\n   0: abertura Ca²⁺ tipo L\n   3: abertura K⁺\n   4: despolarização diastólica espontânea (If)\n\n💡 MACETE\nNodal (SA/AV) = LENTO = Cálcio = Marca-passo\nVentricular/Purkinje = RÁPIDO = Sódio = Contração'},

{n:11,disc:false,tema:"Interleucina-7 — Maturação de Linfócitos T",
context:"(FMIT) Os fatores reguladores para a produção de linfócitos são moléculas e processos que controlam o desenvolvimento, a diferenciação, a supervisão e a sobrevivência das células linfóides, como os linfócitos T e B. Esses fatores atuam em várias etapas da maturação dos linfócitos, desde a sua origem nas células-tronco hematopoiéticas até a sua senescência ou apoptose.\n\nNesse contexto, considere a seguinte situação clínica:\n\nDurante um tratamento oncológico, um paciente desenvolve linfopenia severa (redução acentuada do número de linfócitos no sangue), comprometendo sua imunidade e exigindo uma abordagem terapêutica para estimular a recuperação da população linfocitária.\n\nSobre a situação acima, avalie as seguintes asserções e a relação entre elas:",
assertions:"I - A administração de interleucina 7 pode ser uma estratégia terapêutica para estimular a proliferação de linfócitos T nesse paciente.\nPorque\nII - A interleucina 7 desempenha um papel essencial na maturação e sobrevivência dos linfócitos T, promovendo sua expansão nos órgãos linfoides e contribuindo para a homeostase dessas células, enquanto sua ação sobre linfócitos B é mais limitada.",
text:"Marque a alternativa correta:",
opts:["As asserções I e II são verdadeiras, mas a asserção II não justifica a asserção I.","As asserções I e II são falsas.","As asserções I e II são verdadeiras, e a asserção II justifica a asserção I.","A asserção I é verdadeira, mas a asserção II é falsa."],
g:2,
exp:'Alternativa correta: As asserções I e II são verdadeiras, e a asserção II justifica a asserção I.\n\nA interleucina 7 (IL-7) é uma citocina essencial para a maturação, sobrevivência e proliferação dos linfócitos T. Estudos demonstram que a administração de IL-7 pode ser utilizada como estratégia terapêutica para restaurar a contagem de linfócitos em pacientes com linfopenia severa, como ocorre em quadros de imunossupressão associada ao câncer. A asserção II explica corretamente por que a IL-7 pode ser usada como terapia: sua atuação direta sobre a homeostase e expansão dos linfócitos T justifica o seu potencial benefício na recuperação linfocitária.\n\nAlternativa A incorreta: Seria correta apenas se a asserção II não tivesse relação causal direta com a asserção I. No entanto, a IL-7 atua diretamente nos linfócitos T, promovendo sua sobrevivência e proliferação.\nAlternativa B incorreta: Ambas as asserções são verdadeiras. A IL-7 é uma abordagem terapêutica válida e seu papel na homeostase dos linfócitos T está bem documentado.\nAlternativa D incorreta: A asserção II não é falsa; a IL-7 realmente desempenha papel crucial na homeostase dos linfócitos T.\n\nReferências: ABBAS, A. K. Imunologia celular e molecular. 9. ed. Rio de Janeiro: Elsevier, 2019. HOFFBRAND, A. V.; MOSS, P. A. H. Fundamentos em hematologia de Hoffbrand. 7. ed. Porto Alegre: Artmed, 2018.',
deep:'🧬 INTERLEUCINAS E MATURAÇÃO LINFOCITÁRIA\n\nIL-7 (Interleucina-7):\n→ Produzida por: células estromais da medula óssea e timo\n→ Atua em: linfócitos T (principalmente) e B (limitado)\n→ Funções:\n   Sobrevivência dos linfócitos T naive\n   Proliferação e expansão homeostática\n   Maturação no timo\n→ Uso clínico: linfopenia pós-quimioterapia\n\nOUTRAS CITOCINAS RELEVANTES:\n→ IL-2: proliferação de linfócitos T ativados\n→ IL-4: diferenciação linfócito B, Th2\n→ IL-5: eosinófilos\n→ IL-6: fase aguda, diferenciação plasmócito\n→ IL-10: anti-inflamatória\n→ IL-12: ativa NK e Th1\n→ IFN-γ: ativa macrófagos\n\nFATORES DE CRESCIMENTO HEMATOPOIÉTICOS:\n→ EPO → eritrócitos\n→ G-CSF → neutrófilos (granulócitos)\n→ TPO → plaquetas\n→ M-CSF → monócitos/macrófagos\n→ IL-7 → linfócitos T\n\n💡 MACETE\nIL-7 = 7 letras = linfócito T sobrevive'},

{n:12,disc:false,tema:"Artéria Circunflexa — Irrigação do Ventrículo Esquerdo",
context:"(UNIREDENTOR) Paciente do sexo feminino, 24 anos, com quadro clínico de angina estável e sinais sugestivos de insuficiência cardíaca congestiva. A propedêutica realizada revela lesão grave (> 50%) na artéria responsável por irrigar a parede lateral do ventrículo esquerdo. Levando em consideração esse caso, qual dos seguintes ramos coronarianos foi provavelmente comprometido?",
assertions:null,
text:"Qual dos seguintes ramos coronarianos foi provavelmente comprometido?",
opts:["Circunflexo.","Ramo do nó atrioventricular.","Ramo do nó sinusal.","Artéria coronária direita."],
g:0,
exp:'Alternativa correta: Circunflexo.\n\nAlteração na artéria responsável por irrigar a parede lateral do ventrículo esquerdo está frequentemente associada ao ramo circunflexo da artéria coronária esquerda. Esse ramo percorre ao longo do sulco atrioventricular e supre uma parte significativa da parede lateral do ventrículo esquerdo.\n\n— O ramo do nó atrioventricular segue para o nó atrioventricular e não para a parede lateral do ventrículo esquerdo.\n— A artéria coronária direita origina-se no lado direito do seio da aorta, segue em direção à margem inferior do coração e se estende sobre a face inferior (diafragmática), não para a parede lateral do VE.\n— O ramo do nó sinoatrial se estende para o nó sinoatrial e não para a parede lateral do VE.\n\nReferências: TORTORA, G. J.; DERRICKSON, B. Princípios de Anatomia e Fisiologia. 16. ed. Grupo GEN, 2023. WASCHKE, Jens. Sobotta Anatomia Clínica. Rio de Janeiro: GEN Guanabara Koogan, 2018.',
deep:'❤️ ARTÉRIAS CORONÁRIAS — MAPA COMPLETO\n\nAorta ascendente\n├── A. Coronária ESQUERDA\n│   ├── RAMOS DESCENDENTE ANTERIOR (RIVA/DA)\n│   │   → Paredes ANTERIOR de ambos os ventrículos\n│   │   → Septo interventricular anterior\n│   │   → "Artéria da viúva" (IAM mais grave)\n│   └── RAMO CIRCUNFLEXO ✅\n│       → Parede LATERAL + posterior do VE\n│       → Átrio esquerdo\n│       → Sulco atrioventricular esquerdo\n└── A. Coronária DIREITA\n    ├── Ramo marginal direito → VD\n    ├── Ramo interventricular posterior → face diafragmática\n    ├── Ramo do nó SA → nó sinoatrial\n    └── Ramo do nó AV → nó atrioventricular\n\n💡 MACETE\nParede LATERAL do VE = Circunflexo\nParede ANTERIOR = RIVA (DA)\nParede INFERIOR/POSTERIOR = Coronária Direita\nNós SA/AV = Coronária Direita (em 55-60% dos casos)'},

{n:13,disc:false,tema:"Circulação Fetal — Transição para Neonatal",
context:"(UNIGRANRIO CAXIAS) O coração e os pulmões começam a se desenvolver nas primeiras semanas da embriogênese. O coração surge a partir do mesoderma e inicia sua formação como um tubo cardíaco primitivo, que sofre dobras e subdivisões para formar as câmaras e vasos sanguíneos. Já os pulmões derivam do endoderma do intestino primitivo e começam como uma pequena evaginação chamada broto pulmonar. Com o crescimento, os brônquios e alvéolos se formam em estágios sucessivos, preparando-se para a respiração ao nascimento. Ambas as estruturas passam por modificações para garantir a transição à vida extrauterina.",
assertions:"Alternativa I: A circulação fetal é caracterizada pela presença do forame oval e do ducto arterioso, que permitem o desvio do sangue dos pulmões, enquanto na circulação neonatal essas estruturas se fecham, redirecionando o fluxo sanguíneo para os pulmões.\nPorque\nAlternativa II: No ambiente intrauterino, os pulmões do feto não realizam trocas gasosas, pois a oxigenação do sangue ocorre na placenta; após o nascimento, a primeira respiração do recém-nascido reduz a resistência vascular pulmonar e promove mudanças hemodinâmicas que adaptam a circulação à vida extrauterina.",
text:"A respeito dessas afirmações, assinale a alternativa correta.",
opts:["Alternativas I e II estão corretas, e II justifica a alternativa I.","Alternativa I está correta, mas alternativa II está incorreta.","Alternativa I está incorreta, mas alternativa II está correta.","Alternativas I e II estão corretas, mas II não justifica a alternativa I."],
g:0,
exp:'Alternativa correta: Alternativas I e II estão corretas, e II justifica a alternativa I.\n\nA relação entre a asserção I e a razão II é clara e bem fundamentada. A circulação fetal possui adaptações, como o forame oval e o ducto arterioso, que desviam o sangue dos pulmões, uma vez que a oxigenação ocorre na placenta. A razão II explica corretamente esse fenômeno ao destacar que os pulmões fetais não realizam trocas gasosas e que, após o nascimento, a primeira respiração desencadeia mudanças hemodinâmicas que levam ao fechamento dessas estruturas, promovendo a transição para a circulação neonatal. Dessa forma, a razão justifica corretamente a asserção.\n\nReferência: SADLER, T. W. Langman embriologia médica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2021.',
deep:'👶 CIRCULAÇÃO FETAL → NEONATAL\n\nCIRCULAÇÃO FETAL — shunts para desviar pulmão:\n\n1. FORAME OVAL:\n→ Comunicação entre AD e AE\n→ Desvia sangue do AD → AE (evita pulmão)\n→ Fecha com a ↑ pressão AE após 1ª respiração\n→ Transforma-se em: fossa oval\n\n2. DUCTO ARTERIOSO:\n→ Conecta artéria pulmonar ↔ aorta\n→ Desvia sangue da circulação pulmonar → aorta\n→ Fecha com: ↓ PGE2 + ↑ PO₂ após nascimento\n→ Transforma-se em: ligamento arterioso\n\n3. DUCTO VENOSO:\n→ Conecta veia umbilical ↔ veia cava inferior\n→ Desvia sangue rico em O₂ do fígado\n→ Transforma-se em: ligamento venoso\n\nTRANSIÇÃO AO NASCER:\n→ 1ª respiração → ↓ resistência vascular pulmonar\n→ ↑ fluxo pulmonar → ↑ retorno ao AE\n→ ↑ pressão AE > AD → fecha forame oval\n→ ↑ PO₂ → ↓ PGE2 → fecha ducto arterioso\n\n💡 MACETE\nFetal = DESVIA dos pulmões (placenta faz a troca)\nNeonatal = FLUI pelos pulmões (pulmão faz a troca)'},

{n:14,disc:false,tema:"Organelas Celulares — Mitocôndria",
context:"(UNISL JI-PARANÁ) Durante uma aula prática de histologia, os alunos analisavam lâminas de tecido muscular cardíaco ao microscópio óptico. O professor destacou que o coração precisa de uma grande quantidade de energia para manter suas contrações rítmicas ao longo da vida. Para isso, suas células contêm em abundância uma organela especializada em transformar a energia química contida em moléculas obtidas pela alimentação em energia facilmente utilizável pela célula.\n\nCom base nesse contexto, marque a alternativa que indica corretamente a organela em questão.",
assertions:null,
text:"Com base nesse contexto, marque a alternativa que indica corretamente a organela em questão.",
opts:["Mitocôndria.","Retículo endoplasmático rugoso.","Complexo de Golgi.","Lisossomo."],
g:0,
exp:'Alternativa correta: Mitocôndria.\n\nAs mitocôndrias transformam a energia química contida em moléculas obtidas pela alimentação em energia facilmente utilizável pela célula. Aproximadamente 50% dessa energia é armazenada nas ligações fosfato do ATP e os 50% restantes são dissipados sob a forma de calor. A quantidade de mitocôndrias e o número de cristas por organela são relacionados ao metabolismo energético das células. As que consomem muita energia, como é o caso das células do músculo estriado cardíaco, têm grande quantidade de mitocôndrias, com elevado número de cristas.\n\nRetículo endoplasmático rugoso: a principal função dessa organela é sintetizar proteínas que serão colocadas em vesículas.\nComplexo de Golgi: responsável pelo processamento e distribuição de vesículas de transporte ou de secreção.\nLisossomo: organelas associadas à degradação de moléculas.\n\nReferência: JUNQUEIRA, L. C.; CARNEIRO, J. Histologia Básica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2023.',
deep:'🔋 ORGANELAS CELULARES — FUNÇÕES\n\nMITOCÔNDRIA ✅:\n→ DNA próprio (origem endossimbiótica)\n→ Dupla membrana: externa + interna (cristas)\n→ RESPIRAÇÃO CELULAR AERÓBICA\n→ Fosforilação oxidativa → ATP\n→ ↑ cristas = ↑ atividade metabólica\n→ Células cardíacas: ~30% do volume é mitocôndria!\n\nRETÍCULO ENDOPLASMÁTICO RUGOSO:\n→ Ribossomos aderidos\n→ SÍNTESE de proteínas secretadas/membrana\n→ Dobramento e modificação de proteínas\n\nRETÍCULO ENDOPLASMÁTICO LISO:\n→ SEM ribossomos\n→ Síntese de LIPÍDIOS e esteroides\n→ Detoxificação (fígado)\n→ Armazenamento de Ca²⁺ (músculo = RS)\n\nCOMPLEXO DE GOLGI:\n→ Processamento e EMBALAGEM de proteínas\n→ Forma lisossomos + vesículas secretoras\n\nLISOSSOMO:\n→ Enzimas hidrolíticas\n→ DIGESTÃO intracelular (autofagia)\n\n💡 MACETE\nMito = energia (ATP)\nRE rugoso = proteína\nRE liso = lipídio + Ca²⁺\nGolgi = embalagem + correio\nLisossomo = lixo (digestão)'},

{n:15,disc:false,tema:"Imunidade Ativa e Passiva — Vacina e Imunoglobulina",
context:"(UNIDOMPEDRO) Um paciente, de 25 anos, comparece à unidade de saúde após sofrer um corte profundo na perna ao cair em um terreno acidentado. A ferida apresenta sinais iniciais de inflamação, com vermelhidão, calor e dor local. Durante a anamnese, o paciente relata não ter atualizado sua vacinação contra o tétano nos últimos 10 anos. O médico prescreve a administração da vacina antitetânica e imunoglobulina antitetânica.\n\nDiante desse cenário, qual tipo de resposta imunológica está sendo induzida por cada uma das intervenções realizadas?",
assertions:null,
text:"Diante desse cenário, qual tipo de resposta imunológica está sendo induzida por cada uma das intervenções realizadas?",
opts:["A vacina estimula a resposta adaptativa humoral ativa, e a transferência de imunoglobulina ao indivíduo configura imunidade passiva.","Tanto a vacina quanto a transferência de imunoglobulina ao indivíduo são promovidas pela imunidade adaptativa celular.","A vacina induz imunidade passiva celular através da ativação do linfócito B, e a imunoglobulina ativa a resposta humoral.","A administração da vacina induz uma resposta imune inata, enquanto a imunoglobulina promove imunidade celular."],
g:0,
exp:'Resposta correta: A vacina estimula a resposta adaptativa humoral ativa, e a transferência de imunoglobulina ao indivíduo configura imunidade passiva.\n\nA vacina ativa linfócitos B, levando à produção de anticorpos próprios do paciente, enquanto a imunoglobulina fornece anticorpos prontos, garantindo proteção imediata, mas transitória.\n\nAlternativa B incorreta: Somente a vacina tem o auxílio da imunidade adaptativa celular (linfócito TCD4). A imunoglobulina é relacionada à imunidade humoral passiva.\nAlternativa C incorreta: A vacina induz imunidade ATIVA (não passiva) através do linfócito B. A imunoglobulina está relacionada à imunidade PASSIVA (não ativa).\nAlternativa D incorreta: A vacina induz a resposta adaptativa ativa, pois estimula a produção de anticorpos de longa duração. Já a imunoglobulina fornece imunidade passiva, mas sem ativação da imunidade celular.\n\nReferência: ABBAS, A. K.; LICHTMAN, A. H.; PILLAI, S. Imunologia Celular e Molecular. 10. ed. Rio de Janeiro: GEN Guanabara Koogan, 2023.',
deep:'💉 IMUNIDADE ATIVA vs PASSIVA\n\nIMUNIDADE ATIVA:\n→ O próprio organismo PRODUZ os anticorpos\n→ Leva dias/semanas para desenvolver\n→ Duração: LONGA (memória imunológica)\n→ Exemplos: VACINAS, infecção natural\n\nIMUNIDADE PASSIVA:\n→ Anticorpos produzidos por OUTRO organismo\n→ Proteção IMEDIATA\n→ Duração: CURTA (dias/semanas, sem memória)\n→ Exemplos: IMUNOGLOBULINA, anticorpos maternos\n\nNO CASO DO TÉTANO:\n→ Vacina → imunidade ATIVA HUMORAL\n   Linfócito B → plasmócito → anticorpos\n   Linfócito de memória → proteção longa\n→ Imunoglobulina antitetânica → imunidade PASSIVA\n   Anticorpos prontos = neutralização imediata da toxina\n\n4 TIPOS DE IMUNIDADE:\n→ Ativa Natural: infecção\n→ Ativa Artificial: vacina\n→ Passiva Natural: anticorpos maternos (leite/placenta)\n→ Passiva Artificial: imunoglobulina\n\n💡 MACETE\nAtiva = o corpo FAZ (ativa o sistema)\nPassiva = o corpo RECEBE (passivo)'}
];

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}

function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}

var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
<script>
const PROVA_ID = 'soi1-2025-1';
const PERIODO = 1;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;
function saveLocal(){const state={answered:answered,cur:cur,eliminated:{}};for(const k in eliminated)state.eliminated[k]=Array.from(eliminated[k]);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const state=JSON.parse(raw);if(state.answered&&Object.keys(state.answered).length>0){answered=state.answered;cur=state.cur||0;eliminated={};if(state.eliminated){for(const k in state.eliminated)eliminated[k]=new Set(state.eliminated[k]);}return true;}}catch(e){}return false;}
const _sbScript=document.createElement('script');_sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';_sbScript.onload=function(){window.sb=supabase.createClient('https://mmqfqlbojsbuuodfbilh.supabase.co','sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH');};document.head.appendChild(_sbScript);
async function saveToSupabase(i){try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const q=QS[i];const isDisc=q.disc;const userAns=isDisc?(answered[i]||'').substring(0,500):L[answered[i]];const correctAns=isDisc?'discursiva':L[q.g];const isCorrect=isDisc?null:(answered[i]===q.g);await sb.from('question_responses').upsert({user_id:user.id,question_id:PROVA_ID+'-q'+String(q.n).padStart(2,'0'),periodo:PERIODO,content_type:CONTENT_TYPE,user_answer:userAns,correct_answer:correctAns,is_correct:isCorrect,time_spent_seconds:0,topic:q.tema,difficulty:'media'},{onConflict:'user_id,question_id'});if(!isDisc&&isCorrect!==null){const{data:row}=await sb.from('user_progress').select('*').eq('user_id',user.id).eq('periodo',PERIODO).single();if(row){const t=row.total_questions_solved+1;const c=row.correct_answers+(isCorrect?1:0);const topics=row.topics_studied||[];if(q.tema&&!topics.includes(q.tema))topics.push(q.tema);await sb.from('user_progress').update({total_questions_solved:t,correct_answers:c,accuracy_percentage:parseFloat(((c/t)*100).toFixed(1)),last_studied:new Date().toISOString(),topics_studied:topics}).eq('user_id',user.id).eq('periodo',PERIODO);}else{await sb.from('user_progress').insert({user_id:user.id,periodo:PERIODO,total_questions_solved:1,correct_answers:isCorrect?1:0,accuracy_percentage:isCorrect?100:0,last_studied:new Date().toISOString(),topics_studied:q.tema?[q.tema]:[]});}}}catch(e){console.warn('Supabase:',e);}}
const _origSubmit=submitAnswer;submitAnswer=function(){const idx=cur;_origSubmit();saveLocal();if(answered[idx]!==undefined&&window.sb)saveToSupabase(idx);};
const _origReset=resetAll;resetAll=function(){localStorage.removeItem(STORAGE_KEY);_origReset();};
if(loadLocal()){renderQ();if(Object.keys(answered).length===QS.length)setTimeout(showResult,100);}
</script>
