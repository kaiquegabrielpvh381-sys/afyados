<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afyados | Consultoria Acadêmica de Medicina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.25);--bg:#0C0810;--bg2:#110C16;--bg3:#18111F;--card:#1C1425;--border:rgba(255,255,255,0.07);--border-pink:rgba(214,0,110,0.3);--text:#F5F0FA;--muted:#9186A0;--light:#DDD5E8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden;line-height:1.6;}
nav{position:fixed;top:0;width:100%;z-index:500;padding:0 56px;height:72px;display:flex;align-items:center;justify-content:space-between;background:rgba(12,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--pink-glow);overflow:hidden;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:var(--text);}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color 0.2s;}
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:60px;padding:110px 56px 80px;position:relative;overflow:hidden;}
.hero-left{position:relative;z-index:1;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(44px,5.5vw,78px);font-weight:900;line-height:1.02;margin-bottom:24px;}
.hero h1 em{font-style:italic;background:linear-gradient(135deg,var(--pink-bright),var(--pink-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.btn-pink{display:inline-flex;align-items:center;gap:10px;background:var(--pink);color:white;padding:14px 30px;border-radius:50px;font-size:15px;font-weight:700;text-decoration:none;transition:all 0.25s;box-shadow:0 6px 28px var(--pink-glow);cursor:pointer;border:none;}
.hero-card{background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.4);}
.hcard-header{background:linear-gradient(135deg,var(--pink),#9B00E8);padding:28px;}
.hcard-body{padding:22px;}
.hcard-item{display:flex;align-items:center;gap:13px;padding:13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:13px;transition:all 0.2s;cursor:pointer;}
.hcard-item:hover{background:rgba(214,0,110,0.06);border-color:var(--border-pink);}
.section{padding:110px 56px;}
.precos-wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;max-width:1100px;margin:60px auto 0;}
.preco-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:40px;position:relative;overflow:hidden;transition:all 0.3s;}
.preco-card.hot{border-color:var(--border-pink);box-shadow:0 0 0 1px var(--border-pink),0 40px 80px rgba(214,0,110,0.15);}
.p-price{font-family:'Playfair Display',serif;font-size:50px;font-weight:900;}
footer{background:var(--bg2);border-top:1px solid var(--border);padding:64px 56px 40px;}
@media(max-width:768px){nav{padding:0 20px;}.nav-links{display:none;}.hero{grid-template-columns:1fr;}.precos-wrap{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-mark">🤖</div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <ul class="nav-links">
    <li><a href="#" onclick="goTo('precos');return false;">IA Afyados 🤖</a></li>
    <li><a href="https://chat.whatsapp.com/IjYG3J8y7VJFUK4e5FrbdZ" target="_blank" style="background:var(--pink); color:white; padding:8px 16px; border-radius:50px; text-decoration:none; font-weight:700;">Comunidade</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1>Medicina<br>começa<br><em>mais fácil.</em></h1>
    <div class="hero-actions">
      <button onclick="goTo('precos')" class="btn-pink">Ver planos</button>
    </div>
  </div>
  <div class="hero-right">
    <div class="hero-card">
      <div class="hcard-header"><div style="color:white;font-weight:900;">Clube Afyados</div></div>
      <div class="hcard-body">
        <div class="hcard-item" onclick="goTo('precos')">
          <div style="font-size:20px;">🤖</div>
          <div><h5>IA Afyados 24h</h5><p>Tire dúvidas a qualquer hora</p></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="precos">
  <h2 style="text-align:center;font-family:'Playfair Display';font-size:40px;margin-bottom:40px;">Escolha seu plano</h2>
  <div class="precos-wrap">
    <div class="preco-card"><h3>APG Avulsa</h3><div class="p-price">R$ 35</div></div>
    <div class="preco-card hot"><h3>Clube Afyados</h3><div class="p-price">R$ 129</div></div>
    
    <div class="preco-card" style="border: 2px solid var(--pink);">
      <h3>IA Afyados</h3>
      <div class="p-price" style="font-size:40px;">R$ 15,90</div>
      <p style="font-size:14px; color:var(--muted); margin: 15px 0;">Sua monitoria particular 24h por dia.</p>
      <a href="ia_18.html" class="btn-pink" style="width:100%; justify-content:center; text-decoration:none; display:flex;">Acessar IA Afyados</a>
    </div>
  </div>
</section>

<footer>
  <a href="#" onclick="goTo('precos');return false;" style="color:var(--muted);text-decoration:none;">IA Afyados 24h</a>
</footer>

<script>
function goTo(id) {
  var target = document.getElementById(id);
  if(!target) return;
  var top = target.getBoundingClientRect().top + window.scrollY - 82;
  window.scrollTo({ top: top, behavior: 'smooth' });
}
</script>
</body>
</html>
