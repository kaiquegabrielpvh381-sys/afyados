<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2021.1 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}
.logo-mark svg{width:14px;height:14px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}

.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-header-left{display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}
.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-img{width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;}

.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}
.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}
.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}
.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}
.opt-elim-btn svg{pointer-events:none;}

.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-short{display:block;margin-bottom:14px;line-height:1.8;}

.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-aprofundar:hover{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}

.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}
.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}

.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}

.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:360px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}

.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:180px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}
.tema-pct.red{color:#F09595;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}
.dot-err{background:#E24B4A;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  nav,.sticky-bar{padding-left:16px;padding-right:16px;}
  .main{padding:150px 14px 60px;}
  .q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}
  .q-feedback,.ai-box{margin-left:16px;margin-right:16px;}
  .q-text{font-size:15px;} .q-opt{font-size:14px;padding:12px 14px;}
  .insight-grid{grid-template-columns:1fr;}
  .tema-name{min-width:110px;font-size:12px;}
}
  .hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="sticky-top">
      <span class="sticky-title">N1 SOI II · 2021.1 &nbsp;·&nbsp; Gabarito de questões</span>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>

      </button>

<div class="main">

  <div class="result-screen" id="resultScreen">
    <div class="res-card">
      <div class="res-ring" id="resRing">0%</div>
      <h2 id="resTitle">Resultado</h2>
      <p id="resSub"></p>
      <div class="res-stats">
        <div class="res-stat"><div class="v" id="resOk" style="color:#5DCAA5;">0</div><div class="l">Corretas</div></div>

      </div>
      <button class="btn-retry" onclick="resetAll()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Tentar novamente
      </button>
    </div>
    <div class="report-card">
      <h3>
        <svg width="18" height="18" fill="none" stroke="#D4A8FF" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
        Relatório de desempenho
      </h3>
      <div id="reportContent"></div>
    </div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <div class="q-header-left">
        <span class="q-tag" id="qTagNum">Questão 1</span>
        <span class="q-tag-sep">·</span>
        <span class="q-tag-tema" id="qTagTema"></span>
        <button class="hl-toggle" id="hlToggle" onclick="toggleHL()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Marca-texto</button>
      </div>
    </div>
    <div class="q-body">
      <div class="q-context" id="qContext"></div>

  [`O tronco encefálico é dividido em mesencéfalo, ponte e bulbo. O tecto localiza-se na face posterior do mesencéfalo. O sulco basilar situa-se na face anterior da ponte, sendo por onde passa a artéria basilar. O véu medular inferior encontra-se entre a ponte e o bulbo, participando da formação do teto do quarto ventrículo. O sulco bulbo-pontino delimita a transição entre ponte e bulbo e corresponde ao local de emergência dos nervos cranianos VI, VII e VIII.`,`O tronco encefálico possui uma organização anatômica precisa que deve ser entendida de forma espacial. O mesencéfalo ocupa a porção superior, seguido pela ponte e pelo bulbo. O tecto do mesencéfalo corresponde à sua face posterior e abriga os colículos, importantes para reflexos sensoriais.\n\nNa ponte, destaca-se o sulco basilar, uma depressão mediana por onde percorre a artéria basilar, sendo uma referência anatômica clássica em provas. Inferiormente, o véu medular inferior participa da formação do teto do quarto ventrículo e conecta regiões próximas ao bulbo.\n\nO sulco bulbo-pontino, além de delimitar ponte e bulbo, é funcionalmente relevante por ser o ponto de emergência de nervos cranianos responsáveis por funções motoras e sensoriais importantes.\n\n⚠️ Pegadinha: As alternativas C e D desta questão são idênticas — ambas erradas da mesma forma (véu medular superior + sulco pontino). Lesões nessas regiões podem causar déficits combinados como alterações na mímica facial, movimentos oculares e equilíbrio.`],
  [`A medula espinhal é segmentada e origina 31 pares de nervos espinhais: 8 cervicais, 12 torácicos, 5 lombares, 5 sacrais e 1 coccígeo. Essa divisão é um conceito clássico e frequentemente cobrado em provas — importante lembrar que o número de nervos não corresponde diretamente ao número de vértebras.`,`A medula espinhal apresenta uma organização segmentar que dá origem a 31 pares de nervos espinhais, responsáveis pela comunicação entre o SNC e o corpo. Esses nervos são distribuídos em regiões cervicais, torácicas, lombares, sacrais e coccígea.\n\nUm ponto importante: essa divisão não coincide exatamente com as vértebras, pois durante o desenvolvimento ocorre um crescimento diferencial entre a medula e a coluna vertebral.\n\n⚠️ Erros clássicos cobrados em prova:\n• Inversão das raízes nervosas: a raiz ANTERIOR é motora e a POSTERIOR é sensitiva (Lei de Bell-Magendie)\n• Localização do término da medula: no adulto ocorre em L1–L2, não em níveis mais baixos\n\nEsse conhecimento é fundamental na prática clínica, especialmente para a punção lombar, que deve ser realizada abaixo de L2 para evitar lesões medulares.`],
  [`O cerebelo apresenta substância cinzenta organizada externamente formando o córtex cerebelar, enquanto a substância branca ocupa a região interna, constituindo o centro medular. Essa organização permite o processamento e a modulação dos movimentos.`,`O cerebelo possui uma estrutura altamente organizada, com o córtex formado por substância cinzenta na periferia e um centro de substância branca no interior. Essa disposição permite que o cerebelo receba informações sensoriais e motoras, integrando-as para ajustar a execução dos movimentos.\n\nAlém disso, existem núcleos profundos no interior da substância branca (fastigial, globosos, emboliforme e denteado), responsáveis pela saída dos sinais cerebelares.\n\n⚠️ Confusões frequentes cobradas em prova:\n• Os pedúnculos: o inferior conecta ao BULBO (não à ponte); o médio conecta à ponte; o superior conecta ao mesencéfalo\n• Os núcleos profundos ficam no centro medular, NÃO no córtex\n• A 'árvore da vida' é formada pelas ramificações da substância branca vista em corte sagital\n\nClinicamente, lesões cerebelares resultam em ataxia, dismetria e tremor de intenção — o que evidencia sua função essencial no controle motor fino.`],
  [`As afirmativas corretas são II, III e IV. O SNP é composto por estruturas fora do SNC. A afirmativa I está errada por descrever o SNC. A afirmativa V está invertida: gânglios ficam FORA do neuroeixo, enquanto núcleos ficam DENTRO.`,`O sistema nervoso periférico corresponde a todas as estruturas nervosas localizadas fora do encéfalo e da medula espinhal, incluindo nervos cranianos e espinhais, gânglios e terminações nervosas.\n\n✅ Por que II, III e IV estão corretas:\n• II: Os nervos são classificados pela localização (espinhais/cranianos) e pelo tipo de fibra (sensitivos/motores/mistos) — correto\n• III: Exteroceptores captam estímulos da pele como dor, temperatura e tato — correto\n• IV: Efetores somáticos = músculo esquelético; efetores viscerais = músculo liso, cardíaco e glândulas — correto\n\n❌ Por que I e V estão erradas:\n• I: Descreve o SNC, não o SNP\n• V: INVERTIDA — gânglios são agrupamentos de corpos neuronais FORA do SNC; núcleos são agrupamentos DENTRO do SNC\n\n⚠️ A inversão gânglios/núcleos é uma pegadinha clássica que aparece com frequência em provas.`],
  [`O líquido cerebrospinal é produzido pelos plexos coroides localizados nos ventrículos do SNC. Ele circula pelos ventrículos e pelo espaço subaracnoide, exercendo funções de proteção e manutenção do ambiente neural.`,`O LCR é produzido principalmente pelos plexos coroides, estruturas especializadas formadas por células ependimárias modificadas associadas a capilares sanguíneos. Ele circula pelos ventrículos cerebrais, canal central da medula e espaço subaracnoide.\n\nFunções principais do LCR:\n• Proteção mecânica do encéfalo (amortecimento)\n• Transporte de nutrientes e remoção de metabólitos\n• Manutenção da homeostase do SNC\n• Sustentação do encéfalo (efeito de flutuabilidade)\n\n❌ Por que as outras alternativas estão erradas:\n• Pia-máter e aracnoide: são meninges, sem função produtora de LCR\n• Células de Schwann: mielinizam o SNP\n• Oligodendrócitos: mielinizam o SNC\n\nClinicamente, alterações na produção ou circulação do LCR podem levar à hidrocefalia. A punção lombar permite analisar o LCR para diagnóstico de meningites, hemorragias e outras condições neurológicas.`],
  [`Na medula espinhal, a substância cinzenta localiza-se na região central com formato de H ou borboleta, enquanto a substância branca ocupa a periferia, formando os tratos de condução nervosa.`,`A organização estrutural da medula espinhal é caracterizada por:\n• Substância CINZENTA central — contém os corpos neuronais, organizada em formato de H\n• Substância BRANCA periférica — composta por fibras mielinizadas que formam os tratos ascendentes e descendentes\n\nEssa disposição é o OPOSTO do que ocorre no cérebro, onde a substância cinzenta é mais externa (córtex cerebral).\n\n⚠️ Pegadinhas clássicas desta questão:\n• Inverter cinzenta e branca (confundindo com a organização cerebral)\n• Afirmar que a medula possui apenas 2 meninges — ela possui as 3: dura-máter, aracnoide e pia-máter\n• Afirmar que a mielinização medular é feita por células de Schwann — na medula (SNC) são os OLIGODENDRÓCITOS; células de Schwann atuam no SNP\n\nCompreender essa organização é fundamental para interpretar lesões medulares e seus déficits motores e sensitivos específicos.`],
  [`A espinha bífida oculta é a forma mais leve da doença, caracterizada geralmente por um tufo de pelos na região lombar e ausência de sintomas neurológicos significativos.`,`A espinha bífida é uma malformação congênita decorrente da falha no fechamento do tubo neural durante o desenvolvimento embrionário.\n\nClassificação das formas (do mais leve ao mais grave):\n\n1. Espinha bífida OCULTA (gabarito): defeito ósseo coberto por pele, geralmente assintomático, pode apresentar tufo de pelos, fosseta ou mancha cutânea. Sem protrusão.\n\n2. MENINGOCELE: protrusão das meninges através do defeito ósseo, formando um saco com LCR. A medula não está envolvida. Sintomas leves.\n\n3. MIELOMENINGOCELE: protrusão das meninges E da medula espinhal. Forma mais comum e grave. Déficits neurológicos significativos.\n\n4. MIELOSQUISE (raquisquise): forma mais grave, com exposição direta da medula sem cobertura.\n\n⚠️ Para a prova: o tufo de pelos é o sinal cutâneo clássico da forma OCULTA — assintomática e a mais leve de todas.`],
  [`A retina origina-se de uma evaginação do diencéfalo e é responsável pela fotorrecepção, convertendo estímulos luminosos em sinais nervosos.`,`A retina é uma estrutura neural derivada do diencéfalo (cálice óptico), o que a caracteriza como uma extensão do sistema nervoso central — e não apenas um órgão sensorial periférico.\n\nEstrutura da retina (camadas principais):\n• Epitélio pigmentar\n• Fotorreceptores: cones (visão colorida, alta acuidade) e bastonetes (visão em baixa luminosidade)\n• Células bipolares\n• Células ganglionares (cujos axônios formam o nervo óptico)\n\n❌ Por que as outras alternativas estão erradas:\n• Esclera: camada fibrosa externa de proteção — nada a ver com fotorrecepção\n• Coroide: camada vascular que nutre a retina — não é origem do diencéfalo\n• Cristalino: estrutura de foco da luz, derivada do ectoderma superficial — não do diencéfalo\n\nA origem embrionária da retina é um ponto frequentemente cobrado, pois reforça sua natureza neural e sua relevância em doenças como a retinopatia diabética e o glaucoma.`],
  [`Em situações de estresse, ocorre ativação do sistema nervoso simpático, com liberação de noradrenalina e aumento da frequência cardíaca.`,`O sistema nervoso autônomo divide-se em simpático e parassimpático, com ações geralmente antagônicas.\n\nResposta ao ESTRESSE — Sistema Simpático ('luta ou fuga'):\n• Divisão ativada: SIMPÁTICA\n• Neurotransmissor pós-ganglionar: NORADRENALINA (nos órgãos efetores)\n• Efeito cardíaco: AUMENTO da frequência cardíaca\n• Outros efeitos: midríase, broncodilatação, inibição do peristaltismo, liberação de glicose\n\n⚠️ Atenção aos neurotransmissores:\n• Gânglios simpáticos E parassimpáticos: ACETILCOLINA (nicotínica)\n• Órgãos efetores simpáticos: NORADRENALINA (exceto glândulas sudoríparas = acetilcolina)\n• Órgãos efetores parassimpáticos: ACETILCOLINA (muscarínica)\n\n❌ Por que as outras alternativas estão erradas:\n• Parassimpático + acetilcolina + diminuição: isso seria a resposta de REPOUSO, não de estresse\n• Simpático + acetilcolina + aumento: o neurotransmissor efetor simpático é noradrenalina, não acetilcolina`],
  [`A bomba de Na+/K+ ATPase é estimulada pelo aumento de Na+ intracelular e K+ extracelular — primeira afirmação VERDADEIRA. Sua principal função não é manter a eletroneutralidade, mas sim o gradiente eletroquímico — segunda afirmação FALSA.`,`A bomba de Na+/K+ ATPase é um transportador ativo que utiliza ATP para mover íons contra seus gradientes:\n• 3 íons Na+ para FORA da célula\n• 2 íons K+ para DENTRO da célula\n\nIsso gera um potencial de membrana negativo (célula mais negativa por dentro), essencial para a excitabilidade neuronal e muscular.\n\n✅ Primeira asserção — VERDADEIRA:\nO aumento de Na+ intracelular ou K+ extracelular estimula a bomba, pois ela age para restaurar os gradientes normais.\n\n❌ Segunda asserção — FALSA:\nA função da bomba NÃO é manter a eletroneutralidade. Na verdade, ela gera um desequilíbrio elétrico (pois bombeia mais carga positiva para fora do que para dentro). Sua função é manter os gradientes de concentração para a geração do potencial de ação.\n\n⚠️ Eletroneutralidade vs. Gradiente eletroquímico:\n• Eletroneutralidade = equilíbrio de cargas (não é a função da bomba)\n• Gradiente eletroquímico = diferença de concentração + diferença de carga (isso é a função da bomba)\n\nPortanto: Asserção 1 verdadeira + Asserção 2 falsa = Alternativa A.`],
  [`O cérebro depende continuamente do suprimento de glicose pelo sangue, pois não possui capacidade significativa de armazenamento energético.`,`O cérebro possui características metabólicas únicas:\n\n✅ O que está correto:\n• Altamente dependente de glicose e oxigênio fornecidos pelo sistema circulatório\n• Não armazena quantidades significativas de glicogênio\n• A captação de glicose pelos neurônios é INSULINO-INDEPENDENTE (transportadores GLUT1 e GLUT3)\n• Representa ~2% da massa corporal, mas consome ~20% da glicose total do organismo\n\n❌ Por que as outras alternativas estão erradas:\n• 'Dependente de insulina': FALSO — neurônios captam glicose independente de insulina\n• 'Tolera 10 minutos sem fluxo sanguíneo': FALSO — danos irreversíveis ocorrem em 4–6 minutos\n• 'Armazena glicose por horas': FALSO — as reservas de glicogênio cerebral são mínimas\n\nClinica: Essa característica explica por que hipoglicemia grave e hipóxia causam danos neurológicos tão rapidamente. É também o motivo pelo qual o controle glicêmico é crítico em pacientes com diabetes.`],
  [`O sistema da coluna dorsal-lemnisco medial é responsável pela transmissão de informações somatossensoriais com maior precisão temporal e espacial.`,`Os dois principais sistemas somatossensoriais ascendentes:\n\n✅ Sistema COLUNA DORSAL-LEMNISCO MEDIAL (gabarito):\n• Conduz: tato fino, vibração, propriocepção consciente, pressão discriminativa\n• Características: fibras de grande diâmetro, mielinizadas, condução rápida\n• Percurso: sobe IPSILATERAL na medula → cruza no BULBO → tálamo → córtex somatossensorial\n• Alta fidelidade espacial e temporal\n\n❌ Sistema ANTEROLATERAL (espinotalâmico):\n• Conduz: dor, temperatura, tato grosseiro\n• Características: fibras menores, menor velocidade\n• Cruza na medula (contralateral)\n• Menor fidelidade\n\n❌ Por que as outras alternativas estão erradas:\n• Sistema corticoespinal: é MOTOR, não sensitivo\n• Sistema espinocerebelar: conduz propriocepção INCONSCIENTE para o cerebelo\n\nAplicação clínica: Lesão medular lateral (Síndrome de Brown-Séquard) causa perda de propriocepção ipsilateral + perda de dor/temperatura contralateral — justamente pela diferença de decussação entre os dois sistemas.`],
  [`A área motora suplementar está envolvida no planejamento motor e sua estimulação leva à execução de movimentos bilaterais, tipicamente envolvendo ambas as mãos.`,`O córtex motor é organizado em áreas com funções distintas:\n\n✅ CÓRTEX MOTOR SUPLEMENTAR (AMS) — gabarito:\n• Localização: face MEDIAL do hemisfério cerebral (área 6 medial)\n• Função: planejamento e programação de sequências motoras complexas\n• Estimulação: produz movimentos BILATERAIS, especialmente das mãos\n• Ativo mesmo durante a IMAGINAÇÃO de movimentos (não requer execução)\n• Trabalha em conjunto com o córtex pré-motor e motor primário\n\n❌ Por que as outras alternativas estão erradas:\n• 'Independente do pré-motor e motor primário': FALSO — há intensa integração entre essas áreas\n• 'Leva a movimentos musculares individuais': essa é característica do CÓRTEX MOTOR PRIMÁRIO (M1), não do suplementar\n• 'Superfície lateral anterior ao pré-motor': FALSO — está na face MEDIAL, não lateral\n\nAplicação clínica: Lesões na AMS podem resultar em apraxia (dificuldade em iniciar ou sequenciar movimentos voluntários), mutismo acinético e dificuldade em tarefas bimanuais.`],
  [`A doença de Parkinson está associada à deficiência de dopamina nos núcleos da base, resultante da degeneração de neurônios dopaminérgicos na substância negra.`,`A doença de Parkinson resulta da degeneração progressiva dos neurônios dopaminérgicos da substância negra (pars compacta), reduzindo a dopamina no estriado (núcleo caudado + putâmen).\n\nVia normal dos núcleos da base:\nSubstância negra → libera dopamina → estriado → modula circuito motor → movimento fluido\n\nNo Parkinson:\nSubstância negra degenerada → ↓ dopamina → desequilíbrio no circuito → sintomas motores\n\nTétrade clássica do Parkinson (TRAP):\n• Tremor de repouso (pílula de rolamento)\n• Rigidez muscular (roda dentada)\n• Acinesia/Bradicinesia\n• Postural instability (instabilidade postural)\n\n❌ Por que os outros neurotransmissores estão errados:\n• GABA: deficiência associada à epilepsia e ansiedade, não ao Parkinson\n• Serotonina: deficiência associada à depressão\n• Noradrenalina: deficiência associada à depressão e hipotensão ortostática\n\nTratamento: Levodopa (precursor da dopamina que cruza a barreira hematoencefálica), agonistas dopaminérgicos e, em casos selecionados, estimulação cerebral profunda.`],
  [`O bloqueio dos canais de Na+ impede a despolarização da membrana, bloqueando completamente a geração do potencial de ação.`,`O potencial de ação ocorre em fases que dependem dos canais iônicos:\n\n1. REPOUSO: membrana polarizada (~-70mV), canais Na+ fechados\n2. DESPOLARIZAÇÃO: canais Na+ voltagem-dependentes ABREM → entrada rápida de Na+ → membrana atinge +30mV\n3. REPOLARIZAÇÃO: canais Na+ inativam → canais K+ abrem → saída de K+\n4. HIPERPOLARIZAÇÃO: canais K+ fecham lentamente\n\n✅ Se os canais de Na+ são bloqueados:\n→ Sem entrada de Na+\n→ Sem despolarização\n→ Sem potencial de ação\n→ Bloqueio completo da condução nervosa\n\n❌ Por que as outras alternativas estão erradas:\n• 'Encurtamento do período refratário': FALSO — o período refratário depende da inativação dos canais de Na+; bloqueando-os não há nem potencial de ação para gerar período refratário\n• 'Aumento da velocidade de despolarização': FALSO — o oposto ocorre; sem canais de Na+ não há despolarização alguma\n\nAplicação clínica — Anestésicos locais (lidocaína, bupivacaína):\n• Bloqueiam canais de Na+ voltagem-dependentes\n• Impedem a condução do impulso doloroso\n• Usados em procedimentos odontológicos, bloqueios de nervos periféricos e raquianestesia`]
];

  {n:4,tema:"Sist. Nervoso Periférico",context:null,
   text:"Analise as afirmativas abaixo sobre Sistema Nervoso Periférico:\n\nI. O sistema nervoso periférico é a parte do sistema nervoso localizado dentro da cavidade craniana e do canal vertebral, sendo constituído pelos nervos, plexos nervosos, gânglios e extremidades nervosas.\n\nII. Os nervos, quanto à localização são classificados em espinhais e cranianos, e quanto ao tipo de fibras são classificados em sensitivos, motores e mistos.\n\nIII. Os receptores localizados na pele são denominados de exteroceptores e estão relacionados com a sensibilidade geral, captando estímulos dolorosos, táteis e térmicos.\n\nIV. Os efetuadores do sistema nervoso somático são os músculos estriados esqueléticos, enquanto que os efetuadores do sistema nervoso visceral são os músculos: liso, cardíaco e glândulas.\n\nV. Os gânglios são aglomerados de corpos de neurônios dentro do neuroeixo, enquanto que, os núcleos são aglomerados de corpos de neurônios fora do neuroeixo.\n\nE CORRETO o que se afirma em:",

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){
  const w=document.getElementById('qPills'); w.innerHTML='';
  for(let i=0;i<15;i++){
    const b=document.createElement('button');
    b.className='qp'; b.id='qp'+i; b.textContent=i+1;
    b.onclick=(function(idx){return function(){goTo(idx);};})(i);
    w.appendChild(b);
  }
}
function syncPills(){
  for(let i=0;i<15;i++){
    const p=document.getElementById('qp'+i); if(!p) continue;
    p.className='qp';
    if(i===cur) p.classList.add('current');
    if(answered[i]!==undefined) p.classList.add(answered[i]===QS[i].g?'correct':'wrong');
  }
}

function renderQ(){
  const q=QS[cur]; sel=(answered[cur]!==undefined)?answered[cur]:null; const done=answered[cur]!==undefined;
  document.getElementById('qTagNum').textContent='Questão '+q.n;
  document.getElementById('qTagTema').textContent=q.tema;
  document.getElementById('qCounterNum').textContent=q.n;
  const ctx=document.getElementById('qContext');
  if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}
  document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');
  const img=document.getElementById('qImg');
  if(q.img && IMG_B64){img.src='data:image/jpeg;base64,'+IMG_B64;img.style.display='block';}else{img.style.display='none';}
  const wrap=document.getElementById('qOpts'); wrap.innerHTML='';
  q.opts.forEach(function(o,i){
    const btn=document.createElement('button'); btn.className='q-opt';
    if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}
    else if(sel===i){btn.classList.add('selected');}
    const isElim = !done && eliminated[cur] && eliminated[cur].has(i);
    if(isElim) btn.classList.add('eliminated');
    btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span>'
      +'<button class="opt-elim-btn" title="Eliminar alternativa" data-idx="'+i+'">'
      +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      +'</button>';
    if(!done){
      (function(idx){
        btn.onclick=function(e){
          if(e.target.closest('.opt-elim-btn')) return;
          selectOpt(idx);
        };
        const elimBtn=btn.querySelector('.opt-elim-btn');
        elimBtn.onclick=function(e){
          e.stopPropagation();
          if(!eliminated[cur]) eliminated[cur]=new Set();
          if(eliminated[cur].has(idx)){
            eliminated[cur].delete(idx);
            btn.classList.remove('eliminated');
          } else {
            eliminated[cur].add(idx);
            btn.classList.add('eliminated');
            if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}
          }
        };
      })(i);
    } else {
      btn.querySelector('.opt-elim-btn').style.display='none';
    }
    wrap.appendChild(btn);
  });
  const fb=document.getElementById('qFeedback');
  const aiBox=document.getElementById('aiBox');
  if(done){
    const ok=sel===q.g;
    fb.className='q-feedback show '+(ok?'fb-ok':'fb-err');
    fb.innerHTML='<span class="fb-label">'+(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase())+'</span>'
      +'<span class="fb-short">'+EXP[cur][0]+'</span>'
      +'<button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    aiBox.classList.remove('open');
    document.getElementById('aiContent').textContent='';
  } else {
    fb.className='q-feedback'; fb.innerHTML='';
    aiBox.style.display='none'; aiBox.classList.remove('open');
  }
  document.getElementById('btnPrev').disabled=(cur===0);
  const btnN=document.getElementById('btnNext');
  if(cur===14){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  const btnR=document.getElementById('btnRespond');
  if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(sel===null);}
  syncPills();
}

function toggleAI(qIdx){
  const aiBox=document.getElementById('aiBox');
  const btnAI=document.getElementById('btnAI');
  if(aiBox.classList.contains('open')){
    aiBox.classList.remove('open');
    if(btnAI) btnAI.classList.remove('active');
  } else {
    document.getElementById('aiContent').textContent=EXP[qIdx][1];
    aiBox.style.display='block';
    aiBox.classList.add('open');
    if(btnAI) btnAI.classList.add('active');
  }
}

function selectOpt(i){
  if(answered[cur]!==undefined) return;
  sel=i; document.getElementById('btnRespond').disabled=false;
  const opts=document.querySelectorAll('.q-opt');
  opts.forEach(function(o,idx){
    o.className='q-opt'+(idx===i?' selected':'');
    if(!o.classList.contains('selected')){(function(ii){o.onclick=function(){selectOpt(ii);};})(idx);}
  });
}
function submitAnswer(){
  if(sel===null||answered[cur]!==undefined) return;
  answered[cur]=sel; renderQ();
  if(Object.keys(answered).length===15){setTimeout(showResult,350);}
}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===14){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function showResult(){
  document.getElementById('qCard').style.display='none';
  const rs=document.getElementById('resultScreen'); rs.classList.add('show');
  const keys=Object.keys(answered);
  const correct=keys.filter(function(k){return answered[k]===QS[k].g;}).length;
  const total=keys.length; const pct=Math.round((correct/15)*100);
  const ring=document.getElementById('resRing');
  ring.textContent=pct+'%';
  ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');
  document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';
  document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões respondidas ('+pct+'%)';
  document.getElementById('resOk').textContent=correct;
  document.getElementById('resErr').textContent=total-correct;
  document.getElementById('resSkip').textContent=15-total;
  buildReport(correct,total);
  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildReport(correct,total){
  const temaStats={};
  QS.forEach(function(q,i){
    if(!temaStats[q.tema]) temaStats[q.tema]={total:0,correct:0,wrong:0};
    const t=temaStats[q.tema]; t.total++;
    if(answered[i]===undefined){}
    else if(answered[i]===q.g){t.correct++;}
    else{t.wrong++;}
  });
  const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});
  let barsHtml='';
  sorted.forEach(function(tema){
    const s=temaStats[tema];
    const pct=s.total>0?Math.round((s.correct/s.total)*100):0;
    const isGood=pct>=50;
    barsHtml+='<div class="tema-row">'
      +'<span class="tema-name">'+tema+'</span>'
      +'<div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div>'
      +'<span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span>'
      +'</div>';
  });
  const worstTema=sorted[0]||'—';
  const bestTema=sorted[sorted.length-1]||'—';
  const pct=total>0?Math.round((correct/total)*100):0;
  const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';
  let wrongHtml='';
  QS.forEach(function(q,i){
    if(answered[i]!==undefined&&answered[i]!==q.g){
      wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')">'
        +'<div class="rev-dot dot-err"></div>'
        +'<span>Q'+q.n+' — '+q.tema+'</span>'
        +'<small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small>'
        +'</div>';
    }
  });
  if(!wrongHtml) wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';
  document.getElementById('reportContent').innerHTML=
    '<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div>'
    +'<div class="report-section"><h4>Insights</h4><div class="insight-grid">'
      +'<div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div>'
      +'<div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div>'
      +'<div class="insight-box"><div class="ib-label">Aproveitamento geral</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div>'
      +'<div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(15-total)+'</div><div class="ib-sub">Sem resposta registrada</div></div>'
    +'</div></div>'
    +'<div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';
}

function goToQ(i){
  document.getElementById('qCard').style.display='block';
  document.getElementById('resultScreen').classList.remove('show');
  cur=i; renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}
function resetAll(){
  answered={}; sel=null; cur=0; eliminated={};
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}

buildPills();
renderQ();
  var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
