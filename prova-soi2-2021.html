<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2021.1 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:16px;letter-spacing:.05em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}

.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}

/* QUESTION CARD */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}
.q-context{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:20px;padding:14px 18px;background:rgba(255,255,255,0.025);border-left:2px solid rgba(29,158,117,0.5);border-radius:0 10px 10px 0;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-img{width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;}

.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}

/* FEEDBACK */
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-exp{display:block;margin-bottom:12px;}

/* APROFUNDAR BUTTON */
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;margin-top:4px;}
.btn-aprofundar:hover{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.btn-aprofundar svg{flex-shrink:0;}

/* AI EXPANSION */
.ai-box{margin-top:12px;background:linear-gradient(135deg,rgba(155,0,232,0.07),rgba(214,0,110,0.04));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(155,0,232,0.15);}
.ai-box-header span{font-size:12px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-loading{padding:20px 16px;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;}
.ai-dots{display:flex;gap:4px;}
.ai-dots span{width:6px;height:6px;border-radius:50%;background:#9B00E8;animation:pulse 1.2s ease-in-out infinite;}
.ai-dots span:nth-child(2){animation-delay:.2s;}
.ai-dots span:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}

/* NAV BAR */
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}

/* RESULT SCREEN */
.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}

.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:360px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}

/* REPORT */
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:180px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width .8s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}
.tema-pct.red{color:#F09595;}

.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}

.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}
.dot-err{background:#E24B4A;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal{background:#1A1226;border:1px solid rgba(155,0,232,0.3);border-radius:20px;width:100%;max-width:620px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:18px 24px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(155,0,232,0.1),rgba(214,0,110,0.05));}
.modal-header h3{font-size:15px;font-weight:700;color:#D4A8FF;display:flex;align-items:center;gap:8px;}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:#F4EFFA;}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;}
.modal-loading{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:14px;padding:20px 0;}
.modal-text{font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:640px){
  nav,.sticky-bar{padding-left:16px;padding-right:16px;}
  .main{padding:150px 14px 60px;}
  .q-body,.q-card-header,.q-nav-bar,.q-feedback{padding-left:16px;padding-right:16px;}
  .q-text{font-size:15px;}
  .q-opt{font-size:14px;padding:12px 14px;}
  .insight-grid{grid-template-columns:1fr;}
  .tema-name{min-width:120px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h4l2-4h8l2 4h4L12 2zm0 5l3 6H9l3-6z"/></svg></div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <a href="simulados2.html" class="back-btn">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar aos simulados
  </a>
</nav>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="sticky-top">
      <span class="sticky-title">N1 SOI II · 2021.1 &nbsp;·&nbsp; Gabarito de questões</span>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Resetar lista
      </button>
    </div>
    <div class="q-pills" id="qPills"></div>
  </div>
</div>

<div class="main">

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="resultScreen">
    <div class="res-card">
      <div class="res-ring" id="resRing">0%</div>
      <h2 id="resTitle">Resultado</h2>
      <p id="resSub"></p>
      <div class="res-stats">
        <div class="res-stat"><div class="v" id="resOk" style="color:#5DCAA5;">0</div><div class="l">Corretas</div></div>
        <div class="res-stat"><div class="v" id="resErr" style="color:#F09595;">0</div><div class="l">Erradas</div></div>
        <div class="res-stat"><div class="v" id="resSkip">0</div><div class="l">Não respondidas</div></div>
      </div>
      <button class="btn-retry" onclick="resetAll()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Tentar novamente
      </button>
    </div>

    <!-- REPORT -->
    <div class="report-card">
      <h3>
        <svg width="18" height="18" fill="none" stroke="#D4A8FF" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
        Relatório de desempenho
      </h3>
      <div id="reportContent"></div>
    </div>
  </div>

  <!-- QUESTION CARD -->
  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <span class="q-tag" id="qTagNum">Questão 1</span>
      <span class="q-tag-sep">·</span>
      <span class="q-tag-tema" id="qTagTema"></span>
    </div>
    <div class="q-body">
      <div class="q-context" id="qContext"></div>
      <div class="q-text" id="qText"></div>
      <img class="q-img" id="qImg" alt="Imagem da questão">
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="q-feedback" id="qFeedback"></div>

    <!-- AI BOX inline -->
    <div class="ai-box" id="aiBox" style="display:none;margin:12px 28px;">
      <div class="ai-box-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#D4A8FF" stroke-width="2"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="m9 12 2 2 4-4"/></svg>
        <span>Explicação aprofundada — IA</span>
      </div>
      <div id="aiBoxInner"></div>
    </div>

    <div class="q-nav-bar">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Anterior
      </button>
      <span class="q-counter">Questão <strong id="qCounterNum">1</strong> de <strong>15</strong></span>
      <div class="nav-right">
        <button class="btn-respond" id="btnRespond" onclick="submitAnswer()">Responder</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()">
          Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  {n:1,tema:"Tronco Encefálico",context:null,img:true,
   text:'Sobre o TRONCO ENCEFÁLICO, marque a alternativa que preenche corretamente a coluna "B".',
   opts:["1 – Tecto do mesencéfalo; 2 – Sulco lateral; 3 – Véu medular superior; 4 – Sulco bulbo-pontino.",
         "1 – Tecto do mesencéfalo; 2 – Sulco basilar; 3 – Véu medular inferior; 4 – Sulco bulbo-pontino.",
         "1 – Tecto do mesencéfalo; 2 – Sulco basilar; 3 – Véu medular superior; 4 – Sulco pontino.",
         "1 – Tecto do mesencéfalo; 2 – Sulco basilar; 3 – Véu medular superior; 4 – Sulco pontino."],
   g:1,exp:"O Sulco basilar está na face anterior da ponte (onde transita a artéria basilar). O Véu medular inferior está entre a ponte e o bulbo. O Sulco bulbo-pontino delimita o limite inferior da ponte, de onde emergem os nervos abducente, facial e vestibulococlear."},
  {n:2,tema:"Medula Espinhal",
   context:"A Medula Espinhal é um cordão cilíndrico, composto de células nervosas, localizada no canal vertebral. Sua função é estabelecer a comunicação entre o corpo e o sistema nervoso, e agir também nos reflexos, protegendo o corpo em situações de emergência.",
   text:"Sobre a MEDULA ESPINHAL, marque a alternativa correta:",
   opts:["A medula espinhal apresenta segmentos medulares, que dão origem a 31 pares de nervos espinhais, sendo 8 cervicais, 12 torácicos, 05 lombares, 05 sacrais e 01 coccígeo.",
         "No sulco lateral posterior emergem as radículas que formam a raiz motora; no sulco lateral anterior emergem as radículas que formam a raiz sensitiva.",
         "Segmento medular é a porção da medula espinhal correspondente aos filamentos radiculares que entram na composição de um nervo motor espinhal.",
         "A medula espinhal está situada dentro do canal vertebral, terminando ao nível da 2ª vértebra sacral."],
   g:0,exp:"A medula origina 31 pares de nervos espinhais: 8 cervicais, 12 torácicos, 5 lombares, 5 sacrais e 1 coccígeo. A raiz motora emerge do sulco lateral ANTERIOR. A medula termina em L1-L2, não no sacro."},
  {n:3,tema:"Cerebelo",
   context:"O cerebelo é responsável por todo o equilíbrio e postura corporal, recebendo impulsos sensitivos das estruturas locomotoras mais importantes.",
   text:"Sobre o CEREBELO, marque a alternativa correta:",
   opts:["Na organização interna do cerebelo a substância cinzenta está disposta em fina camada periférica (córtex cerebelar) e o centro é de substância branca (centro medular).",
         "O cerebelo apresenta três pedúnculos cerebelares: superior, médio e inferior, sendo que o pedúnculo inferior conecta o cerebelo à ponte.",
         "Do córtex cerebelar originam-se as lâminas brancas que recebem a denominação de árvore da vida.",
         "No córtex cerebelar estão localizados os núcleos fastigial, globosos, emboliforme e denteado."],
   g:0,exp:"Córtex cerebelar (cinzento) fica na periferia e o centro medular (branco) internamente. Os núcleos profundos ficam no centro medular, não no córtex. O pedúnculo inferior conecta ao bulbo (não à ponte)."},
  {n:4,tema:"Sist. Nervoso Periférico",context:null,
   text:"Analise as afirmativas sobre o SNP:\n\nI. O SNP está localizado dentro da cavidade craniana e do canal vertebral.\n\nII. Os nervos são classificados em espinhais e cranianos quanto à localização, e em sensitivos, motores e mistos quanto ao tipo de fibras.\n\nIII. Os receptores da pele são denominados exteroceptores, relacionados à sensibilidade geral.\n\nIV. Os efetuadores do SN somático são os músculos esqueléticos; os do SN visceral são os músculos liso, cardíaco e glândulas.\n\nV. Os gânglios são aglomerados de neurônios dentro do neuroeixo; os núcleos são aglomerados fora do neuroeixo.\n\nÉ CORRETO o que se afirma em:",
   opts:["III, IV e V.","II, III e IV.","I, II, III, IV e V.","II, III e V."],
   g:1,exp:"II, III e IV são corretas. A I está errada: o SNP está FORA da cavidade craniana. A V está invertida: gânglios ficam FORA do neuroeixo e núcleos ficam DENTRO."},
  {n:5,tema:"Líquor (LCR)",
   context:"O LCR é importante para o metabolismo do SNC e protege contra traumatismos. No SNC, o LCR circula nos ventrículos, canal central da medula e espaço subaracnóideo.",
   text:"Ele é produzido pelo(a):",
   opts:["Plexo coroide.","Pia-máter.","Células de Schwann na medula e Oligodendrócitos no encéfalo.","Aracnoide."],
   g:0,exp:"O LCR é produzido principalmente pelo plexo coroide (nos ventrículos cerebrais). Células de Schwann e oligodendrócitos são responsáveis pela mielinização. Pia-máter e aracnoide são meninges, sem função secretora de LCR."},
  {n:6,tema:"Medula — Organização",context:null,
   text:"A respeito da medula, marque a alternativa CORRETA:",
   opts:["A substância branca é central em formato de H e a cinzenta é externa.",
         "Possui apenas duas meninges: pia-máter e dura-máter.",
         "Diferentemente do encéfalo, a mielinização ocorre pelas células de Schwann.",
         "A substância cinzenta é central em formato de H e a branca é externa."],
   g:3,exp:"Na medula, a substância CINZENTA está no centro (formato H) e a BRANCA na periferia. A medula possui as três meninges. A mielinização no SNC é feita por oligodendrócitos; as células de Schwann mielinizam o SNP."},
  {n:7,tema:"Espinha Bífida",context:null,
   text:"A espinha bífida caracterizada por um tufo de pelos em sua região e que usualmente não causa sintomas clínicos é a:",
   opts:["Espinha bífida cística com meningomielocele.",
         "Espinha bífida com mielosquise.",
         "Espinha bífida cística com meningocele.",
         "Espinha bífida oculta."],
   g:3,exp:"A espinha bífida oculta é a forma mais leve: defeito no arco vertebral coberto por pele, frequentemente marcado por tufo de pelos ou fosseta. Geralmente assintomática. As formas císticas formam protrusão visível."},
  {n:8,tema:"Constituintes do Olho",context:null,
   text:"É originário de uma evaginação do diencéfalo, pigmentar e com várias camadas, responsável pela fotorrecepção. Essas afirmações referem-se a qual constituinte do olho?",
   opts:["Retina.","Esclera.","Coroide.","Cristalino."],
   g:0,exp:"A retina é originada do diencéfalo (cálice óptico), possui múltiplas camadas incluindo fotorreceptores (cones e bastonetes) e epitélio pigmentar. A esclera é conjuntivo fibroso, a coroide é vascular, e o cristalino deriva do ectoderma superficial."},
  {n:9,tema:"Sist. Nervoso Autônomo",
   context:"Nas alternativas são mostrados três aspectos sobre o controle de respostas fisiológicas:\n\nI. Divisão do sistema nervoso estimulada;\nII. Neurotransmissor liberado na sinapse neuroefetuadora;\nIII. Efeito sobre a frequência cardíaca.",
   text:"Qual das alternativas apresenta corretamente o que ocorre em uma pessoa em situação de estresse?",
   opts:["I – Simpática; II – Acetilcolina; III – Diminuição.",
         "I – Parassimpática; II – Acetilcolina; III – Diminuição.",
         "I – Simpática; II – Noradrenalina; III – Aumento.",
         "I – Simpática; II – Acetilcolina; III – Aumento."],
   g:2,exp:"O estresse ativa a divisão SIMPÁTICA. O neurotransmissor na junção neuroefetuadora simpática cardíaca é a NORADRENALINA, causando AUMENTO da frequência cardíaca. A acetilcolina é usada pelo parassimpático."},
  {n:10,tema:"Bomba Na+/K+ ATPase",
   context:"Cerca de um terço do suprimento celular de ATP é gasto na bomba de Na+/K+ ATPase e a inibição da bomba despolariza a membrana celular.",
   text:"Analise as asserções:\n\nAumento da concentração extracelular de K+ (hipercalemia) e/ou aumento da concentração intracelular de Na+ estimulam a bomba de Na+/K+ ATPase.\n\nPORQUE\n\nA função da bomba de Na+/K+ ATPase é manter a eletroneutralidade nos meios intra e extracelular.\n\nAssinale a opção CORRETA:",
   opts:["A primeira asserção é verdadeira e a segunda é falsa.",
         "As duas são verdadeiras, mas a segunda não justifica a primeira.",
         "As duas são verdadeiras e a segunda justifica a primeira.",
         "A primeira é falsa e a segunda é verdadeira."],
   g:0,exp:"A primeira asserção é VERDADEIRA: hipercalemia e aumento de Na+ intracelular estimulam a bomba. A segunda é FALSA: a bomba não mantém eletroneutralidade — ela transporta 3 Na+ para fora e 2 K+ para dentro, gerando gradiente iônico e potencial de membrana negativo."},
  {n:11,tema:"Metabolismo Cerebral",
   context:"O uso de energia do cérebro está entre os mais altos de qualquer órgão do corpo, mas o armazenamento de glicogênio no cérebro é mínimo e a glicólise anaeróbica não é fonte significativa de energia.",
   text:"Qual das seguintes afirmações está correta?",
   opts:["A oferta de glicose aos neurônios é vitalmente dependente da insulina.",
         "A cessação do fluxo sanguíneo pode ser tolerada por até 10 minutos pelo armazenamento de O2 no tecido cerebral.",
         "A glicose que chega ao cérebro pode ser armazenada nos neurônios por várias horas.",
         "O cérebro é dependente da oferta de glicose via sistema vascular."],
   g:3,exp:"O cérebro depende continuamente do suprimento de glicose pelo sangue, pois suas reservas são mínimas. A captação pelos neurônios é insulino-independente (GLUT1 e GLUT3). A interrupção do fluxo causa dano em segundos a poucos minutos."},
  {n:12,tema:"Somatossensorial",context:null,
   text:"Qual é o sistema que transmite informações somatossensoriais com o mais alto grau de fidelidade temporal e espacial?",
   opts:["Sistema da coluna dorsal-lemnisco medial.",
         "Sistema anterolateral.",
         "Sistema corticoespinal.",
         "Sistema espinocerebelar."],
   g:0,exp:"O sistema coluna dorsal-lemnisco medial transmite tato fino, propriocepção e vibração com alta fidelidade. O sistema anterolateral tem menor fidelidade. O corticoespinal é motor."},
  {n:13,tema:"Córtex Motor",context:null,
   text:"Qual dos seguintes aspectos é característico do córtex motor suplementar?",
   opts:["Funciona totalmente independente do córtex pré-motor e motor primário.",
         "Como no córtex pré-motor, a estimulação leva a movimento distinto de músculos individuais.",
         "Localiza-se imediatamente anterior ao córtex pré-motor na superfície lateral do hemisfério.",
         "Sua estimulação leva a movimentos bilaterais, tipicamente envolvendo ambas as mãos."],
   g:3,exp:"O córtex motor suplementar produz movimentos BILATERAIS quando estimulado. Está na face medial do hemisfério, não na lateral. Trabalha em conjunto com córtex pré-motor e motor primário."},
  {n:14,tema:"Doença de Parkinson",
   context:"Uma ampla variedade de neurotransmissores foi identificada nos corpos celulares e terminações sinápticas aferentes dos núcleos da base.",
   text:"A deficiência de qual dos seguintes neurotransmissores associa-se tipicamente à doença de Parkinson?",
   opts:["GABA (ácido gama-aminobutírico)","Dopamina","Serotonina","Noradrenalina"],
   g:1,exp:"A doença de Parkinson é causada pela degeneração dos neurônios dopaminérgicos da substância negra, reduzindo a dopamina no estriado. Resultado: tremor, rigidez e bradicinesia. Tratamento principal: levodopa."},
  {n:15,tema:"Potencial de Ação",context:null,
   text:"Um fármaco bloqueia completamente os canais de Na+ dos nervos. Qual dos seguintes efeitos sobre o potencial de ação seria produzido?",
   opts:["Encurtamento do período refratário absoluto.",
         "Bloqueio da ocorrência dos potenciais de ação.",
         "Encurtamento do período refratário relativo.",
         "Aumento da velocidade da despolarização do potencial de ação."],
   g:1,exp:"Os canais de Na+ são essenciais para a fase de despolarização. Sem eles, a célula não atinge o limiar para disparar — resultado: bloqueio completo. Este é o mecanismo dos anestésicos locais como a lidocaína."}
];
const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {};

// ── PILLS ──
function buildPills(){
  const w = document.getElementById('qPills');
  w.innerHTML = '';
  for(let i=0;i<15;i++){
    const b = document.createElement('button');
    b.className='qp'; b.id='qp'+i; b.textContent=i+1;
    b.onclick=(function(idx){return function(){goTo(idx);};})(i);
    w.appendChild(b);
  }
}
function syncPills(){
  for(let i=0;i<15;i++){
    const p=document.getElementById('qp'+i); if(!p) continue;
    p.className='qp';
    if(i===cur) p.classList.add('current');
    if(answered[i]!==undefined) p.classList.add(answered[i]===QS[i].g?'correct':'wrong');
  }
}

// ── RENDER ──
function renderQ(){
  const q=QS[cur]; sel=(answered[cur]!==undefined)?answered[cur]:null; const done=answered[cur]!==undefined;
  document.getElementById('qTagNum').textContent='Questão '+q.n;
  document.getElementById('qTagTema').textContent=q.tema;
  document.getElementById('qCounterNum').textContent=q.n;
  const ctx=document.getElementById('qContext');
  if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}
  document.getElementById('qText').textContent=q.text;
  const img=document.getElementById('qImg');
  if(q.img){img.src='data:image/png;base64,'+IMG_B64;img.style.display='block';}else{img.style.display='none';}
  const wrap=document.getElementById('qOpts'); wrap.innerHTML='';
  q.opts.forEach(function(o,i){
    const btn=document.createElement('button'); btn.className='q-opt';
    if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}
    else if(sel===i){btn.classList.add('selected');}
    btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span>'+o+'</span>';
    if(!done){(function(idx){btn.onclick=function(){selectOpt(idx);};})(i);}
    wrap.appendChild(btn);
  });
  const fb=document.getElementById('qFeedback');
  const aiBox=document.getElementById('aiBox');
  if(done){
    const ok=sel===q.g;
    fb.className='q-feedback show '+(ok?'fb-ok':'fb-err');
    fb.innerHTML='<strong class="fb-label">'+(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase())+'</strong>'
      +'<span class="fb-exp">'+q.exp+'</span>'
      +'<button class="btn-aprofundar" onclick="openAI('+cur+')">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/></svg>'
      +' Aprofundar com IA</button>';
    aiBox.style.display='block';
    const prevContent=document.getElementById('aiContent'+cur);
    if(prevContent){
      document.getElementById('aiBoxInner').innerHTML=prevContent.innerHTML;
    } else {
      document.getElementById('aiBoxInner').innerHTML='';
      aiBox.classList.remove('open');
    }
  } else {
    fb.className='q-feedback'; fb.innerHTML='';
    aiBox.style.display='none'; aiBox.classList.remove('open');
  }
  document.getElementById('btnPrev').disabled=(cur===0);
  const btnN=document.getElementById('btnNext');
  if(cur===14){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  const btnR=document.getElementById('btnRespond');
  if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(sel===null);}
  syncPills();
}

// ── AI BOX (inline) ──
function openAI(qIdx){
  const aiBox=document.getElementById('aiBox');
  const inner=document.getElementById('aiBoxInner');
  const cacheKey='aiCache'+qIdx;
  if(aiBox.classList.contains('open')){aiBox.classList.remove('open');return;}
  aiBox.classList.add('open');
  const cached=window[cacheKey];
  if(cached){inner.innerHTML='<div class="ai-content">'+cached+'</div>';return;}
  const q=QS[qIdx];
  inner.innerHTML='<div class="ai-loading"><div class="ai-dots"><span></span><span></span><span></span></div> A IA está aprofundando o tema...</div>';
  const prompt='Você é um professor de medicina. Explique de forma aprofundada e didática o tema "'+q.tema+'" para um estudante de medicina do 2º período. '
    +'Contexto da questão: '+q.text+' '
    +'A resposta correta foi: '+q.opts[q.g]+'. '
    +'Aborde: conceitos fundamentais do tema, por que as alternativas erradas estão erradas, e dicas de como não errar mais questões sobre esse assunto. '
    +'Seja claro, use linguagem acessível mas precisa. Máximo 350 palavras.';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    const text=data.content.map(function(i){return i.text||'';}).join('');
    window[cacheKey]=text;
    inner.innerHTML='<div class="ai-content">'+text+'</div>';
  }).catch(function(){
    inner.innerHTML='<div class="ai-content" style="color:var(--muted);">Não foi possível carregar a explicação. Verifique sua conexão.</div>';
  });
}

// ── SELECT / SUBMIT ──
function selectOpt(i){
  if(answered[cur]!==undefined) return;
  sel=i; document.getElementById('btnRespond').disabled=false;
  const opts=document.querySelectorAll('.q-opt');
  opts.forEach(function(o,idx){
    o.className='q-opt'+(idx===i?' selected':'');
    if(!o.classList.contains('selected')){(function(ii){o.onclick=function(){selectOpt(ii);};})(idx);}
  });
}
function submitAnswer(){
  if(sel===null||answered[cur]!==undefined) return;
  answered[cur]=sel; renderQ();
  if(Object.keys(answered).length===15){setTimeout(showResult,350);}
}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===14){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

// ── RESULT + REPORT ──
function showResult(){
  document.getElementById('qCard').style.display='none';
  const rs=document.getElementById('resultScreen'); rs.classList.add('show');
  const keys=Object.keys(answered);
  const correct=keys.filter(function(k){return answered[k]===QS[k].g;}).length;
  const total=keys.length; const pct=Math.round((correct/15)*100);
  const ring=document.getElementById('resRing');
  ring.textContent=pct+'%';
  ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');
  document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';
  document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões respondidas ('+pct+'%)';
  document.getElementById('resOk').textContent=correct;
  document.getElementById('resErr').textContent=total-correct;
  document.getElementById('resSkip').textContent=15-total;
  buildReport(correct, total);
  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildReport(correct, total){
  // Per-tema stats
  const temaStats={};
  QS.forEach(function(q,i){
    if(!temaStats[q.tema]) temaStats[q.tema]={total:0,correct:0,wrong:0,skipped:0};
    const t=temaStats[q.tema]; t.total++;
    if(answered[i]===undefined){t.skipped++;}
    else if(answered[i]===q.g){t.correct++;}
    else{t.wrong++;}
  });

  // Sort by wrong desc for "pontos fracos"
  const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});

  let barsHtml='';
  sorted.forEach(function(tema){
    const s=temaStats[tema];
    const pct=s.total>0?Math.round((s.correct/s.total)*100):0;
    const isGood=pct>=50;
    const barW=pct+'%';
    barsHtml+='<div class="tema-row">'
      +'<span class="tema-name">'+tema+'</span>'
      +'<div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+barW+'"></div></div>'
      +'<span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span>'
      +'</div>';
  });

  // Worst tema
  const worstTema=sorted[0]||'—';
  const bestTema=sorted[sorted.length-1]||'—';
  const pct=total>0?Math.round((correct/total)*100):0;
  const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Desempenho mediano, foque nos pontos fracos.':'Revise os conteúdos antes da prova.';

  // Wrong questions list
  let wrongListHtml='';
  QS.forEach(function(q,i){
    if(answered[i]!==undefined && answered[i]!==q.g){
      wrongListHtml+='<div class="q-rev-row" onclick="goToQ('+i+')">'
        +'<div class="rev-dot dot-err"></div>'
        +'<span>Q'+q.n+' — '+q.tema+'</span>'
        +'<small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small>'
        +'</div>';
    }
  });
  if(!wrongListHtml) wrongListHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro! 🎉</div>';

  document.getElementById('reportContent').innerHTML=
    '<div class="report-section">'
      +'<h4>Desempenho por tema</h4>'
      +'<div>'+barsHtml+'</div>'
    +'</div>'
    +'<div class="report-section">'
      +'<h4>Insights</h4>'
      +'<div class="insight-grid">'
        +'<div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Mais erros nesse tema</div></div>'
        +'<div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior acerto nesse tema</div></div>'
        +'<div class="insight-box"><div class="ib-label">Aproveitamento geral</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div>'
        +'<div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(15-total)+'</div><div class="ib-sub">Sem resposta registrada</div></div>'
      +'</div>'
    +'</div>'
    +'<div class="report-section">'
      +'<h4>Questões que você errou</h4>'
      +'<div class="q-review-list">'+wrongListHtml+'</div>'
    +'</div>';
}

function goToQ(i){
  document.getElementById('qCard').style.display='block';
  document.getElementById('resultScreen').classList.remove('show');
  cur=i; renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll(){
  answered={}; sel=null; cur=0;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}

buildPills();
renderQ();
</script>
