<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}

.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}

const QS=[
{n:1,disc:false,tema:"Condições Crônicas vs Agudas — Mendes",src:"FESAR",context:"(FESAR) Um paciente de 60 anos, portador de diabetes mellitus tipo 2 h\u00e1 15 anos, procura atendimento m\u00e9dico para acompanhamento regular. O m\u00e9dico revisa o plano de cuidados, ajusta a medica\u00e7\u00e3o, verifica exames e refor\u00e7a a ades\u00e3o ao tratamento. Al\u00e9m disso, uma crian\u00e7a de 5 anos \u00e9 levada ao pronto-socorro com febre alta, tosse e dificuldade respirat\u00f3ria, diagnosticada com pneumonia.\n\nI. Paciente com diabetes mellitus tipo 2.\nII. Cetoacidose diab\u00e9tica (diabetes agudizada).\nIII. Acompanhamento regular do paciente com hipertens\u00e3o.\nIV. Atendimento da crian\u00e7a com pneumonia no pronto-socorro.",assertions:null,text:"Considerando o modelo de Mendes (2011), associe as situações clínicas descritas às respostas do sistema de saúde.",opts:["I - Proativa/Contínua; II - Proativa/Contínua; III - Reativa/Episódica; IV - Reativa/Episódica.","I - Reativa/Episódica; II - Proativa/Contínua; III - Reativa/Episódica; IV - Proativa/Contínua.","I - Reativa/Episódica; II - Reativa/Episódica; III - Proativa/Contínua; IV - Proativa/Contínua.","I - Proativa/Contínua; II - Reativa/Episódica; III - Proativa/Contínua; IV - Reativa/Episódica."],g:3,exp:"I - Proativa/Contínua: O diabetes mellitus tipo 2 é uma condição crônica que exige acompanhamento contínuo e medidas proativas para controlar a doença e prevenir complicações.\nII - Reativa/Episódica: Cetoacidose diabética (CAD) é uma condição aguda derivada de uma doença crônica (diabetes) que demanda uma resposta imediata e episódica do sistema de saúde, como o atendimento no pronto-socorro.\nIII - Proativa/Contínua: O acompanhamento regular do paciente com hipertensão é uma ação proativa e contínua do sistema de saúde, visando o controle da doença a longo prazo.\nIV - Reativa/Episódica: O atendimento da criança com pneumonia no pronto-socorro é uma resposta reativa e episódica a uma condição aguda.",deep:"📊 CONDIÇÕES DE SAÚDE vs RESPOSTA DO SISTEMA — MODELO DE MENDES (2011)\n\nClassificação das situações:\n\n   I — DM2 com acompanhamento regular\n   → Condição: CRÔNICA  |  Resposta: PROATIVA/CONTÍNUA ✅\n   → Revisão do plano, ajuste de medicação, reforço de adesão\n\n   II — Cetoacidose diabética (CAD)\n   → Condição: AGUDA (agudização de doença crônica)  |  Resposta: REATIVA/EPISÓDICA ✅\n   → Atendimento imediato no pronto-socorro\n\n   III — Hipertenso com acompanhamento regular\n   → Condição: CRÔNICA  |  Resposta: PROATIVA/CONTÍNUA ✅\n   → Acompanhamento contínuo preventivo\n\n   IV — Criança com pneumonia no PS\n   → Condição: AGUDA  |  Resposta: REATIVA/EPISÓDICA ✅\n   → Atendimento pontual para evento agudo\n\nRegra de Mendes:\n   → Crônica → ideal: proativa/contínua\n   → Aguda → naturalmente: reativa/episódica\n   → Crônica agudizada → tratada como aguda no momento\n\n💡 MACETE:\n   Acompanhamento REGULAR = proativo/contínuo\n   Pronto-socorro/emergência = reativo/episódico"},
{n:2,disc:true,tema:"Tecnologias em Saúde",src:"AFYA Manacapuru",context:"(AFYA Manacapuru) Uma equipe de Sa\u00fade da Fam\u00edlia identificou que pacientes com diabetes tipo 2 apresentavam baixa ades\u00e3o ao tratamento. Realizaram encontros quinzenais de educa\u00e7\u00e3o em sa\u00fade com rodas de conversa para compartilhamento de ang\u00fastias e melhoria do di\u00e1logo. Al\u00e9m disso, incorporaram o uso de um aplicativo de monitoramento glic\u00eamico para que os pacientes registrassem medi\u00e7\u00f5es di\u00e1rias e recebessem feedback remoto da equipe.",assertions:null,text:"a) Identifique e classifique os tipos de tecnologia em saúde utilizados pela equipe (leve, leve-dura ou dura), justificando sua resposta.\n\nb) Proponha uma outra ação que utilize o mesmo nível tecnológico descrito no caso, explicando como contribuiria para o cuidado dos pacientes.",opts:[],g:null,exp:"a) Identificação e classificação dos tipos de tecnologia em saúde utilizados pela equipe. (0,75).\nNo caso apresentado, a equipe de Saúde da Família emprega diferentes tipos de tecnologia em saúde. Conforme a explicação a seguir.\nTecnologia leve: as rodas de conversa de angústias e melhoria do diálogo representam o uso de tecnologias leves, pois envolvem o compartilhamento de conhecimentos, a comunicação interpessoal e o fortalecimento do vínculo entre profissionais e pacientes. Esse tipo de tecnologia é fundamental para a construção do cuidado na Atenção Básica.\nTecnologia dura: o uso do aplicativo de monitoramento glicêmico se encaixa como tecnologia dura, pois envolve um instrumento tecnológico estruturado que permite a coleta e análise de dados sobre a glicemia dos pacientes. Esse tipo de tecnologia contribui para o acompanhamento remoto, possibilitando intervenções mais oportunas e personalizadas.\nTecnologia leve-dura: a interação da equipe multiprofissional com os dados coletados no aplicativo pode ser considerada uma tecnologia leve-dura, pois combina um instrumento tecnológico (o aplicativo) com a interpretação e aplicação das informações pelos profissionais de saúde. Esse processo envolve o uso de conhecimentos técnico-científicos para avaliar e planejar intervenções individualizadas para os pacientes.\n\nb) Após a identificação dos tipos de tecnologia empregados, pode-se propor outra ação que utilize o mesmo nível tecnológico para fortalecer o cuidado aos pacientes com diabetes. Algumas possibilidades incluem: (0,75).\nOutra ação baseada em tecnologia leve: realização de visitas domiciliares pelos agentes comunitários de saúde. Essa estratégia fortalece o vínculo com os pacientes, permite identificar barreiras individuais ao cuidado e melhora a adesão às orientações.\nOutra ação baseada em tecnologia dura: implementação de um monitor contínuo de glicose para pacientes com dificuldade de controle glicêmico, permitindo um acompanhamento mais preciso das variações glicêmicas ao longo do dia. Essa tecnologia pode auxiliar na adaptação do tratamento e na prevenção de complicações.\nOutra ação baseada em tecnologia leve-dura: realização de uma palestra explicativa sobre a doença e fatores de risco.",deep:"⚙️ TECNOLOGIAS EM SAÚDE — CASO DA EQUIPE ESF E DIABETES\n\na) Classificação das tecnologias no caso:\n\n   🤝 Tecnologia LEVE (relacional)\n   → Rodas de conversa quinzenais\n   → Compartilhamento de angústias e melhoria do diálogo\n   → Fortalecimento do vínculo profissional-paciente\n\n   🔧 Tecnologia DURA (equipamento)\n   → Aplicativo de monitoramento glicêmico\n   → Instrumento tecnológico para coleta de dados\n\n   📚 Tecnologia LEVE-DURA (saber + instrumento)\n   → Equipe multiprofissional interpretando dados do app\n   → Combinação do instrumento com conhecimento técnico-científico\n\nb) Exemplos de outras ações (mesmo nível):\n\n   🤝 Leve → Visitas domiciliares pelo ACS para fortalecer vínculo\n   🔧 Dura → Monitor contínuo de glicose para controle preciso\n   📚 Leve-dura → Palestra explicativa sobre fatores de risco\n\n💡 MACETE:\n   Leve = RELAÇÃO (conversa, escuta)\n   Dura = APARELHO (app, monitor, glicosímetro)\n   Leve-dura = SABER aplicado COM instrumento"},
{n:3,disc:true,tema:"Níveis de Atenção — RAS",src:"FESAR",context:"(FESAR) Dona Maria, 68 anos, residente em \u00e1rea rural, com hipertens\u00e3o e DM2. Durante visita do ACS, relata cansa\u00e7o e incha\u00e7o nas pernas. \u00c9 encaminhada para a UBS, onde o m\u00e9dico solicita exames e ajusta medica\u00e7\u00e3o. Ap\u00f3s alguns dias, apresenta piora com falta de ar intensa. \u00c9 levada ao pronto-socorro do hospital municipal, diagnosticada com insufici\u00eancia card\u00edaca descompensada. Ap\u00f3s estabiliza\u00e7\u00e3o, \u00e9 encaminhada para UTI para monitoramento intensivo. Ap\u00f3s alta da UTI, \u00e9 transferida para a enfermaria para acompanhamento e reabilita\u00e7\u00e3o.",assertions:null,text:"Considerando o caso, descreva os respectivos níveis de atenção à saúde utilizados por Dona Maria, justificando com trechos do caso.",opts:[],g:null,exp:"O caso de Dona Maria ilustra a utilização dos três níveis de atenção à saúde na Rede de Atenção à Saúde (RAS), conforme proposto por Mendes (2011).\n\n1. Atenção Primária à Saúde (APS): (0,5)\nServiço: Unidade Básica de Saúde (UBS).\nJustificativa: \"Durante uma visita do agente comunitário de saúde (ACS), ela relata cansaço e inchaço nas pernas.\" O ACS a encaminha para a Unidade Básica de Saúde (UBS) mais próxima, onde o médico solicita exames e ajusta a medicação.\" A APS é a porta de entrada preferencial na RAS, responsável pelo acompanhamento contínuo das condições de saúde, ações de promoção e prevenção, e coordenação do cuidado.\n\nAtenção Secundária à Saúde: (0,5)\nServiço: Pronto-socorro do hospital municipal.\nJustificativa: \"Após alguns dias, Dona Maria apresenta piora do quadro, com falta de ar intensa. Ela é levada pela família ao pronto-socorro do hospital municipal, onde é diagnosticada com insuficiência cardíaca descompensada.\" A atenção secundária é caracterizada por serviços especializados, como pronto-socorro e ambulatórios, para casos que exigem maior complexidade e tecnologia.\n\nAtenção Terciária à Saúde: (0,5)\nServiço: Unidade de Terapia Intensiva (UTI) e enfermaria do hospital municipal.\nJustificativa: \"Após estabilização do quadro, ela é encaminhada para internação na Unidade de Terapia Intensiva (UTI) para monitoramento e tratamento intensivo. Após a alta da UTI, Dona Maria é transferida para a enfermaria, onde permanece por mais alguns dias para acompanhamento e reabilitação.\" A atenção terciária abrange serviços de alta complexidade, como UTIs e hospitais especializados, para casos graves que necessitam de intervenções intensivas e tecnologia avançada.",deep:"🏥 NÍVEIS DE ATENÇÃO — CASO DA DONA MARIA\n\nPercurso pelos 3 níveis da RAS:\n\n   🟢 Atenção Primária (APS)\n   → Visita do ACS: identificou cansaço e edema\n   → UBS: médico solicitou exames, ajustou medicação\n   → Porta de entrada, acompanhamento contínuo\n\n   🟡 Atenção Secundária\n   → Pronto-socorro do hospital municipal\n   → Diagnóstico: insuficiência cardíaca descompensada\n   → Serviço especializado para estabilização\n\n   🔴 Atenção Terciária\n   → UTI: monitoramento e tratamento intensivo\n   → Enfermaria: acompanhamento e reabilitação\n   → Alta complexidade tecnológica\n\nConceito-chave (Mendes, 2011):\n   → APS: acompanhamento contínuo, prevenção\n   → Secundária: serviços especializados\n   → Terciária: alta complexidade (UTI, cirurgias)\n\n💡 MACETE:\n   ACS + UBS = primária\n   Pronto-socorro = secundária\n   UTI + enfermaria hospitalar = terciária"},
{n:4,disc:false,tema:"Atribuições Comuns da ESF",src:"AFYA Itabuna",context:"(AFYA Itabuna) Na UBS do bairro Santa Clara, a ESF realiza diversas atividades:\n\nI. Acolhimento e escuta qualificada dos usu\u00e1rios.\nII. A\u00e7\u00f5es de promo\u00e7\u00e3o e preven\u00e7\u00e3o da sa\u00fade, como palestras sobre hipertens\u00e3o e diabetes.\nIII. Indica\u00e7\u00e3o de interna\u00e7\u00e3o hospitalar ou domiciliar, mantendo a responsabiliza\u00e7\u00e3o pelo acompanhamento.\nIV. Registro das informa\u00e7\u00f5es dos atendimentos nos prontu\u00e1rios eletr\u00f4nicos.\nV. Identifica\u00e7\u00e3o de fam\u00edlias em situa\u00e7\u00e3o de vulnerabilidade e encaminhamento para servi\u00e7os sociais.",assertions:null,text:"Assinale a alternativa que indica corretamente todas as atividades que são atribuições comuns a todos os profissionais da ESF.",opts:["II, IV e V.","I, II, IV e V.","I, II, III, IV e V.","I, II e III."],g:1,exp:"Resposta correta: apenas as atividades I, II, IV e V.\nA Equipe de Saúde da Família (ESF) é composta por diferentes profissionais, como médicos, enfermeiros, técnicos de enfermagem, agentes comunitários de saúde, dentistas e assistentes sociais. Embora cada categoria tenha atribuições específicas, algumas atividades são comuns a todos os profissionais da equipe:\nAcolhimento e escuta qualificada: todos os profissionais devem acolher os usuários e oferecer escuta qualificada, pois essa é uma diretriz fundamental da Atenção Primária à Saúde (APS).\nAções de promoção e prevenção da saúde: a promoção da saúde e a prevenção de doenças são responsabilidades de toda a equipe, sendo realizadas por meio de palestras, orientações individuais e atividades comunitárias.\nRegistro das informações nos prontuários eletrônicos: o correto preenchimento dos registros clínicos é essencial para garantir a continuidade do cuidado e é uma prática comum a todos os profissionais.\nIdentificação de famílias em situação de vulnerabilidade e encaminhamento: todos os membros da equipe devem estar atentos às condições sociais dos pacientes e encaminhá-los para assistência social, quando necessário.\nIndicar a necessidade de internação hospitalar ou domiciliar, mantendo a responsabilização pelo acompanhamento da pessoa: essa é uma atividade exclusiva de médicos, não sendo uma função comum a todos os membros da ESF.",deep:"📋 ATRIBUIÇÕES COMUNS vs ESPECÍFICAS — Portaria 2.436/2017\n\nAnálise das atividades:\n\n   ✅ I — Acolhimento e escuta qualificada\n   → Atribuição COMUM a todos os profissionais\n\n   ✅ II — Promoção e prevenção (palestras, educação)\n   → Atribuição COMUM a todos os profissionais\n\n   ❌ III — Indicar internação hospitalar/domiciliar\n   → Atribuição ESPECÍFICA DO MÉDICO\n   → NÃO é comum a todos\n\n   ✅ IV — Registro em prontuário eletrônico\n   → Atribuição COMUM a todos os profissionais\n\n   ✅ V — Identificar vulnerabilidade e encaminhar\n   → Atribuição COMUM a todos os profissionais\n\nResposta: I, II, IV e V (sem a III)\n\n💡 MACETE:\n   Indicar INTERNAÇÃO = só o MÉDICO pode\n   Quase tudo na AB é de TODOS → exceções = prescrever, indicar internação, procedimentos privativos"},
{n:5,disc:false,tema:"Redes de Atenção — RUE",src:"UNIDEP",context:"(UNIDEP) Um homem de 45 anos, alcoolizado, hipertenso, sofreu acidente de moto e foi socorrido pelo SAMU, sendo encaminhado para um hospital de refer\u00eancia. Na unidade hospitalar, recebeu atendimento na sala de emerg\u00eancia, foi estabilizado e posteriormente transferido para um hospital de maior complexidade devido \u00e0 gravidade das les\u00f5es.",assertions:null,text:"Com base na organização da Rede de Atenção à Saúde no Brasil, qual rede foi utilizada nesse atendimento?",opts:["Rede de Atenção às Doenças Crônicas (RADC) — voltada para acompanhamento e tratamento de condições como diabetes e hipertensão.","Rede de Urgência e Emergência (RUE) — organiza o atendimento pré-hospitalar e hospitalar para casos de urgência e emergência, garantindo acesso rápido e contínuo ao cuidado.","Rede de Atenção à Saúde das Pessoas com Deficiência (RASPcD) — estruturada para garantir atendimento especializado para reabilitação.","Rede de Atenção Psicossocial (RAPS) — responsável pelo cuidado de pacientes com transtornos mentais e uso abusivo de substâncias."],g:1,exp:"Resposta correta: O paciente utilizou serviços pré-hospitalares (SAMU), atendimento hospitalar de emergência e foi encaminhado para um hospital de maior complexidade, caracterizando o fluxo dentro da Rede de Urgência e Emergência (RUE). A Rede de Urgência e Emergência (RUE) tem como objetivo garantir atendimento rápido e organizado para casos de urgência e emergência, integrando serviços como o SAMU, UPAs, pronto-socorros e hospitais de referência.\n\nDistratores:\nA Rede de Atenção Psicossocial (RAPS) é voltada ao cuidado de pessoas com transtornos mentais e dependência química. Conta com CAPS, leitos psiquiátricos em hospitais gerais, residências terapêuticas e outros serviços de apoio. Um exemplo seria um paciente em crise de esquizofrenia que recebe atendimento em um CAPS e, se necessário, é encaminhado para internação.\nA Rede de Atenção às Doenças Crônicas (RADC) organiza o cuidado de pacientes com condições como diabetes, hipertensão e câncer, promovendo um acompanhamento contínuo. Inclui UBS, centros especializados e hospitais de referência. Um paciente hipertenso, por exemplo, pode ser acompanhado na UBS e encaminhado para um cardiologista caso haja complicações.\nPor fim, a Rede de Atenção à Saúde das Pessoas com Deficiência (RASPcD) atende pessoas com deficiência física, auditiva, visual e intelectual, oferecendo serviços de reabilitação e dispositivos assistivos, como próteses e órteses. Um exemplo seria um paciente com amputação que recebe prótese e reabilitação em um Centro Especializado em Reabilitação (CER).",deep:"🚑 REDES DE ATENÇÃO À SAÚDE — REDE DE URGÊNCIA E EMERGÊNCIA (RUE)\n\nO caso: acidente de moto → SAMU → hospital → hospital de maior complexidade\n\nA rede utilizada foi a RUE:\n   → SAMU: atendimento pré-hospitalar\n   → Hospital de referência: estabilização na emergência\n   → Hospital de maior complexidade: tratamento definitivo\n\nAs 5 redes temáticas do SUS:\n\n   🚑 RUE (Urgência e Emergência)\n   → SAMU, UPAs, pronto-socorros, hospitais\n\n   🧠 RAPS (Atenção Psicossocial)\n   → CAPS, leitos psiquiátricos, residências terapêuticas\n\n   💊 RADC (Doenças Crônicas)\n   → Acompanhamento de HAS, DM, câncer\n\n   ♿ RASPcD (Pessoas com Deficiência)\n   → CER, próteses, reabilitação\n\n   🤰 Rede Cegonha / Materno-infantil\n   → Pré-natal, parto, puerpério\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → RADC é para doenças crônicas (HAS é crônica, mas o evento é agudo)\n   C → RASPcD é para reabilitação de deficiências\n   D → RAPS é para transtornos mentais (alcoolismo é crônico, mas o evento é trauma)\n\n💡 MACETE:\n   Acidente/trauma/emergência = RUE (sempre!)\n   A rede é definida pelo EVENTO, não pela comorbidade"},
{n:6,disc:false,tema:"Densidades Tecnológicas — APS",src:"UNISL Porto Velho",context:"(UNISL Porto Velho) Pedro, 33 anos, buscou atendimento na UBS ap\u00f3s sofrer uma queda resultante de um ataque de cachorro, referindo apenas precisar de alguns curativos nas m\u00e3os e membros inferiores. Foi realizada a higieniza\u00e7\u00e3o das les\u00f5es, a notifica\u00e7\u00e3o compuls\u00f3ria e as devidas orienta\u00e7\u00f5es.",assertions:null,text:"Com base no relato, pode-se afirmar que o nível de atenção e densidade tecnológica no atendimento de Pedro foi de:",opts:["Atenção terciária e alta densidade tecnológica.","Atenção secundária e baixa densidade tecnológica.","Atenção primária e baixa densidade tecnológica.","Atenção secundária e intermediária densidade tecnológica."],g:2,exp:"O atendimento de Pedro ocorreu na Unidade Básica de Saúde (UBS), caracterizando um nível de atenção primário. O cuidado prestado envolveu procedimentos de baixa complexidade, como higienização das lesões, curativos, notificação compulsória e orientações.\n\n1. Atenção Primária → UBS é a porta de entrada do SUS e realiza ações de promoção, prevenção e pequenos atendimentos clínicos.\n2. Baixa densidade tecnológica → O atendimento foi baseado em tecnologias leves (acolhimento, escuta e orientação) e leve-duras (protocolos e notificação obrigatória), sem necessidade de exames sofisticados ou equipamentos complexos (tecnologias duras).\n\nCaso Pedro necessitasse de suturas complexas, antibióticos intravenosos, exames complementares ou ainda cirurgias, poderia ser encaminhado para um serviço de média ou alta complexidade (UPA ou hospital).\n\nNíveis de atenção: são arranjos produtivos conformados segundo as densidades tecnológicas singulares, variando do nível de menor densidade (APS), ao de densidade tecnológica intermediária (atenção secundária à saúde), até o de maior densidade tecnológica (atenção terciária à saúde).",deep:"🏥 ATENÇÃO PRIMÁRIA E DENSIDADE TECNOLÓGICA — CASO DO PEDRO\n\nO atendimento:\n   → Local: UBS (Atenção Primária)\n   → Procedimentos: higienização, curativos, notificação compulsória, orientações\n   → Todos de BAIXA complexidade\n\nClassificação:\n   → Nível de atenção: PRIMÁRIO (UBS)\n   → Densidade tecnológica: BAIXA\n\nTecnologias utilizadas:\n   🤝 Leve → acolhimento, escuta, orientação\n   📚 Leve-dura → protocolo de notificação compulsória\n   → NÃO houve necessidade de tecnologia dura sofisticada\n\nSe Pedro precisasse de sutura complexa, antibióticos IV ou cirurgia:\n   → Seria encaminhado para UPA (secundária) ou hospital (terciária)\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Atenção terciária = alta densidade (hospitais, UTI)\n   B → Atenção secundária com BAIXA densidade não existe (secundária = intermediária)\n   D → Atenção secundária com intermediária está em desacordo com o cenário\n\n💡 MACETE:\n   UBS = sempre PRIMÁRIA + BAIXA densidade\n   Procedimentos simples (curativo, orientação) confirmam isso"},
{n:7,disc:false,tema:"Sistema Fragmentado vs RAS",src:"FMIT",context:"(FMIT) Uma paciente de 58 anos, com DM2 e HAS, procura a UBS devido a descontrole glic\u00eamico e aumento da PA. O m\u00e9dico prescreve medica\u00e7\u00e3o, solicita exames e encaminha para endocrinologista. Semanas depois, a paciente relata dificuldades para agendar a consulta com o especialista e obter retorno sobre seus exames. Ao buscar atendimento em um pronto-socorro para crise hipertensiva, foi prescrito um medicamento ao qual a paciente possui alergia.",assertions:null,text:"Assinale a alternativa que representa o modelo de organização do sistema de saúde aplicado no caso da paciente.",opts:["Sistema universal, pois a paciente tem acesso ao atendimento, independentemente da dificuldade de comunicação entre os serviços.","Sistema de Rede de Atenção à Saúde, pois a paciente foi encaminhada a um especialista e recebida na UBS, garantindo a integralidade.","Sistema fragmentado, pois há descontinuidade no cuidado, falta de integração entre os serviços e dificuldades no acesso ao especialista.","Sistema de atenção primária integrado, pois a UBS garantiu o atendimento inicial e realizou os encaminhamentos necessários."],g:2,exp:"Resposta correta:\nSistema fragmentado, pois há descontinuidade no cuidado, falta de integração entre os serviços e dificuldades no acesso ao especialista, está correto porque descreve uma situação comum de fragmentação no sistema de saúde, que pode ser observada no caso do paciente.\n\nO caso apresenta:\n1. Descontinuidade sem cuidado: A descontinuidade do cuidado ocorre quando há uma quebra na sequência dos atendimentos ou falta de acompanhamento contínuo, o que prejudica o tratamento adequado do paciente.\n2. Falta de integração entre os serviços: A falta de integração entre os serviços é uma característica de sistemas fragmentados de saúde. O sistema deveria ser mais coeso e permitir uma troca de informações entre os diferentes níveis de atendimento (Unidade Básica de Saúde, pronto-socorro, especialistas).\n3. Dificuldades no acesso a especialistas: A dificuldade que a paciente tem para agendar uma consulta com o endocrinologista reflete uma barreira no acesso a especialistas, o que também é um indicativo de fragmentação.\n\nDistratores:\nEmbora a paciente tenha sido encaminhada a um especialista, isso por si só não significa que há uma Rede de Atenção à Saúde (RAS) funcionando. As redes de atenção são detalhadas pela coordenação do cuidado, comunicação entre serviços e continuidade no acompanhamento. No caso apresentado, há falhas no fluxo entre os pontos de atenção, evidenciando um sistema fragmentado.\nO fato de um paciente ter acesso ao atendimento não indica que o sistema seja universal no sentido estrutural e funcional. A universalidade, um dos princípios do SUS, refere-se ao direito de todos ao acesso à saúde, mas não garante, por si só, que o sistema seja bem organizado ou eficiente.\nA Atenção Primária à Saúde (APS) tem papel essencial na resolutividade do cuidado, mas sua atuação não pode ser entendida isoladamente. Nesse caso descrito, não se conseguiu garantir a continuidade do cuidado, nem a comunicação entre os diferentes níveis.",deep:"🔗 SISTEMA FRAGMENTADO — CASO DA PACIENTE COM DM2 E HAS\n\nIndicadores de fragmentação no caso:\n\n   ❌ Descontinuidade do cuidado\n   → Dificuldade para agendar com especialista\n   → Sem retorno sobre exames\n\n   ❌ Falta de integração entre serviços\n   → PS prescreveu medicamento ao qual tem ALERGIA\n   → Informações não foram compartilhadas entre os serviços\n\n   ❌ Barreira de acesso ao especialista\n   → Demora no agendamento do endocrinologista\n\nSistema FRAGMENTADO vs RAS:\n   Fragmentado → serviços isolados, sem comunicação\n   RAS → serviços integrados, APS coordenando o fluxo\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Ter acesso NÃO significa que o sistema funciona bem\n   B → Encaminhamento sem continuidade NÃO é RAS funcionando\n   D → A APS NÃO garantiu continuidade no caso\n\n💡 MACETE:\n   Prescrever remédio que o paciente tem ALERGIA = falta de integração = FRAGMENTADO\n   Se os serviços conversassem, esse erro não aconteceria"},
{n:8,disc:false,tema:"Financiamento — Portaria 3.493/2024",src:"UNIDEP",context:"(UNIDEP) Na UBS do munic\u00edpio de S\u00e3o Jos\u00e9, a Dra. Fernanda realiza atendimento cont\u00ednuo de pacientes cr\u00f4nicos. Antes da Portaria GM/MS n\u00ba 3.493/2024, a UBS recebia recursos do Previne Brasil.\n\nI - Componente fixo para manuten\u00e7\u00e3o das equipes de Sa\u00fade da Fam\u00edlia.\nII - Componente de v\u00ednculo e acompanhamento territorial para as eSF e eAP.\nIII - Componente per capita de base populacional para a\u00e7\u00f5es no \u00e2mbito da APS.\nIV - Componente para Aten\u00e7\u00e3o \u00e0 Sa\u00fade Bucal.",assertions:null,text:"Está correto apenas o que se afirma em:",opts:["I, II, III e IV.","I e IV.","II e III.","I, II e III."],g:0,exp:"Do cofinanciamento federal do Piso de Atenção Primária à Saúde (NR)\n\"Art. 9º O cofinanciamento federal de apoio à manutenção da Atenção Primária à Saúde (APS) será constituído por:\nI - componente fixo para manutenção das equipes de Saúde da Família - eSF e das equipes de Atenção Primária - eAP e recurso de implantação para eSF, eAP, equipes de Saúde Bucal - eSB e equipes Multiprofissionais - eMulti;\nII - componente de vínculo e acompanhamento territorial para as eSF e eAP;\nIII - componente de qualidade para as eSF, eAP, eSB e eMulti;\nIV - componente para implantação e manutenção de programas, serviços, profissionais e outras composições de equipes que atuam na APS;\nV - componente para Atenção à Saúde Bucal; e\nVI - componente per capita de base populacional para ações no âmbito da APS.",deep:"💰 COFINANCIAMENTO FEDERAL DA APS — Portaria GM/MS 3.493/2024\n\nArt. 9º — Os 6 componentes do novo modelo:\n\n   I → Componente FIXO para manutenção de eSF e eAP + recurso de implantação\n   II → Componente de VÍNCULO e acompanhamento territorial (eSF e eAP)\n   III → Componente de QUALIDADE (eSF, eAP, eSB, eMulti)\n   IV → Componente para implantação e manutenção de programas e serviços\n   V → Componente para SAÚDE BUCAL\n   VI → Componente PER CAPITA de base populacional\n\nAs 4 afirmativas da questão:\n   ✅ I → Corresponde ao componente I (fixo)\n   ✅ II → Corresponde ao componente II (vínculo)\n   ✅ III → Corresponde ao componente VI (per capita)\n   ✅ IV → Corresponde ao componente V (saúde bucal)\n   → Todas estão corretas\n\n💡 MACETE:\n   O novo modelo substituiu o Previne Brasil\n   Capitação ponderada → virou \"vínculo e acompanhamento territorial\"\n   Pagamento por desempenho → virou \"componente de qualidade\""},
{n:9,disc:false,tema:"Equipes da Atenção Básica",src:"UNIGRANRIO Barra",context:"(UNIGRANRIO Barra) Uma UBS atende diariamente a uma popula\u00e7\u00e3o adscrita e conta com diferentes composi\u00e7\u00f5es de equipe.\n\nI \u2013 A eSF \u00e9 composta, no m\u00ednimo, por m\u00e9dico, enfermeiro, t\u00e9cnico ou auxiliar de enfermagem e ACS, podendo ser ampliada.\nII \u2013 A eAB pode atuar em UBSs, com composi\u00e7\u00e3o mais flex\u00edvel, n\u00e3o exigindo a presen\u00e7a de ACS.\nIII \u2013 A eABP \u00e9 uma equipe multiprofissional cadastrada no CNES, com responsabilidade pela aten\u00e7\u00e3o integral \u00e0 sa\u00fade das pessoas privadas de liberdade.\nIV \u2013 A eSB modalidade I \u00e9 composta por cirurgi\u00e3o-dentista e auxiliar ou t\u00e9cnico em sa\u00fade bucal.",assertions:null,text:"É correto apenas o que se afirma em:",opts:["II e III.","I, II, III e IV.","I, II e IV.","I e II."],g:1,exp:"A afirmativa I está correta, pois a eSF é a base do modelo da UBS, com composição mínima obrigatória de 1 médico, 1 enfermeiro e 1 auxiliar ou técnico de enfermagem. (PNAB 2017, seção 3.4.1, p. 10).\nA afirmativa II está correta. A eAB pode atuar na USF e tem composição flexível, sem necessidade obrigatória de ACS. (PNAB 2017, seção 3.4.2, p. 10).\nA afirmativa III está correta, pois a equipe de Atenção Básica Prisional (eABP) trata-se de uma equipe multiprofissional. Ela deve estar cadastrada no Sistema Nacional de Estabelecimentos de Saúde vigente, e com responsabilidade de articular e prestar atenção integral à saúde das pessoas privadas de liberdade. (PNAB 2017, seção 3.6.1, p. 14).\nA afirmativa IV está correta. A eSB pode estar vinculada a uma eSF e atuar na USF, sendo composta por cirurgião-dentista e auxiliar/técnico em saúde bucal. (PNAB 2017, seção 3.4.3, p. 10).\nPortanto, a alternativa correta é a 4ª, pois todas as afirmativas estão de acordo com a PNAB 2017.",deep:"👥 COMPOSIÇÃO DAS EQUIPES NA PNAB — Portaria 2.436/2017\n\nAnálise das afirmativas:\n\n   ✅ I — eSF (Equipe de Saúde da Família)\n   → Composição mínima: médico + enfermeiro + aux/téc enfermagem + ACS\n   → Pode ser ampliada com outros profissionais\n\n   ✅ II — eAB (Equipe de Atenção Básica)\n   → Composição mais flexível\n   → SEM obrigatoriedade de ACS\n   → Para ampliar acesso à APS\n\n   ✅ III — eABP (Equipe de Atenção Básica Prisional)\n   → Equipe multiprofissional\n   → Cadastrada no CNES\n   → Atenção integral à saúde de pessoas privadas de liberdade\n\n   ✅ IV — eSB modalidade I (Equipe de Saúde Bucal)\n   → Cirurgião-dentista + auxiliar ou técnico em saúde bucal\n   → Pode se vincular à eSF\n\nTodas corretas → resposta: I, II, III e IV\n\n💡 MACETE:\n   eSF = com ACS obrigatório (equipe completa)\n   eAB = sem ACS obrigatório (equipe flexível)\n   eABP = prisional (mesmo princípio, população específica)\n   eSB = saúde bucal (dentista + auxiliar/técnico)"},
{n:10,disc:false,tema:"Diretrizes da PNAB — Coordenação do Cuidado",src:"UNIDEP",context:"(UNIDEP) Uma m\u00e9dica da UBS atende um paciente com sintomas que indicam a necessidade de um especialista. Ap\u00f3s a consulta, ela encaminha o paciente para o especialista apropriado e organiza um retorno para a UBS ap\u00f3s a consulta especializada, garantindo a continuidade do cuidado.",assertions:null,text:"Assinale a alternativa que corresponde à diretriz da PNAB contemplada nesse caso.",opts:["Participação da comunidade.","Coordenação do cuidado.","Integralidade.","Universalidade."],g:1,exp:"Coordenação do cuidado. Errada. A universalidade refere-se ao direito de acesso de toda a população aos serviços de saúde, porém é um princípio da PNAB, não uma diretriz.\nCoordenação do cuidado. Correta. A coordenação do cuidado está sendo claramente contemplada, pois a médica organiza o encaminhamento ao especialista e garante a continuidade do acompanhamento, integrando o cuidado entre os diferentes níveis de atenção.\nUniversalidade. Errada. A integralidade se refere ao cuidado completo e contínuo, porém é um princípio da PNAB, não uma diretriz.\nParticipação da comunidade. Errada. A participação da comunidade não é abordada no caso, pois não há menção à participação ativa da comunidade no cuidado ao paciente.",deep:"🎯 DIRETRIZES DA PNAB — COORDENAÇÃO DO CUIDADO\n\nO caso: médica encaminha ao especialista + organiza retorno à UBS\n\nA diretriz contemplada é a COORDENAÇÃO DO CUIDADO:\n   → Organizar o fluxo entre níveis de atenção\n   → Garantir continuidade do acompanhamento\n   → APS como centro de comunicação da RAS\n\nAtenção à pegadinha da questão:\n   → A resposta comentada do PDF indica que a resposta correta é \"Coordenação do cuidado\"\n   → Mas o gabarito oficial marca \"Integralidade\" como correta\n   → Há uma inconsistência no PDF (a explicação fala de coordenação, mas o gabarito marca integralidade)\n\nDiferença entre conceitos:\n   📜 Princípios: Universalidade, Equidade, Integralidade\n   📋 Diretrizes: Coordenação do cuidado, Resolutividade, Ordenação da rede, etc.\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Participação da comunidade: não há menção a participação comunitária\n   B → Coordenação do cuidado: é o que MAIS se encaixa pela descrição, porém gabarito marca C\n   D → Universalidade: é princípio, não diretriz\n\n💡 MACETE:\n   Encaminhar + garantir retorno = COORDENAÇÃO DO CUIDADO\n   Universalidade e Integralidade são PRINCÍPIOS, não diretrizes"}
];

const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp.replace(/\n/g,'<br>')+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}

  <script>
const PROVA_ID = 'iesc2-2025-1';
const PERIODO = 2;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

// ── localStorage ──
function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Supabase ──
const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

// ── Interceptar uma vez só ──
const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

// ── Restaurar estado ──
if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
</script>
