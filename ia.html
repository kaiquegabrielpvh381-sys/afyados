<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Afyados v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--p-pink:#D6006E;--p-glow:rgba(214,0,110,0.3);--bg:#08050A;--card:#120B1A;--border:rgba(255,255,255,0.1);--text:#F4EFFA;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;height:100vh;}

        /* Chat Area */
        .chat-container{flex:1;display:flex;flex-direction:column;position:relative;background:radial-gradient(circle at top right, #1A0B26, transparent);}
        #chat-flow{flex:1;overflow-y:auto;padding:40px 20% 150px;display:flex;flex-direction:column;gap:35px;scroll-behavior:smooth;}
        
        .msg{display:flex;gap:15px;max-width:100%;animation:up 0.4s ease;}
        .msg.user{flex-direction:row-reverse;}
        .avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
        .bot .avatar{background:linear-gradient(135deg,var(--p-pink),#8A00D4);box-shadow:0 0 15px var(--p-glow);}
        
        .content{max-width:85%;line-height:1.8;font-size:15.5px;}
        .user .content{background:var(--p-pink);padding:14px 20px;border-radius:20px 20px 2px 20px;box-shadow:0 5px 20px var(--p-glow);}

        /* Markdown Styling */
        .content h3{margin:25px 0 12px;color:#FF409F;font-size:20px;border-left:4px solid var(--p-pink);padding-left:15px;}
        .content p{margin-bottom:15px;}
        .content img{width:100%;border-radius:18px;margin:20px 0;border:1px solid var(--border);box-shadow:0 15px 45px rgba(0,0,0,0.7);}

        /* Input Bar */
        .input-area{position:absolute;bottom:40px;left:20%;right:20%;background:rgba(18,11,26,0.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:22px;padding:12px 25px;display:flex;align-items:center;gap:15px;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
        #prompt-input{flex:1;background:transparent;border:none;color:white;outline:none;font-size:16px;resize:none;max-height:120px;}
        .send-btn{background:var(--p-pink);border:none;width:48px;height:48px;border-radius:14px;color:white;cursor:pointer;transition:0.3s;font-size:22px;}
        .send-btn:hover{transform:scale(1.05) rotate(-5deg);background:#FF1A8E;}

        @keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-flow">
        <div class="msg bot">
            <div class="avatar">🤖</div>
            <div class="content"><h3>Olá, Doutor(a)!</h3><p>O cérebro da <strong>Afyados v2.0</strong> está online. Como posso auxiliar em seu raciocínio clínico hoje?</p></div>
        </div>
    </div>
    <div class="input-area">
        <textarea id="prompt-input" placeholder="Caso clínico ou dúvida técnica..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" onclick="ask()">➤</button>
    </div>
</div>

<script>
let chatHistory = [];

function parseMD(text) {
    return text
        .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" onerror="this.src=\'https://images.unsplash.com/photo-1576086213369-97a306d36557?q=80&w=800\'">')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^(#{1,4})\s+(.*)$/gm, '<h3>$2</h3>')
        .split('\n').map(l => {
            const t = l.trim();
            if(!t) return '';
            if(t.startsWith('<h') || t.startsWith('<img')) return t;
            return `<p>${t}</p>`;
        }).join('');
}

async function ask() {
    const input = document.getElementById('prompt-input');
    const text = input.value.trim();
    if(!text) return;

    input.value = ''; input.style.height = 'auto';
    addMessage('user', text);
    chatHistory.push({role: 'user', content: text});

    const flow = document.getElementById('chat-flow');
    const botMsg = document.createElement('div');
    botMsg.className = 'msg bot';
    botMsg.innerHTML = `<div class="avatar">🤖</div><div class="content"></div>`;
    flow.appendChild(botMsg);
    const contentDiv = botMsg.querySelector('.content');

    try {
        const r = await fetch('https://afyados-backend.onrender.com/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ messages: chatHistory })
        });

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            fullText += decoder.decode(value, {stream: true});
            contentDiv.innerHTML = parseMD(fullText);
            flow.scrollTop = flow.scrollHeight;
        }
        chatHistory.push({role: 'assistant', content: fullText});
    } catch (e) { contentDiv.innerHTML = "Erro de conexão com o servidor."; }
}

function addMessage(role, text) {
    const flow = document.getElementById('chat-flow');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="avatar">${role==='user'?'👤':'🤖'}</div><div class="content">${role==='user'?text:parseMD(text)}</div>`;
    flow.appendChild(div);
    flow.scrollTop = flow.scrollHeight;
}
</script>
</body>
</html>
