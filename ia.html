<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Afyados | Consultoria Acadêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-glow:rgba(214,0,110,0.2);--bg:#0C0810;--sidebar:#100D16;--card:#1A1226;--border:rgba(255,255,255,0.07);--text:#F4EFFA;--muted:#7060A0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

        /* SIDEBAR */
        .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:0.3s;}
        .sb-top{padding:20px;border-bottom:1px solid var(--border);}
        .new-btn{width:100%;background:var(--pink);color:white;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;transition:0.2s;}
        .new-btn:hover{background:var(--pink-bright);transform:scale(1.02);}
        
        .hist-wrap{flex:1;overflow-y:auto;padding:15px;}
        .conv{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:5px;font-size:13px;color:var(--muted);transition:0.2s;display:flex;justify-content:space-between;align-items:center;}
        .conv:hover{background:var(--card);color:white;}
        .conv.active{background:var(--card);color:var(--pink-bright);border:1px solid rgba(214,0,110,0.3);}

        /* MAIN AREA */
        .main{flex:1;display:flex;flex-direction:column;position:relative;}
        .topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 25px;justify-content:space-between;background:rgba(12,8,16,0.8);backdrop-filter:blur(10px);z-index:10;}
        
        /* CHAT AREA */
        #messages{flex:1;overflow-y:auto;padding:30px 15% 100px;display:flex;flex-direction:column;gap:25px;scroll-behavior:smooth;}
        .msg-row{display:flex;gap:15px;max-width:100%;animation:fadeIn 0.3s ease;}
        .msg-row.user{flex-direction:row-reverse;}
        .msg-av{width:35px;height:35px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
        .bot .msg-av{background:linear-gradient(135deg,var(--pink),#9B00E8);}
        .user .msg-av{background:var(--card);border:1px solid var(--border);}
        
        .msg-text{max-width:85%;line-height:1.7;font-size:15px;color:var(--text);}
        .user .msg-text{background:var(--pink);padding:12px 18px;border-radius:15px 15px 2px 15px;color:white;}
        
        /* MARKDOWN STYLING */
        .msg-text h3{margin:15px 0 10px;color:var(--pink-bright);font-size:18px;}
        .msg-text strong{color:white;font-weight:700;}
        .msg-text p{margin-bottom:12px;}
        .msg-text ul{margin:10px 0 15px 20px;}
        .msg-text li{margin-bottom:5px;}

        /* INPUT AREA */
        .input-wrap{position:absolute;bottom:30px;left:15%;right:15%;background:var(--card);border:1px solid var(--border);border-radius:15px;display:flex;align-items:center;padding:10px 15px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
        #inputBox{flex:1;background:transparent;border:none;color:white;outline:none;padding:10px;font-size:15px;resize:none;max-height:150px;}
        .send-btn{background:var(--pink);border:none;width:40px;height:40px;border-radius:10px;color:white;cursor:pointer;transition:0.2s;}
        .send-btn:hover{background:var(--pink-bright);}

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @media(max-width:768px){ #messages{padding:20px 15px 100px;} .input-wrap{left:10px;right:10px;} }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-top"><button class="new-btn" onclick="newChat()">+ Nova Conversa</button></div>
    <div class="hist-wrap" id="histList"></div>
    <div style="padding:20px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); text-align:center;">
        Sócios: Alberto, Ana Luiza, Davi, Lud
    </div>
</div>

<div class="main">
    <div class="topbar">
        <span id="topTitle">IA Afyados</span>
        <button onclick="clearChat()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:5px; cursor:pointer;">Limpar</button>
    </div>
    <div id="messages">
        <div class="msg-row bot">
            <div class="msg-av">🤖</div>
            <div class="msg-text">Olá! Sou a <strong>IA Afyados</strong>. Como posso ajudar nos seus estudos de medicina hoje?</div>
        </div>
    </div>
    <div class="input-wrap">
        <textarea id="inputBox" placeholder="Pergunte sobre SOI, APG, Anatomia..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
let convs={}, curId=null, busy=false, hist=[];

function load(){ convs=JSON.parse(localStorage.getItem('afy_c')||'{}'); renderHist(); }
function save(){ localStorage.setItem('afy_c',JSON.stringify(convs)); }

function renderHist(){
    const list=document.getElementById('histList');
    const ids=Object.keys(convs).sort((a,b)=>b.localeCompare(a));
    list.innerHTML = ids.map(id=> `<div class="conv ${id===curId?'active':''}" onclick="loadConv('${id}')">${convs[id].title} <span onclick="event.stopPropagation();delConv('${id}')">✕</span></div>`).join('');
}
