<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Afyados | Consultoria Acadêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-glow:rgba(214,0,110,0.2);--bg:#0C0810;--sidebar:#100D16;--card:#1A1226;--border:rgba(255,255,255,0.07);--text:#F4EFFA;--muted:#7060A0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

        .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .sb-top{padding:20px;border-bottom:1px solid var(--border);}
        .new-btn{width:100%;background:var(--pink);color:white;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;transition:0.2s;}
        
        #messages{flex:1;overflow-y:auto;padding:30px 15% 120px;display:flex;flex-direction:column;gap:25px;}
        .msg-row{display:flex;gap:15px;animation:fadeIn 0.3s ease;}
        .msg-row.user{flex-direction:row-reverse;}
        .msg-av{width:35px;height:35px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .bot .msg-av{background:linear-gradient(135deg,var(--pink),#9B00E8);}
        .user .msg-av{background:var(--card);border:1px solid var(--border);}
        
        .msg-text{max-width:85%;line-height:1.7;font-size:15px;color:var(--text);}
        .user .msg-text{background:var(--pink);padding:12px 18px;border-radius:15px 15px 2px 15px;color:white;}
        
        /* ESTILO MÉDICO AFYADOS */
        .msg-text h3{margin:15px 0 10px;color:var(--pink-bright);font-size:18px; font-weight: 800;}
        .msg-text strong{color:white;font-weight:700;}
        .msg-text p{margin-bottom:12px;}
        .msg-text img{max-width:100%; border-radius:12px; margin: 15px 0; border: 1px solid var(--border);}

        .input-wrap{position:absolute;bottom:30px;left:15%;right:15%;background:var(--card);border:1px solid var(--border);border-radius:15px;display:flex;padding:10px 15px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
        #inputBox{flex:1;background:transparent;border:none;color:white;outline:none;padding:10px;font-size:15px;resize:none;max-height:150px;}
        .send-btn{background:var(--pink);border:none;width:42px;height:42px;border-radius:10px;color:white;cursor:pointer;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-top"><button class="new-btn" onclick="location.reload()">+ Nova Conversa</button></div>
    <div style="flex:1; padding:20px; font-size:12px; color:var(--muted);">Alberto, Ana Luiza, Davi, Lud</div>
</div>

<div class="main" style="flex:1; display:flex; flex-direction:column; position:relative;">
    <div id="messages">
        <div class="msg-row bot">
            <div class="msg-av">🤖</div>
            <div class="msg-text"><h3>Bem-vindo, Doutor(a)!</h3><p>Mande sua dúvida técnica de medicina.</p></div>
        </div>
    </div>
    <div class="input-wrap">
        <textarea id="inputBox" placeholder="Pergunte aqui..." rows="1"></textarea>
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
let busy=false, hist=[];

function md(t) {
    return t.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^(#{1,4})\s+(.*)$/gm, '<h3>$2</h3>')
            .split('\n').map(l => l.trim() ? `<p>${l}</p>` : '').join('');
}

async function send() {
    if(busy) return;
    const inp = document.getElementById('inputBox');
    const text = inp.value.trim();
    if(!text) return;

    inp.value=''; renderMsg('user', text);
    hist.push({role:'user', content:text});
    
    busy=true;
    const msgsDiv = document.getElementById('messages');
    const row = document.createElement('div');
    row.className='msg-row bot';
    row.innerHTML=`<div class="msg-av">🤖</div><div class="msg-text"></div>`;
    msgsDiv.appendChild(row);
    const textDiv = row.querySelector('.msg-text');

    try {
        const r = await fetch('https://afyados-backend.onrender.com/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ messages: hist })
        });

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let reply = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            reply += decoder.decode(value, {stream: true});
            textDiv.innerHTML = md(reply);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }
        hist.push({role:'assistant', content:reply});
    } catch (e) { textDiv.innerHTML="Erro de conexão."; }
    busy=false;
}

function renderMsg(role, text) {
    const msgsDiv = document.getElementById('messages');
    const row = document.createElement('div');
    row.className=`msg-row ${role==='user'?'user':'bot'}`;
    row.innerHTML=`<div class="msg-av">${role==='user'?'👤':'🤖'}</div><div class="msg-text">${role==='user'?text:md(text)}</div>`;
    msgsDiv.appendChild(row);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
}
</script>
</body>
</html>
