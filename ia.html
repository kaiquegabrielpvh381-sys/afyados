<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--glow:rgba(214,0,110,0.3);--bg:#08050A;--card:#120B1A;--sidebar:#0D0814;--border:rgba(255,255,255,0.08);--text:#F4EFFA;--muted:#6e6080;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);display:flex;}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;z-index:100;}
.sb-top{padding:14px 10px 10px;}
.logo-row{display:flex;align-items:center;gap:10px;padding:8px 10px;text-decoration:none;color:white;}
.new-btn{background:rgba(214,0,110,.1);border:1px solid rgba(214,0,110,.2);color:var(--text);padding:10px;border-radius:10px;cursor:pointer;width:100%;font-weight:600;margin-top:10px;}
.hist-wrap{flex:1;overflow-y:auto;padding:10px;color:var(--muted);font-size:12px;}
.sb-bot{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.sb-link{color:var(--muted);text-decoration:none;font-size:13px;padding:10px;border-radius:9px;transition:0.2s;}
.sb-link:hover{background:rgba(255,255,255,0.05);color:white;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;background:radial-gradient(circle at top right,#1A0B26,transparent);}
.chat-flow{flex:1;overflow-y:auto;padding:40px 15%;display:flex;flex-direction:column;gap:20px;}
.input-area{padding:20px 15%;display:flex;gap:10px;background:rgba(8,5,10,0.8);backdrop-filter:blur(10px);}
.input-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px;color:white;outline:none;}
.send-btn{background:var(--pink);border:none;width:50px;border-radius:12px;color:white;cursor:pointer;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-top">
    <a href="#" class="logo-row">
      <div style="background:var(--pink);padding:5px;border-radius:8px;">🤖</div>
      <span style="font-weight:800;">Afyados IA</span>
    </a>
    <button class="new-btn" onclick="location.reload()">+ Nova conversa</button>
  </div>
  <div class="hist-wrap">Histórico de conversas aparecerá aqui...</div>
  <div class="sb-bot">
    <a href="afyados_v2_30.html" class="sb-link">← Voltar ao site</a>
  </div>
</div>

<div class="main">
  <div class="chat-flow">
    <div style="background:var(--card);padding:20px;border-radius:15px;border-left:4px solid var(--pink);">
      <h3 style="color:var(--pink);">Olá, Doutor(a)!</h3>
      <p style="color:var(--muted);">Como posso auxiliar em seu raciocínio clínico hoje?</p>
    </div>
  </div>
  <div class="input-area">
    <textarea class="input-box" placeholder="Digite sua dúvida ou caso clínico..." rows="1"></textarea>
    <button class="send-btn">➤</button>
  </div>
</div>

</body>
</html>
