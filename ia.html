<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Afyados | Consultoria Acadêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--pink:#D6006E;--pink-bright:#FF1A7E;--bg:#0C0810;--sidebar:#100D16;--card:#1A1226;--border:rgba(255,255,255,0.07);--text:#F4EFFA;--muted:#7060A0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

        /* SIDEBAR */
        .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:0.3s;}
        .sb-top{padding:20px;border-bottom:1px solid var(--border);}
        .new-btn{width:100%;background:var(--pink);color:white;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;transition:0.2s;}
        .new-btn:hover{background:var(--pink-bright);transform:scale(1.02);}
        
        /* MAIN AREA */
        .main{flex:1;display:flex;flex-direction:column;position:relative;}
        #messages{flex:1;overflow-y:auto;padding:30px 15% 120px;display:flex;flex-direction:column;gap:25px;scroll-behavior:smooth;}
        
        .msg-row{display:flex;gap:15px;max-width:100%;animation:fadeIn 0.3s ease;}
        .msg-row.user{flex-direction:row-reverse;}
        .msg-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
        .bot .msg-av{background:linear-gradient(135deg,var(--pink),#9B00E8);box-shadow:0 0 15px var(--pink);}
        .user .msg-av{background:var(--card);border:1px solid var(--border);}
        
        .msg-text{max-width:85%;line-height:1.8;font-size:15px;color:var(--text);}
        .user .msg-text{background:var(--pink);padding:12px 18px;border-radius:18px 18px 2px 18px;color:white;box-shadow:0 4px 15px rgba(214,0,110,0.3);}
        
        /* FORMATAÇÃO MÉDICA */
        .msg-text h3{margin:20px 0 10px;color:var(--pink-bright);font-size:20px;font-weight:800;border-left:4px solid var(--pink);padding-left:12px;}
        .msg-text strong{color:white;font-weight:700;}
        .msg-text p{margin-bottom:15px;}
        .msg-text ul, .msg-text ol{margin:10px 0 20px 25px;}
        .msg-text li{margin-bottom:8px;}
        .msg-text img{max-width:100%;border-radius:15px;margin:20px 0;border:2px solid var(--border);display:block;box-shadow:0 10px 30px rgba(0,0,0,0.5);}

        /* INPUT */
        .input-wrap{position:absolute;bottom:30px;left:15%;right:15%;background:var(--card);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;padding:12px 20px;box-shadow:0 20px 50px rgba(0,0,0,0.6);backdrop-filter:blur
