<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Afyados | Consultoria Acadêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--pink:#D6006E;--pink-bright:#FF1A7E;--bg:#0C0810;--sidebar:#100D16;--card:#1A1226;--border:rgba(255,255,255,0.08);--text:#F4EFFA;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

        .sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .sb-top{padding:20px;border-bottom:1px solid var(--border);}
        .new-btn{width:100%;background:var(--pink);color:white;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;}
        
        .main{flex:1;display:flex;flex-direction:column;position:relative;}
        #messages{flex:1;overflow-y:auto;padding:30px 18% 120px;display:flex;flex-direction:column;gap:30px;scroll-behavior:smooth;}
        
        .msg-row{display:flex;gap:15px;max-width:100%;animation:fadeIn 0.3s ease;}
        .msg-row.user{flex-direction:row-reverse;}
        .msg-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .bot .msg-av{background:linear-gradient(135deg,var(--pink),#9B00E8);box-shadow:0 0 20px rgba(214,0,110,0.4);}
        .user .msg-av{background:var(--card);border:1px solid var(--border);}
        
        .msg-text{max-width:85%;line-height:1.8;font-size:15px;}
        .user .msg-text{background:var(--pink);padding:12px 18px;border-radius:18px 18px 2px 18px;color:white;}
        
        /* FORMATAÇÃO PREMIUM */
        .msg-text h3{margin:25px 0 12px;color:var(--pink-bright);font-size:20px;font-weight:800;border-left:4px solid var(--pink);padding-left:12px;}
        .msg-text strong{color:white;font-weight:700;}
        .msg-text p{margin-bottom:15px;}
        .msg-text img{max-width:100%;border-radius:15px;margin:25px 0;border:2px solid var(--border);box-shadow:0 15px 40px rgba(0,0,0,0.6);}

        .input-wrap{position:absolute;bottom:35px;left:18%;right:18%;background:rgba(26,18,38,0.8);border:1px solid var(--border);border-radius:20px;display:flex;padding:12px 20px;backdrop-filter:blur(15px);box-shadow:0 20px 50px rgba(0,0,0,0.5);}
        #inputBox{flex:1;background:transparent;border:none;color:white;outline:none;padding:10px;font-size:16px;resize:none;max-height:150px;}
        .send-btn{background:var(--pink);border:none;width:45px;height:45px;border-radius:12px;color:white;cursor:pointer;font-size:20px;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-top"><button class="new-btn" onclick="location.reload()">+ Novo Estudo</button></div>
    <div style="flex:1; padding:30px; color:#7060A0; font-size:13px;">
        <p><strong>Status do Sistema:</strong></p>
        <p style="color:#00FF88;">• Conexão Criptografada</p>
        <p>• IA Médica Online (v3.5)</p>
    </div>
</div>

<div class="main">
    <div id="messages">
        <div class="msg-row bot">
            <div class="msg-av">🤖</div>
            <div class="msg-text"><h3>Olá, Doutor(a)!</h3><p>Estou pronta para aprofundar em qualquer tema médico. O que vamos analisar hoje?</p></div>
        </div>
    </div>
    <div class="input-wrap">
        <textarea id="inputBox" placeholder="Digite sua dúvida clínica..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
let busy=false, hist=[];

function md(t) {
    return t.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, src) => {
        // Se a IA mandar um link quebrado, o onerror troca por uma imagem de anatomia genérica
        return `<img src="${src}" alt="${alt}" onerror="this.onerror=null;this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Human_body_anatomy.svg/400px-Human_body_anatomy.svg.png';">`;
    })
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^(#{1,4})\s+(.*)$/gm, '<h3>$2</h3>')
    .split('\n').map(l => {
        const tr = l.trim();
        if(!tr) return '';
        if(tr.startsWith('<h') || tr.startsWith('<img')) return tr;
        return `<p>${tr}</p>`;
    }).join('');
}

async function send() {
    if(busy) return;
    const inp = document.getElementById('inputBox');
    const text = inp.value.trim();
    if(!text) return;

    inp.value=''; inp.style.height='auto';
    renderMsg('user', text);
    hist.push({role:'user', content:text});
    
    busy=true;
    const msgsDiv = document.getElementById('messages');
    const row = document.createElement('div');
    row.className='msg-row bot';
    row.innerHTML=`<div class="msg-av">🤖</div><div class="msg-text"></div>`;
    msgsDiv.appendChild(row);
    const textDiv = row.querySelector('.msg-text');

    try {
        const r = await fetch('https://afyados-backend.onrender.com/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ messages: hist })
        });

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let reply = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            reply += decoder.decode(value, {stream: true});
            textDiv.innerHTML = md(reply);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }
        hist.push({role:'assistant', content:reply});
    } catch (e) { textDiv.innerHTML="<p>Erro no servidor.</p>"; }
    busy=false;
}

function renderMsg(role, text) {
    const msgsDiv = document.getElementById('messages');
    const row = document.createElement('div');
    row.className=`msg-row ${role==='user'?'user':'bot'}`;
    row.innerHTML=`<div class="msg-av">${role==='user'?'👤':'🤖'}</div><div class="msg-text">${role==='user'?text:md(text)}</div>`;
    msgsDiv.appendChild(row);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
}
</script>
</body>
</html>
