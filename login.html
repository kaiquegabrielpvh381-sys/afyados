<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar | Afyados</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--bg:#0C0810;--card:#1A1226;--border:rgba(255,255,255,0.07);--border-pink:rgba(214,0,110,0.3);--text:#F4EFFA;--muted:#9080A8;--light:#D8CEEA;--danger:#E24B4A;--success:#5DCAA5;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}

nav{position:fixed;top:0;width:100%;z-index:500;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(12,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--pink-glow);overflow:hidden;}
.logo-mark img{width:22px;height:22px;object-fit:contain;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:.06em;color:#FFF;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;padding:8px 18px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--border-pink);color:var(--pink-light);}

.login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;position:relative;}
.login-wrapper::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 40%,rgba(214,0,110,0.08),transparent 70%);}

.login-box{position:relative;width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 36px;box-shadow:0 40px 80px rgba(0,0,0,0.3);animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-header{text-align:center;margin-bottom:32px;}
.login-header .icon{font-size:36px;margin-bottom:12px;}
.login-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;margin-bottom:6px;}
.login-header p{color:var(--muted);font-size:14px;}

.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);border-radius:9px;cursor:pointer;transition:all .2s;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;}
.tab.active{background:var(--pink);color:#fff;box-shadow:0 4px 16px var(--pink-glow);}
.tab:not(.active):hover{color:var(--light);}

.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--light);margin-bottom:7px;}
.form-group input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;outline:none;}
.form-group input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(214,0,110,0.15);}
.form-group input::placeholder{color:var(--muted);}

.btn-submit{width:100%;padding:14px;background:var(--pink);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px var(--pink-glow);margin-top:8px;}
.btn-submit:hover{background:var(--pink-bright);transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.msg{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:18px;display:none;text-align:center;line-height:1.5;}
.msg.error{display:block;background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.3);color:#F09595;}
.msg.success{display:block;background:rgba(93,202,165,0.1);border:1px solid rgba(93,202,165,0.3);color:#5DCAA5;}

.form-panel{display:none;}
.form-panel.active{display:block;animation:fadeUp .3s ease;}

.login-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
.login-footer a{color:var(--pink-light);text-decoration:none;font-weight:600;}
.login-footer a:hover{text-decoration:underline;}

.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  nav{padding:0 16px;}
  .login-box{padding:32px 24px;}
  .login-header h1{font-size:24px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABCGlDQ1BJQ0MgUHJvZmlsZQAAeJxjYGA8wQAELAYMDLl5JUVB7k4KEZFRCuwPGBiBEAwSk4sLGHADoKpv1yBqL+viUYcLcKakFicD6Q9ArFIEtBxopAiQLZIOYWuA2EkQtg2IXV5SUAJkB4DYRSFBzkB2CpCtkY7ETkJiJxcUgdT3ANk2uTmlyQh3M/Ck5oUGA2kOIJZhKGYIYnBncAL5H6IkfxEDg8VXBgbmCQixpJkMDNtbGRgkbiHEVBYwMPC3MDBsO48QQ4RJQWJRIliIBYiZ0tIYGD4tZ2DgjWRgEL7AwMAVDQsIHG5TALvNnSEfCNMZchhSgSKeDHkMyQx6QJYRgwGDIYMZAKbWPz9HbOBQAAABZklEQVR4nO2ayRaCMAxFg///z3UVDw5I08zw7sqNtHm5hUolAgAAAAC4KVvEIGOMsfK9bdvc5/fwHkDDanASQgLQdNI7hNIGMJ4hhAUQsZ5XaGEAkZ8FoQFUtKCNAUQ+FoQHUM2CVgYQ2VuQEkAlC9oZQGRrgVkA0klVscAkgIg9u9eYpkugowXqADK6bzm2+U0wM5AVVAFYFKtdBto5uDwGoy3QjLccgGWRmTdDt41QFwuWAvAoLssCcQCS4jtYUOq3QIYFogA6POOlc3Q3oPr2eDqADt1nJHMNuQdUtmAqgE7dZ2bnXOopsCfKgtMAOnafmZl76cPR9OPxzt1nzmpwN0DbRW8LDgO4QveZf7W4GmDVPYvrHIXwM4Ardf+MrwCsirdeu14WlN0IRfEWQNXuW173s0YYwB+qd9/y+vtaYQBRn+5bjsM1396AV5JaCzLe6LqeDksKyjrUqPD/AgAAAAD05QmqJdARPLlg+gAAAABJRU5ErkJggg==" alt="Afyados"></div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <a href="index.html" class="back-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao site
  </a>
</nav>

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-header">
      <div class="icon">🔐</div>
      <h1>Área do Aluno</h1>
      <p>Acesse simulados, provas e acompanhe seu progresso.</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('signup')">Criar conta</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="Sua senha" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">Entrar</button>
      <div class="login-footer">
        <a href="#" onclick="handleForgot();return false;">Esqueci minha senha</a>
      </div>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="panel-signup">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="signup-name" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-signup" onclick="handleSignup()">Criar conta</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://mmqfqlbojsbuuodfbilh.supabase.co',
  'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
);

// Pega o redirect da URL (?redirect=simulados2.html)
const params = new URLSearchParams(window.location.search);
const redirectTo = params.get('redirect') || 'index.html';

// Se já está logado, redireciona direto
(async () => {
  const { data: { user } } = await sb.auth.getUser();
  if (user) window.location.href = redirectTo;
})();

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  hideMsg();
}

// ── Mensagens ──
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}

// ── Loading state ──
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.dataset.original = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Aguarde...';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.original;
  }
}

// ── Login ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) return showMsg('Preencha todos os campos.', 'error');

  setLoading('btn-login', true);
  hideMsg();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading('btn-login', false);
    if (error.message.includes('Invalid login')) {
      return showMsg('E-mail ou senha incorretos.', 'error');
    }
    return showMsg(error.message, 'error');
  }

  // Salva na tabela users se não existir
  await ensureUserRow(data.user);

  showMsg('Login realizado! Redirecionando...', 'success');
  setTimeout(() => window.location.href = redirectTo, 800);
}

// ── Cadastro ──
async function handleSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;

  if (!name || !email || !password) return showMsg('Preencha todos os campos.', 'error');
  if (password.length < 6) return showMsg('A senha precisa ter pelo menos 6 caracteres.', 'error');

  setLoading('btn-signup', true);
  hideMsg();

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: { data: { full_name: name } }
  });

  if (error) {
    setLoading('btn-signup', false);
    if (error.message.includes('already registered')) {
      return showMsg('Este e-mail já está cadastrado. Faça login.', 'error');
    }
    return showMsg(error.message, 'error');
  }

  // Se o Supabase exige confirmação de e-mail
  if (data.user && !data.session) {
    setLoading('btn-signup', false);
    return showMsg('Conta criada! Verifique seu e-mail para confirmar.', 'success');
  }

  // Se login automático após cadastro
  if (data.user && data.session) {
    await ensureUserRow(data.user);
    showMsg('Conta criada! Redirecionando...', 'success');
    setTimeout(() => window.location.href = redirectTo, 800);
    return;
  }

  setLoading('btn-signup', false);
}

// ── Esqueci senha ──
async function handleForgot() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showMsg('Digite seu e-mail acima primeiro.', 'error');

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });

  if (error) return showMsg(error.message, 'error');
  showMsg('Link de recuperação enviado para ' + email, 'success');
}

// ── Garante que existe na tabela users ──
async function ensureUserRow(user) {
  const { data } = await sb.from('users').select('id').eq('id', user.id).single();
  if (!data) {
    await sb.from('users').insert({
      id: user.id,
      email: user.email
    });
  }
}

// Enter pra submit
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const loginPanel = document.getElementById('panel-login');
  if (loginPanel.classList.contains('active')) {
    handleLogin();
  } else {
    handleSignup();
  }
});
</script>
</body>
</html>
