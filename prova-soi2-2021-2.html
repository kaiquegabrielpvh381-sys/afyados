<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N1 SOI II 2021.2 | Afyados</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
    :root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
    nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:7px;display:flex;align-items:center;justify-content:center;}
    .logo-mark svg{width:14px;height:14px;fill:white;}
    .logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:16px;letter-spacing:.05em;color:#fff;}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
    .back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
    .sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
    .sticky-inner{max-width:820px;margin:0 auto;}
    .sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .sticky-aviso{display:flex;align-items:center;gap:8px;font-size:11px;color:#FAAD3F;font-weight:600;margin-bottom:8px;padding:5px 10px;background:rgba(186,113,0,0.1);border-radius:6px;border:1px solid rgba(186,113,0,0.2);}
    .sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
    .btn-reset:hover{color:var(--pink-light);}
    .q-pills{display:flex;gap:5px;flex-wrap:wrap;}
    .qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
    .qp:hover{border-color:var(--green-b);color:#5DCAA5;}
    .qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
    .qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
    .qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
    .qp.disc{background:rgba(155,0,232,0.15);border-color:rgba(155,0,232,0.4);color:#D4A8FF;}
    .main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
    .q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
    .q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
    .q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
    .q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
    .q-tag-disc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(155,0,232,0.15);color:#D4A8FF;border:1px solid rgba(155,0,232,0.3);}
    .q-body{padding:28px;}
    .q-context{font-size:14px;color:var(--muted);line-height:1.85;margin-bottom:20px;padding:14px 18px;background:rgba(255,255,255,0.025);border-left:2px solid rgba(29,158,117,0.5);border-radius:0 10px 10px 0;white-space:pre-line;}
    .q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;}
    .q-img{width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;}
    .q-opts{display:flex;flex-direction:column;gap:9px;}
    .q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;position: relative;}
    .q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
    .q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
    .q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
    .q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
    .q-opt.discarded{opacity: 0.4; filter: grayscale(1);}
    .btn-discard{position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px; opacity: 0.3; transition: opacity 0.2s;}
    .btn-discard:hover{opacity: 1;}
    .q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
    .q-feedback.show{display:block;animation:fadeUp .25s ease;}
    .fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
    .fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
    .fb-disc{background:rgba(155,0,232,0.07);border-color:rgba(155,0,232,0.25);color:#E8D8FF;}
    .fb-label{font-weight:700;display:block;margin-bottom:6px;}
    .ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.07),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:14px;display:none;}
    .ai-box.open{display:block;}
    .ai-content{padding:18px;font-size:14px;line-height:1.9;color:#E8D8FF;white-space:pre-line;}
    .q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
    .btn-respond{background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);padding:10px 20px;border-radius:50px;cursor:pointer;font-weight:700;}
    .btn-next{background:var(--pink);color:#fff;border:none;padding:10px 22px;border-radius:50px;cursor:pointer;font-weight:700;}
    .result-screen{display:none;}
    .result-screen.show{display:block;}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h4l2-4h8l2 4h4L12 2zm0 5l3 6H9l3-6z"/></svg></div>

</nav>

<div class="main">
  <div class="result-screen" id="resultScreen">
    <div class="res-card">
      <div class="res-ring" id="resRing">0%</div>
      <h2 id="resTitle">Resultado</h2>
      <p id="resSub"></p>
      <button class="btn-retry" onclick="resetAll()">Tentar novamente</button>
    </div>
    <div id="reportContent"></div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <span class="q-tag" id="qTagNum">Questão 1</span>
      <span class="q-tag-tema" id="qTagTema"></span>
      <span class="q-tag-disc" id="qTagDisc" style="display:none;">Discursiva</span>
    </div>
    <div class="q-body">
      <div class="q-context" id="qContext"></div>
      <div class="q-text" id="qText"></div>
      <img class="q-img" id="qImg" alt="" style="display:none;">
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="q-feedback" id="qFeedback"></div>
    <div class="ai-box" id="aiBox">
      <div class="ai-content" id="aiContent"></div>
    </div>
    <div class="q-nav-bar">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">Anterior</button>
      <span class="q-counter">Questão <strong id="qCounterNum">1</strong> de <strong id="qCounterTotal">15</strong></span>
      <div class="nav-right">
        <button class="btn-respond" id="btnRespond" onclick="submitAnswer()">Responder</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()">Próxima</button>
      </div>
    </div>
  </div>
</div>

<script>
var QS = [

    context: "Homem, 67 anos, diabético e hipertenso, apresentou alterações de campo visual, rebaixamento de consciência e déficit sensitivo após um AVEI.",

      "A multiplicação ocorre no neurônio da pele.",
      "É possível determinar os nervos espinais acometidos pela observação.",

      "O vírus fica latente na raiz ventral."
    ],
    g: 1
  },
  {
    n: 7, tema: "Neurotransmissores", tipo: "mc",

    g: 2
  },
  {

    g: 3
  },
  {
    n: 9, tema: "Nervos Cranianos", tipo: "mc",
    context: "Paciente com perda de olfato (anosmia), zumbido e perda de equilíbrio.",
    text: "Identifique os nervos comprometidos:",

      "I e VIII.",

      "III e V.",

    g: 0

    opts: [
      "Estimula a via indireta.",

  },
  {
    n: 12, tema: "Fibra Muscular", tipo: "mc",

      "Formada por filamentos de actina e miosina (sarcômeros).",

      "Possui díades.",
      "Banda A tem apenas actina."
    ],
    g: 0
  },
  {
    n: 13, tema: "Ação de Neurotransmissores", tipo: "mc",

    opts: [
      "O GABA é o principal inibitório.",
      "Glutamato é inibitório.",

      "Glicina é excitatória."
    ],
    g: 0
  },
  {
    n: 14, tema: "Placa Motora", tipo: "disc",

  {

    context: "O osso se regenera através de fases cronológicas.",
    text: "Descreva as fases da consolidação óssea.",
    resposta: "1. Hematoma; 2. Calo Mole; 3. Calo Duro; 4. Remodelação (Osteoclastos limpam e osteoblastos mineralizam)."

var SHORT = [
  "Correta: A. Huntington afeta o estriado e reduz o GABA.",
  "Correta: C. Nervos espinais nascem da fusão das raízes dorsal e ventral.",
  "Correta: A. Artéria Cerebral Posterior irriga o lobo occipital (visão).",
  "Correta: D. Todas as asserções descrevem a produção e fluxo do LCR.",
  null,
  "Correta: B. A topografia do dermátomo identifica a raiz nervosa.",
  "Correta: C. GABA é o inibitório universal do SNC.",
  "Correta: D. Meniscos não produzem lubrificação (papel da sinóvia).",
  "Correta: A. Olfato (Nervo I) e Vestibulococlear (Nervo VIII).",
  "Correta: B. Via direta facilita movimento via D1.",
  "Correta: B. Produção nos plexos corioides ventriculares.",
  "Correta: A. Sarcômeros são unidades de actina e miosina.",
  "Correta: A. GABA inibe; Glutamato excita.",
  null,
  null
];

var DEEP = [
  "A Doença de Huntington atrofia o caudado e putâmen. 

[Image of the basal ganglia in Huntington's disease]
",
  "A formação do nervo espinal ocorre nos forames intervertebrais. 

[Image of a cross-section of the spinal cord]

[Image of the Circle of Willis]
",

",

[Image of the dopaminergic reward pathway]

[Image of the sarcomere structure]

  "ACh é inibitória no coração via receptores muscarínicos.",
  "Toxina botulínica impede a exocitose de ACh.",
  "Osteoclastos lapidam o calo ósseo na fase final. 

[Image of bone fracture healing stages]
"
];

var L = ['a','b','c','d'];
var cur = 0, sel = null, answered = {}, discAnswered = {}, discarded = {};

function buildPills(){
  var w = document.getElementById('qPills'); w.innerHTML = '';
  for(var i=0;i<QS.length;i++){
    var b = document.createElement('button');
    b.className='qp'; b.id='qp'+i; b.textContent=i+1;
    (function(idx){ b.onclick = function(){ goTo(idx); }; })(i);
    w.appendChild(b);
  }
}

function renderQ(){
  var q=QS[cur];
  sel=(answered[cur]!==undefined)?answered[cur]:null;
  var done = q.tipo==='disc' ? !!discAnswered[cur] : answered[cur]!==undefined;

  document.getElementById('qTagNum').textContent='Questão '+q.n;
  document.getElementById('qTagTema').textContent=q.tema;
  document.getElementById('qCounterNum').textContent=q.n;
  document.getElementById('qCounterTotal').textContent=QS.length;
  document.getElementById('qTagDisc').style.display = q.tipo==='disc' ? 'inline-flex' : 'none';

  var ctx=document.getElementById('qContext');
  ctx.innerHTML=q.context.replace(/\n/g,'<br>');
  document.getElementById('qText').innerHTML = q.text.replace(/\n/g,'<br>');
  
  var qImg=document.getElementById('qImg');
  if(q.img){ qImg.src=q.img; qImg.style.display='block'; }
  else{ qImg.style.display='none'; }

  var wrap=document.getElementById('qOpts'); wrap.innerHTML='';
  if(q.tipo==='disc'){
    var ta=document.createElement('textarea');
    ta.className='disc-area'; ta.id='discInput';
    ta.placeholder='Sua resposta...';
    if(done){ ta.disabled=true; ta.value=discAnswered[cur]; }
    wrap.appendChild(ta);
  } else {
    q.opts.forEach(function(o,i){
      var btn=document.createElement('button'); btn.className='q-opt';
      if(discarded[cur] && discarded[cur].includes(i)) btn.classList.add('discarded');
      if(done){
        if(i===q.g)btn.classList.add('correct');
        else if(i===sel)btn.classList.add('wrong');
        btn.disabled=true;
      } else if(sel===i) btn.classList.add('selected');
      
      btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span>'+o+'</span>';
      
      if(!done){
        btn.onclick=function(){ selectOpt(i); };
        var d=document.createElement('button'); d.className='btn-discard'; d.innerHTML='✂️';
        d.onclick=function(e){ e.stopPropagation(); toggleDiscard(i); };
        btn.appendChild(d);
      }
      wrap.appendChild(btn);
    });
  }

  var fb=document.getElementById('qFeedback');
  if(done){
    fb.style.display='block';
    fb.innerHTML = q.tipo==='disc' ? q.resposta : SHORT[cur];
    document.getElementById('aiContent').innerHTML=DEEP[cur];
    document.getElementById('aiBox').style.display='block';
  } else {
    fb.style.display='none';
    document.getElementById('aiBox').style.display='none';
  }
  syncPills();
}

function selectOpt(i){ sel=i; renderQ(); }
function toggleDiscard(i){
  if(!discarded[cur]) discarded[cur]=[];
  var idx=discarded[cur].indexOf(i);
  if(idx===-1) discarded[cur].push(i); else discarded[cur].splice(idx,1);
  renderQ();
}
function submitAnswer(){
  if(QS[cur].tipo==='disc') discAnswered[cur]=document.getElementById('discInput').value;
  else answered[cur]=sel;
  renderQ();
}
function prevQ(){ if(cur>0) cur--; renderQ(); }
function nextQ(){ if(cur<QS.length-1) cur++; renderQ(); }
function goTo(i){ cur=i; renderQ(); }
function resetAll(){ location.reload(); }
function syncPills(){
  for(var i=0;i<QS.length;i++){
    var p=document.getElementById('qp'+i);
    p.className='qp'+(i===cur?' current':'');
    if(answered[i]!==undefined) p.classList.add(answered[i]===QS[i].g?'correct':'wrong');
    if(discAnswered[i]) p.classList.add('disc');
  }
}
buildPills(); renderQ();
</script>
</body>
</html>
