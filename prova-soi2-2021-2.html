<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2021.2 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}
.logo-mark svg{width:14px;height:14px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-aviso{display:flex;align-items:center;gap:8px;font-size:11px;color:#FAAD3F;font-weight:600;margin-bottom:8px;padding:5px 10px;background:rgba(186,113,0,0.1);border-radius:6px;border:1px solid rgba(186,113,0,0.2);}
.sticky-aviso svg{flex-shrink:0;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
.qp.disc{background:rgba(155,0,232,0.15);border-color:rgba(155,0,232,0.4);color:#D4A8FF;}

.main{max-width:820px;margin:0 auto;padding:220px 32px 80px;}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.q-header-left{display:flex;align-items:center;gap:10px;}
.btn-scissors{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:5px 9px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;letter-spacing:.04em;}
.btn-scissors:hover{border-color:var(--pink);color:var(--pink-light);background:rgba(214,0,110,0.06);}
.btn-scissors svg{transition:transform .2s;}
.btn-scissors:hover svg{transform:rotate(-10deg) scale(1.1);}
.q-tag{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-tag-disc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(155,0,232,0.15);color:#D4A8FF;border:1px solid rgba(155,0,232,0.3);}
.q-body{padding:28px;}
.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;}
.q-img{width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;}

.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}
.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}
.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}
.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}
.opt-elim-btn svg{pointer-events:none;}

/* Discursiva */
.disc-area{width:100%;min-height:120px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;font-size:14px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;resize:vertical;line-height:1.7;transition:border-color .2s;}
.disc-area:focus{outline:none;border-color:rgba(155,0,232,0.4);}
.disc-area[disabled]{opacity:0.6;cursor:default;}
.disc-label{font-size:12px;color:var(--muted);margin-bottom:8px;}

.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-disc{background:rgba(155,0,232,0.07);border-color:rgba(155,0,232,0.25);color:#E8D8FF;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-exp{display:block;margin-bottom:14px;}

.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.35);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-aprofundar:hover{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));}
.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}

.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:14px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}
.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-content{padding:18px;font-size:14px;line-height:1.9;color:#E8D8FF;white-space:pre-line;}

.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}

.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:400px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}

.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:180px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-bar-fill.purple{background:linear-gradient(90deg,#9B00E8,#D4A8FF);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}
.tema-pct.red{color:#F09595;}
.tema-pct.purple{color:#D4A8FF;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}
.dot-err{background:#E24B4A;}
.dot-disc{background:#D4A8FF;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  nav,.sticky-bar{padding-left:16px;padding-right:16px;}
  .main{padding:180px 14px 60px;}
  .q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}
  .q-feedback,.ai-box{margin-left:16px;margin-right:16px;}
  .q-text{font-size:15px;}
  .q-opt{font-size:14px;padding:12px 14px;}
  .insight-grid{grid-template-columns:1fr;}
  .tema-name{min-width:110px;font-size:12px;}
}
  .hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>
<body>

var QS=[{n:1,tema:"Doença de Huntington",tipo:"mc",context:"Em um episódio de House, M.D., pode ser observado a personagem Remy Hadley mais conhecida como Thirteen (Treze) que possuía a Doença de Huntington. Sendo esta uma patologia genética hereditária que afeta o sistema nervoso, causando alteração no gene da Huntingtina (HTT). A patologia desencadeia a produção de uma proteína mutante (mHTT). É uma doença caracterizada por interferências cognitivas, distúrbios motores e psiquiátricos. A nível celular, a mHTT promove disfunção e morte neuronal por vários mecanismos.\n\nConsiderando o texto base, avalie as afirmativas a seguir:\n\nI. A perda neuronal atinge importantes núcleos da base, como o caudado e o putâmen.\n\nII. Os núcleos envolvidos nesta doença participam do controle do equilíbrio e das emoções agindo de maneira desassociada aos núcleos caudais.\n\nIII. Pessoas com até 35 repetições CAG no gene HTT possivelmente não desenvolvem a doença de Huntington, mas à medida que o gene é transmitido nas gerações, há expansão da repetição CAG associando-se ao início dos sintomas.\n\nIV. Do ponto de vista neuroquímico, observa-se uma redução acentuada do GABA, principal neurotransmissor inibitório do sistema nervoso central.",text:"Marque abaixo a alternativa correta. É correto o que se afirma em:",opts:["I, III e IV.","II e III.","I e IV.","II, III e IV."],g:0},{n:2,tema:"Nervos Espinais",tipo:"mc",context:"A medula espinhal possui formato cilíndrico e não uniforme, com dilatações conhecidas como intumescências (regiões com maior quantidade de neurônios que entram e saem dessas áreas) nas regiões cervical e lombar, onde as raízes formam, respectivamente, os plexos braquial e lombossacro, responsáveis pela inervação dos membros superiores e inferiores. Além disso, macroscopicamente a superfície da medula apresenta sulcos longitudinais.",text:"Assinale a alternativa que descreve a associação correta entre a formação dos nervos espinais e a estrutura da medula espinal:",opts:["Os nervos espinais são formados pela união das raízes dorsal (sensitiva) e ventral (motora), as quais se ligam, respectivamente, aos sulcos mediano posterior e lateral anterior da medula através de filamentos radiculares.","Os nervos espinais são formados pela união das raízes dorsal (motora) e ventral (sensitiva), as quais se ligam, respectivamente, aos sulcos lateral posterior e lateral anterior da medula através de filamentos radiculares.","Os nervos espinais são formados pela união das raízes dorsal (sensitiva) e ventral (motora), as quais se ligam, respectivamente, aos sulcos lateral posterior e lateral anterior da medula através de filamentos radiculares.","Os nervos espinais são formados pela união das raízes dorsal (sensitiva) e ventral (motora), as quais se ligam, respectivamente, aos sulcos posterior e anterior da medula através de filamentos radiculares."],g:2},{n:3,tema:"AVE Isquêmico",tipo:"mc",context:"Homem, 67 anos, diabético, hipertenso, tabagista e dislipidêmico, após um AVEI (Acidente Vascular Encefálico Isquêmico) apresentou o seguinte quadro:\n\n- Alterações de campo visual.\n- Rebaixamento do nível de consciência.\n- Déficit sensitivo.",text:"Sobre o caso acima, identifique qual artéria foi obstruída:",opts:["Artéria cerebral posterior.","Artéria cerebral anterior.","Artéria basilar.","Artéria vertebral."],g:0},{n:4,tema:"Hidrocefalia e LCR",tipo:"mc",context:"Dona Josefa traz seu filho, João, criança com 8 meses de idade, com diagnóstico de hidrocefalia apresentando náuseas e vômitos, irritabilidade e sonolência. Com o exame abaixo que compara uma tomografia computadorizada de crânio sem alterações com uma que demonstra a hidrocefalia e, em relação ao conhecimento sobre a morfologia macro e micro das cavidades do Sistema Nervoso Central (SNC), analise as afirmativas seguintes:\n\nFigura 1: Tomografia Computadorizada de Crânio Normal (A) e Hidrocefalia com dilatação ventricular (B).\n\nFonte: https://www.neurocirurgiabh.com.br/hidrocefalia\n\n[[IMG_Q4]]\n\nI. O plexo coroide é uma estrutura localizada dentro dos ventrículos que produz o líquido cefalorraquidiano (LCR) com funções de nutrição e proteção.\n\nII. O aqueduto cerebral, também conhecido como ducto mesencefálico, é um canal que conecta o terceiro ao quarto ventrículo e permite a passagem do LCR pelo mesencéfalo.\n\nIII. O LCR circula pelos seios venosos cerebrais e é absorvido pelas granulações aracnóideas.",text:"É correto o que se afirma em:",opts:["II e III, apenas.","II, apenas.","I, apenas.","I, II e III."],g:3},{n:5,tema:"Chocolate e Sistema Nervoso",tipo:"disc",context:"Ao comer um chocolate, por exemplo, sentimo-nos bem. E isso gera impacto significativo sobre a nossa motivação, produtividade e bem-estar. Nenhuma pessoa sã manifestaria oposição em ter níveis fisiológicos mais elevados de alguns produtos do corpo, os quais podem minimizar os impactos dos desafios diários.\n\nA imagem abaixo pode ser utilizada para ilustrar parte desse complexo mecanismo:\n\n[[IMG_Q5]]",text:"Responda as questões a seguir:\n\nA) Relacione quais áreas ou estruturas morfológicas (três) do encéfalo receberam essas informações e quais as sensações provocadas pelo chocolate nessas estruturas.\n\nB) Explique bioquimicamente o processo de resposta (sinapse), a partir da estimulação das células dessas áreas ou estruturas.\n\nC) Defenda quais são os principais produtos (dois) e as ações fisiológicas produzidas no organismo da pessoa que comeu o chocolate.",resposta:"A) Amígdala (emoção/saciedade), Hipocampo (memória e emoção), Córtex pré-frontal (memória curta/lembrança), Núcleo accumbens (recompensa), Hipotálamo (saciedade).\n\nB) Potencial de ação chega ao terminal pré-sináptico → despolarização da membrana → abertura de canais de Ca²⁺ → vesículas sinápticas se fundem à membrana → liberação de neurotransmissores na fenda sináptica → ligação com receptores pós-sinápticos.\n\nC) Principais neurotransmissores: Dopamina (recompensa, motivação, prazer) e Serotonina (bem-estar, humor, saciedade). Também noradrenalina (alerta, energia). Ações: excitação do neurônio pós-sináptico, alterações de permeabilidade da membrana, reações bioquímicas e regulação gênica."},{n:6,tema:"Herpes-Zóster e Dermátomos",tipo:"mc",context:"O vírus herpes-zóster causa dor unilateral e aparecimento de vesículas sobre base eritematosa, seguindo o território de um dermátomo. Geralmente ocorre como resultado de reativação endógena do vírus, que persistiu de forma latente num gânglio sensorial após um episódio de varicela.",text:"Analisando o contexto acima, é possível afirmar que:",opts:["A multiplicação do microrganismo acontece no corpo celular do neurônio presente na pele.","É possível pela observação determinar os nervos espinais acometidos.","A infecção do gânglio sensorial pode interferir na resposta motora.","Provavelmente o microrganismo ficou latente na raiz ventral da medula espinal."],g:1},{n:7,tema:"Neurotransmissores",tipo:"mc",context:"Os neurotransmissores ou neuromoduladores atuam como sinais parácrinos, com as suas células-alvo localizadas perto do neurônio que as secreta. Eles são definidos como mensageiros químicos que transportam, estimulam e equilibram os sinais entre os neurônios, ou células nervosas e outras células do corpo.",text:"Sobre estes neurotransmissores, analise e marque a alternativa correta:",opts:["Os neurônios encefálicos que contêm o neurotransmissor GABA estão ativos durante respostas emocionais, comportamentos de adição e experiências agradáveis.","A glicina, neurotransmissor excitatório, se liga a receptores ionotrópicos e abre canais de Cl⁻. Cerca de metade das sinapses excitatórias na medula espinal utilizam a glicina.","O GABA é encontrado somente no SNC, onde é o neurotransmissor inibitório mais comum. Cerca de um terço de todas as sinapses encefálicas utiliza o GABA.","A Acetilcolina é um neurotransmissor inibitório em algumas sinapses e é excitatório em outras, como nas que se liga a receptores metabotrópicos acoplados a proteínas G."],g:2}];
var SHORT=[
"As afirmativas corretas são I, III e IV. A perda neuronal afeta caudado e putâmen (I). As repetições CAG se expandem nas gerações, associando-se ao início dos sintomas (III). Observa-se redução acentuada do GABA (IV). A II está errada: os núcleos da base atuam principalmente no controle motor e são altamente interligados — não agem de forma desassociada.",
"Os nervos espinais são formados pela raiz dorsal (sensitiva) + raiz ventral (motora), ligando-se respectivamente aos sulcos LATERAL POSTERIOR e LATERAL ANTERIOR. A alternativa A erra ao mencionar 'sulco mediano posterior'. A B inverte as funções das raízes. A D usa nomenclatura imprecisa ('posterior' e 'anterior' sem 'lateral').",
"A artéria cerebral POSTERIOR é responsável pela irrigação dos lobos occipitais e parte dos temporais. Sua oclusão causa: alterações de campo visual (lobos occipitais), rebaixamento da consciência e déficit sensitivo. A cerebral anterior afeta membros inferiores; a média afeta face e membros superiores com afasia.",
"Todas as afirmativas estão corretas. I: O plexo coroide produz o LCR nos ventrículos. II: O aqueduto cerebral (ducto mesencefálico) conecta o 3º ao 4º ventrículo. III: O LCR é absorvido pelas granulações aracnóideas nos seios venosos. Na hidrocefalia, há desequilíbrio entre produção e absorção do LCR.",
null,
"Como cada dermátomo corresponde a um nervo espinal específico, a distribuição das lesões do herpes-zóster permite identificar qual nervo está acometido. O vírus fica latente nos gânglios SENSORIAIS da raiz DORSAL (não ventral). Os gânglios sensoriais não propagam impulsos motores, portanto não interferem na resposta motora.",
"O GABA é o principal neurotransmissor inibitório do SNC, presente em ~1/3 das sinapses encefálicas. A glicina é INIBITÓRIA (não excitatória). Os neurônios com DOPAMINA (não GABA) estão ativos em recompensa e experiências agradáveis. A acetilcolina é excitatória na junção neuromuscular (receptores ionotrópicos) e inibitória em sinapses com receptores metabotrópicos que abrem canais de K⁺."

var DEEP=[
"A doença de Huntington é uma condição neurodegenerativa hereditária causada pela expansão de repetições do trinucleotídeo CAG no gene da huntingtina, levando ao acúmulo de glutamina e morte neuronal progressiva. As estruturas mais afetadas são os núcleos da base, especialmente o núcleo caudado e o putâmen.\n\n✅ Por que I, III e IV são corretas:\n• I: A perda neuronal afeta diretamente o caudado e o putâmen — estruturas dos núcleos da base essenciais para o controle motor.\n• III: Até 35 repetições CAG — geralmente sem sintomas. Com mais de 40 repetições — doença se manifesta. Entre 36-39 — penetrância variável. O fenômeno de antecipação faz com que, a cada geração, o número de repetições aumente.\n• IV: A redução do GABA compromete a inibição dentro dos circuitos dos núcleos da base, desequilibrando o controle motor e gerando os movimentos involuntários (coreia).\n\n❌ Por que a II está errada:\nO putâmen NÃO age de forma desassociada. Todos os núcleos da base são altamente interligados e atuam principalmente no controle motor. Atribuir ao putâmen funções isoladas de emoção é incorreto.\n\nClinicamente: tremor involuntário (coreia), declínio cognitivo progressivo, alterações psiquiátricas. Não há cura — tratamento é sintomático.",
"A formação dos nervos espinais envolve a união de duas raízes com funções distintas:\n\n• Raiz DORSAL (posterior) = SENSITIVA — conduz informações sensoriais DO corpo PARA o SNC\n• Raiz VENTRAL (anterior) = MOTORA — conduz comandos motores DO SNC PARA o corpo\n\nConexões com a medula:\n• Raiz dorsal → sulco LATERAL POSTERIOR\n• Raiz ventral → sulco LATERAL ANTERIOR\n\n⚠️ Pegadinhas clássicas exploradas nas alternativas:\n• A: usa \"sulco mediano posterior\" — errado, o mediano posterior é um sulco central da medula, não onde emergem as raízes\n• B: inverte as funções (dorsal = motora / ventral = sensitiva) — completamente errado\n• D: usa apenas \"posterior e anterior\" sem o \"lateral\" — impreciso e errado\n\nClinicamente: essa organização explica a Síndrome de Brown-Séquard — lesão medular unilateral que causa déficit motor ipsilateral + déficit sensitivo contralateral.",
"Os acidentes vasculares encefálicos isquêmicos geram déficits específicos conforme o território arterial afetado:\n\n🔴 Artéria Cerebral POSTERIOR (GABARITO):\n• Irriga: lobos occipitais, parte dos temporais, tálamo\n• Déficits: alterações de campo visual (hemianopsia), déficit sensitivo (lesão talâmica), rebaixamento de consciência\n• Exatamente o quadro do paciente!\n\n❌ Por que as outras estão erradas:\n• Cerebral ANTERIOR: afeta lobo frontal medial e parietal → déficit motor e sensitivo em membros INFERIORES, alterações de comportamento\n• Artéria BASILAR: sintomas de tronco encefálico → diplopia, disfagia, ataxia, coma — síndrome muito grave\n• Artéria VERTEBRAL: síndrome de Wallenberg (lateral do bulbo) → disfagia, ataxia, Horner\n\n💡 Dica: campo visual comprometido + déficit sensitivo = pensar na cerebral posterior e no tálamo.",
"O LCR (líquido cefalorraquidiano) é fundamental para proteger e nutrir o SNC. Entender sua produção, circulação e absorção é essencial:\n\n✅ Todas as afirmativas são corretas:\n\nI. PLEXO COROIDE: estruturas vasculares nos ventrículos (especialmente laterais e 4º ventrículo), formadas por células ependimárias modificadas + capilares. Produzem o LCR continuamente (~500 mL/dia, mas apenas ~150 mL estão presentes a qualquer momento).\n\nII. AQUEDUTO CEREBRAL (Ducto mesencefálico): canal estreito que atravessa o mesencéfalo conectando o 3º ao 4º ventrículo. Obstruções nesse ponto causam hidrocefalia obstrutiva — exatamente o caso do paciente.\n\nIII. ABSORÇÃO: o LCR passa do espaço subaracnoide para os seios venosos durais pelas granulações aracnóideas (vilosidades aracnóideas). Alterações aqui causam hidrocefalia comunicante.\n\nClinicamente: hidrocefalia em lactente → macrocefalia progressiva, abaulamento da fontanela, irritabilidade, vômitos — igual ao caso descrito.",
"Esta é uma questão discursiva sobre o mecanismo de recompensa cerebral. A resposta esperada integra neuroanatomia, fisiologia sináptica e neuroquímica:\n\nA) ESTRUTURAS ENCEFÁLICAS ATIVADAS PELO CHOCOLATE:\n• Amígdala → emoção e saciedade\n• Hipocampo → memória de longa duração e emoção\n• Córtex pré-frontal → memória de curta duração e tomada de decisão\n• Núcleo accumbens → sistema de recompensa (prazer)\n• Hipotálamo → centro da saciedade (núcleo ventromedial)\n\nB) MECANISMO SINÁPTICO:\nPotencial de ação elétrico chega ao terminal pré-sináptico → despolarização da membrana → abertura de canais de Ca²⁺ voltagem-dependentes → entrada de Ca²⁺ → vesículas sinápticas se fundem à membrana pré-sináptica → exocitose de neurotransmissores na fenda sináptica → ligação com receptores do neurônio pós-sináptico → modificação da permeabilidade iônica → excitação ou inibição.\n\nC) PRINCIPAIS NEUROTRANSMISSORES:\n• Dopamina: recompensa, prazer, motivação — liberada pelo núcleo accumbens\n• Serotonina: bem-estar, humor, saciedade\n• Noradrenalina: alerta, energia, atenção\n\nEfeitos fisiológicos: sensação de prazer e bem-estar, aumento da motivação, modulação do humor.",
"O herpes-zóster resulta da reativação do vírus varicela-zóster, que permanece latente nos gânglios sensoriais da raiz DORSAL após um episódio de varicela na infância.\n\nPor que a alternativa B é a correta:\nComo cada dermátomo (área da pele inervada por um único nervo espinal) tem distribuição anatômica precisa e mapeada, as lesões vesiculares do herpes-zóster seguem exatamente esse trajeto, permitindo identificar qual nervo espinal está acometido. Isso é usado clinicamente para diagnóstico e localização.\n\n❌ Erros das outras alternativas:\n• A: O vírus não se multiplica na pele — ele está latente nos gânglios da raiz DORSAL (corpos celulares neuronais)\n• C: Gânglios SENSORIAIS não transmitem impulsos motores. O gânglio da raiz dorsal é puramente sensitivo — não há interferência motora\n• D: O vírus fica latente na raiz DORSAL (sensitiva), não na ventral (motora)\n\nClinicamente: dor em queimação + vesículas em distribuição dermatômica → diagnóstico de herpes-zóster. Pode ocorrer neuralgia pós-herpética.",
"Os neurotransmissores são classificados quanto à função (excitatório/inibitório) e ao tipo de receptor que ativam:\n\n✅ Alternativa C (CORRETA):\nO GABA (ácido gama-aminobutírico) é o principal neurotransmissor INIBITÓRIO do SNC. Abre canais de Cl⁻ (hiperpolarização). Presente em ~1/3 de todas as sinapses encefálicas. Essencial para controlar a excitabilidade neuronal.\n\n❌ Análise das alternativas erradas:\n• A: ERRADA — são os neurônios com DOPAMINA (não GABA) que estão ativos em recompensa e experiências agradáveis. O GABA é inibitório.\n• B: ERRADA — a glicina é neurotransmissor INIBITÓRIO (não excitatório). Liga-se a receptores que abrem canais de Cl⁻. É o principal inibitório da medula espinal.\n• D: ERRADA pela inversão — a ACh é EXCITATÓRIA na junção neuromuscular (receptores nicotínicos ionotrópicos, canais catiônicos). É inibitória em sinapses com receptores muscarínicos que abrem canais de K⁺.\n\n💡 Resumo para memorizar: GABA = inibição encefálica | Glicina = inibição medular | Glutamato = principal excitatório do SNC"

      fb.innerHTML='<span class="fb-label">📋 Gabarito comentado</span><span class="fb-exp">'+q.resposta.replace(/\n/g,'<br>')+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    }else{
      var ok=sel===q.g;fb.className='q-feedback show '+(ok?'fb-ok':'fb-err');
      fb.innerHTML='<span class="fb-label">'+(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase())+'</span><span class="fb-exp">'+SHORT[cur]+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    }
    aiBox.style.display='none';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';
  }else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}
  document.getElementById('btnPrev').disabled=(cur===0);
  var btnN=document.getElementById('btnNext');
  if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  var btnR=document.getElementById('btnRespond');
  if(done){btnR.style.display='none';}else{btnR.style.display='flex';if(q.tipo==='disc')btnR.disabled=false;else btnR.disabled=(sel===null);}
  syncPills();
}

function toggleAI(qIdx){var aiBox=document.getElementById('aiBox');var btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=DEEP[qIdx];aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}

function selectOpt(i){if(answered[cur]!==undefined)return;if(eliminated[cur]&&eliminated[cur].has(i))return;sel=i;document.getElementById('btnRespond').disabled=false;var opts=document.querySelectorAll('.q-opt');opts.forEach(function(o,idx){o.classList.remove('selected');if(idx===i)o.classList.add('selected');});}

function submitAnswer(){var q=QS[cur];if(q.tipo==='disc'){var ta=document.getElementById('discInput');var val=ta?ta.value.trim():'';discAnswered[cur]=val||'(sem resposta)';}else{if(sel===null||answered[cur]!==undefined)return;answered[cur]=sel;}renderQ();var total=0;for(var i=0;i<QS.length;i++){if(QS[i].tipo==='disc'?discAnswered[i]:answered[i]!==undefined)total++;}if(total===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function showResult(){
  document.getElementById('qCard').style.display='none';var rs=document.getElementById('resultScreen');rs.classList.add('show');
  var mcQs=QS.filter(function(q){return q.tipo==='mc';});
  var correct=mcQs.filter(function(q){var idx=QS.indexOf(q);return answered[idx]===q.g;}).length;
  var wrong=mcQs.filter(function(q){var idx=QS.indexOf(q);return answered[idx]!==undefined&&answered[idx]!==q.g;}).length;
  var discCount=Object.keys(discAnswered).length;var pct=mcQs.length>0?Math.round((correct/mcQs.length)*100):0;
  var ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');
  document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';
  document.getElementById('resSub').textContent='Você acertou '+correct+' de '+mcQs.length+' questões de múltipla escolha ('+pct+'%)';
  document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=wrong;document.getElementById('resDisc').textContent=discCount;
  buildReport(correct,wrong);rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildReport(correct,wrong){
  var temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};var t=temaStats[q.tema];t.total++;if(q.tipo==='disc'){t.disc++;}else if(answered[i]===q.g){t.correct++;}else if(answered[i]!==undefined){t.wrong++;}});
  var sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});var barsHtml='';
  sorted.forEach(function(tema){var s=temaStats[tema];if(s.disc===s.total){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';}else{var pct=s.total>0?Math.round((s.correct/s.total)*100):0;var good=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(good?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(good?'green':'red')+'">'+pct+'%</span></div>';}});
  var worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||sorted[0]||'—';var wrongListHtml='';
  QS.forEach(function(q,i){if(q.tipo==='mc'&&answered[i]!==undefined&&answered[i]!==q.g){wrongListHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}if(q.tipo==='disc'&&discAnswered[i]){wrongListHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-disc"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Discursiva — revisar gabarito</small></div>';}});
  if(!wrongListHtml)wrongListHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro nas múltipla escolha! 🎉</div>';
  var mcCount=QS.filter(function(q){return q.tipo==='mc';}).length;var pct=mcCount>0?Math.round((correct/mcCount)*100):0;var msg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise antes da prova.';
  document.getElementById('reportContent').innerHTML=
    '<div class="report-section"><h4>Desempenho por tema</h4>'+barsHtml+'</div>'
    +'<div class="report-section"><h4>Insights</h4><div class="insight-grid">'
    +'<div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Mais erros nesse tema</div></div>'
    +'<div class="insight-box"><div class="ib-label">MC acertadas</div><div class="ib-val">'+correct+'/'+mcCount+'</div><div class="ib-sub">'+msg+'</div></div>'
    +'<div class="insight-box"><div class="ib-label">MC erradas</div><div class="ib-val" style="color:#F09595;">'+wrong+'</div><div class="ib-sub">Múltipla escolha</div></div>'
    +'<div class="insight-box"><div class="ib-label">Discursivas</div><div class="ib-val" style="color:#D4A8FF;">'+Object.keys(discAnswered).length+'</div><div class="ib-sub">Questões abertas</div></div>'
    +'</div></div>'
    +'<div class="report-section"><h4>Revisão por questão</h4><div class="q-review-list">'+wrongListHtml+'</div></div>';
}

function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};discAnswered={};eliminated={};sel=null;cur=0;document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
  var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
  <script>
const PROVA_ID = 'soi2-2021-2';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) {
    state.eliminated[k] = Array.from(eliminated[k]);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) {
          eliminated[k] = new Set(state.eliminated[k]);
        }
      }
      return true;
    }
  } catch (e) {}
  return false;
}

const _origSubmit = submitAnswer;
submitAnswer = function() {
  _origSubmit();
  saveLocal();
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) {
    setTimeout(showResult, 100);
  }
}
</script>
