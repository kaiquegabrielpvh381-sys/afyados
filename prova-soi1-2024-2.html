border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}

<script>
const QS=[{"n": 1, "disc": false, "tema": "Bulhas Cardíacas — Ciclo Cardíaco", "context": "(FMIT) Uma paciente, de 35 anos, foi ao consultório médico para a realização de um check-up. Durante a consulta, o médico realizou a ausculta cardíaca e explicou que os sons cardíacos que ele ouvia estavam associados a eventos mecânicos do ciclo cardíaco. Para facilitar a compreensão, o médico utilizou o Diagrama de Wiggers, mostrando à paciente as variações de pressão, volume, sons cardíacos e a relação com os eventos das válvulas cardíacas. Ele ressaltou que os dois principais sons cardíacos (\"bulhas\") indicavam o fechamento das válvulas.", "assertions": null, "text": "Qual dos eventos abaixo está corretamente associado ao primeiro som cardíaco (B1)?", "opts": ["A abertura das valvas atrioventriculares, indicando o início da diástole.", "A abertura das válvulas semilunares, indicando o início da sístole ventricular.", "O fechamento das valvas atrioventriculares, indicando o início da sístole ventricular.", "O fechamento das válvulas semilunares, indicando o início da diástole."], "g": 2, "exp": "Resposta comentada:\nComentários sobre as alternativas:\nO fechamento das válvulas semilunares, indicando o início da diástole.\nIncorreto. O fechamento das válvulas semilunares gera o segundo som cardíaco (B2), e isso ocorre no final da sístole, indicando o início da diástole.\n\nO fechamento das válvulas atrioventriculares, indicando o início da sístole ventricular.\nCorreto. O primeiro som cardíaco (B1) é gerado pelo fechamento das válvulas atrioventriculares (mitral e tricúspide), indicando o início da sístole ventricular, quando o coração começa a bombear o sangue para as artérias.\n\nA abertura das válvulas atrioventriculares, indicando o início da diástole.\nIncorreto. A abertura das válvulas atrioventriculares não está associada a um som audível durante a ausculta cardíaca, e ocorre no início da diástole, mas não gera o primeiro som cardíaco.\n\nA abertura das válvulas semilunares, indicando o início da sístole ventricular.\nIncorreto. A abertura das válvulas semilunares permite que o sangue seja ejetado do coração, mas esse evento também não está associado a sons cardíacos audíveis durante a ausculta.", "deep": "🫀 BULHAS CARDÍACAS — \"TUM-TÁ\"\n\nB1 (\"TUM\"):\n→ Fechamento das válvulas ATRIOVENTRICULARES (mitral + tricúspide)\n→ Início da SÍSTOLE ventricular\n→ Som mais grave e prolongado\n\nB2 (\"TÁ\"):\n→ Fechamento das válvulas SEMILUNARES (aórtica + pulmonar)\n→ Início da DIÁSTOLE ventricular\n→ Som mais agudo e curto\n\n💡 REGRA DE OURO:\n→ ABERTURAS de válvulas = SILENCIOSAS\n→ FECHAMENTOS = geram bulhas\n\n✅ C — CORRETA\n❌ A: abertura AV é silenciosa\n❌ B: abertura semilunar é silenciosa\n❌ D: B2 é fechamento semilunar (não B1)\n\n🎯 MACETE:\nB1 = M1 + T1 (Mitral + Tricúspide)\nB2 = A2 + P2 (Aórtica + Pulmonar)"}, {"n": 2, "disc": false, "tema": "Hipertrofia Cardíaca — Adaptação ao Exercício", "context": "(AFYA GARANHUNS) Durante uma atividade física vigorosa, um atleta bem-treinado consegue atingir um débito cardíaco que é o dobro do débito de uma pessoa sedentária. Neste sentido, a prática regular de exercícios físicos também ajuda a reduzir a pressão arterial, a ansiedade e a depressão; controlar o peso corporal e aumentar a capacidade do corpo de dissolver coágulos.\n\nConsiderando essa situação, avalie as asserções a seguir e a relação proposta entre elas:\n\nI - O treinamento promove hipertrofia, que consiste no aumento do órgão em decorrência do aumento do tamanho/volume das células do coração. Essa condição é denominada Cardiomegalia Patológica ou Hipertrofia Patológica.\n\nPORQUE\n\nII - A prática sustentada de exercícios físicos aumenta a demanda muscular por oxigênio. O atendimento a essa demanda depende sobretudo da adequação do débito cardíaco e do funcionamento apropriado do sistema respiratório.", "assertions": null, "text": "A respeito das asserções acima, assinale a alternativa correta:", "opts": ["As asserções I e II são proposições verdadeiras, mas a II não justifica corretamente a I.", "As asserções I e II são proposições verdadeiras, e a II justifica corretamente a I.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.", "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira."], "g": 3, "exp": "A asserção I se apresenta como falsa uma vez que retrata a Hipertrofia relacionada à prática de exercícios físicos como sendo patológica, no entanto, é sabido que a mesma se apresenta sim como uma adaptação celular, a Hipertrofia, porém de forma Fisiológica.\n\nA asserção II é verdadeira, uma vez que, a prática sustentada de exercícios físicos aumentam sim a demanda muscular por oxigênio.", "deep": "💪 HIPERTROFIA CARDÍACA — FISIOLÓGICA vs PATOLÓGICA\n\nFISIOLÓGICA (\"coração de atleta\"):\n→ Adaptação ao treinamento físico regular\n→ Aumento simétrico das paredes\n→ Função preservada/melhorada\n→ Reversível com destreinamento\n→ Benéfica\n\nPATOLÓGICA:\n→ Resposta a sobrecarga (HAS, estenose aórtica)\n→ Pode levar a IC, arritmias\n→ Geralmente irreversível\n→ Maléfica\n\n✅ D — Asserção I FALSA (é fisiológica)\n   Asserção II VERDADEIRA\n\n💡 MACETE:\nAtleta = HIPERTROFIA FISIOLÓGICA\nDoente (HAS, valvopatia) = HIPERTROFIA PATOLÓGICA\n\n⚠️ Cuidado: II é verdadeira mas NÃO justifica I (porque I é falsa)"}, {"n": 3, "disc": true, "tema": "Sistema Linfático — Histologia e Drenagem", "context": "(UNIPTAN) Durante uma aula prática de histologia, os alunos examinaram lâminas que apresentavam cortes transversais de vasos linfáticos. Esses vasos, ao lado de vasos sanguíneos, mostraram-se com características estruturais distintas. Após a observação, o professor discutiu a importância do sistema linfático e da linfa e seu retorno ao sistema circulatório, bem como seu papel na resposta imunológica. Além disso, o professor explicou o processo de formação da linfa e transporte através do corpo.\n\nConsiderando o que foi discutido em aula e observado nas lâminas histológicas, faça o que se pede nos itens a seguir.\n\nA) Descreva as características histológicas dos vasos linfáticos que os diferenciam dos vasos sanguíneos.\nB) Explique como a linfa é formada a partir do líquido intersticial e descreva o caminho que ela percorre até retornar à circulação sanguínea.", "assertions": null, "text": "Responda aos itens A e B conforme solicitado acima.", "opts": [], "g": null, "exp": "A) Os vasos linfáticos apresentam paredes finas e uma disposição irregular das células endoteliais, em contraste com os vasos sanguíneos que possuem paredes mais espessas e organizadas. Além disso, os vasos linfáticos frequentemente contêm válvulas que impedem o refluxo da linfa, enquanto nos vasos sanguíneos, essas válvulas são encontradas principalmente nas veias.\n\nB) A linfa é formada quando o líquido intersticial, contendo proteínas, células imunes e resíduos celulares, é absorvido pelos capilares linfáticos devido à pressão osmótica. Esse fluido, agora chamado linfa, é transportado através de vasos linfáticos maiores, passando por linfonodos onde ocorre a filtragem e a resposta imunológica. A linfa continua seu caminho até os ductos linfáticos principais, como o ducto torácico, onde finalmente é drenada de volta à circulação sanguínea, especificamente nas junções das veias subclávias com as veias jugulares.", "deep": "💧 SISTEMA LINFÁTICO\n\nA) HISTOLOGIA — Linfáticos vs Sanguíneos:\n→ Paredes FINAS (vs espessas dos sanguíneos)\n→ Endotélio com células IRREGULARES e sobrepostas\n→ VÁLVULAS frequentes (impedem refluxo)\n→ Capilares linfáticos terminam em FUNDO CEGO\n→ Sem hemácias\n\nB) FORMAÇÃO E TRAJETO DA LINFA:\n1️⃣ Líquido intersticial extravasado dos capilares\n2️⃣ Captado por capilares linfáticos (pressão hidrostática)\n3️⃣ Vasos linfáticos progressivamente maiores\n4️⃣ Passa por LINFONODOS (filtragem + imunidade)\n5️⃣ Troncos linfáticos\n6️⃣ DUCTO TORÁCICO (lado E + corpo) ou DUCTO LINFÁTICO DIREITO\n7️⃣ Junção veia subclávia + veia jugular interna\n8️⃣ Retorna à circulação venosa\n\n💡 IMPORTANTE:\n→ Ducto torácico drena ~75% do corpo\n→ Ducto linfático direito drena lado D superior apenas"}, {"n": 4, "disc": false, "tema": "Hemoglobina — Tipos e Estrutura", "context": "(UNITPAC) A hemoglobina é uma proteína globular presente nas hemácias, responsável pelo transporte de oxigênio dos pulmões para os tecidos e de dióxido de carbono dos tecidos para os pulmões. Sua estrutura é formada por quatro subunidades (cadeias polipeptídicas), que variam ao longo da vida e em diferentes condições patológicas. Os principais tipos de hemoglobina no ser humano são a hemoglobina A (HbA), hemoglobina fetal (HbF), hemoglobina A2 (HbA2) e hemoglobina S (HbS), cada uma desempenhando um papel específico e apresentando características estruturais distintas.\n\nConsiderando os diferentes tipos de hemoglobina, suas estruturas e suas funções, analise as assertivas a seguir:\n\nI. A hemoglobina A (HbA), composta por duas cadeias alfa (α) e duas cadeias beta (β), é predominante em adultos e tem afinidade moderada por oxigênio, o que permite liberação eficiente para os tecidos.\nII. A hemoglobina fetal (HbF), composta por duas cadeias alfa (α) e duas cadeias gama (γ), possui maior afinidade por oxigênio em relação à HbA, facilitando a transferência de oxigênio da circulação materna para o feto.\nIII. A hemoglobina S (HbS), característica da anemia falciforme, apresenta uma substituição de aminoácido na cadeia beta (β), o que resulta em uma conformação anômala quando desoxigenada, levando à falcização das hemácias e à diminuição da capacidade de transporte de oxigênio.\nIV. A hemoglobina A2 (HbA2), é composta por uma cadeia alfa (α) e três cadeias beta (δ), é uma variante minoritária da hemoglobina em adultos, cuja função é idêntica à da HbA.", "assertions": null, "text": "Marque a alternativa correta.", "opts": ["Apenas as afirmativas I, II e III estão corretas.", "Apenas as afirmativas III e IV estão corretas.", "Apenas as afirmativas II e III estão corretas.", "Apenas as afirmativas II, III e IV estão corretas."], "g": 0, "exp": "Resposta Correta: Apenas as afirmativas I, II e III estão corretas.\n\nJustificativa:\n\nI está correta. A hemoglobina A (HbA) é a forma predominante nos adultos e é composta por duas cadeias alfa e duas cadeias beta. Sua afinidade moderada por oxigênio é crucial para o equilíbrio entre captação nos pulmões e liberação nos tecidos.\n\nII está correta. A hemoglobina fetal (HbF), com suas cadeias gama, tem maior afinidade por oxigênio, permitindo a troca eficiente de oxigênio da mãe para o feto através da placenta.\n\nIII está correta. A hemoglobina S (HbS) tem uma mutação na cadeia beta, onde o ácido glutâmico é substituído pela valina, o que provoca alterações estruturais na hemoglobina desoxigenada, levando à deformação das hemácias e à característica \"falcização\" observada na anemia falciforme.\n\nIV está incorreta. A hemoglobina A2 (HbA2) é uma pequena porção da hemoglobina adulta (cerca de 2,5%), composta por duas cadeias alfa e duas cadeias delta.", "deep": "🩸 TIPOS DE HEMOGLOBINA\n\n✅ HbA (adulto, ~97%):\n→ 2α + 2β\n→ Afinidade moderada por O₂\n\n✅ HbF (fetal):\n→ 2α + 2γ (gama)\n→ MAIOR afinidade por O₂\n→ Permite \"roubar\" O₂ da mãe na placenta\n→ Substituída pela HbA após nascimento\n\n✅ HbS (falciforme):\n→ Mutação cadeia β (Glu → Val na posição 6)\n→ Polimeriza quando desoxigenada\n→ Hemácia em \"foice\" → vaso-oclusão\n\n❌ HbA2 (variante minoritária ~2,5%):\n→ 2α + 2δ (delta) — NÃO 1α + 3δ como diz IV\n→ Função similar à HbA\n\n💡 MACETE — \"AGS-D\":\n→ Adulto: A (αβ)\n→ Gestação fetal: F (αγ)\n→ Sickle (foice): S (αβ mutado)\n→ Delta minoritária: A2 (αδ)"}, {"n": 5, "disc": false, "tema": "Sistema Complemento — Via Alternativa", "context": "(UNISL JI-PARANÁ) Um trabalhador de 45 anos foi admitido na emergência após sofrer um acidente de trabalho com um objeto cortante. Ele apresenta sinais de infecção grave no braço direito, com febre alta, dor intensa, rubor, calor e edema no local da ferida. Exames laboratoriais indicam leucocitose e aumento de marcadores inflamatórios.\n\nConsiderando o papel do sistema complemento na resposta imune inata e sua função na infecção observada, analise as alternativas abaixo e escolha a que melhor descreve a importância da ativação do sistema complemento na resposta inflamatória e no controle da infecção aguda neste paciente.", "assertions": null, "text": "Assinale a alternativa correta.", "opts": ["A via da lectina do sistema complemento atua na resposta inflamatória ao se ligar a lipídeos microbianos na superfície dos patógenos, iniciando a cascata do complemento e promovendo a inflamação. No entanto, esta via tem um papel secundário em comparação com a via alternativa na opsonização dos patógenos no caso de infecções agudas como a do paciente.", "A via alternativa do sistema complemento é ativada diretamente em superfícies microbianas presentes na ferida do paciente, promovendo a opsonização dos patógenos. O fragmento C3b resultante dessa ativação se liga aos microrganismos, facilitando sua fagocitose pelos neutrófilos e macrófagos e contribuindo para a resolução da infecção e controle da inflamação local.", "A via clássica do sistema complemento é a principal via ativada na resposta imune inata, contribuindo para a opsonização dos patógenos na ferida do paciente. Entretanto, esta via requer a presença de anticorpos para sua ativação e não é a via predominante na resposta inicial à infecção aguda observada no paciente.", "Na resposta imune inata, o sistema complemento é responsável pela regulação da temperatura corporal e pela produção de citocinas que mediam a inflamação. A opsonização dos patógenos e a lise celular são funções não relacionadas ao papel primário do sistema complemento na resposta inflamatória aguda no caso do paciente."], "g": 1, "exp": "Alternativa correta: A via alternativa do sistema complemento é ativada diretamente em superfícies microbianas presentes na ferida do paciente, promovendo a opsonização dos patógenos. O fragmento C3b resultante dessa ativação se liga aos microrganismos, facilitando sua fagocitose pelos neutrófilos e macrófagos e contribuindo para a resolução da infecção e controle da inflamação local.\n\nJustificativa: Esta alternativa está correta porque descreve com precisão o papel da via alternativa do sistema complemento na resposta imune inata. A via alternativa é ativada diretamente em superfícies microbianas, como as presentes na ferida do paciente. O fragmento C3b promovido pela ativação do complemento se liga aos patógenos, facilitando sua opsonização e subsequente fagocitose por neutrófilos e macrófagos, ajudando a controlar a infecção e a inflamação local.\n\nAlternativa incorreta: A via clássica do sistema complemento é a principal via ativada na resposta imune inata, contribuindo para a opsonização dos patógenos na ferida do paciente. Entretanto, esta via requer a presença de anticorpos para sua ativação e não é a via predominante na resposta inicial à infecção aguda observada no paciente.\n\nJustificativa: A via clássica não é a principal via da resposta imune inata, pois é ativada por anticorpos e, portanto, está mais associada à resposta adaptativa. A via alternativa é a mais relevante na resposta inata inicial, especialmente em infecções agudas, como a observada no paciente.\n\nAlternativa incorreta: A via da lectina do sistema complemento atua na resposta inflamatória ao se ligar a lipídeos microbianos na superfície dos patógenos, iniciando a cascata do complemento e promovendo a inflamação. No entanto, esta via tem um papel secundário em comparação com a via alternativa na opsonização dos patógenos no caso de infecções agudas como a do paciente.\n\nJustificativa: A via da lectina atua na resposta inflamatória ao se ligar a carboidratos microbianos na superfície dos patógenos, e embora seja importante na resposta imune inata, não é secundária à via alternativa. Ambas as vias desempenham papéis cruciais na opsonização e na resposta inflamatória, mas a via alternativa é frequentemente a mais relevante na resposta inicial a infecções agudas.\n\nAlternativa incorreta: Na resposta imune inata, o sistema complemento é responsável pela regulação da temperatura corporal e pela produção de citocinas que mediam a inflamação. A opsonização dos patógenos e a lise celular são funções não relacionadas ao papel primário do sistema complemento na resposta inflamatória aguda no caso do paciente.\n\nJustificativa: O sistema complemento não é responsável pela regulação da temperatura corporal nem pela produção de citocinas. Suas principais funções incluem opsonização, promoção da inflamação e lise celular dos patógenos, que são essenciais para a resposta imune inata e para o controle da infecção.", "deep": "🛡 SISTEMA COMPLEMENTO — 3 VIAS\n\n🅰 VIA CLÁSSICA:\n→ Ativada por ANTICORPOS (IgG, IgM)\n→ Ligada à imunidade ADAPTATIVA\n→ Resposta TARDIA\n\n🅱 VIA ALTERNATIVA:\n→ Ativada DIRETAMENTE em superfícies microbianas\n→ Imunidade INATA\n→ Resposta IMEDIATA ✓ (caso do paciente)\n\n🆎 VIA DA LECTINA:\n→ Ativada por CARBOIDRATOS microbianos (não lipídeos!)\n→ Lectina ligadora de manose (MBL)\n→ Imunidade INATA\n\n🎯 FUNÇÕES DO COMPLEMENTO:\n1. OPSONIZAÇÃO (C3b) — facilita fagocitose\n2. INFLAMAÇÃO (C3a, C5a — anafilatoxinas)\n3. LISE celular (MAC — C5b-9)\n\n✅ B — Via alternativa + C3b + opsonização\n❌ A: lectina liga CARBOIDRATOS, não lipídeos\n❌ C: clássica precisa de anticorpos (lenta)\n❌ D: complemento NÃO regula temperatura"}, {"n": 6, "disc": false, "tema": "Citocinas — IL-3 e IL-6", "context": "(UNIPTAN) Um pesquisador está desenvolvendo um novo tratamento para melhorar a regeneração de células sanguíneas e linfócitos após um tratamento agressivo contra o câncer. Ele formula a hipótese de que a manipulação dos níveis de citocinas específicas, como a Interleucina-3 (IL-3) e a Interleucina-6 (IL-6), pode otimizar a recuperação do sistema hemolinfopoético, acelerando a regeneração celular e melhorando o prognóstico dos pacientes.\n\nConsiderando o exposto, avalie as asserções a seguir e a relação proposta entre elas.\n\nI. A IL-3 desempenha um papel crucial na proliferação e diferenciação das células progenitoras hematopoéticas, o que pode contribuir para a regeneração eficiente do sistema hemolinfopoético após tratamentos agressivos contra o câncer.\n\nPORQUE\n\nII. A IL-6 promove a inflamação e a diferenciação dos linfócitos B em plasmócitos, sendo um fator essencial para a resposta imune adaptativa e para a regeneração do tecido hematopoético.", "assertions": null, "text": "A respeito das asserções acima, assinale a opção correta.", "opts": ["As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.", "As asserções I e II são proposições verdadeiras, mas a II não apresenta relação com a asserção I.", "As asserções I e II são proposições falsas.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."], "g": 1, "exp": "A IL-3 é, de fato, crucial para a proliferação e diferenciação das células progenitoras hematopoéticas, desempenhando um papel central na regeneração do sistema hemolinfopoético.\n\nA IL-6 também é importante, mas seu papel está mais relacionado à promoção da inflamação e diferenciação dos linfócitos B em plasmócitos. Embora ambas as citocinas sejam relevantes para a recuperação hematopoética, o papel da IL-6 na inflamação e diferenciação dos linfócitos não justifica diretamente o efeito da IL-3 na proliferação das células progenitoras hematopoéticas.", "deep": "🧬 CITOCINAS HEMATOPOÉTICAS\n\n📌 IL-3 (\"multi-CSF\"):\n→ Proliferação e diferenciação de células progenitoras hematopoéticas\n→ Estimula múltiplas linhagens (eritro, granulo, mono, mega)\n→ Regeneração da medula\n\n📌 IL-6:\n→ Inflamação (fase aguda)\n→ Diferenciação de linfócitos B → PLASMÓCITOS\n→ Resposta imune ADAPTATIVA\n→ Pirogênio endógeno (febre)\n\n✅ B — AMBAS verdadeiras, mas II NÃO justifica I\n→ I trata de progenitoras hematopoéticas (IL-3)\n→ II trata de linfócitos B → plasmócitos (IL-6)\n→ Mecanismos diferentes!\n\n💡 MACETE:\nIL-3 = INÍCIO da hematopoese (progenitoras)\nIL-6 = FIM da resposta imune (plasmócitos)"}, {"n": 7, "disc": false, "tema": "Embriologia Cardíaca — 12ª Semana", "context": "(FIPGUANAMBI) Uma gestante de 32 anos, na 12ª semana de gestação, comparece à consulta de pré-natal preocupada com o desenvolvimento cardíaco do feto, pois sua família possui um histórico de cardiopatias congênitas. Durante o exame, ela pergunta ao obstetra sobre o estágio de desenvolvimento do coração do feto e a possibilidade de detecção precoce de anomalias.", "assertions": null, "text": "Com base no caso descrito acima e em seus conhecimentos sobre embriogênese cardíaca e histologia cardíaca, o coração do feto, nesse estágio:", "opts": ["já está anatomicamente formado e dividido em quatro câmaras cardíacas: dois átrios e dois ventrículos.", "não corre o risco de apresentar defeitos congênitos, pois o septo atrial ainda está em processo de formação.", "ainda não possui as válvulas cardíacas formadas, pois ainda não há fluxo sanguíneo vindo dos pulmões.", "ainda não sofreu o giro, sendo apenas formado pelo bulbo cardíaco, tronco arterioso, átrio primitivo."], "g": 0, "exp": "Na 12a semana do desenvolvimento, o coração fetal está totalmente dividido em quatro câmaras e funciona de maneira semelhante ao coração de um recém-nascido. As válvulas já estão formadas e o coração já sofreu o giro, que geralmente ocorre entre a 4ª e 8ª semana de gestação. A septação do coração já está substancialmente completa, embora pequenos ajustes e desenvolvimentos possam continuar até o nascimento.", "deep": "🫀 EMBRIOGÊNESE CARDÍACA — LINHA DO TEMPO\n\n📅 SEMANAS-CHAVE:\n→ 3ª sem: tubos cardíacos primitivos\n→ 4ª sem: tubo cardíaco único, início do BATIMENTO\n→ 4ª-5ª sem: dobramento (looping/giro)\n→ 5ª-8ª sem: SEPTAÇÃO (atrial, ventricular, troncoconal)\n→ 8ª sem: 4 câmaras formadas\n→ 12ª sem: ✅ coração ESTRUTURALMENTE COMPLETO\n\n✅ A — CORRETA:\n→ 4 câmaras formadas\n→ Válvulas presentes\n→ Giro já ocorrido\n\n❌ B: SEMPRE há risco de cardiopatias congênitas\n❌ C: válvulas formadas no 1º trimestre\n❌ D: giro ocorre entre 4ª-8ª semanas\n\n💡 IMPORTANTE:\nForame oval e ducto arterioso PERSISTEM até o nascimento (circulação fetal)\nMaior parte das cardiopatias congênitas surge entre 3ª-8ª semanas (período crítico)"}, {"n": 8, "disc": false, "tema": "Hemodinâmica dos Vasos", "context": "(FMIT) Durante uma aula prática de fisiologia cardiovascular, os alunos foram divididos em grupos para estudar os diferentes tipos de vasos sanguíneos (artérias, arteríolas, capilares, vênulas e veias) e suas características. O professor apresentou gráficos e modelos que demonstram como a pressão, o fluxo, o volume e a resistência variam entre esses vasos. Foi discutido que a hemodinâmica é essencial para a regulação da pressão arterial e que cada vaso desempenha um papel específico na distribuição e regulação do sangue.", "assertions": null, "text": "Dadas as características hemodinâmicas dos vasos sanguíneos, qual das correlações a seguir está correta?", "opts": ["Artérias: alta pressão, baixa resistência, baixo volume, fluxo contínuo; Capilares: baixa pressão, alta resistência, baixo volume, fluxo contínuo.", "Artérias: alta pressão, alta resistência, alto volume, fluxo contínuo; Veias: baixa pressão, alta resistência, baixo volume, fluxo pulsátil.", "Artérias: alta pressão, alta resistência, baixo volume, fluxo pulsátil; Capilares: baixa pressão, resistência mínima, alto volume, fluxo contínuo.", "Artérias: alta pressão, baixa resistência, baixo volume, fluxo pulsátil; Veias: baixa pressão, baixa resistência, alto volume, fluxo contínuo."], "g": 3, "exp": "Comentário sobre as alternativas:\n\nAlternativa \"Artérias: alta pressão, alta resistência, baixo volume, fluxo pulsátil; Capilares: baixa pressão, resistência mínima, alto volume, fluxo contínuo\" - Incorreta. Embora as artérias apresentem alta pressão e fluxo pulsátil, a resistência nas artérias é baixa, e os capilares têm resistência moderada, não mínima, além de baixo volume e fluxo contínuo.\n\nAlternativa \"Artérias: alta pressão, baixa resistência, baixo volume, fluxo contínuo; Capilares: baixa pressão, alta resistência, baixo volume, fluxo contínuo\" - Incorreta. As artérias têm alta pressão e fluxo pulsátil, não contínuo, e apresentam baixa resistência, não alta. Capilares, por sua vez, têm alta resistência, mas baixo volume, com fluxo contínuo.\n\nAlternativa \"Artérias: alta pressão, baixa resistência, baixo volume, fluxo pulsátil; Veias: baixa pressão, baixa resistência, alto volume, fluxo contínuo\" - Correta. As artérias apresentam alta pressão, baixa resistência, baixo volume e fluxo pulsátil, enquanto as veias apresentam baixa pressão, baixa resistência, alto volume e fluxo contínuo.\n\nAlternativa \"Artérias: alta pressão, alta resistência, alto volume, fluxo contínuo; Veias: baixa pressão, alta resistência, baixo volume, fluxo pulsátil\" - Incorreta. As artérias têm alta pressão, mas a resistência nelas é baixa e o volume é baixo, não alto. As veias possuem baixa pressão e baixa resistência, com alto volume, e fluxo contínuo, não pulsátil.", "deep": "💉 HEMODINÂMICA DOS VASOS\n\n🅰 ARTÉRIAS:\n→ Pressão: ALTA\n→ Resistência: BAIXA (são condutos)\n→ Volume: BAIXO (~13%)\n→ Fluxo: PULSÁTIL\n\n🅱 ARTERÍOLAS:\n→ Pressão: alta-média\n→ Resistência: ALTÍSSIMA ⭐ (vasos de resistência)\n→ Volume: baixo\n→ Controlam fluxo para os tecidos\n\n🆎 CAPILARES:\n→ Pressão: BAIXA\n→ Resistência: alta\n→ Volume: BAIXO\n→ Fluxo: CONTÍNUO (trocas)\n\n🅾 VEIAS:\n→ Pressão: BAIXA\n→ Resistência: BAIXA\n→ Volume: ALTO ⭐ (~64% — reservatório)\n→ Fluxo: CONTÍNUO\n\n✅ D — Artérias pulsátil + Veias alto volume\n\n💡 MACETE:\n→ ARTERÍOLAS = mangueira fina (resistência)\n→ VEIAS = balão de armazenamento (volume)"}, {"n": 9, "disc": false, "tema": "Imunidade Inata vs Adaptativa", "context": "(UNISL JI-PARANÁ) Um paciente de 40 anos apresenta-se na emergência com uma infecção bacteriana aguda. O médico explica que o sistema imunológico do paciente está envolvido em uma resposta complexa que inclui tanto a imunidade inata quanto a imunidade adaptativa. Para combater a infecção, é importante entender como esses dois tipos de resposta imunológica colaboram.", "assertions": null, "text": "Selecione a alternativa que melhor descreve como a imunidade inata e a imunidade adaptativa interagem e se complementam na resposta a uma infecção do paciente.", "opts": ["A imunidade adaptativa é ativada exclusivamente após a imunidade inata ter eliminado a infecção. A imunidade inata é responsável pela produção de anticorpos e citocinas que neutraliza os patógenos, enquanto a imunidade adaptativa coordena a resposta inflamatória e a eliminação ativa dos patógenos.", "A imunidade inata proporciona uma resposta inicial rápida através da ativação de fagócitos e a liberação de citocinas, que ajudam a controlar a infecção até que a imunidade adaptativa possa se desenvolver. A imunidade adaptativa então assume o controle através da produção de anticorpos e a ativação de linfócitos T, que são específicos para o patógeno.", "A imunidade adaptativa é responsável pela resposta inicial imediata ao patógeno, enquanto a imunidade inata é ativada mais tarde e atua na produção de anticorpos que neutralizam o patógeno. A interação entre esses dois tipos de imunidade não é significativa na resposta ao patógeno.", "A imunidade inata e a imunidade adaptativa não interagem entre si. A imunidade inata lida com patógenos extracelulares através da atuação dos anticorpos, enquanto a imunidade adaptativa é responsável apenas por patógenos intracelulares utilizando o sistema complemento para o processo de neutralização."], "g": 1, "exp": "Alternativa correta: A imunidade inata proporciona uma resposta inicial rápida através da ativação de fagócitos e a liberação de citocinas, que ajudam a controlar a infecção até que a imunidade adaptativa possa se desenvolver. A imunidade adaptativa então assume o controle através da produção de anticorpos e a ativação de linfócitos T, que são específicos para o patógeno.\n\nJustificativa: Esta alternativa está correta. A imunidade inata fornece uma resposta inicial rápida e não específica ao patógeno, através de células como macrófagos e neutrófilos, além da liberação de citocinas que ajudam a conter a infecção. À medida que a resposta inata evolui, a imunidade adaptativa se desenvolve, oferecendo uma resposta mais específica através da produção de anticorpos pelos linfócitos B e da ativação dos linfócitos T. Assim, as duas formas de imunidade colaboram e se complementam na resposta ao patógeno.\n\nAlternativa incorreta: A imunidade adaptativa é responsável pela resposta inicial imediata ao patógeno, enquanto a imunidade inata é ativada mais tarde e atua na produção de anticorpos que neutralizam o patógeno. A interação entre esses dois tipos de imunidade não é significativa na resposta ao patógeno.\n\nJustificativa: A imunidade adaptativa não é responsável pela resposta inicial imediata. A resposta inicial é mediada pela imunidade inata. A imunidade adaptativa se desenvolve mais lentamente e, embora envolva a produção de anticorpos, a interação entre os dois tipos de imunidade é crucial para uma resposta eficaz.\n\nAlternativa incorreta: A imunidade adaptativa é ativada exclusivamente após a imunidade inata ter eliminado a infecção. A imunidade inata é responsável pela produção de anticorpos e citocinas que neutraliza os patógenos, enquanto a imunidade adaptativa coordena a resposta inflamatória e a eliminação ativa dos patógenos.\n\nJustificativa: A imunidade adaptativa não é ativada exclusivamente após a imunidade inata ter eliminado a infecção. Em vez disso, a imunidade adaptativa começa a se desenvolver enquanto a imunidade inata está agindo, e ambas interagem na resposta à infecção. A imunidade inata não é responsável pela produção de anticorpos.\n\nAlternativa incorreta: A imunidade inata e a imunidade adaptativa não interagem entre si. A imunidade inata lida com patógenos extracelulares através da atuação dos anticorpos, enquanto a imunidade adaptativa é responsável apenas por patógenos intracelulares utilizando o sistema complemento para o processo de neutralização.\n\nJustificativa: A imunidade inata e adaptativa interagem e se complementam. A imunidade inata atua contra patógenos extracelulares e intracelulares, e a imunidade adaptativa também pode lidar com ambos os tipos de patógenos, dependendo da situação.", "deep": "🛡 IMUNIDADE INATA vs ADAPTATIVA\n\n🅰 INATA (1ª linha — RÁPIDA):\n→ Resposta em MINUTOS-HORAS\n→ INESPECÍFICA\n→ Sem memória\n→ Células: macrófagos, neutrófilos, NK, dendríticas\n→ Moléculas: complemento, citocinas, defensinas\n→ Barreiras físicas (pele, mucosas)\n\n🅱 ADAPTATIVA (2ª linha — LENTA):\n→ Resposta em DIAS\n→ ESPECÍFICA (antígeno)\n→ TEM MEMÓRIA\n→ Células: linfócitos B (anticorpos) e T (citotóxicos/auxiliares)\n→ Tipos: humoral (B/anticorpos) e celular (T)\n\n🤝 INTEGRAÇÃO:\n→ Inata controla infecção INICIALMENTE\n→ Células dendríticas apresentam antígenos aos linfócitos T\n→ Adaptativa se desenvolve EM PARALELO\n→ Ambas atuam JUNTAS\n\n✅ B — Inata rápida + adaptativa específica\n❌ A: inata NÃO produz anticorpos\n❌ C: inverteu papéis\n❌ D: as duas SE COMUNICAM"}, {"n": 10, "disc": false, "tema": "Vascularização dos Membros Inferiores", "context": "(AFYA MANACAPURU) Durante uma consulta de rotina, um paciente que é corredor amador relata ao médico que sente dor nas pernas após longos períodos de treino. O médico decide explicar como a morfofisiologia da vascularização dos membros inferiores pode influenciar essa condição, bem como as adaptações que podem ocorrer com o treinamento físico regular. Com base nesse contexto, identifique corretamente a(s) assertiva(s) a seguir:\n\nI - A artéria femoral, principal responsável pelo suprimento sanguíneo dos membros inferiores, se ramifica em artérias menores, como a artéria poplítea e as artérias tibiais anterior e posterior, garantindo a irrigação adequada das diferentes regiões das pernas e dos pés.\nII - Durante exercícios intensos, a demanda aumentada por oxigênio nos músculos causa uma dilatação dos capilares, melhorando a perfusão sanguínea e facilitando a remoção de metabólitos, como o ácido lático, o que ajuda a reduzir a fadiga muscular.\nIII - O treinamento físico regular estimula a angiogênese, ou seja, a formação de novos capilares nos músculos esqueléticos dos membros inferiores, aumentando a densidade capilar e contribuindo para uma melhor oxigenação e recuperação muscular.\nIV - As veias profundas dos membros inferiores, como a veia femoral, possuem válvulas que previnem o refluxo sanguíneo. Durante atividades físicas prolongadas, como a corrida, essas válvulas são essenciais para facilitar o retorno venoso, prevenindo estase sanguínea e condições como trombose venosa profunda.\nV - A regulação da pressão arterial durante o exercício é crucial, e o sistema nervoso simpático desempenha um papel importante ao induzir vasoconstrição nas artérias dos membros inferiores, garantindo que a pressão arterial sistêmica se mantenha adequada para suprir as necessidades do corpo durante o esforço físico.", "assertions": null, "text": "Assinale a alternativa correta.", "opts": ["Apenas as assertivas I, II e V estão corretas.", "Apenas as assertivas I, III e IV estão corretas.", "Apenas as assertivas III, IV e V estão corretas.", "Apenas as assertivas II, III e IV estão corretas."], "g": 3, "exp": "RESPOSTA CORRETA: Apenas as assertivas II, III e IV estão corretas.\n\nAssertiva I: Está correta ao afirmar que a artéria femoral e suas ramificações são responsáveis pela irrigação dos membros inferiores, mas a resposta está incompleta para ser considerada totalmente correta.\n\nAssertiva II: Correta ao afirmar que a dilatação dos capilares durante o exercício facilita a perfusão sanguínea e a remoção de metabólitos, essencial para o desempenho e recuperação muscular.\n\nAssertiva III: Correta ao mencionar que o treinamento físico promove a angiogênese, aumentando a densidade capilar nos músculos esqueléticos, o que melhora a oxigenação e recuperação muscular.\n\nAssertiva IV: Correta ao descrever a função das válvulas nas veias profundas, que previnem o refluxo e ajudam no retorno venoso durante exercícios prolongados, prevenindo condições como trombose venosa.\n\nAssertiva V: Incorreta, pois durante o exercício físico, ocorre vasodilatação das artérias nos membros inferiores para aumentar o fluxo sanguíneo, e não vasoconstrição, como afirmado.", "deep": "🦵 VASCULARIZAÇÃO DOS MMII\n\n🩸 ANATOMIA ARTERIAL:\nArt. ilíaca externa\n→ Art. FEMORAL (na coxa)\n→ Art. POPLÍTEA (atrás do joelho)\n→ Art. tibiais anterior + posterior\n→ Art. fibular (perna)\n→ Pé\n\n🩸 RETORNO VENOSO:\n→ Veias profundas com VÁLVULAS\n→ \"Bomba muscular\" (panturrilha)\n→ Previne estase e TVP\n\n🏃 EXERCÍCIO — ADAPTAÇÕES:\n✅ II — Vasodilatação capilar (perfusão)\n✅ III — ANGIOGÊNESE crônica (↑ densidade capilar)\n✅ IV — Válvulas + bomba muscular = retorno\n❌ V — VASODILATAÇÃO no músculo ativo (não constrição)\n   * Simpático causa constrição em territórios INATIVOS (esplâncnico, renal)\n\n💡 PARADOXO DO EXERCÍCIO:\n→ Simpático ↑ globalmente\n→ Mas no músculo ATIVO: vasodilatação metabólica predomina\n→ Em territórios não-ativos: vasoconstrição"}, {"n": 11, "disc": true, "tema": "Artérias Coronárias — Descendente Anterior", "context": "(ITPAC PORTO NACIONAL) No laboratório de anatomia humana os alunos identificam as artérias coronárias e comentam entre si que a obstrução destas é a causa do infarto agudo do miocárdio. O professor, ao ouvir a conversa, acrescenta que os infartos anteriores tendem a ter pior prognóstico e que muitos destes eventos estão associados ao ramo interventricular anterior, também conhecido na cardiologia como descendente anterior. Tendo em vista o exposto, responda às perguntas abaixo:\n\na) O vaso citado origina-se de qual artéria coronária?\nb) Que regiões do coração são supridas por esse importante ramo?", "assertions": null, "text": "Responda aos itens a e b conforme solicitado acima.", "opts": [], "g": null, "exp": "a) Artéria coronária esquerda.\nComentário: A Artéria coronária esquerda surge do seio aórtico esquerdo. Ao entrar no sulco coronário divide-se em dois ramos terminais, o ramo interventricular anterior e o ramo circunflexo.\n\nb) Dois terços anteriores do septo interventricular e partes adjacentes do ventrículo direito e esquerdo.\nComentário: O ramo interventricular anterior segue pelo sulco interventricular anterior em direção ao ápice do coração. Em seu trajeto, supre as porções próximas a ele na parede anterior dos dois ventrículos. Além disto, faz o suprimento dos dois terços anteriores do septo interventricular, por meio dos ramos interventriculares septais.", "deep": "❤️ ARTÉRIAS CORONÁRIAS\n\n🅰 CORONÁRIA ESQUERDA (TCE):\nSurge do seio aórtico esquerdo\n→ Tronco curto → divide em 2:\n   1. RAMO INTERVENTRICULAR ANTERIOR (DA — descendente anterior)\n   2. RAMO CIRCUNFLEXO\n\n🅱 CORONÁRIA DIREITA:\nSurge do seio aórtico direito\n→ Sulco coronário direito\n→ Ramo marginal direito\n→ Ramo interventricular posterior (~80% das pessoas)\n\n🎯 DA (DESCENDENTE ANTERIOR) IRRIGA:\n→ 2/3 anteriores do SEPTO interventricular\n→ Parede anterior do VE (e parte do VD)\n→ Ápice do coração\n→ Feixe de His (parcialmente)\n\n💀 \"WIDOW MAKER\":\n→ DA proximal = \"artéria viúva\"\n→ Obstrução proximal = IAM ANTERIOR EXTENSO\n→ Pior prognóstico (grande área isquêmica)\n\n💡 IAM por território:\n→ DA: anterior/septal\n→ Circunflexa: lateral\n→ CD: inferior"}, {"n": 12, "disc": false, "tema": "Histologia Cardíaca vs Esquelética", "context": "(AFYA PALMAS) Os tecidos musculares cardíaco e esquelético são estriados devido a repetição de sarcômeros das miofibrilas contidas nas fibras musculares destes tecidos. Porém, há características histológicas que os diferenciam e contribuem com a função contrátil dos mesmos.", "assertions": null, "text": "Assinale a alternativa que descreve corretamente essas características, diferenciando os tecidos acima, e que esteja relacionada à sua função.", "opts": ["O músculo estriado cardíaco é composto por células fusiformes e mononucleadas, possuem junções comunicantes (junções gap) entre as células que permitem a rápida propagação do impulso elétrico, sincronizando a contração muscular. Essas características são distintas do músculo estriado esquelético, que é formado por células multinucleadas e não possui junções gap.", "O músculo estriado cardíaco possui células multinucleadas e as junções comunicantes (junções gap) entre as células cardíacas que permitem a rápida propagação do impulso elétrico, sincronizando a contração muscular. Essas características são distintas do músculo estriado esquelético, que é formado por células uninucleadas e não possui junções gap.", "As células do músculo estriado cardíaco são cilíndricas e multinucleadas, unidas por discos intercalares que permitem rápida propagação do impulso elétrico de uma célula para outra, coordenando a contração do músculo cardíaco. Essas características diferenciam o músculo cardíaco do esquelético, que possui células mononucleadas e ausência de discos intercalares.", "O músculo estriado cardíaco é caracterizado por células cilíndricas, com um a dois núcleos centrais e os discos intercalares garantem a rápida propagação do impulso elétrico entre as células, facilitando a contração coordenada do coração. Essas características diferem do músculo estriado esquelético, onde os discos intercalares estão ausentes e os núcleos são periféricos."], "g": 3, "exp": "O músculo estriado cardíaco é formado por células alongadas cilíndricas, curtas, com um a dois núcleos centrais. Possui junções comunicantes (junções gap) que permitem a rápida propagação do impulso elétrico entre as células que fazem parte dos discos intercalares, estruturas visíveis na microscopia, características exclusivas deste tecido, que unem as células cardíacas garantindo uma contração coordenada do coração.\n\nO músculo estriado esquelético possui células cilíndricas, alongadas, multinucleadas, com núcleos periféricos e não apresentam discos intercalares.", "deep": "💪 MÚSCULO CARDÍACO vs ESQUELÉTICO\n\n❤️ CARDÍACO:\n→ Células CILÍNDRICAS curtas\n→ 1-2 núcleos CENTRAIS\n→ DISCOS INTERCALARES (exclusivo!)\n   • Contém junções GAP → propagação elétrica\n   • Desmossomos → ancoragem mecânica\n→ Estriado, INVOLUNTÁRIO\n→ Sincicial funcional\n\n💪 ESQUELÉTICO:\n→ Células CILÍNDRICAS longas\n→ MULTINUCLEADO\n→ Núcleos PERIFÉRICOS\n→ SEM discos intercalares\n→ Estriado, VOLUNTÁRIO\n→ Unidades motoras independentes\n\n✅ D — CORRETA\n❌ A: cardíaco NÃO é fusiforme/mononucleado\n❌ B: cardíaco NÃO é multinucleado\n❌ C: cardíaco NÃO é multinucleado\n\n💡 MACETE:\n→ DISCOS INTERCALARES = só CARDÍACO\n→ Núcleo CENTRAL = cardíaco\n→ Núcleo PERIFÉRICO = esquelético\n\nLISO (não na questão):\n→ Fusiforme, 1 núcleo central\n→ Sem estrias\n→ Involuntário"}, {"n": 13, "disc": false, "tema": "Hemostasia — Tampão Plaquetário", "context": "(UNISL JI-PARANÁ) Uma mãe chega ao pronto socorro com o seu filho de 2 anos com um pequeno corte na mão, ao analisar o corte o médico nota que ocorreu apenas uma pequena lesão em um vaso de pequeno calibre.\n\nDiante desse quadro, considere as seguintes asserções sobre o processo hemostático:\n\nAsserção I: No caso desse paciente, a formação do tampão plaquetário é um mecanismo hemostático efetivo na prevenção da perda de sangue.\n\nPor que\n\nAsserção II: O tampão plaquetário pode interromper por completo a perda de sangue se o orifício no vaso sanguíneo não for demasiado grande.", "assertions": null, "text": "Assinale a alternativa correta.", "opts": ["Asserção I é incorreta e a Asserção II é correta.", "Asserção I e II são corretas, mas a Asserção II não é uma explicação correta para a Asserção I.", "Asserção I é correta e a Asserção II é uma explicação correta para a Asserção I.", "Asserção I é correta e a Asserção II é incorreta."], "g": 2, "exp": "Asserção I: \"No caso desse paciente, a formação do tampão plaquetário é um mecanismo hemostático efetivo na prevenção da perda de sangue.\"\nEsta asserção é verdadeira. A formação do tampão plaquetário é um dos primeiros mecanismos hemostáticos que atuam quando há lesão de um vaso de pequeno calibre, como no caso clínico apresentado. A função do tampão é promover a adesão, ativação e agregação de plaquetas, que se acumulam no local da lesão para interromper a perda de sangue de forma rápida e eficiente, especialmente em vasos pequenos.\n\nAsserção II: \"O tampão plaquetário pode interromper por completo a perda de sangue se o orifício no vaso sanguíneo não for demasiado grande.\"\nEsta asserção também é verdadeira. O tampão plaquetário é eficaz em parar o sangramento quando a lesão é pequena e o vaso sanguíneo afetado não é de grande calibre. Se o orifício no vaso é pequeno, o tampão plaquetário pode ser suficiente para selar a lesão, sem a necessidade de mecanismos adicionais, como a coagulação.\n\nRelação entre as asserções: A Asserção II explica corretamente o porquê da Asserção I ser verdadeira. A Asserção I afirma que o tampão plaquetário é efetivo no caso do paciente, enquanto a Asserção II justifica essa eficácia ao esclarecer que o tampão é capaz de interromper a perda de sangue em vasos pequenos, contanto que o orifício não seja demasiado grande.", "deep": "🩸 HEMOSTASIA — 3 ETAPAS\n\n1️⃣ HEMOSTASIA PRIMÁRIA (segundos):\n→ Vasoconstrição reflexa\n→ Adesão plaquetária (via vWF + colágeno)\n→ Ativação plaquetária\n→ Agregação → TAMPÃO PLAQUETÁRIO\n→ Eficaz em vasos PEQUENOS\n\n2️⃣ HEMOSTASIA SECUNDÁRIA (minutos):\n→ Cascata de coagulação\n→ Fibrina forma rede sobre o tampão\n→ Coágulo definitivo\n→ Necessária em lesões maiores\n\n3️⃣ FIBRINÓLISE (horas-dias):\n→ Plasmina degrada fibrina\n→ Remoção do coágulo após cicatrização\n\n✅ C — Ambas verdadeiras + II justifica I\n→ Vaso pequeno = tampão é suficiente\n→ Orifício pequeno = não precisa de coagulação\n\n💡 QUANDO O TAMPÃO NÃO BASTA:\n→ Lesão extensa → precisa cascata de coagulação\n→ Trombocitopenia → tampão deficiente\n→ Doença de von Willebrand → adesão prejudicada"}, {"n": 14, "disc": false, "tema": "Potencial de Ação Cardíaco", "context": "(IESVAP) A frequência cardíaca e o débito cardíaco são fatores essenciais para a eficiência da função cardíaca. O débito cardíaco é determinado pelo volume sistólico e pela frequência cardíaca, sendo influenciado por fatores como pré-carga, pós-carga e contratilidade cardíaca. No contexto das respostas rápidas e lentas do coração, íons e canais iônicos têm papéis específicos na geração de potenciais de ação.\n\n[[IMG_Q14]]", "assertions": null, "text": "Com base nesse conhecimento e na figura apresentada, assinale a alternativa correta.", "opts": ["O influxo de íons Na⁺ é responsável pela repolarização das fibras cardíacas do miocárdio ventricular, contribuindo para o término do potencial de ação nas respostas rápidas.", "A repolarização durante o potencial de ação é impulsionada pelo influxo de Na⁺, restabelecendo o potencial de membrana negativo nas fibras do nó SA.", "A repolarização das células cardíacas é dependente do influxo de íons K⁺, e a sua entrada promove o retorno do potencial de membrana ao estado negativo nas respostas rápidas e lentas.", "O influxo de íons Ca²⁺ e a abertura dos canais lentos de cálcio são características das fibras contráteis durante a fase de platô dos potenciais de ação rápidos."], "g": 3, "exp": "O influxo de íons Na⁺ é responsável pela repolarização das fibras cardíacas do miocárdio ventricular, contribuindo para o término do potencial de ação nas respostas rápidas.\nJustificativa: INCORRETA. A repolarização nas fibras cardíacas ocorre devido ao efluxo de íons K⁺, não pelo influxo de Na⁺. O sódio é responsável pela despolarização rápida no início do potencial de ação, não pelo seu término.\n\nO influxo de íons Ca²⁺ e a abertura dos canais lentos de cálcio são características das fibras contráteis durante a fase de platô dos potenciais de ação rápidos.\nJustificativa: CORRETA. Nas fibras cardíacas contráteis, durante a fase de platô do potencial de ação, há um influxo sustentado de íons Ca²⁺ através de canais de cálcio do tipo L, o que mantém a despolarização prolongada e permite que o músculo cardíaco continue contraído, garantindo uma ejeção efetiva de sangue.\n\nA repolarização durante o potencial de ação é impulsionada pelo influxo de Na⁺, restabelecendo o potencial de membrana negativo nas fibras do nó SA.\nJustificativa: INCORRETA. A repolarização do potencial de ação nas células cardíacas, tanto nas respostas rápidas como lentas, é causada pelo efluxo de íons K⁺, não pelo influxo de Na⁺. O Na⁺ está envolvido principalmente na fase inicial de despolarização nas respostas rápidas.\n\nA repolarização das células cardíacas é dependente do influxo de íons K⁺, e a sua entrada promove o retorno do potencial de membrana ao estado negativo nas respostas rápidas e lentas.\nJustificativa: INCORRETA. A repolarização nas células cardíacas é causada pelo efluxo de íons K⁺, não pelo influxo. A saída de potássio restabelece o potencial negativo de membrana após a despolarização.", "deep": "⚡ POTENCIAL DE AÇÃO CARDÍACO (RESPOSTA RÁPIDA — fibra contrátil)\n\n📊 5 FASES:\n\n0️⃣ DESPOLARIZAÇÃO RÁPIDA:\n→ INFLUXO de Na⁺ (canais rápidos)\n→ Vai de -90 mV até +20 mV\n\n1️⃣ REPOLARIZAÇÃO INICIAL:\n→ Fechamento canais Na⁺\n→ Pequeno efluxo de K⁺\n\n2️⃣ PLATÔ ⭐ (fase única do cardíaco):\n→ INFLUXO de Ca²⁺ (canais L — lentos)\n→ Equilibrado pelo efluxo de K⁺\n→ Mantém despolarização\n→ Permite CONTRAÇÃO sustentada\n→ Período refratário longo (impede tetania)\n\n3️⃣ REPOLARIZAÇÃO:\n→ Fechamento canais Ca²⁺\n→ EFLUXO de K⁺ predomina\n→ Volta a -90 mV\n\n4️⃣ REPOUSO:\n→ Bomba Na⁺/K⁺ ATPase restaura gradientes\n\n✅ D — Ca²⁺ canais lentos no PLATÔ ✓\n❌ A, B, C: REPOLARIZAÇÃO = EFLUXO de K⁺ (não influxo!)\n\n💡 RESPOSTA LENTA (nó SA):\n→ Despolarização por Ca²⁺ (não Na⁺)\n→ Sem platô\n→ Automaticidade (\"marca-passo\")"}, {"n": 15, "disc": false, "tema": "Órgãos Linfoides — Histologia e Anatomia", "context": "(UNIREDENTOR) Durante uma aula prática de anatomia e histologia, um grupo de estudantes de medicina analisou lâminas histológicas e peças anatômicas de diferentes órgãos linfoides. A partir das observações realizadas, foram elaboradas as seguintes afirmativas:\n\nI - Ao analisar um linfonodo, os estudantes identificaram a presença de nódulos linfáticos primários e secundários na região cortical, sendo que nos secundários é possível observar o centro germinativo rico em linfócitos B.\nII - Na análise histológica do timo, os estudantes observaram a presença de corpúsculos de Hassall na medula, que são estruturas tímicas características, formadas por células reticulares epiteliais.\nIII - Ao examinarem o baço, os estudantes identificaram a polpa branca, rica em macrófagos e eritrócitos, e a polpa vermelha, constituída principalmente por tecido linfoide.\nIV - Analisando uma peça anatômica, os estudantes observaram que a drenagem do Baço, via veia esplênica, juntamente com as veias Mesentérica Superior e Mesentérica Inferior compõe a Veia Porta.", "assertions": null, "text": "Assinale a alternativa abaixo, que contém apenas as afirmativas corretas sobre a histologia e a anatomia dos órgãos linfoides.", "opts": ["Apenas I e III estão corretas.", "Apenas I, III e IV estão corretas.", "Apenas I, II e IV estão corretas.", "Apenas II e IV estão corretas."], "g": 2, "exp": "Análise das assertivas:\n\nI - Correta: Os nódulos linfáticos primários e secundários são característicos da região cortical dos linfonodos. O centro germinativo dos nódulos linfáticos secundários é rico em linfócitos B em processo de proliferação e diferenciação.\n\nII - Correta: Os corpúsculos de Hassall são estruturas tímicas características, localizadas na medula do timo, e são formados por células reticulares epiteliais que se degeneram e sofrem queratinização.\n\nIII - Incorreta: A polpa branca do baço é rica em tecido linfoide, principalmente linfócitos, e é onde ocorrem as respostas imunes. A polpa vermelha, por sua vez, é rica em sinusoides esplênicos e macrófagos, sendo responsável pela filtração do sangue.\n\nIV - Correta: A Veia Porta é composta a partir da tributação da Veia Esplênica com a Veia Mesentérica Inferior, e que depois recebe a drenagem venosa da Veia Mesentérica Superior.", "deep": "🧬 ÓRGÃOS LINFOIDES\n\n🅰 LINFONODO:\n→ CÓRTEX (externo): nódulos linfáticos\n   • Primários: linfócitos B em repouso\n   • Secundários: CENTRO GERMINATIVO (B ativados)\n→ PARACÓRTEX: linfócitos T\n→ MEDULA: cordões + sinusoides\n\n🅱 TIMO:\n→ CÓRTEX: timócitos imaturos (seleção)\n→ MEDULA: timócitos maduros + CORPÚSCULOS DE HASSALL ⭐\n   • Células reticulares epiteliais queratinizadas\n   • Exclusivo do timo\n→ Maturação de linfócitos T\n\n🆎 BAÇO:\n→ POLPA BRANCA: tecido LINFOIDE (linfócitos)\n   • Imunidade\n→ POLPA VERMELHA: sinusoides + macrófagos\n   • Filtra sangue, remove hemácias velhas\n\n⚠️ III INVERTEU as polpas!\n\n🩸 VEIA PORTA:\nVeia esplênica + Veia mesentérica INFERIOR → tronco esplenomesentérico\n+ Veia mesentérica SUPERIOR\n= VEIA PORTA HEPÁTICA\n\n✅ C — I, II e IV corretas"}];

const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';let ctxHtml=q.context.replace(/\[\[IMG_Q14\]\]/g,'<img src="'+IMG_Q14+'" style="max-width:100%;border-radius:8px;margin:12px 0;display:block;" alt="Potencial de ação Q14">');if(ctxHtml!==q.context){ctx.innerHTML=ctxHtml;}else{ctx.textContent=q.context;}}else{ctx.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}

function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}

function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false;
function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}
document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);
function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}
document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});

<script>
const PROVA_ID = 'soi1-2024-2';
const PERIODO = 1;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
</script>
