<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[
{n:1,disc:false,tema:"Circulação Fetal — Ducto Arterioso",
context:"(FIP Guanambi) Um neonato a termo, nascido de parto vaginal, apresenta cianose central e desconforto respiratório poucas horas após o nascimento. A equipe médica suspeita de uma falha na transição da circulação fetal para a neonatal. A ecocardiografia revela que uma estrutura que deveria desviar o sangue da circulação pulmonar na vida fetal permaneceu aberta, permitindo a passagem de sangue da aorta para a artéria pulmonar (shunt esquerda-direita) devido à queda da resistência vascular pulmonar. Essa condição está sobrecarregando a circulação pulmonar do bebê.\n\nCom base no cenário clínico descrito, qual estrutura fetal falhou em seu processo de fechamento fisiológico, resultando na sintomatologia do recém-nascido?",
assertions:null,
text:"Com base no cenário clínico descrito, qual estrutura fetal falhou em seu processo de fechamento fisiológico, resultando na sintomatologia do recém-nascido?",
opts:["O forame oval, causando um shunt atrial progressivo.","O ducto venoso, mantendo um desvio do fluxo portal.","As artérias umbilicais, causando fluxo sanguíneo anormal.","O ducto arterioso, resultando em hiperfluxo pulmonar."],
g:3,
exp:'Alternativa correta: O ducto arterioso, resultando em hiperfluxo pulmonar.\n\nO ducto arterioso, na vida fetal, conecta a artéria pulmonar à aorta, permitindo que o sangue bypass o pulmão. Após o nascimento, com a queda da resistência vascular pulmonar e aumento da pressão aórtica, o fluxo se inverte (da aorta para a artéria pulmonar), resultando em shunt esquerda-direita, levando a hiperfluxo pulmonar e sintomas de desconforto respiratório e cianose central.\n\nAlternativa A incorreta: O forame oval é uma comunicação entre os átrios. Se permanecer aberto, pode gerar shunt atrial — mas no enunciado há passagem de sangue da aorta para a artéria pulmonar, incompatível com forame oval.\nAlternativa B incorreta: O ducto venoso conecta a veia umbilical à veia cava inferior. Sua persistência causa alterações hemodinâmicas hepáticas/portais, não cianose ou sobrecarga pulmonar.\nAlternativa C incorreta: As artérias umbilicais se obliteram após o clampeamento do cordão. Sua persistência não tem relação direta com cianose ou sobrecarga pulmonar.\n\nReferência: MOORE, K. M.; PERSAUDE, T. V. N. Embriologia Clínica. 11. ed. Rio de Janeiro: GEN Guanabara Koogan, 2020.',
deep:'👶 PCA — PERSISTÊNCIA DO DUCTO ARTERIOSO\n\nDUCTO ARTERIOSO NA VIDA FETAL:\n→ Conecta: artéria pulmonar ↔ aorta\n→ Desvia sangue da circulação pulmonar (pulmão cheio de líquido)\n→ Mantido aberto por: PGE2 + baixa PO2\n\nFECHAMENTO FISIOLÓGICO:\n→ 1ª respiração → ↑ PO2 → ↓ PGE2\n→ Fechamento funcional: 10-15h após nascimento\n→ Fechamento anatômico: 2-3 semanas\n→ Transforma-se em: LIGAMENTO ARTERIOSO\n\nPCA (Persistência do Ducto Arterioso):\n→ Shunt ESQUERDA → DIREITA (aorta → pulmonar)\n→ Hiperfluxo pulmonar\n→ Sobrecarga de AE e VE\n→ Cianose central + taquipneia\n→ Tratamento: indometacina (inibe PGE2) ou cirurgia\n\n💡 OUTROS SHUNTS FETAIS:\n→ Forame oval: AD → AE (nível atrial)\n→ Ducto venoso: veia umbilical → VCI (hepático)\n→ Ducto arterioso: pulmonar → aorta (nível grandes vasos)'},

{n:2,disc:false,tema:"Circulação Coronariana — Nutrição do Miocárdio",
context:"(UNIFIPMOC) Um homem de 62 anos apresenta dor torácica em aperto após caminhar por alguns minutos. Durante a investigação, o exame de angiotomografia evidencia obstrução significativa em ramo da artéria coronária direita. O médico explica que alterações na irrigação cardíaca comprometem a oferta de oxigênio ao miocárdio, podendo desencadear arritmias devido à influência sobre a excitabilidade das fibras cardíacas e à ação da inervação autônoma.\n\nA análise do caso permite concluir que:",
assertions:null,
text:"A análise do caso permite concluir que:",
opts:["a estimulação parassimpática cardíaca aumenta a frequência e a força de contração, elevando a demanda de oxigênio do miocárdio.","a perfusão coronária ocorre de forma mais intensa durante a sístole, quando há maior pressão intraventricular e expansão dos ramos arteriais.","a circulação sistêmica é responsável pelo retorno venoso ao coração por meio do seio coronário, localizado na face posterior do átrio direito.","a circulação coronária garante o suprimento energético ao miocárdio, uma vez que o sangue intracavitário não é capaz de nutrir diretamente a parede cardíaca."],
g:3,
exp:'Alternativa correta: A circulação coronária garante o suprimento energético ao miocárdio, uma vez que o sangue intracavitário não é capaz de nutrir diretamente a parede cardíaca.\n\nA função da circulação coronariana é nutrir o tecido cardíaco, já que a parede do coração é espessa e não recebe oxigênio de forma eficaz do sangue dentro das câmaras.\n\nAlternativa A incorreta: O parassimpático REDUZ a frequência cardíaca e a força de contração; quem aumenta é o simpático.\nAlternativa B incorreta: A perfusão coronária ocorre principalmente na DIÁSTOLE, quando há relaxamento ventricular e menor compressão dos vasos intramiocárdicos.\nAlternativa C incorreta: O retorno venoso do seio coronário faz parte da circulação CORONARIANA, não da sistêmica em geral. O seio coronário drena para o átrio direito.\n\nReferência: TORTORA, Gerard J. Princípios de anatomia e fisiologia. 14ª ed. Rio de Janeiro: Guanabara Koogan, 2019.',
deep:'❤️ CIRCULAÇÃO CORONARIANA\n\nCARACTERÍSTICAS ESPECIAIS:\n→ Miocárdio NÃO é nutrido pelo sangue intracavitário\n→ Necessita de circulação própria (coronárias)\n→ Maior consumo de O₂ por grama de tecido do corpo\n→ Extração de O₂ já em repouso: ~70% (músculo esquelético: 25%)\n→ ↑ demanda → só ↑ fluxo (↑ vasodilatação coronariana)\n\nPERFUSÃO CORONARIANA:\n→ Ocorre principalmente na DIÁSTOLE\n→ Sístole: compressão dos vasos intramiocárdicos → ↓ fluxo\n→ Diástole: relaxamento → ↑ fluxo\n→ VE: perfusão predominantemente diastólica\n→ VD: pode perfundir em sístole e diástole (menor pressão)\n\nINERVAÇÃO AUTÔNOMA:\n→ Simpático: ↑ FC + ↑ contratilidade + ↑ condução\n→ Parassimpático: ↓ FC + ↓ contratilidade + ↓ condução\n\nDRENAGEM VENOSA CORONARIANA:\n→ Seio coronário (face posterior AD) → 65% do retorno\n→ Veias de Thebésio → câmaras diretamente\n\n💡 MACETE\nCoronária = faz o anel (corona) ao redor do coração\nPerfusão = DIÁSTOLE (coração relaxado)'},

{n:3,disc:false,tema:"Leucócitos — Eosinofilia e Parasitose",
context:"(AFYA Palmas) Homem, 45 anos, chega ao consultório médico com queixas de fadiga crônica, desconforto abdominal e diarreia intermitente que persistem há aproximadamente um mês. Ele relata ter viajado recentemente para uma área rural com saneamento básico precário. O exame físico não revela alterações significativas, exceto por uma leve palidez. O médico suspeita de uma infecção parasitária e solicita um hemograma completo para investigar a causa dos sintomas.",
contextHTML:'<p style="font-size:16px;font-weight:500;line-height:1.8;margin-bottom:16px;">(AFYA Palmas) Homem, 45 anos, chega ao consultório médico com queixas de fadiga crônica, desconforto abdominal e diarreia intermitente que persistem há aproximadamente um mês. Ele relata ter viajado recentemente para uma área rural com saneamento básico precário. O exame físico não revela alterações significativas, exceto por uma leve palidez. O médico suspeita de uma infecção parasitária e solicita um hemograma completo para investigar a causa dos sintomas.</p><p style="font-size:14px;font-weight:700;margin-bottom:8px;">Resultado do Hemograma:</p><table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:4px;"><thead><tr style="background:rgba(255,255,255,0.06);"><th style="padding:8px 12px;text-align:left;border:1px solid rgba(255,255,255,0.1);color:#D8CEEA;">Parâmetro</th><th style="padding:8px 12px;text-align:center;border:1px solid rgba(255,255,255,0.1);color:#D8CEEA;">Resultado</th><th style="padding:8px 12px;text-align:center;border:1px solid rgba(255,255,255,0.1);color:#D8CEEA;">Unidade</th><th style="padding:8px 12px;text-align:center;border:1px solid rgba(255,255,255,0.1);color:#D8CEEA;">Valor de Referência</th></tr></thead><tbody><tr><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Hemácias</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">4,2 × 10⁶</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">/µL</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">4,5 – 5,5 × 10⁶</td></tr><tr style="background:rgba(255,255,255,0.02);"><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Hemoglobina</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">12,5</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">g/dL</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">13 – 17</td></tr><tr><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Leucócitos totais</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">8.500</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">/µL</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">4.000 – 11.000</td></tr><tr style="background:rgba(255,255,255,0.02);"><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Neutrófilos</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">47</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">%</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">50 – 70</td></tr><tr><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#FF6EB4;font-weight:700;">Eosinófilos</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#FF6EB4;font-weight:700;">18 ↑</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">%</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">1 – 4</td></tr><tr style="background:rgba(255,255,255,0.02);"><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Linfócitos</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">30</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">%</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">20 – 40</td></tr><tr><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Monócitos</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">4</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">%</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">2 – 8</td></tr><tr style="background:rgba(255,255,255,0.02);"><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);color:#F4EFFA;">Basófilos</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#F4EFFA;">1</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">%</td><td style="padding:7px 12px;border:1px solid rgba(255,255,255,0.07);text-align:center;color:#9080A8;">0 – 1</td></tr></tbody></table>',
assertions:null,
text:"Com base no hemograma e no quadro clínico do paciente, qual das seguintes alternativas descreve corretamente a função da principal célula envolvida na infecção?",
opts:["Diferencia-se em plasmócitos para produzir anticorpos específicos que neutralizam toxinas e vírus na corrente sanguínea.","Atua como célula apresentadora de antígenos, ativando outras células de defesa para coordenar a resposta imune adaptativa.","Realiza a fagocitose de pequenas bactérias e fungos, sendo a primeira a chegar ao local da infecção para a defesa inicial.","Libera grânulos citotóxicos, contendo enzimas e proteínas, para danificar a membrana e a parede de parasitas grandes."],
g:3,
exp:'Alternativa correta: Libera grânulos citotóxicos, contendo enzimas e proteínas, para danificar a membrana e a parede de parasitas grandes.\n\nA alteração mais notável no hemograma do paciente é a eosinofilia (eosinófilos: 18%, valor de referência 1–4%). Essa condição está frequentemente associada a infecções parasitárias (especialmente por vermes) e reações alérgicas. Os eosinófilos se aderem à superfície dos parasitas e liberam o conteúdo de seus grânulos, que contêm proteínas e enzimas tóxicas. A proteína básica principal (MBP) e a proteína catiônica dos eosinófilos (ECP) são particularmente eficazes em perfurar e desestabilizar a membrana do parasita, levando à sua morte.\n\nAlternativa A incorreta: Função dos linfócitos B, que se diferenciam em plasmócitos para produzir anticorpos.\nAlternativa B incorreta: Apresentação de antígenos é função central de macrófagos e células dendríticas.\nAlternativa C incorreta: Função principal dos neutrófilos, que são a primeira linha de defesa contra infecções bacterianas.\n\nReferências: ABBAS, A. K. et al. Imunologia Básica. 7. ed. Rio de Janeiro: GEN Guanabara Koogan, 2025. GARTNER, L. P.; LEE, L. M. J. Histologia. 8. ed. Rio de Janeiro: Guanabara Koogan, 2024. JUNQUEIRA, L. C.; CARNEIRO, J. Histologia Básica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2023.',
deep:'🔬 EOSINÓFILOS — FUNÇÕES E CARACTERÍSTICAS\n\nIDENTIFICAÇÃO NO HEMOGRAMA:\n→ Eosinófilos normais: 1–4%\n→ Caso: 18% = EOSINOFILIA SIGNIFICATIVA\n→ Causa: infecção PARASITÁRIA (helmintos/protozoários)\n\nCARACTERÍSTICAS HISTOLÓGICAS:\n→ Núcleo: bilobado\n→ Grânulos: GRANDES, vermelho-alaranjado (coram pela eosina)\n→ Grânulos específicos contêm:\n   MBP (proteína básica principal)\n   ECP (proteína catiônica do eosinófilo)\n   Peroxidase eosinofílica\n   → Citotóxicos para PARASITAS GRANDES\n\nFUNÇÕES:\n→ Resposta contra HELMINTOS e protozoários\n→ Mecanismo: ADCC (citotoxicidade celular dependente de anticorpo)\n→ Modulação de reações ALÉRGICAS\n\n❌ POR QUE AS OUTRAS ERRAM:\n❌ A: Plasmócitos/anticorpos = linfócito B\n❌ B: Apresentação de antígenos = macrófago/dendrítica\n❌ C: Fagocitose de bactérias = NEUTRÓFILO\n\n💡 MACETE\nEosinofilia = E de Enteroparasitose\nEosinófilo = E de Eosinofílico (grânulos rosa/vermelho)\nContra parasitas GRANDES (não pode fagocitar, libera grânulos)'},

{n:4,disc:false,tema:"Hemoglobina — Tipos e Estruturas",
context:"(UNISL Porto Velho) A hemoglobina (Hb) é uma proteína encontrada exclusivamente nos eritrócitos e sua principal função é o transporte de oxigênio (O₂) dos pulmões até os capilares dos tecidos periféricos. Existem variações nas cadeias polipeptídicas da Hb, que possibilitam classificá-las como HbF, HbA1, HbA2 e HbS, sendo esta última associada à anemia falciforme.",
contextHTML:'<p style="font-size:16px;font-weight:500;line-height:1.8;margin-bottom:20px;">(UNISL Porto Velho) A hemoglobina (Hb) é uma proteína encontrada exclusivamente nos eritrócitos e sua principal função é o transporte de oxigênio (O₂) dos pulmões até os capilares dos tecidos periféricos. Existem variações nas cadeias polipeptídicas da Hb, que possibilitam classificá-las como HbF, HbA1, HbA2 e HbS, sendo esta última associada à anemia falciforme.</p><div style="background:#ffffff;border-radius:14px;padding:24px 20px 16px;margin-bottom:12px;display:flex;justify-content:center;gap:48px;align-items:flex-end;flex-wrap:wrap;"><div style="text-align:center;"><div style="font-size:22px;font-weight:800;color:#111;margin-bottom:10px;">A</div><svg width="100" height="90" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="28" rx="22" ry="22" fill="#b3c0f5" stroke="#8898e8" stroke-width="1.5"/><text x="30" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">β₁</text><ellipse cx="70" cy="28" rx="22" ry="22" fill="#b3c0f5" stroke="#8898e8" stroke-width="1.5"/><text x="70" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">β₂</text><ellipse cx="30" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="30" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₁</text><ellipse cx="70" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="70" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₂</text></svg></div><div style="text-align:center;"><div style="font-size:22px;font-weight:800;color:#111;margin-bottom:10px;">B</div><svg width="100" height="90" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="28" rx="22" ry="22" fill="#f5d96a" stroke="#d4b030" stroke-width="1.5"/><text x="30" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">γ₁</text><ellipse cx="70" cy="28" rx="22" ry="22" fill="#f5d96a" stroke="#d4b030" stroke-width="1.5"/><text x="70" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">γ₂</text><ellipse cx="30" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="30" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₁</text><ellipse cx="70" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="70" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₂</text></svg></div><div style="text-align:center;"><div style="font-size:22px;font-weight:800;color:#111;margin-bottom:10px;">C</div><svg width="100" height="90" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg"><ellipse cx="30" cy="28" rx="22" ry="22" fill="#7dd8c4" stroke="#3fa88a" stroke-width="1.5"/><text x="30" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">δ₁</text><ellipse cx="70" cy="28" rx="22" ry="22" fill="#7dd8c4" stroke="#3fa88a" stroke-width="1.5"/><text x="70" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">δ₂</text><ellipse cx="30" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="30" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₁</text><ellipse cx="70" cy="66" rx="22" ry="22" fill="#d8ddf7" stroke="#aab0e5" stroke-width="1.5"/><text x="70" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#111" font-family="serif">α₂</text></svg></div></div><p style="font-size:12px;color:#555;text-align:center;margin-bottom:4px;">Fonte: Autoria do Elaborador</p>',
assertions:null,
text:"Marque a alternativa que representa adequadamente o tipo de hemoglobina de acordo com a figura.",
opts:["A figura \"B\" representa a hemoglobina mais encontrada no feto e no recém-nascido.","A figura \"A\" representa a hemoglobina que está em menor quantidade nos adultos.","A figura \"B\" representa a hemoglobina que possui menor afinidade com oxigênio.","A figura \"C\" representa a hemoglobina que está em maior quantidade nos adultos."],
g:0,
exp:'Alternativa correta: A figura "B" representa a hemoglobina mais encontrada no feto e no recém-nascido.\n\nA figura A (α₁α₂β₁β₂) representa a HbA1, a hemoglobina mais comum em adultos (>95%).\nA figura B (α₁α₂γ₁γ₂) é a HbF (hemoglobina fetal), presente no feto e no recém-nascido, podendo constituir até 1% da Hb no adulto.\nA figura C (α₁α₂δ₁δ₂) é a HbA2, a menos comum no adulto (2–5%).\n\nAlternativa B incorreta: A figura A representa a HbA1, a hemoglobina mais encontrada em adultos (mais abundante, não a de menor quantidade).\nAlternativa C incorreta: A figura B (HbF) possui ALTA afinidade por O₂ — isso ocorre devido à baixa afinidade da cadeia γ pelo 2,3-BPG, o qual interage eficientemente com as cadeias β expressas no adulto, garantindo transferência eficiente de O₂ da mãe para o feto.\nAlternativa D incorreta: A figura C representa a HbA2, que está em MENOR quantidade nos adultos (2–5%), não em maior quantidade.\n\nReferência: HARVEY, R. A.; FERRIER, D. R. Bioquímica Ilustrada de Ferrier. 5ª ed. Porto Alegre: Artmed, 2012.',
deep:'🩸 TIPOS DE HEMOGLOBINA\n\nHbA1 (Figura A — α₂β₂):\n→ Hemoglobina do ADULTO (principal)\n→ >95% da Hb em adultos\n→ Cadeias: 2α + 2β\n→ Afinidade por O₂: NORMAL\n→ 2,3-BPG interage com cadeias β → ↓ afinidade em tecidos\n\nHbF (Figura B — α₂γ₂) ✅:\n→ Hemoglobina FETAL\n→ 90–95% da Hb no feto e RN\n→ Cadeias: 2α + 2γ\n→ Afinidade por O₂: ALTA (↑ que HbA1)\n→ Por quê? Cadeia γ NÃO interage bem com 2,3-BPG\n→ Permite transferência O₂ da mãe para o feto\n→ No adulto: <1%\n\nHbA2 (Figura C — α₂δ₂):\n→ Hemoglobina adulto SECUNDÁRIA\n→ 2–5% da Hb em adultos\n→ Cadeias: 2α + 2δ\n→ ↑ na beta-talassemia (diagnóstico)\n\nHbS (não mostrada — α₂β₂S):\n→ Anemia FALCIFORME\n→ Mutação na cadeia β (val→glu na posição 6)\n→ Polimerização em baixa PO₂ → forma falciforme\n\n💡 MACETE\nA = Adulto (β) = predominante\nF = Fetal (γ) = alta afinidade O₂\nA2 = Additional (δ) = pequena quantidade\nS = Sickle (falciforme) = mutação β'},

{n:5,disc:false,tema:"Arteríolas — Resistência Vascular Periférica",
context:"(FACIMPA) Um homem de 55 anos, sedentário e com histórico de tabagismo, procura atendimento médico para uma consulta de rotina. Ele não relata queixas específicas no momento. Ao exame físico, apresenta-se em bom estado geral, com Índice de Massa Corporal (IMC) de 29 kg/m². A ausculta cardíaca e pulmonar não revela alterações. Suas medidas de pressão arterial, aferidas em três ocasiões diferentes com a técnica correta, são consistentemente elevadas, com média de 150/95 mmHg. Exames laboratoriais complementares não sugerem uma causa secundária para a sua condição. O médico o diagnostica com Hipertensão Arterial Sistêmica (HAS) primária e explica que a condição está associada a um aumento da resistência ao fluxo sanguíneo nos vasos.\n\nConsiderando a fisiologia do sistema vascular e o quadro clínico apresentado, qual segmento da árvore vascular é o principal responsável pelo aumento da resistência vascular periférica total que fundamenta o diagnóstico de hipertensão primária neste paciente?",
assertions:null,
text:"Qual segmento da árvore vascular é o principal responsável pelo aumento da resistência vascular periférica total que fundamenta o diagnóstico de hipertensão primária neste paciente?",
opts:["As grandes artérias elásticas, como a aorta, que perdem sua complacência com a idade, dificultando a acomodação do volume sistólico ejetado pelo ventrículo.","As vênulas e veias, que atuam como os principais reservatórios de volume do sistema circulatório (vasos de capacitância) e, portanto, controlam a pressão de todo o sistema.","Os capilares, pois representam a maior área de secção transversal total do sistema, o que naturalmente impõe a maior barreira para a passagem do sangue.","As arteríolas, devido à sua capacidade de contrair a espessa camada de músculo liso em sua parede, regulando ativamente o fluxo sanguíneo para os leitos capilares."],
g:3,
exp:'Alternativa correta: As arteríolas, devido à sua capacidade de contrair a espessa camada de músculo liso em sua parede, regulando ativamente o fluxo sanguíneo para os leitos capilares.\n\nAs arteríolas são conhecidas como os "vasos de resistência" do sistema circulatório. Elas possuem uma parede muscular relativamente espessa (túnica média) em comparação com seu lúmen, ricamente inervada pelo sistema nervoso simpático e sensível a agentes vasoativos locais e humorais. A contração (vasoconstrição) ou relaxamento (vasodilatação) desse músculo liso altera drasticamente o raio do vaso, e como a resistência é inversamente proporcional à quarta potência do raio (R∝1/r⁴), pequenas mudanças no diâmetro arteriolar causam grandes variações na resistência.\n\nAlternativa A incorreta: Embora a redução da complacência das grandes artérias contribua para o aumento da pressão de pulso, ela não é o principal determinante do aumento da RVP total na HAS primária.\nAlternativa B incorreta: Vênulas e veias têm baixa resistência ao fluxo e são vasos de capacitância. Não são o principal local de controle da RVP.\nAlternativa C incorreta: Embora os capilares tenham a maior área de seção transversal total, a maior queda de pressão ocorre antes dos capilares, nas arteríolas.\n\nReferência: Hall JE, Hall ME. Guyton and Hall Textbook of Medical Physiology. 14th ed. Philadelphia, PA: Elsevier; 2021.',
deep:'🩸 VASOS DE RESISTÊNCIA — ARTERÍOLAS\n\nLEI DE POISEUILLE:\nR = 8ηL / πr⁴\n→ Resistência ∝ 1/r⁴\n→ Pequena ↓ no raio = GRANDE ↑ na resistência\n\nARTERÍOLAS (vasos de resistência):\n→ Parede muscular espessa / lúmen pequeno\n→ Inervação simpática densa\n→ Sensíveis a: NA, angiotensina II, endotelina (↑R)\n→ Sensíveis a: NO, prostaciclina, adenosina (↓R)\n→ Principal determinante da RVP\n\nHAS PRIMÁRIA (essencial):\n→ ↑ RVP por vasoconstrição arteriolar crônica\n→ Mecanismos: ↑ simpático, ↑ angiotensina II, disfunção endotelial\n→ PA = DC × RVP\n→ RVP↑ → PA↑\n\nPOR QUE NÃO SÃO AS OUTRAS:\n→ Aorta: complacência afeta pressão de pulso, não RVP total\n→ Veias: vasos de CAPACITÂNCIA (volume, não resistência)\n→ Capilares: área transversal grande = BAIXA velocidade, troca\n   A maior queda de pressão é PRÉ-capilar (nas arteríolas)\n\n💡 MACETE\nArterÍola = Índice de resistência\nR ∝ 1/r⁴ = lei do quarto poder'},

{n:6,disc:false,tema:"Eritropoiese — EPO e Fatores Nutricionais",
context:"(AFYA Manacapuru) Durante uma aula prática em laboratório de morfofisiologia, os alunos analisam um hemograma completo de um paciente com anemia ferropriva crônica e observam lâminas histológicas da medula óssea hematopoiética. O caso clínico descreve um paciente com dispneia aos esforços, palidez e fadiga. O hemograma mostra redução significativa no número de hemácias e hemoglobina, com VCM (Volume Corpuscular Médio) baixo.\n\nConsiderando os mecanismos fisiológicos da eritropoiese, avalie as asserções a seguir e a relação proposta entre elas:",
assertions:"I. A eritropoiese é regulada pela eritropoietina (EPO), secretada principalmente pelos rins em resposta à hipóxia, e pela disponibilidade de ferro, vitamina B12 e ácido fólico, essenciais para a síntese de hemoglobina e a maturação das hemácias.\nPorque\nII. A eritropoietina estimula apenas os estágios finais da diferenciação eritroide, sem influenciar células progenitoras comprometidas nem depender da presença de substratos nutricionais para efetivar sua ação.",
text:"Assinale a alternativa correta:",
opts:["A asserção I é uma proposição verdadeira e a II é uma proposição falsa.","A asserção I é uma proposição falsa e a II é uma proposição verdadeira.","As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.","As asserções I e II são proposições verdadeiras e a II é uma justificativa correta da I."],
g:0,
exp:'Alternativa correta: A asserção I é uma proposição verdadeira e a II é uma proposição falsa.\n\nAsserção I — Verdadeira: A produção de hemácias é regulada pela EPO, que aumenta em situações de hipóxia. A eritropoiese também depende de ferro (síntese de heme) e de vitamina B12 e ácido fólico (síntese de DNA para divisão celular).\n\nAsserção II — Falsa: A EPO não age apenas nos estágios finais — ela estimula desde células progenitoras comprometidas (UFC-E) até fases intermediárias da linhagem eritroide. Além disso, sua ação é efetiva somente se houver substratos adequados, como ferro, B12 e folato, que permitem a síntese de hemoglobina e a divisão celular.\n\nReferência: HALL, John E.; HALL, Michael E. Guyton & Hall Fundamentos de Fisiologia. 14. ed. Rio de Janeiro: GEN Guanabara Koogan, 2023.',
deep:'🔴 ERITROPOIESE — REGULAÇÃO\n\nERITROPOIETINA (EPO):\n→ Produzida: células peritubulares dos RINS (90%) + fígado (10%)\n→ Estímulo: HIPÓXIA tecidual\n→ Mecanismo: HIF-1α → transcrição EPO\n\nAÇÃO DA EPO (ampla, não só estágio final):\n→ BFU-E (burst forming unit)\n→ UFC-E (unidade formadora de colônia eritroide)\n→ Proeritroblasto → eritroblastos → reticulócito\n→ ↑ proliferação + ↑ diferenciação + ↑ sobrevivência\n\nFATORES NUTRICIONAIS ESSENCIAIS:\n→ FERRO: síntese do grupo HEME\n   Deficiência → ↓ Hb → microcítica hipocrômica (VCM↓)\n→ VITAMINA B12 e FOLATO: síntese de DNA\n   Deficiência → ↑ VCM → macrocítica megaloblástica\n\nANEMIA FERROPRIVA (caso):\n→ VCM baixo = MICROCÍTICA\n→ Hemácias ↓, Hb ↓\n→ EPO ↑ (hipóxia) mas sem ferro = EPO ineficaz\n\n💡 MACETE\nI ✅ — EPO + ferro + B12 + folato\nII ❌ — EPO age desde progenitores (UFC-E), não só estágios finais'},

{n:7,disc:false,tema:"Débito Cardíaco — Atleta vs Sedentário",
context:"(ITPAC Porto Nacional) Durante uma atividade prática de fisiologia, dois estudantes de Medicina coletaram dados de frequência cardíaca e volume sistólico em repouso. O primeiro, um jovem atleta de alto rendimento, apresentou frequência cardíaca de repouso de 48 bpm e volume sistólico aumentado. O segundo, um colega sedentário, apresentou frequência cardíaca de 78 bpm e volume sistólico dentro da média. O professor pediu que a turma discutisse como o exercício físico crônico influencia o débito cardíaco e seus determinantes, relacionando essas variáveis às adaptações observadas nos dois colegas.\n\nQual das alternativas explica corretamente a diferença entre os achados no atleta e no sedentário?",
assertions:null,
text:"Qual das alternativas explica corretamente a diferença entre os achados no atleta e no sedentário?",
opts:["O sedentário mantém o débito cardíaco de repouso reduzido, pois sua frequência cardíaca mais alta não é suficiente para compensar o baixo volume sistólico.","No atleta, o débito cardíaco de repouso é semelhante ao do sedentário, mas o volume sistólico aumentado compensa a frequência cardíaca mais baixa, resultado de maior eficiência cardíaca.","O atleta apresenta menor débito cardíaco em repouso, já que a frequência cardíaca reduzida não é capaz de manter a perfusão adequada dos tecidos.","O atleta apresenta maior débito cardíaco em repouso devido à frequência cardíaca reduzida, que é compensada pelo menor volume sistólico."],
g:1,
exp:'Alternativa correta: No atleta, o débito cardíaco de repouso é semelhante ao do sedentário, mas o volume sistólico aumentado compensa a frequência cardíaca mais baixa, resultado de maior eficiência cardíaca.\n\nO exercício físico crônico promove bradicardia fisiológica de repouso (maior tônus vagal e remodelamento cardíaco), aumentando a eficiência do coração. Assim, mesmo com frequência cardíaca menor, o volume sistólico aumentado garante débito cardíaco semelhante ao de indivíduos sedentários.\n\nAlternativa A incorreta: O sedentário tem DC normal em repouso — sua FC mais alta compensa o menor VS, resultando em DC adequado.\nAlternativa C incorreta: O atleta tem DC de repouso normal (não menor). O VS elevado compensa a bradicardia.\nAlternativa D incorreta: O atleta tem VS MAIOR (não menor), e DC de repouso semelhante ao sedentário.\n\nReferência: Guyton, A. C.; Hall, J. E. Tratado de Fisiologia Médica. 14ª ed. Elsevier, 2021.',
deep:'🏃 DÉBITO CARDÍACO — ATLETA vs SEDENTÁRIO\n\nFÓRMULA:\nDC = VS × FC\n\nSEDENTÁRIO (repouso):\n→ FC: ~70-80 bpm\n→ VS: ~70 mL\n→ DC: ~5 L/min\n\nATLETA (repouso):\n→ FC: 40-60 bpm (bradicardia fisiológica)\n→ VS: ~100-120 mL (↑ por hipertrofia excêntrica VE)\n→ DC: ~5 L/min (SEMELHANTE ao sedentário)\n→ VS alto × FC baixa = DC normal\n\nPOR QUE O CORAÇÃO DO ATLETA É MAIS EFICIENTE:\n→ Hipertrofia excêntrica → ↑ volume VE → ↑ pré-carga\n→ Lei de Frank-Starling: ↑ estiramento → ↑ força de ejeção\n→ ↑ tônus vagal → bradicardia de repouso\n→ Mais tempo em diástole → melhor enchimento + perfusão coronariana\n\nNO EXERCÍCIO MÁXIMO:\n→ Atleta: DC = 30-40 L/min\n→ Sedentário: DC = 20-25 L/min\n\n💡 MACETE\nRepouso: atleta e sedentário têm DC IGUAL\nExercício máximo: atleta tem DC MUITO MAIOR'},

{n:8,disc:false,tema:"Histologia Cardíaca — Discos Intercalares",
context:"(AFYA Itacoatiara) Durante uma aula prática de histologia, os alunos analisaram lâminas coradas em HE contendo cortes transversais e longitudinais do tecido cardíaco. Ao observar as lâminas, perceberam que as fibras musculares apresentavam-se estriadas, curtas e ramificadas, com núcleos centrais, além da presença de discos intercalares unindo as células vizinhas. Também foi possívelível identificar vasos sanguíneos de pequeno e médio calibre localizados no tecido conjuntivo intersticial que envolve as fibras. O professor destacou que essas características não apenas diferenciam o tecido cardíaco de outros tipos de músculo, mas também são essenciais para compreender sua origem embrionária e sua função fisiológica. Diante disso, propôs que os alunos relacionassem as observações histológicas com o papel desempenhado pelo coração na manutenção da circulação sanguínea.\n\nCom base no texto, qual alternativa explica corretamente a importância funcional dessas características?",
assertions:null,
text:"Com base no texto, qual alternativa explica corretamente a importância funcional dessas características?",
opts:["As fibras cardíacas possuem múltiplos núcleos periféricos, semelhantes ao músculo esquelético, o que favorece contrações voluntárias rápidas e sustentadas.","A baixa vascularização do miocárdio limita a oferta de oxigênio, sendo compensada pela contração lenta e contínua semelhante ao músculo liso.","A origem embrionária do coração no endoderma justifica a presença de fibras musculares lisas adaptadas à resistência ao estiramento contínuo.","A presença dos discos intercalares garante a conexão elétrica e mecânica entre as fibras, permitindo a propagação coordenada do estímulo."],
g:3,
exp:'Alternativa correta: A presença dos discos intercalares garante a conexão elétrica e mecânica entre as fibras, permitindo a propagação coordenada do estímulo.\n\nOs discos intercalares possuem junções comunicantes (gap junctions) e desmossomos, que garantem a transmissão elétrica e a adesão mecânica entre as fibras. Isso permite que o miocárdio funcione como um sincício funcional, no qual o estímulo elétrico se propaga rapidamente e de forma coordenada, essencial para a contração rítmica e eficiente do coração.\n\nAlternativa A incorreta: O músculo cardíaco tem fibras curtas, ramificadas e com núcleo CENTRAL (único). Contrações são INVOLUNTÁRIAS, não voluntárias.\nAlternativa B incorreta: O miocárdio é altamente vascularizado (elevada demanda metabólica). As contrações são rápidas e rítmicas, não lentas e contínuas.\nAlternativa C incorreta: O coração tem origem MESODÉRMICA, não endodérmica. Sua histologia é de músculo estriado cardíaco, não músculo liso.\n\nReferência: SILVERTHORN, Dee U. Fisiologia humana. 7ª ed. Porto Alegre: ArtMed.',
deep:'🫀 MÚSCULO CARDÍACO — CARACTERÍSTICAS HISTOLÓGICAS\n\nCOMPARAÇÃO DOS TIPOS MUSCULARES:\n\nESQL. ESQUELÉTICO:\n→ Fibras longas, cilíndricas\n→ Multinucleado, núcleos PERIFÉRICOS\n→ Contração VOLUNTÁRIA\n→ Sem discos intercalares\n→ Origem: mesoderma somítico\n\nMÚSCULO LISO:\n→ Células fusiformes pequenas\n→ Núcleo central único\n→ Contração INVOLUNTÁRIA\n→ Sem estriações\n\nMÚSCULO CARDÍACO ✅:\n→ Fibras curtas, RAMIFICADAS\n→ Núcleo CENTRAL único\n→ Contração INVOLUNTÁRIA e rítmica\n→ ESTRIADO (sarcomeros)\n→ DISCOS INTERCALARES:\n   Gap junctions → propagação elétrica (sincício funcional)\n   Desmossomos → adesão mecânica\n→ Origem: mesoderma esplâncnico (NÃO endoderma)\n→ Alta densidade de mitocôndrias\n→ Alta vascularização\n\n💡 MACETE\nCardíaco = estriado + involuntário + ramificado\nDisco intercalar = "tomada elétrica + cola mecânica"'},

{n:9,disc:false,tema:"Hemostasia — Endotélio e Fatores Pró e Anticoagulantes",
context:"(UNIDEP) Um paciente procura a Unidade Básica de Saúde após se cortar com um pedaço de vidro enquanto lavava louça. Apesar de o sangramento ter diminuído espontaneamente, ele relata preocupação com a possibilidade de o ferimento sangrar novamente. Durante a consulta, o profissional de saúde aproveita para explicar como o corpo reage a lesões vasculares por meio de mecanismos naturais de controle da perda sanguínea, regulando a fluidez do sangue e evitando tanto hemorragias quanto a formação de trombos indesejados.\n\nCom base no contexto acima, avalie as assertivas a seguir e a relação entre elas:",
assertions:"I. O endotélio íntegro exerce função anticoagulante e antiagregante, mas quando lesado, passa a expor colágeno e liberar fatores pró-coagulantes que iniciam a adesão plaquetária e a cascata de coagulação.\nPorque\nII. O endotélio lesado libera fator de von Willebrand (FvW), que facilita a adesão das plaquetas ao colágeno subendotelial, ao mesmo tempo em que a produção de prostaciclina (PGI₂) e óxido nítrico (NO) é reduzida, favorecendo a agregação plaquetária.",
text:"É correto afirmar que:",
opts:["As asserções I e II são verdadeiras, mas a II não justifica a I.","A assertiva I é verdadeira e a II é falsa.","As asserções I e II são verdadeiras e a II justifica a I.","A assertiva I é falsa e a II é verdadeira."],
g:2,
exp:'Alternativa correta: As asserções I e II são verdadeiras e a II justifica a I.\n\nA asserção I está correta ao destacar o duplo papel do endotélio: anticoagulante quando íntegro e pró-coagulante quando lesado. A asserção II complementa explicando os mediadores envolvidos: FvW (pró-coagulante, facilita adesão plaquetária) e PGI₂ e NO (anticoagulantes, cuja produção é reduzida após lesão, favorecendo a agregação).\n\nEndotélio ÍNTEGRO produz:\n→ PGI₂ (prostaciclina): inibe agregação plaquetária\n→ NO (óxido nítrico): vasodilatação + inibe agregação\n→ Trombomodulina: anticoagulante\n→ t-PA: fibrinólise\n\nEndotélio LESADO expõe/libera:\n→ Colágeno subendotelial: ativa plaquetas\n→ FvW: facilita adesão plaquetária ao colágeno\n→ Fator Tecidual (TF/fator III): inicia via extrínseca da coagulação\n\nReferências: HALL, J. E.; HALL, M. E. Guyton & Hall Fundamentos de Fisiologia. 14. ed. 2023. KUMAR, V. et al. Robbins & Cotran Patologia. 10. ed. Rio de Janeiro: GEN Guanabara Koogan, 2023.',
deep:'🩸 ENDOTÉLIO — DUPLO PAPEL NA HEMOSTASIA\n\nENDOTÉLIO ÍNTEGRO (ANTICOAGULANTE):\n→ PGI₂ (prostaciclina): ↑ AMPc plaquetário → ↓ agregação\n→ NO: vasodilatação + ↓ agregação plaquetária\n→ Trombomodulina: ativa proteína C → inativa Va e VIIIa\n→ TFPI: inibe fator Xa e VIIa-TF\n→ Heparan sulfato: ativa antitrombina III\n→ t-PA: fibrinólise (dissolve coágulos)\n\nENDOTÉLIO LESADO (PRÓ-COAGULANTE):\n→ Expõe colágeno subendotelial → ativa plaquetas\n→ Libera FvW → adesão plaquetária ao colágeno\n→ Expressa Fator Tecidual (TF) → via extrínseca\n→ ↓ PGI₂ e NO → favorece vasoconstrição + agregação\n\nFATOR DE VON WILLEBRAND (FvW):\n→ Produzido por: células endoteliais (corpos de Weibel-Palade)\n→ Função: ponte entre plaqueta (GPIb) e colágeno\n→ Também carrega fator VIII na circulação\n\n💡 MACETE\nEndotélio íntegro = PGI₂ + NO = NÃO agrega\nEndotélio lesado = FvW + TF = AGREGA + COAGULA'},

{n:10,disc:false,tema:"Organelas Celulares — Núcleo e Mitocôndria",
context:"(UNIDOMPEDRO) Em uma aula prática de biologia celular, os alunos preparam lâminas para observação ao microscópio óptico e analisam diferentes estruturas de células eucarióticas animais. Durante a discussão, são levantadas algumas afirmações sobre a organização e função dessas estruturas. Analise abaixo as afirmações feitas pelos alunos.\n\nI. O núcleo celular, delimitado pelo envelope nuclear, contém o material genético e é responsável pelo controle das atividades celulares por meio da regulação da expressão gênica.\nII. As mitocôndrias são organelas que apresentam DNA próprio e participam da respiração celular aeróbica e do processo de produção de ATP.\nIII. Os lisossomos são responsáveis pela síntese de proteínas e lipídios, além de atuarem no transporte intracelular de substâncias recém-produzidas.\nIV. O complexo de Golgi é responsável pela degradação do peróxido de hidrogênio para evitar a oxidação celular.",
assertions:null,
text:"Marque a alternativa que contém todas as assertivas corretas.",
opts:["Apenas II e III.","Apenas I e IV.","Apenas I e II.","Apenas III e IV."],
g:2,
exp:'Alternativa correta: Apenas I e II.\n\nI — Verdadeiro: O núcleo celular é delimitado pelo envelope nuclear e abriga o DNA organizado na forma de cromatina. É o local onde ocorre a transcrição do RNA, essencial para a regulação da expressão gênica e o controle das atividades celulares.\n\nII — Verdadeiro: As mitocôndrias possuem DNA próprio (origem endossimbiótica) e sua principal função é participar da respiração celular aeróbica, gerando ATP por fosforilação oxidativa nas cristas mitocondriais.\n\nIII — Falso: Os lisossomos não participam da síntese de proteínas e lipídios. Sua principal função é a degradação de macromoléculas e organelas celulares por autofagia. A síntese de proteínas ocorre nos ribossomos/RER, e de lipídios no REL.\n\nIV — Falso: O complexo de Golgi não degrada peróxido de hidrogênio. Essa função pertence aos PEROXISSOMOS (enzima catalase). O complexo de Golgi processa e distribui proteínas e lipídios em vesículas.\n\nReferências: ALBERTS, B. et al. Fundamentos da biologia celular. 3. ed. Porto Alegre: Artmed, 2011. GUYTON, J. E.; HALL, M. E. Tratado de Fisiologia Médica. 14. ed. 2021. JUNQUEIRA, L. C.; CARNEIRO, J. Biologia celular e molecular. 9. ed. Rio de Janeiro: Guanabara Koogan, 2013.',
deep:'🔬 ORGANELAS CELULARES — REVISÃO\n\nNÚCLEO ✅:\n→ Envelope nuclear (dupla membrana + poros nucleares)\n→ Cromatina → cromossomos\n→ Nucléolo → síntese de rRNA\n→ Função: controle das atividades celulares (regulação gênica)\n\nMITOCÔNDRIA ✅:\n→ DNA mitocondrial próprio (circular)\n→ Dupla membrana: externa + interna (cristas)\n→ RESPIRAÇÃO CELULAR AERÓBICA → ATP\n→ Ciclo de Krebs (matriz) + Fosforilação oxidativa (cristas)\n\nLISSOMO ❌ (síntese, não):\n→ Contém enzimas hidrolíticas (pH ácido ~4,5)\n→ Função: DIGESTÃO intracelular (heterofagia + autofagia)\n→ NÃO sintetiza proteínas ou lipídios\n\nCOMPLEXO DE GOLGI ❌ (não degrada H₂O₂):\n→ Recebe vesículas do RER\n→ Processa, modifica (glicosilação) e distribui proteínas\n→ Forma: lisossomos + vesículas secretoras\n→ NÃO degrada H₂O₂\n\nPEROXISSOMO (não listado):\n→ Catalase: degrada H₂O₂\n→ Beta-oxidação de ácidos graxos\n\n💡 MACETE\nLisossomo = lixo (lise/digestão)\nGolgi = correio (distribuição)\nPeroxissomo = detox (H₂O₂)'},

{n:11,disc:false,tema:"Retorno Venoso — Veias Safenas",
context:"(UNITPAC) Idoso, 65 anos, procura atendimento relatando cansaço nas pernas ao final do dia, inchaço nos tornozelos e sensação de peso. No exame físico, observam-se varicosidades leves nos membros inferiores. Considerando a anatomia do retorno venoso dos membros inferiores, qual estrutura é a mais diretamente relacionada com esse quadro, podendo tornar-se insuficiente e favorecer os sintomas descritos?",
assertions:null,
text:"Qual estrutura é a mais diretamente relacionada com esse quadro, podendo tornar-se insuficiente e favorecer os sintomas descritos?",
opts:["Veia safena parva e magna, vasos superficiais drenam a perna e região poplítea.","Artéria femoral comum, responsável pela irrigação principal do membro inferior.","Veia cava inferior, principal via de drenagem sanguínea da metade inferior do corpo.","Artéria tibial posterior, responsável pela irrigação da região plantar e dorsal do pé."],
g:0,
exp:'Alternativa correta: Veia safena parva e magna, vasos superficiais drenam a perna e região poplítea.\n\nAs veias safenas (magna e parva) são os principais vasos do sistema venoso superficial dos membros inferiores, frequentemente acometidos na insuficiência venosa crônica. Quando suas válvulas se tornam incompetentes, o sangue reflui, favorecendo estase venosa, varicosidades, edema e sintomas de dor e cansaço.\n\nAlternativa B incorreta: A artéria femoral comum é um vaso ARTERIAL responsável pela irrigação do membro inferior. Não participa do retorno venoso.\nAlternativa C incorreta: Embora a veia cava inferior seja o principal vaso de drenagem venosa da metade inferior do corpo, não é a estrutura diretamente responsável por sintomas locais de varizes, que se originam principalmente no sistema venoso superficial.\nAlternativa D incorreta: A artéria tibial posterior é um vaso ARTERIAL que irriga a região plantar e dorsal do pé. Não participa do retorno venoso.\n\nReferências: NETTER, F. H. Atlas de Anatomia Humana. 7. ed. Rio de Janeiro: Elsevier, 2019. TORTORA, G. J.; DERRICKSON, B. Princípios de Anatomia e Fisiologia. 15. ed. Rio de Janeiro: Guanabara Koogan, 2019.',
deep:'🦵 SISTEMA VENOSO DOS MEMBROS INFERIORES\n\nSISTEMA SUPERFICIAL (varicose):\n→ VEIA SAFENA MAGNA ✅:\n   Maior veia do corpo\n   Maléolo medial → fossa oval (v. femoral)\n   Drena: face medial da perna e coxa\n→ VEIA SAFENA PARVA ✅:\n   Maléolo lateral → veia poplítea\n   Drena: face posterior da perna\n→ Comunicantes perfurantes: superficial ↔ profundo\n\nSISTEMA PROFUNDO:\n→ Veias tibiais anterior e posterior\n→ Veia poplítea\n→ Veia femoral → veia ilíaca externa → VCI\n\nINSUFICIÊNCIA VENOSA CRÔNICA:\n→ Incompetência das válvulas das safenas\n→ Refluxo → estase venosa\n→ Varicosidades (veias tortuosas e dilatadas)\n→ Edema, dor, peso, câimbras\n→ Casos graves: úlcera varicosa\n\nFATORES DE RISCO:\n→ Hereditariedade, obesidade, ortostatismo\n→ Gravidez, sedentarismo\n\n💡 MACETE\nVarizes = SAFENA (superficial)\nArtérias = irrigação (não drenam)\nVCI = grande tronco (não causa variz local)'},

{n:12,disc:false,tema:"ECG — Despolarização Ventricular e Ejeção",
context:"(AFYA Cruzeiro do Sul) Em uma atividade prática de laboratório de Fisiologia, estudantes do 1º período de Medicina realizaram a aferição da frequência cardíaca de um colega em repouso e registraram seu eletrocardiograma. Observaram que cada onda P era seguida de um complexo QRS e uma onda T, com intervalos regulares entre os ciclos. O professor orientou os estudantes a correlacionarem esse traçado com as fases do ciclo cardíaco e a explicarem como a sequência elétrica observada garante o fluxo sanguíneo eficiente. Durante a discussão, um estudante pergunta: \"Por que a despolarização ventricular, observada no ECG, ocorre antes da ejeção do sangue?\" Sendo assim, assinale a opção que responde corretamente ao questionamento do aluno.",
assertions:null,
text:"Assinale a opção que responde corretamente ao questionamento do aluno.",
opts:["Relaciona-se ao fato de a despolarização atrial sincronizar-se com a contração ventricular, assegurando a sequência correta entre enchimento e ejeção do sangue.","Relaciona-se à ocorrência da repolarização ventricular, que gera a queda de pressão e possibilita a abertura das valvas atrioventriculares para o esvaziamento do coração.","Relaciona-se à presença da onda T, que marca o relaxamento ventricular, permitindo o retorno do sangue venoso e a manutenção do débito cardíaco.","Relaciona-se à necessidade de o estímulo elétrico ventricular deflagrar a contração, elevando a pressão até abrir as valvas semilunares e permitir o escoamento do sangue."],
g:3,
exp:'Resposta correta: Relaciona-se à necessidade de o estímulo elétrico ventricular deflagrar a contração, elevando a pressão até abrir as valvas semilunares e permitir o escoamento do sangue.\n\nA despolarização ventricular precede a ejeção porque inicia a contração ventricular, gerando o aumento da pressão intraventricular até superar a pressão arterial, o que abre as valvas semilunares e permite o débito de sangue.\n\nAlternativa A incorreta: A despolarização atrial (onda P) ocorre antes da ventricular e sua contração complementa o enchimento, não se sincroniza com a ejeção ventricular.\nAlternativa B incorreta: A repolarização ventricular (onda T) está associada ao relaxamento e queda de pressão, que ocorre APÓS a ejeção, não antes. Não provoca abertura de valvas semilunares.\nAlternativa C incorreta: A onda T indica o início do relaxamento ventricular, não o mecanismo da ejeção. O retorno venoso ocorre na diástole, mas não tem relação direta com a sequência elétrica descrita.\n\nReferências: GUYTON, A. C.; HALL, J. E. Tratado de Fisiologia Médica. 14. ed. 2021. COSTANZO, L. S. Fisiologia. 6. ed. 2022. BERNE, R. M.; LEVY, M. N. Fisiologia. 6. ed. 2018.',
deep:'⚡ ECG — CORRELAÇÃO ELÉTRICO-MECÂNICA\n\nONDAS DO ECG:\n→ Onda P: despolarização ATRIAL → contração atrial\n→ Intervalo PR: condução nodo AV (retardo fisiológico)\n→ Complexo QRS: despolarização VENTRICULAR → contração VE/VD\n→ Onda T: repolarização VENTRICULAR → relaxamento\n\nSEQUÊNCIA ELETROMECÂNICA:\n1. QRS → despolarização ventricular\n2. Contração ventricular (sístole) → ↑ pressão intraventricular\n3. Pressão VE > Pressão Aorta → abertura valva AÓRTICA\n4. Ejeção de sangue para a aorta\n5. Onda T → repolarização → relaxamento\n6. Pressão VE < Pressão Aorta → fechamento valva aórtica → S2\n7. Diástole → enchimento ventricular\n\nPOR QUE DESPOLARIZAÇÃO PRECEDE EJEÇÃO:\n→ O estímulo elétrico INICIA a contração mecânica\n→ Contração → ↑ pressão → supera PA → abre valva\n→ Acoplamento excitação-contração (Ca²⁺)\n→ Delay elétrico → mecânico: ~40-60ms\n\n💡 MACETE\nElétrico → Mecânico → Hemodinâmico\nQRS → Contração → Ejeção\nP → Sístole atrial\nT → Relaxamento ventricular'},

{n:13,disc:false,tema:"Potencial de Ação Cardíaco — Canais Iônicos",
context:"(UNIDOMPEDRO) Durante uma aula prática de Fisiologia, os estudantes analisam dois tipos de potenciais de ação registrados em células cardíacas. Um tipo apresenta uma despolarização rápida, caracterizada por uma subida abrupta do potencial de membrana, enquanto o outro apresenta uma despolarização lenta, com uma subida gradual. O professor solicita que os alunos relacionem, para cada tipo de potencial, os íons responsáveis, os canais iônicos predominantes e as regiões do coração em que esses potenciais ocorrem.\n\nCompare os potenciais de ação de resposta rápida e de resposta lenta quanto aos íons envolvidos, canais predominantes e regiões cardíacas em que ocorrem e, em seguida, assinale a alternativa correta.",
assertions:null,
text:"Compare os potenciais de ação de resposta rápida e de resposta lenta quanto aos íons envolvidos, canais predominantes e regiões cardíacas em que ocorrem e, em seguida, assinale a alternativa correta.",
opts:["O potencial de resposta rápida depende de canais rápidos de sódio, ocorre em ventrículos, átrios e fibras de Purkinje, enquanto o de resposta lenta depende de canais de cálcio e predomina nos nódulos sinoatrial e atrioventricular.","O potencial de resposta rápida ocorre apenas em células musculares atriais e ventriculares, mediado por canais de potássio, enquanto o de resposta lenta ocorre em todos os tecidos cardíacos, mediado por canais de cálcio.","O potencial de resposta rápida depende de canais de cálcio, ocorre nos nódulos sinoatrial e atrioventricular, enquanto o de resposta lenta depende de canais rápidos de sódio e predomina em ventrículos e átrios.","O potencial de resposta lenta depende de canais de potássio, ocorre em ventrículos e átrios, enquanto o de resposta rápida depende de canais rápidos de sódio e predomina nos nódulos sinoatrial e atrioventricular."],
g:0,
exp:'Alternativa correta: O potencial de resposta rápida depende de canais rápidos de sódio, ocorre em ventrículos, átrios e fibras de Purkinje, enquanto o de resposta lenta depende de canais de cálcio e predomina nos nódulos sinoatrial e atrioventricular.\n\nO potencial de ação de resposta rápida ocorre nas fibras contráteis atriais e ventriculares, incluindo as fibras de Purkinje. A fase de despolarização rápida é mediada pela abertura de canais de sódio rápidos (Na⁺). O potencial de ação de resposta lenta ocorre nas células marcapasso do nódulo sinoatrial (SA) e atrioventricular (AV), com despolarização gradual mediada principalmente por canais de cálcio tipo L e pelo "funny current" (If) de sódio.\n\nAlternativa B incorreta: O potencial rápido é mediado por Na⁺, não por K⁺. O K⁺ é crucial na repolarização, não na despolarização.\nAlternativa C incorreta: Esta alternativa está INVERSA — o rápido não depende de Ca²⁺ e não ocorre nos nódulos; o lento não depende de Na⁺ rápido e não predomina em ventrículos/átrios.\nAlternativa D incorreta: O potencial lento não é mediado por K⁺ para a despolarização inicial, e o rápido não predomina nos nódulos SA/AV.\n\nReferências: HALL, J. E.; HALL, M. E. Guyton & Hall. 14. ed. 2021. AIRES, M. de M. Fisiologia. 5ª ed. 2018. CURI, R.; PROCÓPIO, J. Fisiologia Básica. 2ª ed. 2017.',
deep:'⚡ POTENCIAIS DE AÇÃO CARDÍACOS — COMPARATIVO\n\nRESPOSTA RÁPIDA ✅:\n→ Locais: VENTRÍCULOS + ÁTRIOS + fibras de PURKINJE\n→ Íon da despolarização: Na⁺ (canais RÁPIDOS de sódio)\n→ Fases:\n   0: abertura INa rápido → despolarização abrupta (-90 → +20mV)\n   1: inativação INa + abertura Ito\n   2: PLATÔ (Ca²⁺ tipo L entra + K⁺ sai) → contração prolongada\n   3: abertura IKr e IKs → repolarização\n   4: potencial de repouso estável (-90mV)\n\nRESPOSTA LENTA ✅:\n→ Locais: nodo SINOATRIAL (SA) + nodo ATRIOVENTRICULAR (AV)\n→ Íon da despolarização: Ca²⁺ (canais tipo L) + "Funny current" (If)\n→ Fases:\n   0: abertura ICa,L → despolarização GRADUAL (-60 → +10mV)\n   3: abertura IK → repolarização\n   4: DESPOLARIZAÇÃO DIASTÓLICA ESPONTÂNEA (If = Na⁺/K⁺)\n→ Automatismo (marca-passo) = fase 4 instável\n\n❌ ERROS COMUNS:\n→ K⁺ = repolarização (NÃO despolarização)\n→ Potencial rápido = sódio (NÃO cálcio)\n→ Potencial lento = nódulos (NÃO ventrículos)\n\n💡 MACETE\nNodal (SA/AV) = lento = cálcio = automático\nVentricular/Purkinje = rápido = sódio = contrátil'},

{n:14,disc:true,tema:"Sistema Linfático — Formação da Linfa e Fluxo",
context:"(UNIGRANRIO Barra) Durante uma aula prática de Morfofisiologia do Sistema Linfático, os alunos de Medicina do primeiro período estudaram a estrutura e a função dos vasos linfáticos. O foco da atividade foi a formação da linfa, seu trajeto, o fluxo unidirecional e os fatores que impulsionam sua circulação.",
assertions:null,
text:"A) Formação da linfa e seu trajeto.\nExplique como o fluido intersticial se transforma em linfa e descreva seu percurso até o retorno à circulação sanguínea.\n\nB) Função das válvulas e fluxo linfático.\nExplique o papel das válvulas nos vasos linfáticos e como elas garantem o fluxo unidirecional da linfa.\n\nC) Fatores que impulsionam a circulação linfática.\nCite os mecanismos que contribuem para o movimento da linfa em direção ao coração, incluindo a atuação da musculatura e de forças externas.",
opts:[],g:null,
exp:'A) Formação da linfa e trajeto:\nO fluido intersticial entra nos capilares linfáticos (vasos de fundo de saco, endotélio simples, lâmina basal incompleta), tornando-se linfa.\nPercurso: capilares linfáticos → vasos aferentes dos linfonodos → linfonodos → vasos eferentes → ductos linfáticos (ducto torácico e ducto linfático direito) → veias subclávias, retornando à circulação sanguínea.\n\nB) Função das válvulas e fluxo linfático:\nAs válvulas impedem o refluxo, garantindo que a linfa flua somente em direção ao coração. Entre as válvulas, os vasos apresentam dilatações que conferem aspecto "em colar de contas". A linfa atravessa linfonodos e órgãos linfoides de forma contínua, mantendo o transporte de linfócitos e fatores imunológicos.\n\nC) Fatores que impulsionam a circulação linfática:\n— Contração da musculatura esquelética circunjacente aos vasos.\n— Contração rítmica da musculatura lisa das paredes dos vasos linfáticos maiores.\n— Pressão externa intermitente sobre os vasos e presença das válvulas.\nEsses mecanismos mantêm o fluxo unidirecional em direção ao coração e auxiliam no transporte de células e mediadores do sistema imune.\n\nReferências: JUNQUEIRA, L. C.; CARNEIRO, J. Histologia Básica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2023. SILVERTHORN, D. U. Fisiologia Humana. 7. ed. Porto Alegre: ArtMed, 2024.',
deep:'💧 SISTEMA LINFÁTICO — REVISÃO COMPLETA\n\nFORMAÇÃO DA LINFA:\n→ Fluido intersticial (excesso de filtração capilar)\n→ Entra por capilares linfáticos (fundo cego)\n→ Endotélio SIMPLES + lâmina basal incompleta\n→ Células endoteliais sobrepostas como "pétalas"\n   → Pressão intersticial ↑ = abertura → entrada de linfa\n\nTRAJETO:\nCapilares linfáticos\n→ Vasos linfáticos aferentes\n→ LINFONODOS (filtragem + resposta imune)\n→ Vasos eferentes\n→ Troncos linfáticos\n→ DUCTO TORÁCICO (esquerdo) ou Ducto linfático direito\n→ Veia subclávia esquerda/direita → VCS → coração\n\nVÁLVULAS:\n→ Bicúspides (igual às veias)\n→ Garantem FLUXO UNIDIRECIONAL\n→ Aspecto "colar de contas" entre válvulas\n\nMOTORES DO FLUXO LINFÁTICO:\n→ Musculatura ESQUELÉTICA (bomba muscular)\n→ Musculatura LISA dos vasos (contração rítmica)\n→ Pulsação arterial adjacente\n→ Movimentos respiratórios (↓ pressão torácica → aspiração)\n→ Válvulas (impedem refluxo)\n\n💡 MACETE\nLinfa = plasma filtrado que não voltou para o capilar\nDucto TORÁCICO = drena TUDO exceto lado direito superior'},

{n:15,disc:true,tema:"Órgãos Linfoides Primários — Timo e Tonsila",
context:"(AFYA Itacoatiara) Durante uma aula prática de histologia, os alunos receberam lâminas representando órgãos linfoides: timo, linfonodo, baço e tonsila palatina. Cada lâmina apresenta características histológicas distintas, que refletem a função imunológica de cada órgão.\n\nNa lâmina 1, observou-se uma estrutura bilobada, com córtex e medula, contendo corpúsculos de Hassall.\nNa lâmina 2, observou-se tecido linfoide com criptas profundas, folículos e acúmulo de linfócitos.",
assertions:null,
text:"Com base nas lâminas 1 e 2:\n\na. Identifique cada órgão, descrevendo sua organização histológica (regiões e tipos celulares predominantes) e sua função imunológica. (1,25 pontos)\n\nb. Compare os dois órgãos quanto à participação na resposta imune, destacando um aspecto em que se complementam funcionalmente. (1,25 pontos)",

exp:'a) Lâmina 1 — Timo:\nO timo é um órgão bilobado localizado no tórax, logo acima do coração. Não tem folículos linfoides; em vez disso, seus lóbulos são divididos em um córtex externo, corado mais intensamente, composto de células reticulares epiteliais, macrófagos e linfócitos T pequenos (timócitos), e em uma medula interna, corada mais fracamente, que consiste em linfócitos T grandes, células reticulares epiteliais e corpúsculos de Hassall (corpúsculos tímicos). As células reticulares epiteliais derivadas do endoderma fornecem suporte estrutural e funcional. As principais funções desse órgão linfoide primário são a formação, a potencialização e, quando necessário, a destruição de linfócitos T.\n\nLâmina 2 — Tonsila Palatina:\nAs tonsilas palatinas estão localizadas uma de cada lado na parte oral da faringe. O tecido linfoide forma uma faixa relativamente espessa sob o epitélio estratificado pavimentoso da faringe, com folículos linfoides e grande quantidade de linfócitos dispostos de maneira difusa. Uma característica importante é a presença de invaginações epiteliais (criptas da tonsila), que penetram profundamente no parênquima. O epitélio que reveste as criptas está frequentemente infiltrado por linfócitos e outras células inflamatórias.\n\nb) Comparação e complementação:\nO timo (lâmina 1) é um órgão linfoide primário, responsável pela maturação dos linfócitos T. Não entra em contato direto com antígenos externos, mas prepara os linfócitos para atuarem de forma eficaz e segura na periferia.\nA tonsila palatina (lâmina 2) é um órgão linfoide secundário, situado na orofaringe e constantemente exposto a microrganismos. Sua histologia mostra folículos linfoides com centros germinativos ativos, permitindo a ativação de linfócitos B e T em resposta a antígenos.\nComplementação funcional: o timo fornece linfócitos T maduros, enquanto a tonsila palatina utiliza esses linfócitos e outros elementos imunes para montar respostas contra patógenos que entram pela boca e faringe, atuando como uma barreira inicial de defesa.\n\nReferências: JUNQUEIRA, L. C.; CARNEIRO, J. Histologia Básica. 14. ed. Rio de Janeiro: Guanabara Koogan, 2023. SILVERTHORN, D. U. Fisiologia humana. 7. ed. Porto Alegre: ArtMed.',
deep:'🫁 TIMO vs TONSILA PALATINA\n\nTIMO (Lâmina 1) — Órgão PRIMÁRIO:\n→ Localização: mediastino anterior\n→ Bilobado, dividido em lóbulos por septos\n→ CÓRTEX (denso/escuro):\n   Timócitos imaturos (linfócitos T em maturação)\n   Células reticulares epiteliais\n   Macrófagos\n→ MEDULA (clara/rara):\n   Linfócitos T maduros\n   Corpúsculos de Hassall (células epiteliais queratinizadas)\n→ Função: MATURAÇÃO + SELEÇÃO dos linfócitos T\n   Seleção positiva (reconhece MHC) e negativa (tolerância)\n→ Sem exposição direta a antígenos externos\n→ Involui na puberdade\n\nTONSILA PALATINA (Lâmina 2) — Órgão SECUNDÁRIO:\n→ Localização: orofaringe (Anel de Waldeyer)\n→ Epitélio pavimentoso estratificado não queratinizado\n→ CRIPTAS: invaginações profundas do epitélio\n   ↑ superfície de contato com antígenos\n→ Folículos linfoides com centros germinativos\n→ Linfócitos B e T\n→ Função: 1ª linha de defesa das vias aéreas/digestivas\n→ Exposta constantemente a antígenos\n\nCOMPLEMENTAÇÃO:\nTimo prepara os soldados (T)\nTonsila usa os soldados contra os invasores (boca/faringe)'}
];
