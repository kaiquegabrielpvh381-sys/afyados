function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';if(q.contextHTML){ctx.innerHTML=q.contextHTML;}else{ctx.textContent=q.context;}}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();}

function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}

var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
