<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:190px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>

<script>
const QS=[
{n:1,disc:false,tema:"Estatística Descritiva — Média e Desvio Padrão",context:"Tabela 1 — Média ± Desvio-Padrão e p-valor para quantidade de registros de violência contra à mulher em Belém-Pará, por semestre, na DEAM e no CIOP (2018 a 2020):\n\n1º-2018-CIOP: 548,7 ± 66,8\n2º-2018-CIOP: 535,5 ± 40,7\n1º-2019-CIOP: 479,8 ± 36,9\n2º-2019-CIOP: 506,8 ± 65,8\n1º-2020-CIOP: 469,8 ± 56,8\n1º-2018-DEAM: 323,8 ± 66,7\n2º-2018-DEAM: 371,0 ± 39,8\n1º-2019-DEAM: 323,8 ± 18,5\n2º-2019-DEAM: 318,0 ± 75,7\n1º-2020-DEAM: 209,7 ± 67,8\np = 0,000\n(DEAM = Delegacia Especializada no Atendimento à Mulher; CIOP = Centro Integrado de Operações)",assertions:null,text:"A partir da leitura da tabela e considerando os valores de média e desvio padrão de registros de violência contra a mulher, por semestre, em Belém-Pará, analise as afirmações abaixo.\n\nI. A média da quantidade de registros de violência contra à mulher/dia foi maior no 1º Semestre de 2018 - CIOP, quando comparado com 1º Semestre de 2018 – DEAM.\n\nII. O 2º Semestre de 2018 – DEAM apresentou uma menor variabilidade para a média da quantidade de registros/dia quando comparado com o 1º Semestre de 2019 – DEAM.\n\nIII. Para todo o período do estudo (1º Semestre de 2018 até 1º Semestre de 2020) o CIOP teve uma maior quantidade de registros/dia quando comparado com o DEAM.\n\nÉ correto o que se afirma em",opts:["I e III.","I e II.","II e III.","I, II e III."],g:0,exp:"Itens I e III corretos: considerando os valores de médias e desvio padrão quando comparado CIOP e DEAM, não apenas o primeiro semestre, mas todos os valores foram maiores no Centro Integrado de Operações. Quanto ao item II, está errado pois o valor do desvio padrão do 2º Semestre de 2018 – DEAM (dp= 39,8) é maior que o 1º Semestre de 2019 – DEAM (18,5), indicando que o segundo semestre tem maior variabilidade para a média de registros.",deep:"📊 ANÁLISE DE MÉDIA E DESVIO PADRÃO\n\n✅ I — CORRETA:\nCIOP 1º-2018: média 548,7 > DEAM 1º-2018: média 323,8\n\n❌ II — ERRADA:\nDP 2º-2018-DEAM = 39,8 > DP 1º-2019-DEAM = 18,5\n→ O 2º semestre tem MAIOR variabilidade (não menor)\nMaior DP = mais variável/heterogêneo\n\n✅ III — CORRETA:\nEm todos os semestres, CIOP > DEAM em quantidade de registros\n\n💡 MACETE:\nDP alto = dados ESPALHADOS = maior variabilidade\nDP baixo = dados CONCENTRADOS = menor variabilidade"},
{n:2,disc:false,tema:"Desenho de Estudo — Viés de Seleção",context:"O termo coorte tem origem na área militar, onde correspondia ao agrupamento de 300 a 600 soldados do exército romano. Analogamente, o estudo de coorte consiste no acompanhamento de grupos de pessoas marchando prospectivamente a partir de um determinado momento, sendo expostos a um ou mais fatores de risco. O estudo de coorte compara experiências de grupos expostos e não expostos a um determinado fator.\n\nTodos os participantes (expostos e não expostos) de um estudo de coorte devem estar sob risco de desenvolver o desfecho/doença de interesse. Por exemplo, \"pacientes histerectomizadas têm risco nulo de desenvolver câncer de útero, portanto, não deveriam ser incluídas em um estudo de coorte cujo desfecho seja câncer neste órgão.\"",assertions:null,text:"Com base o texto acima, caso o pesquisador escolhesse pacientes histerectomizadas, seu estudo estaria sujeito a um viés de",opts:["informação.","seleção.","confusão.","aferição."],g:1,exp:"O viés ao qual o estudo estaria sujeito caso o pesquisador escolhesse pacientes histerectomizadas seria o VIÉS DE SELEÇÃO, que é aquele que ocorre quando a amostra do estudo não é representativa da população. Para um estudo que tem como objetivo avaliar o risco de desenvolver câncer uterino, a amostra precisa incluir pessoas que tenham útero, já que o risco é nulo naquelas que já não têm mais o órgão e isso poderia causar uma distorção nos dados.\n\nVIÉS DE CONFUSÃO é uma distorção que modifica uma associação entre uma exposição e um desfecho porque um fator é associado, de modo independente, tanto à exposição e quanto ao desfecho.\n\nVIÉS DE AFERIÇÃO (ou avaliação) ocorre quando os métodos de medida diferem entre os grupos.\n\nVIÉS DE INFORMAÇÃO Resulta de definições inadequadas das variáveis de estudo ou de erros nos procedimentos de coleta de dados, geram erros de classificação dos indivíduos quanto à presença da exposição e/ou do desfecho.",deep:"⚠️ TIPOS DE VIÉS\n\n✅ Viés de SELEÇÃO:\n→ Amostra não representativa da população\n→ Histerectomizadas = risco nulo de câncer uterino\n→ Incluí-las distorce os dados do estudo\n\nViés de INFORMAÇÃO:\n→ Erros na coleta/definição das variáveis\n→ Erro de classificação dos indivíduos\n\nViés de AFERIÇÃO:\n→ Métodos de medida diferentes entre grupos\n\nViés de CONFUSÃO:\n→ Terceiro fator associado à exposição E ao desfecho\n→ Distorce a associação observada\n\n💡 MACETE:\nSeleção = quem entra no estudo\nInformação = como os dados são coletados\nAferição = como é medido\nConfusão = fator externo que atrapalha"},
{n:3,disc:false,tema:"Boxplot — Mediana e Outlier",context:"Um estudo experimental buscou investigar a influência da música clássica no comportamento exploratório de ratas em comparação ao som ambiente.\n\nFigura 1 — Boxplot de preferência exploratória:\n• Grupo Clássica (n=16): caixa entre ~40-90, mediana ~75, outlier* ~100\n• Grupo Controle (n=16): caixa entre ~20-45, Q3 ~45, mediana ~30, outlier° ~95\n(* indica diferença significativa em relação ao grupo controle; ° outlier)",assertions:null,text:"Com relação à Figura 1, afirma-se:\n\nI. A mediana do grupo Clássica apresenta valor maior do que o quartil 3 do grupo controle.\n\nPORQUE\n\nII. O dado de maior valor do grupo controle é o outlier.\n\nAnalise as asserções acima e assinale a alternativa correta.",opts:["As asserções I e II são falsas.","As asserções I e II são verdadeiras, mas a asserção II não é uma justificativa da I.","As asserções I e II são verdadeiras, e a asserção II é uma justificativa da I.","A asserção I é verdadeira e a asserção II é falsa."],g:1,exp:"A mediana do grupo Clássica é 75; já o quartil 3 do grupo controle é 45. Dessa forma, a asserção I é verdadeira.\n\nO dado de maior valor do grupo Controle é aproximadamente 95, ou seja, o valor do outlier. Dessa forma, a asserção II também é verdadeira, entretanto, no gráfico a interpretação do grupo Clássica não depende do valor outlier do grupo controle.\n\nDesta forma, a resposta correta é que a que afirma que as asserções I e II são verdadeiras, mas a asserção II não é uma justificativa da I.",deep:"📊 BOXPLOT — LEITURA E INTERPRETAÇÃO\n\n✅ I — VERDADEIRA:\nMediana Clássica = 75 > Q3 Controle = 45\n\n✅ II — VERDADEIRA:\nDado de maior valor do Controle ≈ 95 = outlier (marcado com °)\n\nPorém II NÃO justifica I:\n→ A comparação da mediana do Clássica com Q3 do Controle\n→ NÃO depende da existência do outlier no Controle\n→ São informações independentes\n\nComo ler um Boxplot:\n→ Linha dentro da caixa = MEDIANA\n→ Bordas da caixa = Q1 (inferior) e Q3 (superior)\n→ Bigodes = min/max sem outliers\n→ Pontos isolados = OUTLIERS"},
{n:4,disc:true,tema:"Taxa de Incidência — Dengue",context:"Um estudo epidemiológico foi realizado em uma determinada região durante um ano (2021 a 2022) para analisar o perfil epidemiológico da dengue. Durante esse período, foram registrados os seguintes dados:\n\n- Número de novos casos de dengue diagnosticados = 150.\n- População média da região durante o ano = 31.000 habitantes (levando em conta as flutuações populacionais ao longo do ano)",assertions:null,text:"Considerando as informações acima, faça o que se pede nos itens a seguir.\n\na) Identifique e cite as principais características da medida de frequência de doença mais apropriada para descrever os casos de dengue nesse estudo. (0,75 ponto)\n\nb) Calcule o valor da medida de frequência (definida no item anterior) para a dengue na referida região durante o ano e apresente o resultado utilizando o número de casos a cada 1.000 habitantes. (0,75 ponto)",opts:[],g:null,exp:"a) A medida de frequência de doença mais apropriada para calcular a distribuição dos casos da dengue nesse estudo é a Incidência (0,25 ponto). Isso porque a Taxa de Incidência leva em consideração a população em risco durante o período em questão, o que é crucial para comparar a frequência da doença entre diferentes populações e períodos de tempo, e também é mais indicada para descrever doenças agudas/transmissíveis, uma vez que leva em consideração os casos novos da doença, prevendo então a probabilidade de novos indivíduos apresentarem o agravo (0,5 ponto).\n\nComo no caso da dengue as pessoas passam um curto período de tempo doentes, a medida de prevalência não seria tão adequada, já que é mais aplicável nos casos onde as pessoas passam um maior período de tempo com a doença, como nas doenças crônicas, por exemplo.\n\nb) Taxa de Incidência = Número de Novos Casos / População Média em risco de adoecimento) x 1.000\n\nNúmero de Novos Casos = 150\nPopulação Média = 31.000\n\nTaxa de Incidência = (150 / 31.000) x 1.000 = 4,84 casos a cada 1.000 habitantes.\n\nPortanto, a incidência da dengue na região durante o ano foi de, aproximadamente 5 (4,8 ou 4,84) casos a cada 1.000 habitantes. Isso significa que, a cada 1.000 habitantes da população, houve cerca de 5 novos casos de dengue durante o período de um ano. (0,75 ponto)",deep:"🧮 TAXA DE INCIDÊNCIA — RESOLUÇÃO\n\nPor que INCIDÊNCIA (não prevalência):\n→ Dengue é doença AGUDA (curta duração)\n→ Prevalência é mais adequada para doenças CRÔNICAS\n→ Incidência = novos casos = probabilidade de adoecer\n→ Considera a população em risco no período\n\nCálculo:\nTaxa de Incidência = (Casos novos / Pop. média) × 1.000\n= (150 / 31.000) × 1.000\n= 4,84 casos por 1.000 habitantes\n≈ 5 casos por 1.000 habitantes\n\nInterpretação: A cada 1.000 habitantes, houve ~5 novos casos de dengue no período de um ano"},
{n:5,disc:false,tema:"Boxplot — Variação de IRP",context:"Goraieb (2005) avaliou o comportamento da resistência da via aérea nos pacientes portadores de cardiopatias congênitas com hiperfluxo pulmonar submetidos a tratamento cirúrgico com auxílio extracorpóreo. A amostra foi composta por trinta e cinco pacientes.\n\nFigura 1 — Box-plot de Índice de Resistência Pulmonar (IRP), de acordo com os subgrupos de tempo de perfusão:\n• Grupo \"Acima de 50 min\": 4 subgrupos de tempo (instante 1–4), boxplots extensos com outliers, alta variação (0–400+)\n• Grupo \"Até 50 min\": 4 subgrupos de tempo (instante 1–4), boxplots compactos, baixa variação (~0–100)",assertions:null,text:"Com base no gráfico acima, é correto afirmar que",opts:["os outliers são dados que se diferenciam drasticamente de todos os outros, sendo que estes dados de ambos os grupos de tempo de perfusão são iguais.","a variação do IRP nos pacientes com tempo de perfusão acima de 50 minutos foi superior aos pacientes com tempo de perfusão de até 50 minutos.","a mediana do segundo tempo de perfusão, do grupo acima de 50 minutos, foi maior que o primeiro tempo de perfusão, do mesmo grupo.","a mediana do quarto tempo de perfusão, do grupo até 50 minutos, foi menor que o terceiro tempo de perfusão, do mesmo grupo."],g:1,exp:"A única alternativa correta é aquela que aponta que a variação do IRP nos pacientes com tempo de perfusão acima de 50 minutos foi superior aos pacientes com tempo de perfusão de até 50 minutos.\n\nOs outliers são dados que se diferenciam drasticamente de todos os outros, sendo que estes dados de ambos os grupos de tempo de perfusão são diferentes.\n\na mediana do quarto tempo de perfusão, do grupo até 50 minutos, foi oi igual à do terceiro tempo de perfusão, do mesmo grupo.\n\nA mediana do segundo tempo de perfusão, do grupo acima de 50 minutos, foi igual à do primeiro tempo de perfusão, do grupo acima de 50 minutos.",deep:"📊 BOXPLOT — VARIAÇÃO DO IRP\n\n✅ B — CORRETA:\nGrupo >50min: boxplots EXTENSOS → grande variação do IRP\nGrupo ≤50min: boxplots COMPACTOS → pequena variação do IRP\n\n❌ A: Outliers dos dois grupos são DIFERENTES (não iguais)\n❌ C: Mediana do 2º tempo = Mediana do 1º tempo (no grupo >50min)\n❌ D: Mediana do 4º tempo = Mediana do 3º tempo (no grupo ≤50min)\n\nComo ler variação no Boxplot:\n→ Boxplot LARGO/ALTO = grande variação = dados dispersos\n→ Boxplot ESTREITO/BAIXO = pequena variação = dados concentrados"},
{n:6,disc:false,tema:"Epidemiologia — Endemia, Epidemia, Pandemia",context:"\"Há inúmeras passagens na literatura brasileira sobre epidemias, especialmente a febre amarela, a varíola, a gripe espanhola e, mais recentemente HIV-Aids, seja como pano de fundo e contexto, seja quase como um personagem...\" (Rochman; Birn, 2021).\n\nConsiderando a abordagem relatada pelos autores e sobre Epidemiologia, avalie as informações a seguir:\n\nI. Epidemia é a ocorrência habitual de uma doença ou de um agente infeccioso, em determinada área geográfica; pode significar, também, a prevalência usual de determinada doença nessa área.\n\nII. Endemia é doença geralmente infecciosa, de caráter transitório, que ataca simultaneamente grande número de indivíduos em uma determinada localidade.\n\nIII. Pandemia é epidemia de grandes proporções, atingindo grande número de pessoas em uma grande área geográfica (um ou mais continentes).\n\nIV. Endemia é a ocorrência habitual de uma doença ou de um agente infeccioso, em determinada área geográfica; pode significar, também, a prevalência usual de determinada doença nessa área.",assertions:null,text:"É correto o que se afirma em",opts:["III e IV, apenas.","I, II e III.","I e III, apenas.","II, III e IV."],g:0,exp:"A única resposta correta está nas afirmativas III e IV, visto que:\n\nEndemia: é a ocorrência habitual de uma doença ou de um agente infeccioso, em determinada área geográfica; pode significar, também, a prevalência usual de determinada doença nessa área.\n\nEpidemia: é doença geralmente infecciosa, de caráter transitório, que ataca simultaneamente grande número de indivíduos em uma determinada localidade.\n\nPandemia: é epidemia de grandes proporções, atingindo grande número de pessoas em uma grande área geográfica (um ou mais continentes).",deep:"🦠 CONCEITOS EPIDEMIOLÓGICOS\n\nDefinições corretas:\n→ Endemia: ocorrência HABITUAL de doença em determinada área\n→ Epidemia: caráter TRANSITÓRIO, ataca grande número em localidade\n→ Pandemia: epidemia de GRANDES PROPORÇÕES, vários continentes\n\nAnálise:\n❌ I: Descreve ENDEMIA, não epidemia\n❌ II: Descreve EPIDEMIA, não endemia\n✅ III: Pandemia — definição correta\n✅ IV: Endemia — definição correta\n\n💡 MACETE:\nEndemia = doença que \"mora\" na região\nEpidemia = surto que se espalha regionalmente\nPandemia = epidemia em escala mundial"},
{n:7,disc:true,tema:"Desenho de Estudo — Coorte e Caso-Controle",context:"A compreensão dos diferentes tipos de estudos observacionais é essencial para avaliar e interpretar adequadamente os resultados da pesquisa.\n\nTexto 1: Um grupo de pesquisadores acompanhou um grande conjunto de indivíduos ao longo de um período de dez anos. Eles registraram informações detalhadas sobre seus hábitos alimentares, estilo de vida, histórico médico e fatores ambientais. Ao final do estudo, eles analisaram a ocorrência de doenças cardiovasculares nos participantes e buscaram correlações entre os fatores de risco identificados e o desenvolvimento dessas doenças.\n\nTexto 2: Em um hospital, um grupo de pesquisadores examinou os prontuários médicos de pacientes que haviam sido diagnosticados com uma doença pulmonar específica nos últimos cinco anos. Eles coletaram informações sobre os fatores de exposição, como histórico de tabagismo, exposição a poluentes do ar e ocupação, e compararam esses fatores entre os pacientes com a doença e um grupo controle de pacientes saudáveis.",assertions:null,text:"Considerando as informações acima, faça o que se pede nos itens a seguir.\n\na) Identifique o tipo de estudo epidemiológico do Texto 1 e do Texto 2. (0,5 ponto)\n\nb) Explique as características principais de cada tipo de estudo (considere como os estudos são conduzidos, quais são os objetivos específicos de cada tipo de estudo e quais informações podem ser obtidas a partir deles). (1,0 ponto)",opts:[],g:null,exp:"a) Texto 1: Estudo de Coorte ou de Coorte prospectivo (0,25 ponto).\nTexto 2: Estudo de Caso-Controle (0,25 ponto).\n\nb) Texto 1: Estudo de Coorte (0,5 ponto)\nO primeiro texto descreve um exemplo de estudo de coorte, um tipo de estudo observacional que envolve o acompanhamento de um grupo de indivíduos ao longo do tempo para avaliar a relação entre exposições específicas e o desenvolvimento de resultados de interesse, como doenças. A principal característica do estudo de coorte é o acompanhamento longitudinal dos participantes, permitindo a identificação de relações de causa e efeito ao longo do tempo. Adicionalmente, esses estudos podem ser prospectivos, onde os indivíduos são acompanhados a partir do momento em que ainda não têm a condição de interesse, como no caso do estudo apresentado no texto 1, ou retrospectivos, onde os indivíduos são selecionados com base em sua condição atual e seu histórico passado é avaliado retrospectivamente.\n\nTexto 2: Estudo de Caso-Controle (0,5 ponto)\nO segundo texto ilustra um exemplo de estudo de caso-controle, um tipo de estudo observacional que compara um grupo de indivíduos com uma doença específica (casos) a um grupo sem a doença (controles), buscando identificar associações entre fatores de exposição e a ocorrência da doença. O estudo de caso-controle é caracterizado por sua abordagem retrospectiva, em que os pesquisadores coletam informações sobre exposições passadas em relação aos casos e aos controles.",deep:"🔬 COORTE vs CASO-CONTROLE\n\nCOORTE (Texto 1):\n→ Tipo: observacional analítico\n→ Direção: prospectivo (exposto → desfecho)\n→ Acompanha AO LONGO DO TEMPO\n→ Mede INCIDÊNCIA e RISCO RELATIVO\n→ Vantagem: estabelece temporalidade\n\nCASO-CONTROLE (Texto 2):\n→ Tipo: observacional analítico\n→ Direção: retrospectivo (doença → busca exposição)\n→ Parte do DESFECHO, olha para trás\n→ Mede ODDS RATIO\n→ Vantagem: bom para doenças raras, rápido e barato\n\n💡 MACETE:\nCoorte = \"marchamos juntos\" (seguimos no tempo)\nCaso-controle = \"quem pegou vs quem não pegou\" (olha para trás)"},
{n:8,disc:false,tema:"Classificação de Variáveis",context:"Sabe-se que uma variável pode assumir valores diferentes para indivíduos diferentes. Analise o trecho:\n\nNo site do Census Bureau, os dados coletados pela Pesquisa da Comunidade Americana. As variáveis são as seguintes:\nNOSERIAL: número identificador da unidade residencial.\nPESO: Peso, em libras.\nIDADE: Idade, em anos e meses.\nTEMPO DE VIAGEM: Tempo no trajeto para o trabalho, em minutos.\nESCOLARIDADE: Grau mais elevado de escolarização (categorias numéricas: 9=Ensino Médio, 10=algum ensino superior, 13=bacharel).\nSEXO: designado por 1=masculino e 2=feminino.\nRENDA: Salário e renda no último ano, em dólares.\n\nConsiderando as variáveis apresentadas leia as afirmações:\nI. Além do número de série da residência, há seis variáveis. Escolaridade e sexo são variáveis quantitativas ordinais.\nII. As variáveis peso, idade, tempo de viagem e renda, são quantitativas contínuas e seus valores têm unidades.\nIII. Uma variável quantitativa assume valores numéricos com os quais faz sentido efetuarem-se operações aritméticas, tais como cálculo de médias. Elas são classificadas em nominais e ordinais.",assertions:null,text:"É correto o que se afirma em",opts:["II, apenas.","I e II.","III, apenas.","II e III."],g:0,exp:"Considerando as variáveis apresentadas leia as afirmações:\n\nI - Além do número de série da residência, há seis variáveis. Escolaridade e sexo são variáveis quantitativas ordinais. (Errado, pois, os valores para essas variáveis são registrados como números, mas estes são apenas rótulos para as categorias e não têm unidades de medida. São variáveis qualitativas, escolaridade qualitativa ordinal e sexo qualitativa nominal (p. 13).\n\nII - As variáveis peso em libras, idade em anos, tempo de viagem em minutos e renda em dólares, são quantitativas e seus valores têm unidades (Verdadeiro, p. 13)\n\nIII - Uma variável quantitativa assume valores numéricos com os quais faz sentido efetuarem-se operações aritméticas, tais como cálculo de médias. Elas são classificadas em nominais e ordinais. (Errado, são classificadas como discretas ou contínuas).",deep:"📊 CLASSIFICAÇÃO DE VARIÁVEIS\n\n❌ I — ERRADA:\nEscolaridade e sexo NÃO são quantitativas\n→ São QUALITATIVAS\n→ Escolaridade: qualitativa ORDINAL (há hierarquia)\n→ Sexo: qualitativa NOMINAL (sem hierarquia)\n→ Mesmo representados por números, são rótulos\n\n✅ II — VERDADEIRA:\nPeso (libras), Idade (anos), Tempo (min), Renda ($)\n→ Todas quantitativas com unidades de medida\n\n❌ III — ERRADA:\nVariáveis quantitativas se classificam em DISCRETAS ou CONTÍNUAS\n→ NÃO em nominais e ordinais (essas são qualitativas)\n\n💡 MACETE:\nQuantitativa → discreta (contável) ou contínua (mensurável)\nQualitativa → nominal (sem ordem) ou ordinal (com ordem)"},
{n:9,disc:false,tema:"Desenho de Estudo — Caso-Controle",context:"Um grupo de pesquisadores está investigando uma possível associação entre o uso prolongado de telefones celulares e o desenvolvimento de uma condição de saúde ocular chamada \"Cegueira Noturna Digital\" em adultos jovens. Eles recrutaram 150 indivíduos diagnosticados com Cegueira Noturna Digital e 150 indivíduos da mesma faixa etária e sexo, mas sem a condição. Os pesquisadores então coletaram informações detalhadas sobre a frequência e duração do uso de telefones celulares de cada grupo e compararam os resultados.",assertions:null,text:"A pesquisa acima pode ser identificada como um estudo epidemiológico do tipo",opts:["caso-controle.","coorte.","transversal.","ecológico."],g:0,exp:"Neste cenário, os pesquisadores selecionaram indivíduos com a condição de interesse (Cegueira Noturna Digital) e um grupo de controle sem a condição e, em seguida, investigaram retroativamente o histórico de exposição (uso prolongado de telefones celulares) para avaliar a associação entre a exposição e a condição de saúde. Isso é característico de um estudo epidemiológico do tipo caso-controle.",deep:"🔬 CASO-CONTROLE — IDENTIFICAÇÃO\n\n✅ Caso-controle:\n→ Parte do DESFECHO (Cegueira Noturna Digital)\n→ Casos (150 com a condição) vs Controles (150 sem)\n→ Olha RETROATIVAMENTE para a exposição (celular)\n→ Compara frequência de exposição entre os grupos\n\n❌ Coorte: acompanha expostos e não expostos ao longo do tempo\n❌ Transversal: coleta em UM momento, sem seguimento\n❌ Ecológico: usa dados agregados de populações\n\n💡 MACETE:\nCaso-controle: começa pela DOENÇA, busca a CAUSA\nCoorte: começa pela CAUSA, busca a DOENÇA"},
{n:10,disc:false,tema:"Incidência e Prevalência — Cálculo Diabetes",context:"Uma determinada Unidade Básica de Saúde (UBS) da cidade de Guanambi/BA, em 31/10/2022, registrou 470 casos de diabetes. Nessa localidade, durante o ano de 2023, foram diagnosticados 60 novos casos dessa doença entre seus habitantes. Neste ano, 8 pessoas, já com diabetes, mudaram-se para esta cidade e 55 pessoas faleceram pela doença. A população estimada de Guanambi era de 100.000 habitantes.",assertions:null,text:"Ante o exposto, examine os itens a seguir.\n\nI. Em 2023, a Incidência de Diabetes era de 0,06%.\nII. Em 2022, a prevalência de Diabetes era de 0,47%.\nIII. Em 2023, a prevalência de Diabetes era de 4,8%.\n\nÉ correto apenas o que se afirma em",opts:["II e III.","III, apenas.","I e II.","I, apenas."],g:2,exp:"Com base nos cálculos apresentados abaixo, a única resposta correta é aquela que inclui as afirmações I e II.\n\nIncidência em 2023 = [60 (casos novos) ÷100.000] x100= 0,06%\n\nPrevalência em 31/12/2022 = [470 (casos totais) ÷ 100.000] x100 = 0,47%\n\nPrevalência em 31/12/2023 = (483 ÷ 100.000) x 100 = 0,483%\n\nCálculo para chegar na prevalência de 2023: 470 (2022) + 60 (casos novos) + 8 (imigrantes diabéticos) – 55 (óbitos entre diabéticos) = 483 (casos existentes em 31/12/2023)",deep:"🧮 INCIDÊNCIA E PREVALÊNCIA — CÁLCULO\n\n✅ I — Incidência 2023:\n= (60 casos novos / 100.000) × 100\n= 0,06% ✓\n\n✅ II — Prevalência 31/12/2022:\n= (470 / 100.000) × 100\n= 0,47% ✓\n\n❌ III — Prevalência 31/12/2023:\n470 + 60 (novos) + 8 (imigrantes) – 55 (óbitos) = 483 casos\n= (483 / 100.000) × 100 = 0,483% (NÃO é 4,8%)\n\n💡 Prevalência inclui TODOS os casos existentes:\n→ Casos anteriores + novos + migrantes – óbitos\n→ NÃO inclui apenas os novos (isso é incidência)"}

const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false;
function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}
document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);
function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}
document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
