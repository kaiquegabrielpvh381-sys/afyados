text:"Ao comparar a histologia do tecido muscular cardíaco com outros tipos de músculos, marque a alternativa correta.",
opts:["O tecido muscular cardíaco possui junções comunicantes chamadas de discos intercalares, que permitem a rápida propagação de sinais elétricos entre as células, sendo essenciais para a coordenação das contrações.", "O tecido muscular cardíaco é formado por células multinucleadas, enquanto o músculo liso é constituído por células uninucleadas. Essa característica multinucleada do músculo cardíaco auxilia na adaptação rápida a diferentes níveis de carga.", "O tecido muscular cardíaco possui um arranjo de fibras musculares fusiformes, estriadas e semelhante ao músculo esquelético, permitindo alta velocidade de contração. No entanto, essa semelhança não influencia a diferença na forma como os dois tipos de músculos se contraem.", "O tecido muscular cardíaco é estriado e voluntário, assim como o músculo esquelético, permitindo um controle consciente sobre suas contrações. No entanto, essa similaridade não afeta a coordenação das batidas cardíacas."],
g:0,
exp:"A resposta correta destaca uma característica essencial e distinta do tecido muscular cardíaco em comparação com outros tipos de músculos, como o esquelético. As junções comunicantes, também conhecidas como discos intercalares, são estruturas presentes no tecido muscular cardíaco que permitem a rápida troca de íons e sinais elétricos entre as células adjacentes. Essa comunicação elétrica é crucial para a coordenação das contrações cardíacas, uma vez que o coração precisa bater como uma unidade funcional para efetivamente bombear o sangue.\n\nTanto o tecido muscular cardíaco quanto o músculo esquelético são estriados, porém o tecido muscular cardíaco não apresenta um arranjo de fibras fusiformes e estriadas como o músculo esquelético.",
deep:"🎯 TECIDO MUSCULAR CARDÍACO — CARACTERÍSTICAS EXCLUSIVAS\nÚnico tecido muscular com DISCOS INTERCALARES, sincício funcional e automatismo intrínseco.\n\n🫀 CARACTERÍSTICAS HISTOLÓGICAS DO CARDÍACO\n\n🔬 ESTRUTURA CELULAR\n• Células RAMIFICADAS (em Y ou T)\n• CURTAS (~100 µm) — muito mais curtas que esqueléticas (que chegam a 30 cm)\n• 1 OU 2 NÚCLEOS CENTRAIS (não periféricos como esquelético)\n• ESTRIAÇÕES presentes (tem sarcômeros como o esquelético)\n• Mitocôndrias ABUNDANTES (35% do volume celular — alta demanda energética)\n• Muitos túbulos T e retículo sarcoplasmático\n\n⚡ DISCOS INTERCALARES — EXCLUSIVOS DO CARDÍACO ★★★\nJunções CÉLULA-CÉLULA que aparecem como linhas escuras transversais no microscópio.\n\n3 COMPONENTES:\n1. DESMOSSOMOS (junções aderentes): resistência mecânica, não deixa separar durante contração\n2. FÁSCIAS ADERENTES: pontos de ancoragem da actina\n3. GAP JUNCTIONS (junções comunicantes): ★ permitem passagem de íons e sinais elétricos\n\n🌐 SINCÍCIO FUNCIONAL\n→ Graças às gap junctions nos discos intercalares\n→ O impulso elétrico se propaga DE CÉLULA EM CÉLULA sem perder tempo\n→ Todo o átrio contrai como UMA unidade; todo o ventrículo contrai como UMA unidade\n→ Se fosse independente, não haveria bombeamento eficiente\n\n⚡ AUTOMATISMO (propriedade exclusiva)\n→ Células marcapasso (nó SA) despolarizam espontaneamente\n→ Controle do SNA APENAS MODULA (acelera/desacelera)\n→ Contração INVOLUNTÁRIA\n\n🔬 COMPARAÇÃO DOS 3 TIPOS DE MÚSCULO\n\n┌───────────────┬──────────────┬──────────────┬──────────────┐\n│ Característica│ ESQUELÉTICO  │ CARDÍACO     │ LISO         │\n├───────────────┼──────────────┼──────────────┼──────────────┤\n│ Estrias       │ SIM          │ SIM          │ NÃO          │\n│ Formato       │ cilíndrica   │ RAMIFICADA   │ fusiforme    │\n│ Comprimento   │ muito longa  │ curta        │ muito curta  │\n│ Núcleos       │ muitos perif.│ 1-2 centrais │ 1 central    │\n│ Disco interc. │ NÃO          │ SIM ★        │ NÃO          │\n│ Controle      │ voluntário   │ involuntário │ involuntário │\n│ Regeneração   │ limitada     │ mínima       │ boa          │\n│ Fatigabilidade│ alta         │ não fatiga   │ não fatiga   │\n└───────────────┴──────────────┴──────────────┴──────────────┘\n\n🩺 RELEVÂNCIA CLÍNICA\n\n→ IAM (infarto agudo do miocárdio): músculo cardíaco NÃO regenera → substituído por TECIDO FIBROSO (cicatriz)\n→ Arritmias: disfunção das gap junctions ou do automatismo\n→ Cardiomiopatia hipertrófica: mutações em proteínas sarcoméricas\n→ Cardiomiopatia dilatada: fraqueza contrátil generalizada\n→ Remodelamento pós-IAM: hipertrofia das células viáveis + fibrose\n\n🔬 ANÁLISE DAS ALTERNATIVAS\n\n✅ A — DISCOS INTERCALARES + propagação de sinais + coordenação das contrações ✓\n\n❌ B — Cardíaco tem 1-2 núcleos CENTRAIS, NÃO é multinucleada. Esquelético é que é multinucleado\n\n❌ C — Cardíaco NÃO tem fibras fusiformes — é RAMIFICADA\n\n❌ D — Cardíaco é INVOLUNTÁRIO, não voluntário\n\n💡 MACETE\n'Cardíaco = RAMIFICADA + núcleos CENTRAIS + DISCOS INTERCALARES (desmossomos + gap junctions)'\n'Discos intercalares = SINCÍCIO FUNCIONAL = coração bate como uma unidade'"
},

deep:"🎯 EOSINÓFILO — O \"MATA-VERMES\" DO SANGUE\nGranulócito da linhagem mieloide especializado em combater PARASITAS MULTICELULARES e envolvido em respostas ALÉRGICAS.\n\n🔴 CARACTERÍSTICAS MORFOLÓGICAS\n\n• Diâmetro: 12-17 µm\n• Núcleo BILOBULADO (típico) — \"óculos de avó\"\n• Grânulos citoplasmáticos GRANDES e ROSA-ALARANJADOS (coram com EOSINA)\n• Grânulos contêm proteínas tóxicas:\n  - MBP (proteína básica maior)\n  - ECP (proteína catiônica eosinofílica)\n  - EDN (neurotoxina derivada do eosinófilo)\n  - EPO (peroxidase eosinofílica)\n\n📊 VALORES DE REFERÊNCIA\n→ 1-5% dos leucócitos totais\n→ 100-500/mm³ no adulto\n→ Flutuações diurnas (↑ à noite, ↓ pela manhã devido ao cortisol)\n\n⚔️ FUNÇÕES DO EOSINÓFILO\n\n🪱 1. DEFESA ANTIPARASITÁRIA ★ (principal)\n→ Eosinófilos NÃO conseguem fagocitar parasitas (muito grandes)\n→ Usam MECANISMO DE DEGRANULAÇÃO EXTRACELULAR\n→ Liberam proteínas tóxicas sobre o parasita → mata-o\n→ Particularmente eficaz contra HELMINTOS (lombrigas, esquistossomos, oxiúros, etc.)\n\n🤧 2. RESPOSTAS ALÉRGICAS / HIPERSENSIBILIDADE TIPO I\n→ Estão presentes em quadros alérgicos\n→ Contribuem para inflamação crônica em asma, rinite alérgica, dermatite atópica\n→ Podem causar dano tecidual se ativação persistente\n\n🔥 3. INFLAMAÇÃO CRÔNICA\n→ Participam de diversas doenças inflamatórias\n→ Associados a esofagite eosinofílica, gastroenterite eosinofílica\n→ Envolvidos em doenças granulomatosas\n\n📈 EOSINOFILIA (↑ eosinófilos) — PRINCIPAIS CAUSAS\n→ PARASITOSES (especialmente helmintos):\n  • Ascaridíase, estrongiloidíase, toxocaríase\n  • Esquistossomose\n  • Filaríase\n  • Teníase, cisticercose\n→ ALERGIAS:\n  • Asma\n  • Rinite alérgica\n  • Alergias medicamentosas (DRESS)\n  • Dermatite atópica\n→ DOENÇAS HEMATOLÓGICAS:\n  • Leucemia eosinofílica\n  • Síndrome hipereosinofílica\n  • Linfoma de Hodgkin\n→ DOENÇAS REUMATOLÓGICAS:\n  • Granulomatose eosinofílica com poliangiíte (Churg-Strauss)\n→ INSUFICIÊNCIA ADRENAL (Addison):\n  • ↓ cortisol → ↑ eosinófilos\n\n📉 EOSINOPENIA (↓ eosinófilos)\n→ Uso de corticoides\n→ Estresse agudo (↑ cortisol endógeno)\n→ Infecções bacterianas agudas (junto com desvio à esquerda)\n\n🩸 OUTRAS CÉLULAS — POR QUE NÃO SÃO A RESPOSTA?\n\n❌ A (NEUTRÓFILO)\n→ Principal contra bactérias piogênicas\n→ Fagocita e mata microrganismos via explosão respiratória\n→ ↑ em infecções bacterianas\n\n❌ B (MASTÓCITO)\n→ Tecidual (não circulante)\n→ Envolvido em alergia imediata (libera histamina)\n→ Não é o \"mata-verme\" principal\n\n❌ C (MACRÓFAGO)\n→ Tecidual (derivado do monócito circulante)\n→ Fagocitose + apresentação de antígenos\n→ Importante em infecções intracelulares (TB)\n→ Não é especializado em antiparasitário\n\n✅ D (EOSINÓFILO) — CORRETA\n→ Especializado em matar parasitas grandes\n→ Também importante em alergias e inflamação crônica\n→ Grânulos com proteínas tóxicas\n\n💊 FÁRMACOS QUE AFETAM EOSINÓFILOS\n→ Corticoides: reduzem drasticamente\n→ Anti-IL-5 (mepolizumabe, benralizumabe): asma eosinofílica severa\n→ Anti-IgE (omalizumabe): asma alérgica\n\n💡 MACETE\n'EOSINÓFILO = EOSINA (rosa) + parasitas + alergia'\n'Grânulos tóxicos matam parasitas por DEGRANULAÇÃO externa (não fagocita)'\n'NEUtrófilo = NEUtralizar bactéria | EOSinófilo = EOSinaliza parasita'"

n(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}

function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
<script>
const PROVA_ID = 'soi1-2023-2';
const PERIODO = 1;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;
function saveLocal(){const state={answered:answered,cur:cur,eliminated:{}};for(const k in eliminated)state.eliminated[k]=Array.from(eliminated[k]);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const state=JSON.parse(raw);if(state.answered&&Object.keys(state.answered).length>0){answered=state.answered;cur=state.cur||0;eliminated={};if(state.eliminated){for(const k in state.eliminated)eliminated[k]=new Set(state.eliminated[k]);}return true;}}catch(e){}return false;}
const _sbScript=document.createElement('script');_sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';_sbScript.onload=function(){window.sb=supabase.createClient('https://mmqfqlbojsbuuodfbilh.supabase.co','sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH');};document.head.appendChild(_sbScript);
async function saveToSupabase(i){try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const q=QS[i];const isDisc=q.disc;const userAns=isDisc?(answered[i]||'').substring(0,500):L[answered[i]];const correctAns=isDisc?'discursiva':L[q.g];const isCorrect=isDisc?null:(answered[i]===q.g);await sb.from('question_responses').upsert({user_id:user.id,question_id:PROVA_ID+'-q'+String(q.n).padStart(2,'0'),periodo:PERIODO,content_type:CONTENT_TYPE,user_answer:userAns,correct_answer:correctAns,is_correct:isCorrect,time_spent_seconds:0,topic:q.tema,difficulty:'media'},{onConflict:'user_id,question_id'});if(!isDisc&&isCorrect!==null){const{data:row}=await sb.from('user_progress').select('*').eq('user_id',user.id).eq('periodo',PERIODO).single();if(row){const t=row.total_questions_solved+1;const c=row.correct_answers+(isCorrect?1:0);const topics=row.topics_studied||[];if(q.tema&&!topics.includes(q.tema))topics.push(q.tema);await sb.from('user_progress').update({total_questions_solved:t,correct_answers:c,accuracy_percentage:parseFloat(((c/t)*100).toFixed(1)),last_studied:new Date().toISOString(),topics_studied:topics}).eq('user_id',user.id).eq('periodo',PERIODO);}else{await sb.from('user_progress').insert({user_id:user.id,periodo:PERIODO,total_questions_solved:1,correct_answers:isCorrect?1:0,accuracy_percentage:isCorrect?100:0,last_studied:new Date().toISOString(),topics_studied:q.tema?[q.tema]:[]});}}}catch(e){console.warn('Supabase:',e);}}
const _origSubmit=submitAnswer;submitAnswer=function(){const idx=cur;_origSubmit();saveLocal();if(answered[idx]!==undefined&&window.sb)saveToSupabase(idx);};
const _origReset=resetAll;resetAll=function(){localStorage.removeItem(STORAGE_KEY);_origReset();};
if(loadLocal()){renderQ();if(Object.keys(answered).length===QS.length)setTimeout(showResult,100);}
</script>
