<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

tema:"Hematologia — Hemostasia e Fibrinólise",
context:"Homem, 34 anos, jogador de futebol profissional, procura seu podólogo com queixa de unha encravada do hálux direito. O paciente relatou que sentia dor e que toda vez que \"retirava a casquinha que formava, o sangue escorria pela unha\". O podólogo explica que ele deveria evitar a retirada da \"casquinha\", uma vez que ela faz parte do processo de hemostasia e recuperação da lesão.\n\nSobre esse assunto, responda os comandos abaixo:",
contextHTML:null,
assertions:null,
text:"A. Descreva os processos de hemostasia envolvidos na formação da \"casquinha\" do paciente.\n\nB. Explique o motivo do aparecimento de sangue na situação relatada pelo paciente.",
opts:null,
g:null,
exp:"A. A Hemostasia consiste em um procedimento com três etapas. -Hemostasia primária: 1) contração vascular local (para reduzir o fluxo de sangue no local da lesão), 2) formação de um tampão plaquetário. -Hemostasia propriamente dita ou coagulação do plasma envolvendo interações entre diversos fatores e inibidores. -Fibrinólise: um processo que remove o coágulo quando a integridade do vaso sanguíneo estiver restaurada.\n\nB. Com o a remoção do tampão, ocorrerá novo processo de hemorragia seguido de nova hemostasia. O paciente precisa aguardar todas as etapas do processo de hemostasia, incuíndo a fribrinólise, para que ele obtenha melhora da lesão. Cabe ressaltar, que o paciente precisa cuidar da unha encravada, assim ele evitará novas lesões.",
deep:"🎯 HEMOSTASIA — 3 ETAPAS INTEGRADAS\nResposta orgânica coordenada para estancar o sangramento quando um vaso é lesado, sem gerar trombose excessiva.\n\n🩸 ETAPA 1 — HEMOSTASIA PRIMÁRIA (segundos a minutos)\n\n⚡ Vasoconstrição local\n→ Reflexo miogênico + mediadores (endotelina, serotonina, tromboxano A2)\n→ Reduz fluxo sanguíneo no local da lesão\n\n🧩 Tampão plaquetário — 3 fases\n1. ADESÃO: plaquetas se ligam ao COLÁGENO exposto via fator de von Willebrand (FvW) + glicoproteína GPIb\n2. ATIVAÇÃO: mudança de forma + liberação de grânulos (ADP, TxA2, serotonina, Ca²⁺)\n3. AGREGAÇÃO: plaquetas se ligam entre si via FIBRINOGÊNIO + GP IIb/IIIa\n→ Forma o TAMPÃO PLAQUETÁRIO inicial (ainda instável)\n\n⚗️ ETAPA 2 — HEMOSTASIA SECUNDÁRIA (COAGULAÇÃO) (minutos a horas)\n→ Cascata de coagulação: vias intrínseca + extrínseca → via comum\n→ Termina com: trombina converte FIBRINOGÊNIO em FIBRINA\n→ Fator XIII estabiliza a rede (cross-linking)\n→ Forma o COÁGULO DEFINITIVO (casquinha visível)\n→ Fatores vitamina-K dependentes: II, VII, IX, X\n\n💊 ETAPA 3 — FIBRINÓLISE (dias)\n→ Ocorre APÓS a reparação tecidual estar completa\n→ t-PA (ativador de plasminogênio tecidual) converte PLASMINOGÊNIO → PLASMINA\n→ Plasmina degrada a rede de fibrina\n→ Produto final: D-dímero\n→ Sem fibrinólise, teríamos trombose permanente\n\n🩹 POR QUE NÃO DEVE RETIRAR A CASQUINHA?\n→ A \"casquinha\" é o COÁGULO DE FIBRINA + células mortas secas\n→ Ela serve de BARREIRA MECÂNICA enquanto o tecido subjacente cicatriza\n→ Retirada precoce → novo sangramento + risco de infecção\n→ O processo completo leva dias a semanas\n→ Precisa aguardar a cicatrização tecidual + fibrinólise natural\n→ Cada retirada reinicia todo o processo de hemostasia\n\n⚽ ATENÇÃO AO FATOR CAUSAL\n→ Unha encravada em jogador de futebol = trauma CRÔNICO pela pressão no hálux\n→ Só tratar o sangramento não resolve\n→ Precisa tratar a CAUSA: corte correto da unha, calçado adequado, avaliação podológica\n→ Se persistir: cantoplastia (remoção cirúrgica da borda ungueal)\n\n💡 MACETE\n'PRIMÁRIA = vasoconstrição + plaqueta (tampão) | SECUNDÁRIA = fibrina (coágulo) | FIBRINÓLISE = plasmina (remove coágulo após reparo)'\n'Casquinha = coágulo protetor → NUNCA arrancar antes da cicatrização'"
},

{
n:2,
disc:false,
tema:"Histologia — Órgãos Linfoides (Timo × Baço)",
context:"Um estudante de Medicina, ao visualizar as lâminas de tecido linfóide ao microscópio, esqueceu de nomear duas lâminas com os órgãos linfáticos específicos. Ao colocá-las novamente no microscópio, verificou as seguintes estruturas:\n\nLâmina 1 - Presença de células epiteliais reticulares, corpúsculo de Hassall e linfócitos distribuídos no córtex da glândula em abundância, sem a presença de folículos linfóides.\n\nLâmina 2 - Presença de folículos linfóides na polpa branca e sinusóides na polpa vermelha, o órgão aparece com revestimento conjuntivo denso e apresenta trabéculas.\n\nConsiderando as informações apresentadas, assinale a alternativa que identifica corretamente o corte histológico presente nas lâminas 1 e 2.",
contextHTML:null,
assertions:null,
text:"Considerando as informações apresentadas, assinale a alternativa que identifica corretamente o corte histológico presente nas lâminas 1 e 2.",
opts:["A lâmina 1 contém tecido do timo e a lâmina 2 contém tecido de linfonodo.", "A lâmina 1 contém tecido de linfonodo e a lâmina 2 contém tecido do baço.", "A lâmina 1 contém tecido do timo e a lâmina 2 contém tecido do baço.", "A lâmina 1 contém tecido do baço e a lâmina 2 contém tecido tonsilar."],
g:2,
exp:"Com base nas informações fornecidas, podemos identificar as lâminas da seguinte forma:\n\nLâmina 1: O córtex da glândula está presente com células epiteliais reticulares, corpúsculo de Hassall e linfócitos distribuídos em abundância, mas não há a presença de folículos linfoides. Essa descrição corresponde ao timo, um órgão linfático que não possui folículos linfoides.\n\nLâmina 2: A presença de folículos linfoides na polpa branca e sinusoides na polpa vermelha, juntamente com revestimento conjuntivo denso e trabéculas, sugere a descrição de um baço. O baço é um órgão linfático que apresenta folículos linfoides na polpa branca e sinusoides na polpa vermelha, além de revestimento conjuntivo denso e trabéculas.",
deep:"🎯 ÓRGÃOS LINFOIDES — IDENTIFICAÇÃO HISTOLÓGICA\nCada órgão linfoide tem marcadores histológicos únicos que permitem identificação rápida ao microscópio.\n\n🔴 TIMO (órgão linfoide PRIMÁRIO — maturação de LT)\n📍 Marcadores:\n• CÉLULAS EPITELIAIS RETICULARES (6 tipos, diferentes funções)\n• CORPÚSCULOS DE HASSALL ★★★ (na MEDULA) — agregados de células reticulares tipo VI\n• Córtex denso em LT imaturos\n• Medula mais clara\n• SEM folículos linfoides\n• Cápsula conjuntiva com septos\n→ Função: maturação e seleção de LT\n→ Localização: mediastino anterior\n→ Involui após puberdade\n\n🟢 BAÇO (órgão linfoide SECUNDÁRIO)\n📍 Marcadores:\n• POLPA BRANCA — folículos linfoides ao redor de arteríolas centrais (PALS)\n• POLPA VERMELHA — SINUSOIDES ★★★ + cordões esplênicos (de Billroth)\n• Cápsula CONJUNTIVA DENSA + TRABÉCULAS\n• Sem córtex/medula definidos\n→ Funções: filtração do sangue, remoção de hemácias velhas, imunidade humoral (LB)\n\n🟡 LINFONODO (órgão linfoide SECUNDÁRIO)\n📍 Marcadores:\n• Cápsula conjuntiva densa\n• CÓRTEX: folículos linfoides (B) + paracórtex (T)\n• MEDULA: cordões medulares + seios medulares\n• Seio SUBCAPSULAR (por onde entra linfa aferente)\n• Hilo com artéria, veia, linfático eferente\n→ Função: filtração da linfa\n\n🔵 TONSILAS (MALT)\n📍 Marcadores:\n• Epitélio pavimentoso estratificado (palatinas e linguais)\n• CRIPTAS profundas\n• Folículos linfoides sob o epitélio\n• SEM cápsula completa\n→ Função: primeira linha de defesa orofaríngea\n\n🔬 DECIFRANDO A QUESTÃO\n\n✅ Lâmina 1 — TIMO\n• Corpúsculos de Hassall ✓\n• Células epiteliais reticulares ✓\n• SEM folículos linfoides ✓\n• Córtex com muitos linfócitos ✓\n\n✅ Lâmina 2 — BAÇO\n• Polpa branca (folículos) + polpa vermelha (sinusoides) ✓\n• Cápsula + trabéculas ✓\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: linfonodo NÃO tem polpa branca/vermelha — tem córtex/medula\n• B: linfonodo NÃO tem Hassall; linfonodo também não descreve bem Lâmina 1\n• D: baço não é a Lâmina 1 (sem Hassall); tonsila não combina com Lâmina 2\n\n💡 MACETE\n'HASSALL = TIMO (medula) | POLPA BRANCA + VERMELHA = BAÇO | CRIPTAS = TONSILA | CÓRTEX/PARACÓRTEX = LINFONODO'\n'TIMO sem folículos | BAÇO com polpas | LINFONODO tem tudo organizado em camadas'"
},

{
n:3,
disc:false,
tema:"Fisiologia Cardiovascular — Regulação da FC no Exercício",
context:"A prática de atividade física regular promove benefícios fisiológicos importantes para o sistema cardiovascular pois ajuda a diminuir a pressão arterial e melhorar a circulação sanguínea. Quem pratica exercícios, tende a apresentar nível de pressão arterial mais próximo da normalidade, reduzindo as chances de doenças cardiovasculares.\n\nNesse contexto, avalie as seguintes asserções e a relação proposta entre elas.",
contextHTML:null,
assertions:"I: Antes de a atividade física começar, especialmente em situações de competição, a frequência cardíaca pode aumentar, porque o sistema límbico envia impulsos nervosos para o centro cardiovascular no bulbo.\n\nPORQUE\n\nII: Os proprioceptores que estão monitorando a posição dos membros e os músculos enviam impulsos nervosos ao centro cardiovascular para aumentar a frequência. As informações dos proprioceptores são um grande estímulo para o rápido aumento da frequência cardíaca que ocorre no início da atividade física.",
text:"A respeito dessas asserções, assinale a opção correta:",
opts:["As asserções I e II são proposições verdadeiras, mas a II não justifica a I.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.", "As asserções I e II são proposições verdadeiras, e a II é uma justificativa da I.", "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira."],
g:2,
exp:"RESPOSTA CORRETA: A\n\nMesmo antes de a atividade física começar, especialmente em situações de competição, a frequência cardíaca pode aumentar. Este aumento antecipatório ocorre porque o sistema límbico envia impulsos nervosos para o centro cardiovascular no bulbo. Quando a atividade física começa, os proprioceptores que estão monitorando a posição dos membros e os músculos enviam impulsos nervosos ao centro cardiovascular para aumentar a frequência. As informações dos proprioceptores são um grande estímulo para o rápido aumento da frequência cardíaca que ocorre no início da atividade física. Outros receptores sensitivos que fornecem informações ao centro cardiovascular incluem os quimiorreceptores, que monitoram alterações químicas no sangue, e os barorreceptores, que monitoram o estiramento das principais artérias e veias causado pela pressão do sangue que flui neles. Barorreceptores importantes localizados no arco da aorta e nas artérias carótidas detectam alterações na pressão arterial e fornecem informações sobre essas mudanças ao centro cardiovascular.",
deep:"🎯 REGULAÇÃO DA FC NO EXERCÍCIO — INTEGRAÇÃO MULTI-SISTÊMICA\nO aumento da FC durante exercício começa ANTES do movimento iniciar e é refinado por múltiplas vias aferentes.\n\n⚠️ OBSERVAÇÃO IMPORTANTE SOBRE O GABARITO\nO enunciado da questão traz como alternativa correta a \"C\" (asserções I e II verdadeiras, II justifica I). Porém o texto da resposta comentada afirma \"RESPOSTA CORRETA: A\" — o que gerou inconsistência. Seguimos aqui o gabarito marcado como CORRETA no PDF (alternativa C).\n\n🧠 CENTRO CARDIOVASCULAR (bulbo)\nLocalizado na formação reticular do bulbo, integra informações de múltiplas fontes e modula a FC via:\n→ Simpático (↑ FC, ↑ contratilidade)\n→ Parassimpático via vago (↓ FC)\n\n📥 AFERÊNCIAS PARA O CENTRO CARDIOVASCULAR\n\n1️⃣ SISTEMA LÍMBICO (córtex + hipotálamo) — CASO DA QUESTÃO\n→ Emoções, ansiedade, antecipação\n→ ATIVAÇÃO ANTECIPATÓRIA antes do exercício\n→ Situação clássica: atleta antes da prova, \"taquicardia da ansiedade\"\n\n2️⃣ PROPRIOCEPTORES (fusos neuromusculares, órgãos tendinosos de Golgi)\n→ Monitoram posição e movimento de membros\n→ RAPIDAMENTE sinalizam início do movimento ao centro CV\n→ Principal responsável pelo aumento INICIAL da FC no exercício\n\n3️⃣ QUIMIORRECEPTORES (corpos carotídeos e aórticos)\n→ Detectam ↓ PO₂, ↑ PCO₂, ↓ pH\n→ Durante exercício intenso: ↑ CO₂ e lactato → estimulam ↑ FC\n\n4️⃣ BARORRECEPTORES (arco aórtico e seio carotídeo)\n→ Detectam pressão arterial\n→ Durante exercício: ressetam para valores mais altos de PA\n\n5️⃣ HORMÔNIOS (via adrenal)\n→ Adrenalina/noradrenalina amplificam a resposta simpática\n→ Atuam em β1 cardíacos\n\n⚡ SEQUÊNCIA TEMPORAL DURANTE EXERCÍCIO\n\n🏁 Antes do início (antecipação)\n• Sistema LÍMBICO → centro CV → ↑ FC moderado\n• \"FC pré-competição\" pode subir 20-30 bpm acima do basal\n\n🏃 Início do exercício (primeiros segundos)\n• PROPRIOCEPTORES disparam massivamente\n• FC sobe RAPIDAMENTE pelos primeiros 30s-1min\n\n💪 Exercício estabelecido (min)\n• Quimiorreceptores começam a contribuir\n• Hormônios circulantes prolongam resposta\n• PA aumenta (mais sistólica que diastólica)\n\n🛑 Recuperação (pós)\n• Parassimpático reassume\n• FC cai em fases: rápida (primeiros 30s) + lenta (minutos)\n• Recuperação rápida = bom condicionamento\n\n📈 BENEFÍCIOS CARDIOVASCULARES DO EXERCÍCIO REGULAR\n→ ↓ FC de repouso (bradicardia do atleta)\n→ ↓ PA de repouso (5-10 mmHg em hipertensos)\n→ ↑ DC máximo\n→ ↑ Sensibilidade à insulina\n→ ↑ HDL, ↓ LDL e triglicerídeos\n→ ↓ Risco cardiovascular global\n\n💡 MACETE\n'Antes do exercício: LÍMBICO (emoção, antecipação)'\n'Início do exercício: PROPRIOCEPTORES (movimento)'\n'Durante: QUIMIO + BARO + hormônios'"
},

{
n:4,
disc:false,
tema:"Anatomia Cardíaca — Câmaras e Valvas",
context:"O coração contribui para a homeostasia do nosso organismo, atuando como a bomba central responsável por impulsionar o sangue por todo o corpo. Sua importância reside na capacidade de direcionar o sangue de forma eficaz, permitindo a oxigenação adequada dos tecidos e a remoção de dióxido de carbono. Para cumprir essa tarefa complexa, o coração é composto por quatro câmaras distintas, as quais trabalham em conjunto, garantindo que o sangue venoso e arterial seja direcionado de maneira precisa.",
contextHTML:null,
assertions:null,
text:"Marque a alternativa correta sobre as câmaras cardíacas e o seu respectivo mecanismo de circulação:",
opts:["O ventrículo esquerdo, situado na margem superior esquerda do coração, recebe sangue desoxigenado da veia cava e encaminha para o átrio esquerdo através da valva atrioventricular (AV) esquerda.", "O átrio direito, está situado na margem superior direita do coração, este por sua vez, recebe sangue desoxigenado e encaminha para o ventrículo direito através da valva atrioventricular (AV) direita.", "O átrio esquerdo, está situado na margem inferior esquerda do coração, recebe o sangue oxigenado dos pulmões, por meio das quatro veias pulmonares e envia diretamente para o restante do corpo.", "O ventrículo direito, está situado na margem inferior direita do coração, o qual recebe o sangue rico em oxigênio passa do ventrículo direito através da valva do tronco pulmonar para o tronco pulmonar até os pulmões."],
g:1,
exp:"O coração tem quatro câmaras. As duas câmaras de recepção superiores são os átrios, e as duas câmaras de bombeamento inferiores são os ventrículos. O par de átrios recebe sangue dos vasos sanguíneos que retornam o sangue ao coração, as chamadas veias, enquanto os ventrículos ejetam o sangue do coração para vasos sanguíneos chamados artérias.\n\nO átrio direito forma a margem direita do coração e recebe sangue de três veias: a veia cava superior, a veia cava inferior e o seio coronário. Então o sangue passa do átrio direito para o ventrículo direito através da valva tricúspide. O sangue passa do ventrículo direito através da valva do tronco pulmonar para uma grande artéria chamada de tronco pulmonar, que se divide em artérias pulmonares direita e esquerda e levam o sangue até os pulmões.\n\nJá o átrio esquerdo recebe o sangue dos pulmões, por meio das quatro veias pulmonares. O sangue passa do átrio esquerdo para o ventrículo esquerdo através da valva atrioventricular esquerda ou mitral, a qual tem duas válvulas. Então o sangue passa do ventrículo esquerdo através da valva da aorta na parte ascendente da aorta. Um pouco do sangue da aorta flui para as artérias coronárias, que se ramificam da parte ascendente da aorta e transportam o sangue para a parede do coração. A parte restante do sangue passa para o arco da aorta e parte descendente da aorta (partes torácica e abdominal da aorta). Ramos do arco da aorta e da parte descendente da aorta levam o sangue por todo o corpo.",
deep:"🎯 ANATOMIA CARDÍACA — 4 CÂMARAS + 4 VALVAS\nO coração é uma dupla bomba em série: o lado direito impulsiona o sangue pela circulação pulmonar, o lado esquerdo pela sistêmica.\n\n🏛️ AS 4 CÂMARAS\n\n🔵 ÁTRIO DIREITO (AD) — margem direita\n→ Recebe: VCS, VCI e SEIO CORONÁRIO\n→ Sangue DESOXIGENADO\n→ Sai via VALVA TRICÚSPIDE → VD\n\n🔵 VENTRÍCULO DIREITO (VD) — margem anteroinferior\n→ Recebe do AD\n→ Sangue DESOXIGENADO\n→ Sai via VALVA DO TRONCO PULMONAR → tronco pulmonar → artérias pulmonares → pulmões\n\n🔴 ÁTRIO ESQUERDO (AE) — base do coração (mais posterior)\n→ Recebe: 4 VEIAS PULMONARES (2 direitas + 2 esquerdas)\n→ Sangue OXIGENADO\n→ Sai via VALVA MITRAL (atrioventricular esquerda) → VE\n\n🔴 VENTRÍCULO ESQUERDO (VE) — ápice e margem esquerda\n→ Recebe do AE\n→ Sangue OXIGENADO\n→ Sai via VALVA AÓRTICA → aorta → corpo\n→ Parede MAIS ESPESSA (3x mais que VD) — bombeia contra resistência sistêmica\n\n🚪 AS 4 VALVAS\n\n⚙️ VALVAS ATRIOVENTRICULARES (AV)\n• TRICÚSPIDE (AV direita) — 3 cúspides\n• MITRAL / BICÚSPIDE (AV esquerda) — 2 cúspides\n→ Cordoalhas tendíneas + músculos papilares impedem prolapso\n→ Se fecham na SÍSTOLE = 1ª bulha (TUM)\n\n⚙️ VALVAS SEMILUNARES\n• VALVA DO TRONCO PULMONAR (VD → tronco pulmonar)\n• VALVA AÓRTICA (VE → aorta)\n→ 3 cúspides em forma de lua crescente\n→ Se fecham na DIÁSTOLE = 2ª bulha (TÁ)\n\n🔄 FLUXO SANGUÍNEO — CIRCUITO COMPLETO\n\nPEQUENA CIRCULAÇÃO (pulmonar):\nVCS/VCI/seio coronário → AD → tricúspide → VD → valva pulmonar → tronco pulmonar → pulmões\n\nGRANDE CIRCULAÇÃO (sistêmica):\nVeias pulmonares → AE → mitral → VE → valva aórtica → aorta → corpo\n\n🔬 ANÁLISE DAS ALTERNATIVAS\n\n❌ A — VE \"superior esquerda\" está ERRADO. VE fica ÂNTERO-INFERIOR ESQUERDO. VE NÃO recebe da cava (é o AD que recebe)\n\n✅ B — ÁTRIO DIREITO na margem superior direita recebe sangue DESOXIGENADO e manda pro VD via TRICÚSPIDE ✓\n\n❌ C — AE fica na base (superior-posterior), não inferior. AE NÃO envia diretamente pro corpo — envia pro VE primeiro\n\n❌ D — Sangue no VD é DESOXIGENADO, não rico em oxigênio\n\n💊 CONSIDERAÇÕES CLÍNICAS\n→ INSUFICIÊNCIA MITRAL: refluxo durante sístole (sopro sistólico)\n→ ESTENOSE AÓRTICA: dificulta ejeção do VE (sopro sistólico ejetivo)\n→ PROLAPSO DE MITRAL: folhetos abaulam pro AE\n→ FEBRE REUMÁTICA: causa comum de valvulopatia em crianças/jovens\n\n💡 MACETE\n'AD recebe DESOX (VCS/VCI) → TRICÚSPIDE → VD → pulmão'\n'AE recebe OX (4 v. pulmonares) → MITRAL → VE → AORTA → corpo'\n'AV direita = TRIcúspide (3 cúspides) | AV esquerda = MItral (Mnemônico: M tem 2 picos = 2 cúspides)'"
},

tema:"Fisiologia Cardiovascular — Eixo Renina-Angiotensina-Aldosterona",
context:"A homeostasia é um processo vital para o funcionamento adequado do corpo humano, garantindo um ambiente interno estável. O feedback negativo é um processo pelo qual o sistema se autorregula, ajustando suas atividades em resposta a desvios de um ponto de equilíbrio. No caso do controle da pressão arterial, o feedback negativo ajuda a regular os níveis de pressão arterial, diminuindo ou aumentando as respostas fisiológicas para manter a homeostase.\n\nConsiderando esse contexto, avalie as seguintes asserções e a relação proposta entre elas.",
contextHTML:null,
assertions:"I. O hormônio aldosterona desempenha um papel crucial no feedback negativo para o controle da pressão arterial.\n\nPORQUE\n\nII. A aldosterona atua nos rins para promover a reabsorção de sódio, o que leva ao aumento do volume sanguíneo e, consequentemente, ao aumento da pressão arterial.",
text:"A respeito dessas asserções e sua relação, assinale a opção correta.",
opts:["A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.", "As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa da I.", "As asserções I e II são proposições verdadeiras, e a II é uma justificativa da I.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."],
g:2,
exp:"A asserção I afirma que a aldosterona está envolvida no feedback negativo para o controle da pressão arterial, enquanto a asserção II apresenta o mecanismo pelo qual isso ocorre. A aldosterona é um hormônio secretado pelas glândulas supra-renais em resposta a baixos níveis de sódio ou aumento dos níveis de potássio no sangue. Ela atua nos rins para aumentar a reabsorção de sódio e excreção de potássio, resultando em retenção de água e aumento do volume sanguíneo. Esse aumento no volume sanguíneo leva a um aumento na pressão arterial, contribuindo assim para a regulação homeostática da pressão arterial. Portanto, a asserção II é uma justificativa válida para a asserção I.",
deep:"🎯 SRAA — O MAIOR SISTEMA DE REGULAÇÃO DA PA DE LONGO PRAZO\nSistema Renina-Angiotensina-Aldosterona: ativa-se quando a PA cai ou o sódio está baixo, e eleva a PA por múltiplos mecanismos.\n\n⚗️ CASCATA DO SRAA\n\n1️⃣ GATILHOS\n→ ↓ Pressão arterial renal\n→ ↓ Na⁺ no túbulo distal (mácula densa)\n→ ↑ Atividade simpática (β1 renal)\n\n2️⃣ RENINA (células justaglomerulares do rim)\n→ Cliva ANGIOTENSINOGÊNIO (fígado) → ANGIOTENSINA I (inativa)\n\n3️⃣ ECA (Enzima Conversora de Angiotensina — endotélio pulmonar)\n→ Converte Angiotensina I → ANGIOTENSINA II (ativa)\n\n4️⃣ ANGIOTENSINA II — ações múltiplas\n• VASOCONSTRIÇÃO direta → ↑ RVP → ↑ PA\n• Estimula SEDE (centro hipotalâmico)\n• Estimula liberação de ADH\n• Estimula liberação de ALDOSTERONA (zona glomerulosa adrenal)\n\n5️⃣ ALDOSTERONA (córtex adrenal — zona glomerulosa)\n→ Age no TÚBULO CONTORCIDO DISTAL + DUCTO COLETOR\n→ ↑ REABSORÇÃO de Na⁺ (e água acompanha)\n→ ↑ EXCREÇÃO de K⁺ e H⁺\n→ Resultado: ↑ volemia → ↑ retorno venoso → ↑ DC → ↑ PA\n\n🔄 FEEDBACK NEGATIVO\n→ ↑ PA → detectada pelos barorreceptores → ↓ simpático → ↓ renina → ↓ angiotensina II → ↓ aldosterona\n→ Retorno à normalidade (homeostase)\n\n⏱️ TIPOS DE REGULAÇÃO DA PA\n\n🚀 CURTO PRAZO (segundos-minutos)\n→ Reflexo barorreceptor (SNA)\n\n⚡ MÉDIO PRAZO (minutos-horas)\n→ Quimiorreceptores + resposta isquêmica central\n→ Relaxamento tensional\n→ Deslocamento capilar\n\n⏳ LONGO PRAZO (horas-dias)\n→ SRAA ★\n→ ADH / sistema renal\n→ Controle da volemia pelos rins\n\n💊 APLICAÇÕES FARMACOLÓGICAS (drogas que inibem o SRAA para tratar HAS e IC)\n→ IECAs (captopril, enalapril, lisinopril): inibem ECA → ↓ angio II\n  • Efeito adverso: tosse seca (acúmulo de bradicinina)\n→ BRAs (losartana, valsartana): bloqueiam receptor AT1\n  • Sem tosse (não afetam bradicinina)\n→ Inibidores diretos de renina (alisquireno)\n→ ANTAGONISTAS DA ALDOSTERONA:\n  • Espironolactona, eplerenona — diuréticos poupadores de K⁺\n→ BETA-BLOQUEADORES: inibem renina (receptor β1 renal)\n\n🔬 DOENÇAS RELACIONADAS\n→ HIPERALDOSTERONISMO PRIMÁRIO (Sd. de Conn)\n  • Adenoma adrenal → ↑↑ aldosterona\n  • HAS + hipocalemia + alcalose metabólica\n→ HIPERALDOSTERONISMO SECUNDÁRIO\n  • ICC, cirrose, estenose de artéria renal\n→ INSUFICIÊNCIA ADRENAL (Addison)\n  • ↓ Aldosterona → hipotensão, hipercalemia, hiponatremia\n\n✅ ANÁLISE DAS ASSERÇÕES\n• I: aldosterona controla PA via feedback negativo ✓\n• II: mecanismo — reabsorção de Na⁺ → ↑ volume → ↑ PA ✓\n• II JUSTIFICA I — o porquê da aldosterona regular PA é exatamente esse mecanismo renal ✓\n\n💡 MACETE\n'ALDOSTERONA = ↑ Na⁺ reabsorção + ↑ K⁺/H⁺ excreção → ↑ volume → ↑ PA'\n'SRAA = sistema de LONGO PRAZO | Barorreceptor = CURTO PRAZO'"
},

{
n:6,
disc:false,
tema:"Embriologia — Comunicação Interventricular (CIV)",
context:"H.G.R., 6 semanas, sexo masculino, pardo, natural e procedente do interior de Minas Gerais, foi levado pelos pais ao hospital devido a desconforto respiratório e irritabilidade e ganho de peso insuficiente. No hospital foi conduzido para o centro cirúrgico. A hipótese diagnostica é de que o RN é portador de comunicação interventricular (CIV).\n\nSobre o caso exposto, analise as asserções abaixo:",
contextHTML:null,
assertions:"I) Sintomas como desconforto respiratório e irritabilidade podem ocorrer devido à Comunicação Interventricular (CIV) em recém-nascidos.\n\nPORQUE\n\nII) A CIV pode causar um fluxo anormal de sangue entre os ventrículos, resultando em sobrecarga de volume no lado direito do coração e reduzindo a eficiência na distribuição de oxigênio pelo corpo.",
text:"A respeito dessas asserções, assinale a opção correta.",
opts:["I é falsa e II é verdadeira.", "I é verdadeira, e II é falsa.", "I e II são verdadeiras, e II justifica I.", "I e II são verdadeiras, e II não justifica I."],
g:2,
exp:"Tanto a asserção quanto a razão são corretas. A asserção descreve corretamente a comunicação interventricular (CIV) como uma condição cardíaca congênita que envolve um orifício na parede que separa os ventrículos do coração que causa irritabilidade e desconforto respiratório. A razão também está correta ao explicar que a CIV pode causar um fluxo anormal de sangue entre os ventrículos, resultando em sobrecarga de volume no lado direito do coração e prejudicando a distribuição de oxigênio pelo corpo.",
deep:"🎯 COMUNICAÇÃO INTERVENTRICULAR (CIV) — A CARDIOPATIA CONGÊNITA MAIS COMUM\nDefeito no septo interventricular que permite fluxo anormal entre VE e VD. Responde por ~25% de TODAS as cardiopatias congênitas.\n\n🫀 FISIOPATOLOGIA\n→ Buraco no septo IV permite shunt E→D (VE → VD) no início\n→ Pressão do VE (~120 mmHg) >> pressão do VD (~25 mmHg)\n→ Sangue oxigenado volta para o VD → pulmões\n→ SOBRECARGA DE VOLUME no VD e circulação pulmonar\n→ Sangue \"recircula\" pelos pulmões sem ir para corpo\n\n🔬 CLASSIFICAÇÃO POR LOCALIZAÇÃO\n1. PERIMEMBRANOSA (70%) — mais comum, próxima à valva tricúspide\n2. MUSCULAR (20%) — pode ser única ou múltipla (\"queijo suíço\")\n3. SUBPULMONAR / outlet (5%)\n4. INLET (5%) — próxima às AV, associada a Sd. Down\n\n👶 CLÍNICA EM RN / LACTENTE — CASO DA QUESTÃO\n\n🔴 CIV grande — sintomas nas primeiras semanas\n• DESCONFORTO RESPIRATÓRIO (taquipneia)\n• IRRITABILIDADE\n• DIFICULDADE PARA MAMAR\n• SUDORESE DURANTE A MAMADA\n• FALHA EM GANHAR PESO\n• INFECÇÕES RESPIRATÓRIAS RECORRENTES\n\n🟡 CIV pequena\n• Geralmente ASSINTOMÁTICA\n• Sopro holosistólico em borda esternal esquerda\n• Pode fechar espontaneamente na infância\n\n🔴 Sinais de IC em lactente (sobrecarga de volume)\n• Taquipneia, taquicardia\n• Hepatomegalia\n• Edema (raro em RN, comum em > 6 meses)\n• B3 (galope)\n\n⚠️ COMPLICAÇÕES A LONGO PRAZO (se não tratada)\n→ Hipertensão pulmonar\n→ SÍNDROME DE EISENMENGER: inversão do shunt (D→E) → CIANOSE\n  • Irreversível\n  • Contraindica correção cirúrgica\n\n🔬 DIAGNÓSTICO\n→ Ausculta: SOPRO HOLOSISTÓLICO em borda esternal esquerda baixa\n→ ECG: sobrecarga de VE (pequenas) ou biventricular (grandes)\n→ RX: cardiomegalia + ↑ vascularização pulmonar\n→ ECOCARDIOGRAMA: padrão-ouro (define tamanho, localização, repercussão)\n→ Cateterismo: se necessário antes de correção\n\n💊 TRATAMENTO\n🟢 CIV pequena assintomática → acompanhamento (pode fechar sozinha)\n🟡 CIV moderada → diuréticos + IECA + seguimento\n🔴 CIV grande sintomática → CIRURGIA (fechamento com patch) antes de 1 ano\n→ Alternativa: fechamento percutâneo com dispositivo (casos selecionados)\n\n✅ ANÁLISE DAS ASSERÇÕES\n• I: sintomas (desconforto respiratório + irritabilidade) são devidos à CIV ✓\n• II: mecanismo — fluxo anormal causa sobrecarga do lado direito ✓\n• II JUSTIFICA I: os sintomas são consequência DIRETA do shunt e sobrecarga ✓\n\n⚠️ OBSERVAÇÃO TÉCNICA\nA asserção II fala em \"sobrecarga de volume no lado DIREITO\". Na verdade, a CIV causa sobrecarga primária no ÁTRIO ESQUERDO e VENTRÍCULO ESQUERDO (pois o sangue recirculado volta a eles via veias pulmonares). O VD sofre sobrecarga de PRESSÃO tardiamente se houver hipertensão pulmonar. A banca simplificou o conceito para tornar as duas asserções verdadeiras.\n\n💡 MACETE\n'CIV = sopro HOLOSSISTÓLICO em BEE baixa + lactente cansando pra mamar'\n'Shunt E→D inicialmente | Se virar D→E = Eisenmenger (cianose, irreversível)'"
},

n:7,
disc:false,
tema:"Imunologia — Imunidade Adaptativa",
context:"A imunidade adaptativa, um dos pilares fundamentais do sistema imunológico, é responsável por fornecer respostas altamente específicas e especializadas contra patógenos e antígenos estranhos. Ao contrário da imunidade inata, que oferece uma defesa rápida e genérica, a imunidade adaptativa entra em ação quando a primeira linha de defesa não é suficiente para conter uma ameaça.\n\nCom base no mecanismo de imunidade adaptativa, analise as assertivas a seguir.",
contextHTML:null,
assertions:"I- Células dendríticas capturam antígenos e os apresentam às células T, estimulando respostas imunes específicas.\n\nII- As células B liberam citocinas pró-inflamatórias para coordenar a resposta imune.\n\nIII- As células T reconhecem exclusivamente os padrões moleculares associados a patógenos (PAMPs) por meio de seus receptores.\n\nIV- Células T se transformam em células de memória após o combate a uma infecção.",
text:"Marque a alternativa que contém somente informações corretas:",
opts:["III e IV, apenas.", "I e II, apenas.", "II e III, apenas.", "I e IV, apenas."],
g:3,
exp:"I- Esta alternativa está correta. As células dendríticas desempenham um papel crucial na imunidade adaptativa ao capturarem antígenos, processá-los e apresentá-los às células T, desencadeando respostas imunes específicas e direcionadas.\n\nII- Esta alternativa está incorreta. As células B estão mais associadas à produção de anticorpos, e a liberação de citocinas pró-inflamatórias é principalmente uma função das células T auxiliares.\n\nIII- Esta alternativa está incorreta. As células T da imunidade adaptativa não reconhecem PAMPs. Esse reconhecimento é característico da imunidade inata, não adaptativa.\n\nIV- Esta alternativa está correta. As células T que participaram da resposta imune podem se diferenciar em células de memória após o combate a uma infecção. Essas células de memória são cruciais para montar respostas mais rápidas e eficientes em exposições futuras ao mesmo antígeno.",
deep:"🎯 IMUNIDADE ADAPTATIVA — ESPECIFICIDADE E MEMÓRIA\nRamificação especializada do sistema imune que reconhece antígenos específicos, produz anticorpos direcionados e GERA MEMÓRIA IMUNOLÓGICA.\n\n🧬 CÉLULAS PRINCIPAIS\n\n🟡 CÉLULAS APRESENTADORAS DE ANTÍGENO (APCs)\n• CÉLULAS DENDRÍTICAS ★ (principal APC — \"ponte\" inata→adaptativa)\n  → Capturam antígenos nos tecidos → migram para linfonodos\n  → Apresentam via MHC-II aos LT CD4+\n• Macrófagos\n• Linfócitos B\n\n🔵 LINFÓCITOS T (imunidade CELULAR)\n• LT CD4+ (HELPER — Th)\n  • Th1: coordena resposta contra intracelulares (via IFN-γ)\n  • Th2: coordena resposta contra parasitas + alergia (via IL-4, IL-5)\n  • Th17: resposta contra fungos e extracelulares (via IL-17)\n  • Tfh: ajuda LB nos centros germinativos\n  • Treg: suprime respostas (evita autoimunidade)\n• LT CD8+ (CITOTÓXICA — CTL)\n  → Mata células infectadas via perforina + granzima\n  → Reconhece antígenos via MHC-I\n\n🔴 LINFÓCITOS B (imunidade HUMORAL)\n• Produzem ANTICORPOS (plasmócitos)\n• Reconhecem antígenos diretamente (via BCR)\n• Precisam de LT CD4+ para ativação completa\n\n🧠 MEMÓRIA IMUNOLÓGICA — CARACTERÍSTICA-CHAVE\n→ Após primeira exposição, alguns LT e LB viram MEMÓRIA\n→ Sobrevivem por anos/décadas\n→ Re-exposição: resposta MAIS RÁPIDA + MAIS FORTE\n→ Base da vacinação\n\n🧩 RECEPTORES — DIFERENÇA INATA vs ADAPTATIVA\n\n🟢 INATA (receptores germinativos — PRRs)\n• TLRs (Toll-Like Receptors) — reconhecem PAMPs\n• PAMPs: LPS, flagelina, CpG DNA, RNA dupla-fita\n• Número LIMITADO de receptores (~10)\n• Reconhecimento de PADRÕES\n\n🔵 ADAPTATIVA (receptores somáticos — gerados por recombinação)\n• TCR (LT) — reconhece antígeno + MHC\n• BCR (LB) — reconhece antígeno diretamente\n• Variabilidade IMENSA (~10⁸ especificidades)\n• Reconhecimento ESPECÍFICO de epítopos\n\n🔬 ANÁLISE DAS ASSERTIVAS\n\n✅ I — dendríticas capturam antígeno e apresentam aos LT ✓\n\n❌ II — \"LB liberam citocinas pró-inflamatórias para coordenar resposta\" — FALSO\n   LB produzem ANTICORPOS. Citocinas são liberadas por LT helpers (Th1, Th17)\n\n❌ III — \"LT reconhecem PAMPs\" — FALSO\n   PAMPs são reconhecidos por TLRs na IMUNIDADE INATA\n   LT reconhecem antígenos apresentados via MHC\n\n✅ IV — LT viram células de memória pós-infecção ✓\n\n💊 APLICAÇÕES CLÍNICAS\n→ HIV: destrói LT CD4+ → imunodeficiência\n→ VACINAS: explora a memória adaptativa\n→ TERAPIA CAR-T: LT modificados para atacar tumores\n→ IMUNOSSUPRESSORES (transplante): inibem LT\n→ CHECKPOINT INHIBITORS (câncer): desbloqueiam LT (anti-PD1, anti-CTLA4)\n\n💡 MACETE\n'Dendrítica = APRESENTA (ponte inata→adaptativa)'\n'LT CD4 = COORDENA (citocinas) | LT CD8 = MATA (perforina) | LB = ANTICORPO'\n'PAMPs = imunidade INATA (TLRs) | Antígeno específico = imunidade ADAPTATIVA (TCR/BCR)'"
},

{
n:8,
disc:false,
tema:"Imunologia — Resposta Humoral × Celular",
context:"Um paciente, é diagnosticado com uma infecção viral grave. Ao investigar a resposta imunológica, observa-se que os linfócitos T auxiliares (CD4+) estão ativados e liberando citocinas para coordenar a resposta imune. Ao mesmo tempo, anticorpos específicos para o vírus estão sendo produzidos e liberados na corrente sanguínea. Com base nesse caso clínico, assinale a alternativa que diferencia corretamente a imunidade adaptativa humoral da imunidade adaptativa celular.",
contextHTML:null,
assertions:null,
text:"Assinale a alternativa que diferencia corretamente a imunidade adaptativa humoral da imunidade adaptativa celular.",
opts:["A imunidade adaptativa humoral é mais eficaz contra infecções intracelulares, é a resposta imune mais rápida e inespecífica. Enquanto a imunidade adaptativa celular é mais eficaz contra infecções bacterianas.", "A imunidade adaptativa humoral envolve produção de anticorpos pelas células B, contra patógenos extracelulares. Já a imunidade adaptativa celular é dirigida por células T citotóxicas (CD8+), que eliminam células infectadas.", "A imunidade adaptativa humoral é uma resposta mais rápida e inespecífica, atuando como a primeira linha de defesa imediata contra infecções, enquanto a imunidade adaptativa celular leva mais tempo para ser ativada.", "A imunidade adaptativa humoral está mediada principalmente pelos linfócitos T auxiliares (CD4+), enquanto a imunidade adaptativa celular envolve a produção de anticorpos pelas células B, os quais irão agir em uma próxima infecção."],
g:1,
exp:"A imunidade adaptativa humoral envolve a produção de anticorpos pelas células B, que circulam no sangue e nos fluidos corporais para combater patógenos extracelulares, como vírus, bactérias e toxinas. Por outro lado, a imunidade adaptativa celular é mediada principalmente por células T citotóxicas (CD8+), que reconhecem e eliminam células infectadas por patógenos intracelulares. O caso clínico descreve a resposta imune combinada, onde tanto a imunidade adaptativa humoral quanto a imunidade adaptativa celular estão envolvidas na defesa contra a infecção viral.",
deep:"🎯 IMUNIDADE ADAPTATIVA — HUMORAL × CELULAR\nDuas \"faces\" da mesma moeda, que trabalham em conjunto mas têm alvos e mecanismos distintos.\n\n🔴 IMUNIDADE HUMORAL — MEDIADA POR LB + ANTICORPOS\n\n🎯 ALVOS PRINCIPAIS\n• Patógenos EXTRACELULARES (bactérias encapsuladas, toxinas)\n• Vírus CIRCULANTES no sangue (antes de entrar na célula)\n• Parasitas extracelulares\n\n⚔️ MECANISMOS EFETORES — \"ANTICORPO EM AÇÃO\"\n1. NEUTRALIZAÇÃO: anticorpo se liga ao antígeno e bloqueia\n   (ex: IgA bloqueia adesão de bactérias ao epitélio)\n2. OPSONIZAÇÃO: cobre o patógeno → facilita fagocitose\n   (ex: IgG opsoniza bactérias para macrófagos)\n3. ATIVAÇÃO DO COMPLEMENTO: via clássica (IgM/IgG)\n   → Forma MAC (lise de bactérias Gram-)\n4. ADCC (citotoxicidade dependente de anticorpos): NK matam alvos marcados\n\n📋 CLASSES DE IMUNOGLOBULINAS\n┌──────┬──────────────┬─────────────────────────────┐\n│ Ig   │ %/loca       │ Função principal            │\n├──────┼──────────────┼─────────────────────────────┤\n│ IgG  │ 75% soro     │ principal; atravessa placenta│\n│ IgA  │ mucosas      │ defesa de superfície        │\n│ IgM  │ 10%, pentâm. │ primeira resposta           │\n│ IgE  │ traços       │ alergia + parasitas         │\n│ IgD  │ BCR          │ ativação de LB              │\n└──────┴──────────────┴─────────────────────────────┘\n\n🔵 IMUNIDADE CELULAR — MEDIADA POR LT CD8+\n\n🎯 ALVOS PRINCIPAIS\n• Patógenos INTRACELULARES (vírus, micobactérias, fungos dimórficos)\n• Células tumorais\n• Células alteradas (displasia)\n\n⚔️ MECANISMOS EFETORES\n1. LT CD8+ reconhece célula infectada via MHC-I\n2. Libera PERFORINA → poro na membrana da célula-alvo\n3. Libera GRANZIMAS → ativa apoptose\n4. Induz via FAS-FasL → apoptose\n5. Secreta IFN-γ → ativa macrófagos + inibe replicação viral\n\n🤝 INTEGRAÇÃO ENTRE AS DUAS\nLT CD4+ (Th) coordena AMBAS:\n• Th1 → favorece celular (contra intracelulares)\n• Th2 → favorece humoral (contra extracelulares, alergia)\n• Tfh → ajuda LB nos centros germinativos\n\n🦠 NO CASO (INFECÇÃO VIRAL GRAVE)\nVírus = intracelular → resposta CELULAR predomina\nMAS vírus também tem fase extracelular → resposta HUMORAL também age\n→ Por isso no caso aparecem LT CD4+ ativados (coordenando) + anticorpos (combatendo vírus circulante) + provavelmente LT CD8+ (matando células infectadas)\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: humoral não é \"rápida e inespecífica\" — ESSA é a inata\n  Humoral é específica e contra EXTRACELULARES\n• C: humoral não é \"primeira linha\" — a inata é\n• D: INVERTIDO — humoral é LB, celular é LT\n\n💡 MACETE\n'HUMORAL = LB → ANTICORPOS → EXTRACELULAR (bactéria, toxina, vírus livre)'\n'CELULAR = LT CD8+ → MATA célula infectada → INTRACELULAR (vírus dentro da célula)'\n'Infecção viral = os DOIS trabalham juntos'"
},

{
n:9,
disc:false,
tema:"Biologia Molecular — Dogma Central (DNA → RNA → Proteína)",
context:"Em um laboratório de análises genéticas, os técnicos estão realizando a avaliação de uma amostra de material biológico de um paciente para identificar possíveis alterações genéticas. Durante o processo, eles se deparam com o desafio de compreender a função do material genético e sua relação direta com a síntese de proteínas, a fim de interpretar corretamente os resultados obtidos. Analise as assertivas a seguir:",
contextHTML:null,
assertions:"I. O material genético presente nas células humanas é o DNA, uma molécula composta por sequências de nucleotídeos que carregam informações genéticas.\n\nII. A transcrição é o processo pelo qual a informação genética do DNA é convertida em RNA mensageiro (mRNA), que transporta a sequência de bases nitrogenadas para o ribossomo.\n\nIII. Durante a síntese proteica, os ribossomos utilizam o RNA mensageiro (mRNA) como molde para sintetizar diretamente a sequência de aminoácidos que formarão a proteína.\n\nIV. A tradução é o processo pelo qual as informações genéticas presentes no mRNA são utilizadas para montar a sequência de aminoácidos de uma proteína funcional.",
text:"Marque a alternativa que contém todas as assertivas corretas.",
opts:["As assertivas I, II, III e IV estão corretas.", "As assertivas I e II estão corretas.", "As assertivas I, II e IV estão corretas.", "As assertivas II, III e IV estão corretas."],
g:2,
exp:"Explicação das Assertivas:\n\nI. Correto. O DNA é o material genético das células humanas, e é composto por sequências de nucleotídeos que carregam informações genéticas.\n\nII. Correto. A transcrição é o processo pelo qual a informação genética do DNA é transcrita em RNA mensageiro (mRNA), que levará a informação do núcleo para o citoplasma onde ocorrerá a tradução.\n\nIII. Incorreto. Durante a síntese proteica, os ribossomos utilizam o mRNA como molde para a síntese de proteínas, mas não sintetizam diretamente a sequência de aminoácidos. Os tRNAs carregam os aminoácidos correspondentes para os ribossomos.\n\nIV. Correto. A tradução é o processo pelo qual a sequência de aminoácidos de uma proteína é montada com base nas informações contidas no mRNA.",
deep:"🎯 DOGMA CENTRAL DA BIOLOGIA MOLECULAR\nFluxo da informação genética: DNA → RNA → PROTEÍNA\nFormulado por Francis Crick em 1958.\n\n🧬 ETAPA 1 — REPLICAÇÃO (DNA → DNA)\n→ Ocorre no NÚCLEO, antes da divisão celular (fase S)\n→ DNA polimerase sintetiza cópia idêntica\n→ Semiconservativa (cada DNA-filha tem 1 fita antiga + 1 nova)\n\n📝 ETAPA 2 — TRANSCRIÇÃO (DNA → mRNA)\n→ Ocorre no NÚCLEO\n→ RNA polimerase lê a fita molde (3'→5') e sintetiza mRNA (5'→3')\n→ Diferenças DNA→RNA: Timina → URACIL; açúcar desoxirribose → ribose\n\n🔧 PROCESSAMENTO DO mRNA (pós-transcricional)\n• Adição do CAP 5' (proteção + reconhecimento pelo ribossomo)\n• Adição da cauda POLI-A 3' (estabilidade + transporte)\n• SPLICING: remoção de íntrons, junção de éxons\n• Edição de RNA (raro)\n\n🚪 mRNA MADURO sai do núcleo → CITOPLASMA\n\n🏭 ETAPA 3 — TRADUÇÃO (mRNA → PROTEÍNA)\n→ Ocorre nos RIBOSSOMOS (livres ou no RER)\n→ mRNA é lido em códons (3 nucleotídeos = 1 aminoácido)\n→ tRNAs TRAZEM os aminoácidos correspondentes\n\n🧩 MECÂNICA DA TRADUÇÃO\n1. INICIAÇÃO: ribossomo se monta no mRNA, tRNA-Met encontra AUG (códon inicial)\n2. ELONGAÇÃO: tRNAs adicionam aminoácidos sequencialmente\n   • Sítio A: entra o novo tRNA\n   • Sítio P: contém a cadeia peptídica\n   • Sítio E: saída do tRNA vazio\n3. TERMINAÇÃO: códons STOP (UAA, UAG, UGA) → liberação da proteína\n\n⚠️ PONTO CRÍTICO — RIBOSSOMO × tRNA\n→ Ribossomo é a FÁBRICA (onde a proteína é montada)\n→ tRNA é o ENTREGADOR (traz os aminoácidos)\n→ mRNA é o MANUAL (diz quais aminoácidos e em que ordem)\n→ Ribossomo NÃO \"sintetiza diretamente os aminoácidos\" — ele faz a ligação peptídica entre aminoácidos trazidos pelos tRNAs\n\n📦 MODIFICAÇÕES PÓS-TRADUCIONAIS\n• Dobramento (com ajuda de chaperonas)\n• Glicosilação\n• Fosforilação\n• Clivagem proteolítica (ex: insulina → proinsulina → insulina ativa)\n• Endereçamento (sinal de secreção, localização)\n\n🔬 ANÁLISE DAS ASSERTIVAS\n\n✅ I — DNA é o material genético, composto por nucleotídeos ✓\n\n✅ II — transcrição: DNA → mRNA (leva info pro ribossomo) ✓\n\n❌ III — \"ribossomos sintetizam diretamente a sequência de aminoácidos\" — FALSO\n   Os tRNAs que CARREGAM os aminoácidos. O ribossomo CATALISA a ligação peptídica, mas não sintetiza aminoácidos\n\n✅ IV — tradução: mRNA → sequência de aminoácidos → proteína ✓\n\n🧪 EXCEÇÕES AO DOGMA CENTRAL\n→ TRANSCRIPTASE REVERSA (retrovírus como HIV): RNA → DNA\n→ RNA autorreplicante (alguns vírus de RNA)\n→ Príons: proteína infecciosa sem material genético (ex: doença da vaca louca)\n\n💊 APLICAÇÕES CLÍNICAS\n→ Vacinas de mRNA (COVID-19): injeta mRNA → célula faz a proteína viral → sistema imune treina\n→ Antirretrovirais (HIV): inibem transcriptase reversa\n→ Antibióticos: muitos inibem tradução bacteriana (ex: cloranfenicol, eritromicina, tetraciclinas)\n\n💡 MACETE\n'DNA (núcleo) → TRANSCRIÇÃO → mRNA → sai do núcleo → RIBOSSOMO (citoplasma) → TRADUÇÃO com tRNAs → PROTEÍNA'\n'Ribossomo é a fábrica; tRNA é o entregador; mRNA é o manual'"
},

{
n:10,
disc:false,
tema:"Hematologia — Tipos de Hemoglobina (Adulto × Fetal)",
context:"Durante uma pesquisa, um estudante de medicina verifica que há diferentes tipos de hemoglobinas no organismo humano. Ele se depara com os principais tipos de hemoglobinas e suas características. Avalie as afirmativas a seguir:",
contextHTML:null,
assertions:"I. Hemoglobina A (HbA) é o tipo predominante em adultos saudáveis e é composta por duas cadeias alfa e duas cadeias beta.\n\nII. Hemoglobina A2 (HbA2) esse tipo é o mais comum em adultos, representando cerca de 97% de toda a hemoglobina total.\n\nIII. Hemoglobina Fetal (HbF) é encontrada em níveis mais elevados nos fetos e possui alta afinidade pelo oxigênio.\n\nIV. Hemoglobina A2 (HbA2) representa de 1,5 a 3% da hemoglobina total nos adultos, e é composta por duas cadeias alfa e duas cadeias delta.",
text:"A respeito dessas afirmativas, assinale a opção correta.",
opts:["Apenas as afirmativas II e IV estão corretas.", "Apenas as afirmativas I, III e IV estão corretas.", "Apenas a afirmativa IV está correta.", "Apenas as afirmativas I e II estão corretas."],
g:1,
exp:"Análise das Assertivas:\n\nI. Correta. A hemoglobina A (HbA) é a forma predominante em adultos saudáveis e é composta por duas cadeias alfa e duas cadeias beta.\n\nII.Incorreta. A Hemoglobina A2 (HbA2) representa apenas uma pequena porcentagem da hemoglobina total em adultos.\n\nIII. Correta. A Hemoglobina Fetal (HbF) é encontrada em níveis mais elevados nos fetos e possui uma afinidade maior pelo oxigênio do que a hemoglobina encontrada em adultos.\n\nIV. Correta. A Hemoglobina A2 (HbA2) representa cerca de 1,5 a 3% da hemoglobina total nos adultos e é composta por duas cadeias alfa e duas cadeias delta.",
deep:"🎯 HEMOGLOBINAS — TIPOS E FUNÇÕES\nTODA hemoglobina é um TETRÂMERO (4 cadeias de globina + 4 grupos heme com Fe²⁺).\nO tipo de cadeias varia conforme a fase da vida e condição fisiopatológica.\n\n🩸 HEMOGLOBINAS NORMAIS DO ADULTO\n\n🔴 HbA (α₂β₂) — 95-97% no adulto\n• 2 cadeias alfa + 2 cadeias beta\n• Forma principal e funcional\n• Afinidade pelo O₂ modulável pelo 2,3-BPG\n\n🔴 HbA₂ (α₂δ₂) — 1,5-3,5% no adulto\n• 2 cadeias alfa + 2 cadeias DELTA\n• Pequena quantidade normalmente\n• ↑↑ em β-talassemia (marcador diagnóstico > 3,5%)\n\n🔴 HbF (α₂γ₂) — < 1% no adulto (residual)\n• Permanece pequena quantidade\n• Aumentada em: anemia falciforme (hidroxiureia induz), talassemia\n\n👶 HEMOGLOBINAS FETAIS / EMBRIONÁRIAS\n\n🟣 HbF (α₂γ₂) — DOMINANTE no feto (~60-80% ao nascer)\n• 2 cadeias alfa + 2 cadeias GAMA\n• MAIOR AFINIDADE pelo O₂ que HbA\n• Permite \"roubar\" O₂ da mãe pela placenta\n• Resiste menos ao 2,3-BPG\n• Declina após nascimento, substituída por HbA em ~6 meses\n\n🟣 Hb GOWER 1 (ζ₂ε₂) — primeiras semanas embrionárias\n🟣 Hb GOWER 2 (α₂ε₂) — embrionária\n🟣 Hb PORTLAND (ζ₂γ₂) — embrionária\n\n🔴 HEMOGLOBINAS PATOLÓGICAS\n\n🧬 HbS (α₂βˢ₂) — ANEMIA FALCIFORME\n• Mutação pontual no gene β: Glu6Val\n• Polimeriza em hipóxia → hemácia em foice\n• Causa crises vaso-oclusivas\n\n🧬 Hb Bart's (γ₄) — α-TALASSEMIA GRAVE\n• 4 cadeias gama (sem alfa)\n• Hidropsia fetal — INCOMPATÍVEL COM A VIDA\n\n🧬 HbH (β₄) — α-TALASSEMIA\n• 4 cadeias beta (deficiência de alfa)\n• Anemia hemolítica crônica\n\n📊 CURVA DE DISSOCIAÇÃO DO O₂\n→ HbF: curva desloca para ESQUERDA (maior afinidade)\n→ HbA adulto: curva sigmoide \"normal\"\n→ Desvio para DIREITA (menor afinidade): ↑ CO₂, ↓ pH (Bohr), ↑ temp, ↑ 2,3-BPG\n→ Desvio para ESQUERDA (maior afinidade): ↓ CO₂, ↑ pH, ↓ temp, ↓ 2,3-BPG, CO (monóxido de carbono)\n\n🧪 ELETROFORESE DE HEMOGLOBINA\n→ Adulto normal: HbA predomina, pouco HbA₂ e HbF\n→ β-talassemia menor: ↑ HbA₂\n→ Anemia falciforme SS: só HbS e HbF (↑↑)\n→ Traço falciforme AS: HbA + HbS\n→ Persistência hereditária de HbF: ↑ HbF na vida adulta\n\n🔬 ANÁLISE DAS ASSERTIVAS\n\n✅ I — HbA = α₂β₂, predominante no adulto ✓\n❌ II — HbA₂ \"mais comum, 97%\" — FALSO. É a HbA que é 97%; HbA₂ é apenas 1,5-3,5%\n✅ III — HbF alta no feto, maior afinidade pelo O₂ ✓\n✅ IV — HbA₂ = 1,5-3% no adulto, α₂δ₂ ✓\n\n💡 MACETE\n'HbA = Alfa-Beta (97% adulto) | HbA₂ = Alfa-Delta (1,5-3% adulto) | HbF = Alfa-Gama (predomina no feto)'\n'HbF > afinidade ao O₂ = rouba O₂ da mãe pela placenta'"
},

{
n:11,
disc:false,
tema:"Fisiologia Vascular — Remodelamento em HAS Crônica",
context:"O crescimento e o remodelamento vasculares são componentes fundamentais ao desenvolvimento e crescimento dos tecidos e também ocorrem como uma resposta adaptativa às alterações a longo prazo na pressão arterial e no fluxo sanguíneo. Por exemplo, depois de vários meses de treinamento físico crônico, a vascularização dos músculos treinados aumenta para atender às maiores necessidades de fluxo sanguíneo.\n\nEm relação às adaptações morfológicas nos vasos sanguíneos em resposta ao aumento crônico da pressão arterial acima da normalidade, identifique a alternativa correta.",
contextHTML:null,
assertions:null,
text:"Em relação às adaptações morfológicas nos vasos sanguíneos em resposta ao aumento crônico da pressão arterial acima da normalidade, identifique a alternativa correta.",
opts:["A pressão arterial elevada de forma aguda, leva uma adaptação das artérias e arteríolas, diminuindo a resistência periférica.", "Artérias e arteríolas são remodeladas para acomodar a maior tensão mecânica das paredes associadas à elevação da pressão arterial.", "Artérias e arteríolas não necessitam de remodelamento para suportar a sobrecarga mecânica relacionada à elevação da pressão arterial.", "As pequenas artérias e as arteríolas são adaptadas para suportar o menor fluxo sanguíneo associado à elevação da pressão arterial."],
g:1,
exp:"Ocorrem alterações na estrutura dos grandes vasos sanguíneos em resposta às alterações de longa duração na pressão arterial e no fluxo sanguíneo. Quando, por exemplo, a pressão arterial está elevada de forma crônica acima da normalidade, as grandes e pequenas artérias e as arteríolas são remodeladas para acomodar a maior tensão mecânica das paredes associadas à elevação da pressão arterial.",
deep:"🎯 REMODELAMENTO VASCULAR NA HAS CRÔNICA\nQuando a pressão arterial permanece elevada por meses/anos, os vasos se ADAPTAM estruturalmente — mas essa adaptação tem custos.\n\n🧱 TIPOS DE REMODELAMENTO\n\n🔵 REMODELAMENTO EUTRÓFICO (sem alteração de massa)\n→ Músculo liso da camada média se rearranja\n→ Lúmen DIMINUI, parede mantém espessura, mas fica mais \"compacta\"\n→ Típico da HAS leve a moderada\n\n🔴 REMODELAMENTO HIPERTRÓFICO (com aumento de massa)\n→ HIPERTROFIA + HIPERPLASIA das células musculares lisas\n→ Parede ESPESSA\n→ Lúmen DIMINUI\n→ Deposição de matriz (colágeno)\n→ Típico da HAS severa e prolongada\n\n⚙️ MECANISMOS MOLECULARES\n→ Angiotensina II — efeito trófico direto na parede\n→ Aldosterona — estimula fibrose\n→ Endotelina-1\n→ Estresse de cisalhamento alterado\n→ Disfunção endotelial (↓ NO)\n→ Estresse oxidativo\n→ TGF-β → fibrose\n\n📈 CONSEQUÊNCIAS DO REMODELAMENTO\n\n⚠️ NO VASO\n→ ↑ Relação parede/lúmen\n→ ↑ Resistência vascular periférica → perpetua HAS\n→ ↓ Complacência\n→ Disfunção endotelial\n→ Aceleração da aterosclerose\n\n❤️ NO CORAÇÃO (como consequência)\n→ Hipertrofia ventricular esquerda (HVE) — tenta vencer a resistência\n→ Inicialmente concêntrica, depois excêntrica\n→ Disfunção diastólica → sistólica\n→ IC / arritmias / IAM\n\n🧠 EM OUTROS ÓRGÃOS\n→ Cérebro: lesões em substância branca (leucoaraiose), microinfartos lacunares, AVC\n→ Rim: nefrosclerose hipertensiva → DRC\n→ Retina: retinopatia hipertensiva\n\n🔄 REVERSIBILIDADE\n→ Tratamento eficaz da HAS REVERTE parcialmente o remodelamento\n→ IECAs, BRAs e antagonistas da aldosterona são especialmente eficazes\n→ β-bloqueadores tradicionais (atenolol) regridem menos o remodelamento que IECAs\n→ Captopril/enalapril → reduzem HVE\n→ Espironolactona → reduz fibrose\n\n🏃 COMPARAR COM EXERCÍCIO\n→ Exercício aeróbico crônico causa REMODELAMENTO FISIOLÓGICO:\n  • ↑ Calibre de vasos musculares\n  • ↑ Capilarização tecidual\n  • ↑ Complacência arterial\n  • HVE excêntrica (coração de atleta)\n→ HAS causa REMODELAMENTO PATOLÓGICO (oposto)\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: \"pressão elevada AGUDA\" — o remodelamento é resposta CRÔNICA, não aguda\n• C: vasos NECESSITAM remodelamento para suportar pressão elevada (é uma adaptação)\n• D: PA elevada aumenta a tensão na parede, não diminui o fluxo\n\n💡 MACETE\n'HAS crônica = vasos se ADAPTAM: parede ESPESSA + LÚMEN ESTREITO'\n'Ótimo para suportar pressão, RUIM porque aumenta ainda mais a RVP (ciclo vicioso)'"
},

disc:true,
tema:"Fisiologia Cardíaca — Bulhas Cardíacas e Ciclo Cardíaco",
context:"O ciclo cardíaco é um conjunto de atividades que ocorre entre o início de um batimento até o próximo. O ciclo cardíaco abrange o período de diástole, no qual o coração se enche de sangue, e o período de sístole que é de contração, onde o sangue é ejetado. A relação entre os eventos elétricos e mecânicos durante um ciclo cardíaco pode ser ilustrada no diagrama de Wiggers conforme imagem abaixo.\n\nFonte: https://www.purposegames.com/game/diagrama-de-wiggers-t30\n\nAnalise o diagrama de Wiggers e responda as questões a seguir.",

exp:"Alternativa A\n\nEnquanto os átrios se contraem, a onda de despolarização se move lentamente pelas células condutoras do nó AV e, então, pelas fibras de Purkinje até o ápice do coração. A sístole ventricular inicia no ápice do coração quando as bandas musculares em espiral empurram o sangue para cima em direção à base. O sangue empurrado contra a porção inferior das valvas AV faz elas se fecharem, de modo que não haja refluxo para os átrios. As vibrações seguintes ao fechamento das valvas AV geram a primeira bulha cardíaca, S1, o \"tum\" do \"tum-tá\".\n\nAlternativa B\n\nNo final da ejeção ventricular, os ventrículos começam a repolarizar e a relaxar, diminuindo a pressão dentro dessas câmaras. Uma vez que a pressão ventricular cai abaixo da pressão nas artérias, o fluxo sanguíneo começa a retornar para o coração. Este fluxo retrógrado enche os folhetos (cúspides) em forma de taça das válvulas semilunares, forçando-os para a posição fechada. As vibrações geradas pelo fechamento das válvulas semilunares geram a segunda bulha cardíaca, S2, o \"tá\" do \"tum-tá\".",
deep:"🎯 CICLO CARDÍACO — FASES E BULHAS\nO ciclo cardíaco completo dura ~0,8s em FC de 75 bpm e divide-se em SÍSTOLE (0,3s) + DIÁSTOLE (0,5s). As bulhas cardíacas correspondem ao fechamento das valvas.\n\n🫀 FASES DETALHADAS DO CICLO\n\n💙 DIÁSTOLE VENTRICULAR (relaxamento)\n\n1. RELAXAMENTO ISOVOLUMÉTRICO (0,08s)\n   • Todas as valvas fechadas\n   • Pressão ventricular cai rapidamente\n   • Volume ventricular mantido (volume sistólico final ~50mL)\n\n2. ENCHIMENTO VENTRICULAR RÁPIDO\n   • Pressão ventricular < atrial → valvas AV abrem\n   • 70% do enchimento ocorre aqui (passivo)\n\n3. DIÁSTASE (enchimento lento)\n   • Pressões equilibradas\n   • Enchimento continua lentamente\n\n4. SÍSTOLE ATRIAL (\"pontapé atrial\" - kick atrial)\n   • Completa os últimos 20-30% do enchimento\n   • Corresponde à onda P no ECG\n   • Volume ventricular final: ~120mL (volume diastólico final)\n\n❤️ SÍSTOLE VENTRICULAR (contração)\n\n5. CONTRAÇÃO ISOVOLUMÉTRICA (0,05s)\n   • Valvas AV fecham → 1ª BULHA (S1) ★\n   • Valvas semilunares ainda fechadas\n   • Pressão ventricular sobe rapidamente\n   • Volume constante\n\n6. EJEÇÃO VENTRICULAR\n   • Pressão ventricular > arterial → valvas semilunares abrem\n   • Ejeção rápida inicial + ejeção lenta final\n   • Volume de ejeção: ~70mL\n   • Fração de ejeção normal: 55-70%\n\n7. Volta para relaxamento isovolumétrico\n   • Valvas semilunares fecham → 2ª BULHA (S2) ★\n\n🔊 AS 4 BULHAS CARDÍACAS\n\n🟢 S1 — \"TUM\" (1ª bulha) ★\n→ Fechamento das valvas ATRIOVENTRICULARES (mitral + tricúspide)\n→ Marca INÍCIO DA SÍSTOLE ventricular\n→ Melhor audível no ÁPICE (4º-5º EIC esquerdo)\n→ Bulha MAIS LONGA E GRAVE\n→ Componente M1 precede T1 (mitral fecha primeiro)\n\n🟢 S2 — \"TÁ\" (2ª bulha) ★\n→ Fechamento das valvas SEMILUNARES (aórtica + pulmonar)\n→ Marca INÍCIO DA DIÁSTOLE ventricular\n→ Melhor audível na BASE (2º EIC)\n→ Bulha MAIS CURTA E AGUDA\n→ Componente A2 precede P2\n→ DESDOBRAMENTO FISIOLÓGICO na inspiração (↑ retorno venoso ao VD → P2 atrasa)\n\n🟡 S3 — GALOPE PROTODIASTÓLICO\n→ Enchimento ventricular rápido em coração pouco complacente\n→ FISIOLÓGICO em crianças e atletas\n→ PATOLÓGICO em adultos: sinal de IC com disfunção sistólica\n\n🟡 S4 — GALOPE PRÉ-SISTÓLICO\n→ Contração atrial contra ventrículo NÃO complacente\n→ SEMPRE PATOLÓGICO em adultos\n→ Sugere disfunção diastólica (HAS, estenose aórtica, HVE)\n\n📊 DIAGRAMA DE WIGGERS — O QUE CADA CURVA MOSTRA\n→ Pressão aórtica (vermelha): sobe na ejeção, incisura dicrótica no fechamento aórtico\n→ Pressão ventricular (azul): pico na sístole\n→ Pressão atrial (tracejada): ondas a, c, v\n→ Volume ventricular (verde): cai na ejeção, sobe no enchimento\n→ ECG: P, QRS, T\n→ Fonocardiograma: marca 1ª, 2ª, 3ª bulhas\n\n🩺 CORRELAÇÕES CLÍNICAS\n→ ESTENOSE MITRAL: B1 hiperfonética + estalido de abertura\n→ INSUFICIÊNCIA MITRAL: B1 hipofonética + sopro holossistólico\n→ ESTENOSE AÓRTICA: sopro sistólico em diamante + A2 reduzido\n→ INSUFICIÊNCIA AÓRTICA: sopro diastólico aspirativo\n→ COMUNICAÇÃO INTERATRIAL: B2 com DESDOBRAMENTO FIXO\n\n💡 MACETE\n'B1 = TUM = AV fecham = início da SÍSTOLE (mitral + tricúspide)'\n'B2 = TÁ = semilunares fecham = início da DIÁSTOLE (aórtica + pulmonar)'\n'B3 = enchimento (IC) | B4 = contração atrial contra ventrículo rígido (HAS, HVE)'"

tema:"Histologia Vascular — Artérias, Capilares e Veias",
context:"O sistema circulatório contribui para a homeostasia corporal, transportando e distribuindo o sangue a fim de fornecer substâncias e remover metabólitos. Para que isso ocorra, os diferentes vasos sanguíneos com suas estruturas e funções, são essenciais.\n\nAnalise as seguintes afirmativas sobre características dos vasos sanguíneos:",
contextHTML:null,
assertions:"I – Vasos que contém abundância de fibras elásticas em túnica média bem definida, conferindo elasticidade e resistência perante altas pressões.\n\nII – Vasos que formam extensa rede com muitas ramificações e têm alta permeabilidade, sendo responsáveis pela função de troca.\n\nIII – Vasos com túnica externa mais espessa, contendo tecido conjuntivo, fibras colágenas e elásticas, além de terem maior lúmen.\n\nIV – Vasos nos quais o sangue tem menor velocidade de fluxo sanguíneo devido a uma maior área de secção transversa total.\n\nV - Vasos com túnica média espessa contendo várias camadas de músculo liso e que contribuem para controlar o fluxo de sangue para os vários órgãos.\n\nVI - Vasos com função de distribuição final de sangue arterial nos tecidos e o recolhimento inicial de sangue venoso.",
text:"Assinale a alternativa que contém afirmativa(s) relativa(s) a artérias.",
opts:["I e III, apenas.", "I e V, apenas.", "III, V e VI, apenas.", "II, IV e VI, apenas."],
g:1,
exp:"Em virtude da abundância de fibras elásticas, as artérias normalmente apresentam uma alta complacência, o que significa que suas paredes se distendem facilmente ou se expandem sem sofrer ruptura em resposta a um pequeno aumento da pressão. Essas características são especialmente marcantes nas artérias elásticas, de grande calibre. A túnica média das artérias é mais espessa e bem definida.\n\nAs artérias musculares contribuem para controlar o fluxo de sangue para os vários órgãos, por meio da contração ou do relaxamento das células musculares lisas de sua túnica média.\n\nCapilares tem como principal função realizar a troca de substâncias entre o sangue e o líquido intersticial. Em razão disso, esses vasos de paredes finas são conhecidos como vasos de troca. Esses vasos são os menores em diâmetro e tamanho, mas são mais numerosos, tendo então maior área de secção transversa total, onde o fluxo sanguíneo tem menor velocidade. Capilares forma a microcirculação, que com função de distribuição final de sangue arterial nos tecidos e o recolhimento inicial de sangue venoso.\n\nVeias têm a túnica média muito mais fina do que nas artérias e a túnica externa mais espessa em relação às outras túnicas, além de terem maior diâmetro em relação à artéria que a acompanha.",
deep:"🎯 CLASSIFICAÇÃO HISTOLÓGICA DOS VASOS — 3 TIPOS PRINCIPAIS\nCada tipo tem estrutura otimizada para sua função: artérias distribuem sob pressão, capilares trocam, veias retornam.\n\n🔴 ARTÉRIAS — 2 SUBTIPOS\n\n🟡 ARTÉRIAS ELÁSTICAS (de grande calibre)\n• Ex: aorta, tronco pulmonar, carótidas comuns\n• TÚNICA MÉDIA: abundante em FIBRAS ELÁSTICAS (lâminas elásticas fenestradas)\n• Amortecem a ejeção ventricular (efeito Windkessel)\n• Expandem na sístole, retraem na diástole (mantêm fluxo contínuo)\n\n🟠 ARTÉRIAS MUSCULARES (de médio e pequeno calibre)\n• Ex: radial, femoral, artérias cerebrais\n• TÚNICA MÉDIA: abundante em MÚSCULO LISO (até 40 camadas)\n• CONTROLAM O FLUXO para órgãos específicos (vasoconstrição/vasodilatação)\n• Lâmina elástica interna proeminente\n\n🔴 ARTERÍOLAS — \"VASOS DE RESISTÊNCIA\"\n• Último nível antes dos capilares\n• Diâmetro < 0,1 mm\n• 1-2 camadas de músculo liso\n• PRINCIPAIS DETERMINANTES DA RVP\n• Pequenas alterações no raio → grandes alterações na resistência (R ∝ 1/r⁴)\n\n🟢 CAPILARES — \"VASOS DE TROCA\"\n• Diâmetro: 7-10 µm (só uma hemácia passa de cada vez)\n• Parede: APENAS ENDOTÉLIO + lâmina basal (sem músculo)\n• ÁREA DE SECÇÃO TRANSVERSA TOTAL = MAIOR do circuito\n• VELOCIDADE do sangue = MENOR\n• 3 tipos: contínuos (músculo, cérebro-BHE), fenestrados (rim, intestino), descontínuos/sinusoidais (fígado, baço)\n\n🔵 VEIAS\n• Túnica média FINA\n• Túnica adventícia ESPESSA (maior camada)\n• LÚMEN GRANDE (capacitância)\n• Pressão BAIXA (0-10 mmHg)\n• VÁLVULAS nas veias dos MMII (impedem refluxo)\n• Forma colapsável\n• Reservam ~60-70% do volume sanguíneo total\n\n📊 ÁREA × VELOCIDADE × PRESSÃO\n\n┌─────────────┬────────┬───────────┬─────────┐\n│ Vaso        │ Área   │ Velocidade│ Pressão │\n├─────────────┼────────┼───────────┼─────────┤\n│ Aorta       │ menor  │ MÁXIMA    │ alta    │\n│ Capilares   │ MÁXIMA │ menor     │ baixa   │\n│ Veias cavas │ média  │ intermed. │ baixa   │\n└─────────────┴────────┴───────────┴─────────┘\n\n→ Velocidade INVERSAMENTE proporcional à área total\n→ Capilares = máxima área = mínima velocidade = permite troca eficiente\n\n🔬 ANÁLISE DAS AFIRMATIVAS — O QUE SE REFERE A ARTÉRIAS?\n\n✅ I — \"fibras elásticas em túnica média\" = ARTÉRIA (elástica)\n❌ II — \"alta permeabilidade, função de troca\" = CAPILAR\n❌ III — \"túnica externa mais espessa, maior lúmen\" = VEIA\n❌ IV — \"menor velocidade, maior área transversa\" = CAPILAR\n✅ V — \"túnica média espessa com músculo liso, controle do fluxo\" = ARTÉRIA (muscular/arteríola)\n❌ VI — \"distribuição final arterial + recolhimento inicial venoso\" = CAPILAR\n\n➡️ I e V referem-se a ARTÉRIAS (Alt. B)\n\n💡 MACETE\n'ARTÉRIA elástica = AMORTECE (aorta) | ARTÉRIA muscular = CONTROLA (distribuição)'\n'ARTERÍOLA = RESISTÊNCIA | CAPILAR = TROCA | VEIA = CAPACITÂNCIA'"

context:"Durante um estudo sobre os diferentes tipos de tecidos musculares, um grupo de pesquisadores deparou-se com um desafio intrigante. Estavam investigando as características histológicas do tecido muscular cardíaco em comparação com outros tipos de músculos. Ao analisar as amostras sob o microscópio, observaram padrões distintos nas estruturas das células musculares e começaram a ponderar sobre suas funções. Nesse contexto, ao comparar a histologia do tecido muscular cardíaco com outros tipos de músculos, marque a alternativa correta.",
contextHTML:null,
