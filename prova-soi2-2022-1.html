<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2022.1 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:16px;letter-spacing:.05em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-aviso{display:flex;align-items:center;gap:8px;font-size:11px;color:#FAAD3F;font-weight:600;margin-bottom:8px;padding:5px 10px;background:rgba(186,113,0,0.1);border-radius:6px;border:1px solid rgba(186,113,0,0.2);}
.sticky-aviso svg{flex-shrink:0;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
.qp.disc{background:rgba(155,0,232,0.15);border-color:rgba(155,0,232,0.4);color:#D4A8FF;}

.main{max-width:820px;margin:0 auto;padding:180px 32px 80px;}

.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-tag-disc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:rgba(155,0,232,0.15);color:#D4A8FF;border:1px solid rgba(155,0,232,0.3);margin-left:4px;}
.q-body{padding:28px;}
.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-img{width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;}

.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}
.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}
.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}
.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}
.opt-elim-btn svg{pointer-events:none;}

/* Discursiva */
.disc-area{width:100%;min-height:120px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;font-size:14px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;resize:vertical;line-height:1.7;transition:border-color .2s;}
.disc-area:focus{outline:none;border-color:rgba(155,0,232,0.4);}
.disc-area[disabled]{opacity:0.6;cursor:default;}
.disc-label{font-size:12px;color:var(--muted);margin-bottom:8px;}

.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-disc{background:rgba(155,0,232,0.07);border-color:rgba(155,0,232,0.25);color:#E8D8FF;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-exp{display:block;margin-bottom:14px;line-height:1.8;}

.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.35);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-aprofundar:hover{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}

.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.07),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:14px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}
.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-content{padding:18px;font-size:14px;line-height:1.9;color:#E8D8FF;white-space:pre-line;}

.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}

.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:400px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}

.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:180px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width .8s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-bar-fill.purple{background:linear-gradient(90deg,#9B00E8,#D4A8FF);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}
.tema-pct.red{color:#F09595;}
.tema-pct.purple{color:#D4A8FF;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}
.dot-err{background:#E24B4A;}
.dot-disc{background:#D4A8FF;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){
  nav,.sticky-bar{padding-left:16px;padding-right:16px;}
  .main{padding:150px 14px 60px;}
  .q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}
  .q-feedback,.ai-box{margin-left:16px;margin-right:16px;}
  .q-text{font-size:15px;}
  .q-opt{font-size:14px;padding:12px 14px;}
  .insight-grid{grid-template-columns:1fr;}
  .tema-name{min-width:110px;font-size:12px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h4l2-4h8l2 4h4L12 2zm0 5l3 6H9l3-6z"/></svg></div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <a href="simulados2.html" class="back-btn">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar aos simulados
  </a>
</nav>

<div class="sticky-bar">
  <div class="sticky-inner">
    <div class="sticky-aviso">
      <svg width="13" height="13" fill="none" stroke="#FAAD3F" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      <span>PDF incompleto — algumas questões da prova original podem estar ausentes.</span>
    </div>
    <div class="sticky-top">
      <span class="sticky-title">N1 SOI II · 2022.1 &nbsp;·&nbsp; Prova e Gabarito</span>
      <button class="btn-reset" onclick="resetAll()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Resetar lista
      </button>
    </div>
    <div class="q-pills" id="qPills"></div>
  </div>
</div>

<div class="main">
  <div class="result-screen" id="resultScreen">
    <div class="res-card">
      <div class="res-ring" id="resRing">0%</div>
      <h2 id="resTitle">Resultado</h2>
      <p id="resSub"></p>
      <div class="res-stats">
        <div class="res-stat"><div class="v" id="resOk" style="color:#5DCAA5;">0</div><div class="l">MC corretas</div></div>
        <div class="res-stat"><div class="v" id="resErr" style="color:#F09595;">0</div><div class="l">MC erradas</div></div>
        <div class="res-stat"><div class="v" id="resDisc" style="color:#D4A8FF;">0</div><div class="l">Discursivas</div></div>
      </div>
      <button class="btn-retry" onclick="resetAll()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Tentar novamente
      </button>
    </div>
    <div class="report-card">
      <h3>
        <svg width="18" height="18" fill="none" stroke="#D4A8FF" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>
        Relatório de desempenho
      </h3>
      <div id="reportContent"></div>
    </div>
  </div>

  <div class="q-card" id="qCard">
    <div class="q-card-header">
      <span class="q-tag" id="qTagNum">Questão 1</span>
      <span class="q-tag-sep">·</span>
      <span class="q-tag-tema" id="qTagTema"></span>
      <span class="q-tag-disc" id="qTagDisc" style="display:none;">Discursiva</span>
    </div>
    <div class="q-body">
      <div class="q-context" id="qContext"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="q-feedback" id="qFeedback"></div>
    <div class="ai-box" id="aiBox" style="display:none;">
      <div class="ai-box-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#D4A8FF" stroke-width="2.5"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="m9 12 2 2 4-4"/></svg>
        <span>Aprofundamento — SOI II</span>
      </div>
      <div class="ai-content" id="aiContent"></div>
    </div>
    <div class="q-nav-bar">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Anterior
      </button>
      <span class="q-counter">Questão <strong id="qCounterNum">1</strong> de <strong id="qCounterTotal">6</strong></span>
      <div class="nav-right">
        <button class="btn-respond" id="btnRespond" onclick="submitAnswer()">Responder</button>
        <button class="btn-next" id="btnNext" onclick="nextQ()">
          Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

<script>
var QS = [
  {n:1,tema:"Sist. Nervoso Autônomo",tipo:"mc",
   context:"Homem, 55 anos, foi diagnosticado com lesão do nervo vago após apresentar disfonia (dificuldade para falar e rouquidão), afonia (perda da voz), disfagia (dificuldade para deglutir), queda do palato mole do lado afetado e desvio da úvula para o lado oposto à lesão, ausência de reflexo do vômito e estridor respiratório.\n\nSobre esse caso, são feitas as seguintes afirmações:\n\nI. Esse nervo está incluído na porção craniana do sistema nervoso autônomo parassimpático e, dentre os nervos cranianos, é o que possui maior área de inervação, chegando às cavidades torácica e abdominal.\n\nII. Ao contrário das fibras ganglionares do sistema nervoso simpático, o sistema parassimpático, que está associado ao nervo lesado, apresenta fibras pré-ganglionares curtas e pós-ganglionares longas.\n\nIII. A transmissão adrenérgica desse paciente vai ficar comprometida em consequência da lesão sofrida pelo paciente.\n\nIV. Na transmissão do impulso nervoso de uma fibra a outra, o principal neurotransmissor do nervo lesionado é a acetilcolina.",
   text:"É correto o que se afirma em:",
   opts:["I, II e III, apenas.","I e IV, apenas.","III e IV, apenas.","I e II, apenas."],
   g:1},
  {n:2,tema:"Reflexos Espinais",tipo:"mc",
   context:"Analise a figura a seguir:\n\n[[IMG_Q2]]\n\nNorris, TL (2021). Porth - Fisiopatologia (10ª edição). Grupo GEN.\n\nCom base na figura, analise as assertivas I e II:\n\nI. Na figura é demonstrado o reflexo de estiramento e os elementos essenciais para um arco reflexo espinal.\n\nII. É um reflexo ativado por um estímulo nociceptivo e envolve um neurônio sensorial, um centro de integração e um efetor. Além do mais, trata-se de um reflexo ipsolateral, no qual os impulsos aferentes e eferentes se propagam no mesmo lado da medula espinal.",
   text:"A respeito dessas assertivas, assinale a alternativa correta:",
   opts:["I é uma proposição falsa, e a II é uma proposição verdadeira.","I é uma proposição verdadeira, e a II é uma proposição falsa.","I e II são proposições falsas.","I e II são proposições verdadeiras."],
   g:0},
  {n:3,tema:"Tecido Ósseo e Reparo",tipo:"mc",
   context:"Jogador de futebol, 22 anos, foi levado ao serviço de atendimento médico após grave pancada na perna durante um jogo. Foi realizado exame físico, sendo encaminhado para o hospital mais próximo, por possível perda da continuidade óssea provocada por traumatismo da tíbia. No hospital, a suspeita foi confirmada após análise de imagem, o que preocupou o atleta, pois ele não sabia quanto tempo teria que ficar fora dos gramados até se recuperar da lesão.\n\nConsiderando o caso, analise as assertivas a seguir:\n\nI. No caso da lesão do jogador, seu reparo envolve formação de um hematoma seguido da formação de calo fibrocartilaginoso e calo ósseo com posterior remodelação óssea.\n\nII. O processo de reparo desta lesão se inicia com a proliferação de osteócitos remanescentes, formando um colar ósseo em torno da fratura.\n\nIII. O tecido primário (imaturo ou não lamelar) é o primeiro tecido ósseo que se forma neste processo de reparo. É temporário e se dispõe irregularmente, sem orientação. Posteriormente, é substituído por tecido secundário.",
   text:"Estão corretas as assertivas:",
   opts:["I, II e III, apenas.","II e III, apenas.","I e II, apenas.","I e III, apenas."],
   g:3},
  {n:4,tema:"Desenvolvimento do SN",tipo:"mc",
   context:"O sistema nervoso começa a se formar no embrião com o desenvolvimento do tubo neural. A parede dessa estrutura é responsável por originar todas as estruturas do sistema nervoso central, enquanto as cavidades correspondentes a essas estruturas derivam da luz do tubo.\n\nSobre os componentes do sistema nervoso e seu desenvolvimento, analise as assertivas a seguir:\n\nI. Na substância cinzenta da medula espinal, posicionada internamente, é possível distinguir os cornos anteriores sensitivos e os cornos posteriores motores. No centro da substância cinzenta localiza-se o canal central da medula, resquício da luz do tubo neural do embrião.\n\nII. A porção anterior do tubo neural desenvolve dilações denominadas vesículas encefálicas, responsáveis por formar o encéfalo. Caso não ocorra o fechamento dessa porção durante a neurulação, pode ser observada uma malformação grave, incompatível com a vida, denominada anencefalia.\n\nIII. O cerebelo, maior estrutura encefálica, localizado posteriormente ao tronco encefálico e logo abaixo do telencéfalo, estabelece associação com todas as regiões do sistema nervoso central e contém aproximadamente metade dos neurônios de todo o encéfalo.\n\nIV. O sistema nervoso periférico apresenta muitas estruturas derivadas das cristas neurais, sendo formado por dois elementos principais: os gânglios, agregados de corpos celulares de neurônios, e os nervos, conjuntos de axônios envolvidos por tecido conjuntivo.",
   text:"É correto o que se afirma em:",
   opts:["III e IV, apenas.","II e IV, apenas.","I e II, apenas.","I, III e IV, apenas."],
   g:1},
  {n:5,tema:"Fisiologia Muscular",tipo:"disc",
   context:"A imagem a seguir evidencia os eventos do potencial de ação muscular na junção neuromuscular:\n\n[[IMG_Q5]]\n\nFonte: TORTORA, 2019.\n\nCom base nessa imagem, e na progressão do mecanismo da excitação muscular, explique os processos e os componentes envolvidos, tendo como base as etapas 1, 2, 3, 4, e 5.\n\nPontuação total 1,5 pontos (0,3 por item: 1, 2, 3, 4, 5).",
   text:"Escreva sua resposta para as etapas do processo:",
   resposta:"A junção neuromuscular (JNM) é a sinapse entre um axônio de um neurônio motor e uma fibra muscular esquelética. A JNM inclui:\n\n1. Terminações axônicas — chegada do potencial de ação ao terminal do neurônio motor.\n2. Canais de cálcio — abertura dos canais de Ca²⁺ dependentes de voltagem, permitindo entrada de cálcio.\n3. Vesículas sinápticas com acetilcolina (ACh) — o cálcio promove a fusão das vesículas e liberação de ACh na fenda sináptica.\n4. Canais de sódio na placa motora — a ACh liga-se aos receptores, abrindo canais de Na⁺ e gerando o potencial de ação muscular.\n5. Deslizamento dos filamentos — a fibra muscular despolarizada aproxima as linhas Z, deslizando os filamentos de actina sobre os de miosina, resultando na contração."},
  {n:6,tema:"Via Auditiva",tipo:"mc",
   context:"A audição é um sentido complexo que envolve várias transduções para o sinal sonoro em potencial de ação e, assim, enviá-lo até o córtex cerebral. Algumas etapas da via de sinalização auditiva estão representadas na figura a seguir:\n\n[[IMG_Q6]]\n\nCom base na figura, sobre a via de sinalização auditiva, analise as assertivas a seguir:\n\nI. A estrutura 1 é a célula pilosa, um receptor não neural, que devido a movimentação do líquido coclear, gera sinal elétrico que excita os neurônios do ramo coclear do VIII nervo craniano, representado em 2.\n\nII. A estrutura 4 representa os ramos vestibulococleares do VIII nervo craniano que conduz o sinal das células pilosas até núcleos bulbares (estrutura 5) e o sinal é direcionado ao córtex auditivo (estrutura 6).\n\nIII. A estrutura 6 representa os núcleos do tálamo, que recebem as aferências provenientes do tronco encefálico e enviam o sinal até o córtex auditivo, representado em 7.\n\nIV. A estrutura 1 é o mecanorreceptor neural, localizado na orelha média, cuja ativação ocorre pela movimentação do líquido coclear que excitar os neurônios do ramo vestibular do VIII nervo craniano, representado em 4.\n\nV. A estrutura 4 representa os ramos cocleares do VIII nervo craniano, que conduz o sinal das células pilosas até o tronco encefálico (estrutura 5) e o sinal é direcionado ao tálamo (estrutura 6) e depois ao córtex (estrutura 7).",
   text:"Estão corretas as assertivas:",
   opts:["I, II e III, apenas.","II, III e IV, apenas.","I e IV, apenas.","III e V, apenas.","I e V, apenas."],
   g:4}
];

var SHORT = [
  "O nervo vago faz parte do sistema nervoso parassimpático e possui ampla inervação torácica e abdominal, sendo a afirmativa I verdadeira. Além disso, seu principal neurotransmissor é a acetilcolina, tornando a afirmativa IV correta. Já a afirmativa II está errada porque o parassimpático possui fibras pré-ganglionares longas e pós-ganglionares curtas, e a III está incorreta porque não há comprometimento adrenérgico, mas sim colinérgico.",
  "A afirmativa I está incorreta porque a figura representa um reflexo de retirada, e não um reflexo de estiramento. A afirmativa II está correta ao descrever um reflexo nociceptivo, ipsilateral e com arco reflexo completo.",
  "Estão corretas as afirmativas I e III. O reparo ósseo ocorre com formação de hematoma, seguido de calo fibrocartilaginoso e calo ósseo, e o tecido primário é formado primeiro e depois substituído por tecido secundário. A afirmativa II está incorreta, pois descreve ossificação intramembranosa e não o reparo endocondral típico.",
  "As afirmativas corretas são II e IV. A II descreve corretamente as vesículas encefálicas e a anencefalia. A IV define corretamente o sistema nervoso periférico. A I inverte os cornos (anterior = motor, posterior = sensitivo) e a III erra ao dizer que o cerebelo é a maior estrutura encefálica (é o telencéfalo).",
  null,
  "A via auditiva começa nas células ciliadas da cóclea (receptores não neurais) que ativam o ramo coclear do VIII nervo craniano. O sinal segue para o tronco encefálico, depois para o tálamo e finalmente para o córtex auditivo. As afirmativas I e V descrevem corretamente esse trajeto."
];

var DEEP = [
  "O nervo vago é o principal representante da porção craniana do sistema nervoso parassimpático, destacando-se por sua extensa área de atuação, que inclui órgãos torácicos e abdominais. Essa característica torna a afirmativa I correta.\n\nEm relação à fisiologia autonômica, o sistema parassimpático apresenta fibras pré-ganglionares longas e pós-ganglionares curtas, o oposto do sistema simpático, o que torna a afirmativa II incorreta.\n\nA afirmativa III também está errada, pois a lesão do nervo vago compromete a transmissão colinérgica, e não a adrenérgica, já que o parassimpático utiliza acetilcolina como principal neurotransmissor. Isso é reforçado pela afirmativa IV, que está correta.\n\n⚠️ Esse tipo de questão explora a comparação entre simpático e parassimpático — é essencial dominar essas diferenças para evitar confusão.",
  "O reflexo de retirada é um mecanismo protetor ativado por estímulos nociceptivos, promovendo a retirada rápida do membro afetado. Ele envolve um neurônio sensorial, um centro integrador na medula espinhal e um neurônio motor, caracterizando um arco reflexo completo. Além disso, é ipsilateral, pois a resposta ocorre no mesmo lado do estímulo.\n\nA afirmativa I está incorreta porque descreve o reflexo de estiramento, que possui características diferentes, como resposta monossináptica.\n\nA afirmativa II está correta ao identificar corretamente o tipo de reflexo e seus componentes.\n\n⚠️ Pegadinha clássica: confundir reflexo de retirada com reflexo de estiramento. O de estiramento é monossináptico e envolve fusos musculares; o de retirada é polissináptico e envolve receptores de dor.",
  "O processo de reparo ósseo após fratura segue etapas bem definidas: formação de hematoma, desenvolvimento de calo fibrocartilaginoso, formação de calo ósseo e posterior remodelação. Esse processo envolve tanto ossificação endocondral quanto intramembranosa.\n\nA afirmativa I está correta ao descrever essa sequência. A afirmativa III também está correta ao explicar que o tecido ósseo primário (imaturo) é formado inicialmente, com disposição irregular, sendo posteriormente substituído por tecido secundário (lamelar).\n\nJá a afirmativa II está incorreta, pois descreve um processo mais relacionado à ossificação intramembranosa e não ao reparo típico de fraturas longas.\n\n⚠️ Distinção histológica frequentemente cobrada: tecido primário = irregular e temporário; tecido secundário = lamelar e definitivo.",
  "O sistema nervoso origina-se do tubo neural, cuja porção anterior forma o encéfalo por meio das vesículas encefálicas. A falha no fechamento dessa região leva à anencefalia, uma condição grave e incompatível com a vida, tornando a afirmativa II correta.\n\nA afirmativa IV também está correta ao descrever o sistema nervoso periférico como formado por nervos e gânglios, muitos derivados das cristas neurais.\n\nJá a afirmativa I está incorreta porque inverte as funções dos cornos da medula: o anterior é MOTOR e o posterior é SENSITIVO.\n\nA afirmativa III erra ao afirmar que o cerebelo é a maior estrutura encefálica — na verdade é o telencéfalo. O cerebelo é a segunda maior.\n\n⚠️ Pegadinhas clássicas: inversão de cornos medulares e tamanho relativo das estruturas encefálicas.",
  "A junção neuromuscular é a sinapse entre o neurônio motor e a fibra muscular esquelética. O processo inicia-se com a chegada do potencial de ação ao terminal axônico (etapa 1), promovendo a abertura de canais de cálcio e entrada desse íon (etapa 2).\n\nIsso desencadeia a liberação de acetilcolina nas vesículas sinápticas (etapa 3), que difunde pela fenda sináptica e se liga aos receptores na placa motora.\n\nEssa ligação gera despolarização da membrana muscular por abertura de canais de sódio (etapa 4), iniciando o potencial de ação muscular.\n\nEsse sinal se propaga pela fibra, resultando no encurtamento do sarcômero pelo deslizamento dos filamentos de actina sobre a miosina (etapa 5).\n\n⚠️ Esse mecanismo integra eventos elétricos e mecânicos, sendo fundamental para a contração muscular. A sequência Ca²⁺ → ACh → Na⁺ → contração é a base do acoplamento excitação-contração.",
  "A audição é um processo que envolve múltiplas etapas de transdução e condução neural.\n\nAs células ciliadas da cóclea são mecanorreceptores não neurais que transformam vibrações do líquido coclear em sinais elétricos, ativando neurônios do ramo coclear do nervo vestibulococlear (VIII), o que torna a afirmativa I correta.\n\nA partir daí, o sinal segue para os núcleos cocleares no tronco encefálico, depois ascende por vias auditivas até o tálamo (corpo geniculado medial) e finalmente alcança o córtex auditivo. A afirmativa V descreve corretamente essa sequência.\n\n❌ Erros das outras alternativas:\n• II erra ao dizer que o sinal vai direto ao córtex (pula o tálamo)\n• III erra ao confundir a numeração das estruturas\n• IV erra ao chamar de receptor neural e localizar na orelha média\n\n⚠️ A sequência correta da via: cóclea → nervo coclear → tronco encefálico → tálamo → córtex auditivo."
];

var L = ['a','b','c','d','e'];
var cur = 0, sel = null, answered = {}, discAnswered = {}, eliminated = {};

function buildPills(){
  var w = document.getElementById('qPills'); w.innerHTML = '';
  for(var i=0;i<QS.length;i++){
    var b = document.createElement('button');
    b.className='qp'; b.id='qp'+i; b.textContent=i+1;
    (function(idx){ b.onclick = function(){ goTo(idx); }; })(i);
    w.appendChild(b);
  }
}
function syncPills(){
  for(var i=0;i<QS.length;i++){
    var p=document.getElementById('qp'+i); if(!p) continue;
    p.className='qp';
    if(i===cur) p.classList.add('current');
    var q=QS[i];
    if(q.tipo==='disc'){
      if(discAnswered[i]) p.classList.add('disc');
    } else {
      if(answered[i]!==undefined) p.classList.add(answered[i]===q.g?'correct':'wrong');
    }
  }
}

function renderQ(){
  var q=QS[cur];
  sel=(answered[cur]!==undefined)?answered[cur]:null;
  var done = q.tipo==='disc' ? !!discAnswered[cur] : answered[cur]!==undefined;

  document.getElementById('qTagNum').textContent='Questão '+q.n;
  document.getElementById('qTagTema').textContent=q.tema;
  document.getElementById('qCounterNum').textContent=q.n;

  var discTag = document.getElementById('qTagDisc');
  discTag.style.display = q.tipo==='disc' ? 'inline-flex' : 'none';

  /* Context — plain text with inline image placeholders */
  var ctx=document.getElementById('qContext');
  if(q.context){
    ctx.style.display='block';
    var ctxHtml = q.context.replace(/\n/g,'<br>');
    
    /* Image replacements */
    ctxHtml = ctxHtml.replace('[[IMG_Q2]]', '<img src="image_6db46e.jpg" alt="Arco Reflexo Espinal" style="max-width:100%; border-radius:8px; display:block; margin:16px auto; border:1px solid rgba(255,255,255,0.1);">');
    ctxHtml = ctxHtml.replace('[[IMG_Q5]]', '<img src="image_6dacea.jpg" alt="Junção Neuromuscular" style="max-width:100%; border-radius:8px; display:block; margin:16px auto 8px; border:1px solid rgba(255,255,255,0.1);"><img src="image_6e21c7.png" alt="Detalhe Numérico JNM" style="max-width:100%; border-radius:8px; display:block; margin:8px auto 16px; border:1px solid rgba(255,255,255,0.1);">');
    ctxHtml = ctxHtml.replace('[[IMG_Q6]]', '<img src="image_6da67d.png" alt="Órgão de Corti" style="max-width:100%; border-radius:8px; display:block; margin:16px auto 8px; border:1px solid rgba(255,255,255,0.1);"><img src="image_6da944.jpg" alt="Via Auditiva" style="max-width:100%; border-radius:8px; display:block; margin:8px auto 16px; border:1px solid rgba(255,255,255,0.1);">');
    
    ctx.innerHTML = ctxHtml;
  } else {
    ctx.style.display='none';
  }

  document.getElementById('qText').innerHTML = q.text ? q.text.replace(/\n/g,'<br>') : '';

  /* Options */
  var wrap=document.getElementById('qOpts'); wrap.innerHTML='';
  if(q.tipo==='disc'){
    var ta=document.createElement('textarea');
    ta.className='disc-area'; ta.id='discInput';
    ta.placeholder='Escreva sua resposta aqui...';
    ta.rows=6;
    if(done){ ta.disabled=true; ta.value=discAnswered[cur]||''; }
    wrap.innerHTML='<p class="disc-label">Questão discursiva — escreva sua resposta antes de ver o gabarito</p>';
    wrap.appendChild(ta);
  } else {
    q.opts.forEach(function(o,i){
      var btn=document.createElement('button'); btn.className='q-opt';
      var isElim = !done && eliminated[cur] && eliminated[cur].has(i);
      if(done){
        btn.setAttribute('disabled','');
        if(i===q.g) btn.classList.add('correct');
        else if(i===sel&&i!==q.g) btn.classList.add('wrong');
      } else if(sel===i){
        btn.classList.add('selected');
      }
      if(isElim) btn.classList.add('eliminated');

      btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span>'
        +'<button class="opt-elim-btn" title="Eliminar alternativa" data-idx="'+i+'">'
        +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        +'</button>';

      if(!done){
        (function(idx){
          btn.onclick=function(e){
            if(e.target.closest('.opt-elim-btn')) return;
            if(eliminated[cur] && eliminated[cur].has(idx)) return;
            selectOpt(idx);
          };
          var elimBtn=btn.querySelector('.opt-elim-btn');
          elimBtn.onclick=function(e){
            e.stopPropagation();
            if(!eliminated[cur]) eliminated[cur]=new Set();
            if(eliminated[cur].has(idx)){
              eliminated[cur].delete(idx);
              btn.classList.remove('eliminated');
            } else {
              eliminated[cur].add(idx);
              btn.classList.add('eliminated');
              if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}
            }
          };
        })(i);
      } else {
        btn.querySelector('.opt-elim-btn').style.display='none';
      }
      wrap.appendChild(btn);
    });
  }

  /* Feedback */
  var fb=document.getElementById('qFeedback');
  var aiBox=document.getElementById('aiBox');
  if(done){
    if(q.tipo==='disc'){
      fb.className='q-feedback show fb-disc';
      fb.innerHTML='<span class="fb-label">📋 Gabarito comentado</span>'
        +'<span class="fb-exp">'+q.resposta.replace(/\n/g,'<br>')+'</span>'
        +'<button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    } else {
      var ok=sel===q.g;
      fb.className='q-feedback show '+(ok?'fb-ok':'fb-err');
      fb.innerHTML='<span class="fb-label">'+(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase())+'</span>'
        +'<span class="fb-exp">'+SHORT[cur]+'</span>'
        +'<button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    }
    aiBox.style.display='none';
    aiBox.classList.remove('open');
    document.getElementById('aiContent').textContent='';
  } else {
    fb.className='q-feedback'; fb.innerHTML='';
    aiBox.style.display='none'; aiBox.classList.remove('open');
  }

  /* Nav */
  document.getElementById('btnPrev').disabled=(cur===0);
  var btnN=document.getElementById('btnNext');
  if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
  else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}

  var btnR=document.getElementById('btnRespond');
  if(done){btnR.style.display='none';}
  else{
    btnR.style.display='flex';
    if(q.tipo==='disc') btnR.disabled=false;
    else btnR.disabled=(sel===null);
  }
  syncPills();
}

function toggleAI(qIdx){
  var aiBox=document.getElementById('aiBox');
  var btnAI=document.getElementById('btnAI');
  if(aiBox.classList.contains('open')){
    aiBox.classList.remove('open');
    if(btnAI) btnAI.classList.remove('active');
  } else {
    document.getElementById('aiContent').textContent=DEEP[qIdx];
    aiBox.style.display='block';
    aiBox.classList.add('open');
    if(btnAI) btnAI.classList.add('active');
  }
}

function selectOpt(i){
  if(answered[cur]!==undefined) return;
  sel=i; document.getElementById('btnRespond').disabled=false;
  var opts=document.querySelectorAll('.q-opt');
  opts.forEach(function(o,idx){
    o.className='q-opt'+(idx===i?' selected':'');
    if(eliminated[cur] && eliminated[cur].has(idx)) o.classList.add('eliminated');
    if(!o.classList.contains('selected')){
      (function(ii){
        o.onclick=function(e){
          if(e.target.closest('.opt-elim-btn')) return;
          if(eliminated[cur] && eliminated[cur].has(ii)) return;
          selectOpt(ii);
        };
      })(idx);
    }
  });
}

function submitAnswer(){
  var q=QS[cur];
  if(q.tipo==='disc'){
    var ta=document.getElementById('discInput');
    var val=ta?ta.value.trim():'';
    discAnswered[cur]=val||'(sem resposta)';
  } else {
    if(sel===null||answered[cur]!==undefined) return;
    answered[cur]=sel;
  }
  renderQ();
}

function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function showResult(){
  document.getElementById('qCard').style.display='none';
  var rs=document.getElementById('resultScreen'); rs.classList.add('show');
  var mcQs=QS.filter(function(q){return q.tipo==='mc';});
  var correct=0, wrong=0;
  QS.forEach(function(q,i){
    if(q.tipo!=='mc') return;
    if(answered[i]===q.g) correct++;
    else if(answered[i]!==undefined) wrong++;
  });
  var discCount=Object.keys(discAnswered).length;
  var pct=mcQs.length>0?Math.round((correct/mcQs.length)*100):0;
  var ring=document.getElementById('resRing');
  ring.textContent=pct+'%';
  ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');
  document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';
  document.getElementById('resSub').textContent='Você acertou '+correct+' de '+mcQs.length+' questões de múltipla escolha ('+pct+'%)';
  document.getElementById('resOk').textContent=correct;
  document.getElementById('resErr').textContent=wrong;
  document.getElementById('resDisc').textContent=discCount;
  buildReport(correct,wrong);
  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildReport(correct,wrong){
  var temaStats={};
  QS.forEach(function(q,i){
    if(!temaStats[q.tema]) temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};
    var t=temaStats[q.tema]; t.total++;
    if(q.tipo==='disc'){t.disc++;}
    else if(answered[i]===q.g){t.correct++;}
    else if(answered[i]!==undefined){t.wrong++;}
  });
  var sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});
  var barsHtml='';
  sorted.forEach(function(tema){
    var s=temaStats[tema];
    if(s.disc===s.total){
      barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span>'
        +'<div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div>'
        +'<span class="tema-pct purple">Disc.</span></div>';
    } else {
      var pct=(s.total-s.disc)>0?Math.round((s.correct/(s.total-s.disc))*100):0;
      var good=pct>=50;
      barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span>'
        +'<div class="tema-bar-bg"><div class="tema-bar-fill '+(good?'green':'red')+'" style="width:'+pct+'%"></div></div>'
        +'<span class="tema-pct '+(good?'green':'red')+'">'+pct+'%</span></div>';
    }
  });
  var worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||sorted[0]||'—';
  var mcCount=QS.filter(function(q){return q.tipo==='mc';}).length;
  var pct=mcCount>0?Math.round((correct/mcCount)*100):0;
  var msg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise antes da prova.';

  var reviewHtml='';
  QS.forEach(function(q,i){
    if(q.tipo==='mc'&&answered[i]!==undefined&&answered[i]!==q.g){
      reviewHtml+='<div class="q-rev-row" onclick="goToQ('+i+')">'
        +'<div class="rev-dot dot-err"></div>'
        +'<span>Q'+q.n+' — '+q.tema+'</span>'
        +'<small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';
    }
    if(q.tipo==='disc'&&discAnswered[i]){
      reviewHtml+='<div class="q-rev-row" onclick="goToQ('+i+')">'
        +'<div class="rev-dot dot-disc"></div>'
        +'<span>Q'+q.n+' — '+q.tema+'</span>'
        +'<small>Discursiva — revisar gabarito</small></div>';
    }
  });
  if(!reviewHtml) reviewHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro nas múltipla escolha! 🎉</div>';

  document.getElementById('reportContent').innerHTML=
    '<div class="report-section"><h4>Desempenho por tema</h4>'+barsHtml+'</div>'
    +'<div class="report-section"><h4>Insights</h4><div class="insight-grid">'
      +'<div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Mais erros nesse tema</div></div>'
      +'<div class="insight-box"><div class="ib-label">MC acertadas</div><div class="ib-val">'+correct+'/'+mcCount+'</div><div class="ib-sub">'+msg+'</div></div>'
      +'<div class="insight-box"><div class="ib-label">MC erradas</div><div class="ib-val" style="color:#F09595;">'+wrong+'</div><div class="ib-sub">Múltipla escolha</div></div>'
      +'<div class="insight-box"><div class="ib-label">Discursivas</div><div class="ib-val" style="color:#D4A8FF;">'+Object.keys(discAnswered).length+'</div><div class="ib-sub">Questões abertas</div></div>'
    +'</div></div>'
    +'<div class="report-section"><h4>Revisão por questão</h4><div class="q-review-list">'+reviewHtml+'</div></div>';
}

function goToQ(i){
  document.getElementById('qCard').style.display='block';
  document.getElementById('resultScreen').classList.remove('show');
  cur=i; renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}
function resetAll(){
  answered={}; discAnswered={}; sel=null; cur=0; eliminated={};
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('qCard').style.display='block';
  renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}
buildPills(); renderQ();
</script>
</body>
