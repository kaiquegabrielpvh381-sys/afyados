<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2025.2 | Afyados</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-header-left{display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}
.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}
.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}
.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}
.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}
.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}
.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}
textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}
textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}
.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>

      </button>
    </div>
    <div class="report-card">
      <h3>
        <svg width="18" height="18" fill="none" stroke="#D4A8FF" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>

<script>
const QS=[{n:1,disc:false,tema:"Fisiologia Muscular",src:"UNIREDENTOR",context:"(UNIREDENTOR) Um paciente é admitido no pronto-socorro com um quadro de rigidez muscular generalizada, contrações involuntárias persistentes (espasmos) e febre elevada (hipertermia), apesar de ter tido uma resposta inicial normal à estimulação nervosa voluntária. A equipe médica suspeita de uma intoxicação por uma substância que interfere no mecanismo de acoplamento excitação-contração no músculo esquelético, atuando especificamente na liberação descontrolada de cálcio pelo retículo sarcoplasmático.",assertions:null,text:"Avalie qual dos seguintes mecanismos de ação da substância tóxica seria o mais provável para explicar o quadro clínico de rigidez muscular.",opts:["Inibição das bombas de Ca²⁺-ATPase (SERCA) no retículo sarcoplasmático.","Ativação persistente ou falha no fechamento dos canais de rianodina (RyR1).","Bloqueio irreversível dos receptores nicotínicos na junção neuromuscular.","Aumento significativo da atividade da acetilcolinesterase na fenda sináptica."],g:1,exp:"A ativação persistente dos canais RyR1 libera Ca²⁺ descontroladamente do RS para o citosol, mantendo a troponina ligada ao cálcio e provocando contração muscular sustentada e rigidez. Este mecanismo é similar à hipertermia maligna.",deep:"O acoplamento excitação-contração no músculo esquelético envolve: potencial de ação → sarcolema → túbulos T → interação mecânica entre receptores DHP (di-hidropiridina) e canais RyR1 (rianodina) no retículo sarcoplasmático → liberação de Ca²⁺. Com os canais RyR1 persistentemente abertos, o Ca²⁺ citosólico permanece elevado, mantendo a troponina ligada ao cálcio e os sítios de ligação da miosina expostos na actina, gerando ciclos contínuos de pontes cruzadas.\n\nEsse mecanismo é similar à hipertermia maligna, causada por anestésicos halogenados em indivíduos geneticamente predispostos (mutação no gene RYR1). Tratamento: dantroleno (bloqueia RyR1).\n\n❌ A: SERCA impediria a recaptação, mas não explicaria \"liberação descontrolada\".\n❌ C: Bloqueio nicotínico → paralisia flácida, não rigidez.\n❌ D: Aumento da AChE → menos ACh → fraqueza muscular."},{n:2,disc:false,tema:"Neuroanatomia — Diencéfalo",src:"UNIDOMPEDRO",context:"(UNIDOMPEDRO) Um estudante de medicina analisa uma imagem esquemática do encéfalo e nota que o diencéfalo contém diversas estruturas associadas a funções essenciais, como a regulação da temperatura corporal, controle hormonal, comportamento emocional e integração sensorial.",assertions:null,text:"Com base nas funções descritas, qual a alternativa que associa corretamente as estruturas diencefálicas às suas respectivas funções?",opts:["O tálamo é responsável pela regulação da homeostase e controle do sistema endócrino, enquanto o hipotálamo atua como centro de retransmissão sensorial.","O tálamo atua como estação de retransmissão sensorial ao córtex cerebral, enquanto o hipotálamo regula funções autônomas e endócrinas.","O epitálamo é responsável pelo controle da temperatura corporal e regulação hormonal, enquanto o subtálamo atua como principal estação de retransmissão sensorial.","O subtálamo é o principal centro integrador de emoções, enquanto o epitálamo regula o ciclo sono-vigília e a pressão arterial."],g:1,exp:"O tálamo é a principal estação de retransmissão sensorial (exceto olfato) para o córtex cerebral. O hipotálamo regula funções autônomas e endócrinas, incluindo temperatura, fome, sede e controle da hipófise.",deep:"O tálamo recebe praticamente todas as aferências sensoriais (exceto olfato) e as retransmite ao córtex. O hipotálamo é o principal integrador das funções autônomas e endócrinas: termorregulação, osmolalidade, fome/saciedade, ritmo circadiano, e controle da hipófise.\n\n❌ A: Inverte as funções tálamo/hipotálamo.\n❌ C: Epitálamo → glândula pineal e ritmos circadianos; subtálamo → controle motor.\n❌ D: Subtálamo → motor, não emoções; epitálamo não regula pressão arterial."},{n:3,disc:false,tema:"Vias Sensitivas",src:"UNIGRANRIO Caxias",context:"(UNIGRANRIO Caxias) As vias sensitivas são cadeias neuronais que unem receptores ao córtex, e ao chegarem ao cérebro, permitem a percepção da sensibilidade.",assertions:null,text:"Sobre as vias sensitivas, marque a alternativa correta.",opts:["A via formada pelo trato tecto-espinal controla a orientação sensório-motora da cabeça, modulando a orientação do corpo a partir de estímulos visuais.","A via espino-reticular conduz informações sensoriais relacionadas ao tato discriminativo e propriocepção consciente diretamente ao córtex somatossensorial.","A via espino-reticular conecta a medula espinhal à formação reticular do tronco encefálico, conduzindo estímulos de dor crônica e do estado de vigília e atenção.","A via da pressão e do tato protopático é constituída pelo trato espinotalâmico lateral que se une ao trato espinotalâmico anterior para formar o lemnisco espinhal."],g:2,exp:"A via espino-reticular é parte do sistema anterolateral, conduzindo informações de dor crônica e difusa até a formação reticular do tronco encefálico, que modula vigília e atenção via SARA.",deep:"A via espino-reticular conecta o corno posterior da medula à formação reticular. O SARA (sistema ativador reticular ascendente) modula o nível de consciência e integra a resposta emocional à dor crônica.\n\n❌ A: Trato tecto-espinal é uma via MOTORA, não sensitiva.\n❌ B: Tato discriminativo → via coluna dorsal-lemnisco medial.\n❌ D: A alternativa inverte — o trato espinotalâmico ANTERIOR (tato protopático) une-se ao LATERAL (dor/temperatura)."},{n:4,disc:false,tema:"Embriologia/Histologia — Meninges",src:"AFYA Garanhuns",context:"(AFYA Garanhuns) Durante uma aula prática no laboratório de Histologia e Embriologia, o tutor apresenta o caso de um recém-nascido diagnosticado com meningocele. Por meio do caso, o tutor propõe a discussão para revisar a histologia e o desenvolvimento embrionário das meninges.",assertions:null,text:"Com base nos seus conhecimentos, analise as alternativas abaixo e assinale a correta:",opts:["A aracnoide possui grande quantidade de vasos sanguíneos e é a principal responsável por nutrir o sistema nervoso central, deriva do mesênquima.","A dura-máter é a camada mais interna das meninges, em contato direto com os prolongamentos dos astrócitos, isolando o tecido nervoso, e deriva do mesênquima.","A pia-máter é ricamente vascularizada, adere ao tecido nervoso e tem origem embrionária comum com a aracnoide derivada da leptomeninge, a partir da crista neural.","As vilosidades aracnoides são projeções da membrana aracnoide que participam da produção do líquor e possuem origem embrionária das cristas neurais."],g:2,exp:"A pia-máter é vascularizada, adere ao tecido nervoso e, junto com a aracnoide, forma as leptomeninges, derivadas da crista neural.",deep:"Paquimeninge (dura-máter) → derivada do mesênquima/mesoderma.\nLeptomeninges (aracnoide + pia-máter) → derivadas da crista neural.\n\n❌ A: Aracnoide é AVASCULAR.\n❌ B: Dura-máter é a camada mais EXTERNA.\n❌ D: Vilosidades aracnoides ABSORVEM o LCR, não produzem."},{n:5,disc:false,tema:"Tronco Encefálico",src:"AFYA Paraíba",context:"(AFYA Paraíba) Sabe-se que o tronco encefálico é responsável por funções vitais como a regulação da respiração, controle cardiovascular, além de abrigar núcleos de nervos cranianos.",assertions:null,text:"Com base em seus componentes, assinale a alternativa correta.",opts:["No bulbo encontram-se os núcleos dos nervos cranianos III e IV, além de neurônios noradrenérgicos que participam do controle do ciclo do sono/vigília.","No tecto do mesencéfalo, encontram-se os colículos superiores e inferiores, estruturas relacionadas respectivamente com reflexos visuais e auditivos.","Os pedúnculos cerebrais são a base do mesencéfalo, por lá passam as fibras do trato córtico-espinal e lá ocorre o cruzamento da maioria dessas fibras.","A ponte possui apenas fibras verticais e exerce função exclusiva de conexão entre os hemisférios cerebrais graças aos pedúnculos cerebelares."],g:1,exp:"No tecto do mesencéfalo estão os colículos superiores (reflexos visuais) e inferiores (reflexos auditivos). NC III e IV estão no mesencéfalo, não no bulbo. A decussação das pirâmides ocorre no bulbo.",deep:"MESENCÉFALO: tecto (colículos superiores e inferiores), tegmento (substância negra, núcleo rubro, NC III e IV) e base (pedúnculos cerebrais).\n\n❌ A: NC III e IV estão no MESENCÉFALO. Locus ceruleus (noradrenalina) está na PONTE.\n❌ C: Cruzamento das fibras ocorre na DECUSSAÇÃO DAS PIRÂMIDES (bulbo).\n❌ D: Ponte tem fibras TRANSVERSAIS que unem tronco ao CEREBELO."},{n:6,disc:false,tema:"Histologia — Fibras Musculares",src:"UNIPTAN",context:"(UNIPTAN) Em um estudo sobre adaptações musculares, foram analisadas amostras de tecido muscular esquelético de dois atletas de elite: um maratonista e um velocista.",assertions:null,text:"Com base nas características histológicas e funcionais das fibras musculares esqueléticas, marque a alternativa que associa corretamente o tipo de fibra predominante em cada atleta.",opts:["O maratonista apresenta fibras do tipo I, que são claras, com metabolismo anaeróbico e baixa resistência à fadiga; o velocista apresenta fibras do tipo II, que são escuras, com metabolismo aeróbico e contração lenta.","O maratonista apresenta predominância de fibras do tipo I, que são escuras, com metabolismo aeróbico e alta resistência à fadiga; o velocista apresenta fibras do tipo II, que são claras, com metabolismo anaeróbico e contração rápida.","O maratonista apresenta predominância de fibras do tipo II, que são claras, com metabolismo anaeróbico e contração rápida; o velocista apresenta fibras do tipo I, que são escuras, com metabolismo aeróbico e contração lenta.","O maratonista apresenta predominância de fibras do tipo II, que são escuras, com metabolismo aeróbico e contração lenta; o velocista apresenta fibras do tipo I, que são claras, com metabolismo anaeróbico e contração rápida."],g:1,exp:"Fibras tipo I (maratonistas): escuras (alta mioglobina), aeróbicas, resistentes à fadiga, contração lenta. Fibras tipo II (velocistas): claras, anaeróbicas, contração rápida, fadiga precoce.",deep:"Tipo I: alta mioglobina (escuras), muitas mitocôndrias, metabolismo oxidativo, contrações lentas e sustentadas.\nTipo II (IIb/IIx): pouca mioglobina (claras), glicólise anaeróbica, contrações rápidas e potentes, fadiga precoce.\n\nAs demais alternativas invertem atleta/fibra ou trocam as características."},{n:7,disc:false,tema:"Fisiologia — Olfação",src:"FACIMPA",context:"(FACIMPA) A percepção dos odores ocorre por meio de receptores especializados que convertem sinais químicos em impulsos elétricos.",assertions:null,text:"Analise as afirmativas e assinale a que explica os mecanismos de transdução do estímulo olfatório que se integram às vias centrais, modulando respostas emocionais e alimentares.",opts:["A detecção do odor ocorre por meio de mecanorreceptores localizados no epitélio mucoso da cavidade nasal, que desencadeiam potenciais graduados transmitidos ao córtex motor.","O odorante interage com receptores acoplados à proteína G, promovendo a formação de AMPc e a abertura de canais iônicos, originando potenciais de ação que alcançam o bulbo olfatório e, em seguida, áreas límbicas ligadas à regulação afetiva e alimentar.","A molécula odorífera é reconhecida por receptores associados ao retículo endoplasmático, ativando o influxo de cálcio, gerando potenciais de ação que seguem aos tratos da eminência mediana.","O estímulo odorífero atua sobre canais de potássio, provocando hiperpolarização da membrana, sendo o sinal transmitido ao tálamo e posteriormente conduzido à amígdala."],g:1,exp:"Odorantes → receptores acoplados à proteína G → AMPc → canais catiônicos → despolarização → potencial de ação → bulbo olfatório → áreas límbicas. A via olfatória não passa obrigatoriamente pelo tálamo.",deep:"Transdução olfatória: odorante → Golfα → adenilato ciclase III → AMPc → canais CNG → Na⁺ e Ca²⁺ → despolarização. Ca²⁺ ativa canais de Cl⁻, amplificando a despolarização. Axônios cruzam a placa cribriforme → glomérulos do bulbo olfatório → córtex piriforme e amígdala SEM relé talâmico obrigatório.\n\n❌ A: São QUIMIORRECEPTORES. Destino não é córtex motor.\n❌ C: Não há receptores olfatórios no RE. Eminência mediana é neuroendócrina.\n❌ D: Mecanismo envolve DESPOLARIZAÇÃO, não hiperpolarização."},{n:8,disc:false,tema:"Ritmo Circadiano",src:"AFYA Manacapuru",context:"(AFYA Manacapuru) João, um estudante universitário, tem um ciclo de sono-vigília bem regulado. Ele percebe que a exposição à luz solar logo ao acordar o ajuda a se sentir mais alerta. Esse processo depende da ação de uma estrutura cerebral que recebe diretamente informações luminosas da retina.",assertions:null,text:"Com base nesse contexto, a estrutura responsável é o:",opts:["Corpo pineal do epitálamo no diencéfalo.","Núcleo supraquiasmático do hipotálamo no diencéfalo.","Núcleo arqueado do tálamo no diencéfalo.","Colículo inferior do mesencéfalo no tronco encefálico."],g:1,exp:"O núcleo supraquiasmático (NSQ) do hipotálamo é o principal marca-passo circadiano, recebendo aferências diretas da retina pelo trato retino-hipotalâmico.",deep:"O NSQ localiza-se acima do quiasma óptico e recebe input direto de ipRGCs (melanopsina) via trato retino-hipotalâmico. Sincroniza genes Per, Cry, Clock, Bmal1 com o ciclo claro-escuro. Projeta para núcleo paraventricular → gânglio cervical superior → glândula pineal → melatonina.\n\n❌ A: Corpo pineal produz melatonina, mas não recebe luz diretamente.\n❌ C: Núcleo arqueado regula hormônios e fome.\n❌ D: Colículo inferior é auditivo."},{n:9,disc:false,tema:"Reflexo Fotomotor",src:"UNIGRANRIO Caxias",context:"(UNIGRANRIO Caxias) Durante a aula prática de SOI, foram utilizadas lanternas clínicas e a luz foi aplicada sobre os olhos de uma determinada acadêmica, com o objetivo de observar o reflexo fotomotor.\n\nAnalise as asserções:\nI - A miose ocorre por ação do nervo oculomotor (terceiro par craniano).\nII - O neurotransmissor que causa a miose é a noradrenalina.\nIII - A miose ocorre por ação do sistema parassimpático sobre o músculo circular (esfincteriano) da íris.",assertions:null,text:"Marque a alternativa que contenha todas as afirmações corretas.",opts:["Apenas a afirmativa II está correta.","Apenas as afirmativas II e III estão corretas.","Apenas as afirmativas I e III estão corretas.","Apenas as afirmativas I e II estão corretas."],g:2,exp:"I e III estão corretas. A miose é mediada pelo parassimpático via nervo oculomotor (III), que inerva o músculo esfíncter da íris. Noradrenalina (II) é simpática e causa midríase.",deep:"Reflexo fotomotor: luz → retina → nervo óptico (II) → núcleo pré-tectal → Edinger-Westphal → oculomotor (III) → gânglio ciliar → músculo esfíncter → miose. Neurotransmissor: ACETILCOLINA (muscarínico).\n\n✅ I: Nervo oculomotor (III) → correto.\n❌ II: Noradrenalina → simpático → midríase.\n✅ III: Parassimpático → músculo esfíncter → miose."},{n:10,disc:false,tema:"Fisiologia — Audição",src:"FASA VIC",context:"(FASA VIC) A exposição contínua a sons de alta intensidade danifica as células ciliadas da cóclea.\n\nAvalie as asserções:\n\nI. A cóclea contém o órgão de Corti, onde as células ciliadas internas promovem a transdução das vibrações mecânicas em sinais elétricos destinados ao nervo coclear.\n\nPorque\n\nII. A via auditiva inicia-se nas células ciliadas da cóclea, que liberam neurotransmissores e geram potenciais nos neurônios auditivos de primeira ordem. Seus axônios formam a porção coclear do nervo vestibulococlear (VIII), conduzindo os sinais ao encéfalo.",assertions:null,text:"A respeito dessas asserções, assinale a opção correta.",opts:["A asserção I é uma proposição verdadeira e a II é uma proposição falsa.","A asserção I é uma proposição falsa e a II é uma proposição verdadeira.","As asserções I e II são proposições verdadeiras e a II é uma justificativa correta da I.","As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I."],g:2,exp:"Ambas verdadeiras e II justifica I. O órgão de Corti contém células ciliadas internas que fazem a transdução. Essas células liberam glutamato, gerando potenciais nos neurônios do gânglio espiral, cujos axônios formam o nervo coclear (VIII).",deep:"O órgão de Corti repousa sobre a membrana basilar. Ondas sonoras deflexionam estereocílios contra a membrana tectória → canais mecanossensíveis de K⁺ → despolarização. Células ciliadas internas (~3.500) liberam glutamato nos neurônios do gânglio espiral. Células ciliadas externas (~12.000) amplificam via proteína prestina.\n\nRelação: II descreve o mecanismo neural subsequente à transdução descrita em I."},{n:11,disc:false,tema:"Líquido Cefalorraquidiano",src:"AFYA Bragança",context:"(AFYA Bragança) O LCR é um componente vital para a homeostasia do SNC.\n\nAnalise as afirmativas:\nI. O plexo coroide é o principal sítio de produção do LCR, bombeando seletivamente solutos como sódio para o interior dos ventrículos.\nII. O LCR flui do sistema ventricular para o espaço subaracnóideo pelos recessos laterais e pelo forame de Monro.\nIII. A absorção do LCR ocorre através das granulações aracnoides.\nIV. A circulação do LCR é estática, renovada apenas uma vez por semana.",assertions:null,text:"Indique a alternativa correta.",opts:["Apenas as afirmativas I, II e IV estão corretas.","Apenas as afirmativas II e IV estão corretas.","Apenas as afirmativas I e III estão corretas.","Apenas as afirmativas I, II e III estão corretas."],g:2,exp:"I e III corretas. O plexo coroide produz LCR por secreção ativa (I). Absorção pelas granulações aracnoides (III). O forame de Monro conecta VL ao III ventrículo, não ao espaço subaracnóideo (II errada). LCR é renovado 3-4x/dia (IV errada).",deep:"Produção: plexos coroides (~500 mL/dia). Trajeto: VL → Monro → III ventrículo → Sylvius → IV ventrículo → Luschka e Magendie → espaço subaracnóideo. Volume ~150 mL, renovado 3-4x/dia. Absorção: granulações aracnóideas (de Pacchioni) nos seios venosos durais.\n\n❌ II: Monro conecta VL ao III ventrículo, não ao espaço subaracnóideo.\n❌ IV: Circulação é DINÂMICA."},{n:12,disc:false,tema:"Nervos Espinhais",src:"AFYA Itabuna",context:"(AFYA Itabuna) Os nervos espinhais conectam o sistema nervoso central a diferentes estruturas corporais.",assertions:null,text:"Em relação à sua formação e função, assinale a alternativa correta.",opts:["Os nervos espinhais não possuem gânglios associados, pois os corpos celulares dos neurônios sensitivos estão localizados na medula.","A raiz posterior contém axônios motores, a raiz anterior contém axônios sensitivos e os corpos celulares neuronais encontram-se nos gânglios espinais.","Todos os nervos espinhais emergem acima de suas vértebras correspondentes em toda a coluna vertebral.","As raízes posterior e anterior unem-se no forame intervertebral, formando nervos espinhais classificados como mistos."],g:3,exp:"As raízes posterior (sensitiva, com gânglio espinal) e anterior (motora) unem-se no forame intervertebral formando nervos mistos. C1-C7 emergem acima; a partir de T1, emergem abaixo.",deep:"31 pares (8C, 12T, 5L, 5S, 1Co). Raiz ventral: motora (corno anterior). Raiz dorsal: sensitiva (gânglio espinal com neurônios pseudounipolares). C1-C7 acima; C8 entre C7/T1; a partir de T1, abaixo.\n\n❌ A: Gânglios espinais existem na raiz dorsal.\n❌ B: Inverte as funções das raízes.\n❌ C: Apenas C1-C7 emergem acima."},{n:13,disc:false,tema:"Córtex Motor — AVC",src:"AFYA Itacoatira",context:"(AFYA Itacoatira) Um paciente sofreu um AVC que afetou o giro pré-central do hemisfério esquerdo.",assertions:null,text:"Com base no texto e em seus conhecimentos, marque a alternativa correta.",opts:["Pelo local da lesão, o paciente teve prejuízos cognitivos e comportamentais.","Pelo local da lesão, a perda de sensibilidade do lado esquerdo pode ter sido uma consequência.","Pelo local da lesão, a hemiplegia do lado direito do corpo pode ter sido uma consequência.","Pelo local da lesão, o paciente perdeu os movimentos do lado esquerdo."],g:2,exp:"O giro pré-central abriga a área motora primária, que controla movimentos voluntários do lado contralateral. Lesão no hemisfério esquerdo causa hemiplegia do lado DIREITO.",deep:"Giro pré-central (área 4 de Brodmann) = área motora primária, organizada somatotopicamente (homúnculo motor). Fibras descem pelo trato córtico-espinal, cruzam na decussação das pirâmides (bulbo) e inervam motoneurônios contralaterais.\n\n❌ A: Cognitivo/comportamental → córtex pré-frontal.\n❌ B: Sensibilidade → giro PÓS-central.\n❌ D: Lado esquerdo → lesão no hemisfério DIREITO."},{n:14,disc:true,tema:"Neurotransmissão Sináptica",src:"IESVAP",context:"(IESVAP) Durante uma aula de Fisiologia, os estudantes discutem o mecanismo de neurotransmissão sináptica em neurônios do sistema nervoso central.",assertions:null,text:"Explique a fisiologia da neurotransmissão sináptica, abordando o papel dos neurotransmissores excitatórios, inibitórios e moduladores e o mecanismo básico de liberação e ação dos neurotransmissores na fenda sináptica.",opts:[],g:null,exp:"Resposta esperada:\n\n• Excitatórios (glutamato): despolarização pós-sináptica, aumentando a probabilidade de PA.\n• Inibitórios (GABA): hiperpolarização, reduzindo excitabilidade.\n• Moduladores (dopamina, serotonina): ajustam intensidade/duração sem despolarização direta.\n\nMecanismo: impulso → canais de Ca²⁺ → exocitose → receptores pós-sinápticos → alteração da permeabilidade iônica → PPSE ou PPSI.",deep:"Sinapse química: PA → canais Ca²⁺ (N e P/Q) → fusão via SNARE (sinaptobrevina, SNAP-25, sintaxina) → exocitose → fenda sináptica → receptores.\n\nGlutamato (NMDA, AMPA, kainato) = PPSE.\nGABA (GABA-A → Cl⁻; GABA-B → K⁺) = PPSI.\nModuladores (dopamina D1-D5; serotonina 5-HT1-7) alteram sensibilidade sem gerar PA diretamente.\n\nIntegração = somação temporal e espacial no cone de implantação."},{n:15,disc:true,tema:"Crescimento Ósseo",src:"FMIT",context:"(FMIT) Durante a infância e a adolescência, o crescimento ósseo ocorre de forma contínua e coordenada.",assertions:null,text:"a) Descreva a função da cartilagem epifisária (placa de crescimento) no alongamento dos ossos longos. (1,25 pontos)\n\nb) Explique os principais eventos celulares envolvidos no processo de ossificação endocondral durante o crescimento ósseo. (1,25 pontos)",opts:[],g:null,exp:"a) A placa epifisária é cartilagem hialina entre epífise e diáfise. Responsável pelo crescimento em comprimento pela proliferação de condrócitos que sofrem hipertrofia e são substituídos por tecido ósseo.\n\nb) Proliferação de condrócitos em colunas → hipertrofia e apoptose → calcificação da matriz → invasão vascular → osteoblastos e osteoclastos → deposição de matriz óssea substituindo a cartilagem.",deep:"Ossificação endocondral — zonas na placa epifisária:\n1) Zona de repouso (reserva de condrócitos)\n2) Zona de proliferação (divisão mitótica em colunas)\n3) Zona de hipertrofia (colágeno X e VEGF)\n4) Zona de calcificação (mineralização, apoptose)\n5) Zona de ossificação (invasão vascular, osteoblastos depositam osteoide → trabéculas ósseas)\n\nGH estimula via IGF-1 hepático. Estrogênios fecham a placa ao final da puberdade."}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
