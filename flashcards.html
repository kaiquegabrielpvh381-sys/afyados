<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Flashcards | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.main{max-width:820px;margin:0 auto;padding:80px 32px 60px;}
.page-title{font-family:'Playfair Display',serif;font-weight:900;font-size:28px;margin-bottom:6px;}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:32px;}

.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.deck-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.deck-card:hover{border-color:rgba(214,0,110,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.deck-card.locked{opacity:0.6;cursor:not-allowed;}
.deck-card.locked:hover{transform:none;border-color:var(--border);}

.deck-type{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pink);margin-bottom:12px;}
.deck-name{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;margin-bottom:6px;color:#F4EFFA;}
.deck-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.deck-stats{display:flex;gap:12px;margin-bottom:16px;}
.deck-stat{font-size:12px;color:var(--light);font-weight:600;}
.deck-stat span{color:var(--muted);font-weight:400;}

.deck-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;}
.deck-tag{font-size:10px;padding:3px 8px;border-radius:100px;background:rgba(214,0,110,0.08);color:var(--pink-light);font-weight:600;}

.deck-card .deck-btn{margin-top:auto;}
.deck-btn.primary{background:var(--pink);color:#fff;box-shadow:0 4px 16px var(--pink-glow);}
.deck-btn.primary:hover{background:var(--pink-bright);}
.deck-btn.locked-btn{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;}

.lock-badge{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
.error-msg{text-align:center;padding:40px 20px;color:#E24B4A;font-size:14px;}

@media(max-width:640px){nav{padding:0 16px;}.main{padding:72px 16px 40px;}.deck-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABCGlDQ1BJQ0MgUHJvZmlsZQAAeJxjYGA8wQAELAYMDLl5JUVB7k4KEZFRCuwPGBiBEAwSk4sLGHADoKpv1yBqL+viUYcLcKakFicD6Q9ArFIEtBxopAiQLZIOYWuA2EkQtg2IXV5SUAJkB4DYRSFBzkB2CpCtkY7ETkJiJxcUgdT3ANk2uTmlyQh3M/Ck5oUGA2kOIJZhKGYIYnBncAL5H6IkfxEDg8VXBgbmCQixpJkMDNtbGRgkbiHEVBYwMPC3MDBsO48QQ4RJQWJRIliIBYiZ0tIYGD4tZ2DgjWRgEL7AwMAVDQsIHG5TALvNnSEfCNMZchhSgSKeDHkMyQx6QJYRgwGDIYMZAKbWPz9HbOBQAAABZklEQVR4nO2ayRaCMAxFg///z3UVDw5I08zw7sqNtHm5hUolAgAAAAC4KVvEIGOMsfK9bdvc5/fwHkDDanASQgLQdNI7hNIGMJ4hhAUQsZ5XaGEAkZ8FoQFUtKCNAUQ+FoQHUM2CVgYQ2VuQEkAlC9oZQGRrgVkA0klVscAkgIg9u9eYpkugowXqADK6bzm2+U0wM5AVVAFYFKtdBto5uDwGoy3QjLccgGWRmTdDt41QFwuWAvAoLssCcQCS4jtYUOq3QIYFogA6POOlc3Q3oPr2eDqADt1nJHMNuQdUtmAqgE7dZ2bnXOopsCfKgtMAOnafmZl76cPR9OPxzt1nzmpwN0DbRW8LDgO4QveZf7W4GmDVPYvrHIXwM4Ardf+MrwCsirdeu14WlN0IRfEWQNXuW173s0YYwB+qd9/y+vtaYQBRn+5bjsM1396AV5JaCzLe6LqeDksKyjrUqPD/AgAAAAD05QmqJdARPLlg+gAAAABJRU5ErkJggg==" style="width:26px;height:26px;object-fit:contain;"></div>
    <span class="logo-name">AFYADOS</span>
  </a>

<div class="main">
  <h1 class="page-title">Flashcards</h1>
  <p class="page-sub">Estude com repetição espaçada — algoritmo FSRS-5</p>

  <div id="content">
    <div class="loading" id="loading">Carregando decks...</div>
  </div>
</div>

<script>
var API_BASE = "https://afyados-backend.onrender.com";

// Get token from Supabase Auth (stored in localStorage by login page)
function getToken() {
  try {
    var raw = localStorage.getItem("sb-mmqfqlbojsbuuodfbilh-auth-token");
    if (raw) {
      var parsed = JSON.parse(raw);
      return parsed.access_token || null;
    }
  } catch(e) {}
  return null;
}

async function loadDecks() {
  var token = getToken();
  if (!token) {
    document.getElementById("content").innerHTML = '<div class="error-msg">Faça login para acessar os flashcards.</div>';
    return;
  }

  try {
    var res = await fetch(API_BASE + "/api/decks", {
      headers: { "Authorization": "Bearer " + token }
    });

    if (res.status === 401) {
      document.getElementById("content").innerHTML = '<div class="error-msg">Sessão expirada. Faça login novamente.</div>';
      return;
    }

    var decks = await res.json();
    renderDecks(decks);
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="error-msg">Erro ao carregar decks. Tente novamente.</div>';
  }
}

function renderDecks(decks) {
  if (!decks || decks.length === 0) {
    document.getElementById("content").innerHTML = '<div class="loading">Nenhum deck disponível.</div>';
    return;
  }

  var html = '<div class="deck-grid">';

  for (var i = 0; i < decks.length; i++) {
    var d = decks[i];
    var locked = !d.has_access;
    var typeLabel = d.type === "io" ? "Image Occlusion" : "Flashcards";
    var tags = d.tag_list || [];
    var maxTags = 5;

    html += '<div class="deck-card' + (locked ? ' locked' : '') + '"' + (!locked ? ' onclick="openDeck(\'' + d.id + '\')"' : '') + '>';

    if (locked) {
      html += '<div class="lock-badge">🔒 ' + (d.product || 'clube') + '</div>';
    }

    html += '<div class="deck-type">' + typeLabel + '</div>';
    html += '<div class="deck-name">' + d.name + '</div>';
    html += '<div class="deck-desc">' + (d.description || '') + '</div>';
    html += '<div class="deck-stats">';
    html += '<div class="deck-stat">' + d.card_count + ' <span>cards</span></div>';
    html += '<div class="deck-stat">' + tags.length + ' <span>temas</span></div>';
    html += '</div>';

    if (tags.length > 0) {
      html += '<div class="deck-tags">';
      for (var j = 0; j < Math.min(tags.length, maxTags); j++) {
        html += '<span class="deck-tag">' + tags[j] + '</span>';
      }
      if (tags.length > maxTags) {
        html += '<span class="deck-tag">+' + (tags.length - maxTags) + '</span>';
      }
      html += '</div>';
    }

    if (!locked) {
      html += '<button class="deck-btn primary">Estudar <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>';
    } else {
      html += '<button class="deck-btn locked-btn">Assinar para acessar</button>';
    }

    html += '</div>';
  }

  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

function openDeck(deckId) {
  window.location.href = "flashcard-viewer.html?deck=" + deckId;
}

loadDecks();
</script>

</body>
</html>
