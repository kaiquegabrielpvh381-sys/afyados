<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[
{n:1,disc:true,tema:"Marchas Patológicas e Coordenação",context:"(FMIT) Um paciente, de 58 anos, procura atendimento médico devido a dificuldades para caminhar e episódios frequentes de desequilíbrio. Ao exame físico, nota-se instabilidade ao ficar em pé com os pés juntos e dificuldade em realizar movimentos coordenados dos membros superiores e inferiores. Para uma avaliação mais detalhada, são realizados testes específicos para equilíbrio e coordenação.",assertions:null,text:"Explique as principais características das marchas patológicas e descreva como são realizadas as provas de equilíbrio (Romberg e Romberg sensibilizado) e as provas de coordenação (dedo-nariz, calcanhar-joelho e movimentos alternados).",opts:[],g:null,
exp:"Marchas Patológicas (Valor: 1,25)\nAs marchas patológicas apresentam padrões distintos dependendo da disfunção neurológica ou musculoesquelética envolvida. As principais incluem:\nMarcha atáxica: passos irregulares e instáveis, comuns em lesões cerebelares e distúrbios proprioceptivos.\nMarcha parkinsoniana: pequenos passos arrastados, com tronco inclinado para frente e redução do balanço dos braços, típica da Doença de Parkinson.\nMarcha espástica: perna estendida e arrastada em movimento circular (circundução), associada a lesões do trato corticoespinhal.\nMarcha escarvante: o paciente levanta excessivamente o pé para evitar arrastá-lo, comum em neuropatia periférica do nervo fibular.\nMarcha anserina: passos bamboleantes devido à fraqueza da musculatura proximal, típica de miopatias.\nProvas de Equilíbrio (Valor: 0,5)\nRomberg: o paciente é instruído a ficar em pé com os pés juntos e os olhos fechados. A perda do equilíbrio sugere disfunção da propriocepção ou do sistema vestibular.\nRomberg sensibilizado: semelhante ao teste de Romberg, mas realizado com um pé à frente do outro, aumentando a sensibilidade para detecção de instabilidades sutis.\nProvas de Coordenação (Valor: 0,75)\nDedo-nariz: o paciente toca alternadamente o próprio nariz e o dedo do examinador. A presença de dismetria ou tremor indica comprometimento cerebelar.\nCalcanhar-joelho: o paciente desliza o calcanhar de um pé ao longo da canela da perna oposta. Movimentos imprecisos ou oscilantes sugerem ataxia cerebelar.\nMovimentos alternados (diadococinesia): o paciente realiza movimentos alternados rápidos das mãos. Dificuldade na execução pode indicar disfunção cerebelar ou comprometimento do sistema motor.",
deep:"🚶 MARCHAS PATOLÓGICAS — PADRÃO POR TIPO\n\nAtáxica → base alargada, passos irregulares\n   Causa: lesão cerebelar ou perda de propriocepção\n\nParkinsoniana → festinante, arrastada, sem balanço de braços\n   Causa: degeneração da via nigroestriatal (dopamina ↓)\n\nEspástica (hemiplégica) → circundução do MI, postura de Wernicke-Mann\n   Causa: lesão NMS (AVC, lesão medular alta)\n\nEscarvante (steppage) → levanta o pé excessivamente\n   Causa: lesão do nervo fibular (L4-L5), pé caído\n\nAnserina → bamboleio pélvico bilateral\n   Causa: fraqueza muscular proximal (miopatias)\n\n⚖️ PROVAS DE EQUILÍBRIO:\n\nRomberg simples:\n   Pés juntos, braços ao lado, olhos abertos → fechar os olhos\n   Positivo: oscila ou cai ao fechar os olhos\n   Avalia: propriocepção e sistema vestibular\n\nRomberg sensibilizado (tandem):\n   Um pé à frente do outro (posição de andar na corda)\n   Mais sensível para alterações sutis\n\n🎯 PROVAS DE COORDENAÇÃO:\n\nDedo-nariz:\n   Tocar nariz → dedo do examinador, alternadamente\n   Dismetria (erra o alvo) + tremor intencional → cerebelar\n\nCalcanhar-joelho:\n   Deslizar calcanhar ao longo da canela oposta\n   Movimentos imprecisos → ataxia cerebelar\n\nDiadococinesia (movimentos alternados):\n   Pronação/supinação rápida das mãos\n   Disdiadococinesia → lesão cerebelar"},

{n:2,disc:false,tema:"Reflexos — NMS vs NMI",context:"(FMIT) Durante o exame neurológico de um paciente de 56 anos com fraqueza progressiva nos membros inferiores, você realiza a avaliação dos reflexos profundos. Ao percutir o tendão patelar, observa uma resposta exacerbada, com contração intensa do quadríceps. O reflexo do tendão de Aquiles também está aumentado, enquanto o reflexo bicipital encontra-se normal.",assertions:null,text:"Com base nos achados do exame físico, qual é a principal interpretação clínica dos reflexos observados nesse paciente?",opts:["A resposta aumentada dos reflexos sugere uma disfunção do neurônio motor inferior, resultando em aumento da resposta muscular pela hiperatividade do arco reflexo.","A hiperreflexia patelar e do tendão de Aquiles sugerem uma lesão do neurônio motor superior, caracterizada por aumento da atividade reflexa devido à perda da inibição descendente.","A hiperreflexia observada é um achado normal e não tem correlação clínica relevante, pois a intensidade do reflexo pode variar entre os indivíduos.","A presença de hiperreflexia em membros inferiores e reflexo bicipital normal sugere uma neuropatia periférica, indicando um acometimento dos nervos periféricos."],g:1,
exp:"A hiperreflexia patelar e do tendão de Aquiles sugerem uma lesão do neurônio motor superior, caracterizada por aumento da atividade reflexa devido à perda da inibição descendente.\nComentário: Correto. A hiperreflexia é um sinal característico de lesão do neurônio motor superior, frequentemente associada a patologias como esclerose lateral amiotrófica, acidente vascular cerebral e lesões medulares.\nA presença de hiperreflexia em membros inferiores e reflexo bicipital normal sugere uma neuropatia periférica, indicando um acometimento dos nervos periféricos.\nComentário: Incorreto. As neuropatias periféricas geralmente causam hiporreflexia ou arreflexia devido ao comprometimento da transmissão do impulso nervoso nos nervos periféricos.\nA resposta aumentada dos reflexos sugere uma disfunção do neurônio motor inferior, resultando em aumento da resposta muscular pela hiperatividade do arco reflexo.\nComentário: Incorreto. Lesões do neurônio motor inferior resultam em hiporreflexia ou arreflexia, e não em hiperreflexia, pois comprometem a transmissão do impulso motor ao músculo.\nA hiperreflexia observada é um achado normal e não tem correlação clínica relevante, pois a intensidade do reflexo pode variar entre indivíduos.\nComentário: Incorreto. Embora haja variação individual na resposta reflexa, reflexos exagerados são indicativos de disfunção neurológica, especialmente quando associados a outros achados clínicos.",
deep:"⚡ NMS vs NMI — DIFERENCIAÇÃO PELOS REFLEXOS\n\nNeurônio Motor Superior (NMS) → LESÃO ACIMA do corno anterior\n   Achados: hiperreflexia, espasticidade, clônus, Babinski +\n   Sem atrofia significativa\n   Causas: AVC, esclerose múltipla, lesão medular, ELA\n\nNeurônio Motor Inferior (NMI) → LESÃO NO corno anterior ou nervo\n   Achados: hiporreflexia/arreflexia, flacidez, atrofia, fasciculações\n   Causas: neuropatia periférica, poliomielite, Guillain-Barré\n\nNo caso: hiperreflexia patelar + aquileu, bicipital normal\n   Sugere lesão entre C6 e L2 (medula torácica)\n   A inibição descendente está ausente → arco reflexo desfreado\n\n❌ A: NMI causa HIPO, não hiperreflexia\n❌ C: Hiperreflexia nunca é achado normal\n❌ D: Neuropatia periférica causa arreflexia"},

{n:3,disc:false,tema:"Nervos Cranianos V e VII",context:"(AFYA PALMAS) No ambulatório de neurologia, um estudante de Medicina do segundo período é solicitado a avaliar um paciente que se queixa de formigamento na face e dificuldade ocasional para fechar completamente o olho direito. O médico supervisor suspeita de uma possível alteração nos nervos cranianos e pede para o estudante realizar o exame físico neurológico focado no nervo trigêmeo (V par craniano) e no nervo facial (VII par craniano).",assertions:null,text:"Como o estudante deve proceder corretamente para avaliar a função desses dois nervos neste paciente?",opts:["Trigêmino: solicitar que o paciente morda um depressor lingual para testar a função motora. Facial: verificar a produção de lágrimas.","Trigêmeo: realizar teste auditivo sussurrando em cada ouvido do paciente. Facial: avaliar a capacidade do paciente de elevar as sobrancelhas.","Trigêmeo: testar a sensibilidade da face ao toque leve, dor e temperatura. Facial: franzir a testa, fechar os olhos com força, mostrar os dentes, sorrir e assobiar.","Trigêmino: identificar sabores em diferentes áreas da língua. Facial: avaliar a audição sussurrando monossílabas em cada orelha separadamente."],g:2,
exp:"Justificativa da correta: a opção correta indica o exame completo de ambos os nervos, incluindo testes de sensibilidade para o trigêmeo e de movimentos faciais para o nervo facial, que são essenciais para a avaliação da função destes pares cranianos.\nJustificativas das incorretas:\nMorder um depressor lingual pode ajudar na avaliação do nervo trigêmeo, mas não é o método padrão; a produção de lágrimas é mais relacionada ao nervo facial, mas não é o único aspecto a ser testado.\nTeste auditivo sussurrando é para o exame do nervo auditivo (VIII par craniano), não para o trigêmeo; a elevação das sobrancelhas é parte do exame do nervo facial, mas não a única função a ser avaliada.\nIdentificação de sabores é parte do exame dos nervos gustativos, não do trigêmeo; a audição é testada no exame do nervo auditivo (VIII par craniano), não no facial.",
deep:"🧠 NC V (TRIGÊMEO) — o que testar:\n   Sensibilidade: toque leve (algodão), dor (palito), temperatura\n   Nas 3 divisões: V1 (fronte), V2 (bochecha), V3 (mandíbula)\n   Comparar bilateralmente\n   Motor (V3): palpar masséter ao morder, desvio da mandíbula\n   Reflexo córneo-palpebral: aferência = V1\n\n😶 NC VII (FACIAL) — o que testar:\n   Franzir a testa (musculatura frontal)\n   Fechar os olhos com força\n   Mostrar os dentes / sorrir / assobiar\n   Paralisia PERIFÉRICA: toda a hemiface (inclui fronte)\n   Paralisia CENTRAL: só metade inferior (poupa fronte)\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A: Morder = V (motor), mas lágrimas = VII parassimpático; nenhum é método padrão\n   B: Sussurar ao ouvido = NC VIII (auditivo)\n   D: Sabores = NC VII/IX (gustativos); audição = NC VIII\n\nReflexo córneo-palpebral: V1 aferente → VII eferente"},

{n:4,disc:true,tema:"SBV — PCR e DEA",context:"(UNISL PORTO VELHO) Em um aeroporto movimentado, um adulto de aproximadamente 50 anos perde a consciência e cai ao solo. Ao se aproximar, você verifica que ele está inconsciente e não apresenta sinais evidentes de respiração ou pulsação. O local está equipado com um Desfibrilador Externo Automático (DEA), conforme previsto pela legislação vigente para espaços com grande circulação de pessoas.",assertions:null,text:"Com base nos protocolos do Suporte Básico de Vida (SBV), descreva de forma detalhada como reconhecer uma Parada Cardiorrespiratória (PCR) em um adulto, iniciar o atendimento utilizando a Pocket-Mask e aplicar corretamente o DEA. Inclua informações sobre a avaliação inicial, a solicitação de ajuda e as medidas que devem ser adotadas após a administração do choque, se indicado.",opts:[],g:null,
exp:"Para o correto manejo da situação descrita, o aluno deve abordar os seguintes pontos:\nReconhecimento da PCR, verificando se a vítima apresenta ausência de respiração e pulsação e avaliação da segurança do local:\nInício do Atendimento com Pocket-Mask para ventilação, posicionar a vítima em decúbito dorsal em uma superfície rígida. Iniciar compressões torácicas;\nUso do DEA, assim que o DEA estiver disponível, ligá-lo e seguir as instruções por voz, garantir que ninguém esteja tocando a vítima durante a análise de ritmo e pressionar o botão conforme orientado e imediatamente retomar as compressões torácicas.\nCuidados Pós-choque",
deep:"🫀 PCR — SEQUÊNCIA COMPLETA C-A-B-D\n\nC — Checar e Comprimir:\n   Segurar segurança da cena\n   Checar responsividade (chamar + tocar ombros)\n   Pedir ajuda + acionar SAMU + buscar DEA\n   Checar pulso carotídeo + respiração (≤ 10 seg)\n   Iniciar 30 compressões (5-6 cm, 100-120/min)\n\nA — Abertura de vias aéreas:\n   Inclinar cabeça + elevar mento\n\nB — Breathing (ventilações):\n   2 ventilações com Pocket-Mask (1 seg cada)\n   Ver expansão torácica\n   Relação 30:2\n\nD — Desfibrilação:\n   Ligar o DEA assim que chegar\n   Expor tórax, secar se necessário\n   Pás: infraclavicular D + ápice cardíaco E\n   Análise do ritmo — TODOS afastados\n   Se chocável → choque → RCP imediata\n   Se não chocável → RCP contínua\n\nPós-choque: retomar compressões sem checar pulso\nReavaliar a cada 2 min de RCP"},

{n:5,disc:false,tema:"OVACE — Lactente Não Responsivo",context:"(UNIDEP) Mãe deu entrada na unidade básica de saúde solicitando ajuda para seu bebê de 8 meses que se encontra engasgado. A criança não chora, encontra-se não responsiva e com extremidades cianóticas.",assertions:null,text:"Diante do quadro, assinale a alternativa que corresponde à conduta correta.",opts:["Solicitar ajuda, colocar o lactente sobre uma superfície firme e iniciar a ressuscitação cardiopulmonar com compressões torácicas.","Administrar cinco pancadas firmes entre as escápulas do bebê usando a base da mão, alternando com cinco compressões torácicas.","Posicionar o bebê em posição ortostática e realizar as compressões abdominais ajoelhado posteriormente ao bebê.","Por tratar-se de uma obstrução parcial, o lactente deve ser posicionado em decúbito dorsal e realizada a varredura na boca do bebê."],g:0,
exp:"Se a vítima lactente parar de responder, interrompa as pancadas nas costas e inicie a RCP com compressões torácicas. Em sequência, siga os seguintes passos:\nGrite por ajuda. Se alguém atender, peça para essa pessoa acionar o serviço médico de emergência.\nColoque o lactente em uma superfície firme e plana.\nInicie a RCP com compressões torácicas.\nO corpo estranho pode ser removido apenas em casos em que possa ser facilmente retirado e visualizado, não é recomendada varredura às cegas.",
deep:"👶 LACTENTE NÃO RESPONSIVO COM OVACE → RCP\n\nQuando o lactente perde a consciência:\n   Interromper manobras de desobstrução\n   Gritar por ajuda → acionar emergência\n   Superfície firme e plana\n   Iniciar RCP: 30 compressões + 2 ventilações\n\nA cada abertura de vias aéreas:\n   Inspecionar a boca\n   Remover objeto SOMENTE se visível e alcançável\n   NUNCA fazer varredura às cegas\n\n❌ B: Pancadas + compressões torácicas = lactente CONSCIENTE\n❌ C: Heimlich abdominal é CONTRAINDICADO em < 1 ano\n❌ D: Não é obstrução parcial — criança NÃO responsiva\n\nDiferença crucial:\n   CONSCIENTE → golpes dorsais + compressões torácicas (5:5)\n   INCONSCIENTE → RCP (30:2) + inspecionar boca a cada ciclo"},

{n:6,disc:false,tema:"SBV — PCR Adulto",context:"(AFYA GARANHUNS) Um estudante de medicina está em um ambiente público quando, de forma súbita, um homem adulto cai no chão. Ao se aproximar, percebe que ele não responde a estímulos, na palpação do pulso carotídeo também não encontra resposta positiva de presença de pulso e não observa expansão torácica ao verificar o tórax do paciente.",assertions:null,text:"Diante desse cenário, é possível identificar que:",opts:["trata-se de uma parada respiratória e, nesse caso, a conduta imediata seria: solicitar que seja acionado o serviço de emergência e iniciar imediatamente as ventilações de resgate, caso tenha disponível a pocket mask, seguindo a relação de 1 ventilação a cada 3 segundos.","trata-se de uma parada respiratória e, neste caso, a conduta imediata seria: solicitar que seja acionado o serviço de emergência e iniciar imediatamente as ventilações de resgate, caso tenha disponível a pocket mask, seguindo a relação de 1 ventilação a cada 5 a 6 segundos.","trata-se de uma PCR e a conduta imediata seria: solicitar que seja acionado o serviço de emergência e iniciar imediatamente a RCP, seguindo a relação de 15 compressões para 2 ventilações, caso tenha disponível a pocket mask.","trata-se de uma PCR e a conduta imediata seria: solicitar que seja acionado o serviço de emergência e iniciar imediatamente a RCP, seguindo a relação de 30 compressões para 2 ventilações, caso tenha disponível a pocket mask."],g:3,
exp:"Alternativa correta. De acordo com a checagem de responsividade, pulso e expansividade de tórax, estando as 03 ausentes, trata-se de uma PCR, sendo a conduta adequada, solicitar imediatamente que seja acionado o serviço de emergência e iniciar a RCP com qualidade. De acordo com o protocolo de SBV para adulto, a relação correta para compressão x ventilação é de 30 compressões para duas ventilações, contando com o uso da pocket mask para ventilação.\nAlternativas incorretas. Não se trata de uma parada respiratória e sim de uma PCR. De acordo com o protocolo de SBV para adulto, a relação correta para compressão x ventilação é de 30 compressões para duas ventilações, contando com o uso da pocket mask para ventilação.",
deep:"🔍 DIAGNÓSTICO: PCR vs PARADA RESPIRATÓRIA\n\nParada Respiratória isolada:\n   Sem respiração + COM pulso\n   Conduta: ventilações de resgate\n   1 ventilação a cada 5-6 segundos\n\nPCR: sem respiração + SEM pulso → CASO AQUI\n   Conduta: RCP completa\n   30 compressões : 2 ventilações\n\nProtocolo SBV adulto (30:2):\n   Compressões: 5-6 cm, 100-120/min\n   Retorno completo do tórax\n   Minimizar interrupções\n\n❌ A: 1 ventilação a cada 3 seg → muito rápido, e o diagnóstico está errado (é PCR)\n❌ B: Diagnóstico errado — sem pulso = PCR, não parada respiratória\n❌ C: 15:2 → RCP pediátrica com 2 socorristas, não adulto"},

{n:7,disc:false,tema:"Semiologia Neurológica — Assertivas",context:"(UNIPTAN) Durante uma aula, o professor solicita que seus alunos façam as manobras e interpretem os achados para fixação do conhecimento. Para tal atividade, tem ajuda de um ator simulando ser paciente.",assertions:"I - A postura de Wernicke Mann simulada pelo ator é descrita: nos membros inferiores, a espasticidade predomina nos músculos extensores, com extensão e rotação interna do quadril, extensão do joelho, com flexão plantar e inversão do pé.\nII - A manobra de Romberg pode ser utilizada na avaliação do nervo vestibulococlear, podendo ser positiva ou negativa.\nIII - A manobra dos braços estendidos também pode ser chamada de dedo-nariz e avalia a coordenação.\nIV - A ataxia pode ser classificada em sensorial, cerebelar ou mista.",text:"Assinale a alternativa que apresenta a ordem correta, de cima para baixo.",opts:["V - V - F - V.","F - F - F - F.","V - V - F - F.","F - V - V - F."],g:0,
exp:"A postura de Wernicke-Mann, simulada pelo ator, é descrita: nos membros inferiores, a espasticidade predomina nos músculos extensores, com extensão e rotação interna do quadril, extensão do joelho, com flexão plantar e inversão do pé, assim como no membro superior estará em flexão.\nA manobra de Romberg pode ser utilizada na avaliação do nervo vestibulococlear, podendo ser positiva ou negativa. Positiva se o paciente apresentar forte tendência à queda.\nA manobra dos braços estendidos é utilizada para verificar déficit de força. A manobra dedo-nariz é utilizada para avaliar coordenação. Em casos como lesão cerebelar, ela pode estar com decomposição do movimento, perdendo a precisão e perfeição do movimento.\nA ataxia pode ser classificada em sensorial, cerebelar ou mista. E tem causas como neuropatia por álcool ou diabetes.",
deep:"📋 ANÁLISE ASSERTIVA POR ASSERTIVA:\n\nI ✅ Verdadeiro — Wernicke-Mann:\n   MMII: extensores espásticos\n   → extensão + rotação interna do quadril\n   → extensão do joelho\n   → flexão plantar + inversão do pé\n   MMSS: flexores espásticos (cotovelo, punho, dedos fletidos)\n\nII ✅ Verdadeiro — Romberg:\n   Avalia NC VIII (vestibulococlear) E propriocepção\n   Positivo: cai ao fechar os olhos (depende da visão)\n   Negativo: mantém equilíbrio\n\nIII ❌ Falso — são manobras DIFERENTES:\n   Braços estendidos (Mingazzini): avalia déficit de FORÇA (NMS)\n   Dedo-nariz: avalia COORDENAÇÃO cerebelar\n   Não são sinônimos!\n\nIV ✅ Verdadeiro — Classificação da ataxia:\n   Sensorial: lesão dos cordões posteriores / nervos periféricos\n   Cerebelar: lesão do cerebelo\n   Mista: ambas combinadas\n   Causas: neuropatia alcoólica, diabetes, esclerose múltipla"},

{n:8,disc:false,tema:"Escala de Glasgow",context:"(IESVAP) Homem de 27 anos, vítima de acidente automobilístico, é trazido pelo SAMU à emergência de um hospital. Na avaliação inicial da escala de coma de Glasgow, o médico procedeu à verificação e não encontrou nenhum fator que interferisse na avaliação dos parâmetros, seguiu realizando a observação, não sendo detectado nenhum movimento ocular, verbal ou motor espontâneo. Pediu então que o paciente abrisse os olhos e, como não obteve resposta, procedeu à pressão no leito ungueal, observando então a abertura ocular do paciente. Seguiu então perguntando ao paciente o seu nome, onde se encontrava e que dia da semana era, obtendo do paciente algo como gemidos. Pediu ao paciente que apertasse sua mão e abrisse a boca, mas não teve resposta do paciente. Realizou uma compressão, pinça no trapézio, por 10 segundos, observando uma flexão anormal no membro superior direito e uma extensão no membro superior esquerdo. Ao colocar a luz da lanterna nas pupilas, observou que ambas eram reagentes à luz.",assertions:null,text:"Qual é a pontuação total desse paciente na escala de coma de Glasgow?",opts:["8","6","5","7"],g:3,
exp:"O caso mostra que, na avaliação da abertura ocular, essa só ocorreu com o estímulo no leito ungueal, portanto, à pressão, pontuando então 2, tem-se O2\nNa avaliação verbal, tem-se sons incompreensíveis tipo gemidos, o paciente não teve nem frases e nem palavras compreensíveis, portanto, pontuou-se 2, tem-se V2.\nNa avaliação motora, o paciente apresentou flexão anormal (indicando uma possível resposta flexora de dor) e extensão anormal no membro superior esquerdo. Esses sinais são compatíveis com uma resposta motora de decorticação e/ou decerebração, que recebe a pontuação:3, tem-se M3\nComo ambas as pupilas foram reagentes à luz, portanto normais, tem-se P0.\nAssim tem-se:\nO2\nV2\nM3\nPupila = 0\nTotal = 7",
deep:"📊 GLASGOW — CALCULANDO O CASO\n\nAbertura Ocular:\n   Espontânea=4, Ao som=3, À pressão=2 ← CASO, Ausente=1\n   → O2\n\nResposta Verbal:\n   Orientado=5, Confuso=4, Palavras=3, Sons/gemidos=2 ← CASO, Ausente=1\n   → V2\n\nResposta Motora (usar a MELHOR):\n   Obedece=6, Localiza=5, Flexão normal=4\n   Flexão anormal (decorticação)=3 ← CASO, Extensão (descerebração)=2, Ausente=1\n   MSD: flexão anormal = M3\n   MSE: extensão anormal = M2\n   Melhor resposta → M3\n\nPupilas:\n   Ambas reativas → P0\n\nTotal: O2 + V2 + M3 + P0 = 7 → TCE GRAVE\n\nDecoticação vs Descerebração:\n   Decorticação (M3): MMSS flexão, lesão cortical/cápsula interna\n   Descerebração (M2): MMSS extensão, lesão de tronco, pior prognóstico"},

{n:9,disc:false,tema:"OVACE — Heimlich em Adulto",context:"(UNISL PORTO VELHO) Você está em um churrasco na praia com amigos e familiares. Enquanto desfrutam da comida e conversam animadamente, um dos adultos começa a tossir violentamente e parece estar em pânico. Ele está com dificuldade para respirar e fica claro que está engasgado com algo que comeu. Ao avaliar a gravidade da situação, você se identifica e pede permissão para ajudá-lo, optando pela Manobra de Heimlich.",assertions:null,text:"Assinale a alternativa correta sobre as ações a serem tomadas.",opts:["Mesmo que o objeto não seja visível, é essencial que seja realizada a inspeção da cavidade bucal para que o objeto possa ser removido manualmente e garantir a desobstrução completa das vias aéreas superiores.","Posicione o paciente à sua frente, solicite que ele erga os membros superiores e realize percussão forte nas costas do paciente por pelo menos dez minutos, ou até expulsão do que estiver obstruindo.","Posicione-se atrás da pessoa e incline-a para frente. Com punho cerrado no abdômen, aplique pressão rápida e firme para dentro e para cima, em direção ao diafragma. Repita se necessário, até garantir a desobstrução.","Posicione-se de frente para a pessoa e coloque o punho cerrado no abdômen, na altura do diafragma. Realize pressão vigorosa frontal para frente e para cima, induzindo o vômito e desobstrução."],g:2,
exp:"Em uma situação de urgência envolvendo engasgo em um adulto, é crucial agir rapidamente e aplicar a Manobra de Heimlich, que é uma técnica de primeiros socorros para desobstruir as vias respiratórias de uma pessoa engasgada.\nPara realizar a manobra corretamente:\nAvalie a gravidade da situação: verifique se a pessoa está realmente engasgada. Se ela estiver tossindo ou fazendo barulhos, isso indica que o ar ainda está passando pelas vias respiratórias, então encoraje-a a tossir e a tentar expelir o objeto por conta própria.\nIdentifique-se e peça permissão: se a pessoa não consegue tossir ou falar e parece estar em perigo imediato, aborde-a calmamente e peça permissão para ajudá-la.\nPosicione-se atrás da pessoa: fique atrás dela e incline-a para frente.\nFaça um punho com uma mão: coloque o polegar do lado mais próximo da pessoa, no abdômen, logo acima do umbigo e abaixo das costelas.\nAgarre com firmeza: com a outra mão, envolva o punho e aplique uma pressão rápida e firme para dentro e para cima, em direção ao diafragma da pessoa.\nRepita se necessário: repita a pressão até que o objeto seja expelido e a pessoa consiga respirar normalmente ou até que chegue ajuda médica.\nObserve e forneça suporte: após a desobstrução das vias respiratórias, monitore a pessoa para garantir que ela esteja respirando adequadamente. Se necessário, forneça suporte adicional até que ajuda profissional chegue.\nÉ importante notar que a manobra de Heimlich pode ser arriscada se realizada desnecessariamente ou de forma inadequada. Portanto, é essencial ter certeza de que a pessoa está realmente engasgada e em perigo antes de agir. Além disso, se a pessoa estiver inconsciente, a abordagem será diferente, incluindo a realização de RCP (ressuscitação cardiopulmonar). Em qualquer situação de emergência médica, chamar ajuda profissional rapidamente é fundamental.\nIndicações para a manobra de Heimlich: asfixia devido à obstrução grave das vias respiratórias altas decorrente de um objeto estranho (sinalizada pela incapacidade de falar, tossir ou respirar adequadamente).\nDeve-se usar a manobra de Heimlich e outras manobras somente quando a obstrução das vias respiratórias é grave e potencialmente fatal. Se a pessoa em asfixia puder falar, tossir vigorosamente ou respirar apropriadamente, não é necessária intervenção.",
deep:"🤲 HEIMLICH EM ADULTO — PASSO A PASSO\n\n1) Avaliar obstrução:\n   Parcial → tosse, faz sons → encorajar tossir\n   Grave → sem fala, sem tosse, cianose → Heimlich imediato\n\n2) Identificar-se e pedir permissão\n\n3) Posição: ATRÁS da vítima, inclinar para frente\n\n4) Mãos:\n   Punho fechado, polegar para dentro\n   Entre umbigo e apêndice xifóide\n   Outra mão espalmada sobre a primeira\n\n5) Ação: comprimir para DENTRO e para CIMA (em J)\n   Firme e rápido\n   Repetir até expelir ou inconsciência\n\n6) Se inconsciente → deitar → RCP (30:2)\n   A cada abertura de VA: verificar boca → remover objeto se visível\n\n❌ A: Varredura manual às cegas é CONTRAINDICADA\n❌ B: Posição frontal e percussão de 10 min = errado\n❌ D: Posição frontal e direção errada (para frente = errado)"},

{n:10,disc:false,tema:"Fundoscopia — Retina Periférica",context:"(FACIMPA) Um paciente de 40 anos, diabético desde a infância, sem histórico de doenças oculares, apresenta uma queixa de \"visão embaçada\" ao ler ou realizar tarefas que exigem visão próxima. O paciente relata que essa queixa começou há cerca de 6 meses e tem piorado gradualmente. O médico decide realizar uma fundoscopia para avaliar a saúde dos olhos do paciente e determinar a causa da queixa.",assertions:null,text:"Durante a realização da fundoscopia, qual é a técnica adequada para visualizar a retina periférica?",opts:["Pedir ao paciente para olhar para cima e para a esquerda, enquanto o médico visualiza a retina com um oftalmoscópio.","Pedir ao paciente para olhar para baixo e para a direita, enquanto o médico visualiza a retina com um oftalmoscópio.","Inclinar a cabeça do paciente para trás e usar uma lente de aumento para visualizar a retina.","Usar uma lente de contato para visualizar a retina periférica."],g:0,
exp:"A resposta correta: durante a fundoscopia, o médico precisa visualizar a retina periférica, que está localizada na parte superior e lateral da retina. Para isso, o paciente precisa olhar para cima e para a esquerda, permitindo que o médico visualize a retina periférica com o oftalmoscópio.\nAs demais opções estão erradas porque:\nInclinar a cabeça do paciente para trás e usar uma lente de aumento não é uma técnica adequada para visualizar a retina periférica.\nPedir ao paciente para olhar para baixo e para a direita não permitirá que o médico visualize a retina periférica.\nUsar uma lente de contato não é necessário para visualizar a retina periférica durante a fundoscopia.",
deep:"👁️ FUNDOSCOPIA — VISUALIZANDO A RETINA\n\nPrincípio: o paciente dirige o olhar para a região que se quer examinar\n\nRetina periférica superior/lateral:\n   Olho ESQUERDO → paciente olha para CIMA e para ESQUERDA\n   Olho DIREITO → paciente olha para CIMA e para DIREITA\n\nOutras regiões:\n   Retina inferior → paciente olha para baixo\n   Retina nasal → paciente olha para o lado nasal\n   Mácula → paciente olha diretamente para a luz\n\nTécnica geral:\n   Ambiente escurecido\n   Midríase farmacológica para exame completo\n   Oftalmoscópio a ~15 cm\n   Usar olho D para examinar olho D do paciente\n\nNo diabético — pesquisar retinopatia diabética:\n   Microaneurismas (primeiros sinais)\n   Exsudatos duros\n   Hemorragias em chama de vela\n   Neovascularização (RD proliferativa)\n\n❌ B: Olhar para baixo/direita visualiza a retina inferior/nasal\n❌ C: Inclinar cabeça não é técnica adequada\n❌ D: Lente de contato = fundoscopia indireta (especialista)"}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}

buildPills();renderQ();

<script>
const PROVA_ID = 'ham2-2025-1';
const PERIODO = 2;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

// ── localStorage ──
function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Supabase ──
const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

// ── Interceptar uma vez só ──
const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

// ── Restaurar estado ──
if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
</script>
