<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:190px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>

{n:1,disc:false,tema:"Epidemiologia — Padrões de Ocorrência",src:"ITPAC STA INES",context:"A epidemiologia é a ciência que estuda os padrões da ocorrência de doença em populações humanas e os fatores que determinam esses padrões. Atualmente, com alta taxa de infectividade, a doença do coronavírus 2019 (COVID-19), causada pelo SARS-CoV-2, atingiu proporção mundial. Um estudo publicado na prestigiada revista \"Science\" comprova que o uso de máscara diminui muito a possibilidade de transmissão do SARS-CoV-2 e o grau de eficácia depende da capacidade de filtrar o ar e da quantidade de vírus presente no lugar onde a pessoa está. Os achados sugerem também que o distanciamento social adotado pela população é efetivo, especialmente quando combinado ao isolamento de casos e à quarentena dos contatos. Como padrões de ocorrência de doenças temos: surto, epidemia, pandemia e endemia. Identifique os conceitos e preencha as lacunas.\n\nI - ______ é a concentração de casos de uma mesma doença em determinado local e época, claramente em excesso ao que seria teoricamente esperado.\nII - ______ é a presença constante de uma doença ou de um agente infeccioso em determinada área geográfica.\nIII - ______ é o nome dado à ocorrência epidêmica caracterizada por uma larga distribuição espacial, atingindo várias nações.\nIV - ______ é caracterizada quando um surto acontece em diversas regiões, ou seja, um elevado número de casos novos e sua rápida difusão.",assertions:null,text:"Assinale a alternativa que apresenta a sequência correta:",opts:["Surto / endemia / pandemia / epidemia.","Epidemia / surto / pandemia / endemia.","Surto / pandemia / epidemia / endemia.","Pandemia / epidemia / surto / endemia."],g:0,exp:"Surto\n\nAcontece quando há o aumento repentino do número de casos de uma doença em uma região específica. Para ser considerado surto, o aumento de casos deve ser maior do que o esperado pelas autoridades.\n\nEpidemia\n\nA epidemia se caracteriza quando um surto acontece em diversas regiões. Uma epidemia a nível municipal acontece quando diversos bairros apresentam uma doença, a epidemia a nível estadual acontece quando diversas cidades têm casos e a epidemia nacional acontece quando há casos em diversas regiões do país.\n\nPandemia\n\nEm uma escala de gravidade, a pandemia é o pior dos cenários. Ela acontece quando uma epidemia se espalha por diversas regiões do planeta.\n\nEndemia\n\nA endemia não está relacionada a uma questão quantitativa. Uma doença é classificada como endêmica (típica) de uma região quando acontece com muita frequência no local. As doenças endêmicas podem ser sazonais.",deep:"🦠 PADRÕES DE OCORRÊNCIA DE DOENÇAS\n\nHierarquia de gravidade (do menor ao maior):\n\n   📍 Surto\n   → Aumento REPENTINO de casos em local/época específicos\n   → Excede o esperado para aquela região\n   → Ex: surto de gastroenterite em uma escola\n\n   📊 Epidemia\n   → Surto que se espalha por DIVERSAS REGIÕES\n   → Municipal → estadual → nacional\n   → Ex: epidemia de dengue em vários estados\n\n   🌍 Pandemia\n   → Epidemia em escala MUNDIAL\n   → Atinge vários continentes/nações\n   → Ex: COVID-19, H1N1\n\n   🔄 Endemia\n   → Presença CONSTANTE de uma doença em uma região\n   → Não é questão de quantidade, mas de frequência\n   → Pode ser sazonal\n   → Ex: malária na Amazônia\n\n❌ POR QUE AS OUTRAS ERRAM:\n   B → Troca surto por epidemia na posição I\n   C → Troca pandemia por endemia na posição IV\n   D → Coloca pandemia na posição I\n\n💡 MACETE:\n   Surto (local) → Epidemia (regional) → Pandemia (mundial)\n   Endemia = doença que já \"mora\" naquela região"},
{n:2,disc:false,tema:"Erros Tipo I e II — Testes de Hipótese",src:"UNIDEP",context:"Uma fábrica brasileira localizada em São Paulo possui diversas máquinas para a produção de frascos e rótulos para a utilização em vacinas. Foi realizada uma pesquisa nessa fábrica para a verificação dos materiais produzidos e conferir se há itens sendo produzidos com defeitos. Consideramos a hipótese nula sendo a que afirma que \"uma máquina não está produzindo mais frascos com defeito do que a taxa máxima esperada de frascos com defeito\".\n\nI. O erro tipo II diz que a máquina não está produzindo itens defeituosos a mais quando na verdade está.\nII. O erro tipo I acontece na situação em que rejeitamos a hipótese nula mas ela é verdadeira.\nIII. O erro tipo I acontece quando aceitamos a hipótese nula mas ela deve ser rejeitada.\nIV. O erro tipo I diz que a máquina não está produzindo itens defeituosos a mais quando na verdade está.",assertions:null,text:"É correto o que se afirma em:",opts:["I, II e IV.","I, II e III.","II, III e IV.","I e II."],g:3,exp:"O erro tipo 1 ocorre quando rejeitamos a hipótese nula mas ela é verdadeira. O erro tipo 2 acontece quando aceitamos a hipótese nula mas na verdade ela deveria ser rejeitada.",deep:"📊 ERROS EM TESTES DE HIPÓTESE\n\nConceitos fundamentais:\n\n   H₀ (Hipótese Nula) → \"Não há diferença\" / \"Tudo normal\"\n   H₁ (Hipótese Alternativa) → \"Há diferença\" / \"Algo mudou\"\n\n   ❌ Erro Tipo I (Falso Positivo / Erro alfa)\n   → REJEITAR H₀ quando ela é VERDADEIRA\n   → \"Alarme falso\" — achar que há problema quando não há\n   → Probabilidade = α (nível de significância)\n\n   ❌ Erro Tipo II (Falso Negativo / Erro beta)\n   → ACEITAR H₀ quando ela é FALSA\n   → \"Deixar passar\" — não detectar problema quando há\n   → Probabilidade = β\n\nAnálise das afirmativas:\n   ✅ I → Erro tipo II = aceitar H₀ falsa (máquina defeituosa não detectada)\n   ✅ II → Erro tipo I = rejeitar H₀ verdadeira (correto!)\n   ❌ III → Descreve erro tipo II, não tipo I\n   ❌ IV → Descreve erro tipo II, não tipo I\n\n💡 MACETE:\n   Tipo I = \"Inventei\" (rejeito o que era verdade) → Falso POSITIVO\n   Tipo II = \"Ignorei\" (aceito o que era falso) → Falso NEGATIVO"},
{n:3,disc:false,tema:"Estatística Descritiva — Quartis e Amplitude",src:"UNIDEP",context:"Do total de 188 casos de raiva humana ocorridos no país, 125 (66,5%) eram do sexo masculino e 126 (67,0%) residiam em zona rural; a idade dos casos variou de 1 a 82 anos (média = 20,9; desvio-padrão = 17,1 e mediana = 14,5 anos; 1º quartil = 7 e 3º quartil = 30).\n\n[[IMG_Q3]]\n\nConsiderando o estudo apresentado acima, avalie as afirmações a seguir\n\nI. A faixa etária mais acometida foi a de menores de 15 anos, com 49,6% dos casos.\nII. A amplitude dos casos registrados ocorreu na população de 1 a 64 anos.\nIII. Podemos afirmar que 25% dos casos ocorreram na população de até 7 anos.\nIV. 75% dos casos ocorreram na população de até 30 anos de idade.",assertions:null,text:"É correto o que se afirma em:",opts:["II, III e IV.","I, II e III.","I e II.","I, III e IV."],g:3,exp:"A única resposta incorreta é a que afirma que a amplitude dos casos ocorreu na população entre 1 a 64 anos. No texto afirma-se que a idade máxima foi de 82 anos.",deep:"📐 ESTATÍSTICA DESCRITIVA — MEDIDAS DE POSIÇÃO\n\nDados do estudo:\n   → Idade: 1 a 82 anos\n   → Média: 20,9 | Mediana: 14,5\n   → Q1 = 7 | Q3 = 30\n\nAnálise das afirmativas:\n\n   ✅ I → Menores de 15 anos = 49,6% (mediana 14,5 confirma)\n   ❌ II → Amplitude = valor máx - valor mín = 82 - 1 = 81 (NÃO é 1 a 64)\n   ✅ III → Q1 = 7 → 25% dos casos até 7 anos (definição de 1º quartil)\n   ✅ IV → Q3 = 30 → 75% dos casos até 30 anos (definição de 3º quartil)\n\nConceitos-chave:\n   → Q1 (1º quartil): 25% dos dados estão ABAIXO\n   → Q2 (mediana): 50% dos dados estão ABAIXO\n   → Q3 (3º quartil): 75% dos dados estão ABAIXO\n   → Amplitude = valor MÁXIMO - valor MÍNIMO\n\n💡 MACETE:\n   Q1 = 25% | Q2 = 50% (mediana) | Q3 = 75%\n   Amplitude SEMPRE usa os valores extremos (mín e máx)"},
{n:4,disc:true,tema:"Testes de Hipótese — Valor de p e IC",src:"ITPAC PALMAS",context:"Em um estudo fase III para avaliar uma nova Droga antineoplásica em comparação a uma Droga usual, obteve uma taxa de recidiva de 5 casos por 100 pacientes/ano no grupo com a nova Droga e de 6,1 casos por 100 pacientes por ano no grupo controle (Droga usual). A razão entre as taxas foi de 1,02 (IC95% de 0,85 à 1,5 com p= 0,25) para o grupo de Intervenção. A incidência de efeitos adversos graves foi de 10 por 100 pacientes/ano (IC95% de 8,1 à 12,2) entre os pacientes tratados com a nova Droga e de 9 por 100 pacientes/ano (IC95% de 8,2 à 14,0 com p=0,32) no grupo controle.",assertions:null,text:"A) Quais são as Hipóteses para este estudo? (0,75 pontos)\nB) Interprete o valor de p. (0,75 pontos)\nC) Qual conclusão a partir dos resultados. (1,0 ponto)",opts:[],g:null,exp:"Semana 07. Objetivo do item. Determinar as hipóteses H0 e H1 e os intervalos de confiança.\n\nRespostas.\nA)\nH0: O efeito da nova droga não difere do efeito da droga usual.\nH1: Há diferença no efeito da droga nova em comparação a droga usual.\n\nB) O alto valor de p indica que a razão entre as taxas de incidência não são estatisticamente significativas.\n\nC) Como os IC95% dos pacientes tratados com a nova droga estão sobrepondo ao IC95% dos pacientes tratados com a droga usual, conclui-se que não há diferença na comparação dos efeitos gerados na utilização da nova droga com a droga usual. Aceita H0 e Rejeita H1.",deep:"🧪 TESTES DE HIPÓTESE — ESTUDO DE DROGA ANTINEOPLÁSICA\n\na) Hipóteses:\n   → H₀: Nova droga = droga usual (sem diferença)\n   → H₁: Nova droga ≠ droga usual (há diferença)\n\nb) Valor de p:\n   → p = 0,25 e p = 0,32 → ambos > 0,05\n   → NÃO estatisticamente significativo\n   → Não se pode rejeitar H₀\n\nc) Conclusão:\n   → IC95% se sobrepõem entre os dois grupos\n   → Quando ICs se sobrepõem → sem diferença significativa\n   → ACEITA H₀ e REJEITA H₁\n   → A nova droga NÃO é superior à usual\n\nConceitos-chave:\n   → p < 0,05 → significativo → rejeita H₀\n   → p > 0,05 → não significativo → aceita H₀\n   → IC95% que se sobrepõem → sem diferença\n   → IC95% que NÃO se sobrepõem → há diferença\n\n💡 MACETE:\n   p PEQUENO = Parabéns, há diferença (rejeita H₀)\n   p GRANDE = Grudou no H₀ (aceita H₀, sem diferença)"},
{n:5,disc:true,tema:"Desenho de Estudo e Variáveis",src:"ITPAC Porto",context:"Um grupo de pesquisa, composto por estudantes do curso de medicina, objetivou aplicar os conhecimentos sobre os instrumentos de coletas de dados em uma amostra de pacientes atendidos em determinada unidade básica de saúde. Após a obtenção dos dados, o grupo apresentou os registros dos pacientes selecionados aleatoriamente da referida UBS para a verificação individual de algumas variáveis (Sexo, Idade, Peso, Altura, Circunferência Abdominal, Creatinina Sérica, Triglicerídeos). Em um dos resultados apresentados, o grupo relatou a baixa variabilidade obtida para a variável Creatinina Sérica.\n\n[[IMG_Q5]]",assertions:null,text:"Avalie as informações apresentadas, responda o que se pede:\n\nA) Qual o desenho deste estudo? (1,25 pontos)\nB) Qual a classificação geral das variáveis deste estudo? (1,25 pontos)",opts:[],g:null,exp:"Respostas:\n\nA) O desenho do estudo caracteriza-se por ser um: Estudo Epidemiológico do tipo Observacional Descritivo.\n\nB) As variáveis do estudo são classificadas como qualitativa (Sexo) e Quantitativa (demais variáveis). Quali-Quantitativo.",deep:"🔬 DESENHO DE ESTUDO E CLASSIFICAÇÃO DE VARIÁVEIS\n\na) Desenho do estudo:\n   → Estudo Epidemiológico Observacional Descritivo\n   → Observacional: pesquisadores NÃO intervêm\n   → Descritivo: descreve características da amostra\n   → Não compara grupos nem testa intervenção\n\nb) Classificação das variáveis:\n\n   📝 Qualitativa (categórica)\n   → Sexo (F/M) → qualitativa NOMINAL\n\n   📏 Quantitativa (numérica)\n   → Idade, Peso, Altura → quantitativa CONTÍNUA\n   → Circunferência Abdominal → quantitativa CONTÍNUA\n   → Creatinina Sérica → quantitativa CONTÍNUA\n   → Triglicerídeos → quantitativa CONTÍNUA\n\n   Classificação geral → Quali-Quantitativo\n\n💡 MACETE:\n   Observacional = só OBSERVA (não mexe em nada)\n   Descritivo = só DESCREVE (não compara grupos)\n   Qualitativa = CATEGORIAS | Quantitativa = NÚMEROS"},
{n:6,disc:false,tema:"Classificação de Variáveis",src:"FCM",context:"Alguns alunos do curso de Medicina estão querendo realizar uma pesquisa sobre as mudanças nos hábitos de vida de uma comunidade durante a pandemia da Covid-19 e juntamente com os professores de MEP definiram as variáveis que irão investigar.\n\nDentre as variáveis selecionadas, eles irão avaliar idade, gênero, escolaridade, peso, altura, Índice de Massa Corporal (IMC) e prática de exercício físico.\n\nI – Podemos considerar que o gênero é uma variável qualitativa ordinal.\nII – O peso, a altura e o IMC são variáveis quantitativas contínuas.\nIII – A escolaridade é uma variável qualitativa ordinal.\nIV – Uma variável quantitativa pode ser coletada de forma qualitativa, como por exemplo, a idade.",assertions:null,text:"Assinale a alternativa correta:",opts:["Apenas II e III estão corretas.","Apenas II, III e IV estão corretas.","Apenas I e II estão corretas.","Apenas I e III estão corretas."],g:1,exp:"O gênero é uma variável qualitativa NOMINAL, podendo ser apresentado em qualquer ordem, ou seja, sem necessidade de ordenação entre as categorias.",deep:"📊 CLASSIFICAÇÃO DE VARIÁVEIS — TIPOS\n\nAnálise das afirmativas:\n\n   ❌ I → Gênero é qualitativa NOMINAL (não tem ordem)\n   → Nominal = categorias sem hierarquia (masculino/feminino)\n   → Ordinal = categorias com ordem (leve/moderado/grave)\n\n   ✅ II → Peso, altura e IMC são quantitativas CONTÍNUAS\n   → Podem assumir qualquer valor num intervalo\n   → Ex: 70,5 kg; 1,72 m; 23,8 kg/m²\n\n   ✅ III → Escolaridade é qualitativa ORDINAL\n   → Categorias com hierarquia natural\n   → Ex: fundamental < médio < superior\n\n   ✅ IV → Variável quantitativa coletada como qualitativa\n   → Idade (quantitativa) → pode ser coletada como faixa etária (qualitativa)\n   → Ex: \"criança\", \"adulto\", \"idoso\"\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Falta a IV (que é correta)\n   C → Inclui I (que é errada — gênero é NOMINAL)\n   D → Inclui I e falta II e IV\n\n💡 MACETE:\n   NOMINAL = Nome (sem ordem) → sexo, cor dos olhos, tipo sanguíneo\n   ORDINAL = Ordem → escolaridade, gravidade, escala de dor"},
{n:7,disc:false,tema:"Desenhos de Estudo — Coorte",src:"FCM",context:"Determinada pesquisa propõe acompanhar pacientes em dois momentos diferentes (2021 a 2023) diagnosticados com a doença pulmonar obstrutiva crônica (DPOC) a fim de avaliar a função respiratória, comorbidades e mortalidade. Um grupo será acompanhado semanalmente por agentes de saúde, os quais orientarão sobre o correto tratamento e a redução a fatores de risco, e outro grupo não terá o acompanhamento.\n\nI- Sabendo-se que a DPOC duplica o risco de AVC e infarto, é possível calcular a incidência destes acometimentos no estudo em questão.\nII- A melhoria no tratamento da DPOC, prolongando-se o tempo de sobrevivência destes pacientes, pode ser considerada um fator que reduz a prevalência.\nIII- A mortalidade é considerada sempre uma medida de prevalência, já que é medida em um único recorte do tempo, como na pesquisa transversal.\nIV - Trata-se de um estudo de coorte prospectivo, tendo as seguintes características: pesquisa observacional, analítica e longitudinal.",assertions:null,text:"Assinale a alternativa correta:",opts:["I e IV estão corretas.","I e III estão corretas.","II e III estão corretas.","I e II estão corretas."],g:0,exp:"A melhoria no tratamento da DPOC, prolongando-se o tempo de sobrevivência destes pacientes, pode ser considerada um fator que AUMENTA a prevalência.\n\nA mortalidade é considerada sempre uma medida de INCIDÊNCIA, pois precisa de um período de tempo para ser medida, como na pesquisa longitudinal.",deep:"🔬 ESTUDO DE COORTE — INCIDÊNCIA E PREVALÊNCIA\n\nAnálise das afirmativas:\n\n   ✅ I → Coorte permite calcular INCIDÊNCIA\n   → Acompanha ao longo do tempo → novos casos → incidência\n\n   ❌ II → Sobrevivência maior AUMENTA a prevalência\n   → Mais tempo vivo com a doença = mais casos prevalentes\n   → Prevalência ↑ quando: duração da doença ↑ ou incidência ↑\n   → Prevalência ↓ quando: mortalidade ↑ ou cura ↑\n\n   ❌ III → Mortalidade é medida de INCIDÊNCIA\n   → Precisa de um PERÍODO de tempo para ser medida\n   → Não é prevalência (não é recorte pontual)\n\n   ✅ IV → Coorte prospectivo: observacional + analítico + longitudinal\n   → Observacional: não intervém\n   → Analítico: compara grupos\n   → Longitudinal: acompanha no tempo\n\nFatores que afetam a prevalência:\n   ↑ Prevalência → maior duração da doença, melhor tratamento (sobrevive mais)\n   ↓ Prevalência → maior mortalidade, maior cura\n\n💡 MACETE:\n   Incidência = casos NOVOS (precisa de TEMPO)\n   Prevalência = casos EXISTENTES (foto do momento)\n   Tratamento melhor → vive mais → AUMENTA prevalência"},
{n:8,disc:false,tema:"Amostragem — Aleatória Simples e Censo",src:"ITPAC Porto",context:"O objetivo de uma pesquisa era o de se obter, relativamente aos moradores de um bairro, informações sobre duas variáveis: nível educacional e renda familiar. Para cumprir tal objetivo, dentre todos os domicílios do bairro, foi criado uma amostra com 300 moradores, em que todos no bairro tinham chances iguais de ser selecionado, para informar o nível educacional, e, sobre a renda familiar, todos os moradores foram entrevistados e arguídos.",assertions:null,text:"As abordagens utilizadas para as variáveis nível educacional e renda familiar foram, respectivamente:",opts:["Amostragem aleatória simples e censo.","Censo e amostragem por conglomerados.","Amostragem estratificada e amostragem sistemática.","Amostragem intencional e amostragem aleatória simples."],g:0,exp:"O texto-base apresenta a informação de que foi criado uma amostra com 300 moradores, em que todos no bairro tinham chances iguais de ser selecionado, para informar o nível educacional, o que caracteriza uma amostragem aleatória. E sobre a renda familiar, todos os moradores foram entrevistados e arguídos, caracterizando Censo.",deep:"📋 TIPOS DE AMOSTRAGEM\n\nNo caso da pesquisa:\n\n   🎲 Nível educacional → Amostragem Aleatória Simples\n   → 300 moradores selecionados\n   → TODOS tinham chances IGUAIS de ser escolhidos\n   → Característica-chave: equiprobabilidade\n\n   📊 Renda familiar → Censo\n   → TODOS os moradores foram entrevistados\n   → Abrange 100% da população\n   → Não é amostra, é a população inteira\n\nTipos de amostragem:\n   🎲 Aleatória simples → todos com chance igual\n   📏 Sistemática → a cada N indivíduos (ex: a cada 5º)\n   📂 Estratificada → divide em estratos, amostra de cada um\n   🏘️ Conglomerados → divide em grupos, sorteia grupos inteiros\n   🎯 Intencional → pesquisador escolhe (não probabilística)\n\n❌ POR QUE AS OUTRAS ERRAM:\n   B → Nível educacional não é censo (só 300 de muitos)\n   C → Não há divisão em estratos nem seleção sistemática\n   D → Não é intencional (todos tinham chance igual)\n\n💡 MACETE:\n   Todos com chance IGUAL = aleatória simples\n   TODOS participam = censo\n   A cada Nº = sistemática | Divide em camadas = estratificada"},
{n:9,disc:false,tema:"Incidência e Prevalência — Cálculo",src:"",context:"A Roséola infantum — ou exantema súbito — é uma doença infecciosa viral, normalmente benigna, muito comum entre 6 meses e 2 anos de idade. Crianças que a contraem ficam posteriormente imunes ao vírus. Em uma creche com 52 crianças, constatou-se que 2 crianças estavam com roséola no dia 01 de setembro, sendo que até dia 11 de setembro, haviam surgido mais 5 casos novos, totalizando 7 casos no total desde o início do surto.",assertions:null,text:"De posse dessas informações, escolha a alternativa correta:",opts:["A incidência cumulativa entre os dias 1 e 10 de setembro é de 10%.","A incidência cumulativa entre os dias 1 e 10 de setembro é de 20%.","A prevalência de casos entre os dias 1 e 10 de setembro é de 20%.","A prevalência de casos no dia 1 de setembro é de 14%."],g:0,exp:"A prevalência é dada pelo número de casos em determinado dia / total da população * 100. Não há como estimar prevalência em um intervalo de tempo (como na letra b). Já para o dia 1 de setembro, ela seria de 2 casos / 52 crianças * 100 = 3,85% (quase 4%).\n\nA incidência cumulativa é dada pelo número de casos novos em determinado período / população de risco. O número de casos novos entre 1-10 setembro foi de 5 (numerador). A população de risco no período deve desconsiderar as 2 crianças que já estavam doentes no dia 1 de setembro. O denominador, portanto, ficaria 52 – 2 = 50. A incidência cumulativa ficaria, portanto, 5/50=10%.",deep:"🔢 CÁLCULO DE INCIDÊNCIA E PREVALÊNCIA\n\nDados do problema:\n   → Total de crianças na creche: 52\n   → Casos em 01/set: 2 (já doentes)\n   → Casos novos até 11/set: 5\n   → Total de casos: 7\n\nPrevalência (dia 01/set):\n   → 2 / 52 × 100 = 3,85% (≈ 4%)\n   → NÃO é 14% (alternativa D errada)\n\nIncidência cumulativa (01 a 10/set):\n   → Numerador: 5 casos NOVOS\n   → Denominador: 52 - 2 = 50 (população de RISCO)\n   → Os 2 que já tinham a doença SAEM do denominador\n   → 5 / 50 = 0,10 = 10% ✅\n\n❌ POR QUE AS OUTRAS ERRAM:\n   B → 20% seria se usasse 5/25 ou outro cálculo errado\n   C → NÃO existe prevalência em intervalo de tempo\n   D → Prevalência em 01/set = 3,85%, não 14%\n\n💡 MACETE:\n   Incidência = casos NOVOS / população de RISCO\n   Prevalência = casos TOTAIS / população TOTAL (num momento)\n   Quem JÁ ESTÁ doente SAI da população de risco"},
{n:10,disc:false,tema:"Boxplot — Medidas de Dispersão",src:"UNIPTAN",context:"Um grupo de alunos resolveu avaliar o perfil glicêmico de moradores de 4 diferentes bairros. Os dados coletados estão mostrados em um gráfico boxplot.\n\n[[IMG_Q10]]\n\nAnalise as afirmativas sobre o gráfico acerca dos valores da glicemia.\n\nI. O desvio padrão é maior nos moradores do bairro D.\nII. A dispersão é maior nos moradores dos bairros C.\nIII. A amplitude é maior nos moradores do bairro D.\nIV. A mediana é maior nos moradores do bairro C.",assertions:null,text:"É correto o que se afirma em:",opts:["I, II, III e IV.","III e IV.","I, III e IV.","I e II."],g:2,exp:"A glicemia dos moradores do bairro D tem uma maior variação (ou dispersão), o que pode ser percebido analisando a extensão do boxplot referente aos valores da glicemia no bairro D. O desvio padrão da glicemia nesse bairro é o maior dentre todos. Ou seja, a glicemia dos moradores do bairro D têm uma maior dispersão (o que é o mesmo que dizer que tem maior variação ou maior desvio padrão).\n\nA amplitude é também maior nos moradores do bairro D, pois amplitude é a diferença entre o maior e o menor valor.\n\nNos bairros A e C a caixa do boxplot é mais estreita, indicando uma menor variação dos dados. A linha horizontal na caixa do boxplot representa a mediana. A mediana é maior no bairro C e menor no bairro A.",deep:"📊 BOXPLOT — MEDIDAS DE DISPERSÃO E POSIÇÃO\n\nComo ler um Boxplot:\n   → Linha horizontal na caixa = MEDIANA\n   → Tamanho da caixa = Intervalo Interquartil (IQR = Q3 - Q1)\n   → Bigodes (whiskers) = extensão dos dados\n   → Pontos isolados = outliers\n\nAnálise das afirmativas:\n\n   ✅ I → Bairro D: boxplot MAIS extenso = maior desvio padrão\n   ❌ II → Bairro C: caixa ESTREITA = menor dispersão (não maior)\n   ✅ III → Bairro D: maior distância entre mín e máx = maior amplitude\n   ✅ IV → Bairro C: linha da mediana mais ALTA que os outros\n\nConceitos no boxplot:\n   → Amplitude = valor máx - valor mín (comprimento total)\n   → Dispersão/variação = extensão do boxplot\n   → Desvio padrão maior = boxplot mais \"esticado\"\n   → Mediana = posição da linha dentro da caixa\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Inclui II (dispersão de C não é maior que D)\n   B → Falta I (desvio padrão de D é o maior)\n   D → Inclui II e falta III e IV\n\n💡 MACETE:\n   Boxplot LARGO = muita dispersão (desvio padrão alto)\n   Boxplot ESTREITO = pouca dispersão (dados mais homogêneos)\n   Linha da caixa = MEDIANA (não é média!)"}

];
const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';var ctxHtml=q.context.replace(/\n/g,'<br>');ctxHtml=ctxHtml.replace(/\[\[IMG_(Q\d+)\]\]/g,function(_,id){var el=document.getElementById('IMG_'+id);return el?el.innerHTML:'';});ctx.innerHTML=ctxHtml;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false;
function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}
document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);
function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}
document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});

</script>
  <script>
const PROVA_ID = 'mcm2-2021-2';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) {
    state.eliminated[k] = Array.from(eliminated[k]);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) {
          eliminated[k] = new Set(state.eliminated[k]);
        }
      }
      return true;
    }
  } catch (e) {}
  return false;
}

const _origSubmit = submitAnswer;
submitAnswer = function() {
  _origSubmit();
  saveLocal();
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) {
    setTimeout(showResult, 100);
  }
}
</script>
