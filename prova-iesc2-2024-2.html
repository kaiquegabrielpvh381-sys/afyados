<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}

.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}

{n:1,disc:true,tema:"Níveis de Atenção — RAS",src:"FASA VIC",context:"(FASA VIC) Jo\u00e3o, um homem de 35 anos, residente em uma \u00e1rea rural, procura a Unidade B\u00e1sica de Sa\u00fade (UBS), ap\u00f3s sentir fortes dores abdominais e febre persistente. O enfermeiro da UBS realiza a triagem, verifica seus sinais vitais e coleta informa\u00e7\u00f5es sobre os sintomas e, em seguida, \u00e9 atendido por um m\u00e9dico da UBS, que realiza uma avalia\u00e7\u00e3o cl\u00ednica inicial e decide encaminhar Jo\u00e3o para consulta com especialista na regi\u00e3o. O m\u00e9dico especialista realizou uma avalia\u00e7\u00e3o mais detalhada solicitando exames laboratoriais. O diagn\u00f3stico revelou que Jo\u00e3o estava com apendicite aguda, exigindo uma interven\u00e7\u00e3o cir\u00fargica, sendo encaminhado para um hospital em uma cidade pr\u00f3xima onde s\u00e3o realizados procedimentos cir\u00fargicos mais complexos. Ele \u00e9 admitido para a cirurgia de apendicite.",assertions:null,text:"A partir do caso clínico descrito, identifique quais pontos da rede de atenção em saúde foram utilizados pelo paciente e os respectivos níveis de atenção vivenciados, apresentando exemplos com fragmentos do caso clínico (1,5).",opts:[],g:null,exp:"APS --> Nível primário de atenção, porta de entrada. exemplo: \"Preocupado com sua saúde, João inicialmente procura a Unidade Básica de Saúde (UBS) onde a equipe da atenção básica realiza uma avaliação inicial. O enfermeiro da UBS realiza a triagem, verifica seus sinais vitais e coleta informações sobre os sintomas. João é atendido por um médico da UBS.\" (0,5)\n\nConsulta especializada --> Nível secundário --> exemplo --> \"João é atendido por um médico da UBS, que realiza uma avaliação clínica inicial e decide encaminhar João para uma consulta com especialista na região. João passa por uma avaliação mais detalhada por um médico especialista e realiza exames laboratoriais. \"(0,5)\n\nIntervenção cirúrgica em hospital com encaminhamento na região de saúde--> nível terciário --> exemplo: \"O diagnóstico revela uma apendicite aguda, exigindo uma intervenção cirúrgica. Diante do diagnóstico, João é encaminhado para um hospital em uma cidade próxima onde são realizados procedimentos cirúrgicos mais complexos. Ele é admitido para a cirurgia de apendicite. (0,5)",deep:"🏥 REDE DE ATENÇÃO À SAÚDE — CASO DO JOÃO\n\nO percurso do paciente pelos 3 pontos da RAS:\n\n   🟢 APS — Nível Primário (porta de entrada)\n   → UBS: enfermeiro fez triagem, sinais vitais, coleta de informações\n   → Médico da UBS: avaliação clínica inicial\n   → Função: primeiro contato, coordenar o cuidado\n\n   🟡 Atenção Secundária (média complexidade)\n   → Encaminhamento ao especialista na região\n   → Avaliação detalhada + exames laboratoriais\n   → Função: consultas especializadas, exames complementares\n\n   🔴 Atenção Terciária (alta complexidade)\n   → Hospital em cidade próxima\n   → Cirurgia de apendicite (procedimento complexo)\n   → Função: internações, cirurgias, alta tecnologia\n\n💡 MACETE:\n   Porta de entrada (UBS) → Especialista → Hospital = 1ª → 2ª → 3ª\n   Cada nível tem MAIOR densidade tecnológica que o anterior"},
{n:2,disc:false,tema:"Atribuições Comuns da ESF",src:"FIPGUANAMBI",context:"(FIPGUANAMBI) O bairro Santa Rita, na cidade de Cacul\u00e9, est\u00e1 enfrentando um surto de uma doen\u00e7a transmitida por mosquitos. A equipe de sa\u00fade da UBS se reuniu para definir atividades para conter a propaga\u00e7\u00e3o do mosquito e proporcionar melhor atendimento aos pacientes.\n\nI. Todos os membros da equipe de sa\u00fade dever\u00e3o participar do acolhimento dos usu\u00e1rios, realizando classifica\u00e7\u00e3o de risco, identificando as necessidades de interven\u00e7\u00f5es de cuidado.\nII. Os agentes comunit\u00e1rios de sa\u00fade devem identificar casos suspeitos de doen\u00e7as e agravos, encaminhando os usu\u00e1rios para a unidade de sa\u00fade de refer\u00eancia, registrar e comunicar o fato \u00e0 autoridade de sa\u00fade respons\u00e1vel pelo territ\u00f3rio.\nIII. Instituir a\u00e7\u00f5es para seguran\u00e7a do paciente e propor medidas para reduzir os riscos e diminuir os eventos adversos, s\u00e3o atividades privativas do m\u00e9dico e equipe de enfermagem.\nIV. A realiza\u00e7\u00e3o das a\u00e7\u00f5es program\u00e1ticas, coletivas e de vigil\u00e2ncia em sa\u00fade, incluindo educa\u00e7\u00e3o em sa\u00fade, como palestras educativas de combate \u00e0 prolifera\u00e7\u00e3o do mosquito dever\u00e3o ser realizadas por todos os membros da equipe.",assertions:null,text:"Com base na Portaria 2.436/2017, está correto o que se afirma em:",opts:["I, II, III e IV.","I, II e IV.","II e IV.","I e III."],g:1,exp:"Atribuições comuns a todos os membros das Equipes que atuam na Atenção Básica:\n\nV. Garantir a atenção à saúde da população adscrita, buscando a integralidade por meio da realização de ações de promoção, proteção e recuperação da saúde, prevenção de doenças e agravos e da garantia de atendimento da demanda espontânea, da realização das ações programáticas, coletivas e de vigilância em saúde, e incorporando diversas racionalidades em saúde, inclusive Práticas Integrativas e Complementares;\n\nVI. Participar do acolhimento dos usuários, proporcionando atendimento humanizado, realizando classificação de risco, identificando as necessidades de intervenções de cuidado, responsabilizando-se pela continuidade da atenção e viabilizando o estabelecimento do vínculo;\n\nXIV. Instituir ações para segurança do paciente e propor medidas para reduzir os riscos e diminuir os eventos adversos;\n\nPortanto, ações de segurança não são atribuições específicas do médico e enfermagem.\n\nÉ uma atribuição do ACS:\nOs agentes comunitários de saúde devem identificar casos suspeitos de doenças e agravos, encaminhando os usuários para a unidade de saúde de referência, registrar e comunicar o fato à autoridade de saúde responsável pelo território.",deep:"📋 ATRIBUIÇÕES NA ATENÇÃO BÁSICA — Portaria 2.436/2017\n\nAnálise das afirmativas:\n   ✅ I → Acolhimento com classificação de risco = atribuição COMUM a TODOS\n   ✅ II → Busca ativa, notificação e encaminhamento = atribuição do ACS (específica, mas prevista)\n   ❌ III → Segurança do paciente e redução de riscos = atribuição de TODOS, não só médico e enfermagem\n   ✅ IV → Ações programáticas, vigilância e educação em saúde = atribuição COMUM a TODOS\n\nPortaria 2.436/2017 — Atribuições comuns:\n   → Acolhimento (inciso VI)\n   → Ações de vigilância e promoção (inciso V)\n   → Segurança do paciente (inciso XIV)\n   → Todas envolvem TODA a equipe\n\n❌ POR QUE A III ERRA:\n   → A portaria diz que TODOS devem instituir ações de segurança do paciente\n   → NÃO é privativo de médico e enfermagem\n\n💡 MACETE:\n   Na AB, quase TUDO é de TODOS → desconfie de \"é privativo de...\" ou \"é exclusivo de...\""},
{n:3,disc:false,tema:"Densidades Tecnológicas — RAS",src:"UNITPAC",context:"(UNITPAC) Durante uma consulta de pr\u00e9-natal na UBS, a m\u00e9dica Joziele identificou complica\u00e7\u00f5es gestacionais em uma paciente de 28 anos, realizando encaminhamento para o especialista no ambulat\u00f3rio de especialidades, onde foi realizado um Ultrassom morfol\u00f3gico com Doppler. A m\u00e9dica obstetra do centro de refer\u00eancia recomendou a realiza\u00e7\u00e3o de uma cesariana. Na unidade hospitalar, ap\u00f3s a cesariana, a paciente e seu beb\u00ea receberam cuidados especializados de alta complexidade neonatal.\n\nI - N\u00edvel menor/baixo: atendimento na UBS, onde a m\u00e9dica identificou complica\u00e7\u00f5es gestacionais.\nII - N\u00edvel intermedi\u00e1rio: encaminhada para especialista na refer\u00eancia (ambulat\u00f3rio).\nIII - N\u00edvel maior/alto: hospital onde realizou cirurgia cesariana e foi acompanhada pela alta complexidade neonatal.",assertions:null,text:"Considerando os pontos de assistência dentro da rede, é correto o que se afirma em:",opts:["I e III.","I e II.","I, II e III.","II e III."],g:2,exp:"Os níveis de atenção são arranjos produtivos conformados segundo as densidades tecnológicas singulares, variando do nível de menor densidade, ao de densidade tecnológica intermediária, até o de maior densidade tecnológica. Na prática, os serviços de menor densidade tecnológica, como as unidades básicas de saúde, são ofertados de forma dispersa, uma vez que se beneficiam menos da economia de escala. Enquanto os de densidade secundaria, incluem, por exemplo, realização de exames, como por exemplo raio-X em Unidade de pronto atendimento, ou consulta com especialistas. Por outro lado, os serviços com maior densidade tecnológica, que se beneficiam mais da economia de escala, tendem a ser mais concentrados. Por exemplo, um hospital regional localizado em um município de maior porte que atenda a um conjunto de pequenos municípios da região. Envolvendo por exemplo parto de alto risco, UTI, cirurgias cardiovasculares, etc.",deep:"⚙️ DENSIDADE TECNOLÓGICA — CASO DA GESTANTE\n\nOs 3 níveis estão corretos (I, II e III):\n\n   🟢 I — Menor densidade (APS)\n   → UBS: consulta pré-natal\n   → Médica identificou complicações gestacionais\n   → Baixa complexidade tecnológica\n\n   🟡 II — Intermediária (Atenção Secundária)\n   → Ambulatório de especialidades\n   → Obstetra + Ultrassom morfológico com Doppler\n   → Média complexidade tecnológica\n\n   🔴 III — Maior densidade (Atenção Terciária)\n   → Hospital: cesariana + UTI neonatal\n   → Alta complexidade tecnológica\n\nConceito-chave:\n   → Níveis = arranjos produtivos por DENSIDADE TECNOLÓGICA\n   → Menor densidade: dispersos (UBS em cada bairro)\n   → Maior densidade: concentrados (poucos hospitais regionais)\n\n💡 MACETE:\n   Quanto mais TECNOLOGIA o serviço exige, maior o nível de atenção\n   UBS (pouca tech) → Ambulatório especializado → Hospital (muita tech)"},
{n:4,disc:false,tema:"Equipes da Atenção Básica — PNAB",src:"UNIDEP",context:"(UNIDEP) A UBS do bairro Nova Esperan\u00e7a possui diversas equipes que atuam para garantir a aten\u00e7\u00e3o integral \u00e0 sa\u00fade. Considere as descri\u00e7\u00f5es:\n\nI. Equipe m\u00ednima composta por m\u00e9dico, enfermeiro, t\u00e9cnico de enfermagem e ACS, com foco em promo\u00e7\u00e3o, preven\u00e7\u00e3o e cuidado cont\u00ednuo, podendo ser ampliada com profissionais de sa\u00fade bucal.\nII. Equipe formada exclusivamente por ACS que realiza visitas domiciliares, coleta informa\u00e7\u00f5es sobre a comunidade e auxilia na integra\u00e7\u00e3o dos servi\u00e7os.\nIII. Equipe composta por diferentes profissionais (psic\u00f3logos, nutricionistas, assistentes sociais, fisioterapeutas) que atuam de forma complementar \u00e0s eSF.\nIV. Equipe especializada em sa\u00fade bucal, integrada por cirurgi\u00f5es-dentistas e auxiliares ou t\u00e9cnicos em sa\u00fade bucal, que pode atuar em conjunto com as eSF.",assertions:null,text:"Associe as descrições I, II, III e IV às respectivas equipes da PNAB:",opts:["I - eAP; II - eSF; III - eMulti; IV - EACS.","I - eSB; II - eAP; III - EACS; IV - eSF.","I - eSF; II - eMulti; III - eAP; IV - EACS.","I - eSF; II - EACS; III - eMulti; IV - eSB."],g:3,exp:"I. Equipe de Saúde da Família (eSF)\nA descrição I refere-se à Equipe de Saúde da Família (eSF), que é composta por médicos, enfermeiros, técnicos de enfermagem e agentes comunitários de saúde (ACS). Esta equipe tem um papel central na promoção da saúde, prevenção de doenças e cuidado contínuo dos pacientes. A equipe pode ser ampliada com profissionais de saúde bucal, como dentistas, para oferecer um cuidado mais integral à saúde da família e da comunidade.\n\nII. Equipe de Agentes Comunitários de Saúde (EACS)\nA descrição II refere-se à Equipe de Agentes Comunitários de Saúde (EACS). Esta equipe é formada exclusivamente por ACS, que realizam visitas domiciliares, coletam informações sobre a saúde da comunidade e atuam na integração dos serviços de saúde com a população. Eles são essenciais para a promoção da saúde e a educação em saúde.\n\nIII. Equipe Multiprofissional (eMulti)\nA descrição III corresponde à Equipe Multiprofissional, composta por profissionais de diferentes áreas, como psicólogos, nutricionistas, assistentes sociais e fisioterapeutas. Esta equipe oferece suporte especializado e complementar às equipes de Saúde da Família, abordando necessidades específicas da população e fornecendo uma abordagem mais abrangente e integrada aos cuidados de saúde.\n\nIV. Equipe de Saúde Bucal (eSB)\nA descrição IV é sobre a Equipe de Saúde Bucal (eSB), composta por cirurgiões-dentistas e auxiliares ou técnicos em saúde bucal. Essa equipe foca no cuidado da saúde bucal, realizando atendimentos odontológicos e promovendo a saúde oral dentro da UBS. Eles podem trabalhar em conjunto com as equipes de Saúde da Família para uma abordagem mais completa da saúde do paciente.",deep:"👥 EQUIPES DA ATENÇÃO BÁSICA — Portaria 2.436/2017 + Portaria 635/2023\n\nAssociação correta:\n\n   🏠 I → eSF (Equipe de Saúde da Família)\n   → Médico + enfermeiro + téc. enfermagem + ACS\n   → Pode ampliar com saúde bucal\n   → Foco: promoção, prevenção, cuidado contínuo\n\n   🚶 II → EACS (Equipe de Agentes Comunitários)\n   → Formada EXCLUSIVAMENTE por ACS\n   → Visitas domiciliares, coleta de dados, integração dos serviços\n\n   🤝 III → eMulti (Equipe Multiprofissional)\n   → Psicólogos, nutricionistas, fisioterapeutas, assistentes sociais\n   → COMPLEMENTAR às equipes de Saúde da Família\n\n   🦷 IV → eSB (Equipe de Saúde Bucal)\n   → Cirurgião-dentista + auxiliar/técnico em saúde bucal\n   → Pode atuar junto à eSF\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Inverte eSF com eAP e eMulti com EACS\n   B → Coloca eSB no lugar de eSF\n   C → Troca eMulti com EACS\n\n💡 MACETE:\n   eSF = equipe COMPLETA com ACS | EACS = SÓ ACS | eMulti = APOIO multidisciplinar | eSB = DENTES"},
{n:5,disc:true,tema:"Tecnologias em Saúde — Merhy",src:"FASA VIC",context:"(FASA VIC) Uma UBS est\u00e1 localizada em \u00e1rea rural, onde a popula\u00e7\u00e3o enfrenta dificuldades de acesso a servi\u00e7os especializados. A equipe de Sa\u00fade da Fam\u00edlia acompanha um paciente idoso com m\u00faltiplas comorbidades (HAS, DM2, DPOC). Durante uma consulta, o m\u00e9dico utiliza um ecocardiograma port\u00e1til (point-of-care) para avaliar a fun\u00e7\u00e3o card\u00edaca, identificando sinais de insufici\u00eancia card\u00edaca incipiente. Com base nesse diagn\u00f3stico, encaminha para cardiologista na cidade vizinha.",assertions:null,text:"a) Identifique qual tipo de tecnologia em saúde (leve, leve-dura ou dura) foi empregada pelo médico durante o exame do paciente. Justifique. (0,75)\n\nb) Proponha outra ação utilizando o mesmo nível tecnológico, com o objetivo de melhorar o cuidado ao paciente idoso com múltiplas comorbidades. Explique como complementaria o atendimento. (0,75)",opts:[],g:null,exp:"a) Identificação do tipo de tecnologia empregada (0,75):\nO tipo de tecnologia em saúde empregada pelo médico durante o atendimento ao paciente foi a tecnologia dura. Isso se deve ao uso do ecocardiograma portátil (point-of-care), um equipamento de diagnóstico médico, para avaliar a função cardíaca do paciente. O uso de dispositivos tecnológicos como o ecocardiograma caracteriza-se como uma tecnologia dura, pois envolve a aplicação de equipamentos sofisticados para obter dados clínicos que auxiliam no diagnóstico e na tomada de decisões terapêuticas.\n\nb) Proposta de outra ação utilizando o mesmo nível tecnológico (0,75):\nUma ação adicional que poderia ser implementada pelo médico ou pela equipe de Saúde da Família, utilizando o mesmo nível tecnológico (tecnologia dura), seria o monitoramento remoto contínuo dos sinais vitais do paciente, como pressão arterial, níveis de glicose, e saturação de oxigênio, através de dispositivos de telemetria. Esses dispositivos, que o paciente poderia usar em casa, transmitiriam dados em tempo real para a equipe de saúde na UBS, permitindo uma vigilância mais rigorosa das condições de saúde do paciente, especialmente considerando suas múltiplas comorbidades.\n\nEssa medida complementaria o atendimento já realizado ao proporcionar um acompanhamento mais próximo e constante do estado de saúde do paciente, permitindo intervenções mais rápidas em caso de alterações significativas nos parâmetros vitais. Além disso, facilitaria a continuidade do cuidado, mesmo em uma área rural com acesso limitado a serviços especializados, melhorando a capacidade de resposta da equipe de Saúde da Família e potencialmente reduzindo a necessidade de deslocamentos frequentes para consultas presenciais.",deep:"⚙️ TECNOLOGIAS EM SAÚDE — CASO DO PACIENTE IDOSO\n\na) Tecnologia empregada no caso:\n\n   🔧 Tecnologia DURA\n   → Ecocardiograma portátil (point-of-care)\n   → Equipamento de diagnóstico médico\n   → Obtém dados clínicos para diagnóstico e conduta\n\nb) Proposta de outra ação com MESMO nível (tecnologia dura):\n\n   📡 Monitoramento remoto (telemetria)\n   → Dispositivos domiciliares: PA, glicemia, SpO2\n   → Transmissão em tempo real para a equipe\n   → Vigilância contínua sem deslocamento do paciente\n\nComo complementa:\n   → Acompanhamento mais próximo e constante\n   → Intervenções rápidas em caso de alteração\n   → Reduz deslocamentos em área rural\n\nRelembrando a classificação:\n   🤝 Leve → relações (escuta, vínculo, acolhimento)\n   📚 Leve-dura → saberes (protocolos, raciocínio clínico)\n   🔧 Dura → equipamentos (eco, monitor, glicosímetro)\n\n💡 MACETE:\n   Se usa APARELHO/EQUIPAMENTO = tecnologia DURA\n   Point-of-care = tecnologia DURA usada no local de atendimento"},
{n:6,disc:false,tema:"Sistema Fragmentado vs RAS",src:"UNIDEP",context:"(UNIDEP) Durante uma consulta em uma UBS, um paciente com diabetes mellitus tipo 2 relata que j\u00e1 visitou diferentes m\u00e9dicos do SUS, onde cada profissional realizou um tratamento espec\u00edfico para sua condi\u00e7\u00e3o, sem comunica\u00e7\u00e3o entre si. O paciente n\u00e3o recebeu orienta\u00e7\u00e3o sobre como acessar servi\u00e7os de apoio, como nutri\u00e7\u00e3o ou acompanhamento psicol\u00f3gico.",assertions:null,text:"Considerando as características dos sistemas fragmentados e das RAS, assinale a alternativa que melhor descreve a situação:",opts:["Esta situação exemplifica uma rede de atenção integrada, na qual o paciente foi atendido por diferentes profissionais, cada um contribuindo de forma integrada para o tratamento.","Esta situação reflete um sistema fragmentado, uma vez que os diferentes profissionais atuaram de forma isolada, sem coordenação ou continuidade no cuidado.","Esta situação demonstra um sistema centrado no paciente, característico das RAS, onde o paciente recebeu cuidados coordenados sem necessidade de serviços de apoio.","Esta situação reflete um sistema baseado em RAS, pois houve integração entre os diferentes serviços e profissionais envolvidos."],g:1,exp:"A situação apresentada na questão ilustra um sistema de saúde fragmentado. Em sistemas fragmentados, os serviços de saúde são oferecidos de maneira isolada, sem coordenação ou continuidade entre os diferentes níveis de atenção e entre os profissionais envolvidos no cuidado. Isso resulta em uma falta de integração, onde cada profissional ou serviço atua de forma independente, muitas vezes sem compartilhar informações essenciais ou planejar conjuntamente o cuidado do paciente.\n\nNo caso descrito, o paciente com diabetes mellitus tipo 2 passou por diferentes médicos , onde cada um realizou um tratamento específico, mas sem comunicação entre os profissionais ou coordenação do cuidado. Além disso, o paciente não foi orientado sobre o acesso a serviços complementares, como nutrição ou apoio psicológico, o que é característico de um sistema fragmentado.\n\nPor outro lado, nas Redes de Atenção à Saúde (RAS), o cuidado é organizado de forma integrada, com a coordenação entre os diferentes níveis de atenção (primário, secundário, terciário) e entre os diversos profissionais de saúde. As RAS buscam garantir a continuidade do cuidado e o acesso aos serviços necessários, promovendo uma abordagem centrada no paciente. Portanto, a alternativa correta é \"esta situação reflete um sistema fragmentado, uma vez que os diferentes profissionais de saúde atuaram de forma isolada, sem coordenação ou continuidade no cuidado do paciente\", pois reflete a realidade de um sistema fragmentado, em contraste com as características das RAS.",deep:"🔗 SISTEMA FRAGMENTADO vs REDES DE ATENÇÃO À SAÚDE (RAS)\n\nO caso descreve um SISTEMA FRAGMENTADO:\n   ❌ Vários médicos, sem comunicação entre si\n   ❌ Cada um fez tratamento isolado\n   ❌ Sem orientação sobre serviços de apoio (nutrição, psicologia)\n   ❌ Sem coordenação ou continuidade do cuidado\n\nSistema FRAGMENTADO:\n   → Serviços isolados\n   → Sem troca de informações\n   → Foco na doença, não na pessoa\n   → Cuidado episódico e reativo\n\nRAS (Rede de Atenção à Saúde):\n   → Serviços integrados e coordenados\n   → APS como centro de comunicação\n   → Continuidade do cuidado entre níveis\n   → Abordagem centrada no paciente\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Não houve integração entre os profissionais\n   C → Não houve coordenação nem cuidado centrado no paciente\n   D → Não houve integração entre serviços\n\n💡 MACETE:\n   Vários médicos SEM conversar entre si = FRAGMENTADO\n   RAS = todos os serviços CONECTADOS com a APS coordenando"},
{n:7,disc:false,tema:"Diretrizes da PNAB — Integralidade",src:"FACIMPA",context:"(FACIMPA) Em uma comunidade rural, a unidade de sa\u00fade local enfrenta desafios. Os moradores relatam que, apesar de receberem atendimento m\u00e9dico para queixas imediatas, frequentemente s\u00e3o encaminhados para centros urbanos distantes para exames e tratamentos especializados. Al\u00e9m disso, sentem que suas necessidades n\u00e3o est\u00e3o sendo consideradas, resultando em atendimento fragmentado, com profissionais focando em aspectos m\u00e9dicos e ignorando preocupa\u00e7\u00f5es emocionais e sociais.\n\nI - O princ\u00edpio da integralidade est\u00e1 sendo descumprido, uma vez que os servi\u00e7os de sa\u00fade n\u00e3o est\u00e3o sendo oferecidos de forma abrangente e considerando todas as necessidades dos pacientes.\nII - O cuidado centrado na pessoa est\u00e1 sendo obedecido, visto que a equipe prioriza o atendimento m\u00e9dico, n\u00e3o levando em considera\u00e7\u00e3o as demais necessidades dos usu\u00e1rios.\nIII - A diretriz da resolutividade est\u00e1 sendo atendida, pois a equipe est\u00e1 priorizando o atendimento m\u00e9dico e encaminhando o usu\u00e1rio para a unidade que forne\u00e7a o servi\u00e7o necess\u00e1rio, mesmo sem certifica\u00e7\u00e3o que o usu\u00e1rio ter\u00e1 condi\u00e7\u00f5es de chegar ao local.",assertions:null,text:"É correto o que se afirma em:",opts:["Somente I e III estão corretas.","I, II e III estão corretas.","Somente II e III estão corretas.","Somente I está correta."],g:3,exp:"Na situação descrita, o princípio da integralidade está sendo descumprido, uma vez que os serviços de saúde não estão sendo oferecidos de forma abrangente e considerando todas as necessidades dos pacientes. Além disso, a diretriz da resolutividade e o cuidado centrado na pessoa também não estão sendo atendidos, já que os moradores são frequentemente encaminhados para outros centros de saúde para exames e tratamentos especializados, em vez de terem suas demandas resolvidas de maneira eficaz na própria unidade de saúde local e não é priorizado as preocupações e necessidades sociais dos usuários. Ambos os aspectos são fundamentais para a efetivação da Atenção Básica de qualidade conforme a Política Nacional estabelecida na Portaria 2436/2017.",deep:"⚖️ PRINCÍPIOS DA PNAB — CASO DA COMUNIDADE RURAL\n\nAnálise das assertivas:\n\n   ✅ I — CORRETA: Integralidade descumprida\n   → Serviços não consideram TODAS as necessidades\n   → Encaminhamentos sem acompanhamento\n   → Preocupações emocionais e sociais ignoradas\n\n   ❌ II — INCORRETA: Cuidado centrado na pessoa NÃO está sendo obedecido\n   → A equipe IGNORA necessidades emocionais e sociais\n   → Focar só no aspecto médico ≠ cuidado centrado na pessoa\n\n   ❌ III — INCORRETA: Resolutividade NÃO está sendo atendida\n   → Encaminhar sem garantir acesso ≠ ser resolutivo\n   → Não verificar se o paciente consegue chegar ao local = falha\n\nSomente I está correta\n\n💡 MACETE:\n   Integralidade = considerar o TODO (biológico + psicológico + social)\n   Cuidado centrado na pessoa = ouvir e respeitar o paciente como um todo\n   Resolutividade = RESOLVER o problema, não só encaminhar"},
{n:8,disc:false,tema:"Condições Crônicas vs Agudas",src:"UNIDEP",context:"(UNIDEP) Luiz, 68 anos, com hipertens\u00e3o arterial sist\u00eamica e diabetes. Ao longo do \u00faltimo ano, buscou a UBS m\u00faltiplas vezes devido a complica\u00e7\u00f5es (crises hipertensivas e epis\u00f3dios de hiperglicemia). Para al\u00e9m das crises, o acompanhamento m\u00e9dico tem sido irregular, com consultas espa\u00e7adas e pouca orienta\u00e7\u00e3o sobre a gest\u00e3o cont\u00ednua de sua condi\u00e7\u00e3o.",assertions:null,text:"Selecione a alternativa que melhor descreve a resposta do sistema de saúde e a natureza da condição de saúde do paciente:",opts:["A condição é aguda, e o sistema responde de maneira proativa e contínua, com foco na prevenção de complicações.","A condição é crônica, e o sistema responde de maneira proativa e contínua, garantindo acompanhamento regular e preventivo.","A condição é crônica, e o sistema responde de maneira reativa e episódica, concentrando-se no tratamento das complicações quando elas ocorrem.","A condição é aguda, e o sistema responde de maneira reativa e episódica, lidando com os sintomas à medida que surgem."],g:2,exp:"A situação apresentada na questão descreve um paciente com condições crônicas, como hipertensão e diabetes mellitus, que não são bem controladas e resultam em internações frequentes. A condição crônica exige um cuidado contínuo e proativo para evitar complicações e manter o controle da doença. No entanto, o sistema de saúde, conforme descrito no caso, está respondendo de maneira reativa e episódica, intervindo apenas quando as complicações surgem, como durante crises hipertensivas ou episódios de hiperglicemia, em vez de fornecer um acompanhamento regular e preventivo.\n\nEssa abordagem reativa e episódica é inadequada para condições crônicas, pois tende a focar no tratamento das complicações, em vez de prevenir sua ocorrência por meio de um cuidado contínuo. Idealmente, o sistema de saúde deveria adotar uma resposta proativa e contínua para gerenciar de maneira eficaz as condições crônicas do paciente, oferecendo consultas regulares, educação sobre o autocuidado, e intervenções preventivas para evitar internações e complicações graves.",deep:"📊 CONDIÇÕES DE SAÚDE vs RESPOSTA DO SISTEMA — MODELO DE MENDES\n\nO caso do Luiz (68 anos, HAS + DM2):\n\n   Condição de saúde → CRÔNICA\n   → Hipertensão + Diabetes = doenças de longa duração\n   → Exigem acompanhamento contínuo e proativo\n\n   Resposta do sistema → REATIVA e EPISÓDICA\n   → Atende só nas crises (hipertensiva, hiperglicemia)\n   → Acompanhamento irregular, consultas espaçadas\n   → Sem gestão contínua da condição crônica\n\nO ideal seria:\n   → Resposta PROATIVA e CONTÍNUA\n   → Consultas regulares programadas\n   → Educação sobre autocuidado\n   → Intervenções preventivas\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → NÃO é condição aguda (é crônica) e NÃO é proativo\n   B → O sistema NÃO está sendo proativo (é reativo)\n   D → NÃO é condição aguda (HAS e DM2 são crônicas)\n\n💡 MACETE:\n   Crônica + Proativa/Contínua = IDEAL (acompanhamento regular)\n   Crônica + Reativa/Episódica = PROBLEMA (só apaga incêndios)"},
{n:9,disc:false,tema:"Níveis de Atenção — Encaminhamento",src:"",context:"Gestante, 33 anos, durante uma consulta de pr\u00e9-natal na Unidade de Sa\u00fade da Fam\u00edlia em seu bairro, levou resultados de exames laboratoriais e de imagem para serem avaliados, onde o m\u00e9dico constatou algumas altera\u00e7\u00f5es, essas que enquadraram a paciente em pr\u00e9-natal de alto risco, evidenciando que ela deveria passar por avalia\u00e7\u00e3o com a especializada, sendo ent\u00e3o encaminhada para o Obstetra.",assertions:null,text:"Com base no relato, identifique o nível de atenção a qual a gestante foi referenciada:",opts:["Atenção secundária.","Atenção quaternária.","Atenção terciária.","Atenção primária."],g:0,exp:"A atenção secundária é responsável por serviços especializados voltados para a resolução de problemas de saúde mais complexos, que necessitam de cuidados especializados e intervenção de médicos especialistas. No caso da gestante que foi encaminhada para avaliação com o Obstetra devido às alterações detectadas nos exames, o atendimento especializado fornecido pelo Obstetra se enquadra no nível de atenção secundária. Esse nível de atenção é intermediário entre a atenção primária, fornecida em Unidades Básicas de Saúde, e a atenção terciária, que abrange procedimentos altamente especializados e tratamentos avançados em hospitais de referência. Portanto, a resposta correta é a Atenção secundária.",deep:"🤰 NÍVEIS DE ATENÇÃO — CASO DA GESTANTE\n\nPercurso da paciente:\n   → USF (Atenção Primária): pré-natal de rotina, exames\n   → Obstetra (Atenção Secundária): avaliação especializada de alto risco\n\nA gestante foi REFERENCIADA para a Atenção Secundária:\n   → Consulta com especialista (obstetra)\n   → Não foi para hospital nem UTI (terciária)\n   → Não voltou para a APS (primária)\n\nNíveis resumidos:\n   🟢 Primária → UBS/USF (porta de entrada)\n   🟡 Secundária → Ambulatórios especializados, consultas com especialistas\n   🔴 Terciária → Hospital de referência, UTI, cirurgias complexas\n\n❌ POR QUE AS OUTRAS ERRAM:\n   B → Atenção quaternária: proteção contra iatrogenias (conceito diferente)\n   C → Atenção terciária: hospitais de alta complexidade\n   D → Atenção primária: é de onde ela VEIO, não para onde foi\n\n💡 MACETE:\n   Encaminhamento para ESPECIALISTA = SECUNDÁRIA\n   Internação/cirurgia em hospital de referência = TERCIÁRIA"},
{n:10,disc:false,tema:"Diretrizes da PNAB — Universalidade e Integralidade",src:"AFYA Paraíba",context:"(AFYA Para\u00edba) Sr. Martin\u00eas vive nas ruas desde que foi expulso de seu lar, porque seus pais descobriram que fazia uso de drogas il\u00edcitas. Foi abordado por uma moradora do territ\u00f3rio, que sugeriu que procurasse a USF, j\u00e1 que ele est\u00e1 com uma ferida no p\u00e9 esquerdo h\u00e1 mais de uma semana e referiu ser diab\u00e9tico. O mesmo relatou que n\u00e3o tem cart\u00e3o do SUS ou documentos e pode n\u00e3o ser atendido.\n\nI. A Aten\u00e7\u00e3o Prim\u00e1ria \u00e9 a porta de entrada preferencial de acesso aos servi\u00e7os do SUS.\nPORQUE\nII. A Aten\u00e7\u00e3o Prim\u00e1ria deve garantir o acesso universal e a integralidade na assist\u00eancia, mediante todas as necessidades da popula\u00e7\u00e3o.",assertions:null,text:"A respeito dessas asserções, assinale a opção correta:",opts:["As asserções I e II são proposições verdadeiras, e a II é uma justificativa da I.","A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.","As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa da I.","A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."],g:0,exp:"I e II são verdadeiras e a II justifica a I.\n\nMesmo o usuário sendo morador de rua, sem cartão SUS e documentos, ele deve ser atendido pela USF e garantido o acesso universal e a integralidade do cuidado, isso justifica a USF ser porta de entrada preferencial do SUS.\n\nO processo de trabalho na Atenção Primária à Saúde (APS) envolve várias etapas que visam garantir a promoção da saúde, a prevenção de doenças e o atendimento integral ao paciente. O primeiro contato do usuário com o sistema de saúde, onde são avaliadas suas necessidades e prioridades. O acolhimento é fundamental para estabelecer um vínculo e garantir que o paciente se sinta respeitado e ouvido.",deep:"📜 APS COMO PORTA DE ENTRADA — UNIVERSALIDADE E INTEGRALIDADE\n\nAnálise das asserções:\n\n   ✅ I — VERDADEIRA\n   → A APS é a porta de entrada preferencial do SUS\n   → Portaria 2.436/2017\n\n   ✅ II — VERDADEIRA\n   → A APS deve garantir acesso universal e integralidade\n   → Atender a TODAS as necessidades, sem restrição\n\n   🔗 II JUSTIFICA I\n   → A APS é porta de entrada PORQUE garante acesso universal e integral\n   → Mesmo sem cartão SUS ou documentos, o usuário DEVE ser atendido\n\nCaso do Sr. Martinês:\n   → Morador de rua, sem documentos, sem cartão SUS\n   → Deve ser acolhido e atendido pela USF\n   → Universalidade: acesso a TODOS, sem exceção\n   → Integralidade: cuidar da ferida + diabetes + vulnerabilidade social\n\n❌ POR QUE AS OUTRAS ERRAM:\n   B → I não é falsa (é verdadeira)\n   C → II justifica I (são conectadas)\n   D → II não é falsa (é verdadeira)\n\n💡 MACETE:\n   SUS = acesso UNIVERSAL → não importa se tem documento ou não\n   USF deve atender QUALQUER pessoa do território"}
];

const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp.replace(/\n/g,'<br>')+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}

function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}

  <script>
const PROVA_ID = 'iesc2-2024-2';
const PERIODO = 2;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

// ── localStorage ──
function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Supabase ──
const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

// ── Interceptar uma vez só ──
const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

// ── Restaurar estado ──
if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
</script>
