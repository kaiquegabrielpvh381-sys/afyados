<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:190px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>

{n:1,disc:false,tema:"Transmissão de Doenças Infecciosas",context:"( AFYA IPATINGA) Você é um estudante de medicina em estágio na Unidade Básica de Saúde (UBS) e está atendendo uma gestante de 28 anos que apresenta sintomas de febre, dor de cabeça, e manchas vermelhas na pele. Ela relata que esteve em contato recente com uma criança que foi diagnosticada com uma infecção viral. Durante a consulta, a paciente menciona estar preocupada com a possibilidade de transmissão para o feto.\n\nCom base na situação descrita, analise as afirmativas abaixo.\n\nI. A porta de entrada dessa infecção para o feto seria a via gastrintestinal.\nII. A infecção pode ser transmitida verticalmente da mãe para o feto através da placenta.\nIII. Trata-se de uma transmissão indireta, na qual o vírus é transmitido por meio de gotículas.\nIV. A infecção pode ser transmitida horizontalmente através de secreções respiratórias em gotículas.",assertions:null,text:"É correto o que se afirma em",opts:["III e IV, apenas.","II e IV, apenas.","I e III, apenas.","I e II, apenas."],g:1,exp:"Está correto o que se afirma nas asserções II e IV, apenas.\n\nI. A porta de entrada dessa infecção para o feto seria a via gastrintestinal (errada).\nA via gastrointestinal não é a porta de entrada correta para a infecção do feto. Em infecções virais com potencial para transmissão vertical (da mãe para o feto), a porta de entrada do vírus no feto é através da corrente sanguínea, não pelo trato gastrointestinal.\n\nII. A infecção pode ser transmitida verticalmente da mãe para o feto através da placenta.\nA infecção viral pode ser transmitida da mãe para o feto por via transplacentária, caracterizando um mecanismo de transmissão vertical. Isso é comum em várias infecções virais, como o vírus da rubéola e o citomegalovírus (CMV).\n\nIII. Trata-se de uma transmissão indireta, na qual o vírus é transmitido por meio de gotículas (errada).\nA transmissão por gotículas é um exemplo de transmissão direta e não indireta. A transmissão direta ocorre quando o vírus é transmitido diretamente de uma pessoa infectada para outra através de gotículas respiratórias, expelidas ao falar, tossir ou espirrar.\n\nIV. A infecção pode ser transmitida horizontalmente através de secreções respiratórias em gotículas.\nA transmissão horizontal ocorre entre indivíduos de uma mesma geração, e muitas infecções virais são transmitidas através de secreções respiratórias em gotículas, como é o caso da gripe, sarampo e COVID-19.",deep:"🦠 VIAS DE TRANSMISSÃO\n\n✅ II — Transmissão VERTICAL:\n→ Mãe → feto via placenta (transplacentária)\n→ Exemplos: rubéola, CMV, HIV, toxoplasmose\n→ Porta de entrada no feto: corrente SANGUÍNEA (não gastrointestinal)\n\n✅ IV — Transmissão HORIZONTAL por gotículas:\n→ Entre indivíduos da mesma geração\n→ Gotículas respiratórias = transmissão DIRETA\n→ Exemplos: gripe, sarampo, COVID-19\n\n❌ I: Via gastrointestinal NÃO é porta de entrada fetal\n❌ III: Transmissão por gotículas é DIRETA (não indireta)\n\nDireta vs Indireta:\n→ Direta: contato pessoa-pessoa (gotículas, toque)\n→ Indireta: vetores, objetos contaminados (fômites), água"},
{n:2,disc:false,tema:"Boxplot — Quartis e Outliers",context:"( FMIT) A figura a seguir apresenta resultados de uma pesquisa que aplicou uma escala de sintomas depressivos em pacientes com Parkinson (n = 30) e voluntários saudáveis (n = 30).\n\n[[IMG_Q2]]",assertions:null,text:"Analise as alternativas e identifique aquela que contém a interpretação correta da figura acima.",opts:["O quartil 1 do grupo Pacientes com Parkinson tem valor superior ao quartil 3 do grupo Voluntários Saudáveis.","A mediana do grupo Pacientes com Parkinson tem valor superior ao limite superior do grupo Voluntários Saudáveis.","O dado de menor valor para o grupo de Pacientes com Parkinson tem valor aproximado de 4.","O quartil 2 do grupo Pacientes com Parkinson e o limite superior do grupo Voluntários Saudáveis têm valores iguais."],g:0,exp:"Resposta Correta: \"O quartil 1 do grupo Pacientes tem valor superior ao quartil 3 do grupo Voluntários Saudáveis.\". A afirmação está correta, porque o quartil 1 do grupo Pacientes tem valor aproximado de 6; o quartil 3 do grupo Voluntários Saudáveis tem valor aproximado de 5.\n\nDistratores:\n\"A mediana do grupo Pacientes com Parkinson tem valor superior ao limite superior do grupo Voluntários Saudáveis.\". A afirmação está errada porque a mediana do grupo Pacientes tem valor próximo de 7; o limite superior do grupo Voluntários Saudáveis tem valor próximo de 8.\n\n\"O dado de menor valor para o grupo de Pacientes com Parkinson tem valor aproximado de 4.\". A afirmação está errada, porque o dado de menor valor do grupo Pacientes com Parkinson é aproximadamente 3, ou seja, o valor do outlier.\n\n\"O quartil 2 do grupo Pacientes com Parkinson e o limite superior do grupo Voluntários Saudáveis têm valores iguais.\". A afirmação está errada, porque o quartil 2 (mediana) do grupo Pacientes tem valor aproximado de 7; o limite superior do grupo Voluntários Saudáveis tem valor aproximado de 8.",deep:"📊 BOXPLOT — LEITURA DETALHADA\n\nValores aproximados (Parkinson vs Saudáveis):\n→ Q1: ~6 vs ~3 ✓ (Q1 Parkinson > Q3 Saudáveis)\n→ Mediana: ~7 vs ~4\n→ Q3: ~8 vs ~5\n→ Bigode superior: ~10 vs ~7\n→ Outlier Parkinson: ~3 (inferior) | Outlier Saudáveis: ~8 (superior)\n\n✅ A — CORRETA:\nQ1 Parkinson (≈6) > Q3 Saudáveis (≈5)\n\n❌ B: Mediana Parkinson (≈7) < Limite superior Saudáveis (≈7-8)\n❌ C: Menor valor Parkinson = outlier ≈3 (não 4)\n❌ D: Q2 Parkinson (≈7) ≠ Limite superior Saudáveis (≈8)\n\n💡 Estrutura do Boxplot:\n→ Q1 = 1º quartil (25%) = borda inferior da caixa\n→ Q2 = mediana (50%) = linha central\n→ Q3 = 3º quartil (75%) = borda superior da caixa\n→ Bigodes = min/max sem outliers\n→ Círculo fora dos bigodes = OUTLIER"},
{n:3,disc:false,tema:"Medidas de Dispersão — Cafeína e IMC",context:"( UNIGRANRIO BARRA) Considere o trecho abaixo, extraído de um artigo científico que investigou a relação entre a qualidade do sono e fatores como o consumo de cafeína e o Índice de Massa Corporal (IMC):\n\n\"O estudo foi conduzido com 220 indivíduos, utilizando o índice de qualidade do sono de Pittsburgh (PSQI), além de coleta de dados antropométricos e avaliação do consumo de cafeína. O consumo de cafeína variou de 4 mg a 425,40 mg, com uma média de 108,26 mg e desvio padrão de 88,91 mg. O IMC médio foi de 24,65 kg/m², com desvio padrão de 4,64 kg/m², e os valores variaram entre 16,4 kg/m² e 44,6 kg/m².\"\n\nCom base nas medidas de tendência central e dispersão apresentadas, analise as seguintes afirmativas:\n\nI. A média de 108,26 mg de consumo de cafeína indica que a maioria dos indivíduos consome uma quantidade moderada de cafeína, o que pode ter impacto na qualidade do sono.\n\nII. O desvio padrão de 88,91 mg no consumo de cafeína indica uma grande variabilidade entre os indivíduos, com a maioria consumindo quantidades muito baixas ou muito altas.\n\nIII. A amplitude de 28,2 kg/m² no IMC (diferença entre o valor mínimo e o máximo) reflete uma grande diversidade de perfis corporais na amostra, o que pode influenciar a análise da relação entre IMC e qualidade do sono.\n\nIV. A mediana do consumo de cafeína não pode ser determinada a partir dos dados fornecidos, mas considerando a média e o desvio padrão, é provável que a distribuição do consumo de cafeína seja assimétrica.",assertions:null,text:"Estão corretas somente as afirmativas",opts:["I e II.","I e IV.","III e IV.","II e III."],g:2,exp:"Estas corretas somente as afirmativas III e IV.\n\nI. Incorreta. A média de 108,26 mg de consumo de cafeína não permite inferir se a maioria dos indivíduos consome uma quantidade moderada, especialmente devido ao grande desvio padrão, que indica variabilidade significativa.\n\nII. Incorreta. Embora o desvio padrão de 88,91 mg mostre variabilidade, ele por si só não permite afirmar que a maioria dos indivíduos consome quantidades muito baixas ou muito altas. Para uma afirmação mais precisa seria necessário analisar a distribuição completa dos dados ordenados.\n\nIII. Correta. A amplitude de 28,2 kg/m² no IMC indica uma variação significativa nos perfis corporais dos indivíduos, o que pode influenciar a análise das correlações entre IMC e qualidade do sono.\n\nIV. Correta. A mediana não pode ser determinada com os dados fornecidos. Além disso, considerando que o desvio padrão é alto em relação à média, é possível que a distribuição seja assimétrica, com alguns valores muito altos ou muito baixos influenciando a média.",deep:"📊 ANÁLISE DAS AFIRMATIVAS\n\nDados: cafeína (média=108,26, DP=88,91, min=4, máx=425,40)\nIMC (média=24,65, DP=4,64, min=16,4, máx=44,6)\n\n❌ I — INCORRETA:\nDP alto (88,91) → grande variabilidade\nA média NÃO permite inferir que a maioria consome quantidade moderada\n\n❌ II — INCORRETA:\nDP alto indica variabilidade, mas não permite afirmar que a MAIORIA consome extremos\nIsso exigiria analisar a distribuição completa\n\n✅ III — CORRETA:\nAmplitude IMC = 44,6 - 16,4 = 28,2 kg/m²\nGrande amplitude → grande diversidade de perfis corporais ✓\n\n✅ IV — CORRETA:\nMediana não calculável sem dados ordenados\nDP/média = 88,91/108,26 ≈ 82% → distribuição possivelmente assimétrica ✓"},
{n:4,disc:true,tema:"Amostragem em Bola de Neve",context:"( UNITPAC) Um estudo foi realizado com o objetivo de investigar os hábitos alimentares de estudantes universitários de uma grande cidade. Para a coleta de dados, os pesquisadores selecionaram um grupo inicial de 10 alunos de uma universidade local. Esses estudantes, por sua vez, indicaram outros colegas que atendessem aos critérios do estudo, e o processo continuou até que não surgissem mais novos indicados. A coleta de dados foi encerrada quando os pesquisadores perceberam que os novos participantes indicados não traziam mais informações inéditas sobre o objeto de estudo.",assertions:null,text:"A) Identifique o tipo de amostragem utilizado neste estudo. (0,75 pontos)\n\nB) Descreva as características desse tipo de amostragem, justificando seu uso no contexto apresentado. (0,75 pontos)",opts:[],g:null,exp:"Letra A (0,75 pontos):\nO tipo de amostragem utilizado neste estudo é a amostragem em bola de neve (ou snowball sampling).\n\nLetra B (0,75 pontos):\nA amostragem em bola de neve é um tipo de amostragem não probabilística, caracterizada pelo processo em que os participantes iniciais de um estudo indicam novos participantes, que, por sua vez, indicam outros, formando uma cadeia de indicações. Esse processo continua até que se alcance um ponto de saturação, onde as novas indicações não trazem informações novas ou relevantes para o estudo.\n\nEste tipo de amostragem é particularmente útil em situações em que os membros da população-alvo são difíceis de localizar ou identificar, como grupos minoritários, populações vulneráveis, ou pessoas com comportamentos específicos (ex.: usuários de drogas, trabalhadores informais, etc.). No contexto apresentado, o uso da amostragem em bola de neve foi justificado, pois os hábitos alimentares de estudantes podem ser explorados a partir das redes sociais e indicações entre os próprios colegas, facilitando a coleta de dados em uma população que poderia ser difícil de acessar por meio de métodos tradicionais. Além disso, o estudo atingiu o ponto de saturação, no qual a coleta de novas informações deixou de ser produtiva, sugerindo que o tamanho amostral atingido foi adequado para os objetivos da pesquisa.",deep:"⛄ AMOSTRAGEM EM BOLA DE NEVE (Snowball Sampling)\n\nCaracterísticas:\n→ Tipo: NÃO PROBABILÍSTICA\n→ Participantes iniciais indicam novos participantes\n→ Cadeia de indicações em cascata\n→ Encerra no ponto de SATURAÇÃO (sem novas informações)\n\nQuando usar:\n→ Populações de difícil acesso\n→ Grupos minoritários ou vulneráveis\n→ Comportamentos específicos (ex.: usuários de drogas)\n→ Quando não existe lista da população-alvo\n\nVantagens:\n→ Acessa populações ocultas\n→ Baixo custo\n→ Útil em pesquisa qualitativa\n\nLimitações:\n→ Viés de seleção (rede social similar)\n→ Não permite generalização probabilística\n→ Dependência da rede do participante inicial"},
{n:5,disc:false,tema:"Taxa de Mortalidade — Cálculo",context:"( UNIDEP) Nos anos de 2000 e 2022, o Brasil registrou significativas mudanças na taxa de mortalidade entre a população idosa (pessoas com 60 anos ou mais). Em 2000, foram registrados aproximadamente 522.000 óbitos de idosos, enquanto em 2022 o número de óbitos foi de cerca de 1.098.000. A população idosa no Brasil era de 14.500.000 em 2000 e aumentou para 32.000.000 em 2022.",assertions:null,text:"Considerando as informações acima, a taxa de mortalidade (óbitos por 1.000 habitantes) no Brasil para 2000 e 2022, respectivamente foi de",opts:["36,0 por 1.000 habitantes em 2000 e 34,3 por 1.000 habitantes em 2022.","37,0 por 1.000 habitantes em 2000 e 34,0 por 1.000 habitantes em 2022.","36,0 por 1.000 habitantes em 2000 e 35,1 por 1.000 habitantes em 2022.","36,0 por 1.000 habitantes em 2000 e 33,2 por 1.000 habitantes em 2022."],g:0,exp:"Para determinar a taxa de mortalidade em ambos os anos, usamos a seguinte fórmula: Taxa de mortalidade é igual ao número de óbitos dividido pela população total, multiplicado por 1.000.\n\nAplicando essa fórmula para cada ano:\n\nPara o ano 2000:\nA taxa de mortalidade em 2000 é igual ao número de óbitos (522.000) dividido pela população total (14.500.000), multiplicado por 1.000, resultando em 36,0 óbitos por 1.000 habitantes.\n\nPara o ano 2022:\nA taxa de mortalidade em 2022 é igual ao número de óbitos (1.098.000) dividido pela população total (32.000.000), multiplicado por 1.000, resultando em 34,3 óbitos por 1.000 habitantes.\n\nPortanto, a taxa de mortalidade (óbitos por 1.000 habitantes) no Brasil para 2000 e 2022, respectivamente foi de 36,0 por 1.000 habitantes em 2000 e 34,3 por 1.000 habitantes em 2022.",deep:"🧮 TAXA DE MORTALIDADE — RESOLUÇÃO\n\nFórmula:\nTaxa de Mortalidade = (Óbitos / População) × 1.000\n\nAno 2000:\n= (522.000 / 14.500.000) × 1.000\n= 0,036 × 1.000\n= 36,0 óbitos por 1.000 hab ✓\n\nAno 2022:\n= (1.098.000 / 32.000.000) × 1.000\n= 0,034375 × 1.000\n= 34,3 óbitos por 1.000 hab ✓\n\nInterpretação:\nApesar do NÚMERO ABSOLUTO de óbitos ter aumentado (522k → 1.098k),\na TAXA de mortalidade DIMINUIU (36,0 → 34,3)\n→ Porque a população idosa cresceu proporcionalmente mais\n→ Isso demonstra a importância de usar taxas (relativas) vs dados brutos (absolutos)"},
{n:6,disc:false,tema:"Epidemiologia — Dados Brutos vs Taxas",context:"( AFYA CRUZEIRO DO SUL) De acordo com o Boletim Epidemiológico das Arboviroses número 11, publicado em Julho de 2024 pelo Ministério da Saúde, no período entre as Semanas Epidemiológicas 1 e 26 de 2024 (janeiro a junho no calendário convencional), foram confirmados 4.269 óbitos por dengue no Brasil. Destes, o maior número de óbitos ocorreu na região Sudeste (2.247), seguida pelas regiões Sul (1.077), Centro-Oeste (766), Nordeste (155) e Norte (24).\n\nAnalise as afirmações abaixo sobre a informação apresentada no referido boletim epidemiológico:\n\nI. A letalidade para dengue no período foi maior na região Sudeste, quando comparada com as demais regiões.\n\nII. A taxa de mortalidade para dengue no período foi menor na região Sul, quando comparado com o Sudeste.\n\nIII. Mesmo somando os óbitos de todas as outras regiões, o número de óbitos ainda é maior na região Sudeste.",assertions:null,text:"Está correto o que se afirma em",opts:["I, apenas.","II e III.","II, apenas.","III, apenas."],g:3,exp:"Os dados disponibilizados no enunciado são os números de óbitos por região, estes são dados brutos, baseados apenas nos registros quantitativos de óbitos do Ministério da Saúde no período indicado. A letalidade e a taxa de mortalidade inclui dados relativos e não brutos. Para calcular a letalidade precisamos dividir o números de óbitos pelo número de pessoas doentes e para calcular a taxa de mortalidade precisamos dividir o número de óbitos pelo número de pessoas expostas à doença, multiplicando o resultado por uma constante em ambos os casos, para que os dados sejam comparáveis entre as diferentes regiões.\n\nAssim, a única asserção correta é aquela que afirma que \"Mesmo somando os óbitos de todas as outras regiões, o número de óbitos ainda é maior na região Sudeste.\", já que esta é a única das asserções que compara os dados brutos apresentados no enunciado, ou seja, o número de óbitos, fazendo uso de valores absolutos.",deep:"📊 DADOS BRUTOS vs MEDIDAS RELATIVAS\n\nDados disponíveis (NÚMEROS ABSOLUTOS):\n→ Sudeste: 2.247 | Sul: 1.077 | Centro-Oeste: 766\n→ Nordeste: 155 | Norte: 24 | Total: 4.269\n\n✅ III — CORRETA:\nOutras regiões: 1.077+766+155+24 = 2.022\n2.247 (Sudeste) > 2.022 (demais somadas) ✓\nComparação direta de dados BRUTOS — válida\n\n❌ I — ERRADA:\nLetalidade = óbitos / pessoas DOENTES × k\nO enunciado NÃO fornece o número de casos por região\nNão é possível calcular a letalidade\n\n❌ II — ERRADA:\nTaxa de mortalidade = óbitos / população exposta × k\nO enunciado NÃO fornece a população de cada região\nNão é possível calcular a taxa\n\n💡 MACETE:\nSó compare TAXAS entre regiões — nunca números absolutos\nNúmeros absolutos são influenciados pelo tamanho da população"},
{n:7,disc:false,tema:"História da Epidemiologia",context:"( AFYA GARANHUNS) A epidemiologia, como ciência, tem suas raízes em estudos e intervenções históricas realizadas por pioneiros que enfrentaram epidemias e promoveram avanços no conhecimento sobre a dinâmica das doenças.\n\nCom base nessas informações, analise as afirmações sobre as contribuições desses epidemiologistas a seguir:\n\nI. John Snow é conhecido por sua investigação sobre a epidemia de cólera em Londres, na qual utilizou um mapa para associar os casos da doença ao consumo de água de uma bomba pública contaminada, estabelecendo assim a base para a epidemiologia moderna e a ideia de transmissão de doenças por vias hídricas.\n\nII. William Farr foi um dos primeiros a defender a teoria miasmática das doenças e a utilizar estatísticas vitais para correlacionar mortalidade com condições ambientais, contribuindo para a sistematização de dados epidemiológicos, embora suas conclusões divergissem das de John Snow sobre a cólera.\n\nIII. Carlos Chagas descobriu a doença que leva seu nome ao identificar o ciclo completo de transmissão da doença de Chagas, envolvendo o vetor, o agente patogênico e o hospedeiro humano, o que foi crucial para o entendimento da dinâmica de doenças tropicais.\n\nIV. Oswaldo Cruz foi um dos responsáveis pela criação do Instituto Butantan, no qual ele realizava o tratamento de acidentes com animais peçonhentos a partir do desenvolvimento do soro antiofídico, revolucionando a ciência e saúde mundial.",assertions:null,text:"Com base no enunciado, estão corretas as informações sobre o histórico da epidemiologia apresentados nas afirmativas.",opts:["I, II e III.","I, II, III e IV.","I, II e IV.","I, III e IV."],g:0,exp:"Está correto o que se afirma em I, II e III.\n\nCada uma das afirmativas destaca contribuições importantes para o desenvolvimento da epidemiologia como ciência. John Snow é reconhecido por seu trabalho pioneiro na identificação da fonte de uma epidemia de cólera, usando análise espacial. William Farr avançou a epidemiologia com seu sistema de registros vitais. Carlos Chagas descobriu o ciclo completo da doença de Chagas. Já o desenvolvimento do soro antiofídico foi feito por Vital Brazil. Oswaldo Cruz foi fundamental para a saúde pública no Brasil com suas campanhas de saneamento e implementação de medidas de controle da febre amarela no Rio de Janeiro.",deep:"🏛️ HISTÓRIA DA EPIDEMIOLOGIA\n\n✅ I — John Snow (1813-1858):\n→ Epidemia de cólera em Londres (1854)\n→ Usou mapa para associar casos à bomba da Broad Street\n→ Base da epidemiologia moderna e epidemiologia espacial\n→ Estabeleceu transmissão hídrica da cólera (contra teoria miasmática)\n\n✅ II — William Farr (1807-1883):\n→ Defendia teoria miasmática (diferia de Snow)\n→ Criou sistema de registros vitais e estatísticas\n→ Correlacionou mortalidade com condições ambientais\n\n✅ III — Carlos Chagas (1879-1934):\n→ Descobriu a doença de Chagas (1909)\n→ Identificou: vetor (barbeiro), agente (T. cruzi) e hospedeiro\n→ Único a descobrir doença COMPLETA (etiologia, vetor, patologia)\n\n❌ IV — ERRADA:\n→ Instituto Butantan e soro antiofídico → VITAL BRAZIL (não Oswaldo Cruz)\n→ Oswaldo Cruz → campanhas de saneamento e controle da febre amarela no Rio"},
{n:8,disc:true,tema:"Endemia e Surto — Cenários",context:"( UNIPTAN) Utilize sua criatividade para desenvolver DOIS cenários fictícios que ilustram diferentes conceitos epidemiológicos. Certifique-se de explicar como o conceito se aplica ao cenário que você criou.\n\na) Cenário 1: Crie um cenário que exemplifique o conceito de endemia. Explique detalhadamente como o evento ocorreu, as causas envolvidas, e as medidas tomadas para controlar a situação. Justifique por que o seu exemplo se encaixa no conceito escolhido. (0,75 pontos)\n\nb) Cenário 2: Crie um cenário que exemplifique o conceito de surto. Explique detalhadamente como o evento ocorreu, as causas envolvidas, e as medidas tomadas para controlar a situação. Justifique por que o seu exemplo se encaixa no conceito escolhido. (0,75 pontos)",assertions:null,text:"Desenvolva os dois cenários conforme solicitado acima.",opts:[],g:null,exp:"O importante é que o aluno apresente corretamente cenários que exemplifiquem tanto uma situação de endemia quanto uma de surto, justificando seus exemplos. As doenças apresentadas não precisam ser as mesmas dos exemplos abaixo e podem ser utilizadas até mesmo situações fictícias (doença A, B), desde que os conceitos sejam corretamente aplicados e justifiquem o cenário criado.\n\nExemplos de cenários e justificativas:\n\na) Endemia (0,75)\nNa mesma cidade do interior, a febre amarela é uma doença endêmica. Isso significa que, ao longo dos anos, a doença está presente de forma constante, com um número relativamente baixo de casos que surgem de tempos em tempos. A febre amarela persiste na região devido à presença de mosquitos Aedes aegypti, que são vetores naturais do vírus. Apesar de os casos serem esporádicos, a comunidade local toma precauções regulares, como a vacinação anual e a eliminação de focos de mosquitos, para manter a doença sob controle. Este cenário exemplifica uma endemia, pois a febre amarela está estabelecida na região, com casos contínuos, mas geralmente sob controle.\n\nb) Surto (0,75)\nImagine uma escola primária em uma cidade do interior que, em um curto período, registrou um aumento significativo de casos de gastroenterite entre seus alunos. Após uma investigação, descobriu-se que o surto teve início devido ao consumo de um lote de alimentos contaminados fornecidos pela cantina da escola. A contaminação ocorreu porque os alimentos não foram armazenados adequadamente, permitindo a proliferação de bactérias. As autoridades de saúde foram chamadas, e a cantina foi fechada temporariamente para higienização e treinamento da equipe sobre práticas seguras de manuseio de alimentos. Além disso, os alunos afetados foram tratados, e os casos começaram a diminuir logo após a intervenção. Este exemplo é caracterizado como um surto porque a doença se espalhou rapidamente em uma área específica e limitada, afetando um grande número de pessoas em um curto espaço de tempo.",deep:"🦠 ENDEMIA vs SURTO\n\nENDEMIA:\n→ Presença HABITUAL e constante de doença em uma região\n→ Número de casos previsível e esperado\n→ Exemplos: malária na Amazônia, dengue em regiões tropicais\n→ NÃO é emergência — é o padrão esperado daquela região\n\nSURTO:\n→ Aumento REPENTINO e inesperado de casos\n→ Em área LIMITADA (escola, bairro, empresa)\n→ Geralmente com fonte comum identificável\n→ Duração curta\n→ Exemplos: gastroenterite em cantina, intoxicação alimentar\n\nDiferença Surto vs Epidemia:\n→ Surto: área limitada/fechada\n→ Epidemia: se espalha por diversas regiões\n\n💡 O que a questão avalia:\n→ Correto uso dos conceitos\n→ Justificativa da classificação\n→ Qualquer doença (real ou fictícia) é válida"},
{n:9,disc:false,tema:"Amostragem Estratificada — Asserção",context:"(UNIGRANRIO CAXIAS) Um grupo de pesquisa foi contratado para realizar aplicação de um questionário nos moradores do município Bem Querer situado no estado do Rio de Janeiro, cujo objetivo seria saber o grau de satisfação em relação à coleta de lixo domiciliar realizada pela prefeitura local. O intuito é generalizar os resultados para todos os moradores do município. Como o município possui mais de 500 mil habitantes, os pesquisadores decidiram selecionar uma amostra dos residentes para participarem da pesquisa.\n\nI - Foi utilizada uma amostragem estratificada, onde os moradores foram divididos em grupos homogêneos com base nos bairros do município e uma amostra aleatória foi retirada de cada grupo.\n\nPORQUE\n\nII - Esse tipo de amostragem foi escolhido porque permite que todas as subpopulações (neste caso, moradores de diferentes bairros) sejam representadas de forma proporcional na amostra final, aumentando a representatividade da amostra.",assertions:null,text:"A respeito dessas asserções, assinale a opção correta.",opts:["As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa correta da I.","As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.","A asserção I é uma proposição falsa, e a II é uma proposição verdadeira.","A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."],g:1,exp:"As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I.\n\nTrata-se de uma amostragem estratificada. De acordo com Sampieri et al. (2013), a amostragem estratificada é utilizada quando a população é subdividida em grupos homogêneos chamados estratos com base em uma ou mais características relevantes (por exemplo, idade, sexo, bairros, classes sociais). Em seguida, uma amostra aleatória é selecionada de cada estrato. Esse método é empregado quando o pesquisador deseja garantir que todas as subpopulações sejam representadas na amostra de forma proporcional.\n\nNa amostragem por conglomerado, a população é dividida em grupos heterogêneos chamados conglomerados (ou clusters), que são internamente similares à população em geral, mas o pesquisador não seleciona indivíduos diretamente de cada grupo. Em vez disso, seleciona-se conglomerados inteiros de forma aleatória para serem incluídos no estudo, e os dados são coletados de todos os membros dos conglomerados selecionados ou de uma amostra dentro dos conglomerados.",deep:"📊 AMOSTRAGEM ESTRATIFICADA vs CONGLOMERADOS\n\nESTRATIFICADA (correta aqui):\n→ Estratos = grupos HOMOGÊNEOS internamente\n→ Sorteia INDIVÍDUOS de cada estrato\n→ Garante representação proporcional de cada subgrupo\n→ Exemplo: bairros → sorteia moradores de cada bairro\n\nCONGLOMERADOS (diferente!):\n→ Conglomerados = grupos HETEROGÊNEOS internamente\n→ Sorteia GRUPOS inteiros\n→ Tudo de cada grupo selecionado é incluído\n→ Exemplo: sorteia bairros inteiros\n\n✅ I e II verdadeiras + II justifica I:\n→ I: amostragem estratificada por bairros ✓\n→ II: garante representação proporcional dos bairros ✓\n→ II explica CAUSALMENTE por que I é utilizada"},
{n:10,disc:false,tema:"Doença Transmissível Direta",context:"( AFYA MANACAPURU) Durante o acompanhamento de um atendimento clínico, um estudante de medicina se depara com um paciente que apresenta sintomas de febre alta, dores musculares e tosse. O paciente menciona que recentemente teve contato com uma pessoa que estava gripada.",assertions:null,text:"Considerando a classificação da condição apresentada pelo paciente, identifique a alternativa que descreve corretamente a categorização da situação.",opts:["Doença crônica não transmissível - doença caracterizada por etiologia múltipla, longo período de latência, curso prolongado e origem não infecciosa.","Doença transmissível indireta - doença que se transmite por meio de vetores, objetos ou alimentos contaminados.","Doença não transmissível - doença que não pode ser transmitida de uma pessoa para outra, sendo causada por fatores como genética, estilo de vida ou ambiente.","Doença transmissível direta - doença que se transmite diretamente de uma pessoa infectada para outra, sem a necessidade de intermediários."],g:3,exp:"REPOSTA CORRETA: Doença transmissível direta - doença que se transmite diretamente de uma pessoa infectada para outra, sem a necessidade de intermediários.\n\nRESPOSTA COMENTADA: Trata-se de doença infecciosa de transmissão direta, também chamada, no caso da gripe, de doença contagiosa. Toda doença infecciosa é transmissível, no entanto, pode ser ou não contagiosa. O tétano, por exemplo, é uma doença infecciosa não contagiosa (transmissão indireta), porque não se transmite diretamente de pessoa a pessoa, mas é transmissível porque os esporos dispersos no meio ambiente podem ser transmitidos às pessoas sadias através de solução de continuidade de pele ou mucosa (Rouquayrol et al., 2017, p. 188). A expressão doença transmissível é termo técnico de uso generalizado e definido pela OPAS como qualquer doença causada por um agente infeccioso específico, ou seus produtos tóxicos, que se manifesta pela transmissão desse agente ou de seus produtos, de uma pessoa ou animal infectados ou de um reservatório a um hospedeiro suscetível, direta ou indiretamente, por meio de um hospedeiro intermediário, de natureza vegetal ou animal, de um vetor ou do meio ambiente inanimado (Rouquayrol et al., 2017, p.188).",deep:"🦠 CLASSIFICAÇÃO DAS DOENÇAS TRANSMISSÍVEIS\n\n✅ D — CORRETA: Transmissível DIRETA\n→ Pessoa → pessoa sem intermediário\n→ Gotículas respiratórias (tosse, espirro, fala)\n→ Gripe = doença CONTAGIOSA por excelência\n\n❌ A: Gripe não é crônica nem não transmissível\n❌ B: Transmissão INDIRETA = vetores, fômites, água contaminada\n   → Ex: malária (mosquito), cólera (água), tétano (esporos no solo)\n❌ C: Gripe É transmissível (de pessoa para pessoa)\n\nExemplos de transmissão:\n→ Direta: gripe, sarampo, varicela, COVID-19\n→ Indireta: malária, dengue, tétano, febre tifoide\n\nDefinição OPAS de doença transmissível:\nQualquer doença causada por agente infeccioso específico que se manifesta pela transmissão desse agente de uma fonte a um hospedeiro suscetível"}
];
const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';var ctxHtml=q.context.replace(/\n/g,'<br>');ctxHtml=ctxHtml.replace(/\[\[IMG_(Q\d+)\]\]/g,function(_,id){var el=document.getElementById('IMG_'+id);return el?el.innerHTML:'';});ctx.innerHTML=ctxHtml;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false;
function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}
document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);
function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}
document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});

</script>
  <script>
const PROVA_ID = 'mcm2-2024-2';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) {
    state.eliminated[k] = Array.from(eliminated[k]);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) {
          eliminated[k] = new Set(state.eliminated[k]);
        }
      }
      return true;
    }
  } catch (e) {}
  return false;
}

const _origSubmit = submitAnswer;
submitAnswer = function() {
  _origSubmit();
  saveLocal();
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) {
    setTimeout(showResult, 100);
  }
}
</script>
