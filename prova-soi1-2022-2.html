<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

text:"Qual a melhor explicação bioquímica para o rato \"A\" permanecer vivo mesmo depois de bastante tempo transcorrido da administração da peçonha?",
opts:["As proteínas apresentam alta especificidade, o que as torna mais funcionais para alguns organismos do que outros.", "A mudança de temperatura interfere diretamente na estrutura primária das proteínas. A perda da estrutura primária é o que inicialmente faz com que elas percam sua função.", "As proteínas são extremamente sensíveis a mudanças de pH, sofrendo desnaturação quando expostas ao pH ácido do estômago e perdendo suas características funcionais.", "A síntese proteica é feita pelos ribossomos, por isso proteínas que não passam pela corrente sanguínea não podem ser ativadas, ficando incapacidadas de produzir seu efeito."],
g:2,
exp:"Encontra-se um pH significativamente diferente entre os ambientes ao qual a proteína venenosa foi administrada: (1) o pH extremamente ácido do estômago e (2) o pH neutro do sangue. Por isso, podemos conjecturar que a proteína venenosa seja extremamente sensível ao pH ácido, sofrendo desnaturação neste meio, o que a impediu de fazer efeito no rato wistar A.",
deep:"🎯 CONCEITO-CHAVE\nProteínas são sensíveis a mudanças de pH — em condições extremas, elas sofrem DESNATURAÇÃO (perda da estrutura tridimensional) e, consequentemente, perdem sua função biológica.\n\n🧬 O EXPERIMENTO\n→ Rato A (via oral): peçonha passa pelo estômago (pH ~1,5–3,5, extremamente ácido) antes de chegar ao sangue\n→ Rato B (via intravenosa): peçonha vai DIRETO pro sangue (pH ~7,35–7,45, neutro)\n\n⚡ POR QUE O RATO A SOBREVIVEU\n→ A proteína tóxica é DESNATURADA no ambiente ácido do estômago\n→ Desnaturação = perda da estrutura terciária (formato 3D)\n→ Sem formato 3D correto, a proteína NÃO CONSEGUE se ligar ao alvo e perde a função tóxica\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: não explica por que a MESMA proteína funciona por IV e não por VO no MESMO rato\n• B: é a estrutura TERCIÁRIA que se perde primeiro na desnaturação, não a primária\n• D: confunde síntese com ativação — proteínas já sintetizadas não precisam de ribossomos pra funcionar\n\n💡 MACETE\nPeçonha de cobra funciona quando MORDE (injeta no sangue) — se você comer, o estômago 'digere' a toxina. É por isso que cobras não morrem com o próprio veneno ao engolir a presa."},

jxuq506CeXPP3ufXVMBirrTvz/AJvtpYtSnuTN2i7xRz0UV6jMAo56KKQBRz0UUgCkoopgLikoopMApcUUUIBAlI4ADyUKA5xmiirQHiW2fySP3RXqABwGKKKbKY4cKKKKCRnJo+gn0Uuwk8RRRUgOxRiiiqAKKKKACkAA4CiikwFxSGiipYC4oxRRQAmKMUUUqQC0UUUwCiiigAoxRRQB/9k=\" alt=\"Órgãos do sistema imune\" style=\"max-width:100%;height:auto;display:block;margin:0 auto;\"><p style=\"font-size:12px;color:#555;text-align:center;margin-top:8px;\">Disponível em: https://sites.google.com/site/kefalikinisi/home/imunologia/orgaos-sistema-imune. Acesso em: 5 Ago. 2022.</p></div><p style=\"font-size:15px;font-weight:500;line-height:1.8;margin-bottom:14px;color:#D8CEEA;\">Sobre a figura, são feitas as seguintes afirmativas:</p>",
assertions:"I. O órgão II participa na manutenção do sistema imunológico, removendo imunocomplexos e fagocitando antígenos sanguíneos.\nII. O desenvolvimento e a maturação dos linfócitos T ocorrem em III e II, respectivamente.\nIII. Os órgãos I e II são considerados órgãos linfoides primários, visto que são importantes na produção e na maturação de células T.\nIV. Os órgãos II e IV são considerados órgãos linfoides secundários, visto que são importantes na ativação de células B e T.",
text:"É correto o que se afirma apenas em",
opts:["II e III.", "II, III e IV.", "I e IV.", "I e II."],
g:2,
exp:"O órgão I é o timo, órgão linfoide primário, importante na maturação de células T. O órgão II é o baço, órgão linfoide secundário, importante na remoção de antígenos sanguíneos. O órgão III é a medula óssea, importante na produção de linfócitos T e b e na maturação de células B. O órgão IV é o apêndice vermiforme, importante órgão linfoide secundário, onde atua na ativação de células B e T.",
deep:"🎯 IDENTIFICAÇÃO DOS ÓRGÃOS\n→ I = TIMO (retroesternal) — primário, maturação de LT\n→ II = BAÇO (hipocôndrio esquerdo) — secundário, filtragem de sangue\n→ III = MEDULA ÓSSEA (fêmur) — primário, produção de todas as células + maturação de LB\n→ IV = APÊNDICE VERMIFORME — secundário, ativação de LB e LT\n\n🏛️ CLASSIFICAÇÃO DOS ÓRGÃOS LINFOIDES\n\nPRIMÁRIOS (produção + maturação):\n• Medula óssea → origina TODAS as células + maturação dos LB\n• Timo → maturação dos LT (educação tímica)\n\nSECUNDÁRIOS (ativação — onde o linfócito 'encontra' o antígeno):\n• Baço → filtra antígenos do SANGUE\n• Linfonodos → filtram antígenos da LINFA\n• MALT (tonsilas, placas de Peyer, apêndice) → mucosas\n\n✅ POR QUE I E IV CORRETAS\n• I: Baço (II) realmente remove imunocomplexos e fagocita antígenos sanguíneos ✓\n• IV: Baço (II) e apêndice (IV) são ambos secundários e ativam LB e LT ✓\n\n❌ POR QUE II E III ERRADAS\n• II: LT se desenvolvem na MO e maturam no TIMO (I) — não em III e II\n• III: Timo (I) é primário, mas baço (II) é SECUNDÁRIO — não ambos primários\n\n💡 MACETE\n'TI-MO faz o LT MO-rar' (TIMO = LT) | 'MeDula faz B, B' (MO = LB)"},

{n:3,
disc:false,
tema:"Fisiologia Cardiovascular — Hipotensão Ortostática",
context:"Mulher de 68 anos, hipertensa, ao se levantar da cama, passa da posição de decúbito para a posição em pé. Segundos depois, senta-se queixando-se de tontura e alteração em sua frequência cardíaca.\n\nSobre o caso, são feitas as seguintes afirmativas:",
contextHTML:null,
assertions:"I. Trata-se de um quadro em que ocorreu hipotensão ortostática.\nII. Houve elevação da frequência cardíaca mediada por secreção de neurotransmissores adrenérgicos.\nIII. Houve aumento da força de contração cardíaca devido à liberação de estímulos parassimpáticos para esse órgão.",
text:"É correto o que se afirma em",
opts:["I, II e III.", "I e II, apenas.", "II, apenas.", "I e III, apenas."],
g:1,
exp:"A estimulação parassimpática não promove aumento da contratilidade cardíaca, pois esse estímulo leva à redução da frequência cardíaca.\n\nO caso retrata uma hipotensão ortostática. Nesse caso, o acúmulo de sangue nos membros inferiores, ao se levantar, promove redução do retorno venoso e detecção da queda do volume de ejeção cardíacos pelos barorreceptores. Isso leva à estimulação simpática do coração, com liberação de neurotransmissores adrenérgicos, que promovem aumento da frequência cardíaca.",
deep:"🎯 O QUE É HIPOTENSÃO ORTOSTÁTICA\nQueda ≥20 mmHg sistólica (ou ≥10 mmHg diastólica) ao passar de deitado/sentado para em pé. Sintomas: tontura, visão turva, síncope.\n\n🔄 MECANISMO FISIOLÓGICO (ao levantar)\n1. Gravidade → sangue acumula nos MMII (~500-800 mL)\n2. Retorno venoso ↓ → pré-carga ↓ → débito cardíaco ↓ → PA ↓\n3. Barorreceptores (seio carotídeo + arco aórtico) detectam a queda\n4. Resposta compensatória: SIMPÁTICO ATIVADO\n   → ↑ FC (taquicardia reflexa)\n   → ↑ contratilidade (inotropismo +)\n   → Vasoconstrição periférica (α1)\n\n⚡ SIMPÁTICO vs PARASSIMPÁTICO no coração\n\nSIMPÁTICO (NORADRENALINA → β1):\n→ ↑ FC (cronotropismo +)\n→ ↑ Força de contração (inotropismo +)\n→ ↑ Velocidade de condução (dromotropismo +)\n\nPARASSIMPÁTICO (ACh → M2):\n→ ↓ FC (cronotropismo −)\n→ Pouco efeito na contratilidade ventricular\n→ ↓ Condução AV\n\n❌ POR QUE III ESTÁ ERRADA\nO parassimpático NÃO aumenta contratilidade — faz o oposto. E em hipotensão, o corpo aciona o simpático, não o parassimpático.\n\n💡 MACETE\n'Simpático = acelerador do carro' | 'Parassimpático = freio'"},

{n:4,
disc:false,
tema:"Fisiologia Renal — Hipernatremia",
context:"Paciente, 65 anos, foi atendido e relata náuseas, vômitos e diarreia líquida há 5 dias e defecou 8 vezes nas últimas 24 horas. Ao ser admitido, o paciente apresentava-se sonolento, oligúrico (volume urinário de 25 mL/hora) e com secura das mucosas. Um ionograma (concentração de eletrólitos) evidenciou hipernatremia neste paciente.",
contextHTML:null,
assertions:null,
text:"De acordo com o quadro clínico apresentado,",
opts:["os vômitos e a diarreia líquida são consequências da hipernatremia desse paciente.", "este paciente apresenta um aumento na concentração plasmática do íon potássio.", "uma das consequências da hipernatremia aguda é a turgidez celular generalizada.", "a alta concentração de sódio no plasma do paciente é uma causa da secura das mucosas."],
g:3,
exp:"Altos níveis de sódio no sangue são resultado, quase sempre, de baixa ingestão de água e desidratação, que pode ser causada por diarreias, nas quais a perda de líquido excede a perda de íons sódio. Alguns dos sintomas incluem membranas mucosas secas, sede, oligúria, sonolência, fraqueza e confusão mental.",
deep:"🎯 HIPERNATREMIA\n[Na+] plasmático > 145 mEq/L. Na grande maioria dos casos, reflete DÉFICIT DE ÁGUA LIVRE (desidratação), não excesso de sódio.\n\n🔬 FISIOPATOLOGIA DO CASO\n→ Diarreia líquida abundante = perda de água >> perda de sódio\n→ Água corporal ↓↓ → Na+ fica 'concentrado' no plasma\n→ Osmolaridade plasmática ↑ → água sai das células por osmose\n→ Células DESIDRATADAS (inclusive mucosas → secura)\n→ Rim retém água máxima → oligúria (25 mL/h = oligúria)\n→ Desidratação do SNC → sonolência, confusão\n\n⚖️ SÓDIO E ÁGUA — RELAÇÃO INVERSA\nHipernatremia → célula MURCHA (desidratação celular)\nHiponatremia → célula INCHA (edema celular)\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (invertida): vômitos/diarreia CAUSAM hipernatremia, não o contrário\n• B (potássio): diarreia causa HIPOcalemia (perda de K+ nas fezes)\n• C (turgidez): hipernatremia causa MURCHAMENTO celular, não turgidez\n\n✅ POR QUE D CORRETA\nSódio alto → plasma hiperosmolar → água sai das mucosas → SECURA. Causa-efeito correto.\n\n💡 MACETE\n'Na+ alto = paciente SECO' (mucosa seca, pele seca, urina concentrada, sede)"},

{n:5,
disc:false,
tema:"Fisiologia Muscular — Homeostase do Cálcio",
context:"O maratonista depende do equilíbrio do Ca²⁺, pois o íon desempenha papel determinante em atividades celulares e atua na ativação da fosforilação oxidativa, no auxílio à manutenção da integridade sarcolemal e, principalmente, na ativação das proteínas contráteis. A impossibilidade de manutenção da homeostasia celular desse íon pode desencadear sequências de eventos lesivos para o atleta.\n\nNesse contexto, analise as afirmativas acerca da homeostase do íon e assinale a proposição correta.",
contextHTML:null,
assertions:null,
text:"Assinale a alternativa correta.",
opts:["No relaxamento de a toda musculatura do atleta, íons Ca++ são bombeados do retículo sarcoplasmático, especializado no armazenamento de íons cálcio.", "A captação de cálcio para o meio intracelular permite a interação entre actina e miosina, o que contribui para o relaxamento da musculatura estriada do atleta.", "Se o atleta for boicotado com bloqueador de canais de cálcio, diminuindo a excitabilidade e contractilidade muscular, ele perderá a maratona.", "A maior concentração de íons Ca++ no citoplasma comparada à do citosol permite que a diástole do corredor ocorra normalmente."],
g:2,
exp:"A entrada de cálcio no citosol é fundamental para estimular a saída de cálcio do retículo sarcoplasmático e, consequentemente, a despolarização faz com que canais de cálcio se abram, provocando um aumento de cálcio no citosol. A entrada de cálcio leva então à saída de cálcio do retículo sarcoplasmático (canais de cálcio ativados por cálcio), liberando esses íons de forma passiva. Os íons de cálcio se ligam à tropomiosina, permitindo, assim, os filamentos finos e grossos (actina e miosina) presentes nos músculos, que interajam com o cálcio e entre si, ocasionando, dessa forma, a contração muscular.",
deep:"🎯 PAPEL DO CÁLCIO NA CONTRAÇÃO MUSCULAR\nO Ca²⁺ é o GATILHO que libera os sítios de ligação da actina para a miosina — sem ele, não há contração.\n\n🔬 SEQUÊNCIA DO ACOPLAMENTO EXCITAÇÃO-CONTRAÇÃO\n1. Despolarização do sarcolema (PA muscular)\n2. PA desce pelos túbulos T → ativa receptores DHP\n3. Canais de rianodina (RyR) do retículo sarcoplasmático SE ABREM\n4. Ca²⁺ SAI do RS → citosol (cálcio induzindo cálcio)\n5. Ca²⁺ se liga à TROPONINA C → move tropomiosina\n6. Sítios de actina ficam livres → miosina se liga → CONTRAÇÃO\n7. Relaxamento: SERCA BOMBEIA Ca²⁺ DE VOLTA pro RS (gasta ATP)\n\n⚡ BLOQUEADORES DE CANAL DE CÁLCIO\n→ Anlodipino, nifedipino, verapamil, diltiazem\n→ Bloqueiam canais de Ca²⁺ tipo L (voltagem-dependentes)\n→ ↓ Excitabilidade + ↓ Contratilidade (miocárdio e músculo liso vascular)\n→ Em atleta: ↓ performance por redução da força contrátil\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (invertida): no RELAXAMENTO o Ca²⁺ é bombeado PARA DENTRO do RS, não para fora\n• B (invertida): a captação de Ca²⁺ CAUSA CONTRAÇÃO, não relaxamento\n• D (errada): a concentração de Ca²⁺ é MAIOR no RS que no citosol (gradiente pra dentro do RS); e diástole é evento cardíaco, não de músculo esquelético\n\n💡 MACETE\n'Ca²⁺ ENTRA = contração | Ca²⁺ SAI (volta pro RS) = relaxamento'"},

{n:6,
disc:false,
tema:"Histologia — Vasos Sanguíneos",
context:"\"Vaso sanguíneo constituído das três túnicas e que predominantemente transporta sangue oxigenado. Quando vista em maior detalhe, observamos a composição da túnica íntima com endotélio, tecido conjuntivo, músculo liso e lâmina elástica proeminente\".",
contextHTML:null,
assertions:null,
text:"Assinale a alternativa que identifica corretamente as características histológicas do vaso sanguíneo descrito acima.",
opts:["Veia de grande calibre.", "Artéria de médio calibre.", "Veia de médio calibre.", "Artéria de grande calibre."],
g:1,
exp:"Vasos sanguíneos constituídos pelas três túnicas são apenas artérias e veias, mas quem transporta predominantemente sangue rico em oxigênio são as artérias. Apenas dois tipos de artérias, médio e pequeno calibres, possuem em sua túnica íntima as quatro camadas mencionadas (endotélio, tecido conjuntivo, músculo liso e lâmina elástica). Entretanto, somente as artérias de calibre médio (chamadas também de artérias musculares) possuem a lâmina elástica proeminente.",
deep:"🎯 ESTRATÉGIA: Eliminação por características\n\n🩸 PISTA 1 — 'SANGUE OXIGENADO'\n→ Elimina VEIAS (que transportam sangue venoso, exceto pulmonares)\n→ Resposta é ARTÉRIA\n\n🧱 PISTA 2 — 'LÂMINA ELÁSTICA PROEMINENTE NA TÚNICA ÍNTIMA'\n→ Essa é a assinatura das ARTÉRIAS MUSCULARES (médio calibre)\n\n🏛️ CLASSIFICAÇÃO DAS ARTÉRIAS\n\nGRANDE CALIBRE (elásticas) — ex: aorta, pulmonar, carótidas\n• Túnica média: MUITAS lâminas elásticas (elastina predomina)\n• Túnica íntima: lâmina elástica interna POUCO distinta (se confunde com a média)\n• Função: absorver pressão sistólica\n\nMÉDIO CALIBRE (musculares) — ex: femoral, braquial, radial\n• Túnica média: MUITO músculo liso (camadas organizadas)\n• Túnica íntima: lâmina elástica interna PROEMINENTE ✓\n• Lâmina elástica externa também presente\n• Função: distribuir sangue, regular fluxo\n\nPEQUENO CALIBRE (arteríolas)\n• Túnica média: 1-2 camadas de músculo liso\n• Lâmina elástica interna pode estar presente mas discreta\n\n❌ POR QUE NÃO AS OUTRAS\n• A/C (veias): transportam sangue venoso\n• D (grande calibre): lâmina elástica NÃO é proeminente na íntima — se mistura com a média elástica\n\n💡 MACETE\n'ARTÉRIA MUSCULAR (média) = LÂMINA ELÁSTICA PROEMINENTE na íntima'"},

{n:7,
disc:false,
tema:"Patologia — Inflamação Aguda e Crônica",
context:"O processo inflamatório é um mecanismo de defesa do organismo e pode ser dividido em agudos ou crônicos. As assertivas abaixo tratam de algumas características inerentes a cada um desses processos.",
contextHTML:null,
assertions:"(1) Caracteriza-se por aumento no fluxo sanguíneo, permeabilidade vascular e exsudação de líquido derivado do sangue na região afetada.\n(2) Pode se desenvolver em questão de minutos a horas e durar dias.\n(3) Formação de novos vasos (angiogênese), migração e proliferação de fibroblastos, formação do tecido de granulação e maturação e reorganização do tecido fibroso.",
text:"Assinale a alternativa que contém a correlação correta do tipo de inflamação.",
opts:["(1) Crônico – (2) Agudo – (3) Crônico", "(1) Crônico – (2) Crônico – (3) Agudo", "(1) Agudo – (2) Crônico – (3) Crônico", "(1) Agudo – (2) Agudo – (3) Crônico"],
g:3,
exp:"(1) Caracteriza-se por aumento no fluxo sanguíneo, permeabilidade vascular e exsudação de líquido derivado do sangue na região afetada. (AGUDO)\n\n(2) Pode se desenvolver em questão de minutos a horas e durar dias. (AGUDO)\n\n(3) Formação de novos vasos (angiogênese), migração e proliferação de fibroblastos, formação do tecido de granulação e maturação e reorganização do tecido fibroso. (CRÔNICO)",
deep:"🎯 INFLAMAÇÃO AGUDA vs CRÔNICA\n\n🔴 INFLAMAÇÃO AGUDA\n⏱️ Início RÁPIDO (minutos a horas) | Duração CURTA (dias)\n🧬 Células: NEUTRÓFILOS (principal) + macrófagos\n🔬 Eventos vasculares DOMINAM:\n   → Vasodilatação (↑ fluxo = rubor + calor)\n   → ↑ Permeabilidade vascular (edema)\n   → Exsudação de proteínas/células\n📋 5 sinais cardinais: RUBOR, CALOR, TUMOR, DOR, PERDA DE FUNÇÃO\n\n🟣 INFLAMAÇÃO CRÔNICA\n⏱️ Início INSIDIOSO | Duração LONGA (semanas/meses/anos)\n🧬 Células: LINFÓCITOS + MACRÓFAGOS + plasmócitos\n🔬 Eventos REPARATIVOS/PROLIFERATIVOS dominam:\n   → Angiogênese (novos vasos)\n   → Fibroblastos proliferam\n   → Deposição de colágeno (FIBROSE)\n   → Tecido de granulação → cicatriz\n📋 Marca: coexistência de destruição + reparo\n\n✅ DECIFRANDO A QUESTÃO\n• (1) 'aumento fluxo + permeabilidade + exsudação' → eventos vasculares → AGUDO\n• (2) 'minutos/horas + dura dias' → cronologia → AGUDO\n• (3) 'angiogênese + fibroblastos + tecido granulação + fibrose' → reparo tecidual → CRÔNICO\n\n💡 MACETE\n'AGUDA = VASOS (edema, calor, rubor) | CRÔNICA = CÉLULAS + FIBROSE (cicatriz)'"},

resente dois fatores de risco para o desenvolvimento de trombose venosa profunda.</p><p style=\"font-size:15px;font-weight:500;line-height:1.8;margin-bottom:14px;color:#D8CEEA;\">c) (1,0) Indique três ações que possam melhorar o retorno venoso.</p>",

exp:"a) A insuficiência venosa profunda pode ser caracterizada como uma anormalidade do fluxo venoso derivado de obstruções, insuficiência funcional valvular venosa ou o somatório de ambas que acomete principalmente o sistema venoso dos membros inferiores.\n\nb) Essa é uma doença multifatorial que pode ter origem genética, biotípica, estilo de vida, entre outras.\n\nc) É aconselhável que pessoas que tenham IVP (Insuficiência Venosa Profunda) façam exercícios regularmente, uma vez que a contração da musculatura melhora o retorno venoso; e que eleve os membros inferiores, caso não tenham problemas cardíacos.",
deep:"🎯 INSUFICIÊNCIA VENOSA CRÔNICA / PROFUNDA\nDisfunção do sistema venoso em devolver o sangue ao coração, geralmente por FALÊNCIA DAS VÁLVULAS VENOSAS ou OBSTRUÇÃO.\n\n📋 a) CONCEITO — pontos para pontuar\n→ Anormalidade do fluxo venoso\n→ Causas: obstrução + insuficiência valvar (ou ambas)\n→ Acomete principalmente MMII\n→ Refluxo por incompetência valvar → hipertensão venosa → edema, varizes, úlceras\n\n⚠️ b) FATORES DE RISCO PARA TVP — Tríade de Virchow\n\n1. ESTASE VENOSA:\n   → Imobilização prolongada (viagens longas, pós-op)\n   → Obesidade, gravidez\n   → IVC pré-existente\n\n2. LESÃO ENDOTELIAL:\n   → Cirurgias (ortopédicas principalmente)\n   → Traumas, cateteres venosos\n   → Tabagismo\n\n3. HIPERCOAGULABILIDADE:\n   → Anticoncepcional oral + estrogênio\n   → Neoplasias, trombofilias genéticas (Fator V Leiden)\n   → Gravidez/puerpério\n\n🏃 c) MELHORA DO RETORNO VENOSO — o 'triathlon venoso'\n1. EXERCÍCIO FÍSICO REGULAR → bomba muscular da panturrilha comprime veias profundas e empurra sangue pro coração\n2. ELEVAÇÃO DOS MMII → gravidade trabalha A FAVOR do retorno (se não houver IC)\n3. MEIAS DE COMPRESSÃO ELÁSTICA → compressão gradual melhora velocidade de fluxo venoso\n4. HIDRATAÇÃO + CONTROLE DE PESO → reduz viscosidade + pressão abdominal\n5. EVITAR SEDENTARISMO → quebrar imobilidade com pausas e movimentos\n\n💡 MACETE\n'VIRCHOW: ESTASE + LESÃO + HIPERCOAGULABILIDADE = TROMBO'"},

context:"Os alunos do curso de medicina, avaliando uma lâmina de medula óssea vermelha, estudando a produção das células sanguíneas, descobrem que normalmente são duas grandes linhagens celulares precursoras envolvidas no processo de produção e subsequente maturação nos principais nichos do tecido hematopoiético, tendo fatores estimuladores do processo que regulam esses eventos.",
contextHTML:null,
assertions:null,
text:"Sobre as linhagens do referido tecido e a regulação,",
opts:["a mieloide pode ser granulócitos e agranulócitos, e a linfoide o linfócito e o monócito, sendo ambas estimuladas por interleucinas.", "a mieloide deriva da célula-tronco madura e a linfoide dos linfócitos, podendo ser estimuladas pela eritropoietina.", "a mieloide pode ser eosinófilo e basófilo, linfócitos T e B são derivados da célula-tronco linfoide, sendo ambas estimuladas por interleucinas.", "a mieloide deriva dos leucócitos granulócitos e a linfoides dos leucócitos não granulócitos, podendo ser estimuladas pela eritropoietina."],
g:2,
exp:"A linhagem mieloide dará origem a todos os leucócitos granulócitos, agranulócitos. Os linfócitos T e B são derivados da célula-tronco linfoide, sendo que as interleucinas estimulam as células-tronco hematopoiéticas em geral, sendo a eritropoetina um fator estimulante dos eritrócitos.",
deep:"🎯 HEMATOPOESE — as duas grandes linhagens a partir da célula-tronco hematopoiética (CTH)\n\n🌳 ÁRVORE HEMATOPOÉTICA\n\n🔴 LINHAGEM MIELOIDE (origem: progenitor mieloide comum — CMP)\n• GRANULÓCITOS: neutrófilo, eosinófilo, basófilo\n• AGRANULÓCITO: monócito (→ macrófago tecidual)\n• Eritrócitos (hemácias)\n• Plaquetas (via megacariócito)\n\n🔵 LINHAGEM LINFOIDE (origem: progenitor linfoide comum — CLP)\n• LINFÓCITO B (maturação na medula óssea)\n• LINFÓCITO T (maturação no timo)\n• CÉLULA NK (natural killer)\n\n💉 FATORES DE CRESCIMENTO (CSF — Colony Stimulating Factors)\n• INTERLEUCINAS (IL-3, IL-7, etc.): regulação GERAL da hematopoese, inclusive das CTH\n• ERITROPOETINA (EPO): ESPECÍFICA para eritrócitos (produzida nos rins)\n• TROMBOPOETINA (TPO): ESPECÍFICA para plaquetas\n• G-CSF: granulócitos (neutrófilos)\n• GM-CSF: granulócitos + monócitos\n• M-CSF: monócitos/macrófagos\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (monócito é linfoide): monócito é MIELOIDE, não linfoide\n• B (célula-tronco madura): CTH é imatura, e EPO estimula só eritrócitos\n• D (mieloide vem dos granulócitos): invertido — granulócitos VÊM da mieloide; EPO é específica de eritrócitos\n\n💡 MACETE\n'MIE-LOIDE = MUITAS células (todas menos LT, LB, NK) | LINFOIDE = LINFÓCITOS e NK'"},

exp:"a) Qual tipo de potencial de ação é típico das células sinusais? TIPO B\n\nb) Qual é o evento que acontece na fase 3 do potencial de ação A e do potencial de ação B? Cite o íon envolvido e explique o tipo de fluxo.\nO evento é a repolarização. Em ambos os potenciais de ação ocorre um efluxo de potássio.\n\nc) Analise a diferença do comportamento da fase 4 de cada potencial de ação e destaque o nome da fase e íons e canais envolvidos.\nNo potencial de ação A, típico das células cardíacas contráteis, a fase 4 é denominada potencial de repouso verdadeiro, e sua voltagem está próxima do potencial de equilíbrio do potássio (íon mais permeável).\n\nNo potencial de ação B, típico das células do nodo sinusal, não existe um potencial de repouso verdadeiro, e sim um potencial de marcapasso, graças à maior permeabilidade aos íons sódio através dos canais de sódio voltagem dependentes (canais funny) que promove o influxo de cargas positivas levando a célula a atingir seu limiar e disparar o potencial de ação, responsável pela automaticidade cardíaca.",
deep:"🎯 DOIS POTENCIAIS DE AÇÃO CARDÍACOS\n\n🟥 TIPO A — CÉLULAS CONTRÁTEIS (atrial/ventricular)\n📊 Potencial de repouso: -90 mV (verdadeiro)\n⚡ 5 fases:\n• Fase 0 (despolarização rápida): influxo de Na+ (canais rápidos)\n• Fase 1 (repolarização inicial): efluxo de K+ transitório\n• Fase 2 (PLATÔ): influxo de Ca²⁺ (tipo L) + efluxo de K+ — ÚNICO do coração\n• Fase 3 (repolarização final): efluxo de K+ dominante\n• Fase 4 (repouso): K+ estável, célula AGUARDANDO próximo estímulo\n\n🟩 TIPO B — CÉLULAS MARCAPASSO (nodo SA e AV)\n📊 Potencial de repouso: NÃO EXISTE (sempre despolarizando)\n⚡ 3 fases apenas:\n• Fase 0 (despolarização): influxo de Ca²⁺ (tipo L) — MAIS LENTA que tipo A\n• Fase 3 (repolarização): efluxo de K+\n• Fase 4 (MARCAPASSO / despolarização diastólica LENTA): influxo de Na+ pelos CANAIS FUNNY (If) → leva o PM ao limiar automaticamente\n\n⚡ CANAIS FUNNY (HCN)\n→ 'Funny' porque abrem na HIPERPOLARIZAÇÃO (invés da despolarização, como os comuns)\n→ Deixam Na+ entrar lentamente → despolarização espontânea\n→ Responsáveis pela AUTOMATICIDADE cardíaca\n→ Alvo da IVABRADINA (reduz FC sem afetar contratilidade)\n\n📋 RESUMO POR FASE\n• Fase 0: TIPO A = Na+ rápido | TIPO B = Ca²⁺ lento\n• Fase 3: ambos = efluxo de K+\n• Fase 4: TIPO A = Repouso (K+) | TIPO B = Marcapasso (Na+ funny)\n\n💡 MACETE\n'MARCAPASSO = FUNNY Na+ | CONTRÁTIL = PLATÔ de Ca²⁺'"},

text:"Assinale a alternativa correta.",
opts:["no intervalo entre os números 2 e 4 ocorre o relaxamento isovolumétrico e abertura das valvas semilunares.", "no número 3 ocorre a abertura da valva aórtica e fechamento da valva atrioventricular esquerda.", "as valvas atrioventriculares e semilunares estão fechadas durante o intervalo entre os números 1 e 3.", "na final da repolarização ocorre o fechamento das atrioventriculares e abertura das semilunares."],
g:2,
exp:"O intervalo compreendido entre os números 1 e 3 representa o momento de contração isovolumétrica, onde todas as valvas cardíacas estão fechadas e não há variação de volume sanguíneo dentro da câmara ventricular. No ponto marcado com o número 3 irá ocorrer a abertura da valva aórtica. A valva atrioventricular se mantém fechada desde o momento 1 até o momento marcado pelo número 2, onde ela abre e inicia a diástole. Durante o intervalo entre os números 2 e 4 ocorre o relaxamento isovolumétrico, onde novamente todas as valvas estão fechadas.",
deep:"🎯 DIAGRAMA DE WIGGERS — o 'Mapa do Ciclo Cardíaco'\nRelaciona pressões (aórtica, atrial, ventricular), volumes ventriculares, ECG e fonocardiograma em um ciclo completo.\n\n🔄 4 FASES DO CICLO CARDÍACO\n\n1. CONTRAÇÃO ISOVOLUMÉTRICA (números 1→3 na imagem)\n→ VE começa a contrair, P ventricular SOBE\n→ P ventricular > P atrial → AV se FECHA (B1 — 1ª bulha)\n→ P ventricular ainda < P aórtica → semilunares FECHADAS\n→ TODAS AS VALVAS FECHADAS → volume constante\n\n2. EJEÇÃO (a partir do número 3)\n→ P ventricular > P aórtica → AÓRTICA ABRE\n→ Sangue ejetado → P aórtica sobe até ~120 mmHg\n→ Volume ventricular CAI\n\n3. RELAXAMENTO ISOVOLUMÉTRICO (números 2→4)\n→ VE relaxa, P ventricular CAI\n→ P ventricular < P aórtica → AÓRTICA FECHA (B2 — 2ª bulha)\n→ P ventricular ainda > P atrial → AV FECHADA\n→ TODAS AS VALVAS FECHADAS (de novo)\n\n4. ENCHIMENTO VENTRICULAR\n→ P ventricular < P atrial → AV ABRE\n→ Enchimento rápido + diástase + contração atrial (onda 'a')\n\n🔔 BULHAS CARDÍACAS\n• B1 ('TUM'): fechamento das AV (mitral + tricúspide) — início da sístole\n• B2 ('TÁ'): fechamento das semilunares (aórtica + pulmonar) — fim da sístole\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (invertida): entre 2-4 as semilunares estão FECHADAS (relaxamento isovolumétrico)\n• B (parcialmente): no ponto 3 abre a aórtica, mas a AV esquerda (mitral) JÁ estava fechada\n• D: no final da repolarização (onda T) ocorre o FECHAMENTO das semilunares (B2), não das AV\n\n💡 MACETE\n'ISOVOLUMÉTRICA = TUDO FECHADO (contração OU relaxamento)'"},

{n:12,
disc:false,
tema:"Hematologia — Hemostasia e Tampão Plaquetário",
context:"A hemostasia pode ser considerada como uma sequência de eventos que interrompe o sangramento, por meio de três mecanismos: espasmo vascular, formação de tampão plaquetário e coagulação sanguínea.",
contextHTML:null,
assertions:null,
text:"Dentro deste contexto e em relação à formação de tampão plaquetário, assinale a alternativa correta.",
opts:["A liberação de ADP torna as outras plaquetas menos viscosas, fator este que facilita a adesão às plaquetas originalmente já ativadas.", "As plaquetas liberam o fator de crescimento derivado das plaquetas, o PDGF, um fator que promove a proliferação de células endoteliais vasculares.", "As plaquetas armazenam várias substâncias químicas, quando elas liberam o ADP e o tromboxano A2 ocorre a ativação do fator estabilizador de fibrina.", "A liberação de serotonina e troboxano A2 pelas plaquetas determina a vasodilatação dos vasos, promovendo a chegada de mais plaquetas ao local lesionado."],
g:1,
exp:"As plaquetas armazenam várias substâncias químicas, quando elas liberam o ADP e o tromboxano A2 ocorre a ativação das plaquetas essenciais na formação do tampão plaquetário.\n\nA liberação de serotonina e de troboxano A2 pelas plaquetas determina a vasoconstrição dos vasos, promovendo e sustentando a contração do músculo vascular liso, o que diminui o fluxo de sangue pelo vaso lesionado.\n\nA liberação de ADP torna as outras plaquetas mais viscosas, fator este que facilita a adesão as plaquetas originalmente já ativadas.",
deep:"🎯 HEMOSTASIA — 3 ETAPAS SEQUENCIAIS\n\n1. ESPASMO VASCULAR (imediato, segundos)\n→ Vasoconstrição reflexa no vaso lesado\n→ Mediadores: ENDOTELINA (endotélio) + SEROTONINA + TROMBOXANO A2 (plaquetas)\n\n2. TAMPÃO PLAQUETÁRIO (minutos)\n• ADESÃO: plaquetas se ligam ao colágeno exposto (via FATOR VON WILLEBRAND + GPIb)\n• ATIVAÇÃO: plaquetas mudam de forma e LIBERAM grânulos\n   → ADP → ativa mais plaquetas + aumenta agregação\n   → TxA2 (tromboxano A2) → vasoconstrição + agregação\n   → Serotonina → vasoconstrição\n   → PDGF (Platelet-Derived Growth Factor) → proliferação de células endoteliais e musculares lisas (REPARO)\n• AGREGAÇÃO: plaquetas se ligam entre si (via fibrinogênio + GPIIb/IIIa)\n\n3. COAGULAÇÃO (minutos a horas)\n→ Cascata → FATOR XIII (estabilizador de fibrina) transforma fibrina solúvel em rede estável\n→ Coágulo definitivo\n\n✅ POR QUE B CORRETA\nO PDGF é REALMENTE liberado pelas plaquetas e REALMENTE estimula proliferação de células endoteliais vasculares (importante para o REPARO do vaso após a hemostasia).\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: ADP torna plaquetas MAIS viscosas (não menos) — favorece adesão\n• C: ADP + TxA2 ativam plaquetas, NÃO o fator estabilizador de fibrina (esse é o fator XIII da cascata de coagulação)\n• D: serotonina + TxA2 causam VASOCONSTRIÇÃO, não vasodilatação\n\n💡 MACETE\n'ADP + TxA2 = AGREGAÇÃO | Serotonina + TxA2 = VASOCONSTRIÇÃO | PDGF = REPARO'"},

context:"Uma criança interrompe a sua atividade de lazer após acidente com objeto cortante. Vinte e quatro horas após limpeza da região, observa-se quadro inflamatório com dor e rubor.",

text:"A resposta celular efetora que age no caso é especialmente representada por",
opts:["linfócitos NK.", "linfócitos.", "plasmócitos.", "neutrófilos."],
g:3,
exp:"Neutrófilos são as principais células envolvidas nos processos inflamatórios agudos e infeccções bacterianas. A inflamação do caso é evidentemente aguda e observada pelos sinas flogísticos. Linfócitos T e plasmócitos tipicamente atualm em processos crônicos. Linfócitos NK tipicamente atuam em infecções virais ou no combate a células tumorais.",
deep:"🎯 IDENTIFICANDO A INFLAMAÇÃO DO CASO\n→ Ferimento por objeto cortante há 24h\n→ Sinais flogísticos: dor + rubor\n→ Cronologia < 7 dias\n→ DIAGNÓSTICO: INFLAMAÇÃO AGUDA\n\n🧬 CÉLULAS EFETORAS POR TIPO DE RESPOSTA\n\n🔴 INFLAMAÇÃO AGUDA (bacteriana, trauma) → NEUTRÓFILOS\n• Primeira célula a chegar (horas)\n• Fagocita bactérias, libera enzimas lisossomais\n• Pico em 24-48h\n• Vida curta (horas a dias) — forma PUS ao morrer\n\n🟣 INFLAMAÇÃO CRÔNICA (TB, fungo, autoimune) → MACRÓFAGOS + LINFÓCITOS T + PLASMÓCITOS\n• Macrófagos: fagocitose prolongada, apresentação de antígenos\n• LT CD4+: coordenadores (via citocinas)\n• LT CD8+: lise de células infectadas\n• Plasmócitos: produção de anticorpos\n\n🔵 INFECÇÃO VIRAL / CÉLULAS TUMORAIS → NK + LT CD8+\n• NK: resposta inata, mata sem apresentação antigênica\n• LT CD8+: resposta adquirida específica\n\n🟡 INFECÇÃO PARASITÁRIA / ALERGIA → EOSINÓFILOS\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (NK): atuam em vírus e tumores, não em trauma agudo\n• B (linfócitos): genericamente = LT/LB, típicos de crônica (após 7-14 dias)\n• C (plasmócitos): produzem anticorpos, atuam na crônica\n\n💡 MACETE\n'AGUDA = NEUTRÓFILO | CRÔNICA = LINFÓCITO + MACRÓFAGO | VIRAL = NK'"},

{n:14,
disc:false,
tema:"Anatomia Cardiovascular — Circulação Pulmonar",
context:"O coração é uma bomba dupla, autoajustável, de sucção e pressão. As partes direita e esquerda trabalham em conjunto para impulsionar o sangue para todos os locais do corpo em um processo chamado bombeamento cardíaco. O sangue proveniente do corpo chega ao coração com pouco oxigênio, e, em seguida, é enviado aos pulmões onde será oxigenado.",
contextHTML:null,
assertions:null,
text:"Analise as proposições a seguir e marque a que relaciona corretamente o processo descrito acima com os diferentes tipos de circulação.",
opts:["O sangue proveniente da circulação sistêmica chega ao coração no átrio esquerdo e passa para o ventrículo esquerdo.", "A partir do átrio direito, o sangue flui para dentro do ventrículo direito do coração, de onde ele é bombeado via artérias pulmonares para os pulmões.", "A partir dos pulmões, o sangue vai para o lado esquerdo do coração, chegando ao ventrículo esquerdo através das veias pulmonares.", "O sangue é bombeado para fora do átrio esquerdo e entra em uma grande artéria conhecida como aorta, que irá levar o sangue para o corpo."],
g:1,
exp:"A partir do átrio direito, o sangue flui para dentro do ventrículo direito do coração, de onde ele é bombeado via artérias pulmonares para os pulmões, onde é oxigenado. A partir dos pulmões, o sangue vai para o lado esquerdo do coração através das veias pulmonares. Os vasos sanguíneos que vão do ventrículo direito para os pulmões e os que voltam para o átrio esquerdo são denominados circulação pulmonar.\n\nO sangue proveniente dos pulmões entra no coração no átrio esquerdo e passa para o ventrículo esquerdo. O sangue é bombeado para fora do ventrículo esquerdo e entra em uma grande artéria conhecida como aorta. A aorta ramifica-se em uma série de artérias menores que, por sua vez, ramificam-se em artérias ainda menores até chegarem, por fim, em uma rede de capilares.",
deep:"🎯 DUAS CIRCULAÇÕES DO CORAÇÃO\n\n🔵 CIRCULAÇÃO PULMONAR (pequena circulação)\nVD → ARTÉRIAS pulmonares → PULMÃO → VEIAS pulmonares → AE\n⚠️ ÚNICO lugar do corpo onde:\n• Artérias levam sangue VENOSO (pouco O₂)\n• Veias levam sangue ARTERIAL (rico O₂)\n\n🔴 CIRCULAÇÃO SISTÊMICA (grande circulação)\nVE → AORTA → corpo → VEIAS CAVAS → AD\n\n🔄 CAMINHO COMPLETO DO SANGUE\n1. Sangue venoso do corpo → VEIA CAVA SUPERIOR + INFERIOR\n2. → ÁTRIO DIREITO (AD)\n3. → (valva tricúspide) → VENTRÍCULO DIREITO (VD)\n4. → (valva pulmonar) → ARTÉRIAS PULMONARES\n5. → PULMÕES (troca gasosa)\n6. → VEIAS PULMONARES (4 veias)\n7. → ÁTRIO ESQUERDO (AE)\n8. → (valva mitral) → VENTRÍCULO ESQUERDO (VE)\n9. → (valva aórtica) → AORTA → corpo\n\n✅ POR QUE B CORRETA\nDescreve exatamente: AD → VD → artérias pulmonares → pulmões. Sequência perfeita.\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: sangue da SISTÊMICA chega ao AD (não AE); sangue da PULMONAR chega ao AE\n• C: sangue dos pulmões chega no ÁTRIO esquerdo (não ventrículo esquerdo) via veias pulmonares\n• D: sangue é bombeado para fora do VENTRÍCULO esquerdo (não átrio) para a aorta\n\n💡 MACETE\n'Direito = Desoxigenado (pulmão) | Esquerdo = Enviado ao corpo (aorta)'"},

{n:15,
disc:false,
tema:"Anatomia Vascular — Membros Inferiores",
context:"Mulher, 45 anos, esportista, chega ao pronto socorro com queixa de forte dor há 4 horas, em membro inferior esquerdo. Apresentou diminuição de temperatura, ausência de pulso poplíteo e das extremidades inferiores à esquerda, acompanhados da diminuição de sensibilidade no pé esquerdo, porém com motricidade preservada. Paciente refere quadro progressivo de claudicação (mancar), que iniciou há cerca de um ano e com piora. A paciente foi submetida à angiorressonância, mostrando oclusão com obstrução à esquerda e sem sinais contralateralmente. Em seguida, foi encaminhada para cirurgia.",
contextHTML:null,
assertions:null,
text:"Sobre a região vascular citada no caso clínico, assinale a alternativa que contempla um vaso associado.",
opts:["Artéria femoral profunda.", "Artéria femoral superficial.", "Veia safena magna.", "Veia safena parva."],
g:1,
exp:"A aterosclerose constitui a principal causa de insuficiência arterial crônica nos membros inferiores, e sua prevalência na população geral é subestimada, pois uma parcela significativa dos pacientes permanece assintomática nos estágios iniciais da doença. Deve-se considerar também que na fase de claudicação intermitente (dor ao caminhar) muitos pacientes deixam de relatar esse sintoma por considerá-lo normal e decorrente do envelhecimento do organismo. Em nosso meio não há dados epidemiológicos referentes à arteriosclerose obliterante periférica, porém, nos Estados Unidos, estima-se que 10% da população acima dos 70 anos apresenta queixa de claudicação intermitente nas extremidades inferiores. A aorta abdominal divide-se ao nível da 4º vértebra lombar, originando as artérias ilíacas comuns direita e esquerda. Estas têm continuidade pelas artérias ilíacas externas, originando antes as artérias ilíacas internas. A artéria ilíaca interna, por seus ramos viscerais, é responsável, em grande parte, pela irrigação dos órgãos pélvicos. A artéria ilíaca externa desce pela fossa ilíaca até o ligamento inguinal, de onde continua pela artéria femoral. É uma artéria de condução, pois emite poucos ramos. A artéria femoral comum é continuação da ilíaca externa a partir do ligamento inguinal. Do ponto de vista cirúrgico, é dividida em femoral comum, superficial e profunda. A artéria femoral profunda é responsável pela irrigação da maior parte da musculatura da coxa por meio de seus ramos. Constitui a principal fonte de colaterais quando há obstrução da femoral superficial. A artéria femoral superficial é continuação da femoral comum, originando-se logo após a emergência da femoral profunda, tem trajeto superficial, tornando-se mais profunda no terço médio da coxa, onde está situada no canal do adutor (canal de Hunter), de onde continua como artéria poplítea.",
deep:"🎯 CASO CLÍNICO — ACHADOS-CHAVE\n→ Claudicação intermitente progressiva (1 ano)\n→ Dor aguda + frialdade + ausência de pulso poplíteo\n→ Diminuição de sensibilidade, motricidade preservada\n→ Angiorressonância: oclusão à esquerda\n→ DIAGNÓSTICO: ISQUEMIA ARTERIAL DOS MMII (sobre aterosclerose)\n\n🩸 O QUE PROCURAR: 'ausência de pulso POPLÍTEO'\nOnde está a obstrução? → PROXIMAL à artéria poplítea\n→ Ou seja, na ARTÉRIA FEMORAL (que se torna poplítea no canal dos adutores)\n\n🏛️ ANATOMIA VASCULAR DOS MMII (sequência arterial)\nAORTA ABDOMINAL (L4)\n↓\nARTÉRIAS ILÍACAS COMUNS (D e E)\n↓\nilíaca externa (pega o ligamento inguinal)\n↓\nARTÉRIA FEMORAL COMUM\n↓ (se bifurca em:)\n• Femoral PROFUNDA (irriga musculatura da coxa — faz colateralidade)\n• Femoral SUPERFICIAL (passa pelo canal dos adutores/Hunter)\n         ↓\n    Artéria POPLÍTEA\n         ↓\n    Tibiais anterior e posterior + fibular\n\n✅ POR QUE B CORRETA\nA femoral superficial é o sítio CLÁSSICO de obstrução aterosclerótica em MMII. Sua oclusão gera:\n• Claudicação da panturrilha (sintoma inicial)\n• Ausência do pulso POPLÍTEO (porque ela dá origem à poplítea)\n• A femoral profunda faz COLATERALIDADE, preservando motricidade mas não suficiente para evitar isquemia\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (femoral profunda): se ela estivesse obstruída, a colateralidade estaria pior; mas o pulso femoral estaria presente\n• C/D (safenas): são VEIAS superficiais, não causam isquemia arterial\n\n💡 MACETE\n'Claudicação + perda do pulso poplíteo = FEMORAL SUPERFICIAL (canal de Hunter)'"}
];

n(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}

function loadLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const state=JSON.parse(raw);if(state.answered&&Object.keys(state.answered).length>0){answered=state.answered;cur=state.cur||0;eliminated={};if(state.eliminated){for(const k in state.eliminated)eliminated[k]=new Set(state.eliminated[k]);}return true;}}catch(e){}return false;}
const _sbScript=document.createElement('script');_sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';_sbScript.onload=function(){window.sb=supabase.createClient('https://mmqfqlbojsbuuodfbilh.supabase.co','sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH');};document.head.appendChild(_sbScript);
async function saveToSupabase(i){try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const q=QS[i];const isDisc=q.disc;const userAns=isDisc?(answered[i]||'').substring(0,500):L[answered[i]];const correctAns=isDisc?'discursiva':L[q.g];const isCorrect=isDisc?null:(answered[i]===q.g);await sb.from('question_responses').upsert({user_id:user.id,question_id:PROVA_ID+'-q'+String(q.n).padStart(2,'0'),periodo:PERIODO,content_type:CONTENT_TYPE,user_answer:userAns,correct_answer:correctAns,is_correct:isCorrect,time_spent_seconds:0,topic:q.tema,difficulty:'media'},{onConflict:'user_id,question_id'});if(!isDisc&&isCorrect!==null){const{data:row}=await sb.from('user_progress').select('*').eq('user_id',user.id).eq('periodo',PERIODO).single();if(row){const t=row.total_questions_solved+1;const c=row.correct_answers+(isCorrect?1:0);const topics=row.topics_studied||[];if(q.tema&&!topics.includes(q.tema))topics.push(q.tema);await sb.from('user_progress').update({total_questions_solved:t,correct_answers:c,accuracy_percentage:parseFloat(((c/t)*100).toFixed(1)),last_studied:new Date().toISOString(),topics_studied:topics}).eq('user_id',user.id).eq('periodo',PERIODO);}else{await sb.from('user_progress').insert({user_id:user.id,periodo:PERIODO,total_questions_solved:1,correct_answers:isCorrect?1:0,accuracy_percentage:isCorrect?100:0,last_studied:new Date().toISOString(),topics_studied:q.tema?[q.tema]:[]});}}}catch(e){console.warn('Supabase:',e);}}
const _origSubmit=submitAnswer;submitAnswer=function(){const idx=cur;_origSubmit();saveLocal();if(answered[idx]!==undefined&&window.sb)saveToSupabase(idx);};
const _origReset=resetAll;resetAll=function(){localStorage.removeItem(STORAGE_KEY);_origReset();};
if(loadLocal()){renderQ();if(Object.keys(answered).length===QS.length)setTimeout(showResult,100);}
</script>
