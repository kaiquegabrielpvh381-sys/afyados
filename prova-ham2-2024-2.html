<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[{n:1,disc:false,tema:"Fundo de Olho — Oftalmoscopia",context:"(AFYA IPATINGA) Paciente masculino, 65 anos de idade, diabético e hipertenso, procura atendimento médico para consulta de rotina. Refere uso regular das medicações, com bom controle da glicemia e níveis pressóricos. Considerando as comorbidades do paciente, seu médico decide por realizar o exame do fundo de olho.",assertions:null,text:"Em relação a este exame é correto afirmar que",opts:["no exame dos vasos sanguíneos, as artérias são mais delgadas e de cor vermelho clara; as veias são mais calibrosas e de coloração vermelho escuras.","é considerando um procedimento invasivo, podendo levar a perda da visão.","colírio midriático deve ser utilizado em todos os pacientes, considerando ajudar no exame e a ausência de contraindicação para seu uso.","a retinopatia hipertensiva é a única indicação do exame oftalmoscópio no paciente em questão."],g:0,
exp:"O colírio midriático é contraindicado no caso de glaucoma com ângulo fechado.\nA retinopatia diabética também é indicação de realizar fundo de olho.\nÉ um procedimento não invasivo.",
deep:"👁️ FUNDO DE OLHO (OFTALMOSCOPIA) — REVISÃO COMPLETA\n\n🔬 O QUE É:\n   Exame NÃO invasivo (nenhum instrumento entra no olho)\n   Visualiza: retina, vasos, disco óptico, mácula\n\n📊 VASOS RETINIANOS — COMO DIFERENCIAR:\n   ARTÉRIAS  →  VEIAS\n   Calibre  |  Mais delgadas  |  Mais calibrosas\n   Cor  |  Vermelho CLARO  |  Vermelho ESCURO\n   Relação A:V  →  Normal: 2:3\n   Reflexo  |  Brilho central  |  Menos reflexo\n\n💊 MIDRIÁTICO — QUANDO USAR E QUANDO NÃO USAR:\n   Usar: melhora a visualização (dilata a pupila)\n   ❌ CONTRAINDICADO em: glaucoma de ângulo fechado\n   (pode precipitar crise de glaucoma agudo)\n\n📋 INDICAÇÕES DO FUNDO DE OLHO:\n   • Retinopatia DIABÉTICA ← indicação aqui\n   • Retinopatia HIPERTENSIVA ← indicação aqui\n   • Papiledema (hipertensão intracraniana)\n   • Descolamento de retina\n   • Degeneração macular\n   • Avaliação do nervo óptico (glaucoma)\n\n💡 ACHADOS NA RETINOPATIA HIPERTENSIVA:\n   Sinal de Gunn → cruzamentos A-V patológicos\n   Artérias em fio de cobre / prata\n   Exsudatos, hemorragias, papiledema (formas graves)"},
{n:2,disc:true,tema:"Campimetria de Confrontação",context:"(UNISL PORTO VELHO) A avaliação ideal do campo visual deve ser realizada através das campimetria computadorizada, entretanto a campimetria de confrontação é um teste simples e capaz de detectar defeitos relevantes no campo visual, podendo, inclusive, ser feito em pacientes acamados ou debilitados. O padrão de perda de campo visual pode sugerir o local de lesão neurológica.",assertions:null,text:"Acerca da campimetria visual, construa um texto dissertativo explicando:\nA. Descreva o preparo, posicionamento do paciente e execução semiológica da técnica citada.\nB. Explique a Interpretação dos possíveis achados do exame e correlação com nervos cranianos.",opts:[],g:null,
exp:"CAMPIMETRIA DE CONFRONTAÇÃO\nA avaliação ideal do campo visual deve ser realizada através das campimetria computadorizada, entretanto a campimetria de confrontação é um teste simples e capaz de detectar defeitos relevantes no campo visual, podendo, inclusive, ser feito em pacientes acamados ou debilitados. O padrão de perda de campo visual pode sugerir o local de lesão neurológica.\nPreparo.\nExaminador posiciona-se a cerca de 60 cm do paciente, à mesma altura, escolhendo um dos olhos para exame e ocluindo o olho contralateral.\nTécnica. A visão do avaliador é o parâmetro. Deve-se movimentar o indicador da periferia ao centro, tentando-se um olho de cada vez, repetindo, em seguida, para o outro olho.\nInterpretação. Lesões quiasmáticas (hemianopsia bitemporal) e pós-quiasmáticas sempre respeitam a linha média vertical, apresentando-se como hemianopsia bilateral bitemporal e homônima, respectivamente. Lesões prequiasmáticas não respeitam a linha média vertical e podem se apresentar de várias formas.",
deep:"👁️ CAMPIMETRIA DE CONFRONTAÇÃO — MAPA COMPLETO\n\n📍 TÉCNICA PASSO A PASSO:\n   • Examina e paciente frente a frente, MESMA ALTURA, ~60 cm\n   • Ocluir um olho do paciente\n   • Paciente olha para o nariz do examina (ponto fixo)\n   • Examina move o dedo da periferia → centro\n   • Paciente avisa quando começa a ver o dedo\n   • Testar os 4 quadrantes: sup-dir, sup-esq, inf-dir, inf-esq\n   • Repetir com o outro olho\n   💡 O campo do examina = referência (assumido normal)\n\n🗺️ INTERPRETAÇÃO DAS LESÕES:\n\n   LOCAL DA LESÃO  →  DEFECTO DE CAMPO VISUAL\n   PRÉ-QUIASMÁTICA  →  Não respeita linha média vertical\n   (nervo óptico, retina)  →  Pode ser: escotoma, amaurose unilateral\n   QUIASMA  →  Hemianopsia BITEMPORAL\n   (tumor hipofisário)  →  (perde as laterais dos 2 olhos)\n   PÓS-QUIASMÁTICA  →  Hemianopsia HOMÔNIMA\n   (trato óptico, lobo  →  (perde o mesmo lado nos 2 olhos)\n   occipital)  →  Respeita linha média vertical\n\n🧠 NERVO CRANIANO:\n   Todo o trajeto visual → NC II (nervo óptico)\n   Lesões retro-quiasmáticas → radiações ópticas (sem NC)"},
{n:3,disc:false,tema:"Sinais Meníngeos — Kernig vs Lasègue",context:"(FACIMPA) Homem de 65 anos de idade, pedreiro aposentado, deu entrada na Unidade de Pronto Atendimento, trazido por familiares com quadro de cefaleia, náuseas e febre (38°C) há 12 horas, além de dor intensa em região lombar, que não irradia, há 2 semanas. Ao exame fisico, apresentava-se em regular estado geral, sonolento, corado e desidratado. FR = 22 irpm, FC = 128 bpm e PA = 100x70 mmHg. Ao exame neurológico, apresentava abertura ocular espontânea, localizava estímulos dolorosos, pupilas isocóricas, fotorreagentes, sem déficits motores e sensitivos com moderada rigidez de nuca, sinais de Kernig e Brudzinski positivos.",assertions:null,text:"Com base no quadro acima, assinale a alternativa correta.",opts:["O sinal de Kernig e Lasègue são positivos tanto na meningite quanto na radiculopatia lombossacra; porém, na meningite os sinais geralmente são unilaterais e na radiculopatia são bilaterais.","A incapacidade de estender o joelho além de 135° com o quadril flexionado (sinal de Lasègue) deveria ter sido realizado, já que é base para a pesquisa de irritação na radiculopatia lombossacra.","Outro sinal de estiramento de raiz e que daria positivo no caso acima é o de Bragard, que consiste na flexão passiva do pescoço quando o paciente está em decúbito com as pernas estendidas.","Os sinais resultantes das manobras de Kernig, Brudzinski e rigidez de nuca minimizam o estiramento das raízes dos nervos espinais inflamadas e a distorção das meninges e raízes."],g:3,
exp:"INCORRETA. O sinal de Kernig é a incapacidade de estender o joelho além de 135° com o quadril flexionado.\nINCORRETA. Tanto o sinal de Kernig quanto a elevação da perna estendida são positivos na meningite em virtude da inflamação difusa das raízes nervosas e das meninges, e também são positivos na radiculopatia lombossacra aguda decorrente de inflamação focal da raiz afetada. Na radiculopatia os sinais geralmente são unilaterais, mas na meningite são bilaterais.\nINCORRETA. O sinal de Bragard é um aprimoramento da elevação da perna estendida (Laségue), no qual o paciente refere dor na perna sintomática quando realizado dorsiflexão passiva do pé.",
deep:"🧠 KERNIG vs LASÈGUE vs BRAGARD — DIFERENCIANDO\n\n1️⃣ SINAL DE KERNIG:\n   Paciente deitado\n   Quadril flexionado a 90°\n   Tenta estender o JOELHO\n   Positivo: não estende além de 135° + dor\n   Positivo em: meningite (bilateral) e radiculopatia\n\n2️⃣ SINAL DE LASÈGUE (Straight Leg Raise):\n   Paciente deitado\n   Eleva a perna ESTENDIDA (joelho reto)\n   Positivo: dor irradiada para a perna antes de 60°\n   Positivo em: radiculopatia lombar (geralmente unilateral)\n   Também positivo em meningite (bilateral)\n\n3️⃣ SINAL DE BRAGARD:\n   É um COMPLEMENTO do Lasègue\n   Faz o Lasègue → no ângulo da dor → dorsiflexão do pé\n   Positivo: aumenta a dor → confirma compressão radicular\n\n❌ ERROS DAS ALTERNATIVAS:\n   A → INVERTIDO: meningite = bilateral; radiculopatia = unilateral\n   B → Lasègue = elevação da perna (não flexão do joelho com quadril)\n   C → Bragard = complemento do Lasègue (não flexão do pescoço)\n\n✅ ALTERNATIVA D — CORRETA:\n   Os sinais meníngeos (Kernig, Brudzinski, rigidez de nuca)\n   são posições que MINIMIZAM o estiramento das meninges e raízes inflamadas\n   O corpo adota posições de alívio\n\n📌 MECANISMO GERAL:\n   Inflamação meníngea → qualquer tração das raízes = dor\n   Posições de alívio = flexão (encurtam o trajeto das raízes)"},
{n:4,disc:false,tema:"OVACE — Lactente",context:"(AFYA IPATINGA) Um estudante está no estágio em uma creche, quando uma professora, aflita, traz um bebê de 6 meses para ele avaliar. Ela relata que o bebê estava recebendo mamadeira de leite quando, de repente, ficou com dificuldade para respirar, apresentando lábios e extremidades arroxeados e dificuldade em emitir sons.",assertions:null,text:"Como se classifica essa situação e qual a conduta mais assertiva?",opts:["Obstrução parcial das vias aéreas; colocar o bebê deitado de costas sobre um travesseiro alto e aguardar que vomite o leite e melhore a respiração. Caso não tenho efeito, chamar o SAMU.","Obstrução grave das vias aéreas; realizar compressões abdominais (Manobra de Heimlich) com movimento em J, até que o bebê volte a respirar normalmente. Repetir até obter sucesso.","Obstrução grave das vias aéreas; aplicar 5 tapotagens entre as escápulas seguidas de 5 compressões firmes e com ritmo no esterno na linha intermamilar. Repetir até obter sucesso.","Obstrução parcial das vias aéreas; incentivar o vômito e a tosse, introduzindo uma espátula em sua garganta, até que o bebê vomite. Repetir até obter sucesso."],g:2,
exp:"A situação caracteriza um quadro de engasgo por obstrução total de vias aéreas superiores uma vez que o bebê apresenta, cianose evidenciada pelos lábios arroxeados e a dificuldade em respirar e emitir sons, denota que há obstrução total de via aérea.\nPosicionar o bebê em decúbito ventral sobre o antebraço não dominante, apoiando este na coxa. Mantenho a cabeça do bebê mais baixa que o tronco. Com a mão dominante livre, utilizar a região hipotênar entre as escápulas aplicando 5 (cinco) tapotagens. Transferir o bebê com segurança para o outro antebraço posicionando-o em decúbito dorsal, mantendo a cabeça alinhada, e com dois dedos (indicador e médio) aplicar 5 (cinco) compressões rápidas, firmes e com ritmo no esterno na linha intermamilar, numa relação 5:5. Repetir até obter sucesso. Avaliar se apresenta desobstrução, se o objeto foi expelido. Na ocorrência de êxito na aplicação da manobra observar melhora no padrão respiratório do bebê, bem como o retorno da coloração normal dos lábios e pele, uma vez que deixam de ficar cianóticos, e o bebê consegue emitir sons novamente, demonstrando estabilização no choro e ou vocalização.\nLembrando que mesmo no sucesso, há a necessidade de avaliação médica após a desobstrução das vias aéreas, pois o SAMU foi acionado.",
deep:"👶 OVACE EM LACTENTE (6 MESES) — TÉCNICA DETALHADA\n\n🚨 CLASSIFICAR PRIMEIRO:\n   Lábios arroxeados + sem sons + dificuldade respiratória\n   = OBSTRUÇÃO TOTAL (grave) → agir imediatamente\n\n📍 PASSO 1 — POSIÇÃO INICIAL:\n   Antebraço NÃO dominante apoiado na coxa\n   Bebê em decúbito VENTRAL (barriga para baixo)\n   Cabeça MAIS BAIXA que o tronco (facilita saída do objeto)\n\n💥 PASSO 2 — 5 TAPOTAGENS DORSAIS:\n   Região hipotênar da mão dominante\n   Entre as escápulas (interescapular)\n   Golpes firmes e rítmicos\n\n🔄 PASSO 3 — VIRAR O BEBÊ:\n   Transferir com segurança para o outro antebraço\n   Decúbito DORSAL (barriga para cima)\n   Cabeça alinhada com o tronco\n\n👆 PASSO 4 — 5 COMPRESSÕES TORÁCICAS:\n   2 dedos: indicador + médio\n   Local: esterno na linha INTERMAMILAR\n   Compressões rápidas, firmes, rítmicas\n\n   RELAÇÃO: 5:5 (5 tapotagens + 5 compressões)\n   Repetir até desobstruir ou bebê inconsciente\n\n✅ SINAIS DE SUCESSO:\n   • Melhora do padrão respiratório\n   • Lábios voltam a ter cor normal\n   • Bebê emite sons (choro/vocalização)\n\n❌ NÃO FAZER EM LACTENTE:\n   Heimlich abdominal → risco de lesão de órgãos internos\n   Varredura digital às cegas → pode piorar\n\n⚠️ MESMO COM SUCESSO → avaliação médica sempre"},
{n:5,disc:false,tema:"SBV — DEA na PCR",context:"(UNIFIPMOC) Em um shopping de sua cidade, um profissional de saúde atende a uma situação de parada cardiorrespiratória (PCR) e um estudante de medicina é acionado para pedir ajuda (chamar o SAMU) e providenciar o desfibrilador externo automático (DEA) disponível no local. Em 2 minutos ele retorna com o DEA e se prontifica para utilizá-lo.\n\nCom relação ao uso do equipamento, são feitas as seguintes afirmativas:\nI - A ressuscitação cardiopulmonar (RCP) deve ser interrompida enquanto o estudante liga e aplica as pás do DEA.\nII - Se o choque for indicado, o DEA emitirá a frase: \"choque recomendado, afaste-se do paciente\". Deve-se solicitar para que todos se afastem.\nIII - Caso a vítima tenha excesso de pelos no tórax, é necessário remover o excesso somente no local onde são aplicadas as pás do DEA.\nIV - Se a vítima estiver com o tórax molhado, é desnecessário secar o tórax antes de aplicar as pás do DEA.",assertions:"I - A ressuscitação cardiopulmonar (RCP) deve ser interrompida enquanto o estudante liga e aplica as pás do DEA.\nII - Se o choque for indicado, o DEA emitirá a frase: \"choque recomendado, afaste-se do paciente\". Deve-se solicitar para que todos se afastem.\nIII - Caso a vítima tenha excesso de pelos no tórax, é necessário remover o excesso somente no local onde são aplicadas as pás do DEA.\nIV - Se a vítima estiver com o tórax molhado, é desnecessário secar o tórax antes de aplicar as pás do DEA.",text:"É correto apenas o que se afirma em:",opts:["II, III e IV.","III e IV.","I e II.","II e III."],g:3,
exp:"As afirmativas II e III estão corretas de acordo com a Atualização da Diretriz de Ressuscitação Cardiopulmonar e Cuidados Cardiovasculares de Emergência da Sociedade Brasileira de Cardiologia.\nA Diretriz recomenda que a RCP seja fornecida enquanto as pás do DEA são aplicadas e até que o DEA esteja pronto para analisar o ritmo e que é necessário secar o tórax antes de aplicar as pás do DEA, caso o tórax esteja molhado.",
deep:"⚡ DEA — ASSERTIVAS ANALISADAS\n\n❌ ASSERTIVA I — ERRADA:\n   A RCP deve CONTINUAR enquanto as pás são aplicadas\n   Só interromper para análise do ritmo (< 10 segundos)\n   \"Minimize as interrupções nas compressões\"\n\n✅ ASSERTIVA II — CORRETA:\n   O DEA informa quando o choque é recomendado\n   Antes do choque → \"afastem-se do paciente\"\n   Ninguém pode tocar na vítima durante o choque (risco)\n\n✅ ASSERTIVA III — CORRETA:\n   Excesso de pelos → prejudica adesão das pás\n   → Raspar somente o local das pás\n   → Não precisa raspar todo o tórax\n\n❌ ASSERTIVA IV — ERRADA:\n   Tórax molhado → NECESSÁRIO secar\n   Água = condutor → dispersa a energia do choque\n   → Reduz eficácia da desfibrilação\n   → Risco de choque para o socorrista\n\n📋 RESUMO — CUIDADOS COM O DEA:\n   Situação  →  Conduta\n   Tórax molhado  →  SECAR antes de aplicar as pás\n   Excesso de pelos  →  RASPAR no local das pás\n   Marca-passo  →  Afastar pá ≥ 8 cm\n   Adesivo de fármaco  →  Retirar antes (ex: nitrato)\n   Vítima sobre metal  →  Afastar da superfície metálica"},
{n:6,disc:false,tema:"Escala de Glasgow",context:"(IESVAP) Homem de 27 anos vítima de acidente automobilístico é trazido pelo SAMU à emergência de um hospital. Na avaliação inicial da escala de coma de Glasgow o médico procedeu à verificação e não encontrou nenhum fator que interferisse na avaliação dos parâmetros. Manteve a observação não sendo detectado nenhum movimento ocular, verbal ou motor espontâneo. Pediu que o paciente abrisse os olhos e como não obteve resposta, procedeu à pressão no leito ungueal observando então, abertura ocular do paciente. Perguntou ao paciente o seu nome, aonde se encontrava e que dia da semana estavam, obtendo dele algo como \"ahmm...uhummm\". Solicitou ao paciente que apertasse sua mão e abrisse a boca, mas não teve resposta do paciente. Realizou uma compressão, pinça no trapézio, por 10 segundos obtendo uma flexão anormal no membro superior direito e uma extensão no membro superior esquerdo. Ao colocar a luz da lanterna nas pupilas observou que ambas eram reagentes à luz.",assertions:null,text:"Qual a pontuação total desse paciente na escala de coma de Glasgow?",opts:["6.","8.","7.","5."],g:2,
exp:"O caso mostra que na avaliação da abertura ocular, essa só ocorreu com o estímulo no leito ungueal, portanto, à pressão pontuando então O2.\nNa avaliação verbal tem-se som incompreensíveis, o paciente não teve nem frases e nem palavras compreensíveis, portanto, pontuou-se V2\nNa avaliação motora o paciente apresentou flexão anormal em um membro e extensão anormal no outro, como deve-se considerar a melhor resposta motora na avaliação do Glasgow, essa pontuação foi M3\nComo ambas as pupilas foram reagentes à luz, portanto normal, tem-se P0\nAssim tem-se:\nO2\nV2\nM3\nPupila = 0\nTotal = 7",
deep:"📊 GLASGOW — CALCULANDO ESTE CASO COMPLEXO\n\n🔵 ABERTURA OCULAR:\n   Sem espontânea ✗ → sem resposta à voz ✗\n   → Abre ao leito ungueal (pressão) = O2\n\n🟡 RESPOSTA VERBAL:\n   Não orienta ✗, sem palavras ✗\n   \"Ahmm... uhummm\" = sons incompreensíveis = V2\n\n🔴 RESPOSTA MOTORA — REGRA CRUCIAL:\n   MSD: flexão ANORMAL (decorticação) = M3\n   MSE: extensão ANORMAL (descerebração) = M2\n   → Usar a MELHOR resposta = M3\n\n   TOTAL: O2 + V2 + M3 = 7 → TCE GRAVE\n\n💡 REGRA DA MELHOR RESPOSTA:\n   Sempre registrar e pontuar a MELHOR resposta motora\n   Mesmo que membros diferentes respondam diferente\n   No caso: M3 (flexão anormal) > M2 (extensão anormal)\n\n📋 POSTURAS PATOLÓGICAS:\n   Decorticação (M3)  →  Flexão dos MMSS + extensão MMII\n   Lesão: córtex/cápsula interna\n   Descerebração (M2)  →  Extensão de todos os membros\n   Lesão: tronco encefálico\n   Prognóstico pior\n\n⚡ 7 pontos = TCE GRAVE → avaliar IOT"},
{n:7,disc:true,tema:"OVACE — Adulto Obeso",context:"(AFYA IPATINGA) Homem, 50 anos, apresentou engasgo quando comia um pedaço de carne durante um passeio no parque. Um estudante de medicina passava pelo local no momento do engasgo observou que o homem segurava o pescoço com ambas as mãos e apresentava incapacidade de falar além de cianose de lábios e extremidades.",assertions:null,text:"A. Classifique a obstrução do paciente (valor: 1,0)\nB. Descreva a manobra que seria ideal para desobstrução. (valor: 1,5)",opts:[],g:null,
exp:"A.Trata-se de uma obstrução grave. Os sinais de obstrução grave (total) das vias aéreas incluem: • Incapacidade de respirar, tossir e falar, cianose de lábios e extremidades, indicando que não há passagem de ar. • A vítima pode fazer o sinal universal da asfixia (segurando o pescoço com uma ou ambas as mãos) ou apenas apontar com as mãos voltadas para o pescoço, indicando que está engasgada e precisa de ajuda.\nB.Em caso de obstrução grave das vias aéreas em vítima consciente, deve-se utilizar a manobra de Heimlich. A sequência seria:\n1. Posicionamento: ficar atrás da pessoa e colocar os braços ao redor da cintura dela. Fechar uma das mãos em um punho e posiciona-la ligeiramente acima do umbigo da pessoa, no meio do abdômen.\n2. Ação: segurar o punho com a outra mão. Realizar compressões rápidas e firmes para dentro e para cima, como se estivesse tentando levantar a pessoa. (em J). Continuar aplicando as compressões até que o objeto que está obstruindo as vias aéreas seja expelido ou até que a pessoa perca a consciência.",
deep:"🚨 OVACE GRAVE — SINAIS E MANOBRA\n\n🔴 A) CLASSIFICANDO A OBSTRUÇÃO:\n\nPARCIAL:\n   • Tosse presente (mesmo fraca)\n   • Emite algum som\n   • Conduita: encorajar tosse vigorosa\n\nTOTAL (GRAVE) ← CASO AQUI:\n   • Incapacidade de falar / tossir / respirar\n   • Cianose (lábios e extremidades arroxeados)\n   • Sinal universal da asfixia: mãos no pescoço\n   • Sem passagem de ar\n\n🤲 B) MANOBRA DE HEIMLICH:\n\n   POSIÇÃO:\n   → Ficar atrás da vítima\n   → Braços ao redor da cintura\n\n   POSIÇÃO DAS MÃOS:\n   → 1ª mão: punho fechado, polegar para dentro\n   → Posicionar: acima do umbigo, abaixo do apêndice xifóide\n   → 2ª mão: espalmada sobre a 1ª\n\n   AÇÃO:\n   → Compressões rápidas e firmes\n   → Movimento em J: para dentro E para cima\n   → Repetir até expelir o objeto\n   → Parar se vítima perder consciência → protocolo PCR\n\n⚠️ VARIAÇÕES ESPECIAIS:\n   Situação  →  Adaptação\n   Grávida/Obeso  →  Compressões TORÁCICAS (não abdominais)\n   Vítima inconsc.  →  Deitar → RCP → verificar boca\n   Autoheimlch  →  Punho próprio ou borda de mesa"},
{n:8,disc:false,tema:"SBV — Primeira Conduta na PCR",context:"(UNINOVAFAPI) Durante um plantão, um estudante de medicina é chamado para ajudar em uma situação de emergência em um parque próximo ao hospital. Um homem adulto, aparentemente saudável, colapsa repentinamente enquanto corria. O estudante chega ao local e encontra o homem deitado no chão, inconsciente e sem resposta. Não há pulso palpável e a respiração está ausente.",assertions:null,text:"Qual é a primeira conduta que o estudante deve realizar?",opts:["Verificar os sinais vitais a cada 5 minutos.","Transportar a vítima para iniciar os primeiros socorros dentro do hospital.","Realizar compressões torácicas de alta qualidade.","Iniciar imediatamente ventilação boca a boca."],g:2,
exp:"Iniciar imediatamente ventilação boca a boca: a ventilação é importante, mas as compressões torácicas devem ser priorizadas. A relação ideal é de 30 compressões para 2 ventilações, se houver um segundo socorrista treinado.\nAo reconhecer uma parada cardiorrespiratória (PCR) em um adulto fora do ambiente hospitalar, a primeira conduta adequada é iniciar compressões torácicas de alta qualidade. As compressões torácicas devem ser realizadas com uma profundidade de pelo menos 5 cm, a uma frequência de 100-120 compressões por minuto, permitindo o retorno completo do tórax entre as compressões. Esta ação é crucial para manter a circulação sanguínea até que ajuda avançada chegue ao local.\nTransportar a vítima imediatamente para o hospital: O transporte deve ser realizado após iniciar as manobras de RCP (ressuscitação cardiopulmonar) e apenas quando estiver disponível um serviço de emergência preparado para continuar o suporte durante o transporte.\nVerificar os sinais vitais a cada 5 minutos: em uma situação de PCR, a prioridade é realizar compressões torácicas contínuas e de alta qualidade, não há tempo para verificar os sinais vitais a cada 5 minutos.",
deep:"🫀 PCR FORA DO HOSPITAL — PRIORIDADES\n\n✅ PRIMEIRA CONDUTA: COMPRESSÕES TORÁCICAS\n   Protocolo C-A-B (não mais A-B-C)\n   C → Compressões primeiro\n   A → Abertura de via aérea\n   B → Breathing (ventilações)\n\n📐 COMPRESSÕES DE ALTA QUALIDADE:\n   • Profundidade: ≥ 5 cm (5-6 cm)\n   • Frequência: 100-120/min\n   • Retorno completo do tórax (descomprimir totalmente)\n   • Minimizar interrupções (< 10 seg)\n   • Não se apoiar sobre o tórax entre compressões\n\n❌ POR QUE NÃO AS OUTRAS:\n   A → Verificar sinais vitais a cada 5 min = perda de tempo na PCR\n   B → Transportar antes da RCP = reduz sobrevida drasticamente\n   D → Ventilação primeiro = protocolo antigo e errado (C é primeiro)\n\n📋 SEQUÊNCIA COMPLETA (1 socorrista):\n   1. Segurança da cena\n   2. Checar responsividade\n   3. Pedir ajuda + DEA\n   4. Checar pulso + respiração (≤10 seg)\n   5. 30 compressões → 2 ventilações\n   6. DEA assim que chegar\n\n💡 POR QUE COMPRESSÕES PRIMEIRO:\n   Coração parado → sangue oxigenado ainda no pulmão\n   Compressões circulam esse sangue imediatamente\n   Cada minuto sem RCP = ↓ 10% de sobrevida"},
{n:9,disc:false,tema:"Campimetria — Lesão do Quiasma",context:"(FASA VIC) Homem de 35 anos retornou ao ambulatório acadêmico com resultados de exames. Ele compareceu inicialmente, queixando-se de cefaleia e dificuldade visual. Após o exame físico um grupo de alunos suspeitou de uma lesão expansiva no sistema nervoso central e solicitou uma tomografia do crânio. A tomografia levantou a suspeita de um tumor comprimindo o quiasma óptico.",assertions:null,text:"Identifique um possível achado no exame paciente.",opts:["O teste de campos visuais por confrontação identificará hemianopsia bitemporal.","A campimetria evidenciará uma hemianopsia homônima ou quadrantanopsia.","A mobilidade ocular mostrará dificuldade do paciente em lateralizar os globos oculares.","A fundoscopia evidenciará cruzamentos arteriovenosos anormais na retina."],g:0,
exp:"A lesão na topografia do quiasma levará a uma perda visual decorrente da compressão no segundo par craniano. A fundoscopia não evidenciará cruzamentos arteriovenosos anormais, já que a retina não é acometida nesse tipo de lesão. O teste de campo visual por confrontação (ou campimetria) mostrará perda da visão nas regiões temporais, já que as imagens dessas regiões são formadas na retina nasal, inervada por fibras que passam no quiasma óptico.",
deep:"👁️ QUIASMA ÓPTICO — POR QUE CAUSA HEMIANOPSIA BITEMPORAL\n\n🔬 ENTENDENDO A ANATOMIA:\n   Retina NASAL → fibras cruzam no quiasma → vão para o lado oposto\n   Retina TEMPORAL → fibras NÃO cruzam → seguem ipsilaterais\n\n   A retina NASAL processa o campo visual TEMPORAL\n   (o que está na lateral é projetado na parte interna da retina)\n\n🎯 LESÃO NO QUIASMA (tumor hipofisário):\n   Comprime as fibras que CRUZAM (= fibras nasais de ambos os olhos)\n   → Perde a retina nasal bilateral\n   → Perde o campo visual TEMPORAL bilateral\n   → HEMIANOPSIA BITEMPORAL (\"visão de túnel\")\n\n🗺️ MAPA DAS LESÕES DA VIA ÓPTICA:\n   Lesão  →  Defecto visual\n   NC II  →  Amaurose unilateral (cegueira de 1 olho)\n   QUIASMA ← AQUI  →  Hemianopsia BITEMPORAL\n   Trato óptico  →  Hemianopsia HOMÔNIMA\n   (após quiasma)  →  (mesmo lado nos 2 olhos)\n   Lobo occipital  →  Hemianopsia homônima (com preservação\n   macular)\n\n❌ POR QUE NÃO AS OUTRAS:\n   B → Homônima = lesão pós-quiasma, não no quiasma\n   C → Mobilidade ocular = NC III, IV, VI (não afetados aqui)\n   D → Cruzamentos A-V = retinopatia hipertensiva (retina, não quiasma)"},
{n:10,disc:false,tema:"Teste de Romberg",context:"(UNIPTAN) Paciente de 74 anos de idade, foi atendida em domicílio devido a queixas de desconforto e desequilíbrio durante a marcha. Ela relata sentir que um dos lados do seu corpo não está funcionando corretamente ao caminhar e ao realizar atividades diárias. Durante a avaliação domiciliar, foi solicitado que o acadêmico realizasse os testes de equilíbrio, neste cenário marque a alternativa correta.",assertions:null,text:"Marque a alternativa correta.",opts:["Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o teste de Romberg do paciente está alterado.","Deve-se realizar o teste de Stewart Holmes, para avaliar se o paciente apresenta pequenas oscilações do corpo, com tendência a movimentar-se, estando assim positivo.","Deve ser realizado o Teste de Romberg, observando se o paciente fica em pé com os olhos fechados e pés juntos sem desequilibrar. O examinador deve ficar próximo para evitar quedas.","Deve-se solicitar que o paciente faça o teste de coordenação dedo-nariz, para avaliar se o mesmo apresenta disbasia."],g:2,
exp:"O teste de Romberg é uma forma de avaliar o equilibrio estático. A prova é realizada com o paciente de pé e com os pés juntos. O mesmo deve olhar para frente ter os braços junto ao corpo. O examinador então solicita que o paciente feche os olhos, ficando próximo para evitar quedas. Se houver forte tendencia a quedas consideramos o teste positivo.",
deep:"⚖️ ROMBERG — REVISÃO FINAL\n\n📍 TÉCNICA:\n   Pés JUNTOS, olhos ABERTOS → observar\n   Pés JUNTOS, olhos FECHADOS → observar\n   Examina ao lado → prevenir quedas\n   Positivo: oscilação forte ou queda ao fechar os olhos\n\n🔍 INTERPRETAÇÃO:\n   Estável com olhos abertos\n   Cai ao fechar → Positivo  →  Vestibular ou proprioceptivo\n   (compensa com a visão)\n   Cai com olhos abertos e fechados → Negativo para\n   Romberg, mas indica CEREBELAR (ataxia presente sempre)\n\n❌ POR QUE NÃO AS OUTRAS:\n   A → Dedo-nariz avalia COORDENAÇÃO (cerebelo), não equilíbrio estático\n   B → Stewart-Holmes avalia DISDIADOCOCINESIA cerebelar\n   D → Disbasia = dificuldade de marcha, não avaliada com dedo-nariz\n\n🧭 QUANDO USAR CADA TESTE:\n   Teste  →  Para avaliar\n   Romberg  →  Equilíbrio estático\n   Marcha em tandem  →  Equilíbrio dinâmico / cerebelar\n   Dedo-nariz  →  Dismetria / coordenação cerebelar\n   Stewart-Holmes  →  Disdiadococinesia (rebote)\n   Trendelenburg  →  Fraqueza do glúteo médio"}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
