<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

n:1,

tema:"Fisiologia Cardiovascular — Microcirculação (Forças de Starling)",
context:"Um senhor, de 52 anos, conhecido em seu bairro como um “boa praça”, nunca recusou uma noitada regada a todo tipo de bebida alcóolica. Há algumas semanas tem percebido que os pés estão ficando edemaciados a maior parte do tempo. Procurou atendimento médico, onde pela história clínica e pela anamnese, foi solicitada tomografia de abdome, a qual demonstrou calcificações no fígado e no pâncreas. Além do exame de imagem, o médico solicitou exames laboratoriais e dosagem de algumas enzimas hepáticas, que revelou albumina sérica reduzida com 1,02g (Valor de referência: 3,5 a 5,2g). Com diagnóstico de cirrose hepática, o paciente descobriu que a opção de vida feita por ele, veio agora cobrar seu preço.\n\nApós a leitura do texto, responda o que se pede a seguir.",

assertions:null,
text:"a) Explique o mecanismo do edema observado no senhor \"boa praça\", considerando as alterações nas forças de Starling.\n\nb) O que é um vaso de resistência? Descreva suas principais características.",
opts:null,
g:null,
exp:"Explique o mecanismo do edema, considerando as alterações nas forças de Starling.\n\n\"Edema de membros é causado pela diminuição dos níveis sanguíneos de albumina, que não está sendo produzida pelo fígado, devido à lesão crônica. A albumina tem função na pressão oncótica, a medida que os níveis vão reduzindo ocorre diminuição da pressão oncótica e a pressão hidrostática supera bastante o gradiente, levando a uma maior filtração (extravasamento) de líquido dos vasos para o espaço intersticial e uma diminuição da taxa de reabsorção\"\n\nO que é um vaso de resistência? Descrever suas principais características.\n\n\"As arteríolas são consideradas vasos de resistência e são os principais determinantes da pressão sanguínea sistêmica. São muito finas, geralmente com menos de 0,5mm de diâmetro. A túnica íntima possui um endotélio, um subendotélio e uma lâmina elástica interna muito delgada. Formada por 3 – 4 camadas de fibras musculares lisas, proporcionalmente muito espessa em relação ao diâmetro externo do vaso e ao diâmetro do seu lúmen.\"",
deep:"🎯 CONCEITO-CHAVE — FORÇAS DE STARLING\nO equilíbrio entre filtração e reabsorção nos capilares depende de 4 forças:\n→ Pressão hidrostática capilar (Phc): EMPURRA líquido PRA FORA\n→ Pressão oncótica plasmática (Ponc): PUXA líquido PRA DENTRO (albumina)\n→ Pressão hidrostática intersticial (Phi): empurra líquido PRA DENTRO\n→ Pressão oncótica intersticial: puxa líquido PRA FORA (normalmente baixa)\n\n🧬 NO CASO DO \"BOA PRAÇA\" (CIRROSE HEPÁTICA)\n→ Fígado lesado crônico → ↓↓ síntese de ALBUMINA\n→ Albumina sérica = 1,02 g/dL (VR: 3,5–5,2) → HIPOALBUMINEMIA GRAVE\n→ ↓ Albumina plasmática → ↓ PRESSÃO ONCÓTICA\n→ Pressão hidrostática SUPERA a oncótica em toda extensão capilar\n→ ↑↑ Filtração + ↓↓ Reabsorção → EDEMA\n\n💧 OUTROS MECANISMOS DE EDEMA NA CIRROSE\n• Hipertensão portal → ↑ pressão hidrostática capilar esplâncnica\n• Ativação do SRAA → retenção de Na⁺ e água\n• Linfa insuficiente para drenar o excesso\n\n🩸 VASOS DE RESISTÊNCIA = ARTERÍOLAS\n→ Diâmetro < 0,5 mm\n→ 3–4 camadas de MÚSCULO LISO na túnica média (muito desenvolvida)\n→ Parede espessa em relação à luz\n→ Inervação simpática DENSA\n→ Principal local de REGULAÇÃO da pressão arterial sistêmica\n→ Pequenas variações no raio = GRANDES variações na resistência (lei de Poiseuille: R ∝ 1/r⁴)\n\n💡 MACETE\n'Cirrose → Fígado não faz albumina → ↓ oncótica → líquido vaza → EDEMA'\n'ARTERÍOLA = VASO DE RESISTÊNCIA (controla PA)'"

{
n:2,
disc:false,
tema:"Hematologia — Hemograma em Infecção Bacteriana",
context:"Paciente, masculino, 35 anos, é levado ao pronto-socorro com quadro de febre alta, prostração, calafrios, dor de garganta e cefaleia intensa, sugerindo uma possível infecção bacteriana. Ao realizar a avaliação inicial, o médico solicita um hemograma completo para avaliar a contagem de células sanguíneas e possíveis marcadores de inflamação.",
contextHTML:null,
assertions:null,
text:"Espera-se observar no hemograma:",
opts:["diminuição de plaquetas.", "diminuição de hemácias.", "elevação de eosinófilos.", "elevação de bastonetes."],
g:3,
exp:"Durante uma infecção bacteriana aguda, é comum observar um aumento na contagem total de leucócitos, especialmente devido ao aumento dos neutrófilos e bastonetes (neutrófilos jovens).\n\nA diminuição das plaquetas não está relacionada a infecções bacterianas. As plaquetas estão envolvidas na coagulação do sangue e sua diminuição é mais frequentemente associada a distúrbios da coagulação ou infecções virais.\n\nOs eosinófilos estão geralmente associados a reações alérgicas e infecções parasitárias, não sendo tipicamente elevados em infecções bacterianas.\n\nA diminuição de hemácias ocorre em casos de anemia.",
deep:"🎯 ACHADO CLÁSSICO EM INFECÇÃO BACTERIANA AGUDA\n→ LEUCOCITOSE com NEUTROFILIA\n→ DESVIO À ESQUERDA = ↑ BASTONETES (neutrófilos jovens liberados precocemente da medula)\n\n🧬 QUEM É QUEM NO HEMOGRAMA\n\n🦠 INFECÇÃO BACTERIANA → ↑ NEUTRÓFILOS + ↑ BASTONETES (desvio à esquerda)\n🦠 INFECÇÃO VIRAL → ↑ LINFÓCITOS (linfocitose) | às vezes ↓ plaquetas\n🪱 PARASITOSE / ALERGIA → ↑ EOSINÓFILOS\n🏥 SEPSE GRAVE → pode ter LEUCOPENIA (mau prognóstico)\n\n📊 VALORES DE REFERÊNCIA (adulto)\n→ Leucócitos totais: 4.000–10.000/mm³\n→ Neutrófilos segmentados: 50–70%\n→ Bastonetes: 1–5% (↑ = desvio à esquerda)\n→ Linfócitos: 20–40%\n→ Eosinófilos: 1–5%\n→ Basófilos: 0–1%\n→ Monócitos: 2–10%\n\n⚠️ DESVIO À ESQUERDA\nBastonetes > 5% ou > 500/mm³ = sinal de infecção bacteriana ativa (medula liberando células imaturas pra suprir demanda)\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (↓ plaquetas): típico de viroses (dengue, CMV) ou sepse grave — não é achado clássico de bacteriana\n• B (↓ hemácias): anemia, perda sanguínea, hemólise — não é do quadro\n• C (↑ eosinófilos): parasitose, alergia, asma — não bacteriana\n\n💡 MACETE\n'BACTÉRIA = NEUTRÓFILO (com BASTONETE à esquerda) | VÍRUS = LINFÓCITO | VERME = EOSINÓFILO'"
},

disc:false,
tema:"Hematologia — Hemoglobinas do Recém-nascido",
context:"Recém-nascido (RN), 40 semanas, pais hígidos e em idade reprodutiva. Ao nascimento, o bebê apresenta-se com icterícia leve (+/++++) e o médico pede, nos exames complementares da maternidade, um hemograma completo e a avaliação dos tipos de hemoglobina presentes no sangue do RN.",
contextHTML:null,
assertions:"I – O RN apresenta concentração baixa de Hb A2 nos eritrócitos, a qual apresenta quatro cadeias globulares.\nII - O RN apresenta maior concentração de Hb F nos eritrócitos, a qual apresenta duas cadeias globulares.\nIII - O RN apresenta concentração elevada de Hb A1 nos eritrócitos, a qual apresenta quatro cadeias globulares.\nIV - O RN apresenta uma alta concentração de Hb Bart´s nos eritrócitos, a qual apresenta duas cadeias globulares, tendo origem no fígado.",
text:"É correto apenas o que se afirma em",
opts:["II e IV.", "I e II.", "III e IV.", "I e III."],
g:3,
exp:"I e III são corretas.\n\nII - O RN apresenta menor concentração de Hb F nos eritrócitos, com quatro cadeias globulares tendo origem na medula óssea vermelha.\n\nIV - O RN não apresenta possivelmente Hb Bart´s nos eritrócitos, relacionadas aos quadros de Talassemia.",
deep:"🎯 TIPOS DE HEMOGLOBINA — QUATRO CADEIAS GLOBULARES SEMPRE\nToda hemoglobina é um TETRÂMERO (2 pares de cadeias) com 4 grupos heme.\n\n🧬 PRINCIPAIS HEMOGLOBINAS\n\n🔵 HbA1 (α₂β₂) — ADULTO\n→ ~97% no adulto\n→ Presente no RN em concentração CRESCENTE após o nascimento (transição pós-natal)\n→ Origem: medula óssea vermelha\n\n🔵 HbA2 (α₂δ₂) — MENOR\n→ ~2-3% no adulto, BAIXA no RN\n→ ↑ em beta-talassemia menor\n\n🟣 HbF (α₂γ₂) — FETAL\n→ PREDOMINANTE no feto e RN (~60-80% ao nascer)\n→ Maior afinidade pelo O₂ (resiste ao 2,3-BPG)\n→ Declina após o nascimento (substituída por HbA1)\n\n🔴 HbH (β₄) — PATOLÓGICA — alfa-talassemia (deleção de 3 genes alfa)\n🔴 Hb Bart's (γ₄) — PATOLÓGICA — alfa-talassemia grave (deleção dos 4 genes alfa) → hidropsia fetal → INCOMPATÍVEL COM A VIDA\n\n✅ DECIFRANDO A QUESTÃO\n• I ✓ — HbA2 BAIXA no RN (correta — 4 cadeias, sempre)\n• II ✗ — HbF tem 4 cadeias (α₂γ₂), não 2\n• III ✓ — HbA1 já está presente (em ascensão) no RN, 4 cadeias\n• IV ✗ — Hb Bart's é PATOLÓGICA (alfa-talassemia), tem 4 cadeias gama (γ₄), não 2. RN saudável NÃO tem Hb Bart's\n\n💡 MACETE\n'TODA hemoglobina tem 4 cadeias. RN tem MUITA HbF (fetal) e POUCA HbA2. Hb Bart's = DOENÇA grave'"
},

tema:"Fisiologia Cardiovascular — Ciclo Cardíaco e Bulhas",
context:"Homem, de 40 anos, sem histórico médico significativo, procura atendimento médico para um \"check-up\" de rotina. Ele relata estar se sentindo bem e não tem queixas específicas de saúde. Durante a consulta, ao realizar a ausculta cardíaca do paciente, foi observado padrões normais de bulhas cardíacas.",

text:"A) Descreva os eventos mecânicos do ciclo cardíaco relacionados às principais bulhas cardíacas observadas no paciente.",

g:null,
exp:"A) Durante cada ciclo cardíaco, existem quatro bulhas cardíacas, mas em um coração normal apenas a primeira e a segunda bulhas cardíacas (B1 e B2) são auscultadas com um estetoscópio. A primeira bulha (B1) é causada pela turbulência do sangue associada ao fechamento das valvas AV logo depois de a sístole ventricular começar. A segunda bulha B2 é causada pela turbulência no sangue associada ao fechamento das valvas do tronco pulmonar e da aorta no início da diástole ventricular.",
deep:"🎯 CICLO CARDÍACO — FASES E BULHAS\nO ciclo cardíaco = SÍSTOLE (contração) + DIÁSTOLE (relaxamento), com 4 bulhas possíveis (só B1 e B2 audíveis em adulto normal).\n\n🔊 AS 4 BULHAS\n\n🟢 B1 (\"TUM\") — INÍCIO DA SÍSTOLE VENTRICULAR\n→ Fechamento das valvas ATRIOVENTRICULARES (mitral + tricúspide)\n→ Marca o início da contração isovolumétrica\n→ Melhor audível no ápice\n→ Bulha MAIS INTENSA e LONGA\n\n🟢 B2 (\"TÁ\") — INÍCIO DA DIÁSTOLE VENTRICULAR\n→ Fechamento das valvas SEMILUNARES (aórtica + pulmonar)\n→ Marca o fim da sístole / início do relaxamento isovolumétrico\n→ Melhor audível na base\n→ Bulha MAIS CURTA e AGUDA\n→ Desdobramento fisiológico na INSPIRAÇÃO (A2 antes, P2 depois)\n\n🟡 B3 — início do enchimento ventricular rápido (patológica em adulto, fisiológica em jovem/atleta)\n→ Sugere disfunção sistólica / insuficiência cardíaca\n\n🟡 B4 — contração atrial contra ventrículo não complacente (sempre patológica em adulto)\n→ Sugere disfunção diastólica / HAS, estenose aórtica\n\n🔬 EVENTOS DO CICLO\n1. Sístole atrial (\"pontapé atrial\") → completa enchimento ventricular\n2. B1 → fecha mitral/tricúspide\n3. Contração isovolumétrica → pressão sobe sem ejeção\n4. Ejeção ventricular → abre aórtica/pulmonar\n5. B2 → fecha aórtica/pulmonar\n6. Relaxamento isovolumétrico\n7. Enchimento ventricular (passivo + ativo)\n\n💡 MACETE\n'TUM (B1) = FECHA AV, INÍCIO DA SÍSTOLE | TÁ (B2) = FECHA SEMILUNAR, INÍCIO DA DIÁSTOLE'"
},

{
n:5,
disc:false,
tema:"Imunologia — Resposta Imune Celular",
context:"Durante uma consulta médica, um paciente relata que foi picado por um mosquito transmissor de dengue. O médico suspeita que o sistema imunológico do paciente está respondendo à infecção viral. O médico, então, solicita alguns exames laboratoriais.\n\nConsiderando esse contexto, avalie as seguintes asserções e a relação proposta entre elas.",
contextHTML:null,
assertions:"I. Os resultados do exame devem mostrar um aumento significativo no número de células T ativadas e na produção de citocinas. Com base nesses achados, o médico pode concluir que o paciente está desenvolvendo uma resposta imunológica celular.\n\nPORQUE\n\nII. A resposta imunológica celular envolve a ativação de células TCD8, que desempenham um papel fundamental na defesa contra infecções virais. Tais células liberam citocinas que vão coordenar a resposta imune adaptativa, sendo importante na eliminação de células infectadas.",
text:"A respeito dessas asserções, assinale a opção correta.",
opts:["As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa da I.", "A asserção I é uma proposição verdadeira, e a II é uma proposição falsa.", "As asserções I e II são proposições verdadeiras, e a II é uma justificativa da I.", "A asserção I é uma proposição falsa, e a II é uma proposição verdadeira."],
g:2,
exp:"A asserção I é verdadeira, pois a ativação de células T e a produção de citocinas são características da resposta imunológica celular. Além disso, a asserção II também é verdadeira e justifica a I, pois as células T desempenham um papel crucial na coordenação da resposta imune adaptativa.",
deep:"🎯 RESPOSTA IMUNE — CELULAR vs HUMORAL\n\n🔴 RESPOSTA CELULAR (mediada por LT)\n→ Patógenos INTRACELULARES (vírus, micobactérias, fungos)\n→ Células principais: LT CD4+ (helper) + LT CD8+ (citotóxica)\n→ LT CD8+ reconhece antígenos apresentados via MHC-I → mata células infectadas (perforina + granzima)\n→ LT CD4+ Th1 produz IFN-γ, IL-2 → ativa macrófagos e LT CD8+\n→ Citocinas coordenam toda a resposta adaptativa\n\n🔵 RESPOSTA HUMORAL (mediada por LB + anticorpos)\n→ Patógenos EXTRACELULARES (bactérias encapsuladas, toxinas)\n→ Células principais: LB → plasmócitos → anticorpos\n→ Neutralização, opsonização, ativação do complemento\n\n🦟 NO CASO DA DENGUE (vírus)\n→ Patógeno INTRACELULAR → RESPOSTA CELULAR predomina\n→ Aumento de LT ativados e citocinas é ESPERADO\n→ LT CD8+ eliminam hepatócitos infectados (principal reservatório viral)\n→ 'Tempestade de citocinas' na dengue grave está relacionada à resposta exacerbada\n\n✅ POR QUE I E II SÃO VERDADEIRAS E II JUSTIFICA I\n• I afirma que ↑ LT + ↑ citocinas = resposta celular (VERDADEIRO)\n• II explica POR QUE isso é importante — LT CD8+ matam células infectadas (VERDADEIRO)\n• II justifica I: as células T são exatamente o que caracteriza a resposta celular\n\n💡 MACETE\n'VÍRUS (intracelular) = RESPOSTA CELULAR (LT CD8+ matam a célula infectada)'\n'BACTÉRIA extracelular = RESPOSTA HUMORAL (anticorpos neutralizam)'"
},

{
n:6,
disc:false,
tema:"Fisiologia Cardiovascular — Resposta Adrenérgica ao Exercício",
context:"Durante uma sessão de treinamento de resistência em uma academia, um indivíduo, de 25 anos, realiza exercícios de levantamento de pesos. Durante a atividade, ele percebe que sua frequência cardíaca aumenta consideravelmente, acompanhada por um aumento na intensidade de suas contrações musculares. Ao mesmo tempo, ele nota que sua respiração se torna mais profunda e rápida para compensar o aumento na demanda de oxigênio. Considerando o caso clínico descrito, qual dos seguintes mecanismos fisiológicos está mais diretamente relacionado às respostas cardiovasculares observadas durante o treinamento de resistência?",
contextHTML:null,
assertions:null,
text:"Considerando o caso clínico descrito, qual dos seguintes mecanismos fisiológicos está mais diretamente relacionado às respostas cardiovasculares observadas durante o treinamento de resistência?",
opts:["Diminuição da pressão arterial devido à liberação de endorfinas.", "Redução da liberação de insulina para controlar os níveis de glicose.", "Aumento da frequência cardíaca como resposta ao aumento da atividade simpática e à liberação de adrenalina.", "Diminuição do fluxo sanguíneo para os músculos para conservar energia."],
g:2,
exp:"Durante o treinamento de resistência, há um aumento da demanda de oxigênio pelos músculos esqueléticos em atividade. Isso leva à ativação do sistema nervoso simpático, que aumenta a liberação de adrenalina. A adrenalina, por sua vez, atua nos receptores beta-adrenérgicos do coração, estimulando-o a aumentar sua frequência de batimentos cardíacos (frequência cardíaca) para fornecer mais oxigênio e nutrientes aos músculos em atividade. Assim, o aumento da frequência cardíaca é uma resposta fisiológica adaptativa para suprir a demanda metabólica aumentada durante o treinamento de resistência.",
deep:"🎯 RESPOSTA CARDIOVASCULAR AO EXERCÍCIO\nO exercício físico é a situação fisiológica de maior ATIVAÇÃO SIMPÁTICA, com objetivo de aumentar a oferta de O₂ aos músculos.\n\n🧬 EIXO ADRENÉRGICO NO EXERCÍCIO\n\n⚡ Ativação do SNA simpático + liberação de catecolaminas (adrenalina/noradrenalina pela medula adrenal)\n\n💓 NO CORAÇÃO — receptores β1\n→ ↑ Cronotropismo (FC sobe)\n→ ↑ Inotropismo (força de contração)\n→ ↑ Dromotropismo (condução AV)\n→ ↑ Batmotropismo (excitabilidade)\n→ Resultado: ↑ DÉBITO CARDÍACO (DC = FC × VS)\n\n🩸 NOS VASOS\n→ α1: vasoconstrição em pele, vísceras, rins (desvia sangue para músculo)\n→ β2: VASODILATAÇÃO em músculo esquelético e coronárias (aumenta aporte de O₂)\n\n🫁 NOS PULMÕES — receptores β2\n→ Broncodilatação → ↑ ventilação\n\n🏋️ FONTES DE ENERGIA NO TREINO DE RESISTÊNCIA\n→ Curto (< 30s): ATP-CP → fosfocreatina\n→ Médio (30s-2min): glicólise anaeróbia → lactato\n→ Longo (> 2min): metabolismo oxidativo (Krebs + cadeia respiratória)\n→ Insulina CAI; glucagon + adrenalina + cortisol SOBEM (mobilizam glicose e ácidos graxos)\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: PA AUMENTA no exercício (PAS sobe pelo ↑ DC; PAD estável ou sobe discretamente no resistido)\n• B: insulina CAI no exercício, mas não é a resposta cardiovascular principal — é metabólica\n• D: fluxo AUMENTA no músculo em atividade (até 20x o basal), não diminui\n\n💡 MACETE\n'EXERCÍCIO = FESTA DO SIMPÁTICO → ↑ FC, ↑ força, ↑ PA, ↑ fluxo muscular'"
},

disc:false,
tema:"Hematologia — Hemostasia Primária (Adesão Plaquetária)",
context:"Mulher, 26 anos, procura UBS carregando seu filho de 2 anos que apresentava um corte no queixo. A mãe relatou que o menino estava correndo pela casa quando escorregou e bateu com a cabeça em um móvel. Durante a triagem pela equipe de enfermagem, verificou-se que o sangramento já tinha estancando e que, por isso, não havia complicações. Dessa forma, após avaliação médica, a mãe e a criança foram liberados.",
contextHTML:null,
assertions:null,
text:"Marque a alternativa que explica corretamente o motivo de não ter havido complicações após o ocorrido com a criança.",
opts:["As plaquetas se fixaram a partes do vaso sanguíneo danificado, como fibras de colágeno do tecido conjuntivo subjacente às células endoteliais danificadas, ocasionando a adesão plaquetária.", "A serotonina e o tromboxano A2 atuam como vasodilatadores, aumentando o fluxo de sangue pelo vaso lesado.", "A síntese dos fatores de coagulação II, VII, IX e XI ocorre independentemente da concentração de vitamina K.", "Ao final do processo de coagulação, o plasminogênio é ativado imediatamente, dissolvendo o coágulo e impedindo a hemostasia."],
g:0,
exp:"A serotonina e o tromboxano A2 atuam como vasoconstrictores, promovendo e sustentando a dilatação do músculo vascular liso, o que aumenta o fluxo de sangue pelo vaso lesado.\n\nA síntese dos fatores de coagulação, II, VII, IX e XI, pelo fígado, dependem da concentração de vitamina K, normalmente produzida por bactérias que habitam o intestino grosso\n\nAo final do processo de coagulação, uma enzima plasmática inativa chamada plasminogênio é incorporada ao coágulo, sendo convertida em plasmina para dissolução do coágulo.",
deep:"🎯 HEMOSTASIA — 3 ETAPAS INTEGRADAS\n\n1️⃣ ESPASMO VASCULAR (segundos)\n→ Vasoconstrição reflexa mediada por endotelina, serotonina, tromboxano A2\n\n2️⃣ HEMOSTASIA PRIMÁRIA — TAMPÃO PLAQUETÁRIO (minutos)\nAS 3 FASES DA PLAQUETA:\n• ADESÃO: plaqueta se liga ao COLÁGENO exposto via FATOR VON WILLEBRAND (FvW) + glicoproteína GPIb\n  → O subendotélio (com colágeno) fica exposto quando o vaso é lesionado\n• ATIVAÇÃO: plaquetas mudam de forma e liberam grânulos (ADP, TxA2, serotonina, Ca²⁺)\n• AGREGAÇÃO: plaquetas se ligam entre si via FIBRINOGÊNIO + GPIIb/IIIa\n\n3️⃣ HEMOSTASIA SECUNDÁRIA — COAGULAÇÃO (minutos a horas)\n→ Cascata (via intrínseca, extrínseca, comum) → fibrina → coágulo estável\n→ Fatores II, VII, IX, X DEPENDEM DE VITAMINA K (síntese hepática)\n\n4️⃣ FIBRINÓLISE (tardia, dias)\n→ PLASMINOGÊNIO (inativo) → PLASMINA (ativa) → dissolve o coágulo\n→ Ativadores: t-PA, uroquinase\n\n✅ POR QUE A É CORRETA\nNo caso, o sangramento estancou porque: vaso lesado → colágeno exposto → PLAQUETAS ADERIRAM → tampão primário formou-se → hemostasia eficaz.\n\n❌ POR QUE AS OUTRAS ERRAM\n• B: serotonina e TxA2 são VASOCONSTRITORES (não dilatadores) — promovem constrição para REDUZIR o fluxo no local lesado\n• C: fatores II, VII, IX, X são VITAMINA K-DEPENDENTES (fator XI não é K-dependente; a afirmação é errada sobre II, VII, IX)\n• D: plasminogênio NÃO é ativado imediatamente — ele é incorporado ao coágulo e ativado TARDIAMENTE pela plasmina para dissolver o coágulo APÓS o reparo\n\n💡 MACETE\n'Vaso lesado → exposição de colágeno → FvW cola plaqueta (GPIb) → TAMPÃO PLAQUETÁRIO'\n'Vit K = fatores 2, 7, 9, 10 + proteínas C e S (anticoagulantes naturais)'"
},

tema:"Patologia — Fases do Reparo Tecidual",
context:"Na aula de Educação Física, na disputa pela bola numa partida de handebol, um jovem caiu e machucou o joelho. Passada uma semana, observando o seu ferimento dia a dia, este jovem questionou à sua professora de Ciências por que o local do seu ferimento estava úmido e com tom vermelho vivo. Ajude a professora a responder, assinalando a alternativa CORRETA para responder ao questionamento do jovem machucado.",
contextHTML:null,
assertions:null,
text:"Ajude a professora a responder, assinalando a alternativa CORRETA para responder ao questionamento do jovem machucado.",
opts:["O ferimento encontra-se na fase hemostática do reparo tecidual, caracterizada por fibrina, fibronectina e vitronectina que proporciona uma matriz provisória que serve de substrato inicial para a imigração das células, incluindo inicialmente macrófagos e, posteriormente, fibroblastos, queratinócitos e células endoteliais necessários para a reparação da ferida.", "O ferimento encontra-se na fase inflamatória do reparo tecidual, caracterizada por neutrófilos que surgem no leito da ferida algumas horas após a lesão, sofrem apoptose e são removidos por macrófagos, depositando-se também dentro da crosta para fechar a superfície da ferida.", "O ferimento encontra-se na fase de remodelamento do reparo tecidual, onde o tecido de granulação é convertido em uma cicatriz colagenosa.", "O ferimento encontra-se na fase proliferativa do reparo tecidual, caracterizada por muitos macrófagos M2, fibroblastos, linfócitos e muitos vasos pequenos."],
g:3,
exp:"O reparo tecidual ocorre em uma progressão de fases, começando com a hemostasia e terminando na formação de uma cicatriz madura, predominantemente acelular. As fases do reparo são: 1- hemostática; 2- inflamatória; 3- proliferativa; 4- remodelamento.\n\nNo caso apresentado, o tempo de ferimento relatado (uma semana) e as características (úmido e avermelhado) são compatíveis com tecido de granulação que é formado na fase proliferativa. Esta fase, tem início em 3 a 5 dias após a lesão e por fim substitui a matriz provisória. O tecido de granulação contém (1) muitos vasos novos pequenos, resultantes do processo de angiogênese, (2) numerosas células mononucleares, predominantemente macrófagos M2, mas também linfócitos, (3) fibroblastos, responsáveis pela síntese de componentes da nova MEC e também pela fibrose e (4) a nova MEC contendo colágeno, glicoproteínas e proteoglicanos.\n\nA fase Hemostática é caracterizada por fibrina, associada à fibronectina e à vitronectina, que proporciona uma matriz provisória que serve de substrato inicial para a imigração das células, incluindo inicialmente macrófagos e, posteriormente, fibroblastos, queratinócitos e células endoteliais necessários para a reparação da ferida.\n\nA fase Inflamatória é caracterizada por neutrófilos que surgem no leito da ferida algumas horas após a lesão, sofrem apoptose e são removidos por macrófagos, depositando-se também dentro da crosta para fechar a superfície da ferida. É provável que isso seja influenciado pela presença de células T no local da ferida. A polarização de macrófagos para um fenótipo pró-fibrótico e pró-angiogênico e a secreção permanente de uma multiplicidade de fatores de crescimento e citocinas são críticas para a progressão do processo de cicatrização da ferida, que inicia em uma fase marcada por inflamação progredindo para outra, definida pela proliferação celular.\n\nNa fase de Remodelamento o tecido de granulação é convertido em uma cicatriz colagenosa. O remodelamento é a fase mais longa do processo de cicatrização de feridas e pode durar meses.",
deep:"🎯 REPARO TECIDUAL — 4 FASES SEQUENCIAIS\n\n⚡ 1. HEMOSTÁTICA (imediato, horas)\n→ Vasoconstrição + tampão plaquetário + coágulo de fibrina\n→ Matriz provisória: fibrina + fibronectina + vitronectina\n→ Função: estancar sangramento e criar \"andaime\" para migração celular\n\n🔴 2. INFLAMATÓRIA (horas a 3-5 dias)\n→ NEUTRÓFILOS chegam primeiro (1º–2º dia) → fagocitam microrganismos\n→ MACRÓFAGOS chegam depois (2º–3º dia) → M1 (pró-inflamatório) depois M2 (pró-reparo)\n→ Remoção de debris, tecido necrótico, patógenos\n\n🟢 3. PROLIFERATIVA (3-5 dias até 2-3 semanas) ← CASO DA QUESTÃO\n→ Formação do TECIDO DE GRANULAÇÃO: aspecto ÚMIDO + VERMELHO VIVO\n→ ANGIOGÊNESE (vasos novos = coloração vermelha)\n→ FIBROBLASTOS proliferam → síntese de MEC (colágeno tipo III)\n→ Macrófagos M2 (pró-fibrótico)\n→ Reepitelização (queratinócitos migram)\n→ Contração da ferida (miofibroblastos)\n\n⚪ 4. REMODELAMENTO (semanas a meses)\n→ Colágeno III → colágeno I (mais resistente)\n→ Diminui vascularização (cicatriz fica pálida)\n→ Cicatriz ACELULAR + fibrosa\n→ Recupera ~80% da resistência original\n\n🩹 DECIFRANDO A QUESTÃO — 1 semana + úmido + vermelho vivo\n→ Tempo e aspecto compatíveis com FASE PROLIFERATIVA\n→ Vermelho = angiogênese (muitos vasos pequenos)\n→ Úmido = exsudato da MEC em formação\n→ Presença de M2, fibroblastos, linfócitos → característico\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (hemostática): dura horas, já passou há MUITO\n• B (inflamatória): dura até 3-5 dias, também já passou\n• C (remodelamento): ocorre em semanas-meses (fase tardia), cicatriz PÁLIDA, não vermelha\n\n💡 MACETE\n'HEMO (min-h) → INFLA (1-5d) → PROLIFERA (5d-3sem, ÚMIDO/VERMELHO) → REMODELA (sem-meses, pálida)'"
},

tema:"Patologia — Inflamação Aguda e Histamina",
context:"No fim da tarde, ao limpar um lote baldio, um homem fere o pé com enxada. Ao chegar em casa, sua esposa começa o tratamento caseiro. No outro dia pela manhã, o homem procura atendimento médico, pois a dor é cada vez mais intensa. O local do ferimento está edemaciado, ruborizado e purulento.",
contextHTML:null,
assertions:null,
text:"Diante do caso acima, é correto afirmar que a inflamação presente é",
opts:["crônica e a presença de linfócitos causou vasoconstrição e redução da permeabilidade vascular.", "granulomatosa e a formação de granulomas causou isolamento do agente agressor.", "aguda e a presença de histamina causou vasodilatação e aumento da permeabilidade vascular.", "fibrosa e a deposição de colágeno resultou em cicatrização precoce do tecido."],
g:2,
exp:"A vasodilatação é induzida pela ação de vários mediadores, sobretudo a histamina, no músculo liso vascular. Trata-se de uma das primeiras manifestações da inflamação aguda. A histamina provoca dilatação das arteríolas e aumenta a permeabilidade das vênulas. A histamina é considerada o principal mediador da fase imediata transitória do aumento da permeabilidade vascular, produzindo espaços interendoteliais nas vênulas, conforme discutido anteriormente. Seus efeitos vasoativos são mediados, sobretudo, pela ligação a receptores presentes nas células endoteliais microvasculares.\n\nFormação de tecido de granulação. A migração e a proliferação de fibroblastos e a deposição de tecido conjuntivo frouxo, assim com os vasos e os leucócitos mononucleares entremeados, formam o tecido de granulação, cujo termo se origina de sua aparência macroscópica granular, macia e de coloração rosa, como aquele observado sob a crosta de uma ferida cutânea. Sua aparência histológica caracteriza-se pela proliferação de fibroblastos e novos capilares delicados e de paredes finas (angiogênese) em uma MEC frouxa, frequentemente com uma mistura de células inflamatórias, que consistem sobretudo em macrófagos O tecido de granulação preenche de modo progressivo o local da lesão; a quantidade de tecido de granulação formado depende do tamanho da destruição do tecido produzido pela ferida e da intensidade da inflamação.\n\nA inflamação aguda é uma resposta rápida e, com frequência, autolimitada a agentes agressores que são facilmente eliminados, como muitas bactérias, fungos e células mortas. Normalmente, desenvolve-se em poucos minutos ou horas e é de curta duração (várias horas a alguns dias). Caracteriza-se pela exsudação de líquido e proteínas plasmáticas (edema) e pela migração de leucócitos, sobretudo neutrófilos. Se o estímulo agressor for eliminado, a reação diminui, e ocorre reparo da lesão residual.\n\nA natureza do infiltrado leucocitário varia de acordo com o tempo da resposta inflamatória e com o tipo de estímulo. Na maioria das formas de inflamação aguda, os neutrófilos predominam no infiltrado inflamatório durante as primeiras 6 a 24 horas e são substituídos pelos monócitos em 24 a 48 horas.",
deep:"🎯 INFLAMAÇÃO AGUDA — MEDIADORES E SINAIS CARDINAIS\n\n📋 5 SINAIS FLOGÍSTICOS (CELSO + VIRCHOW)\n🔴 RUBOR (vermelhidão) — vasodilatação\n🔥 CALOR — aumento do fluxo sanguíneo\n💧 TUMOR (edema) — aumento da permeabilidade vascular\n⚡ DOR — mediadores (bradicinina, PGE₂) + pressão do edema\n💪 PERDA DE FUNÇÃO (functio laesa)\n\n🧬 MEDIADORES-CHAVE\n\n🟣 HISTAMINA (mastócitos, basófilos, plaquetas)\n→ FASE IMEDIATA-TRANSITÓRIA do aumento de permeabilidade\n→ Dilata ARTERÍOLAS + aumenta permeabilidade de VÊNULAS\n→ Receptores H1 em células endoteliais → espaços interendoteliais\n\n🟣 PROSTAGLANDINAS (via COX-1/COX-2)\n→ Vasodilatação, dor, febre\n\n🟣 LEUCOTRIENOS (via LOX)\n→ LTB4: quimiotaxia de neutrófilos\n→ LTC4/D4/E4: broncoconstrição, permeabilidade\n\n🟣 ÓXIDO NÍTRICO (endotélio, macrófagos)\n→ Vasodilatação potente\n\n🟣 BRADICININA\n→ Dor + vasodilatação\n\n🟣 CITOCINAS (TNF-α, IL-1, IL-6)\n→ Resposta sistêmica (febre, leucocitose)\n\n🩹 NO CASO — 24h, edema + rubor + dor + PUS\n→ Tempo < 2 dias → AGUDA\n→ Sinais flogísticos clássicos\n→ Pus = INFECÇÃO BACTERIANA (neutrófilos mortos + debris)\n→ Histamina causou o edema e a vermelhidão iniciais\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (crônica): linfócitos NÃO causam vasoconstrição, e o quadro é claramente AGUDO (24h)\n• B (granulomatosa): reserva-se para TB, sarcoidose, fungos, corpo estranho — não é o caso\n• D (fibrosa): ocorre em REMODELAMENTO tardio, não em 24h\n\n💡 MACETE\n'AGUDA = HISTAMINA (H1) → VASODILATA + ↑ PERMEABILIDADE → EDEMA + RUBOR'\n'Pus = NEUTRÓFILO morto + bactéria = AGUDA'"
},

tema:"Imunologia — Órgãos Linfoides",
context:"Um estudante de medicina está revisando os órgãos linfoides como parte de seu estudo sobre o sistema imunológico. Considerando essa revisão, analise as seguintes assertivas sobre os órgãos linfoides:",
contextHTML:null,
assertions:"I - O baço é um órgão linfático primário responsável pela produção de células T e a presença de sinusoides e cordões esplâncnicos é característico da polpa vermelha.\nII - As tonsilas palatinas, também conhecidas como amígdalas, são órgãos linfoides secundários que participam na defesa contra agentes patogênicos inalados ou ingeridos, e a medula óssea histologicamente pode ser diferenciada em vermelha e amarela, ambas caracterizadas por serem hematogênicas.\nIII - O timo é um órgão linfático primário que atua na maturação e diferenciação de linfócitos e o seu córtex é caracterizado, histologicamente, pela presença dos corpúsculos de Hassal\nIV - Os linfonodos são órgãos linfoides secundários que filtram e purificam a linfa, além de serem locais importantes para a ativação das células do sistema imunológico, e são revestidos por uma cápsula de tecido conjuntivo frouxo.",
text:"Está(ão) correto(s) apenas o que se afirma(m) em:",
opts:["II.", "III.", "IV.", "I."],
g:3,
exp:"I - O baço é um órgão linfático primário que atua na filtração do sangue e na remoção de células sanguíneas velhas ou danificadas e é responsável pela produção de células T. Portanto, essa assertiva está correta.\n\nII - As tonsilas palatinas, ou amígdalas, são consideradas órgãos linfoides secundários e fazem parte do anel linfático de Waldeyer, que desempenha um papel na defesa contra agentes patogênicos inalados ou ingeridos, e apenas a medula vermelha é hematogênica. Logo está assertiva não está correta.\n\nIII - O timo é um órgão linfático primário que desempenha um papel crucial na maturação e diferenciação de linfócitos T, e o corpúsculo é um agregado de celulas reticulares do tipo VI característico da medula do timo. Portanto, essa assertiva não está correta.\n\nIV - Os linfonodos são órgãos linfoides secundários que filtram e purificam a linfa, além de serem locais importantes para a ativação das células do sistema imunológico, e o revestimento é de tecido conjuntivo denso. Essa assertiva não está correta.\n\nPortanto, apenas as assertiva I está correta.",
deep:"🎯 ÓRGÃOS LINFOIDES — PRIMÁRIOS vs SECUNDÁRIOS\n\n⚠️ ATENÇÃO: O gabarito oficial desta banca considera a assertiva I correta, embora a classificação mais aceita na literatura moderna (Abbas, Junqueira) seja:\n\n🔴 ÓRGÃOS LINFOIDES PRIMÁRIOS — local de FORMAÇÃO/MATURAÇÃO\n→ MEDULA ÓSSEA (todos os linfócitos; maturação dos LB)\n→ TIMO (maturação dos LT)\n\n🟢 ÓRGÃOS LINFOIDES SECUNDÁRIOS — local de ATIVAÇÃO/RESPOSTA\n→ BAÇO\n→ LINFONODOS\n→ MALT (tonsilas, placas de Peyer, apêndice)\n\n🧬 COMENTÁRIO POR ASSERTIVA (seguindo o gabarito oficial)\n\n✅ I (gabarito: correta) — contém imprecisão conceitual, mas a polpa vermelha tem sinusoides e cordões esplênicos (de Billroth), isso é verdadeiro.\n\n❌ II — tonsilas são secundárias ✓, mas a medula AMARELA é ADIPOSA (não hematogênica); apenas a VERMELHA é hematogênica.\n\n❌ III — timo é primário ✓, mas os CORPÚSCULOS DE HASSAL ficam na MEDULA do timo, NÃO no córtex.\n\n❌ IV — linfonodos são secundários ✓, mas o revestimento é de tecido conjuntivo DENSO, não frouxo.\n\n🔬 ESTRUTURAS HISTOLÓGICAS-CHAVE\n→ BAÇO: polpa vermelha (sinusoides, cordões de Billroth) + polpa branca (folículos com LB + PALS com LT)\n→ TIMO: córtex (LT imaturos) + medula (LT maduros + CORPÚSCULOS DE HASSAL)\n→ LINFONODO: cápsula DENSA + córtex (folículos LB) + paracórtex (LT) + medula\n→ MEDULA ÓSSEA: vermelha (hematogênica) + amarela (adipócitos)\n\n💡 MACETE\n'PRIMÁRIOS = onde NASCE/MATURA (Medula + Timo)'\n'SECUNDÁRIOS = onde REAGE (Baço + Linfonodo + MALT)'\n'HASSAL = MEDULA do TIMO'"
},

deep:"🎯 ESTRUTURA DA PELE — 3 CAMADAS + ANEXOS\n\n📚 CAMADAS DA PELE (de fora pra dentro)\n\n1️⃣ EPIDERME (A na figura) — EPITELIAL\n→ Epitélio estratificado pavimentoso queratinizado\n→ 5 estratos: basal → espinhoso → granuloso → lúcido (só palma/planta) → córneo\n→ Células: QUERATINÓCITOS (85%) + melanócitos + Langerhans + Merkel\n→ AVASCULAR (nutrida por difusão da derme)\n\n2️⃣ DERME (B na figura) — CONJUNTIVO\n→ Papilar (frouxo, superficial) + Reticular (denso, profundo)\n→ Contém: vasos, nervos, anexos cutâneos, terminações sensoriais\n→ Rica em colágeno I + elastina\n\n3️⃣ HIPODERME (tela subcutânea) — TECIDO ADIPOSO\n→ Isolante térmico, reserva energética\n→ NÃO é parte da pele stricto sensu (embora adjacente)\n\n🧴 ANEXOS CUTÂNEOS\n\n🟡 GLÂNDULAS SEBÁCEAS (C na figura)\n→ Localização: DERME, associadas ao folículo piloso\n→ Secreção: HOLÓCRINA (célula inteira se desintegra)\n→ Produto: SEBO (lipídios) → lubrifica pele e pelo\n→ Desembocam no folículo piloso (unidade pilossebácea)\n→ Ausentes em palma/planta\n\n💧 GLÂNDULAS SUDORÍPARAS (D na figura)\n→ Localização: DERME profunda / HIPODERME\n→ ÉCRINAS: secreção MERÓCRINA, abertura direta na pele, por TODO o corpo, função termorreguladora\n→ APÓCRINAS: axilas, região anogenital, ativam-se na puberdade, desembocam no folículo piloso\n\n🧵 FOLÍCULO PILOSO (E na figura)\n→ Invaginação da epiderme na derme\n→ Produz o pelo a partir do bulbo (papila dérmica + matriz)\n→ Associado a músculo eretor do pelo (liso)\n\n✅ NA FIGURA\n• A → EPIDERME\n• B → DERME\n• C → GLÂNDULA SEBÁCEA (sacular, desemboca no folículo)\n• D → GLÂNDULA SUDORÍPARA (tubular enovelada, na profundidade)\n• E → FOLÍCULO PILOSO\n\n❌ POR QUE AS OUTRAS ERRAM\n• A e D (A = derme): A é EPIDERME (camada superficial)\n• B (E = sebácea, D = folículo): E é FOLÍCULO, D é SUDORÍPARA — troca invertida\n• D (A = hipoderme, B = epiderme): completamente invertido\n\n💡 MACETE\n'EPIDERME (A) → DERME (B) → HIPODERME | SEBÁCEA desemboca no PELO (óleo) | SUDORÍPARA abre direto na pele (suor)'"
},

{
n:12,
disc:false,
tema:"Patologia — Inflamação Aguda e Crônica",
context:"Analise as seguintes afirmativas sobre os mecanismos da resposta inflamatória aguda e crônica:",
contextHTML:null,
assertions:"I) A resposta inflamatória aguda é uma reação imediata do sistema imunológico a uma lesão ou infecção, caracterizada por sinais clássicos de inflamação como dor, calor, vermelhidão e inchaço, e envolve a migração de neutrófilos para o local da inflamação.\nII) A resposta inflamatória crônica é de curta duração e resolve rapidamente após a remoção do agente causador, deixando poucos danos residuais no tecido afetado e não envolve linfócitos.\nIII) Na resposta inflamatória aguda, os neutrófilos são as primeiras células imunológicas a serem recrutadas para o local da inflamação, onde desempenham um papel crucial na eliminação do agente causador da inflamação através da fagocitose.\nIV) Na resposta inflamatória crônica, linfócitos e neutrófilos são as principais células envolvidas, contribuindo para a persistência da inflamação e para a reparação do tecido através da proliferação de células do tecido conjuntivo, levando à formação de tecido cicatricial.",
text:"Marque a alternativa que corresponde às afirmativas corretas.",
opts:["Apenas II e IV estão corretas.", "Apenas I e III estão corretas.", "Apenas I e II estão corretas.", "Apenas III e IV estão corretas."],
g:1,
exp:"I – Verdadeira. A resposta inflamatória aguda é uma reação imediata e não específica uma lesão ou infecção. Ela é caracterizada por sinais clássicos de inflamação, como dor (dolor), calor (calor), vermelhidão (rubor), inchaço (tumor) e perda de função (functio laesa). Os neutrófilos são as primeiras células imunológicas a serem recrutadas para o local da inflamação, onde desempenham um papel crucial na eliminação do agente causador da inflamação através da fagocitose.\n\nII – Falsa. A resposta inflamatória crônica é uma resposta prolongada que ocorre quando o agente causador não é completamente eliminado. Ela pode persistir por um longo período de tempo, levando a uma inflamação contínua e potencialmente a danos teciduais.\n\nIII – Verdadeira. Na resposta inflamatória aguda, os neutrófilos são as primeiras células imunológicas a serem recrutadas para o local da inflamação. Eles desempenham um papel crucial na eliminação do agente causador da inflamação através da fagocitose.\n\nIV – Falsa. Embora linfócitos e macrófagos sejam importantes na resposta inflamatória crônica, eles não são as únicas células envolvidas. A resposta inflamatória crônica também envolve a proliferação de células do tecido conjuntivo (fibroblastos) que podem levar à formação de tecido cicatricial.",
deep:"🎯 INFLAMAÇÃO AGUDA vs CRÔNICA — COMPARAÇÃO\n\n🔴 INFLAMAÇÃO AGUDA\n⏱️ RÁPIDA — início em minutos/horas, dura dias\n🧬 Células: NEUTRÓFILOS (predominantes 6-24h) → monócitos/macrófagos (24-48h)\n🔬 Mudanças VASCULARES: vasodilatação + ↑ permeabilidade → exsudato + edema\n📋 5 Sinais Cardinais: dolor, calor, rubor, tumor, functio laesa\n🎯 Objetivo: eliminar agente rapidamente\n\n🟣 INFLAMAÇÃO CRÔNICA\n⏱️ PROLONGADA — semanas a meses/anos\n🧬 Células: LINFÓCITOS + MACRÓFAGOS + PLASMÓCITOS (raramente neutrófilos — exceção: úlcera, TB escavada)\n🔬 Coexistência: inflamação ativa + destruição tecidual + reparo (fibrose)\n🎯 Ocorre quando agente NÃO é eliminado\n📋 Resultado: fibrose, formação de granuloma (em alguns casos)\n\n✅ ANÁLISE DAS ASSERTIVAS\n\n✓ I — AGUDA: imediata, sinais cardinais, neutrófilos — CORRETA\n✗ II — afirma que crônica é CURTA — FALSO (é prolongada)\n✓ III — neutrófilos são as PRIMEIRAS na aguda — CORRETA\n✗ IV — afirma que LINFÓCITOS e NEUTRÓFILOS são as principais na crônica — FALSO (são LINFÓCITOS e MACRÓFAGOS)\n\n🩹 PROCESSOS REPARATIVOS NA CRÔNICA\n→ Angiogênese (novos vasos)\n→ Fibroblastos proliferam + deposição de colágeno\n→ Tecido de granulação → cicatriz\n→ Pode evoluir para FIBROSE extensa (disfunção do órgão)\n\n💡 MACETE\n'AGUDA = NEUTRÓFILO rápido | CRÔNICA = LINFÓCITO + MACRÓFAGO demorado | CRÔNICA não é curta!'"
},

tema:"Imunologia — Sistema Complemento (Via Clássica)",
context:"Vários tipos de moléculas que reconhecem microrganismos e promovem respostas inatas existem na forma solúvel no sangue e nos líquidos extracelulares. Dentre essas moléculas estão as proteínas plasmáticas que trabalham conjuntamente na opsonização de microrganismos, promoção de recrutamento de fagócitos para o sítio de infecção e, em alguns casos, na destruição direta dos microrganismos. Essas proteínas fazem parte de um complexo sistema complemento, composto por três vias distintas, sendo uma delas a via clássica.",
contextHTML:null,
assertions:null,
text:"Qual o mecanismo de ação envolvido no sistema complemento que descreve a via apresentada no texto?",
opts:["A lectina ligante de manose (MBL) reconhece resíduos de manose terminais em glicolipídios e glicoproteínas microbianas iniciando a cascata do complemento.", "C3 reconhece diretamente certas estruturas microbianas e é considerada uma via filogeneticamente mais antiga.", "A via clássica independe de anticorpos e reconhece padrões moleculares como LPS bacteriano.", "C1q detecta anticorpos ligados à superfície de microrganismos ou outras estruturas.e se liga à porção Fc dos anticorpos. A partir de então, duas serinas proteases são ativadas e iniciam uma cascata proteolítica."],
g:3,
exp:"Na via clássica, a proteína C1q detecta anticorpos ligados à superfície de microrganismos. Quando o C1q se liga aos anticorpos, as serinas proteases associadas, C1r e C1s, são ativadas, iniciando uma cascata proteolítica envolvendo outras proteínas do complemento.\n\nNa via alternativa, a proteína C3 reconhece diretamente certas estruturas presentes na superfície microbiana, como o lipopolissacarídeo (LPS) bacteriano. Esta é uma via independente de anticorpos e é considerada filogeneticamente mais antiga do que a via clássica.\n\nA via da lectina é deflagrada pela proteína plasmática chamada lectina ligante de manose (MBL), que reconhece resíduos de manose terminais em glicolipídios e glicoproteínas microbianas. Isso inicia a cascata de ativação do complemento.",
deep:"🎯 SISTEMA COMPLEMENTO — 3 VIAS DE ATIVAÇÃO\nTodas convergem na formação de C3 convertase → C3b → C5 convertase → MAC (C5b-9).\n\n🔵 1. VIA CLÁSSICA (AC-DEPENDENTE) ← QUESTÃO\n→ DISPARO: C1q reconhece a PORÇÃO Fc de ANTICORPOS (IgG ou IgM) ligados ao antígeno\n→ C1q ativa C1r + C1s (serinas proteases)\n→ C1s cliva C4 e C2 → forma C3 CONVERTASE (C4b2a)\n→ Principal em infecções com imunidade já estabelecida (adaptativa)\n\n🟢 2. VIA ALTERNATIVA (AC-INDEPENDENTE)\n→ DISPARO: C3b se deposita DIRETAMENTE na superfície microbiana (LPS bacteriano, paredes de fungos)\n→ Não requer anticorpos\n→ Filogeneticamente mais ANTIGA\n→ C3bBb = C3 convertase alternativa\n\n🟣 3. VIA DAS LECTINAS (AC-INDEPENDENTE)\n→ DISPARO: MBL (lectina ligante de manose) reconhece RESÍDUOS DE MANOSE terminais em patógenos\n→ MBL ativa MASP-1 e MASP-2 (serinas proteases tipo C1s)\n→ Cliva C4 e C2 → C4b2a (igual à clássica)\n\n⚔️ FUNÇÕES DO COMPLEMENTO\n🎯 OPSONIZAÇÃO: C3b marca patógeno → fagocitose via CR1\n🎯 QUIMIOTAXIA: C3a, C5a → atraem neutrófilos\n🎯 LISE: MAC (C5b-9) → poro na membrana bacteriana\n🎯 ANAFILATOXINAS: C3a, C5a → aumentam permeabilidade\n\n✅ DECIFRANDO A QUESTÃO\nO texto descreve a VIA CLÁSSICA (menção no enunciado). O mecanismo é:\n→ C1q reconhece Fc de anticorpo ligado ao microrganismo\n→ Ativa C1r + C1s → cascata proteolítica\n\n❌ POR QUE AS OUTRAS ERRAM\n• A: MBL é da via das LECTINAS, não da clássica\n• B: C3 na via ALTERNATIVA, não clássica\n• C: a via clássica É DEPENDENTE de anticorpos (diferente da alternativa que reconhece LPS)\n\n💡 MACETE\n'CLÁSSICA = C1q + Ac (Fc) | ALTERNATIVA = C3 + LPS | LECTINA = MBL + MANOSE'"
},

context:"Paciente, 50 anos, feminino, com histórico de câncer em mama direita, foi tratada cirurgicamente e apresenta linfedema em membro superior direito.",

opts:["Ducto linfático direito, que drena linfa do quadrante superior direito do corpo.", "Linfonodos, presente no tronco subclávio.", "Cisterna do quilo, que drena linfa da metade inferior do corpo.", "Capilares linfáticos especiais denominados lácteos."],
g:1,
exp:"O linfedema, um tipo localizado de edema, ocorre quando não há drenagem da linfa de uma área do corpo. Por exemplo, se os linfonodos cancerosos forem removidos cirurgicamente da axila, pode haver linfedema do membro.\n\nO ducto linfático direito drena linfa do quadrante superior direito do corpo, mas está localizado na raiz do pescoço, e não na axila, entrando na junção das veias jugular interna direita e subclávia direita, o ângulo venoso direito.\n\nA cisterna do quilo, no abdome, é um saco coletor dilatado formado pela união dos troncos linfáticos que drenam a metade inferior do corpo.\n\nOs capilares linfáticos especiais, denominados lácteos, recebem todos os lipídios e vitaminas lipossolúveis absorvidos pelo intestino.\n\nVale ressaltar que a linfa passa dos capilares linfáticos para os vasos linfáticos e, em seguida, pelos linfonodos. Quando os vasos linfáticos saem dos linfonodos em uma dada região do corpo, eles se unem para formar troncos linfáticos. Os principais troncos são os troncos lombar, intestinal, broncomediastinal, subclávio e jugular. Os troncos lombares drenam linfa dos membros inferiores, da parede e vísceras da pelve, dos rins, das glândulas suprarrenais e da parede abdominal. O tronco intestinal drena a linfa do estômago, intestinos, pâncreas, baço e parte do fígado. Os troncos broncomediastinais drenam a linfa da parede torácica, pulmão e coração. Os troncos subclávios drenam os membros superiores. Os troncos jugulares drenam a cabeça e o pescoço.",
deep:"🎯 SISTEMA LINFÁTICO — DRENAGEM POR REGIÕES\n\n🩸 SEQUÊNCIA DO FLUXO LINFÁTICO\nCapilares linfáticos → vasos linfáticos → LINFONODOS → troncos linfáticos → DUCTOS → veias (ângulos venosos)\n\n🏗️ OS 5 TRONCOS LINFÁTICOS PRINCIPAIS\n→ JUGULARES (D e E): cabeça e pescoço\n→ SUBCLÁVIOS (D e E): MEMBROS SUPERIORES\n→ BRONCOMEDIASTINAIS (D e E): parede torácica, pulmão, coração\n→ INTESTINAIS (único): estômago, intestinos, pâncreas, baço, parte do fígado\n→ LOMBARES (D e E): membros inferiores, pelve, rins, suprarrenais, parede abdominal\n\n💧 OS 2 DUCTOS TERMINAIS\n\n🔵 DUCTO TORÁCICO (maior)\n→ Início: CISTERNA DO QUILO (L1-L2)\n→ Drena: 3/4 do corpo (MI + abdome + hemitórax E + MSE + hemipescoço E)\n→ Desemboca: ÂNGULO VENOSO ESQUERDO (junção v. jugular int. E + v. subclávia E)\n\n🔵 DUCTO LINFÁTICO DIREITO\n→ Drena: QUADRANTE SUPERIOR DIREITO (MSD + hemitórax D + hemipescoço D)\n→ Desemboca: ÂNGULO VENOSO DIREITO\n\n🎗️ LINFEDEMA PÓS-MASTECTOMIA\n→ Cirurgia oncológica da mama → ESVAZIAMENTO AXILAR (remoção de linfonodos axilares)\n→ ↓ Drenagem da linfa do MS do lado operado → acúmulo → LINFEDEMA\n→ Afeta 15-30% das mulheres mastectomizadas com esvaziamento axilar\n→ Técnica do linfonodo sentinela reduz essa complicação\n\n✅ POR QUE B É CORRETA\nOs LINFONODOS AXILARES (presentes no trajeto do tronco subclávio direito) foram removidos na cirurgia → sem filtração/drenagem da linfa do MSD → linfedema.\n\n❌ POR QUE AS OUTRAS ERRAM\n• A (ducto linfático direito): está na RAIZ DO PESCOÇO, não é removido na mastectomia\n• C (cisterna do quilo): drena METADE INFERIOR do corpo (abdome), irrelevante no MS\n• D (lácteos): capilares linfáticos do intestino (absorvem lipídios), nada a ver com mastectomia\n\n💡 MACETE\n'MSD drena pelo TRONCO SUBCLÁVIO → esvaziamento axilar remove linfonodos desse trajeto → LINFEDEMA'\n'Ducto Torácico = 3/4 do corpo | Ducto D = apenas quadrante SUPERIOR DIREITO'"
},

exp:"A célula 1, conhecida como célula tronco pluripotente encontra-se apenas no interior da medula óssea e não no sangue periférico.\n\nAs células 2, mieloide comum e 3, linfoide comum, estão localizadas dentro da medula vermelha e não no sangue periférico.",
deep:"🎯 HEMATOPOESE — GERAÇÃO DAS CÉLULAS SANGUÍNEAS\nTodo sangue nasce da CÉLULA-TRONCO HEMATOPOÉTICA (HSC), localizada na MEDULA ÓSSEA VERMELHA, não no sangue periférico.\n\n🧬 HIERARQUIA DA HEMATOPOESE\n\n🔴 CÉLULA 1 = HSC (CÉLULA-TRONCO PLURIPOTENTE)\n→ Fica na MEDULA ÓSSEA (não no sangue periférico)\n→ Autorrenovação + diferenciação\n→ Origina 2 linhagens principais: mieloide + linfoide\n\n🟡 CÉLULA 2 = PROGENITOR MIELOIDE COMUM (CMP)\n→ Dá origem a:\n  • Eritrócitos (hemácias)\n  • Plaquetas (via megacariócito)\n  • Mastócitos\n  • Granulócitos: BASÓFILOS, NEUTRÓFILOS, EOSINÓFILOS (via CÉLULA 4)\n  • Agranulócitos: MONÓCITOS → macrófagos (via CÉLULA 4)\n\n🟣 CÉLULA 3 = PROGENITOR LINFOIDE COMUM (CLP)\n→ Dá origem a:\n  • Linfócitos T (CD4+, CD8+)\n  • Linfócitos B → plasmócitos\n  • Células NK\n\n🔵 CÉLULA 4 = PROGENITOR MIELOIDE GRANULÓCITO-MONÓCITO (GMP)\n→ Origina TANTO granulócitos (basófilo, neutrófilo, eosinófilo) COMO agranulócitos (monócito)\n\n✅ ANÁLISE DAS ASSERTIVAS\n\n❌ I — \"célula 1 encontrada no sangue periférico\" — FALSO. HSC fica na MEDULA ÓSSEA, não no sangue periférico (em condições normais).\n\n❌ II — afirma que 2 e 3 \"no sangue periférico\" geram mieloide granular e linfoide agranular — FALSO em 2 aspectos:\n  → 2 e 3 estão na MEDULA, não no sangue periférico\n  → 2 (CMP) gera TANTO granulares COMO agranulares (não só granular)\n\n✓ III — CÉLULA 4 (GMP) origina granulares (basófilo, neutrófilo, eosinófilo) E agranulares (monócito) — VERDADEIRA\n\n⚠️ ATENÇÃO ao erro conceitual do gabarito\nO gabarito oficial marca B (apenas III), com justificativa de que 1, 2 e 3 estão na medula (não no sangue periférico). A afirmativa III é de fato correta.\n\n💡 MACETE\n'HEMATOPOESE acontece na MEDULA ÓSSEA VERMELHA'\n'HSC → MIELOIDE (eritrócitos, plaquetas, granulócitos, monócitos) + LINFOIDE (LT, LB, NK)'\n'GMP gera TANTO granulares como agranulares (monócitos)'"

function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';if(q.contextHTML){ctx.innerHTML=q.contextHTML;}else{ctx.textContent=q.context;}}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
</script>
<script>
const PROVA_ID = 'soi1-2024-1';
const PERIODO = 1;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;
function saveLocal(){const state={answered:answered,cur:cur,eliminated:{}};for(const k in eliminated)state.eliminated[k]=Array.from(eliminated[k]);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function loadLocal(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return false;const state=JSON.parse(raw);if(state.answered&&Object.keys(state.answered).length>0){answered=state.answered;cur=state.cur||0;eliminated={};if(state.eliminated){for(const k in state.eliminated)eliminated[k]=new Set(state.eliminated[k]);}return true;}}catch(e){}return false;}
const _sbScript=document.createElement('script');_sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';_sbScript.onload=function(){window.sb=supabase.createClient('https://mmqfqlbojsbuuodfbilh.supabase.co','sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH');};document.head.appendChild(_sbScript);
async function saveToSupabase(i){try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const q=QS[i];const isDisc=q.disc;const userAns=isDisc?(answered[i]||'').substring(0,500):L[answered[i]];const correctAns=isDisc?'discursiva':L[q.g];const isCorrect=isDisc?null:(answered[i]===q.g);await sb.from('question_responses').upsert({user_id:user.id,question_id:PROVA_ID+'-q'+String(q.n).padStart(2,'0'),periodo:PERIODO,content_type:CONTENT_TYPE,user_answer:userAns,correct_answer:correctAns,is_correct:isCorrect,time_spent_seconds:0,topic:q.tema,difficulty:'media'},{onConflict:'user_id,question_id'});if(!isDisc&&isCorrect!==null){const{data:row}=await sb.from('user_progress').select('*').eq('user_id',user.id).eq('periodo',PERIODO).single();if(row){const t=row.total_questions_solved+1;const c=row.correct_answers+(isCorrect?1:0);const topics=row.topics_studied||[];if(q.tema&&!topics.includes(q.tema))topics.push(q.tema);await sb.from('user_progress').update({total_questions_solved:t,correct_answers:c,accuracy_percentage:parseFloat(((c/t)*100).toFixed(1)),last_studied:new Date().toISOString(),topics_studied:topics}).eq('user_id',user.id).eq('periodo',PERIODO);}else{await sb.from('user_progress').insert({user_id:user.id,periodo:PERIODO,total_questions_solved:1,correct_answers:isCorrect?1:0,accuracy_percentage:isCorrect?100:0,last_studied:new Date().toISOString(),topics_studied:q.tema?[q.tema]:[]});}}}catch(e){console.warn('Supabase:',e);}}
const _origSubmit=submitAnswer;submitAnswer=function(){const idx=cur;_origSubmit();saveLocal();if(answered[idx]!==undefined&&window.sb)saveToSupabase(idx);};
const _origReset=resetAll;resetAll=function(){localStorage.removeItem(STORAGE_KEY);_origReset();};
if(loadLocal()){renderQ();if(Object.keys(answered).length===QS.length)setTimeout(showResult,100);}
</script>
