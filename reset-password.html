<style>
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--bg:#0C0810;--card:#1A1226;--border:rgba(255,255,255,0.07);--border-pink:rgba(214,0,110,0.3);--text:#F4EFFA;--muted:#9080A8;--light:#D8CEEA;--danger:#E24B4A;--success:#5DCAA5;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}

nav{position:fixed;top:0;width:100%;z-index:500;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(12,8,16,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--pink-glow);overflow:hidden;}
.logo-mark img{width:22px;height:22px;object-fit:contain;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;letter-spacing:.06em;color:#FFF;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;padding:8px 18px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--border-pink);color:var(--pink-light);}

.login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;position:relative;}
.login-wrapper::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 40%,rgba(214,0,110,0.08),transparent 70%);}

.login-box{position:relative;width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 36px;box-shadow:0 40px 80px rgba(0,0,0,0.3);animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.login-header{text-align:center;margin-bottom:32px;}
.login-header .icon{font-size:36px;margin-bottom:12px;}
.login-header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;margin-bottom:6px;}
.login-header p{color:var(--muted);font-size:14px;}

.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--light);margin-bottom:7px;}
.form-group input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;outline:none;}
.form-group input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(214,0,110,0.15);}
.form-group input::placeholder{color:var(--muted);}
.hint{font-size:12px;color:var(--muted);margin-top:6px;}

.btn-submit{width:100%;padding:14px;background:var(--pink);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px var(--pink-glow);margin-top:8px;}
.btn-submit:hover{background:var(--pink-bright);transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.msg{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:18px;display:none;text-align:center;line-height:1.5;}
.msg.error{display:block;background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.3);color:#F09595;}
.msg.success{display:block;background:rgba(93,202,165,0.1);border:1px solid rgba(93,202,165,0.3);color:#5DCAA5;}
.msg.info{display:block;background:rgba(214,0,110,0.08);border:1px solid var(--border-pink);color:var(--pink-light);}

.login-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--muted);}
.login-footer a{color:var(--pink-light);text-decoration:none;font-weight:600;}
.login-footer a:hover{text-decoration:underline;}

.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

#loading-state{text-align:center;padding:40px 0;}
#loading-state .spinner{width:32px;height:32px;border-width:3px;margin:0 auto 16px;display:block;}
#loading-state p{color:var(--muted);font-size:14px;}

@media(max-width:480px){
  nav{padding:0 16px;}
  .login-box{padding:32px 24px;}
  .login-header h1{font-size:24px;}
}
</style>
</head>

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-header">
      <div class="icon">🔑</div>
      <h1>Redefinir senha</h1>
      <p>Escolha uma nova senha para sua conta.</p>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Estado: validando o link -->
    <div id="loading-state">
      <span class="spinner"></span>
      <p>Validando seu link...</p>
    </div>

    <!-- Estado: formulário (escondido até validar) -->
    <div id="form-state" style="display:none;">
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        <div class="hint">Use uma senha que você lembre. Pode trocar depois.</div>
      </div>
      <div class="form-group">
        <label>Confirmar nova senha</label>
        <input type="password" id="confirm-password" placeholder="Digite novamente" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-save" onclick="handleSave()">Salvar nova senha</button>
    </div>

    <!-- Estado: link inválido/expirado -->
    <div id="error-state" style="display:none;">
      <div class="login-footer" style="margin-top:0;">
        <p style="margin-bottom:16px;color:var(--light);">O link de redefinição é inválido ou expirou.</p>
        <a href="login.html">Voltar ao login e pedir um novo</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
  'https://mmqfqlbojsbuuodfbilh.supabase.co',
  'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
);

// ── Helpers UI ──
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setLoading(loading) {
  const btn = document.getElementById('btn-save');
  if (loading) {
    btn.disabled = true;
    btn.dataset.original = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Salvando...';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.original || 'Salvar nova senha';
  }
}

// ── Validação do link de recovery ──
// O Supabase pode mandar o token de duas formas:
// 1) Hash fragment (#access_token=...&type=recovery) — formato antigo, ainda usado
// 2) Query string (?code=...) — formato PKCE, mais novo
//
// Tratamos os dois.
(async () => {
  try {
    const hash = window.location.hash || '';
    const search = window.location.search || '';

    // Caso 1: hash com access_token (fluxo implicit/recovery clássico)
    if (hash.includes('access_token') && hash.includes('type=recovery')) {
      const params = new URLSearchParams(hash.substring(1));
      const access_token = params.get('access_token');
      const refresh_token = params.get('refresh_token');
      if (access_token && refresh_token) {
        const { error } = await sb.auth.setSession({ access_token, refresh_token });
        if (error) throw error;
        return showForm();
      }
    }

    // Caso 2: query string com code (fluxo PKCE)
    if (search.includes('code=')) {
      const params = new URLSearchParams(search);
      const code = params.get('code');
      if (code) {
        const { error } = await sb.auth.exchangeCodeForSession(code);
        if (error) throw error;
        return showForm();
      }
    }

    // Caso 3: já tem sessão (usuário recarregou a página depois de validar)
    const { data: { session } } = await sb.auth.getSession();
    if (session) return showForm();

    // Nenhum dos casos: link inválido
    showError();
  } catch (err) {
    console.error('Erro ao validar link:', err);
    showError();
  }
})();

function showForm() {
  hide('loading-state');
  show('form-state');
  document.getElementById('new-password').focus();
}

function showError() {
  hide('loading-state');
  show('error-state');
}

// ── Salvar nova senha ──
async function handleSave() {
  const pwd = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;

  hideMsg();

  if (!pwd || !confirm) return showMsg('Preencha os dois campos.', 'error');
  if (pwd.length < 6) return showMsg('A senha precisa ter pelo menos 6 caracteres.', 'error');
  if (pwd !== confirm) return showMsg('As senhas não conferem.', 'error');

  setLoading(true);

  const { error } = await sb.auth.updateUser({ password: pwd });

  if (error) {
    setLoading(false);
    return showMsg(error.message || 'Erro ao salvar a nova senha.', 'error');
  }

  showMsg('Senha redefinida! Redirecionando...', 'success');
  setTimeout(() => {
    window.location.href = 'flashcards.html';
  }, 1200);
}

// Enter pra submit
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('form-state').style.display !== 'none') {
    handleSave();
  }
});
</script>
