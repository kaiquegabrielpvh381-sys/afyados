            position: sticky;
            top: 0;
            background-color: #1f1f1f;
            padding: 15px 20px;
            z-index: 100;

            overflow-x: auto;

            font-weight: bold;

        .pill.answered-wrong { background-color: #F44336; color: white; }
        .pill.answered-discursive { background-color: #2196F3; color: white; }

        .quiz-area {
            padding: 30px 20px 80px;
            max-width: 800px;
            margin: 0 auto;

        .option-btn {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: #3a3a3a; }
        .option-btn.selected { border-color: #ff5722; background-color: rgba(255, 87, 34, 0.1); }
        .option-btn.correct { background-color: #4CAF50; border-color: #4CAF50; color: white; }
        .option-btn.wrong { background-color: #F44336; border-color: #F44336; color: white; }
        .option-btn:disabled { cursor: default; }

        /* Discursive Textarea */
        .discursive-area { width: 100%; height: 120px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: inherit; resize: vertical; margin-bottom: 15px; }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #1f1f1f;
            border-left: 4px solid #ff5722;

            const container = document.getElementById('pills-container');
            container.innerHTML = '';
            quizData.forEach((q, index) => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.textContent = index + 1;
                pill.onclick = () => goto(index);
                container.appendChild(pill);
            });
            syncPills();
        }

        function syncPills() {
            const pills = document.querySelectorAll('.pill');
            pills.forEach((pill, index) => {
                pill.className = 'pill'; // Reset classes
                if (index === currentIndex) pill.classList.add('active');
                
                // Add status colors
                if (userAnswers[index] !== undefined) {
                    const q = quizData[index];
                    if (q.type === 'objective') {
                        if (userAnswers[index] === q.answer) pill.classList.add('answered-correct');
                        else pill.classList.add('answered-wrong');
                    } else {
                        pill.classList.add('answered-discursive');
                    }
                }
            });
            
            // Auto scroll active pill into view
            const activePill = document.querySelector('.pill.active');
            if(activePill) activePill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function goto(index) {
            currentIndex = index;
            renderQ();
            updateNavigation();
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQ();
                updateNavigation();
            }
        }

        function nextQ() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQ();
                updateNavigation();
            } else {
                showResults();
            }
        }

        function updateNavigation() {
            syncPills();
            const btnNext = document.getElementById('btn-next');
            const btnPrev = document.getElementById('btn-prev');
            
            btnPrev.style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
            
            if (currentIndex === quizData.length - 1) {
                btnNext.textContent = 'Finalizar Simulado';
                btnNext.style.backgroundColor = '#4CAF50';
            } else {
                btnNext.textContent = 'Próxima';
                btnNext.style.backgroundColor = '#ff5722';
            }
        }

        function renderQ() {
            const q = quizData[currentIndex];
            const container = document.getElementById('quiz-area');
            const isAnswered = userAnswers[currentIndex] !== undefined;
            
            let html = `<div class="question-title">${q.title}</div>`;
            html += `<div class="question-text">${q.text}</div>`;
            
            if (q.type === 'objective') {
                html += `<div class="options-container">`;
                q.options.forEach((opt, optIndex) => {
                    let btnClass = 'option-btn';
                    
                    if (isAnswered) {
                        if (optIndex === q.answer) btnClass += ' correct';
                        else if (optIndex === userAnswers[currentIndex]) btnClass += ' wrong';
                    }

                    html += `<button class="${btnClass}" onclick="pickOpt(${optIndex})" ${isAnswered ? 'disabled' : ''}>${opt}</button>`;
                });
                html += `</div>`;
            } else {
                // Discursive type
                let savedText = userAnswers[currentIndex] || "";
                html += `<textarea class="discursive-area" id="disc-input" placeholder="Digite seu raciocínio aqui..." ${isAnswered ? 'disabled' : ''}>${savedText}</textarea>`;
                if (!isAnswered) {
                    html += `<button class="option-btn" style="text-align:center; background:#ff5722; color:#fff;" onclick="doDiscursive()">Ver Resposta e Comentários</button>`;
                }
            }

            // Explanation Block
            if (isAnswered) {
                html += `<div class="explanation-box" style="display:block;">
                            <h4>Gabarito e Comentários</h4>
                            <div>${q.explanation}</div>
                         </div>`;
            }

            container.innerHTML = html;
            window.scrollTo(0, 0);
        }

        function pickOpt(optIndex) {
            userAnswers[currentIndex] = optIndex;
            renderQ();
            syncPills();
        }

        function doDiscursive() {
            const val = document.getElementById('disc-input').value;
            userAnswers[currentIndex] = val;
            renderQ();
            syncPills();
        }

        function showResults() {
            document.getElementById('quiz-area').style.display = 'none';
            document.querySelector('.bottom-nav').style.display = 'none';
            document.getElementById('results-area').style.display = 'block';

            let correct = 0;
            let wrong = 0;
            let discursive = 0;
            let totalObj = 0;

            quizData.forEach((q, index) => {
                if (q.type === 'objective') {
                    totalObj++;
                    if (userAnswers[index] === q.answer) correct++;
                    else if (userAnswers[index] !== undefined) wrong++;
                } else {
                    if (userAnswers[index] !== undefined) discursive++;
                }
            });

            document.getElementById('correctCount').innerText = correct;
            document.getElementById('incorrectCount').innerText = wrong;
            document.getElementById('discursiveCount').innerText = discursive;
            
            const perc = totalObj > 0 ? Math.round((correct / totalObj) * 100) : 0;
            const circle = document.getElementById('percentage-circle');
            circle.innerText = perc + '%';
            circle.style.color = perc >= 70 ? '#4CAF50' : (perc >= 40 ? '#FFEB3B' : '#F44336');
            
            window.scrollTo(0, 0);
        }

        function resetQuiz() {
            currentIndex = 0;
            userAnswers = {};
            boot();
        }

        // Init
        boot();
    </script>
</body>
</html>
