<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;white-space:pre-line;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

exp:'Esta questão vale 1,5 ponto do total de 15.\n\na) (Vale 0,4 ponto) 0 = despolarização.\n1 = repolarização precoce transitória.\n2 = platô.\n\nb) (Vale 0,4 ponto) O potencial de ação ilustrado corresponde ao das células musculares contráteis.\n\nc) (Vale 0,7 ponto) 0 = influxo (entrada) de sódio.\n1 = efluxo (saída) de potássio.\n2 = influxo (entrada) de cálcio e efluxo (saída) de potássio.',
deep:'⚡ POTENCIAL DE AÇÃO DAS CÉLULAS CONTRÁTEIS CARDÍACAS\n\nFASE 4 (repouso):\n→ Potencial de repouso ≈ -90 mV\n→ Alta permeabilidade ao K+\n\nFASE 0 (despolarização rápida):\n→ INFLUXO rápido de Na+ (canais voltagem-dependentes)\n→ Potencial sobe para +20 a +30 mV\n→ Característica das células CONTRÁTEIS\n\nFASE 1 (repolarização precoce transitória):\n→ EFLUXO transitório de K+ (canais Ito)\n→ Pequena queda inicial\n\nFASE 2 (PLATÔ — marca registrada do miocárdio):\n→ INFLUXO lento de Ca²⁺ (canais tipo L)\n→ EFLUXO de K+ (balanceado)\n→ Responsável pelo período refratário longo\n→ Impede tetania cardíaca\n\nFASE 3 (repolarização final):\n→ Fechamento dos canais de Ca²⁺\n→ EFLUXO dominante de K+\n→ Retorno ao potencial de repouso\n\n🔑 COMO DIFERENCIAR CONTRÁTIL vs NODAL:\nContrátil (esta questão): tem PLATÔ (fase 2) → Na+ dependente\nNodal (sinoatrial): SEM platô, despolarização lenta → Ca²⁺ dependente + canais funny (If)\n\n💡 MACETE\nFases: Na+ → K+ trans → Ca²⁺/K+ (platô) → K+ → repouso'},

{n:2,disc:false,tema:"Embriologia — Comunicação Interatrial",
context:"O médico que atendeu Pedro, de 5 anos, explicou à mãe do paciente que percebeu uma alteração na ausculta cardíaca e indicou a realização de outros exames complementares para investigação. Após realização dos exames, o médico constatou a presença de comunicação interatrial.\n\nConsiderando a situação descrita, analise as seguintes afirmações:",
assertions:"I – A comunicação entre os átrios é normal na circulação fetal, pois os pulmões do feto ficam preenchidos por líquido e o sangue é desviado da circulação pulmonar através do forame oval, abertura no septo interatrial.\nII – Após o nascimento, a pressão no átrio direito diminui, como resultado da interrupção do fluxo sanguíneo placentário, e a pressão no átrio esquerdo aumenta, e o forame oval se fecha funcionalmente.\nIII – Defeitos cardíacos congênitos são relativamente comuns, dentre os quais estão os defeitos do septo atrial, que podem ser clinicamente significantes, especialmente quando associados a outros defeitos cardíacos.\nIV – Além do fechamento do forame oval, após o nascimento ocorre também a aeração dos pulmões, associada a um aumento do fluxo sanguíneo e da resistência vascular pulmonar, o que contribui para as trocas gasosas.",
text:"São corretas as afirmativas:",
opts:["I e II, apenas.","III e IV, apenas.","II, III e IV, apenas.","I, II e III, apenas."],
g:3,
exp:'Alternativa correta: I, II e III, apenas.\n\nA assertiva IV está incorreta. Além do fechamento do forame oval, após o nascimento ocorre a aeração dos pulmões, associada a um aumento acentuado do fluxo sanguíneo pulmonar e redução drástica da resistência vascular pulmonar, e não o seu aumento.',
deep:'👶 CIRCULAÇÃO FETAL → NEONATAL\n\nANTES DO NASCIMENTO (fetal):\n→ Pulmões cheios de líquido → alta resistência pulmonar\n→ Sangue DESVIA dos pulmões:\n   • Forame oval (AD → AE)\n   • Ducto arterioso (a. pulmonar → aorta)\n   • Ducto venoso (veia umbilical → VCI)\n→ Placenta = oxigenação\n\nAPÓS O NASCIMENTO:\n1. Primeira respiração → pulmões expandem\n2. ↓ RESISTÊNCIA vascular pulmonar (NÃO aumenta!)\n3. ↑ Fluxo sanguíneo pulmonar\n4. ↑ Pressão no AE (retorno pulmonar aumentado)\n5. ↓ Pressão no AD (clampeamento do cordão)\n6. Forame oval fecha FUNCIONALMENTE (pressão AE > AD)\n7. Ducto arterioso fecha (↑ O₂ arterial)\n\n❌ POR QUE A IV ERRA\n"Aumento da resistência vascular pulmonar" → ERRADO\nA resistência DIMINUI drasticamente após o nascimento, permitindo o aumento do fluxo pulmonar.\n\nCOMUNICAÇÃO INTERATRIAL (CIA):\n→ Defeito do fechamento do septo interatrial\n→ Shunt E→D (pressão AE > AD após nascimento)\n→ Sopro à ausculta, pode ser assintomática\n\n💡 MACETE\nNascimento = primeira respiração = ↓ resistência pulmonar\nResistência CAI, fluxo SOBE, pressão AE SOBE, forame oval FECHA'},

{n:3,disc:false,tema:"Imunologia — Imunodeficiência Combinada Grave",
context:'No início da década de 1970, uma doença rara impressionou o mundo: o americano David Vetter nasceu com incapacidade de gerar linfócitos T e B efetores, sendo por isso colocado em uma câmara de isolamento de plástico desde que saiu do útero da mãe. Literalmente dentro de uma bolha, o ar filtrado e o ambiente constantemente esterilizado mantiveram o garoto vivo e saudável. Logo, o "menino da bolha" ganhou todas as manchetes, virou tema de documentário e sua doença se tornou alvo de diversas pesquisas. Aos 6 anos de idade, ele recebeu um traje especial desenvolvido pela NASA, e saiu finalmente do hospital. Aos 12 anos, David passou por um transplante de medula para tentar se libertar de vez das bolhas em que vivia, mas o procedimento não foi bem-sucedido e ele acabou falecendo.\n\nDisponível em: https://super.abril.com.br/ciencia/versao-modificada-dohiv-cura-casos-de-sindrome-da-bolha/.',
assertions:null,
text:"Ao avaliar a condição imunológica de David Vetter, é correto afirmar que",
opts:["a imunidade adquirida celular e humoral estão comprometidas, dessa maneira a especificidade e a memória aos agentes microbianos não se desenvolvem adequadamente.","sua imunidade humoral está preservada e os anticorpos como IgG e IgE podem ser encontrados em concentrações normais no sangue e nas secreções mucosas.","ele possui uma deficiência na imunidade inata, mediada pelos linfócitos T e B, que promovem a destruição de microrganismos por fagocitose e realizam a neutralização, respectivamente.","a imunidade específica do tipo celular, formada pelas barreiras físicas e químicas da pele e das mucosas está normal, enquanto a imunidade humoral dependente da ação do sistema complemento está deficiente."],
g:0,
exp:'Alternativa correta: a imunidade adquirida celular e humoral estão comprometidas, dessa maneira a especificidade e a memória aos agentes microbianos não se desenvolvem adequadamente.\n\nA imunidade humoral mediada pelos LB está comprometida, visto que depende das células T para geração troca de isótipos e produção das imunoglobulinas;\nA resposta inata está preservada e é mediada por células fagociticas e proteínas como as do complemento, não pelos LT E LB;\nAs barreiras físicas e químicas fazem parte da imunidade inata.',
deep:'🛡️ IMUNIDADE INATA vs ADAPTATIVA\n\nINATA (inespecífica, sem memória):\n→ Barreiras físicas e químicas (pele, mucosas, pH)\n→ Células fagocíticas (neutrófilos, macrófagos)\n→ Células NK\n→ Sistema complemento\n→ Citocinas, interferons\n→ RÁPIDA (minutos a horas)\n\nADAPTATIVA/ADQUIRIDA (específica, com memória):\n→ CELULAR: Linfócitos T (CD4 auxiliar, CD8 citotóxico)\n→ HUMORAL: Linfócitos B → plasmócitos → anticorpos\n→ LENTA (dias a semanas)\n→ ESPECIFICIDADE + MEMÓRIA\n\n👦 "MENINO DA BOLHA" (David Vetter):\nSCID — Imunodeficiência Combinada Grave\n→ Falha em LT E LB (adaptativa completamente comprometida)\n→ Inata preservada\n→ Sem memória imunológica → qualquer microrganismo é letal\n→ Tratamento: transplante de medula óssea\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: Sem LT não há troca de isótipo nem produção eficaz de Ig\n❌ C: LT e LB NÃO pertencem à inata (são adaptativa)\n❌ D: Barreiras físicas/químicas são INATAS, não adaptativas\n\n💡 MACETE\nInata = "pronta" (barreiras + fagócitos + complemento)\nAdaptativa = "aprende" (LT + LB + anticorpos + memória)\nSCID = sem LT/LB = sem adaptativa = bolha'},

{n:4,disc:false,tema:"Aterosclerose",
context:"Um artigo discutido em aula abordava a aterosclerose como uma doença inflamatória crônica de origem multifatorial, relacionada com fatores de risco como dislipidemia, diabetes, tabagismo e hipertensão arterial, os quais contribuem para a formação das placas de ateroma.\n\nSobre a aterosclerose, analise as seguintes afirmações:",
assertions:"I – As lipoproteínas de baixa densidade (LDL) podem ser oxidadas pelas células que se acumulam na placa de ateroma, e essa oxidação ativa uma resposta inflamatória.\nII – Agentes como o tabagismo e o estresse mecânico (associado à hipertensão) têm o potencial de causar uma lesão endotelial vascular, que atinge a túnica adventícia.\nIII – À medida que ocorre o crescimento da placa de ateroma, a luz da artéria aumenta também e ocorrem outros processos agravantes, como calcificação e ulcerações.\nIV – A ruptura da placa de ateroma, a trombose e a oclusão do vaso podem desencadear complicações, como infarto miocárdico e acidente vascular cerebral.",
text:"São corretas as afirmativas:",
opts:["I e III, apenas.","II e IV, apenas.","II e III, apenas.","I e IV, apenas."],
g:3,
exp:'Alternativa correta: I e IV, apenas.\n\nAs assertivas II e III estão incorretas. A lesão endotelial vascular não atinge a túnica adventícia das artérias, e sim a túnica íntima, o que contribui para a diminuição da luz do vaso, e não aumento.',
deep:'🩸 ATEROSCLEROSE — PATOGÊNESE\n\nETAPAS DA FORMAÇÃO DA PLACA:\n1. Lesão endotelial (na TÚNICA ÍNTIMA — não adventícia!)\n   → Causas: dislipidemia, HAS, diabetes, tabagismo\n2. Entrada de LDL na íntima → OXIDAÇÃO do LDL\n3. Resposta inflamatória → monócitos → macrófagos\n4. Macrófagos fagocitam LDL oxidado → CÉLULAS ESPUMOSAS\n5. Estria gordurosa → placa fibrosa → placa complicada\n6. Calcificação, ulceração, trombose\n\n📐 GEOMETRIA DA PLACA:\nPlaca cresce → luz do vaso DIMINUI (estenose)\n(NÃO aumenta, como diz a assertiva III)\n\n⚠️ COMPLICAÇÕES:\n→ Ruptura da placa → trombose\n→ Oclusão total → infarto (IAM, AVC)\n→ Embolia à distância\n\n❌ POR QUE II E III ERRAM\n❌ II: Lesão é na ÍNTIMA, não na adventícia\n❌ III: Luz DIMINUI (estenose), não aumenta\n\n🧱 TÚNICAS ARTERIAIS (dentro → fora):\nÍntima → Média → Adventícia\nLesão aterosclerótica começa na ÍNTIMA\n\n💡 MACETE\nAteroma = Íntima + LDL oxidado + macrófago = célula espumosa\nA placa OCUPA espaço → luz DIMINUI → isquemia'},

{n:5,disc:true,tema:"Retorno Venoso — Varizes",
context:"Paciente de 65 anos, portador de varizes nos membros inferiores, procura o médico queixando-se de muita dor e inchaço nas pernas. Ultimamente está trabalhando como guarda noturno e fica horas em pé dentro de uma guarita. O médico, ao examiná-lo, explica que ele precisa movimentar as pernas como parte do tratamento.\n\nCom relação ao caso exposto, responda:\n\nA) Qual o benefício da movimentação das pernas para esse paciente?\n\nB) Qual mecanismo fisiológico é responsável por esse benefício?\n\nC) Além da movimentação das pernas, qual(is) outra(s) recomendação(ões) pode(m) diminuir os sintomas desse paciente?",
assertions:null,
text:"Responda aos itens A), B) e C) acima.",
opts:[],g:null,
exp:'Esta questão tem valor de 1,15 pontos no total de 15 pontos.\n\na) (Valor da alternativa = 0,4) A movimentação favorece o retorno venoso e portanto diminui os sintomas (dor e inchaço nas pernas).\n\nb) (Valor da alternativa = 0,5) O mecanismo é a bomba muscular que impulsiona o sangue venoso.\n\nc) (Valor da alternativa = 0,25) Meias de compressão e elevação de membros inferiores.',
deep:'🦵 RETORNO VENOSO — MECANISMOS\n\nDESAFIO FISIOLÓGICO:\nSangue venoso dos MMII precisa subir CONTRA a gravidade até o coração. Pressão venosa baixa (~10 mmHg).\n\n4 MECANISMOS AUXILIARES:\n\n1. BOMBA MUSCULAR (★ chave desta questão):\n→ Contração da panturrilha comprime veias profundas\n→ Empurra sangue em direção ao coração\n→ Válvulas venosas impedem refluxo\n→ Ativada pela CAMINHADA / MOVIMENTAÇÃO\n\n2. BOMBA RESPIRATÓRIA:\n→ Inspiração → ↓ pressão torácica + ↑ pressão abdominal\n→ "Suga" sangue venoso para o tórax\n\n3. VÁLVULAS VENOSAS:\n→ Impedem refluxo\n→ Nas varizes, elas ficam INCOMPETENTES\n\n4. GRADIENTE DE PRESSÃO:\n→ Pressão venosa periférica > pressão venosa central\n\n🩺 VARIZES — FISIOPATOLOGIA:\n→ Válvulas incompetentes → refluxo → estase venosa\n→ Piora com: ortostatismo prolongado, gravidez, obesidade\n→ Sintomas: dor, edema, peso nas pernas\n\n✅ CONDUTAS NÃO-FARMACOLÓGICAS:\n• Movimentação frequente (ativa bomba muscular)\n• MEIAS DE COMPRESSÃO (graduada)\n• ELEVAÇÃO dos MMII\n• Evitar ortostatismo prolongado\n• Caminhadas regulares\n\n💡 MACETE\nGuarda parado = bomba muscular desativada = estase venosa\nMover = contrair panturrilha = bombear sangue para cima'},

text:"Assinale a alternativa correta:",
opts:["As valvas semilunares se fecham em 1 e 4 e se abrem em 2 e 3.","A diástole e abertura da valva mitral acontece em 3, e em 4 o ventrículo está concluindo o enchimento.","2 representa a abertura da valva aórtica para ejeção, e 3 representa seu fechamento.","1 representa a abertura da valva mitral, e 2 representa seu fechamento."],
g:2,
exp:'Alternativa correta: 2 representa a abertura da valva aórtica para ejeção, e 3 representa seu fechamento.\n\nDurante o ciclo cardíaco, logo após a pressão ventricular isovolumétrica, quando a pressão intraventricular se torna superior à pressão já presente na artéria aorta (número 2), a valva aórtica abre, seguindo-se a fase de ejeção rápida. Após a ejeção, quando a pressão intraventricular se torna inferior à pressão na artéria aorta, a valva aórtica se fecha e o fluxo sanguíneo, que tende a voltar para o ventrículo, é bloqueado pelo fechamento das valvas semilunares (número 3). Nesse momento, é audível a segunda bulha cardíaca devido às vibrações geradas pelo fechamento das válvulas.',
deep:'🫀 CICLO CARDÍACO — ABERTURA/FECHAMENTO DAS VALVAS\n\n4 EVENTOS VALVARES:\n\n1. FECHAMENTO DAS AV (mitral/tricúspide):\n→ Início da SÍSTOLE ventricular\n→ Pressão VE > pressão AE\n→ Gera B1 ("TUM")\n\n2. ABERTURA DAS SEMILUNARES (aórtica/pulmonar):\n→ Pressão VE > pressão AORTA (~80 mmHg)\n→ Início da EJEÇÃO rápida\n→ No gráfico: ponto 2 (quando curva VE cruza Ao)\n\n3. FECHAMENTO DAS SEMILUNARES:\n→ Pressão VE < pressão AORTA (relaxamento)\n→ Gera B2 ("TÁ")\n→ No gráfico: ponto 3 (VE cai abaixo de Ao)\n→ Incisura dicrótica na curva aórtica\n\n4. ABERTURA DAS AV:\n→ Pressão VE < pressão AE\n→ Início do ENCHIMENTO ventricular (diástole)\n\n📊 LENDO O GRÁFICO:\n→ Curva VE (azul claro): sobe durante sístole, cai durante diástole\n→ Curva Ao (azul): sempre elevada, com pico sistólico\n→ Ponto 2: curvas se CRUZAM subindo → abre aórtica\n→ Ponto 3: curvas se CRUZAM descendo → fecha aórtica\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Semilunares abrem em 2 e fecham em 3 (não em 1 e 4)\n❌ B: Em 3 é fechamento da aórtica (sistólico), não diástole\n❌ D: Ponto 1 é fechamento AV (não abertura mitral)\n\n💡 MACETE\nVE > Ao → abre aórtica (ponto 2)\nVE < Ao → fecha aórtica (ponto 3) = B2'},

text:"Na figura, o número",
opts:["2 identifica a estrutura responsável pela síntese de proteínas.","3 identifica a estrutura responsável pela digestão de enzimas.","4 identifica a estrutura responsável pela produção de ATP.","5 identifica a estrutura responsável pela fosforilação oxidativa."],
g:3,
exp:'Alternativa correta: 5 identifica a estrutura responsável pela fosforilação oxidativa.\n\nAs organelas mostradas são: 2 – reticulo liso responsável pela síntese de lipídios, 3 – reticulo rugoso importante na síntese de proteínas, 4 complexo de golgi importante na secreção celular e 5 a mitocôndria importante na produção de energia.',
deep:'🔬 ORGANELAS CELULARES — IDENTIFICAÇÃO\n\n1 — RIBOSSOMOS LIVRES (pontos no citoplasma):\n→ Síntese de proteínas citoplasmáticas\n\n2 — RETÍCULO ENDOPLASMÁTICO LISO (REL):\n→ SEM ribossomos\n→ Síntese de LIPÍDIOS, esteroides\n→ Detoxificação (hepatócitos)\n→ Armazenamento de Ca²⁺ (sarcoplasma)\n\n3 — RETÍCULO ENDOPLASMÁTICO RUGOSO (RER):\n→ COM ribossomos aderidos\n→ Síntese de PROTEÍNAS (secreção)\n→ Glicosilação inicial\n\n4 — COMPLEXO DE GOLGI:\n→ Modificação pós-traducional (glicosilação)\n→ Empacotamento em vesículas\n→ SECREÇÃO celular\n\n5 — MITOCÔNDRIA:\n→ Dupla membrana + cristas\n→ FOSFORILAÇÃO OXIDATIVA (cadeia respiratória)\n→ Produção de ATP (respiração celular)\n→ DNA próprio\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Número 2 é REL (lipídios, não proteínas)\n❌ B: Número 3 é RER (síntese proteica, não digestão) — digestão = lisossomos\n❌ C: Número 4 é Golgi (secreção, não ATP) — ATP = mitocôndria\n\n💡 MACETE\nRER = Rugoso = Ribossomo = pRoteína\nREL = Liso = Lipídio\nGolgi = Garçom (empacota e entrega)\nMitocôndria = Motor (ATP)'},

{n:8,disc:false,tema:"Hemoglobina — Estrutura e Função",

assertions:"I. Cada molécula de hemoglobina consiste em quatro cadeias de aminoácidos (quatro polipeptídios).\nII. Cada uma das cadeias de aminoácidos presentes na hemoglobina leva consigo dois átomos de ferro.\nIII. O átomo de ferro presente na hemoglobina é o sítio de ligação para as moléculas de oxigênio.\nIV. A hemoglobina é uma proteína, que tem como função realizar o transporte de gases no corpo, principalmente o óxido nítrico.",
text:"É correto apenas o que se afirma em:",
opts:["I, II e IV, apenas.","I e II, apenas.","II, III e IV, apenas.","I e III, apenas."],
g:3,
exp:'Alternativa correta: I e III, apenas.\n\nNo citoplasma dos eritrócitos encontramos as hemoglobinas, que são proteínas transportadoras de oxigênio, ou seja, levam oxigênio para os tecidos do organismo. Cada molécula de hemoglobina consiste em quatro cadeias de aminoácidos (quatro polipeptídios), cada uma delas levando um átomo de ferro que é o sítio de ligação para as moléculas de oxigênio. A oxidação dos átomos de ferro da hemoglobina confere ao sangue a sua cor vermelha.\n\nAnalisando o exposto acima, somente as assertivas II e IV estão incorretas, visto que cada molécula de hemoglobina leva consigo um átomo de ferro, além de que essa proteína é responsável pelo transporte principalmente de oxigênio.',
deep:'🩸 HEMOGLOBINA — ESTRUTURA E FUNÇÃO\n\nESTRUTURA QUATERNÁRIA:\n→ 4 cadeias polipeptídicas (globinas)\n→ HbA (adulta): 2α + 2β\n→ HbF (fetal): 2α + 2γ\n→ HbA2: 2α + 2δ\n\nGRUPO HEME:\n→ 1 heme por cadeia = 4 hemes por Hb\n→ Cada heme tem UM átomo de ferro (Fe²⁺)\n→ Cada Hb carrega 4 O₂ (1 por Fe)\n\nFUNÇÕES:\n→ Principal: transporte de O₂ (pulmões → tecidos)\n→ Secundária: transporte de CO₂ (minoritário)\n→ Transporte menor de NO (não principal!)\n→ Tamponamento do H+\n\n🔴 COR DO SANGUE:\nFe²⁺ + O₂ → oxi-hemoglobina (vermelho vivo)\nSem O₂ → desoxi-hemoglobina (vermelho escuro)\n\n🧬 ANEMIA FALCIFORME:\n→ Mutação pontual na cadeia β (Glu → Val, posição 6)\n→ HbS polimeriza em baixa O₂\n→ Hemácia deforma em foice → oclusão vascular\n\n❌ POR QUE II E IV ERRAM\n❌ II: Cada cadeia tem UM átomo de Fe (não dois) → 4 Fe por Hb\n❌ IV: Hb transporta principalmente O₂ (não NO)\n\n💡 MACETE\n4 cadeias × 1 Fe × 1 O₂ = 4 O₂ por hemoglobina\nHb = transportador de OXIGÊNIO (não de óxido nítrico)'},

opts:["O número 2 corresponde à artéria aorta; através dessa artéria ocorre a saída de sangue arterial para todo o corpo.","O número 4 corresponde à veia pulmonar; através dessa veia ocorre a chegada de sangue venoso no átrio direto.","O número 1 corresponde às veias pulmonares; através delas ocorre a chegada de sangue arterial no coração.","O número 3 corresponde à artéria pulmonar; através dela ocorre a passagem de sangue arterializado para grande circulação."],
g:2,
exp:'Alternativa correta: O número 1 corresponde às veias pulmonares; através delas ocorre a chegada de sangue arterial no coração.\n\nNa figura, o número 1, corresponde as veias pulmonares e através delas ocorre a chegada de sangue arterial no coração. Número 2 corresponde à artéria pulmonar e através desta artéria ocorrer a saída de sangue arterial para os pulmões. Número 3 corresponde à artéria aorta e através dela ocorre a passagem de sangue arterializado para grande circulação. Número 4 corresponde à veia cava superior e através desta veia ocorre a chegada de sangue venoso no átrio direto.',
deep:'🫀 CIRCULAÇÃO CARDÍACA — ENTRADAS E SAÍDAS\n\nVEIA CAVA SUPERIOR (4):\n→ Traz sangue VENOSO da cabeça, pescoço e MMSS\n→ Desemboca no ÁTRIO DIREITO\n\nVEIA CAVA INFERIOR:\n→ Traz sangue VENOSO dos MMII e abdome\n→ Desemboca no ÁTRIO DIREITO\n\nARTÉRIA PULMONAR (2):\n→ Sai do VENTRÍCULO DIREITO\n→ Leva sangue VENOSO (não oxigenado) aos pulmões\n→ ⚠️ Única artéria com sangue venoso!\n\nVEIAS PULMONARES (1):\n→ Trazem sangue ARTERIAL (oxigenado) dos pulmões\n→ Desembocam no ÁTRIO ESQUERDO\n→ ⚠️ Únicas veias com sangue arterial!\n\nARTÉRIA AORTA (3):\n→ Sai do VENTRÍCULO ESQUERDO\n→ Leva sangue ARTERIAL para a GRANDE CIRCULAÇÃO\n\n🔄 FLUXO COMPLETO:\nVC → AD → VD → a.pulmonar → pulmões → v.pulmonares → AE → VE → aorta → corpo\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Número 2 = a. pulmonar (não aorta)\n❌ B: Número 4 = veia CAVA (traz sangue venoso), não veia pulmonar\n❌ D: Número 3 = aorta (não a. pulmonar)\n\n💡 MACETE\nv. pulmonares = únicas VEIAS com sangue ARTERIAL\na. pulmonar = única ARTÉRIA com sangue VENOSO'},

{n:10,disc:false,tema:"Sistema Nervoso Autônomo — Síncope Vasovagal",
context:"Paciente de 21 anos relata um episódio de síncope (perda súbita e transitória da consciência) quando retirava suas roupas para tomar banho. Relata também 3 episódios semelhantes nos últimos 5 anos. Ao ser questionada, ela nega traumas, não apresenta comorbidades e nega história familiar para morte súbita ou infartos. Na chegada ao pronto atendimento, apresentava-se pálida, queixando dor de cabeça e fraqueza. O médico logo pensou em síncope vasovagal.",
assertions:null,
text:"Avaliando o caso descrito e a ocorrência da síncope vasovagal, esta decorre de um estímulo exacerbado do nervo vago, que pode",
opts:["desencadear uma taquicardia e, consequente, hipotensão arterial, levando a uma redução do fluxo sanguíneo cerebral, que ocasiona a síncope.","desencadear uma taquicardia e, consequente, hipertensão arterial, levando a um aumento do fluxo sanguíneo cerebral, que ocasiona a síncope.","desencadear uma bradicardia e, consequente, hipotensão arterial, levando a uma redução do fluxo sanguíneo cerebral, que ocasiona a síncope.","desencadear uma bradicardia e, consequente hipotensão arterial, levando a um aumento do fluxo sanguíneo cerebral, que ocasiona a síncope."],
g:2,
exp:'Alternativa correta: desencadear uma bradicardia e, consequente, hipotensão arterial, levando a uma redução do fluxo sanguíneo cerebral, que ocasiona a síncope.\n\nO nervo vago é o componente do sistema nervoso responsável pela regulação dos batimentos cardíacos. Certos estímulos ao nervo vago, provocados por ansiedade, medo, dor, alterações da temperatura ou simplesmente por ficar de pé por muito tempo, podem provocar a chamada síndrome vasovagal, em que a pessoa pode ter uma intensa tontura ou desmaio. A hiperestimulação deste nervo pode provocar queda dos batimentos cardíacos (bradicardia) e da pressão arterial (hipotensão) com consequente redução do fluxo sanguíneo cerebral ocasionando um episódio de síncope.',
deep:'😵 SÍNCOPE VASOVAGAL — MECANISMO\n\nGATILHOS COMUNS:\n→ Ansiedade, medo, dor intensa\n→ Visão de sangue\n→ Ortostatismo prolongado\n→ Mudanças bruscas de temperatura\n→ Esforço evacuatório (síncope miccional)\n\nFISIOPATOLOGIA — REFLEXO DE BEZOLD-JARISCH:\n1. Gatilho ativa NERVO VAGO (parassimpático) em excesso\n2. Vago → BRADICARDIA (↓ FC)\n   + Retirada simpática → VASODILATAÇÃO\n3. ↓ FC + vasodilatação = HIPOTENSÃO ARTERIAL\n4. ↓ Pressão de perfusão cerebral\n5. ↓ Fluxo sanguíneo cerebral → SÍNCOPE\n\n💊 NERVO VAGO (X par craniano):\n→ Parassimpático\n→ Libera ACETILCOLINA\n→ No coração: ↓ FC (cronotropismo negativo)\n→ No coração: ↓ velocidade de condução no nó AV\n\n📉 PRÓDROMOS (sinais prévios):\n→ Palidez, sudorese fria\n→ Náusea, tontura\n→ Borramento visual, zumbido\n→ Sensação de fraqueza\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ A: Vago causa BRADI (não taqui)\n❌ B: Vago causa BRADI + HIPO (não taqui/hiper)\n❌ D: Fluxo cerebral DIMINUI (não aumenta), por isso há síncope\n\n💡 MACETE\nVago ativo = coração lento + vasos dilatados = PA baixa = cérebro sem sangue = desmaio'},

assertions:"I. As células Y são células mielóides que originam os megacariócitos. Estes, por sua vez, darão origem às plaquetas, as quais estão envolvidas no processo de coagulação sanguínea.\nII. As células Y são células bastante diferenciadas e que originam as hemácias, as quais são especializadas no transporte de oxigênio tecidual ligado á hemoglobina.\nIII- As células X são células linfoides que originam uma população celular especializada em opsonizar partículas estranhas quando são ativadas.\nIV- Os neutrófilos, que são originados a partir do progenitor X, encontram-se em maior quantidade proporcional dentre os leucócitos do sangue periférico, e são importantes na defesa contra bactérias.",
text:"Estão corretas as proposições:",
opts:["I e III, apenas.","I e II, apenas.","III e IV, apenas.","II e III, apenas."],
g:0,
exp:'Alternativa correta: I e III, apenas.\n\nAs células Y (alternativa II) são indiferenciadas. Já os neutrófilos são originados do progenitor mieloide, que seria a célula Y e não X ( alternativa IV).',
deep:'🩸 HEMATOPOESE — LINHAGENS\n\nCÉLULA-TRONCO HEMATOPOÉTICA (CTH):\n→ Multipotente\n→ Se divide em 2 linhagens principais:\n\nLINHAGEM MIELOIDE (Célula Y na figura):\n→ Progenitor mieloide comum\n→ Origina:\n   • Hemácias (eritropoese)\n   • Megacariócitos → PLAQUETAS\n   • Granulócitos: NEUTRÓFILOS, eosinófilos, basófilos\n   • Monócitos → macrófagos\n   • Mastócitos\n→ Estímulo: eritropoetina (EPO), G-CSF, trombopoetina\n\nLINHAGEM LINFOIDE (Célula X na figura):\n→ Progenitor linfoide comum → Linfoblasto\n→ Origina:\n   • Linfócitos B → plasmócitos → ANTICORPOS (opsonização)\n   • Linfócitos T (CD4, CD8)\n   • Células NK\n→ Estímulo: IL-7, IL-2, IL-15\n\n📊 PROPORÇÃO NOS LEUCÓCITOS:\n→ NEUTRÓFILOS: 50-70% (maioria!)\n→ Linfócitos: 20-40%\n→ Monócitos: 2-10%\n→ Eosinófilos: 1-4%\n→ Basófilos: <1%\n\n❌ POR QUE II E IV ERRAM\n❌ II: Célula Y é INDIFERENCIADA (progenitor mieloide), não diferenciada\n❌ IV: Neutrófilos vêm do MIELOIDE (Y), não do LINFOIDE (X)\n\n💡 MACETE\nMieloide (Y) = tudo que NÃO é linfócito\n(hemácia + plaqueta + granulócito + monócito)\nLinfoide (X) = LB + LT + NK'},

{n:12,disc:false,tema:"Metodologias Ativas de Ensino",
context:'Nos últimos anos diversos meios de comunicação têm publicado conteúdos sobre novas metodologias de ensino e aprendizagem. O jornal de uma conceituada universidade no estado de São Paulo publicou: "Educação na modernidade envolve metodologias ativas e tecnologias: aulas expositivas cedem lugar para uma participação mais ativa de estudante e professor serve como orientador". Essa reportagem traz um parecer favorável, porém a modernização da educação vem sendo aplaudida por uns e questionada por outros.\n\nAo se analisar e comparar as metodologias ativas com as metodologias tradicionais, pode-se afirmar que:',
assertions:"I. As metodologias ativas são centradas no tutor e as metodologias tradicionais centradas no professor.\nII. As metodologias ativas estão alinhadas com a medicina baseada em evidência, uma vez que preparam os estudantes para a pesquisa, leitura e compreensão.\nIII. Existem benefícios em ambas as metodologias. Pode-se citar como ponto positivo de algumas metodologias ativas o desenvolvimento de habilidades interpessoais.",
text:"Estão corretas as afirmativas:",
opts:["I e II, apenas.","II e III, apenas.","I, II e III.","I e III, apenas."],
g:1,
exp:'Alternativa correta: II e III, apenas.\n\nO item I está incorreto, uma vez que as metodologias ativas são centradas no aprendiz e valorizam cenário individual de cada estudante.\n\nO item II está correto.\n\nO item III está correto e pode ser especialmente percebida em atividades em grupo.',
deep:'📚 METODOLOGIAS ATIVAS vs TRADICIONAIS\n\nMETODOLOGIA TRADICIONAL:\n→ CENTRADA NO PROFESSOR\n→ Aula expositiva\n→ Aluno passivo (receptor)\n→ Conteúdo pré-definido e linear\n→ Avaliação somativa\n\nMETODOLOGIA ATIVA:\n→ CENTRADA NO APRENDIZ/ALUNO (não no tutor!)\n→ Professor = facilitador/orientador\n→ Aluno ativo (protagonista)\n→ Aprendizagem baseada em:\n   • Problemas (ABP/PBL)\n   • Projetos\n   • Equipes (TBL)\n   • Casos clínicos\n   • Simulação\n→ Desenvolve habilidades INTERPESSOAIS\n\n🔬 VANTAGENS PARA MEDICINA:\n→ Prepara para MEDICINA BASEADA EM EVIDÊNCIAS\n→ Estimula pesquisa, leitura crítica\n→ Desenvolve raciocínio clínico\n→ Trabalho em equipe (essencial no SUS)\n→ Aprendizagem significativa (contextualizada)\n\n❌ POR QUE I ERRA\nMetodologia ativa é centrada no APRENDIZ, não no tutor. O tutor é apenas um facilitador/orientador.\n\n💡 MACETE\nAtiva = Aprendiz ativo\nTradicional = Transmissão\n(professor ensina vs. aluno aprende)'},

{n:13,disc:false,tema:"Hemostasia — Fibrinólise",
context:"A deficiência de alfa-2-antiplasmina, principal inibidor da plasmina, acarreta perda do controle da atividade desta proteína, impedindo a produção de fragmentos circulantes que são depois destruídas por outras proteínas ou pelos rins e fígado. Este fenômeno prejudica a volta da fluidez necessária do sangue após alguma lesão do vaso sanguíneo.",
assertions:null,
text:"A etapa da hemostasia, que é afetada pela deficiência de alfa-2-antiplasmina, é a:",
opts:["Fibrinólise.","Agregação plaquetária.","Coagulação.","Vasoconstrição transitória."],
g:0,
exp:'Alternativa correta: Fibrinólise.\n\nA Alfa2 anti-plasmina é um inibidor importante da atividade fibrinolítica da plasmina. Impede uma fibrinólise patológica, fora do sítio de lesão, por exemplo.',
deep:'🩸 HEMOSTASIA — 4 ETAPAS\n\n1. VASOCONSTRIÇÃO TRANSITÓRIA (reflexa):\n→ Contração do músculo liso vascular\n→ Reduz fluxo local (segundos)\n→ Mediada por endotelina, tromboxano A2\n\n2. HEMOSTASIA PRIMÁRIA (tampão plaquetário):\n→ Adesão plaquetária (via FvW → GP Ib)\n→ Ativação plaquetária\n→ Agregação (via GPIIb/IIIa + fibrinogênio)\n→ Tampão FROUXO\n\n3. HEMOSTASIA SECUNDÁRIA (COAGULAÇÃO):\n→ Cascata de coagulação (fatores)\n→ Via extrínseca + intrínseca → via comum\n→ Protrombina → trombina → fibrina\n→ Rede de fibrina ESTABILIZA o tampão\n\n4. FIBRINÓLISE (★ chave desta questão):\n→ Dissolução do coágulo após reparo\n→ Plasminogênio → PLASMINA (ativada por tPA)\n→ Plasmina QUEBRA a fibrina → PDF (D-dímero)\n→ Restaura fluidez do sangue\n\n🛑 INIBIDORES DA FIBRINÓLISE:\n→ ALFA-2-ANTIPLASMINA (principal inibidor da plasmina)\n→ PAI-1 (inibidor do tPA)\n→ TAFI\n\nSem alfa-2-antiplasmina → plasmina em excesso → fibrinólise patológica → hemorragias\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: Agregação plaquetária = hemostasia primária\n❌ C: Coagulação = cascata de fatores → fibrina\n❌ D: Vasoconstrição = 1ª etapa, mecânica/reflexa\n\n💡 MACETE\nPlasmina DIGERE fibrina = dissolve coágulo\nAlfa-2-antiplasmina CONTROLA plasmina\nSem o controle = sangra demais'},

exp:'Alternativa correta: Durante a sístole ventricular, as valvas semilunares pulmonar e aórtica estão abertas.\n\nÉ necessário que as valvas dos grandes vasos (aorta e tronco pulmonar) estejam abertas para permitir fluxo sanguíneo unidirecional durante a contração ventricular (sístole) e as valvas atrioventriculares estejam fechadas para impedir o refluxo de sangue. Assim, durante a diástole as valvas atrioventriculares estão abertas e as valvas semilunares pulmonar e aórtica estão fechadas.',
deep:'🫀 VALVAS CARDÍACAS — SÍSTOLE vs DIÁSTOLE\n\n📍 SÍSTOLE VENTRICULAR (contração):\n→ Pressão VE/VD ALTA\n→ Valvas ATRIOVENTRICULARES (mitral, tricúspide): FECHADAS\n   → Impedem refluxo para os átrios\n   → Geram B1 ("TUM")\n→ Valvas SEMILUNARES (aórtica, pulmonar): ABERTAS\n   → Permitem ejeção para aorta e a. pulmonar\n\n📍 DIÁSTOLE VENTRICULAR (relaxamento/enchimento):\n→ Pressão VE/VD BAIXA\n→ Valvas ATRIOVENTRICULARES: ABERTAS\n   → Permitem enchimento ventricular\n→ Valvas SEMILUNARES: FECHADAS\n   → Impedem refluxo da aorta/a. pulmonar para ventrículos\n   → Geram B2 ("TÁ")\n\n🔊 BULHAS:\n→ B1 = fechamento das AV (início da sístole)\n→ B2 = fechamento das semilunares (fim da sístole)\n\n🩺 SOPROS (vibração audível anormal):\n→ Estenose valvar: dificuldade de abrir\n→ Insuficiência (regurgitação): falha no fechamento\n\n❌ POR QUE AS OUTRAS ERRAM\n❌ B: Na diástole, semilunares estão FECHADAS\n❌ C: Na diástole, AV estão ABERTAS (permitindo enchimento)\n❌ D: Na sístole, AV estão FECHADAS\n\n💡 MACETE\nRegra da ALTERNÂNCIA:\nQuando AV abre → semilunar fecha\nQuando AV fecha → semilunar abre\n(nunca as 4 estão abertas ou fechadas ao mesmo tempo)'},

g:0,
exp:'Alternativa correta: A obstrução ou remoção de vasos e linfonodos axilares prejudica a drenagem de líquidos da região extracelular, leva à insuficiência do sistema linfático e acúmulo de líquido na região afetada, resultando em edema.\n\nO sistema linfático é formado por vasos linfáticos, linfonos e órgãos linfóides que se ramificam pelo corpo. Esse sistema está relacionado as respostas imunológicas e também participa da drenagem de liquídos da região extracelular dos tecidos. Obstruções ou remoção de vasos e linfonodos prejudicam a drenagem de líquidos da região extracelular e causam seu acúmulo na região afetada, resultando em edema do membro.',

function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';if(q.contextHTML){ctx.innerHTML=q.contextHTML;}else{ctx.textContent=q.context;}}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}

function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}

var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
