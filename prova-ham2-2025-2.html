<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
.sticky-aviso{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(250,173,63,0.06);border:1px solid rgba(250,173,63,0.2);border-radius:8px;margin-bottom:10px;font-size:12px;color:#FAAD3F;font-weight:500;}
.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

<script>
const QS=[
{n:1,disc:false,tema:"OVACE — Adulto Consciente",context:"(AFYA IPATINGA) Durante uma comemoração familiar, um homem adulto com deficiência física engasga-se após ingerir um pedaço de carne. Ele leva as mãos ao pescoço, demonstra desespero e é incapaz de falar, tossir ou respirar. Sua sobrinha, estudante de medicina, reconhece rapidamente que se trata de uma obstrução grave das vias aéreas por corpo estranho (OVACE grave com consciência preservada).",assertions:null,text:"Com base nesse cenário, qual a conduta correta e imediata a ser adotada?",opts:["Orientar a vítima a tossir e tentar expelir o corpo estranho, passando para a realização da manobra de Heimlich quando a paciente ficar inconsciente.","Realizar a manobra de Heimlich, aplicando compressões abdominais firmes e direcionadas para dentro e para cima, até que a via aérea seja desobstruída ou a vítima perca a consciência.","Iniciar compressões torácicas no solo e, após 30 compressões, abrir a via aérea e procurar por corpo estranho. Se não encontrar, realizar duas ventilações e retornar às compressões.","Realizar compressões torácicas conforme a manobra de Heimlich, aplicando compressões em \"J\", firmes, para dentro e para esquerda, até que ocorra o desengasgo."],g:1,
exp:"Diante de uma obstrução grave das vias aéreas em um adulto consciente (OVACE grave), a conduta imediata é aplicar a manobra de Heimlich, realizando compressões abdominais firmes e direcionadas para dentro e para cima, com o objetivo de expulsar o corpo estranho. Essa manobra deve ser mantida até que a via aérea seja desobstruída ou até que a vítima perca a consciência. Se isso ocorrer, deve-se iniciar imediatamente a reanimação cardiopulmonar (RCP), com ênfase nas compressões torácicas.",
deep:"🚨 OVACE GRAVE + CONSCIENTE → HEIMLICH\n\nPosicionar-se ATRÁS da vítima\nPunho fechado entre umbigo e apêndice xifóide\nOutra mão por cima → comprimir para DENTRO e para CIMA\nRepetir até desobstrução ou inconsciência\n\nSe perder consciência → deitar → RCP (30:2) → verificar boca\n\n❌ A: Não se espera a inconsciência — Heimlich durante consciência\n❌ C: Compressões torácicas no solo = vítima INCONSCIENTE\n❌ D: Direção correta é para CIMA, não para esquerda"},

{n:2,disc:false,tema:"Nervos Cranianos V e VII",context:"(UNISL JI-PARANÁ) Um homem de 52 anos procura atendimento ambulatorial referindo dor e formigamento no lado direito da face há 2 semanas. Nega déficit motor em membros. Ao exame, o médico solicita que o paciente feche os olhos com força e sorria, observando discreta assimetria facial. Em seguida, realiza teste de sensibilidade tátil e dolorosa em fronte, bochecha e mandíbula, além de avaliar o reflexo córneo-palpebral.",assertions:null,text:"Com base nesse exame, assinale a alternativa correta.",opts:["O reflexo córneo-palpebral é mediado pela aferência do nervo facial e eferência do trigêmeo.","A avaliação descrita corresponde ao exame dos nervos cranianos V (trigêmeo) e VII (facial), que devem ser rotineiramente testados em todo exame neurológico.","A fraqueza ao fechar os olhos e sorrir indica comprometimento do nervo trigêmeo (V par).","A alteração da sensibilidade facial é compatível com lesão do nervo facial (VII par)."],g:1,
exp:"Alternativa correta: A avaliação descrita corresponde ao exame dos nervos cranianos V (trigêmeo) e VII (facial), que devem ser rotineiramente testados em todo exame neurológico.\nO exame descrito contempla a avaliação do nervo trigêmeo (V) – sensibilidade da face e reflexo córneo-palpebral (aferência) – e do nervo facial (VII) – motricidade da mímica facial e fechamento ocular.\nA sensibilidade da face está relacionada ao V par, não ao VII (refutando a alternativa: A alteração da sensibilidade facial é compatível com lesão do nervo facial (VII par).\nO reflexo córneo-palpebral tem aferência pelo V (ramo oftálmico) e eferência pelo VII (refutando a alternativa: O reflexo córneo-palpebral é mediado pela aferência do nervo facial e eferência do trigêmeo).\nA motricidade da face é função do VII, não do V (refutando a alternativa: A fraqueza ao fechar os olhos e sorrir indica comprometimento do nervo trigêmeo (V par).",
deep:"🧠 NC V vs NC VII — o que cada um faz\n\nNC V (Trigêmeo):\n   Sensitivo: sensibilidade de TODA a face (V1, V2, V3)\n   Motor (V3): mastigação\n   Reflexo córneo-palpebral: AFERÊNCIA = V1\n\nNC VII (Facial):\n   Motor: mímica facial (franzir, fechar olhos, sorrir, assobiar)\n   Parassimpático: glândulas lacrimal, submandibular\n   Sensitivo: paladar 2/3 ant. da língua\n   Reflexo córneo-palpebral: EFERÊNCIA = VII\n\n❌ A: INVERTE aferência/eferência do reflexo córneo-palpebral\n❌ C: Fechar olhos e sorrir = NC VII (motor), não V\n❌ D: Sensibilidade facial = NC V (trigêmeo), não VII"},

{n:3,disc:false,tema:"Fundoscopia — Técnica",context:"(AFYA SANTA INÊS) Um paciente adulto comparece a uma consulta de rotina na Unidade Básica de Saúde. Durante o exame físico, o médico decide realizar a fundoscopia para avaliação do fundo de olho.",assertions:null,text:"Considerando a situação acima, assinale a alternativa que descreve a forma adequada de realizar a fundoscopia em um paciente adulto.",opts:["O examinador deve posicionar-se a aproximadamente 50 cm do paciente, utilizando o olho esquerdo para examinar o olho direito do paciente.","O paciente deve manter os olhos fechados, enquanto o examinador regula a intensidade da luz e ajusta as lentes do oftalmoscópio.","O oftalmoscópio deve ser posicionado inicialmente em 90° em relação ao olho do paciente, ajustando-se depois a distância conforme a nitidez da imagem.","O exame deve ser realizado com o paciente fixando um ponto, aproximando o oftalmoscópio a 15 cm e alinhando os olhos correspondentes do examinador e do paciente."],g:3,
exp:"A alternativa que indica \"O examinador deve posicionar-se a aproximadamente 50 cm do paciente, utilizando o olho esquerdo para examinar o olho direito do paciente\" é incorreta: O posicionamento está errado. Deve-se usar o olho direito para examinar o olho direito e o esquerdo para o esquerdo, aproximando-se a cerca de 15 cm, não 50 cm.\nA alternativa que indica \"O exame deve ser realizado com o paciente fixando um ponto, aproximando o oftalmoscópio a 15 cm e alinhando olhos correspondentes do examinador e do paciente\" é correta: descreve a técnica adequada: paciente olhando para um ponto fixo, alinhamento correto dos olhos do examinador e do paciente, e aproximação progressiva a 15 cm até visualizar o fundo de olho.\nA alternativa que indica \"O oftalmoscópio deve ser posicionado inicialmente em 90º em relação ao olho do paciente, ajustando-se depois a distância conforme a nitidez da imagem.\" é incorreta: O oftalmoscópio deve ser posicionado em linha com o eixo visual do paciente, e não em 90º.\nA alternativa que indica \"O paciente deve manter os olhos fechados, enquanto o examinador regula a intensidade da luz e ajusta as lentes do oftalmoscópio\" é incorreta. O paciente deve manter os olhos abertos e fixos, não fechados.",
deep:"👁️ FUNDOSCOPIA DIRETA — TÉCNICA CORRETA\n\nAmbiente: escurecido (midríase natural ou farmacológica)\nPaciente: olhos ABERTOS, fixando ponto distante\n\nOftalmoscópio:\n   Usar olho D para examinar olho D do paciente\n   Usar olho E para examinar olho E do paciente\n   Aproximar progressivamente até ~15 cm\n   Ângulo: ~15° temporal (não 90°)\n   Ajustar lente conforme refração do paciente\n\n❌ A: 50 cm é longe demais; olho E não examina olho D\n❌ B: Olhos FECHADOS = impossível examinar a retina\n❌ C: 90° = incorreto; deve ser alinhado ao eixo visual\n\nSequência de avaliação:\n   Disco óptico → vasos → mácula → retina periférica\n\nNo diabético → buscar:\n   Microaneurismas, hemorragias, exsudatos, neovascularização"},

{n:4,disc:false,tema:"Escala de Glasgow",context:"(AFYA ITABUNA) Um paciente de 23 anos de idade, sem antecedentes conhecidos, deu entrada no pronto-socorro com relato de rebaixamento do nível de consciência. Na admissão, encontrava-se estável hemodinamicamente e com glicemia capilar normal. Ao exame neurológico, apresentava pupilas isofotorreagentes, abertura ocular à pressão, resposta verbal confusa e resposta motora com flexão normal.",assertions:null,text:"Com base nesse caso hipotético, assinale a alternativa que apresenta a pontuação do paciente na escala de coma de Glasgow.",opts:["11","10","8","9"],g:1,
exp:"Questão direta que cobra o valor da escala de coma de Glasgow, que varia de 3 a 15. Abertura ocular a estímulo doloroso ou pressão pontua 2. Fala confusa pontua 4. Flexão normal é um estímulo de retirada e pontua 4. O total, então, seria 10.",
deep:"📊 GLASGOW — CALCULANDO O CASO\n\nAbertura Ocular:\n   À pressão → O2\n\nResposta Verbal:\n   Confusa → V4\n   (fala frases, mas desorientado)\n\nResposta Motora:\n   Flexão normal (retirada) → M4\n   Atenção: flexão NORMAL ≠ flexão ANORMAL\n   Flexão normal (M4): retirada do estímulo\n   Flexão anormal (M3): decorticação (postura estereotipada)\n\nPupilas: isofotorreagentes → P0\n\nTotal: O2 + V4 + M4 + P0 = 10 → TCE MODERADO\n\nEscala completa:\n   Abertura: 4=espontânea, 3=som, 2=pressão, 1=ausente\n   Verbal: 5=orientado, 4=confuso, 3=palavras, 2=sons, 1=ausente\n   Motora: 6=obedece, 5=localiza, 4=flexão normal, 3=decorticação, 2=descerebração, 1=ausente"},

{n:5,disc:false,tema:"OVACE — Lactente Consciente",context:"(UNIFIPMOC) Em uma creche, durante o horário do lanche, um lactente de 8 meses começa a apresentar um episódio súbito de engasgo enquanto é alimentado. A criança apresenta tosse fraca ou ausente (\"tosse silenciosa\"), não consegue chorar ou vocalizar e exibe cianose perioral progressiva.",assertions:null,text:"Considerando os protocolos atuais de atendimento a engasgos em lactentes, qual deve ser a conduta imediata do socorrista diante dessa situação?",opts:["Segurar o lactente em pronação no antebraço, cabeça mais baixa; aplicar 5 golpes interescapulares vigorosos, virar em supinação e realizar 5 compressões torácicas no esterno, em ciclos.","Introduzir o dedo na boca do lactente e fazer varredura para retirar o objeto; em seguida, iniciar ventilação e compressões torácicas, realizando ciclos alternados de compressão e ventilação.","Deitar o lactente em superfície rígida e iniciar RCP com compressões torácicas de alta qualidade, aguardando sinais de expansão torácica e expulsão do corpo estranho.","Posicionar-se atrás do lactente e realizar compressões abdominais tipo Heimlich, aplicando empuxos rápidos em J e acima do umbigo até a expulsão do objeto estranho."],g:0,
exp:"A alternativa \"segurar o lactente em pronação no antebraço, cabeça mais baixa; aplicar 5 golpes interescapulares vigorosos, virar em supinação e realizar 5 compressões torácicas no esterno, em ciclos\" é correta, pois descreve a sequência recomendada para menores de 1 ano com obstrução completa de vias aéreas.\nA alternativa \"posicionar-se atrás do lactente e realizar compressões abdominais tipo Heimlich; aplicando empuxos rápidos acima do umbigo até a expulsão do objeto estranho\" é incorreta, pois a manobra de Heimlich (compressões abdominais) não é indicada para lactentes, em menores de 1 ano.\nA alternativa \"introduzir o dedo na boca do lactente e fazer varredura para retirar o objeto, em seguida iniciar ventilação e compressões torácicas, realizando ciclos alternados de compressão e ventilação\" é incorreta, pois a varredura digital cega é contraindicada pelo risco de impactar ainda mais o corpo estranho.\nA alternativa \"deitar o lactente em superfície rígida e iniciar RCP com compressões torácicas de alta qualidade, aguardando sinais de expansão torácica e expulsão do corpo estranho\" é incorreta, pois a RCP é indicada quando o paciente está inconsciente; no lactente consciente com obstrução completa, a conduta imediata é golpes nas costas e compressões torácicas alternadas, iniciando RCP apenas se houver inconsciência.",
deep:"👶 OVACE LACTENTE (< 1 ANO) — CONSCIENTE\n\nPosição 1 — PRONE no antebraço:\n   Decúbito ventral, cabeça MAIS BAIXA que o tronco\n   Apoiar antebraço na coxa\n\nPasso 1 — 5 GOLPES DORSAIS:\n   Região hipotenar entre escápulas\n   Firmes e vigorosos\n\nVirar o lactente → decúbito dorsal no outro antebraço\n\nPasso 2 — 5 COMPRESSÕES TORÁCICAS:\n   2 dedos (indicador + médio)\n   Linha intermamilar no esterno\n   Compressões rítmicas\n\nRepetir ciclos (5:5) até desobstrução ou inconsciência\n\nSe INCONSCIENTE → RCP (30:2)\nA cada abertura de VA → inspecionar boca → remover SE VISÍVEL\n\n❌ B: Varredura digital cega → pode impactar o objeto mais fundo\n❌ C: RCP é para INCONSCIENTE\n❌ D: Heimlich abdominal CONTRAINDICADO em < 1 ano"},

{n:6,disc:false,tema:"Coordenação Motora — Dedo-Nariz",context:"(UNIMA) Durante uma visita domiciliar em atenção secundária, um geriatra, acompanhado de estudantes de medicina, avalia um idoso de 74 anos, hipertenso e diabético, que refere dificuldade crescente para realizar tarefas finas, como abotoar a camisa ou levar a colher à boca sem tremer. A esposa desse paciente relata que ele vem tropeçando com frequência em casa, embora não tenha sofrido quedas recentes.\n\nAo exame físico, o paciente encontra-se orientado, marcha sem apoio, mas com insegurança em ambientes estreitos. O geriatra explica aos alunos que, diante da suspeita de disfunção cerebelar, devem ser aplicadas provas de coordenação motora.",assertions:null,text:"Qual das opções abaixo corresponde a uma prova de coordenação motora adequada para esse paciente?",opts:["Solicitar que o paciente feche os olhos e permaneça em pé com os pés juntos.","Solicitar que o paciente toque a ponta do nariz com o dedo indicador e depois a ponta do dedo do examinador, repetindo o movimento de forma alternada.","Solicitar que o paciente caminhe em linha reta, colocando um pé à frente do outro.","Solicitar que o paciente mantenha os braços estendidos e observar se há queda de um dos membros."],g:1,
exp:"A manobra em que o paciente toca a ponta do nariz com o dedo indicador e, em seguida, a ponta do dedo do examinador, repetindo o movimento alternadamente, é conhecida como teste dedo-nariz, sendo uma das principais provas de coordenação motora, utilizada para identificar dismetria e tremor intencional de origem cerebelar.\nA marcha em tandem (caminhar em linha reta, colocando um pé à frente do outro) é usada para avaliar equilíbrio postural, não coordenação.\nO teste de Romberg (ficar em pé com os pés juntos e olhos fechados) avalia equilíbrio e propriocepção, mas não coordenação.\nA observação da queda de um dos braços estendidos é um teste para investigar déficits motores de origem piramidal, e não coordenação.\nPortanto, a prova de coordenação motora adequada nesse caso é o teste dedo-nariz.",
deep:"🎯 PROVAS DE COORDENAÇÃO vs OUTROS TESTES\n\nDedo-nariz ← resposta correta:\n   Paciente toca nariz → dedo do examinador, alternadamente\n   Achados cerebelares: dismetria + tremor intencional\n   O examinador pode mudar a posição do dedo\n\nCalcanhar-joelho:\n   Deslizar calcanhar ao longo da tíbia oposta\n   Também avalia coordenação cerebelar\n\nDiadococinesia:\n   Pronação/supinação rápida das mãos\n   Disdiadococinesia → disfunção cerebelar\n\n❌ A: Romberg = equilíbrio ESTÁTICO + propriocepção (NC VIII)\n❌ C: Marcha em tandem = equilíbrio DINÂMICO (postural)\n❌ D: Braços estendidos (Mingazzini) = avalia FORÇA (déficit piramidal/NMS)\n\nSinais cerebelares:\n   Dismetria, tremor intencional, disdiadococinesia,\n   ataxia de marcha, nistagmo"},

{n:7,disc:false,tema:"SBV — PCR: Conduta Imediata",context:"(AFYA ABAETETUBA) Um homem de 58 anos chega à UPA com dor torácica súbita e intensa, acompanhada de sudorese profusa. Enquanto aguarda avaliação, ele perde a consciência e cai da cadeira. A equipe corre em seu auxílio. Ao aproximar-se, verifica-se que o paciente não responde a estímulos verbais ou dolorosos. A ventilação é avaliada e observa-se ausência de movimentos respiratórios eficazes. Em seguida, é feita a checagem rápida da circulação carotídea, não sendo palpado pulso central em até 10 segundos.",assertions:null,text:"Considerando o caso acima, assinale a alternativa que indica a conduta imediata.",opts:["Confirmar a ausência de pulso em dois locais diferentes, um central e outro periférico, antes de iniciar compressões torácicas.","Realizar ventilação de resgate com bolsa-válvula-máscara por 2 minutos antes de iniciar compressões.","Iniciar imediatamente compressões torácicas de alta qualidade, após reconhecer a parada cardiorrespiratória.","Transportar o paciente imediatamente para a sala de emergência sem iniciar manobras de reanimação."],g:2,
exp:"A alternativa correta é a que indica \"Iniciar imediatamente compressões torácicas de alta qualidade, após reconhecer a parada cardiorrespiratória.\" A sequência de reconhecimento de uma PCR no adulto envolve: verificar responsividade, respiração e pulso. A ausência de resposta, respiração normal e pulso indicam PCR, e a conduta imediata é iniciar compressões torácicas de alta qualidade, sem atrasos.\nAs demais alternativas estão incorretas:\nA alternativa que indica \"Confirmar a ausência de pulso em dois locais diferentes, um central e outro periférico, antes de iniciar compressões torácicas\" está incorreta, pois não é necessário confirmar a ausência de pulso em dois locais diferentes. A avaliação do pulso carotídeo deve ser feita em no máximo 10 segundos, e, diante da ausência de pulso, devem-se iniciar imediatamente as compressões torácicas. Demoras atrasam o início da RCP e reduzem a sobrevida.\nA alternativa que indica \"Realizar ventilação de resgate com bolsa-válvula-máscara por 2 minutos antes de iniciar compressões.\" está incorreta, pois as ventilações não devem preceder as compressões torácicas. A prioridade no SBV é iniciar compressões de alta qualidade o mais rápido possível. A ventilação com bolsa-válvula-máscara deve ser associada, mas não deve atrasar o início das compressões.\nA alternativa que indica \"Transportar o paciente imediatamente para a sala de emergência sem iniciar manobras de reanimação.\" está incorreta, pois o transporte sem iniciar manobras de RCP não é aceitável. O atendimento deve começar imediatamente no local, pois a sobrevida do paciente depende da prontidão das compressões torácicas iniciais.",
deep:"🫀 PCR — PRIORIDADES NA RCP\n\nProtocolo C-A-B (compressões ANTES de ventilações):\n   C: iniciar compressões IMEDIATAMENTE\n   A: abertura de vias aéreas\n   B: breathing (ventilações)\n\nCompressões de alta qualidade:\n   Profundidade ≥5 cm (5-6 cm)\n   Frequência 100-120/min\n   Retorno completo do tórax\n   Minimizar interrupções\n   Relação 30:2\n\n❌ A: Não é necessário confirmar em 2 locais\n   Pulso carotídeo em ≤10 seg → ausente → iniciar compressões\n❌ B: Ventilações NÃO devem preceder compressões\n   Compressões primeiro → circulação imediata\n❌ D: Nunca transportar sem iniciar RCP\n   Cada segundo sem compressões = ↓ sobrevida"},

{n:8,disc:false,tema:"Reflexos Profundos — Assertivas",context:"(AFYA CRUZEIRO DO SUL) Durante uma tarde movimentada no pronto atendimento da UPA, um médico recebe um paciente adulto que necessita de uma avaliação neurológica sistemática. Neste contexto, o médico decide realizar testes para avaliar os reflexos mais comuns, incluindo o reflexo bicipital, patelar e de Aquiles.",assertions:"I. O reflexo bicipital é testado com o paciente em posição sentada, utilizando um martelo de reflexo para percutir o tendão do bíceps, observando a contração do músculo.\nII. O reflexo patelar é avaliado usualmente com o paciente assentado com as pernas relaxadas, em que a percussão do tendão patelar provoca a extensão da perna, indicando uma resposta normal do sistema nervoso.\nIII. O reflexo aquileu é realizado observando-se a flexão plantar do pé ao percutir o tendão de Aquiles, sendo este reflexo geralmente ausente em indivíduos hígidos.\nIV. A presença de reflexos hiporreflexivos geralmente indica uma lesão no sistema nervoso central, sendo um achado relevante na avaliação neurológica.",text:"Assinale a alternativa que contenha as assertivas corretas.",opts:["II e IV.","I e II.","III e IV.","I e III."],g:1,
exp:"Assertiva I está correta. O teste do reflexo bicipital é de fato realizado em posição sentada, em que a percussão do tendão do bíceps provoca uma contração muscular, confirmando a integridade neurológica.\nAssertiva II está correta. O reflexo patelar é avaliado com o paciente assentado, com as pernas relaxadas, e a extensão da perna ao ser percutido o tendão patelar é um sinal neurológico normal, indicando a funcionalidade do arco reflexo.\nAssertiva III está incorreta. O reflexo aquileu deve estar presente em indivíduos hígidos, sendo a flexão plantar uma resposta normal. A ausência deste reflexo pode indicar patologia.\nAssertiva IV está incorreta. Reflexos hiporreflexivos estão mais associados a lesões do sistema nervoso periférico ou de raízes nervosas, e não necessariamente a lesões no sistema nervoso central.",
deep:"⚡ REFLEXOS PROFUNDOS — ANÁLISE DAS ASSERTIVAS\n\nI ✅ Correto — Bicipital:\n   Posição sentada, cotovelo semifletido\n   Percutir tendão distal do bíceps\n   Resposta: flexão do antebraço\n   Centro medular: C5-C6\n\nII ✅ Correto — Patelar:\n   Pernas relaxadas (sentado ou deitado)\n   Percutir tendão patelar\n   Resposta: extensão da perna (quadríceps)\n   Centro medular: L2-L4\n\nIII ❌ Incorreto — Aquileu:\n   Reflexo DEVE estar presente em hígidos\n   Flexão plantar ao percutir tendão de Aquiles\n   AUSENTE → indica patologia (neuropatia periférica, ex: diabética)\n   Centro medular: S1-S2\n\nIV ❌ Incorreto — Hiporreflexia:\n   Hiporreflexia → lesão NMI (periférico)\n   Hiperreflexia → lesão NMS (central)\n\nRegra mnemônica:\n   NMS (central) → HIPER (freia perdida)\n   NMI (periférico) → HIPO (arco lesado)"},

{n:9,disc:true,tema:"DEA — Passos e Desfibrilação Precoce",context:"(UNIDOMPEDRO) Em um shopping center, um homem adulto cai ao chão subitamente, permanecendo inconsciente e sem sinais evidentes de respiração. Um estudante de Medicina inicia o atendimento conforme o protocolo de SBV. Um segundo socorrista retorna com um DEA.\n\na) Descreva os passos corretos na utilização do DEA a partir do momento em que o aparelho chega até o paciente. (0,75 ponto)\n\nb) Analise a importância da desfibrilação precoce no atendimento de uma PCR e sua relação com o sucesso na reanimação. (0,75 ponto)",assertions:null,text:"Responda às questões a e b acima.",opts:[],g:null,
exp:"Gabarito esperado:\na)\nO estudante deve descrever a sequência de uso do DEA, conforme o protocolo:\nLigar o DEA imediatamente ao chegar.\nExpor o tórax da vítima e, se necessário, secar a pele.\nFixar os eletrodos adesivos conforme o desenho indicado nos próprios eletrodos.\nAguardar a análise do ritmo pelo DEA, mantendo todos afastados da vítima.\nSeguir as orientações do aparelho: se indicar choque, garantir que ninguém toque na vítima e pressionar o botão para desfibrilação.\nRetomar imediatamente as compressões torácicas após o choque ou, se o choque não for indicado, respeitar os ciclos de 2 minutos de RCP com reavaliação pelo DEA.\nb)\nA desfibrilação precoce é essencial para reverter ritmos chocáveis, como fibrilação ventricular e taquicardia ventricular sem pulso. A chance de sucesso da RCP diminui a cada minuto sem desfibrilação, podendo cair de 7% a 10% por minuto. Portanto, a aplicação rápida do DEA aumenta significativamente a sobrevida da vítima e deve ser feita o mais precocemente possível após o início da PCR.",
deep:"⚡ DEA — SEQUÊNCIA COMPLETA\n\na) PASSOS DO DEA:\n   1) Ligar imediatamente\n   2) Expor tórax + secar a pele se molhada\n   3) Fixar eletrodos conforme desenho nas pás\n      Infraclavicular D + ápice cardíaco E\n   4) Análise do ritmo → TODOS afastados (não tocar)\n   5) Se chocável → afastar → apertar botão\n   6) Retomar RCP IMEDIATAMENTE após choque\n   7) Ciclos de 2 min → reavaliação pelo DEA\n\nb) DESFIBRILAÇÃO PRECOCE — por que é crucial:\n   Ritmos chocáveis: FV e TV sem pulso\n   Sobrevida sem desfibrilação: ↓ 7-10% por minuto\n   Desfibrilação em < 3-5 min → sobrevida > 50%\n\nApós o choque:\n   Retomar compressões SEM checar pulso\n   O DEA avisa quando reanalisar\n   Pulso só verificado se DEA indicar ritmo não chocável"},

{n:10,disc:true,tema:"Força Muscular — Quadríceps e Escala MRC",context:"(ITPAC PORTO NACIONAL) Durante atendimento ambulatorial, um paciente de 67 anos relata sensação de fraqueza progressiva nas pernas, com dificuldade para se levantar de cadeiras e subir escadas. Nega quedas ou dor local. Ao exame, a marcha é lenta, e há leve dificuldade para manter a extensão ativa do joelho ao sentar-se sem apoio.\n\na) Descreva, passo a passo, como deve ser realizado o exame da força muscular do músculo quadríceps femoral. Inclua a posição correta do paciente, o movimento a ser solicitado, a forma de aplicação da resistência e os critérios observados na avaliação. (0,75 ponto)\n\nb) Apresente a escala MRC (Medical Research Council) utilizada para classificar a força muscular, explicando o que representa cada grau. (0,75 ponto)",assertions:null,text:"Responda às questões a e b acima.",opts:[],g:null,
exp:"Padrão esperado de resposta:\na)\nO quadríceps é o principal extensor do joelho. O exame da sua força deve ser feito com o paciente em posição sentada, com o joelho flexionado a 90° e os pés sem apoio no chão (livres). O examinador deve ficar à frente do paciente, estabilizando a coxa com uma das mãos e aplicando resistência progressiva com a outra mão na parte anterior da perna, logo acima do tornozelo.\nSolicita-se que o paciente estenda a perna contra a gravidade e, depois, aplica-se uma força contrária ao movimento, tentando flexionar o joelho, para avaliar a capacidade de manter a extensão contra a resistência. O teste é realizado bilateralmente para comparação entre os lados. A observação inclui: movimento completo, presença de dor, resposta à resistência e simetria de força.\nb)\nA escala MRC (Medical Research Council) é usada para graduar a força muscular de 0 a 5:\nGrau 0: Ausência total de contração muscular visível ou palpável.\nGrau 1: Contração muscular visível ou palpável, sem movimento articular.\nGrau 2: Movimento ativo possível apenas com a gravidade eliminada (em plano horizontal).\nGrau 3: Movimento ativo completo contra a gravidade, sem resistência.\nGrau 4: Movimento ativo contra a gravidade e alguma resistência do examinador.\nGrau 5: Força muscular normal, com movimento completo e resistência total.",
deep:"💪 QUADRÍCEPS — COMO EXAMINAR\n\nPosição: sentado, joelho a 90°, pés LIVRES (sem apoio)\nExaminador: à frente do paciente\nEstabilizar: uma mão na coxa (impede compensação)\nResistência: outra mão na parte anterior da perna (logo acima do tornozelo)\n\nSequência:\n   1) Pedir extensão ATIVA contra a gravidade\n   2) Aplicar resistência crescente tentando flexionar o joelho\n   3) Observar: amplitude, dor, simetria\n   4) Comparar BILATERALMENTE\n\nEscala MRC (0-5):\n   0 → Paralisia total — sem contração\n   1 → Contração visível/palpável — sem movimento\n   2 → Move com gravidade eliminada (plano horizontal)\n   3 → Vence a gravidade — sem resistência\n   4 → Vence resistência parcial\n   5 → Força normal — resistência total\n\nNo caso: dificuldade de extensão ativa → suspeita de grau 3-4\nCausas de fraqueza do quadríceps: miopatia proximal, neuropatia femoral, artropatia"}];

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Quest\u00e3o '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.innerHTML=q.assertions.replace(/\n/g,'<br>');}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'\u270d Gabarito comentado':(ok?'\u2713 Correto!':'\u2717 Incorreto \u2014 Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">\u2726 Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Pr\u00f3xima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parab\u00e9ns!':pct>=50?'Quase l\u00e1!':'Continue praticando!';document.getElementById('resSub').textContent='Voc\u00ea acertou '+correct+' de '+total+' quest\u00f5es de m\u00faltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'\u2014';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'\u2014';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'\u00d3timo dom\u00ednio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conte\u00fados antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' \u2014 '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' \u00b7 Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado \ud83c\udf89</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incid\u00eancia de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Quest\u00f5es puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Quest\u00f5es erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}

var hlOn=false; function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);} document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle); function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();} document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});

  <script>
const PROVA_ID = 'ham2-2025-2';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) {
    state.eliminated[k] = Array.from(eliminated[k]);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) {
          eliminated[k] = new Set(state.eliminated[k]);
        }
      }
      return true;
    }
  } catch (e) {}
  return false;
}

const _origSubmit = submitAnswer;
submitAnswer = function() {
  _origSubmit();
  saveLocal();
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) {
    setTimeout(showResult, 100);
  }
}
</script>
