<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulados 3 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;}

nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:14px;height:14px;fill:white;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:16px;letter-spacing:.05em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}

.main{max-width:1000px;margin:0 auto;padding:100px 32px 80px;}
.page-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;margin-bottom:8px;}
.page-desc{color:var(--muted);margin-bottom:32px;font-size:15px;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.prova-card{display:block;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-decoration:none;transition:all .2s;position:relative;}
.prova-card:hover{border-color:var(--pink);transform:translateY(-2px);box-shadow:0 8px 24px rgba(214,0,110,0.15);}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pc-badge{background:rgba(214,0,110,0.15);color:var(--pink-light);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.05em;}
.pc-date{font-size:12px;color:var(--muted);font-weight:600;}
.pc-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;}
.pc-sub{font-size:13px;color:var(--light);margin-bottom:20px;}
.pc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.pc-tags span{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:4px 10px;border-radius:50px;font-size:11px;color:var(--muted);font-weight:500;}
.pc-arrow{position:absolute;bottom:24px;right:24px;color:var(--muted);transition:color .2s;}
.prova-card:hover .pc-arrow{color:var(--pink);}

@media(max-width:640px){
  .main{padding:90px 16px 60px;}
  nav{padding:0 16px;}
  .cards-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 2L2 19h4l2-4h8l2 4h4L12 2zm0 5l3 6H9l3-6z"/></svg></div>
    <span class="logo-name">AFYADOS</span>
  </a>
  <a href="index.html" class="back-btn">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao Início
  </a>
</nav>

<div class="main">
  <h1 class="page-title">Simulados - SOI II</h1>
  <p class="page-desc">Selecione a prova desejada para iniciar a resolução.</p>
  
  <div class="cards-grid">
    <a href="Prova-soi2-2022-1.html" class="prova-card">
      <div class="pc-top">
        <span class="pc-badge">N1</span>
        <span class="pc-date">2022.1</span>
      </div>
      <h3 class="pc-title">Sistema Orgânico Integrado II</h3>
      <p class="pc-sub">Medicina AFYA • 2º Período</p>
      <div class="pc-tags">
        <span>SNC</span>
        <span>Reparo Ósseo</span>
        <span>Via Auditiva</span>
      </div>
      <div class="pc-arrow">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>
  </div>
</div>

</body>
</html>
