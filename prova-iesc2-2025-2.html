<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}.sticky-inner{max-width:820px;margin:0 auto;}.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}.qp:hover{border-color:var(--green-b);color:#5DCAA5;}.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}.q-header-left{display:flex;align-items:center;gap:8px;}.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}.q-tag-sep{color:rgba(255,255,255,0.12);}.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}.q-opt[disabled]{cursor:default;}.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}.q-feedback.show{display:block;animation:fadeUp .25s ease;}.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}.ai-box.open{display:block;animation:fadeUp .3s ease;}.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}.btn-prev[disabled]{opacity:0.3;cursor:default;}.q-counter{font-size:14px;color:var(--muted);}.q-counter strong{color:#F4EFFA;font-weight:700;}.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}.result-screen.show{display:block;}.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}.res-stat .v{font-size:22px;font-weight:700;}.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}.report-section{margin-bottom:24px;}.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}.q-review-list{display:flex;flex-direction:column;gap:6px;}.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}.q-rev-row:hover{background:rgba(255,255,255,0.05);}.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}.q-rev-row span{flex:1;font-size:13px;color:var(--light);}.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}

.hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}

{n:1,disc:false,tema:"Condições Crônicas vs Agudas — Mendes",src:"UNIREDENTOR",context:"(UNIREDENTOR) Na \u00e1rea de abrang\u00eancia da UBS do bairro Esperan\u00e7a, a equipe de Sa\u00fade da Fam\u00edlia acompanha diferentes situa\u00e7\u00f5es:\n\nI. Jo\u00e3o, 58 anos, pedreiro, hipertenso e diab\u00e9tico, realiza consultas regulares na UBS, participa de grupos educativos sobre alimenta\u00e7\u00e3o e faz acompanhamento cont\u00ednuo.\nII. Ana, 8 anos, estudante, chega ao pronto atendimento com corte provocado por objeto cortante, sendo realizada sutura e prescri\u00e7\u00e3o de medicamentos.\nIII. Pedro, 72 anos, aposentado, sofreu um AVC h\u00e1 seis meses e, desde ent\u00e3o, est\u00e1 em acompanhamento multiprofissional cont\u00ednuo (fisioterapia, fonoaudiologia, consultas regulares).\nIV. Maria, 35 anos, diarista, procura o pronto-socorro devido a uma crise de c\u00f3lica renal, recebe medica\u00e7\u00e3o para al\u00edvio da dor e retorna sem seguimento posterior.",assertions:null,text:"De acordo com a classificação das condições de saúde (crônicas ou agudas) e as respostas do sistema de saúde (reativa/episódica ou proativa/contínua), assinale a alternativa correta.",opts:["I e II representam condições agudas com resposta reativa/episódica, enquanto III e IV representam condições crônicas com resposta proativa/contínua.","I e IV representam condições crônicas com resposta contínua, enquanto II e III representam condições agudas com resposta episódica.","I e III representam condições crônicas com resposta proativa/contínua, enquanto II e IV representam condições agudas com resposta reativa/episódica.","I e III representam condições agudas com resposta proativa/contínua, enquanto II e IV representam condições crônicas com resposta reativa/episódica."],g:2,exp:"- I e III representam condições crônicas com resposta proativa/contínua, enquanto II e IV representam condições agudas com resposta reativa/episódica. (Correta)\nComentário: Esta é a alternativa correta porque agrupa as classificações de forma precisa. João (I) e Pedro (III) são casos de doenças crônicas (hipertensão, diabetes e sequelas de AVC) que exigem um acompanhamento proativo e contínuo por parte do sistema de saúde. Por outro lado, Ana (II) e Maria (IV) enfrentam condições agudas (corte e cólica renal) que demandam uma resposta reativa e episódica para a resolução do quadro.\n\n- I e II representam condições agudas com resposta reativa/episódica, enquanto III e IV representam condições crônicas com resposta proativa/contínua. (Incorreta)\nComentário: Esta alternativa está incorreta porque inverte as classificações para os casos de João (I) e Maria (IV). Ela classifica João como um caso agudo, quando, na verdade, ele tem condições crônicas que requerem acompanhamento contínuo. Da mesma forma, classifica Maria como uma condição crônica, sendo que sua crise de cólica renal é um quadro agudo e episódico.\n\n- I e IV representam condições crônicas com resposta contínua, enquanto II e III representam condições agudas com resposta episódica. (Incorreta)\nComentário: Esta alternativa falha em classificar corretamente Maria (IV) e Pedro (III). Ela associa o quadro agudo de Maria a uma resposta contínua, o que é conceitualmente incorreto. Além disso, classifica a condição crônica de Pedro (sequelas de AVC) como um caso agudo, ignorando a necessidade de reabilitação e acompanhamento contínuo.\n\n- I e III representam condições agudas com resposta proativa/contínua, enquanto II e IV representam condições crônicas com resposta reativa/episódica. (Incorreta)\nComentário: Esta alternativa está completamente incorreta, pois inverte todas as classificações. Ela associa as condições crônicas de João (I) e Pedro (III) a uma resposta de caráter agudo, e as condições agudas de Ana (II) e Maria (IV) a um acompanhamento crônico. Essa inversão mostra uma falta de compreensão das características de cada tipo de condição de saúde e da resposta correspondente do sistema.",deep:"📊 CONDIÇÕES DE SAÚDE E RESPOSTAS DO SISTEMA — MODELO DE MENDES\n\nClassificação dos 4 casos:\n\n   ✅ I — João (58 anos, HAS + DM2, acompanhamento regular)\n   → Condição: CRÔNICA  |  Resposta: PROATIVA/CONTÍNUA\n   → Consultas regulares, grupos educativos, acompanhamento contínuo\n\n   ✅ III — Pedro (72 anos, pós-AVC, reabilitação multiprofissional)\n   → Condição: CRÔNICA (sequelas de longa duração)  |  Resposta: PROATIVA/CONTÍNUA\n   → Fisioterapia, fonoaudiologia, consultas regulares\n\n   ✅ II — Ana (8 anos, corte por objeto cortante)\n   → Condição: AGUDA  |  Resposta: REATIVA/EPISÓDICA\n   → Sutura + prescrição → atendimento pontual\n\n   ✅ IV — Maria (35 anos, cólica renal)\n   → Condição: AGUDA  |  Resposta: REATIVA/EPISÓDICA\n   → Medicação para dor, sem seguimento posterior\n\nRegra de Mendes:\n   → Crônicas → exigem cuidado contínuo e proativo\n   → Agudas → resposta imediata e episódica\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Inverte João (crônico) como agudo e Maria (aguda) como crônica\n   B → Pedro é crônico (não agudo) e Maria é aguda (não crônica)\n   D → Inverte TODAS as classificações\n\n💡 MACETE:\n   Acompanhamento CONTÍNUO = crônico + proativo\n   Pronto-socorro SEM seguimento = agudo + reativo"},
{n:2,disc:true,tema:"Equipes da Atenção Básica — eSF vs eAP",src:"UNINOVAFAPI",context:"(UNINOVAFAPI) Uma Secretaria Municipal de Sa\u00fade est\u00e1 em processo de reorganiza\u00e7\u00e3o da APS. Em reuni\u00e3o de planejamento, surge a discuss\u00e3o sobre a melhor forma de estruturar as equipes que atuar\u00e3o nas UBS, considerando a diversidade populacional e territorial. A gest\u00e3o precisa decidir se adotar\u00e1 predominantemente as eSF ou as eAP, bem como a articula\u00e7\u00e3o dos profissionais no cuidado \u00e0 comunidade.",assertions:null,text:"a) Descreva as principais diferenças entre a composição de profissionais da eSF e da eAP, destacando as respectivas atribuições de cada modelo. (0,75 ponto)\n\nb) Explique como a atuação conjunta dos profissionais nesses diferentes modelos de equipe contribui para a saúde da população. (0,75 ponto)",opts:[],g:null,exp:"a) As Equipes de Saúde da Família (eSF) são compostas minimamente por médico, enfermeiro, técnico ou auxiliar de enfermagem e agentes comunitários de saúde, podendo ser ampliadas com profissionais da Equipe Multiprofissional de Saúde (eMulti), equipe de Saúde Bucal (eSB) e agentes de endemia. Têm como atribuições principais o acompanhamento longitudinal das famílias em território definido, a promoção da saúde, a prevenção de doenças, o diagnóstico e tratamento de condições mais prevalentes e o encaminhamento quando necessário.\nAs Equipes de Atenção Primária (eAP) apresentam maior flexibilidade de composição, geralmente com médico e enfermeiro como núcleo mínimo, sem a obrigatoriedade de agentes comunitários. Poderão agregar outros profissionais como técnicos e/ou auxiliares de enfermagem, dentistas, auxiliares e/ou técnicos de saúde bucal, agentes comunitários de saúde e agentes de combate a endemias. São voltadas para ampliar o acesso à APS, permitindo arranjos diferentes conforme a realidade local, mas com menor foco na territorialização e no acompanhamento domiciliar. (0,75).\n\nb) A atuação conjunta das equipes, em qualquer modelo, fortalece a integralidade ao integrar saberes distintos, permitindo que as necessidades de saúde sejam abordadas em diferentes dimensões — biológica, social e psicológica. A eSF favorece o cuidado contínuo e próximo da comunidade, com vínculos mais duradouros. A eAP, por sua vez, amplia o acesso em regiões com menor cobertura, podendo reduzir barreiras de entrada. A cooperação entre os profissionais contribui para o compartilhamento de responsabilidades, melhor coordenação do cuidado e fortalecimento da rede de atenção, garantindo maior resolutividade e qualidade na atenção prestada. (0,75).",deep:"👥 eSF vs eAP — DIFERENÇAS E COMPLEMENTARIDADE\n\na) Diferenças de composição e atribuições:\n\n   🏠 eSF (Equipe de Saúde da Família)\n   → Médico + enfermeiro + téc/aux enfermagem + ACS (obrigatório)\n   → Pode ampliar com eSB, eMulti, agentes de endemia\n   → Território DEFINIDO, longitudinalidade, vínculo forte\n   → Promoção, prevenção, diagnóstico, tratamento, encaminhamento\n\n   🏢 eAP (Equipe de Atenção Primária)\n   → Médico + enfermeiro (mínimo)\n   → SEM obrigatoriedade de ACS\n   → Mais flexível, menor foco em territorialização\n   → Para ampliar o ACESSO à APS\n\nb) Como a atuação conjunta contribui:\n   → eSF: cuidado contínuo e próximo, vínculos duradouros\n   → eAP: amplia cobertura onde não há eSF\n   → Cooperação fortalece integralidade e resolutividade\n\n💡 MACETE:\n   eSF = equipe COMPLETA (com ACS) → prioridade do SUS\n   eAP = equipe ENXUTA (sem ACS) → para expandir acesso"},
{n:3,disc:false,tema:"Densidades Tecnológicas — APS",src:"UNIPTAN",context:"(UNIPTAN) Masculino, 75 anos, foi atendido na UBS do munic\u00edpio Flores, onde \u00e9 acompanhado por uma equipe da ESF. Apresenta hist\u00f3rico de HAS e DM2, ambos controlados com medica\u00e7\u00e3o oral. Recentemente, queixou-se de cansa\u00e7o ao caminhar longas dist\u00e2ncias e dificuldade para subir escadas. Durante a consulta, o m\u00e9dico realizou exame f\u00edsico, iniciando a investiga\u00e7\u00e3o para poss\u00edveis comorbidades associadas ao envelhecimento.",assertions:null,text:"Considerando o contexto, qual nível de densidade tecnológica da RAS está sendo predominantemente utilizado no atendimento?",opts:["Baixa densidade tecnológica (Atenção Secundária à Saúde).","Moderada densidade tecnológica (Atenção Secundária à Saúde).","Alta densidade tecnológica (Atenção Terciária à Saúde).","Baixa densidade tecnológica (Atenção Primária à Saúde)."],g:3,exp:"- Correta: Baixa densidade tecnológica: Atenção Primária à Saúde.\nA Atenção Primária à Saúde (APS) é caracterizada por ser o primeiro nível de contato do indivíduo com o sistema de saúde, oferecendo cuidados contínuos, integrais e coordenados. No caso do Sr. Antônio, o acompanhamento realizado pela equipe da Estratégia Saúde da Família na UBS, incluindo visitas domiciliares e monitoramento de condições crônicas, se enquadra na APS. Esse nível de atenção é fundamental para a promoção da saúde, prevenção de doenças e manejo de condições crônicas como hipertensão e diabetes, especialmente em idosos.\n\n- Análise dos Distratores (incorretas):\nModerada densidade tecnológica: Atenção Secundária à Saúde: refere-se a serviços especializados que, em geral, requerem encaminhamento da APS (consultas com cardiologistas ou endocrinologistas, por exemplo). O Sr. Antônio está sendo acompanhado na APS, e o texto não indica que ele tenha sido encaminhado para esse nível de atenção.\nAlta densidade tecnológica: Atenção Terciária à Saúde: envolve serviços de alta complexidade, como hospitais e unidades de terapia intensiva. Não é o nível de cuidado descrito no atendimento do paciente.\nBaixa densidade tecnológica: Atenção Domiciliar: Embora o Sr. Antônio recebe visitas domiciliares, o atendimento principal ocorre na UBS, caracterizando-se como Atenção Primária à Saúde com suporte domiciliar, e não como atenção secundária.",deep:"🏥 DENSIDADE TECNOLÓGICA — CASO DO SR. ANTÔNIO\n\nO atendimento:\n   → Local: UBS, pela Estratégia Saúde da Família\n   → Procedimentos: exame físico, acompanhamento de HAS e DM2\n   → Investigação inicial de comorbidades do envelhecimento\n\nClassificação:\n   → Nível de atenção: PRIMÁRIO (APS)\n   → Densidade tecnológica: BAIXA\n\nConceito-chave:\n   → APS = primeiro contato, cuidado contínuo, coordenação\n   → Usa tecnologias leves (vínculo, escuta) e leve-duras (protocolos)\n   → NÃO houve encaminhamento para especialista ou hospital\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Baixa densidade + secundária é contradição\n   B → Moderada/secundária = ambulatórios especializados (não é o caso)\n   D → Alta/terciária = UTI, hospitais (não é o caso)\n\n💡 MACETE:\n   UBS + ESF + exame físico + acompanhamento = PRIMÁRIA + BAIXA densidade\n   Se não houve encaminhamento para especialista, permanece na APS"},
{n:4,disc:false,tema:"Atribuições Comuns da ESF",src:"AFYA Itacoatiara",context:"(AFYA Itacoatiara) Luiza \u00e9 enfermeira de uma eSF e, durante reuni\u00e3o de planejamento, explicou sobre as atribui\u00e7\u00f5es previstas na Portaria n\u00ba 2.436/2017.\n\nI \u2013 Participar do processo de territorializa\u00e7\u00e3o e mapeamento da \u00e1rea de atua\u00e7\u00e3o da equipe, identificando grupos, fam\u00edlias e indiv\u00edduos expostos a riscos e vulnerabilidades.\nII \u2013 Realizar o cuidado integral \u00e0 sa\u00fade da popula\u00e7\u00e3o adscrita, prioritariamente no \u00e2mbito da UBS e, quando necess\u00e1rio, no domic\u00edlio e em outros espa\u00e7os comunit\u00e1rios.\nIII \u2013 Indicar a necessidade de interna\u00e7\u00e3o hospitalar ou domiciliar, mantendo a responsabiliza\u00e7\u00e3o pelo acompanhamento da pessoa.\nIV \u2013 Desenvolver cuidado individual, familiar e coletivo, visando propor interven\u00e7\u00f5es que influenciem os processos sa\u00fade-doen\u00e7a.",assertions:null,text:"Sobre as atribuições comuns a todos os membros das equipes de saúde da família, é correto o que se afirma em:",opts:["I, II e IV.","III e IV.","II e IV.","I, II, III e IV."],g:0,exp:"4 - Atribuições dos Profissionais da Atenção Básica.\nI – Correta. A territorialização e o mapeamento do território, com identificação de grupos e vulnerabilidades, são atribuições comuns a todos os membros da eSF (diagnóstico situacional, planejamento e ações no território).\nII – Correta. Realizar cuidado integral à população adscrita, prioritariamente na UBS e, quando necessário, no domicílio e em outros espaços comunitários, é atribuição comum da equipe, envolvendo ações individuais e coletivas, programadas e por demanda espontânea.\nIII – Incorreta. Indicar necessidade de internação (hospitalar ou domiciliar) é atribuição específica do médico na PNAB, não sendo comum a todos os membros da equipe (embora a responsabilização e o acompanhamento do usuário sejam compartilhados).\nIV – Correta. Desenvolver cuidado individual, familiar e coletivo com intervenções sobre os processos saúde-doença integra o rol de atribuições comuns da equipe na Atenção Básica.",deep:"📋 ATRIBUIÇÕES COMUNS vs ESPECÍFICAS — Portaria 2.436/2017\n\nAnálise das afirmativas:\n\n   ✅ I — Territorialização e mapeamento\n   → Atribuição COMUM a todos os membros da equipe\n\n   ✅ II — Cuidado integral na UBS, domicílio e espaços comunitários\n   → Atribuição COMUM a todos os profissionais\n\n   ❌ III — Indicar internação hospitalar ou domiciliar\n   → Atribuição ESPECÍFICA DO MÉDICO\n   → NÃO é comum a todos (apesar do acompanhamento ser compartilhado)\n\n   ✅ IV — Cuidado individual, familiar e coletivo\n   → Atribuição COMUM a todos os profissionais\n\nResposta: I, II e IV (sem a III)\n\n💡 MACETE:\n   INDICAR INTERNAÇÃO = só o MÉDICO decide\n   Mas o ACOMPANHAMENTO após internação = responsabilidade de TODOS\n   Na dúvida: se envolve DECISÃO CLÍNICA de internar = específica do médico"},
{n:5,disc:false,tema:"Equipes da Atenção Básica — eSF vs eAP",src:"AFYA Bragança",context:"(AFYA Bragan\u00e7a) Na UBS de um munic\u00edpio, um paciente de 40 anos, trabalhador rural, procura atendimento por dor lombar frequente. Ele foi atendido por um m\u00e9dico vinculado \u00e0 unidade, sem acompanhamento de agente comunit\u00e1rio de sa\u00fade.\n\nI \u2013 O modelo descrito corresponde a uma eAP, modalidade em que n\u00e3o h\u00e1 a presen\u00e7a obrigat\u00f3ria do ACS.\nII \u2013 Na eSF, diferentemente da eAP, o ACS \u00e9 considerado integrante obrigat\u00f3rio da composi\u00e7\u00e3o m\u00ednima.\nIII \u2013 As eAP dever\u00e3o ser compostas, no m\u00ednimo, por m\u00e9dico e enfermeiro, preferencialmente especialistas em sa\u00fade da fam\u00edlia, podendo se articular com uma eMulti para ampliar a resolutividade do cuidado.",assertions:null,text:"Está(ão) correta(s) apenas:",opts:["I e III.","I e II.","I, II e III.","II e IV."],g:2,exp:"I – O modelo descrito corresponde a uma Equipe de Atenção Primária (eAP), modalidade em que não há a presença obrigatória do agente comunitário de saúde.\nCorreta. A PNAB (Portaria nº 2.436/2017) define que a eAP é uma equipe mínima de Atenção Primária formada por médico e enfermeiro, podendo incluir técnico ou auxiliar de enfermagem, mas sem obrigatoriedade de agente comunitário de saúde (ACS). Isso a diferencia da eSF, em que o ACS é integrante obrigatório.\n\nII – Na Equipe de Saúde da Família (eSF), diferentemente da eAP, o agente comunitário de saúde é considerado integrante obrigatório da composição mínima.\nCorreta. A PNAB estabelece que a eSF deve obrigatoriamente contar com ACS, além de médico, enfermeiro e técnico/auxiliar de enfermagem. A atuação territorializada, a adscrição da população e o trabalho do ACS são pilares fundamentais desse modelo.\n\nIII – As Equipes de Atenção Primária (eAP) deverão ser compostas, no mínimo, por médico e enfermeiro, preferencialmente especialistas em saúde da família, podendo ainda se articular com uma Equipe Multiprofissional (eMulti) para ampliar a resolutividade do cuidado.\nCorreta. A PNAB determina que a composição mínima da eAP inclui médico e enfermeiro, sendo recomendada a especialização em Saúde da Família. Além disso, a articulação com as eMulti fortalece a integralidade e a capacidade de resposta da APS.",deep:"👥 eSF vs eAP — COMPOSIÇÃO E ARTICULAÇÃO\n\nAnálise das assertivas:\n\n   ✅ I — eAP sem ACS obrigatório\n   → Correto: a PNAB define eAP com médico + enfermeiro como mínimo\n   → ACS NÃO é obrigatório na eAP\n\n   ✅ II — eSF com ACS obrigatório\n   → Correto: na eSF, o ACS é integrante obrigatório da composição mínima\n   → Pilar da territorialização e acompanhamento domiciliar\n\n   ✅ III — eAP = médico + enfermeiro + articulação com eMulti\n   → Correto: composição mínima + possibilidade de apoio da eMulti\n   → Preferencialmente especialistas em Saúde da Família\n\nTodas corretas → resposta: I, II e III\n\nDiferença fundamental:\n   → eSF: ACS obrigatório + território definido + longitudinalidade forte\n   → eAP: ACS facultativo + composição flexível + foco em ampliar acesso\n\n💡 MACETE:\n   eSF = equipe RAIZ (com ACS, território, vínculo)\n   eAP = equipe FLEX (sem ACS obrigatório, mais adaptável)"},
{n:6,disc:false,tema:"Diretrizes da PNAB — Ordenação da Rede",src:"UNIDEP",context:"(UNIDEP) Em uma UBS, a equipe tem agido de forma a sobrecarregar os servi\u00e7os. Usu\u00e1rios com condi\u00e7\u00f5es cr\u00f4nicas s\u00e3o encaminhados diretamente para especialistas, sem avalia\u00e7\u00e3o cl\u00ednica completa. Isso causa superlota\u00e7\u00e3o em ambulat\u00f3rios, atrasos para consultas priorit\u00e1rias e duplicidade de exames, pois os resultados j\u00e1 existentes na APS n\u00e3o s\u00e3o considerados. Al\u00e9m disso, um paciente com transtorno de ansiedade foi orientado a buscar atendimento em outro munic\u00edpio, sem qualquer acolhimento ou acompanhamento inicial na APS.",assertions:null,text:"Considerando a Portaria nº 2.436/2017, o caso descrito reflete principalmente uma falha na aplicação de qual diretriz da Atenção Básica?",opts:["Participação da comunidade.","População adscrita.","Integralidade da atenção à saúde.","Ordenação da rede de serviços."],g:3,exp:"Correta: ordenação da rede de serviços.\nA situação descrita mostra que a APS deixou de exercer seu papel de coordenadora do cuidado, uma de suas principais diretrizes. A falha na ordenação da rede de serviços fica evidente quando a UBS, em vez de gerenciar o fluxo dos pacientes, os encaminha de forma desnecessária, causando superlotação e duplicidade de exames. Esse processo demonstra uma desorganização na rede de atenção à saúde.\n\nIncorretas:\nIntegralidade da atenção à saúde: apesar de o caso apresentar uma falha na integralidade (o paciente com ansiedade não recebeu um cuidado completo), o problema central e mais abrangente descrito no texto — a desorganização do fluxo de encaminhamentos e a duplicidade de exames — é um reflexo mais direto da falta de ordenação da rede. A integralidade é uma diretriz mais ampla do que a ordenação e, embora também tenha sido afetada, não é a principal falha apresentada na situação.\nPopulação adscrita: este é um conceito organizativo da PNAB que se refere à responsabilidade da equipe sobre um território e um grupo de pessoas específicos. Não há no texto informações que sugiram falha na definição do território ou na responsabilidade sobre a população local.\nParticipação da comunidade: esta diretriz trata do envolvimento dos usuários na gestão do serviço de saúde, por meio de conselhos e outros mecanismos. O texto-base não descreve nenhuma falha relacionada a essa diretriz.",deep:"🎯 ORDENAÇÃO DA REDE — DIRETRIZ DA PNAB (Portaria 2.436/2017)\n\nO caso descreve falhas:\n   ❌ Encaminhamentos desnecessários ao especialista\n   ❌ Superlotação de ambulatórios\n   ❌ Duplicidade de exames (resultados da APS ignorados)\n   ❌ Paciente com ansiedade mandado para OUTRO município\n\nA diretriz descumprida é a ORDENAÇÃO DA REDE:\n   → APS deveria COORDENAR o fluxo dos pacientes\n   → Gerenciar encaminhamentos de forma racional\n   → Evitar sobrecarregar outros níveis\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → Participação da comunidade: não é mencionada no caso\n   B → População adscrita: refere-se ao território, não ao fluxo\n   C → Integralidade: foi afetada, mas o problema CENTRAL é a desorganização do fluxo\n\n💡 MACETE:\n   Encaminhamentos DESNECESSÁRIOS + duplicidade de exames = falha na ORDENAÇÃO da rede\n   A APS deveria FILTRAR e RESOLVER antes de encaminhar"},
{n:7,disc:false,tema:"Financiamento — Portaria 3.493/2024",src:"UNIFIPMOC",context:"(UNIFIPMOC) Uma gest\u00e3o municipal est\u00e1 revisando o modelo de financiamento da APS ap\u00f3s a publica\u00e7\u00e3o da Portaria GM/MS n\u00ba 3.493/2024. O gestor municipal apresentou as seguintes afirma\u00e7\u00f5es:\n\nI. A capita\u00e7\u00e3o ponderada do Previne Brasil foi substitu\u00edda pelo componente de v\u00ednculo e acompanhamento territorial.\nII. O pagamento por desempenho do Previne Brasil foi reformulado como componente de qualidade (com classifica\u00e7\u00e3o por resultados/indicadores).\nIII. O componente fixo por equipe foi extinto; a partir da Portaria n\u00ba 3.493/2024, todo repasse passa a depender de desempenho.\nIV. O novo modelo incluiu um componente per capita de base populacional para a\u00e7\u00f5es no \u00e2mbito da APS.",assertions:null,text:"É correto o que se afirma apenas em:",opts:["I e II.","I, II e IV.","I e III.","II e III."],g:1,exp:"Correta: apenas I, II e IV.\nJustificativas:\nAfirmativa I (Verdadeira): A Portaria nº 3.493/2024, de fato, cria o componente de vínculo e acompanhamento territorial para as equipes de Saúde da Família (eSF) e de Atenção Primária (eAP), que assume o lugar da antiga capitação ponderada utilizada no Previne Brasil.\nAfirmativa II (Verdadeira): O antigo componente de pagamento por desempenho foi substituído por um novo componente de qualidade, que opera com base na classificação de resultados e faixas de valores, mantendo a lógica de incentivar boas práticas e aprimorar a qualidade dos serviços.\nAfirmativa III (Falsa): A Portaria nº 3.493/2024 não extinguiu o componente fixo. Pelo contrário, ela institui um componente fixo para a manutenção das equipes e ainda prevê recursos para a implantação. Portanto, parte do repasse federal não depende de desempenho. É importante notar que a recente Portaria GM/MS Nº 7.799, de 20 de agosto de 2025, mudou o nome desse componente fixo para componente de equidade, considerando a vulnerabilidade social.\nAfirmativa IV (Verdadeira): O novo modelo de financiamento, implementado pela portaria de 2024, acrescentou um componente per capita de base populacional para financiar ações específicas no âmbito da Atenção Primária à Saúde.",deep:"💰 NOVO MODELO DE FINANCIAMENTO — Portaria 3.493/2024\n\nComparação Previne Brasil → Portaria 3.493/2024:\n\n   ✅ I → Capitação ponderada → VÍNCULO E ACOMPANHAMENTO TERRITORIAL\n   → Mede a capacidade da equipe de acompanhar a população cadastrada\n\n   ✅ II → Pagamento por desempenho → COMPONENTE DE QUALIDADE\n   → Classificação por resultados/indicadores\n\n   ❌ III → Componente fixo NÃO foi extinto\n   → Foi MANTIDO para manutenção das equipes\n   → Nem todo repasse depende de desempenho\n\n   ✅ IV → Novo componente PER CAPITA de base populacional\n   → Acrescido para financiar ações específicas na APS\n\nResposta: I, II e IV (III é FALSA)\n\nOs 6 componentes do Art. 9º:\n   I → Fixo (manutenção) | II → Vínculo | III → Qualidade\n   IV → Programas e serviços | V → Saúde Bucal | VI → Per capita\n\n💡 MACETE:\n   O componente FIXO continua existindo → equipes precisam de custeio básico garantido\n   \"Todo repasse depende de desempenho\" = ERRADO"},
{n:8,disc:false,tema:"Financiamento — Componentes da APS",src:"AFYA Ipatinga",context:"(AFYA Ipatinga) Durante reuni\u00e3o de equipe em uma USF, os profissionais discutem estrat\u00e9gias para qualificar o acompanhamento das fam\u00edlias cadastradas. Destacaram-se tr\u00eas pontos:\nI. a import\u00e2ncia das visitas domiciliares para fortalecer o v\u00ednculo com gestantes e idosos;\nII. a necessidade de que o financiamento da Aten\u00e7\u00e3o Prim\u00e1ria esteja alinhado \u00e0s pr\u00e1ticas da equipe;\nIII. o impacto do cadastramento adequado da popula\u00e7\u00e3o nos recursos federais repassados ao munic\u00edpio, conforme o novo modelo de cofinanciamento da APS (Portaria GM/MS n\u00ba 3.493/2024).",assertions:null,text:"Com base nesse contexto e na Portaria GM/MS nº 3.493/2024, assinale a alternativa correta.",opts:["O componente de qualidade do financiamento é medido por meio da cobertura vacinal e do número de consultas médicas, desconsiderando outros indicadores do processo de trabalho da equipe.","O componente de vínculo e acompanhamento territorial valoriza a capacidade da equipe de manter o acompanhamento das pessoas cadastradas, fortalecendo a longitudinalidade e a responsabilização pelo cuidado.","O componente fixo é vinculado ao repasse per capita por habitante do território, porém, desvinculado da implantação e manutenção das equipes de Saúde da Família ou Equipe de Atenção Básica.","Os componentes para saúde bucal, consultório na rua, UBS fluvial e equipe multiprofissional (eMulti) foram extintos no novo modelo, sendo totalmente incorporados ao componente per capita de base populacional."],g:1,exp:"- O componente de vínculo e acompanhamento territorial valoriza a capacidade da equipe de manter o acompanhamento das pessoas cadastradas, fortalecendo a longitudinalidade e a responsabilização pelo cuidado.\nCorreta → O componente de vínculo e acompanhamento territorial mede a capacidade da equipe em acompanhar as pessoas de seu território, valorizando a continuidade do cuidado, a responsabilização pelo acompanhamento da população adscrita e a efetividade do trabalho da Equipe de Saúde da Família (eSF).\n\n- O componente de qualidade do financiamento é medido por meio da cobertura vacinal e do número de consultas médicas, desconsiderando outros indicadores do processo de trabalho da equipe.\nIncorreta → O componente de qualidade é composto por um conjunto de indicadores pactuados, que incluem não apenas a cobertura vacinal e o número de consultas, mas também aspectos do processo de trabalho, qualidade do acompanhamento clínico, promoção da saúde e desfechos assistenciais.\n\n- O componente fixo é vinculado ao repasse per capita por habitante do território, desvinculado da implantação e manutenção das equipes de Saúde da Família ou Equipe de Atenção Básica.\nIncorreta → O componente fixo não se limita ao critério per capita. Ele é definido conforme o Índice de Equidade e Dimensionamento (IED), que está vinculado à implantação, manutenção e custeio das equipes de saúde (eSF, eAP, eMulti), considerando fatores como vulnerabilidade social e porte populacional.\n\n- Os componentes para saúde bucal, consultório na rua, UBS fluvial e equipe multiprofissional (eMulti) foram extintos no novo modelo, sendo totalmente incorporados ao componente per capita de base populacional.\nIncorreta → Os componentes para saúde bucal, consultório na rua e demais ações estratégicas foram mantidos no novo modelo de financiamento, pois são considerados essenciais para a cobertura integral da Atenção Primária à Saúde.",deep:"💰 COMPONENTES DO FINANCIAMENTO — Portaria 3.493/2024\n\nA alternativa correta:\n   ✅ Vínculo e acompanhamento territorial\n   → Mede a capacidade de ACOMPANHAR pessoas cadastradas\n   → Fortalece longitudinalidade e responsabilização\n   → Valoriza o TRABALHO EFETIVO da equipe\n\n❌ POR QUE AS OUTRAS ERRAM:\n\n   A → Componente de qualidade\n   → NÃO se limita a cobertura vacinal e consultas médicas\n   → Inclui VÁRIOS indicadores do processo de trabalho\n\n   C → Componente fixo\n   → NÃO é vinculado ao repasse per capita\n   → É para implantação e MANUTENÇÃO das equipes (eSF, eAP, eMulti)\n   → Definido pelo Índice de Equidade e Dimensionamento (IED)\n\n   D → Componentes específicos (saúde bucal, consultório na rua, etc.)\n   → NÃO foram extintos\n   → Foram MANTIDOS no novo modelo\n\n💡 MACETE:\n   Vínculo territorial = equipe acompanhando SUA população\n   Qualidade = resultados/indicadores\n   Fixo = manutenção garantida das equipes"},
{n:9,disc:false,tema:"Condições Crônicas — Agudização",src:"UNISL Porto Velho",context:"(UNISL Porto Velho) Um homem de 62 anos, hipertenso h\u00e1 15 anos e em uso irregular de medica\u00e7\u00e3o, vai \u00e0 UPA, queixando-se de cefaleia intensa, tontura s\u00fabita e press\u00e3o arterial de 200/120 mmHg. O m\u00e9dico identifica que o quadro requer interven\u00e7\u00e3o imediata, embora a doen\u00e7a de base seja de longa evolu\u00e7\u00e3o e necessite acompanhamento cont\u00ednuo na Aten\u00e7\u00e3o Prim\u00e1ria.",assertions:null,text:"Considerando as características do caso e a distinção entre condições agudas e crônicas, a situação apresentada corresponde a:",opts:["uma doença crônica, pois a hipertensão acompanha o paciente há anos e requer seguimento contínuo em longo prazo.","uma doença subaguda, pois os sintomas surgiram em tempo intermediário entre o agudo e o crônico.","uma doença aguda, pois o aumento pressórico ocorreu de forma súbita e exige intervenção imediata.","um quadro agudo em doença crônica, pois a doença de longa duração apresentou descompensação súbita."],g:3,exp:"- Alternativa correta: \"Um quadro agudo em doença crônica, pois a doença de longa duração apresentou descompensação súbita.\"\nEssa é a alternativa correta porque o paciente tem hipertensão arterial sistêmica crônica, presente há 15 anos, mas apresenta um episódio agudo de descompensação (crise hipertensiva, com pressão de 200/120 mmHg, cefaleia intensa e tontura). O enunciado deixa claro que há uma condição de base de longa evolução associada a um evento súbito que exige intervenção imediata.\n\n- Alternativas incorretas:\n\"Uma doença aguda, pois o aumento pressórico ocorreu de forma súbita e exige intervenção imediata.\"\nIncorreta. Apesar da apresentação súbita e grave, não se trata de uma doença exclusivamente aguda, mas sim de uma agudização dentro de uma doença crônica já estabelecida.\n\n\"Uma doença crônica, pois a hipertensão acompanha o paciente há anos e requer seguimento contínuo em longo prazo.\"\nIncorreta. A hipertensão é, de fato, uma condição crônica, mas essa alternativa é incompleta. Ela ignora o evento agudo (crise hipertensiva) que levou o paciente à UPA, que é o ponto principal da questão.\n\n\"Uma doença subaguda, pois os sintomas surgiram em tempo intermediário entre o agudo e o crônico.\"\nIncorreta. O termo \"subagudo\" refere-se a quadros que se desenvolvem em período intermediário (dias a semanas), o que não se aplica aqui. O caso descrito é de evolução súbita, caracterizando um quadro agudo.",deep:"🔄 AGUDIZAÇÃO DE DOENÇA CRÔNICA — CASO DO HIPERTENSO NA UPA\n\nO caso:\n   → HAS crônica há 15 anos (doença de base)\n   → Crise hipertensiva: PA 200/120 + cefaleia + tontura (evento agudo)\n   → UPA: intervenção imediata necessária\n\nClassificação correta:\n   → QUADRO AGUDO EM DOENÇA CRÔNICA\n   → A doença é crônica, mas houve descompensação SÚBITA\n   → Exige resposta REATIVA (imediata) + depois retorno ao cuidado CONTÍNUO\n\n❌ POR QUE AS OUTRAS ERRAM:\n   A → É crônica, sim, mas a questão pede sobre o QUADRO ATUAL (agudização)\n   B → Não é \"apenas aguda\" — ignora os 15 anos de HAS\n   C → \"Subagudo\" = evolução em dias/semanas, não é o caso (foi SÚBITO)\n\nConceito de Mendes:\n   → Doenças crônicas podem ter AGUDIZAÇÕES\n   → O manejo da crise é reativo/episódico\n   → Mas o paciente precisa retornar ao acompanhamento contínuo na APS\n\n💡 MACETE:\n   Doença CRÔNICA que PIORA de repente = agudização (quadro agudo EM doença crônica)\n   Não é NEM só aguda NEM só crônica — é as DUAS coisas ao mesmo tempo"},
{n:10,disc:true,tema:"Tecnologias em Saúde — Merhy",src:"FMIT",context:"(FMIT) Durante uma reuni\u00e3o de equipe na USF, a enfermeira percebeu que v\u00e1rios hipertensos da \u00e1rea adscrita apresentavam dificuldade de ades\u00e3o ao tratamento medicamentoso. Decidiu, ent\u00e3o, realizar uma roda de conversa, na qual buscou estabelecer v\u00ednculo com os pacientes, acolhendo suas queixas, dialogando sobre suas dificuldades e compreendendo aspectos de sua rotina e valores.",assertions:null,text:"a) Identifique qual tipo de tecnologia do cuidado foi empregada pela enfermeira no caso apresentado. Justifique sua resposta. (0,75 ponto)\n\nb) Proponha outra ação/medida que seja do mesmo nível tecnológico utilizado no caso, explicando de que forma pode contribuir para a melhoria do cuidado em saúde. (0,75 ponto)",opts:[],g:null,exp:"a) Resposta Correta: Tecnologia leve.\nJustificativa: envolve o uso de escuta qualificada, acolhimento, vínculo, diálogo e valorização da subjetividade do paciente. Trata-se de uma tecnologia centrada nas relações interpessoais e na comunicação entre profissional e usuário.\n\nb) Proposição de outra ação do mesmo nível tecnológico.\nExemplos de ações possíveis (espera-se que o aluno cite uma):\nRealizar visita domiciliar para fortalecer o vínculo e compreender a realidade de vida do paciente.\nPromover roda de conversa em grupo de hipertensos para troca de experiências e apoio mútuo.\nPromover o acolhimento na unidade, garantindo escuta ativa às demandas do usuário.\nIncentivar práticas de autocuidado (como caminhadas em grupo ou oficinas de alimentação saudável) em que a ênfase esteja no diálogo e na motivação.\nRealizar escuta qualificada em momentos informais (sala de espera), valorizando narrativas do paciente e identificando dificuldades do cotidiano.\nConstruir com o paciente um \"contrato de cuidado\" (metas compartilhadas), reforçando corresponsabilização e vínculo.\nArticular familiares no acompanhamento do usuário, estimulando o apoio social como parte do cuidado.",deep:"🤝 TECNOLOGIA LEVE — CASO DA RODA DE CONVERSA\n\na) Tipo de tecnologia empregada:\n\n   → Tecnologia LEVE (relacional)\n   → Escuta qualificada, acolhimento, vínculo, diálogo\n   → Valorização da subjetividade do paciente\n   → Centrada nas RELAÇÕES interpessoais\n\nElementos do caso que confirmam:\n   → Roda de conversa para fortalecer vínculo\n   → Acolher queixas dos hipertensos\n   → Dialogar sobre dificuldades e rotina\n   → Compreender valores e contexto de vida\n\nb) Outras ações do MESMO nível (tecnologia leve):\n\n   🏠 Visita domiciliar pelo ACS → vínculo e conhecimento da realidade\n   🤝 Grupo de apoio entre hipertensos → troca de experiências\n   👂 Escuta ativa na sala de espera → identificar barreiras\n   📝 \"Contrato de cuidado\" → metas compartilhadas com o paciente\n   👨‍👩‍👧 Articular familiares → apoio social no cuidado\n\n💡 MACETE:\n   Tecnologia LEVE = tudo que envolve RELAÇÃO HUMANA\n   Se não precisa de equipamento NEM de protocolo = é LEVE\n   Escuta, vínculo, acolhimento, diálogo = sempre LEVE"}
];

const L=['a','b','c','d'];let cur=0,sel=null,answered={},eliminated={};
function buildPills(){const w=document.getElementById('qPills');w.innerHTML='';for(let i=0;i<QS.length;i++){const b=document.createElement('button');b.className='qp';b.id='qp'+i;b.textContent=i+1;b.onclick=(function(idx){return function(){goTo(idx);};})(i);w.appendChild(b);}}
function syncPills(){for(let i=0;i<QS.length;i++){const p=document.getElementById('qp'+i);if(!p)continue;p.className='qp';if(i===cur)p.classList.add('current');if(answered[i]!==undefined){if(QS[i].disc)p.classList.add('disc');else p.classList.add(answered[i]===QS[i].g?'correct':'wrong');}}}
function renderQ(){const q=QS[cur];sel=(answered[cur]!==undefined)?answered[cur]:null;const done=answered[cur]!==undefined;document.getElementById('qTagNum').textContent='Questão '+q.n;document.getElementById('qTagTema').textContent=q.tema;document.getElementById('qCounterNum').textContent=q.n;const discSep=document.getElementById('qTagDiscSep');const discTag=document.getElementById('qTagDisc');if(q.disc){discSep.style.display='';discTag.style.display='';}else{discSep.style.display='none';discTag.style.display='none';}const ctx=document.getElementById('qContext');if(q.context){ctx.style.display='block';ctx.textContent=q.context;}else{ctx.style.display='none';}const asr=document.getElementById('qAssertions');if(q.assertions){asr.style.display='block';asr.textContent=q.assertions;}else{asr.style.display='none';}document.getElementById('qText').innerHTML=q.text.replace(/\n/g,'<br>');const wrap=document.getElementById('qOpts');wrap.innerHTML='';if(q.disc){const ta=document.createElement('textarea');ta.className='disc-answer';ta.placeholder='Escreva sua resposta aqui...';if(done){ta.disabled=true;ta.value=answered[cur]||'';}wrap.appendChild(ta);}else{q.opts.forEach(function(o,i){const btn=document.createElement('button');btn.className='q-opt';if(done){btn.setAttribute('disabled','');if(i===q.g)btn.classList.add('correct');else if(i===sel&&i!==q.g)btn.classList.add('wrong');}else if(sel===i){btn.classList.add('selected');}const isElim=!done&&eliminated[cur]&&eliminated[cur].has(i);if(isElim)btn.classList.add('eliminated');btn.innerHTML='<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span><button class="opt-elim-btn" title="Eliminar alternativa"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';if(!done){(function(idx){btn.onclick=function(e){if(e.target.closest('.opt-elim-btn'))return;selectOpt(idx);};btn.querySelector('.opt-elim-btn').onclick=function(e){e.stopPropagation();if(!eliminated[cur])eliminated[cur]=new Set();if(eliminated[cur].has(idx)){eliminated[cur].delete(idx);btn.classList.remove('eliminated');}else{eliminated[cur].add(idx);btn.classList.add('eliminated');if(sel===idx){sel=null;document.getElementById('btnRespond').disabled=true;}}};})(i);}else{btn.querySelector('.opt-elim-btn').style.display='none';}wrap.appendChild(btn);});}const fb=document.getElementById('qFeedback');const aiBox=document.getElementById('aiBox');if(done){const isDisc=q.disc;const ok=!isDisc&&sel===q.g;const fbClass=isDisc?'fb-disc':(ok?'fb-ok':'fb-err');const fbLabel=isDisc?'✍ Gabarito comentado':(ok?'✓ Correto!':'✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());fb.className='q-feedback show '+fbClass;fb.innerHTML='<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp.replace(/\n/g,'<br>')+'</span><button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';aiBox.classList.remove('open');document.getElementById('aiContent').textContent='';}else{fb.className='q-feedback';fb.innerHTML='';aiBox.style.display='none';aiBox.classList.remove('open');}document.getElementById('btnPrev').disabled=(cur===0);const btnN=document.getElementById('btnNext');if(cur===QS.length-1){btnN.innerHTML='Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}else{btnN.innerHTML='Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}const btnR=document.getElementById('btnRespond');if(done){btnR.style.display='none';}else{btnR.style.display='flex';btnR.disabled=(!q.disc&&sel===null);}syncPills();}
function toggleAI(qIdx){const aiBox=document.getElementById('aiBox');const btnAI=document.getElementById('btnAI');if(aiBox.classList.contains('open')){aiBox.classList.remove('open');if(btnAI)btnAI.classList.remove('active');}else{document.getElementById('aiContent').textContent=QS[qIdx].deep;aiBox.style.display='block';aiBox.classList.add('open');if(btnAI)btnAI.classList.add('active');}}
function selectOpt(i){if(answered[cur]!==undefined)return;sel=i;document.getElementById('btnRespond').disabled=false;document.querySelectorAll('.q-opt').forEach(function(o,idx){if(!o.classList.contains('eliminated')){o.className='q-opt'+(idx===i?' selected':'');}(function(ii){o.onclick=function(e){if(!e.target.closest('.opt-elim-btn'))selectOpt(ii);};})(idx);});}
function submitAnswer(){if(answered[cur]!==undefined)return;const q=QS[cur];if(q.disc){const ta=document.querySelector('.disc-answer');answered[cur]=ta?ta.value:'';}else{if(sel===null)return;answered[cur]=sel;}renderQ();if(Object.keys(answered).length===QS.length){setTimeout(showResult,350);}}
function prevQ(){if(cur>0){cur--;renderQ();window.scrollTo({top:0,behavior:'smooth'});}}
function nextQ(){if(cur===QS.length-1){showResult();return;}cur++;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function showResult(){document.getElementById('qCard').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const mcQs=QS.filter(function(q){return!q.disc;});const discQs=QS.filter(function(q){return q.disc;});const answeredMC=mcQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;});const correct=answeredMC.filter(function(q){return answered[QS.indexOf(q)]===q.g;}).length;const total=answeredMC.length;const pct=total>0?Math.round((correct/mcQs.length)*100):0;const ring=document.getElementById('resRing');ring.textContent=pct+'%';ring.className='res-ring '+(pct>=70?'great':pct>=50?'ok':'bad');document.getElementById('resTitle').textContent=pct>=70?'Parabéns!':pct>=50?'Quase lá!':'Continue praticando!';document.getElementById('resSub').textContent='Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';document.getElementById('resOk').textContent=correct;document.getElementById('resErr').textContent=total-correct;document.getElementById('resDisc').textContent=discQs.filter(function(q){return answered[QS.indexOf(q)]!==undefined;}).length;document.getElementById('resSkip').textContent=QS.length-Object.keys(answered).length;buildReport(correct,total);rs.scrollIntoView({behavior:'smooth',block:'start'});}
function buildReport(correct,total){const temaStats={};QS.forEach(function(q,i){if(!temaStats[q.tema])temaStats[q.tema]={total:0,correct:0,wrong:0,disc:0};const t=temaStats[q.tema];t.total++;if(q.disc){t.disc++;}else if(answered[i]===undefined){}else if(answered[i]===q.g){t.correct++;}else{t.wrong++;}});const sorted=Object.keys(temaStats).sort(function(a,b){return temaStats[b].wrong-temaStats[a].wrong;});let barsHtml='';sorted.forEach(function(tema){const s=temaStats[tema];const mc=s.total-s.disc;if(mc===0){barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>';return;}const pct=Math.round((s.correct/mc)*100);const isGood=pct>=50;barsHtml+='<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';});const worstTema=sorted.find(function(t){return temaStats[t].wrong>0;})||'—';const bestTema=sorted.slice().reverse().find(function(t){const s=temaStats[t];return(s.total-s.disc)>0&&s.correct>0;})||'—';const pct=total>0?Math.round((correct/total)*100):0;const streakMsg=pct>=70?'Ótimo domínio geral!':pct>=50?'Foque nos pontos fracos.':'Revise os conteúdos antes da prova.';let wrongHtml='';QS.forEach(function(q,i){if(!q.disc&&answered[i]!==undefined&&answered[i]!==q.g){wrongHtml+='<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';}});if(!wrongHtml)wrongHtml='<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';document.getElementById('reportContent').innerHTML='<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div><div class="report-section"><h4>Insights</h4><div class="insight-grid"><div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div><div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div><div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div><div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length-Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div></div></div><div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';}
function goToQ(i){document.getElementById('qCard').style.display='block';document.getElementById('resultScreen').classList.remove('show');cur=i;renderQ();window.scrollTo({top:0,behavior:'smooth'});}
function resetAll(){answered={};sel=null;cur=0;eliminated={};document.getElementById('resultScreen').classList.remove('show');document.getElementById('qCard').style.display='block';renderQ();window.scrollTo({top:0,behavior:'smooth'});}
buildPills();renderQ();
/* ========== MARCA-TEXTO (PONTO 3) ========== */
var hlOn=false;
function toggleHL(){hlOn=!hlOn;document.querySelectorAll('.hl-toggle').forEach(function(b){b.classList.toggle('active',hlOn);});document.body.classList.toggle('hl-active',hlOn);}
document.addEventListener('mouseup',hlHandle);document.addEventListener('touchend',hlHandle);
function hlHandle(e){if(!hlOn)return;var s=window.getSelection();if(!s||s.isCollapsed||!s.rangeCount)return;var r=s.getRangeAt(0);var p=r.commonAncestorContainer;if(p.nodeType===3)p=p.parentNode;var qb=p.closest?p.closest('.q-body'):null;if(!qb){var sc=r.startContainer;if(sc.nodeType===3)sc=sc.parentNode;qb=sc.closest?sc.closest('.q-body'):null;}if(!qb)return;if(e.target&&e.target.closest&&e.target.closest('mark.hl'))return;var t=s.toString().trim();if(!t||t.length<2)return;try{var m=document.createElement('mark');m.className='hl';m.title='Clique para remover';r.surroundContents(m);}catch(ex){try{var f=r.extractContents();var m2=document.createElement('mark');m2.className='hl';m2.title='Clique para remover';m2.appendChild(f);r.insertNode(m2);}catch(ex2){}}s.removeAllRanges();}
document.addEventListener('click',function(e){if(!hlOn)return;var m=e.target.closest?e.target.closest('mark.hl'):null;if(!m)return;var p=m.parentNode;while(m.firstChild)p.insertBefore(m.firstChild,m);p.removeChild(m);p.normalize();});
/* ========== FIM MARCA-TEXTO JS ========== */
</script>
<script>
const PROVA_ID = 'iesc2-2025-2';
const PERIODO = 2;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

// ── localStorage ──
function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Supabase ──
const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

// ── Interceptar uma vez só ──
const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

// ── Restaurar estado ──
if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
</script>
