<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOI II - N1 2025.1 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0710;--surface:#120e1c;--card:#17122a;--card-hover:#1e1835;
  --primary:#c8006a;--primary-light:rgba(200,0,106,0.18);--primary-glow:rgba(200,0,106,0.30);
  --green:#1a9068;--green-light:rgba(26,144,104,0.18);
  --red:#c73348;--red-light:rgba(199,51,72,0.18);
  --purple:#7c3aed;--purple-light:rgba(124,58,237,0.18);
  --text:#e8e0f5;--text-2:#a899c0;--text-3:#6b5f85;
  --border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.10);--r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;line-height:1.6;font-size:14px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 20px;gap:10px;background:rgba(10,7,16,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo-mark{width:30px;height:30px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:#fff;flex-shrink:0;}
.nav-brand{font-size:0.82rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.nav-back{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:500;color:var(--text-2);background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:all .2s;}
.nav-back:hover{color:var(--text);border-color:var(--border-2);}
.nav-back svg{width:12px;height:12px;}

/* STICKY */
.sticky{position:sticky;top:52px;z-index:100;background:rgba(10,7,16,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.sticky-inner{max-width:780px;margin:0 auto;padding:10px 20px;}
.sticky-top{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;}
.sticky-title{font-size:0.78rem;font-weight:600;color:var(--text-2);letter-spacing:0.3px;text-align:center;}
.btn-reset{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:0.72rem;font-weight:500;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;transition:color .2s;white-space:nowrap;}
.btn-reset:hover{color:var(--primary);}
.btn-reset svg{width:13px;height:13px;}
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;}
.pill{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:rgba(255,255,255,0.04);color:var(--text-3);}
.pill:hover{color:var(--text-2);border-color:var(--border-2);}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 14px var(--primary-glow);}
.pill.ok{background:var(--green);color:#fff;border-color:var(--green);}
.pill.err{background:var(--red);color:#fff;border-color:var(--red);}
.pill.disc{background:var(--purple);color:#fff;border-color:var(--purple);}

/* MAIN */
.main{max-width:780px;margin:0 auto;padding:24px 20px 120px;}

/* Q WRAP */
.q-wrap{animation:fadeSlide .3s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.q-tag{font-size:0.68rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--primary);background:var(--primary-light);padding:3px 9px;border-radius:5px;}
.q-tag-disc{font-size:0.68rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--purple);background:var(--purple-light);padding:3px 9px;border-radius:5px;}
.q-theme{font-size:0.72rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;}
.q-source{font-size:0.68rem;color:var(--text-3);margin-left:auto;font-style:italic;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px 26px;}
.q-context{font-size:0.84rem;color:var(--text-2);line-height:1.7;margin-bottom:14px;padding:12px 14px;background:rgba(255,255,255,0.025);border-radius:8px;border-left:2px solid var(--primary);}
.q-assertions{margin-bottom:14px;padding:12px 14px;background:rgba(255,255,255,0.02);border-radius:8px;}
.q-assertions p{font-size:0.84rem;line-height:1.7;color:var(--text-2);margin-bottom:6px;}
.q-assertions p:last-child{margin-bottom:0;}
.porque{font-size:0.7rem!important;font-weight:700;letter-spacing:1.5px;color:var(--primary)!important;margin:4px 0;}
.q-image{display:block;width:100%;max-width:440px;margin:0 auto 18px;border-radius:10px;border:1px solid var(--border-2);}
.q-text{font-size:0.92rem;line-height:1.65;color:var(--text);margin-bottom:20px;font-weight:500;}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 45px 11px 14px;border-radius:9px;border:1.5px solid var(--border);background:rgba(255,255,255,0.018);cursor:pointer;transition:all .15s;position:relative;}
.opt:hover:not(.done):not(.eliminated){border-color:rgba(200,0,106,0.4);background:var(--primary-light);}
.opt.sel{border-color:var(--primary);background:var(--primary-light);}
.opt.hit{border-color:var(--green);background:var(--green-light);}
.opt.miss{border-color:var(--red);background:var(--red-light);}
.opt.done{cursor:default;}
.opt-ltr{width:24px;height:24px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;background:rgba(255,255,255,0.05);color:var(--text-3);transition:all .15s;margin-top:1px;}
.opt.sel .opt-ltr{background:var(--primary);color:#fff;}
.opt.hit .opt-ltr{background:var(--green);color:#fff;}
.opt.miss .opt-ltr{background:var(--red);color:#fff;}
.opt-txt{font-size:0.845rem;line-height:1.5;color:var(--text);flex:1;}
.opt-icon{margin-left:auto;font-size:0.9rem;flex-shrink:0;padding-top:2px;}

/* BOTÃO E ESTADO DE ELIMINAÇÃO (X) */
.btn-eliminate{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:14px;font-weight:900;transition:all .2s;cursor:pointer;z-index:10;background:transparent;border:1.5px solid transparent;font-family:sans-serif;}
.btn-eliminate:hover{color:var(--red);background:var(--red-light);border-color:rgba(199,51,72,0.3);}
.opt.eliminated .opt-txt{text-decoration:line-through;text-decoration-color:var(--red);opacity:0.4;}
.opt.eliminated .opt-ltr{opacity:0.4;}
.opt.eliminated .btn-eliminate{color:var(--red);border-color:var(--red);}
.opt.eliminated{border-color:rgba(255,255,255,0.03);background:rgba(255,255,255,0.01);}
.opt.done .btn-eliminate{display:none;}

/* TEXTAREA */
textarea.disc{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.025);border:1.5px solid var(--border-2);border-radius:9px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.845rem;line-height:1.6;padding:12px 14px;outline:none;transition:border-color .2s;}
textarea.disc:focus{border-color:var(--purple);}
textarea.disc:disabled{opacity:0.7;cursor:default;}

/* FEEDBACK */
.feedback{margin-top:16px;border-radius:10px;padding:14px 16px;animation:fadeSlide .25s ease;}
.fb-ok{background:var(--green-light);border:1px solid rgba(26,144,104,.28);}
.fb-err{background:var(--red-light);border:1px solid rgba(199,51,72,.28);}
.fb-disc{background:var(--purple-light);border:1px solid rgba(124,58,237,.28);}
.fb-label{font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.fb-ok .fb-label{color:var(--green);}
.fb-err .fb-label{color:var(--red);}
.fb-disc .fb-label{color:var(--purple);}
.fb-text{font-size:0.835rem;line-height:1.65;color:var(--text-2);}
.deep-divider{height:1px;background:var(--border);margin:12px 0;}
.btn-deep{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;background:rgba(200,0,106,0.08);border:1px solid rgba(200,0,106,0.3);color:var(--primary);font-size:0.76rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-deep:hover{background:var(--primary);color:#fff;}
.deep-content{display:none;margin-top:10px;padding:14px 16px;border-radius:9px;background:rgba(200,0,106,0.05);border:1px solid var(--border);font-size:0.825rem;line-height:1.72;color:var(--text-2);}
.deep-content.open{display:block;animation:fadeSlide .2s ease;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(10,7,16,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);}
.bottom-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:10px;}
.bottom-counter{font-size:0.76rem;color:var(--text-3);text-align:center;white-space:nowrap;}
.bottom-counter strong{color:var(--text-2);}
.btn-nav{display:flex;align-items:center;gap:5px;padding:9px 18px;border-radius:9px;border:1.5px solid var(--border-2);background:transparent;color:var(--text-2);font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.btn-nav:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
.btn-nav:disabled{opacity:0.25;cursor:default;}
.btn-answer{padding:9px 28px;border-radius:9px;background:var(--primary);border:none;color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 18px var(--primary-glow);white-space:nowrap;}
.btn-answer:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);}
.btn-answer:disabled{background:rgba(255,255,255,0.06);color:var(--text-3);cursor:default;box-shadow:none;transform:none;filter:none;}

/* RESULTS */
.results{display:none;}
.results.on{display:block;animation:fadeSlide .4s ease;}
.res-hero{text-align:center;padding:32px 20px 24px;}
.res-circle{width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;border:3px solid var(--primary);background:var(--primary-light);}
.res-pct{font-size:1.4rem;font-weight:700;color:var(--primary);line-height:1;}
.res-pct-lbl{font-size:0.6rem;color:var(--text-3);}
.res-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.res-sub{font-size:0.82rem;color:var(--text-2);}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.res-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.res-stat-n{font-size:1.6rem;font-weight:700;line-height:1;}
.res-stat-n.ok{color:var(--green);}
.res-stat-n.err{color:var(--red);}
.res-stat-n.dc{color:var(--purple);}
.res-stat-lbl{font-size:0.65rem;color:var(--text-3);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}
.res-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.res-section-head{padding:14px 18px 0;font-size:0.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);}
.res-section-body{padding:10px 18px 16px;}
.theme-row{margin-bottom:10px;}
.theme-row:last-child{margin-bottom:0;}
.theme-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.theme-name{font-size:0.78rem;color:var(--text-2);}
.theme-pct{font-size:0.72rem;color:var(--text-3);}
.theme-bar-bg{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.theme-bar{height:100%;border-radius:3px;background:var(--purple);transition:width 1s cubic-bezier(.25,.8,.25,1);}
.insights-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.insight-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
.insight-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;}
.insight-val{font-size:0.82rem;font-weight:600;color:var(--text);}
.insight-sub{font-size:0.72rem;color:var(--text-3);margin-top:2px;}
.review-empty{font-size:0.82rem;color:var(--text-3);padding:4px 0;}
.review-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s;}
.review-item:last-child{border-bottom:none;}
.review-item:hover{opacity:.75;}
.review-num{width:26px;height:26px;border-radius:6px;flex-shrink:0;background:var(--red-light);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;}
.review-text{font-size:0.8rem;color:var(--text-2);line-height:1.35;}
.review-text strong{color:var(--text);display:block;font-size:0.78rem;}
.btn-retry{width:100%;padding:13px;border-radius:10px;background:var(--primary);border:none;color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 20px var(--primary-glow);margin-top:16px;}
.btn-retry:hover{filter:brightness(1.1);transform:translateY(-1px);}
@media(max-width:600px){.main{padding:16px 14px 110px;}.q-card{padding:18px 16px;}.sticky-inner,.bottom-inner{padding-left:14px;padding-right:14px;}.btn-nav{padding:9px 12px;}.btn-answer{padding:9px 20px;}.insights-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo-mark">A</div>
  <span class="nav-brand">Afyados</span>
  <button class="nav-back" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar
  </button>
</nav>

<div class="sticky">
  <div class="sticky-inner">
    <div class="sticky-top">
      <span class="sticky-title">N1 SOI II &middot; 2025.1 &mdash; PROVA E GABARITO</span>
      <button class="btn-reset" onclick="resetQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Resetar lista
      </button>
    </div>
    <div class="pills" id="pills"></div>
  </div>
</div>

<div class="main">
  <div id="quizWrap"></div>
  <div class="results" id="results"></div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div class="bottom-inner">
    <button class="btn-nav" id="btnPrev" onclick="prev()">&#8592; Anterior</button>
    <span class="bottom-counter">Questão <strong id="ctrQ">1</strong> de <strong>15</strong></span>
    <div id="btnZone" style="display:flex;gap:8px;align-items:center;"></div>
  </div>
</div>

<script>
const Q = [
  {
    num: 1, type: 'mc', source: 'UNISL Porto Velho',
    theme: 'Anatomia do Joelho',
    context: 'A articulação do joelho é classificada como sinovial do tipo dobradiça modificada e apresenta estruturas osteomioarticulares que garantem sua estabilidade e funcionalidade. Os ligamentos, os músculos e as superfícies articulares desempenham papéis fundamentais no controle do movimento e na proteção contra forças externas.',
    assertions: [
      'I. O joelho é formado pelos ossos fêmur, tíbia e patela, sendo estabilizado por estruturas ligamentares, como os ligamentos cruzados e colaterais, que controlam os movimentos excessivos e protegem contra os deslocamentos anormais.',
      'II. A patela é um osso sesamoide que melhora a eficiência do músculo quadríceps femoral, aumentando o braço de alavanca do tendão patelar durante a extensão do joelho.',
      'III. O ligamento cruzado posterior (LCP) impede a translação posterior da tíbia em relação ao fêmur e é mais resistente que o ligamento cruzado anterior (LCA), desempenhando um papel fundamental na estabilização da articulação.',
      'IV. Os meniscos são estruturas que atuam na dissipação de forças compressivas, distribuição de carga e produção da lubrificação da articulação do joelho, o que leva à redução significativa do atrito entre as diversas superfícies articulares.'
    ],
    text: 'Acerca das características estruturais e funcionais do joelho, avalie as asserções acima. É correto o que se afirma em:',
    opts: ['II e IV, apenas.', 'I e III, apenas.', 'I, II, III e IV, apenas.', 'I, II e III, apenas.'],
    g: 3,
    exp: 'Apenas I, II e III são corretas. A asserção IV é incorreta porque os meniscos têm função mecânica (amortecimento e distribuição de carga), mas a lubrificação é produzida pela membrana sinovial — não pelos meniscos.',
    deep: 'O ponto central desta questão é a distinção entre as funções dos meniscos e da membrana sinovial. Os meniscos são fibrocartilagens com função exclusivamente mecânica: aumentam a congruência articular, distribuem a carga compressiva e absorvem impactos. Já o líquido sinovial, responsável pela lubrificação, é um ultrafiltrado plasmático produzido pelas células sinoviócitos da membrana sinovial. As asserções I (composição óssea e papel dos ligamentos), II (patela como polia biológica que aumenta o braço de alavanca do quadríceps) e III (LCP é de fato mais resistente que o LCA e impede o deslocamento posterior da tíbia) são todas corretas. A banca explora um detalhe histofisiológico: atribuir função glandular/secretora a uma estrutura que possui apenas função mecânica — clássica pegadinha de prova.'
  },
  {
    num: 2, type: 'mc', source: 'ITPAC Porto Nacional',
    theme: 'Nervos Cranianos',
    context: 'Um paciente de 60 anos apresenta-se na clínica com queixa de perda progressiva do olfato (anosmia) e dificuldade em perceber sabores. Além disso, o paciente relata zumbido constante e perda de equilíbrio ao caminhar. Durante o exame neurológico, foram constatadas alterações nos movimentos oculares e na visão periférica.',
    assertions: [
      'I. Os sintomas de anosmia, zumbido e dificuldade de equilíbrio no paciente indicam um comprometimento dos nervos olfatório (I) e vestibulococlear (VIII).',
      'PORQUE',
      'II. O nervo olfatório (I) é responsável pela percepção dos odores, enquanto o nervo vestibulococlear (VIII) é responsável pelas funções auditivas e pelo equilíbrio.'
    ],
    text: 'Considerando esse contexto, avalie as asserções acima e a relação proposta entre elas. Assinale a opção correta:',
    opts: [
      'Ambas as asserções estão corretas, mas a asserção II não justifica a asserção I.',
      'Ambas as asserções estão corretas, e a asserção II justifica a asserção I.',
      'A asserção I está correta, mas a asserção II está incorreta.',
      'A asserção I está incorreta, mas a asserção II está correta.'
    ],
    g: 1,
    exp: 'Ambas corretas e II justifica I. Os sintomas (anosmia e vertigem/zumbido) são manifestações clínicas diretas da disfunção dos nervos cranianos I e VIII, respectivamente. A asserção II descreve corretamente as funções desses nervos, fornecendo a base biológica para os sintomas.',
    deep: 'Esta questão integra semiologia neurológica com anatomia dos nervos cranianos. O nervo olfatório (NC I) é formado por axônios de neurônios bipolares do epitélio olfatório que atravessam a lâmina crivosa do etmoide; sua lesão causa anosmia e consequente hipogeusia (paladar diminuído). O nervo vestibulococlear (NC VIII) possui dois ramos: o ramo coclear (audição — lesão causa zumbido/surdez) e o ramo vestibular (equilíbrio — lesão causa vertigem e ataxia). Na questão do tipo "asserção-razão", a chave é verificar: (1) ambas são verdadeiras? Sim. (2) II é a justificativa biológica de I? Sim — os sintomas ocorrem exatamente porque essas são as funções dos nervos afetados. Portanto, resposta B. Em pacientes idosos com múltiplas disfunções de nervos cranianos, deve-se investigar lesões de base de crânio ou processos neurodegenerativos.'
  },
  {
    num: 3, type: 'mc', source: 'AFYA Abaetetuba',
    theme: 'Bioquímica Neural',
    context: 'A cotransmissão é a capacidade de um neurônio pré-sináptico liberar diferentes neurotransmissores, sendo que a importância funcional dos neurônios transmissores duplos (ou múltiplos) se estende além das ações nos receptores pós-sinápticos.',
    text: 'Neste contexto, assinale a única alternativa correta:',
