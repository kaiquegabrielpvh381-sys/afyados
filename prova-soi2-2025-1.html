<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 SOI II 2025.1 | Afyados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0C0810;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;min-height:100vh;}
:root{--pink:#D6006E;--pink-bright:#FF1A7E;--pink-light:#FF6EB4;--pink-glow:rgba(214,0,110,0.22);--card:#1A1226;--border:rgba(255,255,255,0.07);--muted:#9080A8;--light:#D8CEEA;--green:#1D9E75;--green-l:rgba(29,158,117,0.12);--green-b:rgba(29,158,117,0.3);}
nav{position:fixed;top:0;width:100%;z-index:500;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(12,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--pink),#9B00E8);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(214,0,110,0.25);overflow:hidden;}
.logo-name{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;letter-spacing:0.06em;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;border:1px solid var(--border);transition:all .2s;}
.back-btn:hover{border-color:var(--pink);color:var(--pink-light);}
.sticky-bar{position:fixed;top:56px;left:0;right:0;z-index:400;background:rgba(12,8,16,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 32px;}
.sticky-inner{max-width:820px;margin:0 auto;}
.sticky-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sticky-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.btn-reset{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:4px 8px;border-radius:6px;transition:color .15s;}
.btn-reset:hover{color:var(--pink-light);}
.q-pills{display:flex;gap:5px;flex-wrap:wrap;}
.qp{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;}
.qp:hover{border-color:var(--green-b);color:#5DCAA5;}
.qp.current{background:var(--pink);border-color:var(--pink);color:#fff;}
.qp.correct{background:rgba(29,158,117,0.15);border-color:rgba(29,158,117,0.5);color:#5DCAA5;}
.qp.wrong{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.4);color:#F09595;}
.qp.disc{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.5);color:#C4B5FD;}
.main{max-width:820px;margin:0 auto;padding:160px 32px 80px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.q-card-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.q-header-left{display:flex;align-items:center;gap:8px;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);}
.q-tag-disc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C4B5FD;background:rgba(124,58,237,0.15);padding:2px 8px;border-radius:4px;}
.q-tag-sep{color:rgba(255,255,255,0.12);}
.q-tag-tema{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.q-body{padding:28px;}
.q-context{font-size:16px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;font-weight:500;white-space:pre-line;}
.q-assertions{font-size:15px;color:#F4EFFA;line-height:1.8;margin-bottom:20px;white-space:pre-line;}
.q-text{font-size:16px;line-height:1.8;color:#F4EFFA;margin-bottom:24px;font-weight:500;white-space:pre-line;}
.q-opts{display:flex;flex-direction:column;gap:9px;}
.q-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 18px;text-align:left;font-size:15px;cursor:pointer;transition:all .2s;color:var(--light);display:flex;align-items:flex-start;gap:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%;line-height:1.6;}
.q-opt:hover:not([disabled]){background:rgba(214,0,110,0.06);border-color:rgba(214,0,110,0.3);color:#F4EFFA;}
.q-opt.selected{background:rgba(214,0,110,0.08);border-color:rgba(214,0,110,0.45);color:#F4EFFA;}
.q-opt.correct{background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.5);color:#C5EDD9;}
.q-opt.wrong{background:rgba(226,75,74,0.07);border-color:rgba(226,75,74,0.45);color:#F4B8B8;}
.q-opt[disabled]{cursor:default;}
.q-opt.eliminated{opacity:0.45;background:rgba(255,255,255,0.02)!important;border-color:rgba(255,255,255,0.05)!important;}
.q-opt.eliminated .opt-text{text-decoration:line-through;color:var(--muted);}
.opt-badge{min-width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--muted);transition:all .2s;}
.q-opt.selected .opt-badge{background:var(--pink);border-color:var(--pink);color:#fff;}
.q-opt.correct .opt-badge{background:rgba(29,158,117,0.25);border-color:rgba(29,158,117,0.6);color:#5DCAA5;}
.q-opt.wrong .opt-badge{background:rgba(226,75,74,0.2);border-color:rgba(226,75,74,0.5);color:#F09595;}
.opt-elim-btn{margin-left:auto;flex-shrink:0;width:26px;height:26px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;padding:0;line-height:1;}
.opt-elim-btn:hover{border-color:rgba(226,75,74,0.6);color:#F09595;background:rgba(226,75,74,0.1);}
.q-opt.eliminated .opt-elim-btn{border-color:rgba(226,75,74,0.6);background:rgba(226,75,74,0.15);color:#F09595;}
.opt-elim-btn svg{pointer-events:none;}
textarea.disc-answer{width:100%;min-height:120px;resize:vertical;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#F4EFFA;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.7;padding:14px 16px;outline:none;transition:border-color .2s;}
textarea.disc-answer:focus{border-color:rgba(124,58,237,0.5);}
textarea.disc-answer:disabled{opacity:0.7;cursor:default;}
.q-feedback{margin:0 28px;padding:16px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid;display:none;}
.q-feedback.show{display:block;animation:fadeUp .25s ease;}
.fb-ok{background:rgba(29,158,117,0.07);border-color:rgba(29,158,117,0.3);color:#C5EDD9;}
.fb-err{background:rgba(226,75,74,0.06);border-color:rgba(226,75,74,0.3);color:#F4B8B8;}
.fb-disc{background:rgba(124,58,237,0.07);border-color:rgba(124,58,237,0.3);color:#E8D8FF;}
.fb-label{font-weight:700;display:block;margin-bottom:6px;font-size:14px;}
.fb-short{display:block;margin-bottom:14px;line-height:1.8;}
.btn-aprofundar{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(155,0,232,0.15),rgba(214,0,110,0.1));border:1px solid rgba(155,0,232,0.3);color:#D4A8FF;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-aprofundar:hover,.btn-aprofundar.active{background:linear-gradient(135deg,rgba(155,0,232,0.25),rgba(214,0,110,0.18));border-color:rgba(155,0,232,0.5);}
.ai-box{margin:12px 28px 0;background:linear-gradient(135deg,rgba(155,0,232,0.06),rgba(214,0,110,0.03));border:1px solid rgba(155,0,232,0.2);border-radius:12px;overflow:hidden;display:none;}
.ai-box.open{display:block;animation:fadeUp .3s ease;}
.ai-box-header{padding:11px 16px;border-bottom:1px solid rgba(155,0,232,0.15);display:flex;align-items:center;gap:8px;}
.ai-box-header span{font-size:11px;font-weight:700;color:#D4A8FF;letter-spacing:.06em;text-transform:uppercase;}
.ai-content{padding:16px;font-size:14px;line-height:1.85;color:#E8D8FF;white-space:pre-wrap;}
.q-nav-bar{padding:18px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.btn-prev{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);color:var(--light);border:1px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-prev:hover:not([disabled]){background:rgba(255,255,255,0.09);}
.btn-prev[disabled]{opacity:0.3;cursor:default;}
.q-counter{font-size:14px;color:var(--muted);}
.q-counter strong{color:#F4EFFA;font-weight:700;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-respond{display:flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green-l);color:#5DCAA5;border:1px solid var(--green-b);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;}
.btn-respond:hover:not([disabled]){background:rgba(29,158,117,0.22);}
.btn-respond[disabled]{opacity:0.35;cursor:default;}
.btn-next{display:flex;align-items:center;gap:7px;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;background:var(--pink);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 16px var(--pink-glow);}
.btn-next:hover{background:var(--pink-bright);transform:translateY(-1px);}
.result-screen{display:none;animation:fadeUp .35s ease;}
.result-screen.show{display:block;}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;margin-bottom:20px;}
.res-ring{width:108px;height:108px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Playfair Display',serif;font-size:34px;font-weight:900;}
.res-ring.great{background:rgba(29,158,117,0.12);border:2px solid rgba(29,158,117,0.5);color:#9FE1CB;}
.res-ring.ok{background:rgba(214,0,110,0.1);border:2px solid rgba(214,0,110,0.3);color:var(--pink-light);}
.res-ring.bad{background:rgba(226,75,74,0.08);border:2px solid rgba(226,75,74,0.3);color:#F09595;}
.res-card h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;margin-bottom:6px;}
.res-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.res-stats{display:flex;gap:12px;max-width:440px;margin:0 auto 28px;}
.res-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 10px;}
.res-stat .v{font-size:22px;font-weight:700;}
.res-stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-retry{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;box-shadow:0 4px 18px var(--pink-glow);}
.btn-retry:hover{background:var(--pink-bright);}
.report-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.report-card h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.report-section{margin-bottom:24px;}
.report-section h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.tema-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tema-name{font-size:13px;color:var(--light);min-width:200px;flex-shrink:0;}
.tema-bar-bg{flex:1;height:7px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;}
.tema-bar-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.tema-bar-fill.green{background:linear-gradient(90deg,#1D9E75,#9FE1CB);}
.tema-bar-fill.red{background:linear-gradient(90deg,#E24B4A,#F09595);}
.tema-bar-fill.purple{background:linear-gradient(90deg,#7c3aed,#C4B5FD);}
.tema-pct{font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.tema-pct.green{color:#5DCAA5;}.tema-pct.red{color:#F09595;}.tema-pct.purple{color:#C4B5FD;}
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.insight-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:16px;}
.insight-box .ib-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.insight-box .ib-val{font-size:15px;font-weight:700;color:#F4EFFA;line-height:1.4;}
.insight-box .ib-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.q-review-list{display:flex;flex-direction:column;gap:6px;}
.q-rev-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:background .15s;}
.q-rev-row:hover{background:rgba(255,255,255,0.05);}
.rev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#5DCAA5;}.dot-err{background:#E24B4A;}.dot-disc{background:#7c3aed;}
.q-rev-row span{flex:1;font-size:13px;color:var(--light);}
.q-rev-row small{font-size:12px;color:var(--muted);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){nav,.sticky-bar{padding-left:16px;padding-right:16px;}.main{padding:150px 14px 60px;}.q-body,.q-card-header,.q-nav-bar{padding-left:16px;padding-right:16px;}.q-feedback,.ai-box{margin-left:16px;margin-right:16px;}.q-text{font-size:15px;}.q-opt{font-size:14px;padding:12px 14px;}.insight-grid{grid-template-columns:1fr;}.tema-name{min-width:120px;font-size:12px;}}
  .hl-toggle{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;border:1px solid rgba(250,204,21,0.3);background:rgba(250,204,21,0.08);color:#FACC15;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .2s;user-select:none;margin-left:auto;}.hl-toggle:hover{background:rgba(250,204,21,0.15);border-color:rgba(250,204,21,0.5);}.hl-toggle.active{background:rgba(250,204,21,0.22);border-color:#FACC15;box-shadow:0 0 12px rgba(250,204,21,0.15);}.hl-toggle svg{flex-shrink:0;}.q-body mark.hl{background:rgba(250,204,21,0.25);border-bottom:2px solid rgba(250,204,21,0.6);color:inherit;padding:1px 0;border-radius:2px;cursor:pointer;transition:background .15s;}.q-body mark.hl:hover{background:rgba(250,204,21,0.4);}.hl-active .q-body{cursor:crosshair;}.hl-active .q-body mark.hl{cursor:pointer;}.hl-active .q-body ::selection{background:rgba(250,204,21,0.35);}
</style>
</head>

        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>

      </button>
    </div>
    <div class="report-card">
      <h3>
        <svg width="18" height="18" fill="none" stroke="#D4A8FF" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>

const L = ['a','b','c','d'];
let cur = 0, sel = null, answered = {}, eliminated = {};

function buildPills(){
  const w = document.getElementById('qPills'); w.innerHTML = '';
  for(let i = 0; i < QS.length; i++){
    const b = document.createElement('button');
    b.className = 'qp'; b.id = 'qp'+i; b.textContent = i+1;
    b.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
    w.appendChild(b);
  }
}
function syncPills(){
  for(let i = 0; i < QS.length; i++){
    const p = document.getElementById('qp'+i); if(!p) continue;
    p.className = 'qp';
    if(i === cur) p.classList.add('current');
    if(answered[i] !== undefined){
      if(QS[i].disc) p.classList.add('disc');
      else p.classList.add(answered[i] === QS[i].g ? 'correct' : 'wrong');
    }
  }
}
function renderQ(){
  const q = QS[cur];
  sel = (answered[cur] !== undefined) ? answered[cur] : null;
  const done = answered[cur] !== undefined;
  document.getElementById('qTagNum').textContent = 'Questão '+q.n;
  document.getElementById('qTagTema').textContent = q.tema;
  document.getElementById('qCounterNum').textContent = q.n;
  const discSep = document.getElementById('qTagDiscSep');
  const discTag = document.getElementById('qTagDisc');
  if(q.disc){ discSep.style.display=''; discTag.style.display=''; }
  else { discSep.style.display='none'; discTag.style.display='none'; }
  const ctx = document.getElementById('qContext');
  if(q.context){ ctx.style.display='block'; ctx.textContent = q.context; }
  else { ctx.style.display='none'; }
  const asr = document.getElementById('qAssertions');
  if(q.assertions){ asr.style.display='block'; asr.textContent = q.assertions; }
  else { asr.style.display='none'; }
  document.getElementById('qText').innerHTML = q.text.replace(/\n/g,'<br>');
  const existingImg = document.getElementById('qImgEl');
  if(existingImg) existingImg.remove();
  if(q.img){
    const imgEl = document.createElement('img');
    imgEl.id = 'qImgEl';
    imgEl.src = q.img;
    imgEl.style.cssText = 'width:100%;max-width:560px;border-radius:10px;margin:0 auto 24px;display:block;border:1px solid rgba(255,255,255,0.1);background:#fff;padding:10px;';
    document.getElementById('qText').after(imgEl);
  }
  const wrap = document.getElementById('qOpts'); wrap.innerHTML = '';
  if(q.disc){
    const ta = document.createElement('textarea');
    ta.className = 'disc-answer';
    ta.placeholder = 'Escreva sua resposta aqui...';
    if(done){ ta.disabled = true; ta.value = answered[cur] || ''; }
    wrap.appendChild(ta);
  } else {
    q.opts.forEach(function(o, i){
      const btn = document.createElement('button'); btn.className = 'q-opt';
      if(done){
        btn.setAttribute('disabled','');
        if(i === q.g) btn.classList.add('correct');
        else if(i === sel && i !== q.g) btn.classList.add('wrong');
      } else if(sel === i){ btn.classList.add('selected'); }
      const isElim = !done && eliminated[cur] && eliminated[cur].has(i);
      if(isElim) btn.classList.add('eliminated');
      btn.innerHTML = '<span class="opt-badge">'+L[i]+'</span><span class="opt-text">'+o+'</span>'
        +'<button class="opt-elim-btn" title="Eliminar alternativa">'
        +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        +'</button>';
      if(!done){
        (function(idx){
          btn.onclick = function(e){
            if(e.target.closest('.opt-elim-btn')) return;
            selectOpt(idx);
          };
          btn.querySelector('.opt-elim-btn').onclick = function(e){
            e.stopPropagation();
            if(!eliminated[cur]) eliminated[cur] = new Set();
            if(eliminated[cur].has(idx)){
              eliminated[cur].delete(idx);
              btn.classList.remove('eliminated');
            } else {
              eliminated[cur].add(idx);
              btn.classList.add('eliminated');
              if(sel === idx){ sel = null; document.getElementById('btnRespond').disabled = true; }
            }
          };
        })(i);
      } else {
        btn.querySelector('.opt-elim-btn').style.display = 'none';
      }
      wrap.appendChild(btn);
    });
  }
  const fb = document.getElementById('qFeedback');
  const aiBox = document.getElementById('aiBox');
  if(done){
    const isDisc = q.disc;
    const ok = !isDisc && sel === q.g;
    const fbClass = isDisc ? 'fb-disc' : (ok ? 'fb-ok' : 'fb-err');
    const fbLabel = isDisc ? '✍ Gabarito comentado' : (ok ? '✓ Correto!' : '✗ Incorreto — Gabarito: '+L[q.g].toUpperCase());
    fb.className = 'q-feedback show '+fbClass;
    fb.innerHTML = '<span class="fb-label">'+fbLabel+'</span><span class="fb-short">'+q.exp+'</span>'
      +'<button class="btn-aprofundar" id="btnAI" onclick="toggleAI('+cur+')">✦ Aprofundar com IA</button>';
    aiBox.classList.remove('open');
    document.getElementById('aiContent').textContent = '';
  } else {
    fb.className = 'q-feedback'; fb.innerHTML = '';
    aiBox.style.display = 'none'; aiBox.classList.remove('open');
  }
  document.getElementById('btnPrev').disabled = (cur === 0);
  const btnN = document.getElementById('btnNext');
  if(cur === QS.length-1){
    btnN.innerHTML = 'Ver resultado <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  } else {
    btnN.innerHTML = 'Próxima <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }
  const btnR = document.getElementById('btnRespond');
  if(done){ btnR.style.display = 'none'; }
  else { btnR.style.display = 'flex'; btnR.disabled = (!q.disc && sel === null); }
  syncPills();
}
function toggleAI(qIdx){
  const aiBox = document.getElementById('aiBox');
  const btnAI = document.getElementById('btnAI');
  if(aiBox.classList.contains('open')){
    aiBox.classList.remove('open'); if(btnAI) btnAI.classList.remove('active');
  } else {
    document.getElementById('aiContent').textContent = QS[qIdx].deep;
    aiBox.style.display = 'block'; aiBox.classList.add('open');
    if(btnAI) btnAI.classList.add('active');
  }
}
function selectOpt(i){
  if(answered[cur] !== undefined) return;
  sel = i; document.getElementById('btnRespond').disabled = false;
  document.querySelectorAll('.q-opt').forEach(function(o, idx){
    if(!o.classList.contains('eliminated')){
      o.className = 'q-opt'+(idx === i ? ' selected' : '');
    }
    (function(ii){ o.onclick = function(e){ if(!e.target.closest('.opt-elim-btn')) selectOpt(ii); }; })(idx);
  });
}
function submitAnswer(){
  if(answered[cur] !== undefined) return;
  const q = QS[cur];
  if(q.disc){
    const ta = document.querySelector('.disc-answer');
    answered[cur] = ta ? ta.value : '';
  } else {
    if(sel === null) return;
    answered[cur] = sel;
  }
  renderQ();
  if(Object.keys(answered).length === QS.length){ setTimeout(showResult, 350); }
}
function prevQ(){ if(cur > 0){ cur--; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); } }
function nextQ(){ if(cur === QS.length-1){ showResult(); return; } cur++; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); }
function goTo(i){ cur = i; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); }
function showResult(){
  document.getElementById('qCard').style.display = 'none';
  const rs = document.getElementById('resultScreen'); rs.classList.add('show');
  const mcQs = QS.filter(function(q){ return !q.disc; });
  const discQs = QS.filter(function(q){ return q.disc; });
  const answeredMC = mcQs.filter(function(q){ return answered[QS.indexOf(q)] !== undefined; });
  const correct = answeredMC.filter(function(q){ return answered[QS.indexOf(q)] === q.g; }).length;
  const total = answeredMC.length;
  const pct = total > 0 ? Math.round((correct / mcQs.length) * 100) : 0;
  const ring = document.getElementById('resRing');
  ring.textContent = pct+'%';
  ring.className = 'res-ring '+(pct >= 70 ? 'great' : pct >= 50 ? 'ok' : 'bad');
  document.getElementById('resTitle').textContent = pct >= 70 ? 'Parabéns!' : pct >= 50 ? 'Quase lá!' : 'Continue praticando!';
  document.getElementById('resSub').textContent = 'Você acertou '+correct+' de '+total+' questões de múltipla escolha ('+pct+'%)';
  document.getElementById('resOk').textContent = correct;
  document.getElementById('resErr').textContent = total - correct;
  document.getElementById('resDisc').textContent = discQs.filter(function(q){ return answered[QS.indexOf(q)] !== undefined; }).length;
  document.getElementById('resSkip').textContent = QS.length - Object.keys(answered).length;
  buildReport(correct, total);
  rs.scrollIntoView({behavior:'smooth', block:'start'});
}
function buildReport(correct, total){
  const temaStats = {};
  QS.forEach(function(q, i){
    if(!temaStats[q.tema]) temaStats[q.tema] = {total:0,correct:0,wrong:0,disc:0};
    const t = temaStats[q.tema]; t.total++;
    if(q.disc){ t.disc++; }
    else if(answered[i] === undefined){}
    else if(answered[i] === q.g){ t.correct++; }
    else{ t.wrong++; }
  });
  const sorted = Object.keys(temaStats).sort(function(a,b){ return temaStats[b].wrong - temaStats[a].wrong; });
  let barsHtml = '';
  sorted.forEach(function(tema){
    const s = temaStats[tema]; const mc = s.total - s.disc;
    if(mc === 0){ barsHtml += '<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill purple" style="width:100%"></div></div><span class="tema-pct purple">Disc.</span></div>'; return; }
    const pct = Math.round((s.correct / mc) * 100); const isGood = pct >= 50;
    barsHtml += '<div class="tema-row"><span class="tema-name">'+tema+'</span><div class="tema-bar-bg"><div class="tema-bar-fill '+(isGood?'green':'red')+'" style="width:'+pct+'%"></div></div><span class="tema-pct '+(isGood?'green':'red')+'">'+pct+'%</span></div>';
  });
  const worstTema = sorted.find(function(t){ return temaStats[t].wrong > 0; }) || '—';
  const bestTema = sorted.slice().reverse().find(function(t){ const s=temaStats[t]; return (s.total-s.disc)>0 && s.correct>0; }) || '—';
  const pct = total > 0 ? Math.round((correct/total)*100) : 0;
  const streakMsg = pct >= 70 ? 'Ótimo domínio geral!' : pct >= 50 ? 'Foque nos pontos fracos.' : 'Revise os conteúdos antes da prova.';
  let wrongHtml = '';
  QS.forEach(function(q, i){
    if(!q.disc && answered[i] !== undefined && answered[i] !== q.g){
      wrongHtml += '<div class="q-rev-row" onclick="goToQ('+i+')"><div class="rev-dot dot-err"></div><span>Q'+q.n+' — '+q.tema+'</span><small>Resp: '+L[answered[i]].toUpperCase()+' · Gabarito: '+L[q.g].toUpperCase()+'</small></div>';
    }
  });
  if(!wrongHtml) wrongHtml = '<div style="font-size:13px;color:var(--muted);padding:8px 0;">Nenhum erro registrado 🎉</div>';
  document.getElementById('reportContent').innerHTML =
    '<div class="report-section"><h4>Desempenho por tema</h4><div>'+barsHtml+'</div></div>'
    +'<div class="report-section"><h4>Insights</h4><div class="insight-grid">'
      +'<div class="insight-box"><div class="ib-label">Ponto mais fraco</div><div class="ib-val">'+worstTema+'</div><div class="ib-sub">Maior incidência de erros</div></div>'
      +'<div class="insight-box"><div class="ib-label">Melhor desempenho</div><div class="ib-val">'+bestTema+'</div><div class="ib-sub">Maior taxa de acerto</div></div>'
      +'<div class="insight-box"><div class="ib-label">Aproveitamento</div><div class="ib-val">'+correct+'/'+total+'</div><div class="ib-sub">'+streakMsg+'</div></div>'
      +'<div class="insight-box"><div class="ib-label">Questões puladas</div><div class="ib-val">'+(QS.length - Object.keys(answered).length)+'</div><div class="ib-sub">Sem resposta registrada</div></div>'
    +'</div></div>'
    +'<div class="report-section"><h4>Questões erradas</h4><div class="q-review-list">'+wrongHtml+'</div></div>';
}
function goToQ(i){
  document.getElementById('qCard').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  cur = i; renderQ(); window.scrollTo({top:0,behavior:'smooth'});
}
function resetAll(){
  answered = {}; sel = null; cur = 0; eliminated = {};

  <script>
const PROVA_ID = 'soi2-2025-1';
const PERIODO = 2;
const CONTENT_TYPE = 'prova_antiga';
const STORAGE_KEY = 'afyados_prova_' + PROVA_ID;

// ── localStorage ──
function saveLocal() {
  const state = { answered: answered, cur: cur, eliminated: {} };
  for (const k in eliminated) state.eliminated[k] = Array.from(eliminated[k]);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.answered && Object.keys(state.answered).length > 0) {
      answered = state.answered;
      cur = state.cur || 0;
      eliminated = {};
      if (state.eliminated) {
        for (const k in state.eliminated) eliminated[k] = new Set(state.eliminated[k]);
      }
      return true;
    }
  } catch (e) {}
  return false;
}

// ── Supabase ──
const _sbScript = document.createElement('script');
_sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
_sbScript.onload = function() {
  window.sb = supabase.createClient(
    'https://mmqfqlbojsbuuodfbilh.supabase.co',
    'sb_publishable_fZp0two05vv3IPxqNnFL_w_agbTPZYH'
  );
};
document.head.appendChild(_sbScript);

async function saveToSupabase(i) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const q = QS[i];
    const isDisc = q.disc;
    const userAns = isDisc ? (answered[i] || '').substring(0, 500) : L[answered[i]];
    const correctAns = isDisc ? 'discursiva' : L[q.g];
    const isCorrect = isDisc ? null : (answered[i] === q.g);
    await sb.from('question_responses').upsert({
      user_id: user.id,
      question_id: PROVA_ID + '-q' + String(q.n).padStart(2, '0'),
      periodo: PERIODO, content_type: CONTENT_TYPE,
      user_answer: userAns, correct_answer: correctAns,
      is_correct: isCorrect, time_spent_seconds: 0,
      topic: q.tema, difficulty: 'media'
    }, { onConflict: 'user_id,question_id' });
    if (!isDisc && isCorrect !== null) {
      const { data: row } = await sb.from('user_progress')
        .select('*').eq('user_id', user.id).eq('periodo', PERIODO).single();
      if (row) {
        const t = row.total_questions_solved + 1;
        const c = row.correct_answers + (isCorrect ? 1 : 0);
        const topics = row.topics_studied || [];
        if (q.tema && !topics.includes(q.tema)) topics.push(q.tema);
        await sb.from('user_progress').update({
          total_questions_solved: t, correct_answers: c,
          accuracy_percentage: parseFloat(((c / t) * 100).toFixed(1)),
          last_studied: new Date().toISOString(), topics_studied: topics
        }).eq('user_id', user.id).eq('periodo', PERIODO);
      } else {
        await sb.from('user_progress').insert({
          user_id: user.id, periodo: PERIODO,
          total_questions_solved: 1, correct_answers: isCorrect ? 1 : 0,
          accuracy_percentage: isCorrect ? 100 : 0,
          last_studied: new Date().toISOString(),
          topics_studied: q.tema ? [q.tema] : []
        });
      }
    }
  } catch (e) { console.warn('Supabase:', e); }
}

// ── Interceptar uma vez só ──
const _origSubmit = submitAnswer;
submitAnswer = function() {
  const idx = cur;
  _origSubmit();
  saveLocal();
  if (answered[idx] !== undefined && window.sb) saveToSupabase(idx);
};

const _origReset = resetAll;
resetAll = function() {
  localStorage.removeItem(STORAGE_KEY);
  _origReset();
};

// ── Restaurar estado ──
if (loadLocal()) {
  renderQ();
  if (Object.keys(answered).length === QS.length) setTimeout(showResult, 100);
}
