<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOI II - N1 2025.1 | Afyados</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0710; --surface: #120e1c; --card: #17122a; --card-hover: #1e1835;
            --primary: #c8006a; --primary-light: rgba(200,0,106,0.18); --primary-glow: rgba(200,0,106,0.30);
            --green: #1a9068; --green-light: rgba(26,144,104,0.18);
            --red: #c73348; --red-light: rgba(199,51,72,0.18);
            --purple: #7c3aed; --purple-light: rgba(124,58,237,0.18);
            --text: #e8e0f5; --text-2: #a899c0; --text-3: #6b5f85;
            --border: rgba(255,255,255,0.06); --border-2: rgba(255,255,255,0.10); --r: 12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; line-height: 1.6; font-size: 14px; }

        /* NAV */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 52px; display: flex; align-items: center; padding: 0 20px; gap: 10px; background: rgba(10,7,16,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .nav-logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: #fff; flex-shrink: 0; }
        .nav-brand { font-size: 0.82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }

        /* STICKY PROGRESS */
        .sticky { position: sticky; top: 52px; z-index: 100; background: rgba(10,7,16,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
        .sticky-inner { max-width: 780px; margin: 0 auto; padding: 10px 20px; }
        .pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .pill { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; background: rgba(255,255,255,0.04); color: var(--text-3); }
        .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .pill.ok { background: var(--green); color: #fff; }
        .pill.err { background: var(--red); color: #fff; }

        /* MAIN CONTENT */
        .main { max-width: 780px; margin: 0 auto; padding: 24px 20px 120px; }
        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px 26px; }
        .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .q-tag { font-size: 0.68rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 3px 9px; border-radius: 5px; }
        .q-context { font-size: 0.84rem; color: var(--text-2); background: rgba(255,255,255,0.025); padding: 12px; border-radius: 8px; border-left: 2px solid var(--primary); margin-bottom: 15px; }
        
        /* OPTIONS */
        .opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 9px; border: 1.5px solid var(--border); background: rgba(255,255,255,0.02); cursor: pointer; margin-bottom: 8px; position: relative; }
        .opt.sel { border-color: var(--primary); background: var(--primary-light); }
        .opt.hit { border-color: var(--green); background: var(--green-light); }
        .opt.miss { border-color: var(--red); background: var(--red-light); }
        .opt-ltr { width: 24px; height: 24px; border-radius: 5px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
        .btn-eliminate { position: absolute; right: 10px; color: var(--text-3); background: none; border: none; cursor: pointer; font-size: 12px; }
        .opt.eliminated .opt-txt { text-decoration: line-through; opacity: 0.4; }

        /* RESULTS SCREEN (AS PER IMAGES) */
        .results { display: none; }
        .results.on { display: block; animation: fadeIn 0.5s ease; }
        .res-hero { text-align: center; padding: 40px 0; }
        .res-circle { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%); }
        .res-pct { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .res-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .res-stat { background: var(--card); padding: 15px; border-radius: var(--r); text-align: center; border: 1px solid var(--border); }
        .res-stat-n { font-size: 1.5rem; font-weight: 700; }
        .res-stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: var(--text-3); margin-top: 5px; }
        
        .res-section { background: var(--card); border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 20px; padding: 20px; }
        .res-section-head { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-2); margin-bottom: 15px; letter-spacing: 1px; }
        .theme-row { margin-bottom: 12px; }
        .theme-top { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; }
        .theme-bar-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .theme-bar { height: 100%; background: var(--purple); border-radius: 10px; transition: width 1s ease; }

        .insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .insight-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .insight-lbl { font-size: 0.6rem; font-weight: 700; color: var(--text-3); margin-bottom: 5px; }
        .insight-val { font-size: 0.85rem; font-weight: 600; }
        .insight-sub { font-size: 0.7rem; color: var(--text-3); }

        .review-item { padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.8rem; }
        .btn-retry { width: 100%; padding: 15px; border-radius: 10px; background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 20px; }

        /* BOTTOM BAR */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 15px; z-index: 100; }
        .bottom-inner { max-width: 780px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-answer { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-answer:disabled { opacity: 0.3; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-logo-mark">A</div>
    <span class="nav-brand">Afyados</span>
</nav>

<div class="sticky" id="stickyNav">
    <div class="sticky-inner">
        <div class="pills" id="pills"></div>
    </div>
</div>

<div class="main">
    <div id="quizWrap"></div>
    <div class="results" id="results"></div>
</div>

<div class="bottom-bar" id="bottomBar">
    <div class="bottom-inner">
        <button onclick="prev()" id="btnPrev" style="background:none; border:none; color:var(--text-2); cursor:pointer;">← Anterior</button>
        <span id="ctrQ" style="font-size: 0.8rem; color: var(--text-3);"></span>
        <button class="btn-answer" id="btnAnswer" onclick="doAnswer()">Responder</button>
    </div>
</div>

<script>
// Dados das Questões (Array Q)
const Q = [
  { num: 1, type: 'mc', theme: 'Anatomia do Joelho', source: 'UNISL', context: 'A articulação do joelho é sinovial do tipo dobradiça modificada...', text: 'Acerca das características funcionais do joelho, é correto:', opts: ['II e IV, apenas.', 'I e III, apenas.', 'I, II, III e IV.', 'I, II e III, apenas.'], g: 3, exp: 'A alternativa D está correta. A asserção IV erra ao dizer que meniscos produzem lubrificação (função da membrana sinovial).' },
  { num: 2, type: 'mc', theme: 'Nervos Cranianos', source: 'ITPAC', context: 'Paciente 60 anos, anosmia, zumbido e perda de equilíbrio...', text: 'Assinale a opção correta sobre a relação entre as asserções:', opts: ['II não justifica I.', 'II justifica I.', 'I correta, II incorreta.', 'I incorreta, II correta.'], g: 1, exp: 'Ambas corretas. Anosmia (Nervo I) e Equilíbrio (Nervo VIII).' },
  { num: 3, type: 'mc', theme: 'Bioquímica Neural', source: 'AFYA', text: 'Sobre a cotransmissão neural, assinale a correta:', opts: ['Impede modulação.', 'Permite liberar dois ou mais neurotransmissores.', 'Nunca ao mesmo tempo.', 'Apenas serotonina na rafe.'], g: 1, exp: 'Cotransmissão permite múltiplos mensageiros (ex: Glutamato e Serotonina).' },
  { num: 4, type: 'mc', theme: 'Anatomia da Medula', source: 'UNIGRANRIO', text: 'Qual representa a formação do nervo espinal?', opts: ['Dividido em raízes após emergir.', 'Gânglio na raiz ventral.', 'Junção de raiz dorsal (sens) e ventral (mot).', 'Raiz dorsal eferente.'], g: 2, exp: 'Nervo espinal = Raiz Dorsal (Sensitiva) + Raiz Ventral (Motora).' },
  { num: 5, type: 'mc', theme: 'Fisiologia Auditiva', source: 'AFYA', text: 'Sobre o mecanismo de audição, assinale a correta:', opts: ['Tuba auditiva amplifica o som.', 'Células ciliadas despolarizam com entrada de Na+.', 'Órgão de Corti realiza mecanotransdução.', 'Martelo se liga à janela redonda.'], g: 2, exp: 'O Órgão de Corti é o sítio da transdução mecanoelétrica.' },
  { num: 6, type: 'mc', theme: 'Neuroanatomia da Memória', source: 'AFYA', text: 'Estruturas envolvidas na consolidação de memórias:', opts: ['Putâmen e Accumbens.', 'Corpo mamilar e Hipocampo.', 'Caudado e Mamilar.', 'Hipocampo e Olivas.'], g: 1, exp: 'Hipocampo e Corpos Mamilares são chaves no Circuito de Papez.' },
  { num: 7, type: 'mc', theme: 'Histologia Muscular', source: 'UniREDENTOR', text: 'Marque a alternativa correta sobre a fibra esquelética:', opts: ['Miofibrilas organizadas em sarcômeros.', 'Possui discos intercalares.', 'Tríade formada por 1 túbulo T e 1 cisterna.', 'Banda A formada apenas por actina.'], g: 0, exp: 'A unidade funcional é o sarcômero. Discos intercalares são do miocárdio.' },
  { num: 8, type: 'mc', theme: 'Neuroanatomia Cortical', source: 'UNIGRANRIO', text: 'Sobre a área de associação somestésica:', opts: ['Localizada no lobo frontal.', 'Permite reconhecimento tátil (estereognosia).', 'Gera comandos motores.', 'Causa afasia de Broca.'], g: 1, exp: 'Localizada no lobo parietal, interpreta a natureza dos estímulos táteis.' },
  { num: 9, type: 'mc', theme: 'Vias Somestésicas', source: 'UNIGRANRIO', text: 'Paciente com perda de tato discriminativo. Qual a via?', opts: ['Espinotalâmica Lateral.', 'Espinocerebelar.', 'Coluna Dorsal-Lemnisco Medial.', 'Corticoespinal Lateral.'], g: 2, exp: 'O tato fino e a propriocepção consciente viajam pelo funículo posterior.' },
  { num: 10, type: 'mc', theme: 'Tronco Encefálico', source: 'FASA', text: 'Assinale a função correta do tronco:', opts: ['Mesencéfalo possui colículos e Nervo IV.', 'Bulbo possui Nervos I e II.', 'Ponte regula temperatura corporal.', 'Formação reticular foca em memória longo prazo.'], g: 0, exp: 'Mesencéfalo abriga os colículos e a saída dorsal do Troclear.' },
  { num: 11, type: 'mc', theme: 'Líquor (LCE)', source: 'UNIDEP', text: 'Sobre o fluxo e produção do líquor:', opts: ['I, II e III corretas.', 'I, III e IV corretas.', 'I e IV apenas.', 'I, II e IV corretas.'], g: 1, exp: 'A II está errada: o fluxo é do 3º para o 4º ventrículo, não o contrário.' },
  { num: 12, type: 'mc', theme: 'Histologia Óssea', source: 'UNIMA', text: 'Sobre o reparo de fraturas ósseas:', opts: ['I e III corretas.', 'II e IV corretas.', 'I e IV corretas.', 'I e II corretas.'], g: 2, exp: 'Limpeza por macrófagos e formação de calo imaturo são essenciais.' },
  { num: 13, type: 'mc', theme: 'Neurotransmissores', source: 'AFYA', text: 'Relacione: I-ACh, II-Noradrenalina.', opts: ['II-A; II-B; I-C; I-D.', 'I-A; I-B; II-C; II-D.', 'I-A; II-B; II-C; I-D.', 'II-A; I-B; II-C; I-D.'], g: 2, exp: 'ACh contrai músculo e brônquios. Noradrenalina acelera coração e contrai vasos.' },
  { num: 14, type: 'mc', theme: 'Fisiologia Muscular', source: 'UniREDENTOR', text: 'Efeito da overdose de nicotina na placa motora:', opts: ['Contratilidade contínua (tetania).', 'Redução de Cálcio citoplasmático.', 'Relaxamento muscular extremo.', 'Fibras do tipo noradrenérgico.'], g: 0, exp: 'Agonistas colinérgicos em excesso causam despolarização persistente.' },
  { num: 15, type: 'mc', theme: 'Estruturas Prosencefálicas (Líquor e Memória)', source: 'UNIGRANRIO', text: 'Sobre as vias D1 e D2 nos núcleos da base:', opts: ['Via indireta inibe Substância Negra.', 'Via direta ativa núcleo subtalâmico.', 'Via direta (D1) inibe GPi, facilitando o tálamo.', 'Via indireta estimula o tálamo.'], g: 2, exp: 'D1 desibe o tálamo ao inibir o Globo Pálido Interno (GPi).' }
];

let S = { cur: 0, ans: Array(Q.length).fill(null), done: Array(Q.length).fill(false), sel: null, elim: {} };

function boot() { buildPills(); renderQ(); }

function buildPills() {
    const c = document.getElementById('pills'); c.innerHTML = '';
    Q.forEach((q, i) => {
        const b = document.createElement('button');
        b.className = 'pill'; b.textContent = i + 1; b.id = 'p' + i;
        b.onclick = () => goto(i); c.appendChild(b);
    });
}

function syncPills() {
    Q.forEach((_, i) => {
        const p = document.getElementById('p' + i);
        p.className = 'pill' + (i === S.cur ? ' active' : '');
        if (S.done[i]) p.classList.add(S.ans[i] === Q[i].g ? 'ok' : 'err');
    });
}

function renderQ() {
    const q = Q[S.cur];
    const isDone = S.done[S.cur];
    document.getElementById('ctrQ').textContent = `Questão ${S.cur + 1} de ${Q.length}`;
    
    let html = `<div class="q-meta"><span class="q-tag">Questão ${q.num}</span><span style="font-size:0.7rem; color:var(--text-3)">${q.theme}</span></div>`;
    html += `<div class="q-card">`;
    if (q.context) html += `<div class="q-context">${q.context}</div>`;
    html += `<div style="font-weight:600; margin-bottom:20px;">${q.text}</div><div class="opts">`;
    
    q.opts.forEach((opt, i) => {
        let cls = 'opt';
        if (isDone) {
            if (i === q.g) cls += ' hit';
            else if (i === S.ans[S.cur]) cls += ' miss';
        } else if (S.sel === i) cls += ' sel';
        
        html += `<div class="${cls}" onclick="${isDone ? '' : `pick(${i})`}">
                    <span class="opt-ltr">${String.fromCharCode(65 + i)}</span>
                    <span class="opt-txt">${opt}</span>
                 </div>`;
    });
    
    if (isDone) html += `<div style="margin-top:15px; font-size:0.8rem; color:var(--text-2); border-top:1px solid var(--border); padding-top:10px;"><b>Gabarito Comentado:</b> ${q.exp}</div>`;
    
    html += `</div></div>`;
    document.getElementById('quizWrap').innerHTML = html;
    document.getElementById('btnAnswer').disabled = isDone || S.sel === null;
    syncPills();
}

function pick(i) { S.sel = i; renderQ(); }

function doAnswer() {
    S.ans[S.cur] = S.sel; S.done[S.cur] = true; S.sel = null;
    renderQ();
    if (S.done.every(x => x)) setTimeout(showResults, 1000);
}

function showResults() {
    document.getElementById('quizWrap').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('stickyNav').style.display = 'none';

    const hits = Q.filter((q, i) => S.ans[i] === q.g).length;
    const pct = Math.round((hits / Q.length) * 100);

    const themes = {};
    Q.forEach((q, i) => {
        if (!themes[q.theme]) themes[q.theme] = { t: 0, h: 0 };
        themes[q.theme].t++; if (S.ans[i] === q.g) themes[q.theme].h++;
    });

    const topWeak = Object.entries(themes).sort((a,b) => (a[1].h/a[1].t) - (b[1].h/b[1].t))[0][0];

    let html = `
        <div class="res-hero">
            <div class="res-circle"><span class="res-pct">${pct}%</span></div>
            <div style="font-size:1.2rem; font-weight:700;">Continue praticando!</div>
            <div style="color:var(--text-3); font-size:0.8rem;">Você acertou ${hits} de ${Q.length} questões (${pct}%)</div>
        </div>

        <div class="res-stats">
            <div class="res-stat"><div class="res-stat-n" style="color:var(--green)">${hits}</div><div class="res-stat-lbl">MC Corretas</div></div>
            <div class="res-stat"><div class="res-stat-n" style="color:var(--red)">${Q.length - hits}</div><div class="res-stat-lbl">MC Erradas</div></div>
            <div class="res-stat"><div class="res-stat-n" style="color:var(--purple)">0</div><div class="res-stat-lbl">Discursivas</div></div>
        </div>

        <div class="res-section">
            <div class="res-section-head">Relatório de desempenho</div>
            ${Object.entries(themes).map(([name, d]) => `
                <div class="theme-row">
                    <div class="theme-top"><span>${name}</span><span>${Math.round(d.h/d.t*100)}%</span></div>
                    <div class="theme-bar-bg"><div class="theme-bar" style="width:${d.h/d.t*100}%"></div></div>
                </div>
            `).join('')}
        </div>

        <div class="res-section">
            <div class="res-section-head">Insights</div>
            <div class="insights-grid">
                <div class="insight-card"><div class="insight-lbl">PONTO MAIS FRACO</div><div class="insight-val">${topWeak}</div></div>
                <div class="insight-card"><div class="insight-lbl">MC ACERTADAS</div><div class="insight-val">${hits}/${Q.length}</div></div>
            </div>
        </div>

        <div class="res-section">
            <div class="res-section-head">Revisão por Questão</div>
            ${Q.map((q, i) => S.ans[i] !== q.g ? `
                <div class="review-item" onclick="revisit(${i})">
                    <span style="color:var(--red)">●</span> Q${q.num} — ${q.theme} 
                    <span style="float:right; color:var(--text-3)">Resp: ${String.fromCharCode(65+S.ans[i])} | Gab: ${String.fromCharCode(65+q.g)}</span>
                </div>` : '').join('')}
        </div>
        <button class="btn-retry" onclick="location.reload()">Tentar novamente</button>
    `;

    const resDiv = document.getElementById('results');
    resDiv.innerHTML = html;
    resDiv.classList.add('on');
    window.scrollTo(0,0);
}

function revisit(i) {
    document.getElementById('results').classList.remove('on');
    document.getElementById('quizWrap').style.display = 'block';
    document.getElementById('bottomBar').style.display = 'block';
    document.getElementById('stickyNav').style.display = 'block';
    goto(i);
}

function goto(i) { S.cur = i; renderQ(); }
function prev() { if (S.cur > 0) goto(S.cur - 1); }

boot();
</script>
</body>
</html>
