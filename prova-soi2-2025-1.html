<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: #1f1f1f;
            padding: 10px;
        }
        .navbar a {
            color: #ffffff;
            text-decoration: none;
            padding: 10px;
        }
        /* Sticky Headers with Pills */
        .quiz-header {
            position: sticky;
            top: 0;
            background-color: #1f1f1f;
            padding: 10px;
        }
        /* Main Quiz Area */
        .quiz-area {
            padding: 20px;
        }
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1f1f1f;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }
        /* Results Section */
        .res-hero {
            text-align: center;
            margin: 20px;
        }
        .res-stats {
            display: flex;
            justify-content: space-around;
        }
        .res-section {
            margin: 20px;
        }
        .btn-retry {
            cursor: pointer;
            background-color: #ff5722;
            color: #ffffff;
            padding: 10px;
        }
    </style>
</head>

    </div>

        <!-- Pills for Questions -->
    </div>

        <!-- Questions will be rendered here -->
    </div>
    <div class="bottom-nav">

        <button onclick="nextQ()">Next</button>
    </div>
    <div class="res-hero">
        <h2>Your Result</h2>
        <div id="percentage-circle"></div>
    </div>
    <div class="res-stats">
        <div>Correct: <span id="correctCount"></span></div>
        <div>Incorrect: <span id="incorrectCount"></span></div>
        <div>Discursive: <span id="discursiveCount"></span></div>
    </div>
    <div class="res-section">
        <h3>Performance by Theme</h3>
        <div id="themePerformanceBars"></div>
    </div>

</html>
